body:
  text: 春秋正傳辯疑附答門人高簡春秋正傳辯疑甲午四月十一日竊校正傳而兩讀之見老先生之於是經也真有以得千載不傳之秘而孔子光明正大之心如秋陽皜皜者不可得而支離穿鑿之不可得而附㑹深刻之燦然若星斗在天而人之望之者咸知其孰為經孰為緯孰為災孰為祥而無事乎深為推測以累乎天之無心焉耳也於乎孔子無心之心晦之千餘年矣而先生乃獨契之葢先生之心即孔子之心孔子之心即吾人虚明純白之本心諸儒者不以其本來者契之而鑿之使深宜乎先生之獨得之也所謂百世以俟聖人而不惑者其在茲乎其在茲乎然中間有請者願得而辯之正傳序曰筆者其所書也削者其所去也而傳内又有所謂春秋為魯史之文而非仲尼削之答云此削字猶言改也凡有誤作削字者可改作改字又有所謂仲尼無所損益者不知前謂其所書其所去者指仲尼邪抑魯史邪答云所書所去正謂仲尼非魯史也抑謂魯史書之而仲尼亦書之邪魯史去之而仲尼亦去之邪答云非也魯史不止此書不書去取在仲尼也若曰筆削盡由於魯史而仲尼無所加損則所謂春秋成而亂臣賊子懼者孰成之而使之懼邪答云非謂筆削盡由於魯史也謂魯史中有闗於是非者仲尼則筆之於冊今春秋是也無甚闗於是非者仲尼則削之而不存于冊然其所筆皆魯史舊文仲尼未嘗改其文但取其義耳所謂無加損者不加損魯史之文也其餘則削去而不筆之於書者多矣今觀左傳有而經則無者可知矣然謂㳺夏不能賛一詞則孟子所謂筆削云者又似專指孔子矣答云此非孟子之言也簡以是細詳先生之意毋乃以謂筆者魯史之所已筆為綱也孔子因而筆之而未嘗削而損焉其所削者魯史之所約為提綱而削其事以附於綱下者乃其記事之法孔子亦因而削之而但無用附諸綱耳是先生之所謂無所益也如此乎哉答云非是之謂也筆削謂仲尼非謂魯史也削事附綱下尤未明春秋者魯史之總文如董狐書趙盾弑其君而其弑之之跡則當時别有縁由如左傳所云出不越竟入不討賊者乃其實事也若是則春秋一部書信為魯史之文矣而非全文也答云此句當改云未具事實也其不用全文處即孔子竊取之義答云今改云孔子竊取之義則具於事實而所謂成春秋者亦在乎此與譬如今之士人讀史書然既讀其提綱又讀其記事矣却將提綱録出成一部書而無所增减其記事而用錄之而使后之人讀其所錄而考諸記事以見是非乎云耳此則孔子作春秋之意也不知先生正傳之作果如此乎答云正是如此抑所謂筆削云者筆固仍魯史之舊矣而削則有二義其不書魯史之所記事則孔子削之答云非有二義削即去之不存于經者也其奪人之爵不具時不書即位之類則史之舊也而非孔子之所削乎如此以觀先生之意則既謂其所去又謂無所削者庶乎前后不悖矣答云無所削者謂不改魯史之文也此削字當改作改字然簡竊以為既因史氏而筆削之矣后之觀春秋者或經中所載是非顯然者固得以知其實其有難見是非者必考於傳而后知之則孔子胡不依史氏附其事於下而使后之人坦然易明而莫之疑乎何乃第書其綱而已也答云正謂竊取而不顯然取之而其事實則當時必有詳具始末如左傳者是也豈孔子之意知記事之書必傳於后世吾但特提其綱要而使后之人知吾取義在此則是非得失人自求之于心而不可掩焉耳審若是是孔子敦厚含𢎞廣博深沉之意實寓諸春秋而在夫人之自得焉者乎譬諸天地覆載萬物而髙卑貴賤莫不悉具其所以髙所以卑所以貴賤人自求之而人自得之而天地無心成化之意固渾乎其中矣故莊周云聖人議而不辯先生之意其或在此矣乎答曰但書一事令人考其跡則知其善惡矣不必引莊周之言盖聖經尚簡若當時作春秋亦如後之綱目則不勝其煩而非經之文矣抑先生謂春秋為魯史之文而非仲尼之文固本諸孟子也然春秋十二公記者非一手今詳觀春秋之文如出於一人之手何也豈史官記事之法世世相傳故其文詞書法不甚相逺矣乎答云正謂如此所謂史有三長書言書事自有其法古之史官子孫皆世其業安得不如出一手昨考得脩後舊史之文二十五條附于經末杜預謂弟子欲存孔子卒故錄之試取觀之與今春秋之文無異益可見春秋為魯史之文無疑矣夫唯其不出於一人之手也是故其中有缺時而不書者有當書即位而不書者有缺文而存疑者有序爵而或先或後者有序事而或詳或略者有或書爵或書人者有名不名者有或薨或卒者孔子皆因而筆之而唯竊取其義在經吾録出者乎答云正是如此凡此皆簡所疑而未决焉者伏乞批示釋之勿使后之讀春秋者復如簡之所惑則先生善繼孔子之志真昭昭於千載之下矣春秋正傳辯疑
