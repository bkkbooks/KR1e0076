body:
  text: 春秋正傳卷九明湛若水撰莊公僖王三年十有五年齊桓七年晉緡二十六年衛恵二十一年蔡哀十六年鄭厲二十二年曹荘二十三年陳宣十四年杞共二年宋桓三年秦武十九年楚文十一年春齊侯宋公陳侯衛侯鄭伯㑹于鄄正傳曰書齊侯宋公陳侯衛侯鄭伯㑹于鄄著列國相㑹之非也夫㑹若善于盟矣然㑹同之禮出于王之制而私相約㑹可得為禮乎冬已㑹矣而春復㑹者左氏曰為齊始覇也是時列國諸侯皆不修朝王之禮而私為朝覇可得為禮乎且踰時而再㑹非天下為公人臣尊王之道矣夏夫人姜氏如齊正傳曰書夏夫人姜氏如齊著如之非禮也榖梁曰婦人既嫁不踰境踰境非禮也秋宋人齊人邾人伐郳正傳曰郳小國書宋人齊人邾人伐郳則専征之罪見矣夫征伐自天子出也而齊與諸侯擅専之其無王之罪大矣左氏曰諸侯為宋伐郳此實傳也是實宋志而齊為覇主故首以宋宋主之也胡氏以不先齊者桓猶未成乎覇非也此皆稱人與上不同可以見稱人不稱人之不足以言褒貶矣他倣此鄭人侵宋正傳曰書鄭人侵宋則擅興之罪自見矣不待乎侵之一字而罪之也春秋無義戰若以侵而非之則夫他或書伐書戰者即以為善耶左氏曰鄭人間之而侵宋張氏曰間諸侯伐郳而侵宋不誠服齊以背二鄄之㑹胡氏曰侵伐之義三傳不同左氏曰有鐘鼔曰伐無鐘鼔曰侵先儒或非其説以為聲罪致討曰伐無名行師曰侵未有以易之者也然考諸五經皆稱侵伐在易謙之六五曰利用侵伐征不服也書之泰誓曰我武惟揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國而曰賊賢害民則伐之負固不服則侵之而以為無名行師可乎然則或曰侵或曰伐何也聲罪致討曰伐潜師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也潜師者衘枚卧鼔出人不意兵法所謂竒也愚謂以易書詩之説觀之則侵伐之分别盖皆秦漢以來治春秋者為之耳冬十月正傳曰無事亦書義見前僖王四年十有六年齊桓八年晉緡二十七年㓕武公稱三厲十八年衛恵二十二年蔡哀十七年鄭二十三年曹荘二十四年陳宣十五年杞共三年宋桓四年秦武二十年楚文十二年春王正月正傳曰無事亦書義見前夏宋人齊人衛人伐鄭正傳曰書宋人齊人衛人伐鄭則擅興之罪見矣齊桓為覇而先之以宋者宋主之故左氏曰諸侯伐鄭宋故也孫氏曰鄭背鄄之兩㑹侵宋故桓帥諸侯伐之愚謂齊宋雖有詞然而擅専征伐之罪不可逃矣夫諸儒義例以稱人為貶則此皆稱人何以不謂為貶耶秋荆伐鄭正傳曰書荆伐鄭著夷狄陵中國之罪也至是楚三犯中國矣左氏曰鄭伯自櫟入緩告于楚秋楚伐鄭及櫟為不禮故也愚謂此實傳也冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽正傳曰云㑹者公㑹也不言公公自在其中内史之詞也程胡皆以為桓始覇義盟而魯叛盟故諱不稱公非也書㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽著天下諸侯之同心而其功罪並著矣鄭列㑹盟者左氏謂同盟于幽鄭成也公羊曰同盟者同欲也榖梁曰同尊周也程氏曰上無明王下無方伯列國交争桓公始覇天下與之故書同盟志同欲也此愚之所謂功也然而禮樂征伐自天子出諸侯非奉王制也㑹同而私相㑹盟㰱血以要神於是乎盟主専征之事起矣此愚之所謂罪也聖人尊周之義喜懼之情見矣邾子克卒正傳曰克其名書邾子克卒小國之大故也聖人筆之於春秋而不削寓恤小之義也榖梁曰其曰子進之也愚謂此史氏之詞耳僖王五年崩十有七年齊桓九年晉武三十九年卒衛恵二十三年蔡哀十八年鄭厲二十四年曹荘二十五年陳宣十六年杞共四年宋桓五年秦徳公元年楚文十三年春齊人執鄭詹正傳曰鄭詹榖梁謂鄭之佞人也胡氏曰詹為執政用事之臣也書齊人執鄭詹則齊桓之覇心見矣何謂覇心執言仗義以濟其私也左氏曰鄭不朝也齊桓以鄭不朝而執其用事之臣其覇天下之志見矣其無王之罪著矣如使齊桓有反已之心以為我列國諸侯尚不朝王何以責鄭則桓不止覇而進於王道矣惜乎念不出此遂終為三王之罪人也悲夫故胡氏曰以責人之心責己則盡道以愛己之心愛人則盡仁此春秋待齊之意也夏齊人殱于遂正傳曰殱者殺之盡也書曰殱厥渠魁書夏齊人殱于遂則齊人致禍之端可考矣夫國必自伐而後人伐之殺人之父兄人亦殺其父兄今齊滅人是宜其反中其禍也左氏曰夏遂因氏頜氏工婁氏湏遂氏饗齊戍醉而殺之齊人殱焉愚謂此實傳也胡氏曰春秋書此者見齊人滅遂恃强凌弱非伐罪弔民之師遂人書滅乃亡國之善辭上下之同力也夫以亡國餘民能殱强齊之戍則申胥一身可以存楚楚雖三户可以亡秦固有是理足為强而不義之戒而弱者亦可省身而自立矣秋鄭詹自齊逃來正傳曰書鄭詹自齊逃來則逃者與受逃者之非義並見矣榖梁曰逃義曰逃是也謂非所當逃而逃也胡氏曰逃者匹夫之事詹之見執若其有罪雖死可也儻曰無罪苟見免焉請從恵於㑹使諸侯聞之則不辱君命矣不能以理自明也而反效匹夫之行遁逃苟免越在他國不亦賤乎特書曰逃以著其幸免而不知命之罪也齊桓始覇同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以罪魯也冬多麋正傳曰書冬多麋公羊以為記異是也胡氏曰麋魯所有也多則為異以其又害稼也故書此亦禹放龍蛇周公逺犀象之意也害稼則及人矣恵王元年十有八年齊桓十年晉獻公佹諸元年衛恵二十四年蔡哀十九年鄭厲二十五年曹荘二十六年陳宣十七年杞共五年宋桓六年秦徳二年楚文十四年春王正月日有食之正傳曰書日有食之紀天變也故聖人筆之於春秋以示戒焉榖梁曰不言日不言朔夜食也何以知其夜食也曰王者朝日故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔愚謂若以為夜食何以不書某日夜食然而今之夜而日食則不奏不救何也無以知其為日食也諸傳之妄多類此夏公追戎于濟西正傳曰書公追戎于濟西大公之攘夷狄也不言其來左氏以為諱之胡氏以為不覺其來皆非也盖來而未至而豫禦之也公羊曰此未有言伐者其言追何大其為中國追也此未有伐中國者則其言為中國追何大其未至而豫禦之也其言于濟西何大之也榖梁亦謂其不言戎之伐我以公之追之不使戎邇於我也于濟西者大之也何大焉為公之追之也愚謂二傳之言皆是也秋有􅈮正傳曰􅈮含沙射人者也書秋有􅈮紀災異也非徒異而且為災矣有者紀其有也榖梁又生一有一亡曰有之説胡氏又生􅈮者魯所無故以有書之之説皆惑也胡氏曰夫以含沙射人其為物至㣲矣魯人察之以聞于朝魯史異之以書于䇿何也山隂陸佃曰􅈮隂物也麋亦隂物也是時荘公上不能防閑其母下不能正其身陽淑消而隂慝長矣此惡氣之應其説是也然則簫韶作而鳯凰來儀春秋成而麟出於野何足怪乎春秋書物象之應欲人主之慎所感也世衰道㣲邪説作正論消小人長善類退天變動於上地變動於下禽獸将食人而不知懼也亦昧於仲尼之意矣愚謂既曰魯人聞之魯史書之則春秋真國人之報魯史之文聖人未或改之特竊取其義於此斷無疑矣冬十月正傳曰無事亦書義見于前恵王二年十有九年齊桓十一年晉獻二年衛恵二十五年蔡哀二十年鄭厲二十六年曹荘二十七年陳宣十八年杞共六年宋桓七年秦宣公元年楚文十五年卒春王正月正傳曰無事亦書義見于前夏四月正傳曰無事亦書義見于前秋公子結媵陳人之婦于鄄遂及齊侯宋公盟正傳曰結公子名媵者諸侯取一國則二國往媵之以姪娣遂者因事之名書公子結媵陳人之婦于鄄遂及齊侯宋公盟則其失禮之非自見矣夫禮不貳舉媵則媵盟則盟也今因媵而遂盟将盟而先媵二者皆失禮矣榖梁曰媵禮之輕者也盟國之重也以輕事遂乎國重無説其曰陳人之婦畧之也其不日數渝惡之也程子曰鄄之巨室嫁女於陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民乃以私事之小取怒大國故深罪之書其為媵而往盟為遂事夫人姜氏如莒正傳曰書夫人姜氏如莒譏如之非禮也榖梁曰婦人既嫁不踰竟踰竟非正也冬齊人宋人陳人伐我西鄙正傳曰鄙國之邉境也書齊人宋人陳人伐我西鄙著擅興陵暴之罪也程子曰齊桓始覇責魯不恭其事故來伐也愚謂魯雖不恭而齊不告于天王摟諸侯以伐之其罪均矣春秋書之義在責齊也而胡氏以謂責魯以失己失人以招禍者非也其曰鄙逺之稱人将卑師少義見前兹不贅惠王三年二十年齊桓十二年晉獻三年衛惠二十六年蔡穆侯肸元年鄭厲二十七年曹荘二十八年陳宣十九年杞共七年宋桓八年秦宣二年楚堵敖熊囏元年春王二月夫人姜氏如莒正傳曰屢書夫人姜氏如莒著其非禮之甚也禮婦人既嫁不踰境姜氏去年秋如莒今年再如焉破内外之防踰禮義之閑至是極矣胡氏曰十有五年夫人姜氏如齊至是再如莒而春秋書者禮義天下之大防也其禁亂之所由生猶坊止水之所自來也衛女嫁於諸侯父母終思歸寕而不得故泉水賦許穆夫人閔衛之亡思歸唁其兄而阻於義故載馳作聖人録於國風以訓後世使知男女之别自逺於禽獸也今夫人如齊以寜其父母而父母已終以寜其兄弟又義不得宗國猶爾而况如莒乎婦人從人者也夫死從子而荘公失子之道不能防閑其母禁亂之所由生故初㑹于禚次享于祝丘又次入齊師又次㑹于防于榖又次如齊又再如莒此以舊坊為無所用而廢之者也是以至此極觀春秋所書之法則知防閑之道矣夏齊大災正傳曰大災者非常之災人民不育也書齊大災紀鄰國之變有報則史書之聖人筆之而不削諸侯有恤鄰之道焉公羊以為書者及我非也秋七月正傳曰無事亦書義見于前冬齊人伐戎正傳曰書齊人伐戎著攘夷狄之義也張氏曰齊桓於是舉攘夷狄之兵戎在徐州之域最近齊魯故先伐之恵王四年二十有一年齊桓十三年晉獻四年衛恵二十七年蔡穆二年鄭厲二十八年卒曹荘二十九年陳宣二十年杞共八年宋桓九年秦宣三年楚堵敖二年春王正月正傳曰無事亦書義見于前夏五月辛酉鄭伯突卒正傳曰書鄭伯突卒鄰國之變有報則史書之也突復入櫟而簒諸侯容其兩與盟㑹故史以其舊爵紀之也豈亦有他義與之乎左氏曰二十一年春胥命于弭夏同伐王城鄭伯将王自圉門入虢叔自北門入殺王子頹及五大夫鄭伯享王于闕西辟樂備王與之武公之畧自虎牢以東原伯曰鄭伯效尤其亦将有咎五月鄭厲公卒愚謂此實録也其具時日月者史詳之耳無他義由是言之則他不書日月者何義之有秋七月戊戌夫人姜氏薨正傳曰書夫人姜氏薨著君母小君之大故也張氏曰文姜之行惡矣而卒以國君之母寵榮終身一用小君之禮此魯之禍所以未艾必至于荘公之終兩君弑哀姜慶父誅而後魯患始息也冬十有二月葬鄭厲公正傳曰書葬鄭厲公恤鄰國之大事也恵王五年二十有二年齊桓十四年晉獻五年衛恵二十八年蔡穆三年鄭文公㨗元年曹荘三十年陳宣二十一年杞恵公元年宋桓十年秦宣四年楚堵敖三年春王正月肆大𤯝正傳曰肆者縱放之之義𤯝者過誤所犯大𤯝者謂過誤而陷於大辟之類也其過誤而入大辟者縱放之所謂肆大𤯝也即舜典所謂𤯝災肆赦臯陶所謂宥過無大也公羊程胡皆以肆大𤯝為譏失刑政殊不知肆大罪不可也肆大𤯝正合舜臯陶之指何謂不可故書肆大𤯝紀仁政之一行也啖氏曰肆者放也𤯝者過也如今之赦爾公羊云忌𤯝有何義乎是也夫春秋之時濫殺無辜麋爛其民傷天地之大和至此慘極矣魯公獨能於過誤所犯之大者而肆赦焉則小者可知矣為得天地好生之徳絶無而僅有者故史書之聖人筆之於春秋其待衰世之志可見矣癸丑葬我小君文姜正傳曰邦君之妻邦人稱之曰小君稱小君者史氏之詞也公羊曰文姜者何荘公之母也愚謂書葬我小君文姜紀君母之大事也春秋有無褒貶此之類也安得謂字字句句而盡有褒貶乎胡氏曰文姜之行甚矣而用小君之禮其無譏乎以書夫人孫于齊不稱姜氏及書哀姜薨於夷齊人以歸攷之則譏小君無禮當謹之於始而後可正也文姜己歸為國君母臣子致送終之禮雖欲貶之不可得矣愚謂此言是也陳人殺其公子御㓂正傳曰謂之陳人者衆人也御㓂宣公之子左氏云陳人殺其太子御㓂則知其為君之嫡也而稱公子者未命為世子也書陳人殺公子御冦著殺逆之罪也或其君殺之或其大夫殺之或國人殺之則皆不可知也外事宜逺而畧也胡氏又有稱君稱國稱人之别泥矣又云攷於傳之所載以觀經之所斷則罪之輕重見矣愚謂攷傳以觀經乃治春秋之法即吾今之説也夏五月正傳曰無事亦書時月義見前秋七月丙申及齊高傒盟于防正傳曰髙傒齊之貴大夫也及者公及之也不言公公在其中矣以為諱之者非也書及齊高傒盟于防見盟之非也又與其大夫盟失禮之中又失禮矣冬公如齊納幣正傳曰書公如齊納幣著昏禮之非也榖梁曰禮有問名納采納徴告期公羊曰親納幣非禮也胡氏曰來議結昏娶仇人之女大惡也娶者其為吉下主乎已上主乎宗廟以為有人之心者宜於此焉變矣公親如齊納幣則不待貶也恵王六年二十有三年齊桓十五年晉獻六年衛恵二十九年蔡穆四年鄭文二年曹荘三十一年卒陳宣二十二年杞恵二年宋桓十一年秦宣五年楚成王頵元年春公至自齊正傳曰書公至自齊始終乎昏禮之非也書至告于廟也公羊以為危之非也書曰歸格于藝祖用特是也夫告廟必曰今已納幣聘娶齊某女夫齊侯親殺桓公者也世讎也桓公有知其心當何如耶荘公於是乎罪不可逃矣故曰始終乎昬禮之非也祭叔來聘正傳曰祭叔天子之大夫也書祭叔來聘著私交之非禮也人臣無外交榖梁子曰其不言使天子之内臣也不正其私交故不與使也愚謂盖王實未之使而私來耳夏公如齊觀社正傳曰觀社者觀齊之祀社也書公如齊觀社著非禮之舉也左傳曹劌諌曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有廵守以大習之非是君不舉矣君舉必書書而不法後嗣何觀胡氏曰齊棄太公之法而觀民於社君為是舉而往觀之非故業也天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也公至自齊正傳曰書公至自齊始終乎觀社之非禮也至者告廟也告廟必将曰某如齊觀社夫踰境觀社既非禮矣而齊又世讎也其可親乎是失禮之中又失禮焉也荆人來聘正傳曰人者内史稱之之詞非有褒貶也書荆人來聘紀荆楚禮中國之始也楚而禮中國則中國之春秋與人為善之義也胡氏又謂荆前皆以州舉者惡其猾夏不恭故荆之也至是來聘遂稱人者嘉其慕義自通故進之也然則又以稱人為美何耶盖但筆之於春秋而與進之義自見不在乎稱人之一字也公及齊侯遇于榖正傳曰榖梁云及者内為志焉爾遇者志相得也書公及齊侯遇于榖著荘公忘親與讎之罪也齊乃魯之世讎而自徃求昏而如齊觀社今又為榖之遇凡皆為昏設也其與讎忘親不孝之罪不可觧矣蕭叔朝公正傳曰蕭叔附庸小國之君未爵者也書蕭叔朝公著非禮之舉也公羊曰其言朝公何公在外也榖梁曰其不言來於外也朝于廟正也於外非正也胡氏曰為禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物蕭叔朝公在齊之榖則非其所也嘉禮不野合而朝公于外是委之於野矣故禮非其所君子有不受必反之于正而後止此亦春秋撥亂之意也秋丹桓宫楹正傳曰桓宫者桓公之廟也書秋丹桓公楹著非禮也榖梁子曰禮天子諸侯黝堊大夫倉士黈丹楹非禮也冬十有一月曹伯射姑卒正傳曰射姑曹伯名名之無他義書曹伯射姑卒紀鄰國之大故也有赴則史書之聖人筆而不削見恤鄰之義也十有二月甲寅公㑹齊侯盟于扈正傳曰書公㑹齊侯盟于扈則違禮要結之非自見矣胡氏謂程子曰遇于榖盟于扈皆為要結姻好也傳稱男子二十而冠冠而列丈夫三十而不娶則非禮矣然天子諸侯十五而冠者以娶必先冠而國不可乆無儲貳欲人君早有繼體故因以為節也鰥者老而無妻之稱舜方三十未娶而師錫帝堯己曰有鰥在下矣妻帝之二女則不告於父母以為告則不得娶而廢人之大倫堯亦不告而妻焉其欲及時而無過如此也今荘公生於桓公之六年至是三十有六載矣以世嫡之正諸侯之貴尚無内主同任社稷之事何也盖為文姜所制使必娶于母家而齊女待年未及故荘公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟之主而母言是聽不以大義裁之至於失時不孝甚矣春秋詳書于筞為後戒也春秋正傳巻九
