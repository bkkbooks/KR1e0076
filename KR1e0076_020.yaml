body:
  text: 春秋正傳卷二十明湛若水撰宣公定王五年七年晉成五年齊惠七年衞成三十三年蔡文十年鄭襄三年曹文十六年陳靈十二年杞桓三十五年宋文九年秦桓三年楚莊十二年春衞侯使孫良夫來盟正傳曰書衞侯使孫良夫來盟兩見其非義也夫大道之世上下以忠信相孚春秋之初盟則束牲載書而不㰱血明天子之禁耳自是而後無義盟矣葢盟者忠信之薄也左氏曰春衞孫桓子來盟始通且謀㑹晉也愚按此實傳也夫衞侯於魯非㑹盟之正而欲謀魯以㑹晉志在為晉而不為禮矣一非義也衞侯不親來盟而使其大夫與魯君盟非交際之正使其臣得以抗君矣二非義也故春秋直書而兩非義並見矣胡氏曰來盟為前定者嘗有約言矣未足効信而釋疑又相歃血固結之爾是盟衞欲為晉致魯而魯專事齊初未與晉通也必有疑焉而衞侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見矣夏公㑹齊侯伐萊正傳曰萊東方小國書公㑹齊侯伐萊著陵弱之師也萊未聞有可聲之罪而魯㑹齊以伐之是二國動無名之兵而徒恃衆以陵弱可知矣公至自伐萊正傳曰書公至自伐萊紀飲至反面告廟也其告廟則將何以致詞耶書之所以始終乎非義之舉葢再致其意焉者也大旱正傳曰書大旱紀國災也胡氏曰公與齊侯俱不務徳合黨連兵恃强凌弱軍旅之後必有㓙年言民以征役怨咨之氣感動天變而旱乾作矣其以大旱書者或不雩或雖雩而不雨也不雩則無恤民憂國之心雩而不雨格天之精意闕矣冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤正傳曰黑壤一名黄父晉地此本㑹而盟也書公㑹晉侯宋衞鄭曹于黑壤則魯公不自揣而赴㑹盟而其不得與盟之辱可考而知矣左氏曰鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免故黑壤之盟不書諱之也愚謂非諱之也公只與㑹而不與盟故但書㑹而不書盟實事也而其見止不與盟之辱自見矣胡氏曰㑹而不得見不以不得見為諱盟而不與盟不以不與盟為諱則曲不在公而主㑹盟者之罪耳與於㑹不與盟而公有歉焉非主㑹盟者之過也則書㑹不書盟若黑壤是也晉侯之立公既不朝又不使大夫聘而每歲適齊是宣公行有不慊於心而非晉人之咎矣凡不直者臣為君隱子為父隱於以養臣子愛敬之心而不事盟主又以賂免則不直在已矣定王六年八年晉成六年齊惠八年衞成三十四年蔡文十一年鄭襄四年曹文十七年陳靈十三年杞桓三十六年宋文十年秦桓四年楚莊十三年春公至自㑹正傳曰書公至自㑹見與㑹而不得盟紀危也公不自揣其不朝不聘於晉為負歉而于焉以赴㑹盟及㑹而不得與盟見止于㑹僅以賂免可謂辱矣今至而反面告廟則將何以為詞耶夏六月公子遂如齊至黄乃復正傳曰黄齊地書公子遂如齊至黄乃復譏無君也何謂無君無君命也不恭君命是無君也公羊曰其言至黄乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不返胡氏曰至黄乃復壅君命也有疾亦不復可乎大夫以君命出聞喪徐行而不返未致事而死以尸將事楚伐吳陳侯使公孫貞子往弔及良而卒將以尸入吳人辭焉上介芋尹蓋曰寡君使蓋備使弔君之下吏無祿使人逢天之慼大命隕墜絶世于良廢日供積一日遷次今君命逆使人曰無以尸造于門是我寡君之命委于草莽也無乃不可乎吳人不敢辭君子以為知禮其曰復事未畢也愚謂胡氏之言是也至謂乃者無其上之詞則鑿矣辛巳有事于大廟仲遂卒于垂正傳曰遂者公子遂也仲其字生以字而賜氏俾世其官宣公徳其殺惡及視而立已也書有事于大廟紀時祭也禮之常也書仲遂卒于垂紀大夫卒也事之變也而遂以殺逆之賊得以善終春秋感慨之情見矣若胡氏以生而賜氏為法之變而卒之非經義矣壬午猶繹萬入去籥正傳曰何以書見非禮也左氏曰有事于太廟襄仲卒而繹非禮也公羊曰萬入去籥何去其有聲者廢其無聲者存其心焉耳穀梁曰繹者祭之旦日之享賔也胡氏曰萬舞也以其無聲也故入而遂用籥笛也以其有聲也故去而不作是謂故知不可存其邪心而不能格也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠於宗廟不繹者全始終之恩於臣子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣春秋雖隆君抑臣而體貌有加焉則廉陛益尊而臣節礪後世法家專欲隆君而不得其道至以犬馬國人相視大倫滅矣聖人書法如此存君臣之大義也愚謂樂有歌有舞故歌之舞之以盡神萬入是有舞矣徒去籥無歌聲何足以見不樂乎故聞卿之喪猶繹非禮也萬入非禮也雖去籥亦非禮也戊子夫人嬴氏薨正傳曰書夫人嬴氏薨紀君母之大故而僣禮之非見矣敬嬴妾也嬖而僣稱夫人國人僣之史因而書之而其非禮自見胡氏曰敬嬴文公妾也何以稱夫人自成風聞季友之繇事友而屬其子及僖公得國立以為夫人於是乎嫡妾亂矣春秋於風氏凡始卒四貶之則禘于太廟秦人歸禭榮叔含賵召伯㑹𦵏去其姓氏不稱夫人王再書而無天是也愚謂胡氏以此以為貶成風矣至於敬嬴又書夫人稱氏與成風之書異詞不得其説則又更為從同無貶之説何耶夫既曰無貶矣則又何以見其非也大抵史因其僣而直書之其失自見矣晉師白狄伐秦正傳曰書晉師白狄伐秦著援結外兵之罪也左氏曰春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸絳市胡氏曰晉主夏盟紏合諸侯扶大義安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責已可也既不知自反釋怨修睦以補前過已可咎矣乃復興師動衆㑹戎狄以伐之獨不惡傷其類乎直書于策貶自見矣楚人滅舒蓼正傳曰書楚人滅舒蓼見荆蠻之強暴也左氏曰楚為衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟吳越而還胡氏曰按詩稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與焉然春秋書而不削者是時楚人疆舒蓼及滑汭盟吳越勢益强大將為山東憂而民有被髪左袵之患矣經斯世者當以為懼有攘却之謀而不可忽則聖人之意也秋七月甲子日有食之旣正傳曰書日有食之旣紀天變也遇變修省所以應天也冬十月己丑葬我小君敬嬴正傳曰書葬我小君敬嬴紀君母之大事也而非禮見矣夫邦君之妻稱曰小君敬嬴妾也而稱焉則僣禮矣因葬而書聖人正名之義見矣夫婦君臣嫡妾上下人之大倫也今其僣亂人情化之國人稱之國史稱之因以為固然世變可知矣胡氏四貶成風之説而敬嬴無貶詞又有不同則又何足以取於義例也惟稱因僣號直書其義自見之説為的當而不費其詞矣雨不克葬庚寅日中而克正傳曰何以書紀異也使人循其事而求其生平之邪惡不可掩矣左氏曰雨不克葬禮也禮卜葬先逺日辟不懷也胡氏曰敬嬴以其子宣公屬諸襄仲殺太子及其母弟雖假手於仲實敬嬴之謀也經書子赤卒夫人姜氏歸于齊其文無貶而讀者有傷切之意焉則以秉彛不可滅也傳謂哭而過市市人皆哭敬嬴逆天理拂人心之狀慘矣其於終事雨不克葬著咎徵焉而謂無天理乎此皆直書以見人心與天理之不可誣者也夫喪事即逺有進無退浴于中霤飯于牖下小斂于戸内大斂于阼階殯于客位遷于廟祖于庭塴于墓以弔賓則其退有節以虞事則其祭有時不為雨止禮也雨不克葬喪不以制也或曰卜葬先逺日所以避不懷也諸侯相朝與旅見天子入門而雨霑服失容則廢矧送終大事人情所不忍遽者反可冒雨不待成禮而葬乎潦車載蓑笠士喪禮也有國家者乃不能為雨備何也且公庭之於墓次其禮意固不同矣不得不可以為悦無財不可以為悦得之為有財古之人皆用焉而不能為之備是儉其親也不亦薄乎故穀梁子曰雨不克葬喪不以制也厚葬古人之所戒而墨之治喪也以薄又君子之所不與故喪事以制春秋之㫖也城平陽正傳曰書城平陽重興作也左氏曰書時也楚師伐陳正傳曰書楚師伐陳紀猾夏也左氏曰陳及晉平楚師伐陳取成而還定王七年九年晉成七年卒齊惠公九年衞成三十五年卒蔡文十二年鄭襄五年曹文十八年陳靈十四年杞桓三十七年宋文十一年秦桓五年楚莊十四年春王正月公如齊正傳曰書春王正月公如齊謹君之出也然以時月考之則其忘親之罪著矣孫氏曰公有母喪而逺朝强齊無哀甚矣夫公即位九年未嘗朝周是忘君也以喪朝齊是忘親也上忘君下忘親宣公之惡不可掩矣公至自齊正傳曰書公至自齊始終乎非義之出也夏仲孫蔑如京師正傳曰書仲孫蔑如京師則其如之善否可考矣左氏曰春王使來徵聘夏孟獻子聘于周王以為有禮厚賂之愚謂此實傳也公使蔑聘于周似矣然必待王使來徵聘而後往敬君之心何在耶周王不能致其自來聘而必使來徵之又厚賄之御臣之禮何在耶皆非禮矣胡氏曰當歳首月公朝于齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見者也宣公享國九年於周纔一往聘其在齊則又再朝矣經於如齊每行必致深罪之也下逮戰國周衰甚矣齊威王往朝于周而天下皆賢之況春秋時乎而宣公不能也故聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣此經書君如齊臣如周之意而特書春王正月以表之也齊侯伐萊正傳曰書齊侯伐萊紀陵弱之兵也秋取根牟正傳曰根牟者公羊以為邾婁之邑也書取根牟則公忘哀貪殘之罪可見矣母喪未畢爰及干戈春如齊秋取根牟蓋其貪心勝良心喪而哀戚忘也八月滕子卒正傳曰書滕子卒紀與國之大故也餘見前九月晉侯宋公衞侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳正傳曰何以書先言㑹而後言伐見陳不㑹然後以諸侯之師伐之近於義也胡氏曰按左氏討不睦也陳侯不㑹荀林父以諸侯之師伐陳晉侯卒乃還則知經所書者與晉罪陳之詞也㑹于扈以待陳而陳侯不㑹然後林父以諸侯之師伐之也則幾於自反而有禮矣不書諸侯之師而曰林父帥師者在㑹諸侯皆以師聽命而林父兼將之也則其衆輯矣晉主夏盟又嘗救陳所宜與也而惟楚之即夫豈義乎辛酉晉侯黑臀卒于扈正傳曰扈晉邑也書晉侯卒于扈紀盟主之大故也且見異也左氏曰㑹于扈討不睦也陳侯不㑹晉荀林父以諸侯之師伐陳晉侯卒于扈乃還冬十月癸酉衞侯鄭卒正傳曰鄭衞侯名書衞侯鄭卒紀鄰國之大故也餘見前胡氏曰晉成公何以不葬魯不㑹也衞成公何以不葬亦魯不㑹也衞成事晉甚謹而魯宣公獨深向齊衞欲為晉致魯故謀黑壤之㑹而特使孫良夫來盟以定之也及㑹于黑壤而晉人止公賂然後免是以扈之㑹皆前日諸侯而魯獨不往二國繼以喪赴亦皆不㑹此所謂無其事而闕其文者也或曰二君皆有貶焉故不書葬誤矣魯人不㑹亦無貶乎書卒而以私怨廢禮忘親其罪已見春秋文簡而直視人若日月之無私照也曲生意義失之逺矣宋人圍滕正傳曰書宋人圍滕譏伐喪也故左氏曰圍其喪也胡氏曰滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比事以觀知見貶之罪在不仁矣楚子伐鄭晉郤缺帥師救鄭正傳曰書楚子伐鄭晉救鄭見晉攘楚安鄭之義也左氏曰楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣愚謂鄭公子歸生負弑逆之罪楚伐之晉宜不救矣然而中國諸侯不能興師致討而聽夷狄伐之可乎而楚亦未嘗倡問罪之義也春秋重内外之辨故書晉之救鄭以與之也詩曰兄弟鬩于牆外禦其侮此内外之大義也陳殺其大夫洩冶正傳曰洩冶大夫名名之無他義書陳殺其大夫洩冶則陳國君臣擅殺之罪自見矣左氏曰陳靈公與孔寧儀行父通於夏姬皆衷其袒服以戲於朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎胡氏乃謂稱其大夫則不失官守而殺之者有專殺之罪又謂洩冶無罪而書名者以其盡心無隱不能潔身而去不食其禄則又鑿於一字之文矣定王八年十年晉景公獳元年齊惠十年卒衛穆公速元年蔡文十三年鄭襄六年曹文十九年陳靈十五年弑杞桓三十八年宋文十二年秦桓六年楚莊十五年春公如齊公至自齊正傳曰書公如齊公至自齊則輕身以忘祖畏强而忘君之非自見矣公至是四朝齊而不一朝周是忘君也非時越境而不思社稷宗廟之危是忘祖也忘祖者不孝忘君者不仁宣公負罪於天下匪特篡殺之大惡而已也此如齊致其至而不書日上九年如齊致其至而書月者史有詳畧耳胡氏乃以為是年夏使仲孫蔑如京師故特於歲首書王正月以著宣公之罪則恐非春秋之大㫖也齊人歸我濟西田正傳曰歸反也我者魯史自謂魯也以為濟西魯之本封及親之之詞皆非也書齊人歸我濟西田見公以親眤所致而非以威徳致之也左氏曰齊侯以我服故歸濟西之田愚故曰以親眤之所致也程子曰齊魯修好故歸魯田田魯有也齊非義取之故云歸我不足為善也胡氏曰宣公於齊順其所欲旣以女妻其臣又以兵㑹伐萊之舉又每歲往朝於齊廷雖諸侯事天子無是禮也故惠公悦其能順事已而以所取濟西田歸之也或謂濟西魯之本封故書我則誤矣以柔巽卑屈事人不以其道而得地與悦人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣夏四月丙辰日有食之正傳曰書日有食之紀天變以為警戒也已已齊侯元卒正傳曰元齊侯名書齊侯元卒紀與國之大故也餘見前齊崔氏出奔衞正傳曰崔氏崔杼也書齊崔氏出奔衞使人考其奔之故而弑逆之端可辨矣胡氏曰書崔氏以族奔也公羊以為譏世卿者非也按左傳齊惠公卒崔杼有寵於惠公髙國畏其逼也公卒而逐之奔衞由是觀之是其所以奔者以其彊而逼也許翰謂崔杼出而能反反而能弑者以其宗彊於此舉氏辨之早也由是觀之是其所以能反而行弑者亦以其彊也公如齊正傳曰書公如齊左氏以為奔喪也宣公於天王不一朝而四朝齊又奔喪焉禮過於天子矣春秋非之意可見矣五月公至自齊正傳曰書公至自齊君之出入必書禮也而其得失於此乎見矣胡氏曰文約而事詳者經也春如齊朝惠公夏如齊奔其喪若是雖不致可也而皆致者甚之也天王之喪不奔欲行郊禮而汲汲於奔齊惠公之喪天王之塟不㑹使微者往而公孫歸父㑹齊惠公之塟其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺聖人之情見矣癸巳陳夏徵舒弑其君平國正傳曰書陳夏徴舒弑其君平國誅弑逆之賊也此若於陳侯無罪也然而使人考其跡則致之者陳侯矣焉得無罪左氏曰陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之二子奔楚愚謂此實傳也觀於此則徴舒因怨而弑君靈公君臣縱淫而自取皆可見矣愚故曰經如標題傳如案卷孟子曰其文則史孔子曰其義則丘竊取之矣六月宋師伐滕正傳曰書宋師伐滕則私忿之師可見矣左氏曰滕人恃晉而不事宋六月宋師伐滕觀此則滕别無可聲之罪惟以其不事已耳是謂私忿之師矣胡氏曰宋大國爵上公霸主之餘業力非不足也今鄰有弑逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃已徳猶有所闕而滕何尤焉此説是矣至謂前圍滕稱人譏伐喪此伐滕稱師譏用衆則非經之大指矣設使圍不稱人伐不稱師則二者宋得為義舉伯討乎公孫歸父如齊葬齊惠公正傳曰書公孫歸父如齊塟齊惠公而其得失可考而知矣夫歸父逆遂之子齊侯定公之位皆公黨也諸侯㑹塟之禮是也不於他而於齊則出於私意似禮而非矣胡氏曰歸父仲遂之子貴而有寵宣公深徳齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱沒則親往奔喪而使貴卿㑹其塟亦不顧天王之禮闕然莫之供也比事考辭義自見矣晉人宋人衞人曹人伐鄭正傳曰書晉與諸侯之兵伐鄭紀貪忿之師也左氏曰鄭及楚平諸侯之師伐鄭取成而還由是觀之其謂鄭及楚平諸侯伐之則所謂忿兵也其謂取成而還則所謂貪兵也皆考傳而知其非也諸儒謂春秋一字見褒貶者於此一節又將以何字見之乎胡氏曰鄭居大國之間從於彊令豈其罪乎不能以徳鎮撫而用力爭之是謂五十步笑百歩庸何愈於楚自是責楚益輕罪在晉矣秋天王使王季子來聘正傳曰書天王使王季子來聘則其非禮見矣左氏曰劉康公來報聘公羊曰王季子者何天子之大夫也其稱王季子何貴也其貴柰何母弟也愚謂諸侯來朝于天子於是天子有使大夫時聘焉禮也宣公未嘗親朝于周周來徴聘乃使大夫一往焉周遂以為徳而報聘之又使母弟之貴而重之報戾其施是謂非禮矣胡氏曰王有時聘以結諸侯之好禮也宣公享國至是十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不震矣自是王聘春秋亦不書矣公孫歸父帥師伐邾取繹正傳曰繹邾邑書公孫歸父帥師伐邾取繹紀貪暴之兵也胡氏曰用貴卿為主將舉大衆出征伐不施於亂臣賊子奉天討罪而陵弱侵小近在邦域之中附庸之國是為盜也當此時陳有弑君之亂旣來赴告藏在諸侯之策矣魯不是圖而有事於邾不亦傎乎故魯人伐邾特書取繹以罪之也愚謂不書伐邾無以見其暴不書取繹無以見其貪大水正傳曰大水見前書大水紀災異也季孫行父如齊正傳曰書季孫行父如齊非其如也魯之事齊可謂勤矣葢魯侯負篡弑之罪畏齊之討而為之非禮甚矣冬公孫歸父如齊正傳曰書冬公孫歸父如齊使人考傳而其非義見矣左氏曰冬子家如齊伐邾故也觀此則歸父自知其伐邾取繹之非而有歉于齊故往齊告之也胡氏曰按左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿㑹塟矣若待逾年然後脩聘未晩也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄説取人可以免於討也歸父貪於取繹畏齊而往蓋理屈則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也齊侯使國佐來聘正傳曰書齊侯使國佐來聘則其非禮可得而知矣左氏曰國武子來報聘愚謂報聘者報季孫行父之聘非正聘也齊侯之喪未逾年而行聘焉是忘哀也報聘之禮小忘哀之罪大胡氏曰塟之速也太不懷也又未逾年而以君命遣使聘于隣國則哀戚之情忘矣孟子曰養生不足以當大事惟送死可以當大事滕文公五月居廬未有命戒及至塟顔色之戚哭泣之哀弔者大悦而有願為其氓者蓋禮義人心之所同然也齊頃公嗣位之初舉動如此喪師失地幾見執獲豈特婦人笑客之罪哉己失守身之本矣饑正傳曰書饑重民食也民以食為天君以民為天楚子伐鄭正傳曰再書楚子伐鄭重見其猾夏之罪也左氏曰楚子伐鄭晉士㑹救鄭逐楚師于頴北諸侯之師戍鄭觀此則楚之猾夏晉與諸侯之攘楚可知矣定王九年十有一年晉景二年齊頃公無野元年衞穆二年蔡文十四年鄭襄七年曹文二十年陳成公午元年杞桓三十九年宋文十三年秦桓七年楚莊十六年春王正月正傳曰無事亦書時月義見于前夏楚子陳侯鄭伯盟于辰陵正傳曰書楚子陳侯鄭伯盟于辰陵紀中國之服楚也愚按左氏春楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏盟于辰陵陳鄭服也觀此則陳鄭之服楚可知而晉霸之衰之甚著矣胡氏曰晉楚爭此二國為日久矣今陳鄭背晉從楚盟于辰陵而春秋書之無貶詞者豈與其下喬木入幽谷乎中國不能令則夷狄進矣經之大法在誅亂臣討賊子有亂臣則無君有賊子則無父無父無君即天理無復少存人類殄為禽獸雖得天下不能一朝居也今魯與齊方用兵伐莒晉與狄方㑹于攅圅而不謀少西氏之逆也而楚人能謀之所謂禮失而求之野不以其為荆蠻之君而外之也辰陵之盟所以得書於經而無貶乎聖人討賊之意可謂深切著明矣愚謂春秋只直書之則其惡不待貶詞而自見矣不能誅亂賊罪中國可也以與夷狄可乎公孫歸父㑹齊人伐莒正傳曰書㑹齊人伐莒紀陵弱之罪也秋晉侯㑹狄于攅函正傳曰書晉侯㑹狄于攅函亂内外之辨也左氏曰晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉秋㑹于攅函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤況寡徳乎愚謂内外之大限如天地冠履之森嚴而不可混焉者也觀左氏之言乃晉求成于狄非狄心服于晉也冠履之分其能無自貶損矣乎胡氏曰春秋正法不與夷狄㑹同分類也書㑹戎㑹狄㑹吳皆外詞也内中國故詳外四夷故畧今中國有亂天王不能討則方伯之責也又不能討則四鄰諸侯宜有請矣而魯方㑹齊伐莒晉方求成于狄是失肩背而養其一指不能三年而緦小功之察不亦傎乎凡此直書其事不待貶絶而義自見者也愚謂胡氏此言是矣但所謂書㑹戎㑹狄㑹吳皆外詞則又非直書見義之指矣冬十月楚人殺陳夏徴舒正傳曰書楚人殺陳夏徴舒則其誅賊之義專殺之罪皆可見矣徴舒弑君之賊人人得而誅之誅之則善也何以為專殺曰天子之禁無專殺大夫宜執之以歸周正刑於司冦可也丁亥楚子入陳正傳曰書楚子入陳紀貪兵也前殺徴舒專殺也然猶曰誅弑逆之賊猶可言也至於因而入陳陳之人民何罪焉不可言也故春秋書其入以著其罪見其為夷狄之道也榖梁曰不使夷狄為中國也或以入為内弗受則鑿矣胡氏曰討其賊為義取其國為貪舜跖之相去逺矣其分乃在於善與利耳楚莊以義討賊勇於為善舜之徒也以貪取國急於為利跖之徒矣為善與惡特在一念須臾之間而書法如此故春秋傳心之要典不可以不察者也或曰聖人大改過楚雖縣陳能聽申叔時之説而復封陳可謂能改過矣猶書入陳以貶之何也曰楚莊意在滅陳雖復封之然鄉取一人焉以歸謂之夏州而又納其亂臣是制人之上下使不得其君臣之道也晉人以幣如鄭問駟乞之立故子産對曰若寡君之二三臣而晉大夫專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舎之他國非所當與也而必欲納其亂臣存亡興滅其若是乎仲尼重傷中國深美其有討賊之功故特從末減不稱取陳而書入雖曰與之可矣愚謂楚莊意在取陳而不在於討徴舒也特假討賊為名耳義利之間不可以毫髪並立者也胡氏與其討賊之義而非其取陳之利誤矣納公孫寧儀行父于陳正傳曰納者楚子強納之也書納公孫寧儀行父于陳著其黨惡之罪也愚於此有以見楚子無討賊之志矣夫二人者實陳之首亂基禍者也其惡莫大焉今楚子納之于陳則前之殺徴舒者意在取陳也左氏曰冬楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳鄉取一人焉以歸謂之夏州故書曰楚子入陳納公孫寧儀行父于陳書有禮也愚謂觀此則知前之殺徴舒者意在取陳而不在於討賊也納亂賊之人焉得為有禮程子曰致亂之臣國所不容也故書納胡氏曰此二臣者從君於昏宣淫於朝誅殺諫臣使其君見弑蓋致亂之臣也肆諸市朝與衆同棄然後快於人心今乃詭辭奔楚託於討賊復讎以自脱其罪而楚莊不能察其反復又使陳人用之是猶人有飲毒而死者幸而復生又彊以毒飲之可乎為楚莊者宜柰何瀦徴舒之宫封洩冶之墓尸孔寧儀行父于朝謀於陳衆定其君而去其庶幾乎愚謂此言是矣但謂納者不受而強納之則固矣春秋正傳卷二十
