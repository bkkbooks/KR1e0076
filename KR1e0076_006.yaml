body:
  text: 春秋正傳卷六明湛若水撰桓公桓王十九年十有一年齊僖三十年晉緡四年衛宣十八年蔡桓十四年鄭莊四十三年卒曹莊公射姑元年陳厲六年杞靖三年宋荘九年秦出子三年楚武四十年春正月齊人衛人鄭人盟于惡曹正傳曰書齊人衛人鄭人盟于惡曹著其盟之非也春秋無善盟盟者忠信之薄諸侯不以忠信相諭而殺牲㰱血以相盟已不正矣况三國所盟乃結黨謀魯同惡相濟逞其私忿而不知聲罪討賊之義乎胡氏曰惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟是矣又曰前書其爵而以來戰著罪後書此盟而以奪爵示貶愚謂或人或爵史之文耳聖人之取義固不區區在是且此盟既曰人之以示貶則上無故加兵戰于郎者不去其爵何耶是不能充其𩔖也且十年書春王正月既以十数之盈桓惡宜見誅扵天人矣故書王紀常理也而此十一年又書春正月而不書王者又何耶是徒知立説以求通而不能充其𩔖之疚也夏五月癸未鄭伯寤生卒正傳曰寤生鄭伯名即莊公也書鄭伯寤生卒紀隣國之大變也諸侯有故則赴赴則必名而史必書之聖人存之而弗去著恤隣之大義耳别無他意由是則諸儒紛紛執文以穿鑿者觀此可悟矣左氏曰夏鄭莊公卒初祭封人仲足有寵扵莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之愚謂此經之本傳也胡氏又曰鄭莊公志殺其弟使餬其口扵四方自以為保國之計得也然身没未幾而世嫡出奔庻孽奪正公子五爭兵革不息忽儀亹突之際其禍㦧矣亂之初生也起扵一念之不善後世則而𧰼之至扵兄弟相殘國内大亂民思保其室家而不得不亦酷乎有國者所以必循天理而不可以私欲㓕之也莊公之事可以為永鑒矣愚謂此又經外之意也秋七月葬鄭莊公正傳曰莊公卒至是三月耳書𦵏鄭莊公鄭來赴故國史書之聖人存而不去而諸侯會𦵏之義鄭昭速葬之非皆可見矣九月宋人執鄭祭仲正傳曰書宋人執鄭祭仲紀隣國之變也而執者與見執者之罪并見矣左氏曰宋雍氏女于鄭莊公曰雍姞生厲公即突雍氏宗有寵扵宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之愚謂據此則宋公以諸侯之尊為詭賊以脅人祭仲以國相為弑逐以從賊其罪自不可掩矣不在乎泥一字以為貶罪也榖梁乃以人宋公為貶公羊以不名祭仲為出忽立突為逹權之賢胡氏又以不名祭仲以命大夫稱貴卿以大其罪諸皆紛然議論雜乎其間而後聖經取義之大指隐矣突歸于鄭正傳曰突厲公名書突歸于鄭則不當歸而歸不當立而立之義見矣左氏曰厲公立則祭仲以之歸而立之也公羊曰突何以名挈乎祭仲也其言歸何順祭仲也榖梁曰死君難臣道也今立惡而黜正惡祭仲也愚謂據此則突為邪謀所擁立之不正其義自見不必如程胡所言不稱公子不稱鄭突稱歸有易詞順詞之别然後可誅而絶之以正其罪也觀春秋者不必泥一字之文而惟求竊取之義盖執字則他或不𩔖而難通求義則無所徃而不通鄭忽出奔衛正傳曰忽昭公名書鄭忽出奔衛著鄭君臣之不道也鄭忽為祭仲所逐忽不能修道以自立仲為宋所脅而逐君所謂無道之甚者也其名忽者公羊曰忽何以名春秋伯子男一也辭無所貶愚謂據此則禮之當名史之常稱耳榖梁以為其名失國也胡氏又謂忽以國氏正也出奔而名不能君也又謂其世嫡之正至扵見逐不能立乎位責之誠是也聖人取義恐不在乎鄭與忽之二字耳柔會宋公陳侯蔡叔盟于折正傳曰柔魯大夫未命未賜族者蔡叔蔡侯之兄弟稱字折地名書柔會宋公陳侯蔡叔盟于折著會盟之非禮也非會同之正而會且不可况又盟乎又况臣與君盟乎故書以著其非公會宋公于夫鍾冬十有二月公會宋公于闞正傳曰夫鍾郕地闞魯地書公會宋公于夫鍾又書公會宋公于闞著数會之非也上柔折之盟夫鍾之會皆秋九月也闞之會冬十二月也四月之間會盟者三焉夫一盟一會猶且示人以疑况四月而至三乎胡氏曰臣與宋公盟于折君與宋公會于夫鍾于闞于虗于龜皆存而不削何其詞費也曰盟者春秋所惡屢盟以長亂會者諸侯所不得而数會以厚疑聖人皆存而不削於以見屢盟而卒叛数會而卒離其事可謂著明矣是故春秋之志在扵天下為公講信修睦不以會盟為可恃也愚謂此言皆是矣至扵謂聖人皆存而不削益可見春秋為魯史之文而無疑矣桓王二十年十有二年齊僖三十一年晋緡五年衛宣十九年卒蔡桓十五年鄭厲公突元年曺荘二年陳厲七年卒杞靖四年宋荘十年秦出子四年楚武四十一年春正月正傳曰書時月義見前正月不言王者史之省文耳非有他義夏六月壬寅公會杞侯莒子盟于曲池正傳曰曲池魯地杞當作紀書夏六月壬寅公會杞侯莒子盟于曲池著私㑹隂謀之非禮也左氏曰平杞莒也程子曰隐二年紀莒盟于宻是時紀謀齊難故魯桓與之盟莒以援之耳愚謂此之謂隂謀也非諸侯會同之正禮而為隂謀以相會是之謂私會紀謀齊難不能自逹扵天子為魯桓者當為之請于天子明下禁令各守封疆而齊不服從王命則當告于天子會于連帥而伐之何為會之紛紛而無益扵救紀也故春秋書之以著其非秋七月丁亥公會宋公燕人于穀丘正傳曰燕人南燕大夫榖丘宋地書穀丘之會著非禮也八月壬辰陳侯躍卒正傳曰躍陳侯名書名國史之文無他義書卒著隣國之大變有赴則書也公會宋公于虚冬十有一月公會宋公于龜正傳曰虛龜皆宋地名會于虗秋八月也會于龜冬十一月也並書之著数會之非禮也左氏曰公欲平宋鄭秋公及宋公盟于句瀆之丘宋成未可知也故又會于虗冬又會于龜愚謂會同之禮聖人有定制又有定期魯桓之扵宋不踰時而扵穀丘于虗于龜凡三會焉其瀆禮輕舉如此宜乎人之見疑而反辭平以踈之也丙戌公會鄭伯盟于武父正傳曰武父鄭地書公會鄭伯盟于武父著其盟之非也左氏曰宋公辭平故與鄭伯盟于武父張氏曰公自龜還遽會鄭伯而謀伐之愚謂苟以忠信相結何假乎盟盟煩信瀆長亂之端也丙戌衛侯晋卒正傳曰晋衛侯名書丙戌衛侯晋卒紀隣國之大變也赴報則史書之再書丙戌者諸侯之卒隣國之大變不可不詳也十有二月及鄭師伐宋丁未戰于宋正傳曰及者魯及之也書十有二月及鄭師伐宋丁未戰于宋著擅興報怨之罪也魯桓屢盟會于宋是失己也及宋不信而會鄭以伐之是又不知反已也桓之惡扵是乎大矣左氏曰遂帥師以伐宋戰焉宋無信也君子曰苟信不繼盟無益也詩云君子屢盟亂是用長無信也胡氏曰既書伐宋又書戰于宋者責賂于鄭而無厭屢盟于魯而無信者宋也二國聲其罪以致討故書曰伐夫宋之罪則固可伐矣然取其賂以立督者魯桓也資其力以簒國者鄭突也無諸已然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰于宋來戰者罪在彼戰于郎是也往戰者罪在内戰于宋是也愚謂公榖又皆有言伐不言敗為避嫌内諱之說盖所謂言賾而可惡者矣桓王二十一年十有三年齊僖三十二年晋緡六年衛惠公朔元年蔡桓十六年鄭厲二年曹莊三年陳莊公林元年杞靖五年宋莊十一年秦出子五年楚武四十二年春二月公㑹紀侯鄭伯已巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績正傳曰書二月公會紀侯鄭伯者著紀鄭始謀報齊宋之怨來會魯故魯會之也書己巳及齊侯宋公衛侯燕人戰者及猶與也魯以紀鄭與齊宋衛燕四國之兵戰也戰之地不可考榖胡皆以為扵紀者以紀為怨主國小懼亡不暇逺戰然亦意度之詞耳書齊宋衛燕四國之兵敗績者見紀鄭魯之幸勝未必非敗禍之原也此三者何以書著其擅興搆怨之罪也其餘左氏不書所戰後也之説公羊内不言戰此從外也之説何以不地近也之説胡氏又言左氏以為鄭與宋戰公羊以為宋與魯戰榖梁以為紀與齊戰之說而述趙匡考據經文内兵則以紀為主而先於鄭外兵則以齊為主而先扵宋之説諸皆以己意度聖經執泥文義而為之詞耳然則扵紀鄭齊宋衛則爵之扵燕則人之者又何説耶豈亦有褒貶耶故愚嘗謂春秋之不眀諸儒亂之也三月葬衛宣公正傳曰書三月葬衛宣公紀隣國之重事來報則書之也其不書卒者或不報或史逸其文耳他無褒貶胡氏又曰𦵏自内録也既與衛人戰曷為𦵏宣公怨不棄義怒不廢禮是知古人以葬為重也禮䘮在殯孤無外衛宣未葬朔乃即戎己為失禮又不稱子是以吉服從金革之事其為惡大矣凡此𩔖據事直書年月具存而惡自見矣愚謂此經外之意也夏大水正傳曰書夏大水紀異也大水隂盛之𧰼也夫水隂之𧰼也惡之𧰼也小人之𧰼也臣下之𧰼也夷狄之𧰼也妻妾之𧰼也人君扵此可以儆省矣秋七月冬十月正傳曰書秋七月冬十月具時月以待紀事史之法也桓王二十二年十有四年齊僖三十三年卒晋緡七年衛惠二年蔡桓十七年鄭厲三年曹莊四年陳莊二年杞靖六年宋莊十二年秦出子六年楚武四十三年春正月公會鄭伯于曹正傳曰書春正月公會鄭伯于曹著㑹之非禮也何為非禮非會同之正而以隂謀齊衛而㑹成之扵私也左氏曰春㑹于曹曹人致餼禮也臨川呉氏曰前年魯鄭同謀救紀而敗齊衛之師盖虞齊衛之報怨也故為會以謀之曹素與魯協故會扵其地是也無氷正傳曰春正月書無氷左氏以為記異是也榖梁曰時燠也胡氏曰按豳風七月周公陳王業之詩也其詞曰二之日鑿氷冲冲三之日納于凌隂四之日其蚤獻羔祭韭周官凌人之職頒氷扵夏其蔵之也固隂沍寒於是乎取其出之也賔食䘮祭扵是乎用蔵之周用之徧亦理隂陽天地之一事也今在仲冬之月燠而無氷則政治縱弛不明之所致也故書于䇿夫春秋所載皆經邦大訓而書法若此其察扵四時寒暑之變詳矣愚謂天人一氣也故古之君相其道在燮理隂陽位天地而育萬物丙吉不問闘傷而問牛喘盖有以識此矣此春秋所以謹而書之且書無氷扵春正月之下則是周以子為春正月以此見所謂正朔改而月數不改之説為非也胡氏扵此尚不悟何也夏五正傳曰夏五者何史之闕文也史之舊文而所書不改疑以傳疑之心可見矣榖梁以為夏五者傳疑也是矣胡氏曰疑而不益見聖人之慎也故其自言曰吾猶及史之闕文也其語人曰多聞闕疑慎言其餘則寡尤而世或以私意改易古書者有矣盍亦視此為鑒可也然則春秋何以謂之作曰其義則斷自聖心或筆或削明聖人之大用其事則因舊史有可損而不能益也愚謂筆而存之乃所謂作也所謂筆者存而書之也所謂削者去之而不存也存而書之而義自見聖人扵史舊文無損無益故曰其文則史其義則丘竊取之也若云可損舊史則非史之文矣後儒以一字而取義者盍亦觀此夏五之闕文而有悟乎或曰此春秋成後而傳者闕之若聖人闕之則扵何取義乎亦通鄭伯使其弟語來盟正傳曰書鄭伯使其弟語來盟著尋盟之非也以忠信相結人猶恐渝之况盟乎又况尋盟乎語者其弟名也左氏曰鄭子人來尋盟且修曹之㑹此其實傳也是取義止扵譏尋盟耳榖梁又有諸侯尊弟不得以屬通稱弟云者以其來我舉其貴者之説又有非前定之盟不日之說程胡二子皆從之胡氏又曰諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也愚謂是皆泥文之過矣秋八月壬申御廩災正傳曰書御廪災紀災也公羊曰御廪者何粢盛委積之所蔵也御廪災何以書記災也胡氏曰門觀災而新作則書御廪粢盛之所蔵其新必矣何以不書營宫室以宗廟為先重本也御廩災而新則不書常事也以為常事而不書垂教之意深矣知其説者然後知有國之急務為政之後先雖勤於工築而民不怨勞與妄興土木困民力以自奉者異矣愚謂此亦經外之意也乙亥嘗正傳曰書乙亥嘗紀國之大事也史君舉必書况祀國之大事乎如八年春正月之烝為無失而亦書者是已而謂常事不書可乎嘗秋祭也周以八月嘗於禮無失胡氏以為不時則以夏之正朔言之矣公穀胡氏皆以為譏其嘗於未易災之餘然以左氏書不害也之言而觀之則或災於此所而他所安知其不有不害者乎冬十有二月丁巳齊侯禄父卒正傳曰書齊侯禄父卒隣國之大變有赴則書之義也餘義見前宋人以齊人蔡人衛人陳人伐鄭正傳曰書宋人以齊人蔡人衞人陳人伐鄭著其擅興專伐之罪也天子討而不伐諸侯伐而不討諸侯奉天子之討以伐有罪者也今宋以私忿討鄭以四國之兵伐之其得罪扵王法甚矣故春秋書之左氏曰宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸爲盧門之椽胡氏曰宋怨鄭突之背己故以四國伐鄭魯怨齊人之侵己故以楚師伐齊蔡怨囊瓦之拘己故以呉子伐楚蔡弱扵呉魯弱扵楚宋與蔡衛陳敵而弱扵齊乃用其師以行己意故特書曰以列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也愚謂此說是矣然又稱榖梁以者不以者也之説則鑿矣桓王二十三年崩十有五年齊襄公諸見元年晋緡八年衛惠三年蔡桓十八年鄭厲四年曹荘五年陳莊三年杞靖七年宋莊十三年秦武公元年楚武四十四年春二月天王使家父來求車正傳曰書天王使家父來求車見周王之無道也文王以庻邦惟正之供上有常用下有常貢故上無過求而下無失職也况車服者王者所用以庸有功勵臣下者也而以天王之尊反下求扵諸侯乎諸侯朝貢之不入有由然矣左氏曰非禮也諸侯不貢車服天子不私求財公羊曰王者無求求車非禮也胡氏曰遣使需索之謂求王畿千里租稅所入足以充費不至扵有求四方諸侯各有職貢不至扵來求以䘮事而求貨財已為不可况車服乎經扵求賵求車求金皆書曰求埀後戒也夫上有好者下必有甚焉者矣王者有求下觀而化諸侯必將有求以利其國大夫必將有求以利其家士庶人必將有求以利其身皇皇焉唯恐不足未至扵篡弑奪攘則不厭矣古之君人者必昭儉徳以臨百官尊卑登䧏各有度数示等威明貴賤民志既定之後皆安其分而無求兵刑寢矣及侈心一動莫為防制必至扵亢不𠂻官失徳亷耻道䘮寵賂日章淪扵危亡而後止也觀春秋所書則見王室衰亂之由而知興衰撥亂之説矣三月己未天王崩正傳曰崩者上墜之聲天子死曰崩書天王崩紀天下之大變也天下臣民所宜䘮之如父遏宻八音者周來赴故史書之而魯侯列國之主未聞奔䘮者則不俟聖人之加損而義自見矣夏四月己巳葬齊僖公正傳曰周之夏四月即夏之春二月也書𦵏齊僖公紀隣國之大事也齊來赴則史書之聖人存而不去紀大事著恤隣之義耳五月鄭伯突出奔蔡正傳曰突鄭伯名名之無他義公榖以為奪正皆非也其名忽者又將何取耶書鄭伯突出奔蔡則鄭君臣之無道而不能安其位可見矣左氏曰祭仲專鄭伯惡之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡程子曰避祭仲而出非國人出之也胡氏曰公出奔蔡是祭仲逐之也沒而不書其義何也陸淳曰逐君之臣其罪易知也君而見逐其惡甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為名所以警乎人君其說是也夫君實有國而出扵臣乃其自取焉耳本正而天下之事理矣鄭世子忽復歸于鄭正傳曰忽鄭昭公名名之無他義也國史書之詞耳忽不能有其國故人稱之曰世子書鄭世子忽復歸于鄭正鄭君之復國也夫有失然後有復謂既失而今乃復之故穀梁以為反正是也左氏曰六月乙亥昭公入愚謂此紀實傳也公羊又以稱世子為復正之義又言復歸者出惡歸無惡之義程子又有不能保其位故不爵胡氏又以為復厭詞也則皆泥文求義之過矣胡氏曰其稱復歸者謂既絶而復歸也然諸侯失國出奔歸而稱復則可大夫失位出奔歸而稱復則不可古者諸侯世國大夫不世官愚謂此則是也諸侯以守國為善大夫以去君為惡許叔入于許正傳曰書許叔入于許則其入之得失自可考矣汪氏曰隱十一年魯及齊鄭入許許莊公奔衛鄭悉有許之土地而使許荘公之弟許叔居許東偏以奉其祭祀是年鄭亂許叔度鄭之力不能與己争故自入其國而君之也此其實傳也夫許叔復其舊物以繼先君之統此其得矣穀梁又曰其歸之道非所以歸也胡氏曰許太岳之裔先王建國廹於齊鄭不得奉其社稷未聞可㓕之罪也則當伸大義以直詞上告諸天王下赴諸方伯求復其國糞除宗廟孰能與之争今乃因亂竊入則非復國之義愚謂此則所失也胡氏又以書入為難詞泥文之過矣公㑹齊侯于艾正傳曰書公㑹齊侯于艾著非禮之㑹也左氏曰謀定許也夫㑹既非㑹同之正則既為非禮矣又為謀許而㑹豈得為禮㑹乎故春秋非之邾人牟人葛人來朝正傳曰書邾人牟人葛人來朝著非禮之朝也非㑹同之正而相率以來朝弑君之賊其黨惡無王之罪見矣胡氏謂公羊曰皆何以稱人夷狄之也其夷狄之何天王崩不奔䘮而相率朝弑君之賊也愚謂此言是也然而是非善惡皎然不待稱人而後知也人者泛稱之詞耳秋九月鄭伯突入于櫟正傳曰櫟者鄭之邑名書鄭伯宇入于櫟不正其入也突已嘗為君矣何以不正其入忽亦嘗為君矣忽嫡而正突以庶篡而邪忽既入復君而突又入櫟以争亂罪之大者也左氏曰鄭伯因櫟人殺檀伯而遂居櫟程子曰突非正也忽既恣行故國人君之諸侯助之書爵所以戒居正者不能保則人取之矣書入以見義不容也胡氏曰經於厲公復國削而不書獨書入于櫟何也夫制邑之死虢君共城之叛太叔皆荘公所親戒也今又城櫟而寘子元焉使昭公不立何謀國之誤也衛有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折有國之害也故夫子行乎季孫曰古者家不藏甲邑無百雉之城遂墮三都以張公室扵厲公復國削而不書者若曰既入于櫟則其已復矣扵以眀居重馭䡖强榦弱枝以身使臂之義為天下與來世之鑒也為國者可不謹於禮乎春秋此義皆小康之事衰世之意也愚謂書爵乃國史因舊稱之之詞耳不然則􅊳之不正聖人胡為而爵之乎冬十有一月公㑹宋公衛侯陳侯于袲伐鄭正傳曰袲宋地名書公㑹宋公衛侯陳侯于袲伐鄭則列國擅興邪謀之罪見矣左氏曰㑹于袲謀伐鄭將納厲公也弗克而還愚謂此其實傳也忽嫡而正且君矣突庶而以邪篡且出矣忽雖弱乃君也突雖强乃賊也今列國不審是非邪正之辨而惟强弱之謀欲納邪而逐正其罪孰大焉穀梁以地而後伐為疑詞為非其疑也胡氏從之皆泥文求義之固也荘王元年十有六年齊襄二年晋緡九年衛恵四年蔡桓十九年鄭厲五年昭公忽元年曹荘六年陳荘四年杞靖八年宋荘十四年秦武二年楚武四十五年春正月公㑹宋公蔡侯衛侯于曹正傳曰書公㑹宋公蔡侯衛侯于曹則非正之㑹可考矣左氏曰謀伐鄭也愚謂非禮之㑹且為不正况屢謀以伐人乎其肆人欲㓕天理罪孰大焉夏四月公㑹宋公衛侯陳侯蔡侯伐鄭正傳曰書公㑹宋公衛侯陳侯蔡侯伐鄭著擅興黨惡之罪也程子曰突善結諸侯故皆為之致力屢伐鄭也愚謂此實傳也則夫列國惟以強弱為向背而不顧是非邪正之歸亂王法違正道其罪又在擅興之上矣此時豈復有尊卑上下之等胡氏又云春正月㑹于曹蔡先於衛夏四月伐鄭衛先於蔡王制諸侯之爵次其後先固有序矣在周官大司馬設儀辨位以等邦國猶天建地設不可亂也及春秋時禮制既亡伯者以意之向背為升降諸國以勢之强弱相上下蔡嘗先衛今序陳下者先儒以為後至也以至之先後易其序是以利率人而不要諸禮也豈所以定民志乎愚謂諸侯列之先後乃當時國史之文耳非聖人有意而為之也况宋且稱公而諸國之為侯等耳何以差别後儒乃又有後至之說大抵皆臆度之詞也秋七月公至自伐鄭正傳曰書公至自伐鄭君舉必書史之法也况逺出入乎况戰伐之事乎左氏以為以飲至之禮穀梁以為危之皆非也程子又曰不惟告廟又以見勤勞於鄭宇也胡氏又曰伐鄭則至罪之也曷為罪之以納突也諸侯失國諸侯納之正也伐鄭以納突非正也故書至以罪桓之上無王法恣為不義而莫之禁也此二說則經外之意也冬城向正傳曰向魯邑名書冬城向左氏曰書時也是也十有一月衛侯朔出奔齊正傳曰朔衛恵公名書衛侯朔出奔齊著衛君之無道也左氏曰初衛宣公烝於夷姜生急子屬諸右公子為之娶於齊而美公取之生夀及朔屬夀於左公子夷姜縊宣姜與公子朔構急子公使諸齊使盗待諸莘將殺之夀子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒夀子載其旌以先盗殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨恵公十一月左公子洩右公子職立公子黔牟恵公奔齊愚謂觀此傳則恵公之無道可見矣不必如公羊之所謂名朔乃絶之以為得罪於天子不必如穀梁之所謂名朔以惡之以為天子召而不徃迂逺而無稽也莊王二年十有七年齊襄三年晋緡十年衛恵五年黔牟元年蔡桓二十年卒鄭厲六年昭二年曺荘七年陳荘五年杞靖九年宋荘十五年秦武三年楚武四十六年春正月丙辰公㑹齊侯紀侯盟于黄正傳曰黄齊地名書公㑹齊侯紀侯盟于黄非其盟也春秋無善盟上不尊王法下不協侯度而㰱血相盟以要鬼神此大亂之道也故曰春秋無善盟况又隂謀以相侵伐乎左氏謂此㑹平齊紀且謀衛故也此春秋所以非之二月丙午公㑹邾儀父盟于趡正傳曰趡魯地名書公㑹邾儀父盟于趡著㑹盟之非也左氏曰尋蔑之盟也愚謂此其實傳也盟以結信然而不信自此始也故春秋於列國之盟必書以非之夏五月丙午及齊師戰于奚正傳曰奚魯地齊來侵而魯與之戰也書及齊師戰于奚著擅興之罪也為齊君者必上告天王聲罪以討魯賊之篡弑可也而乃為侵疆之謀則魯之罪齊固分之矣左氏曰疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉愚謂此實傳也是故春秋非之穀梁又有為内諱敗不言及之者之說則固矣六月丁丑蔡侯封人卒正傳曰封人蔡侯名列國諸侯之卒大變也故來赴則史書之聖人因存而不去耳而謂凡書皆聖筆寓褒貶則此書何以褒何以貶乎亦可以解惑矣秋八月蔡季自陳歸于蔡正傳曰蔡季蔡之貴者季其字也書蔡季自陳歸于蔡嘉蔡季之得衆也左氏曰蔡人召蔡季于陳秋蔡季自陳歸于蔡蔡人嘉之是也穀梁曰蔡季自陳陳有奉焉耳此臆說也胡氏曰蔡季之去以道而去者也其歸以禮而歸者也公子不去國季何以去權也既歸何以不有國獻舞立矣若季者劉敞所謂智足以與權而不亂力足以得國而不居逺而不攜邇而不廹者也是以見貴於春秋愚謂是矣若夫胡氏以歸為順詞以入為難詞如此義𩔖不一非出聖人之意乃公穀之徒立此以起義後儒遂宗之雖大儒猶不能免焉况其他耶盖必盡去此𩔖然後聖人取義之心昭然如青天皎然如日星可因傳因事而盡得之矣癸巳葬蔡桓侯正傳曰書葬蔡桓侯同列之大事來赴則史書之聖人因存而不削以紀㑹葬之義也桓侯稱侯正也其伯子男葬皆稱公僭也史因其所報而書之耳胡氏從啖助以桓侯有謚而遂歸之蔡季盖因季之賢而生此說耳是皆以己意觀春秋之蔽也及宋人衛人伐邾正傳曰及者我及之也左氏以為宋志非也書及宋人衛人伐邾著魯桓之暴也前與邾盟口血未乾今即及宋衛以伐之則魯桓反覆之罪不可逃而盟誓之言不足信矣冬十月朔日有食之正傳曰書冬十月朔日有食之紀異也不書日之甲子史逸其傳耳夫史有逸其傳者則夫以一字取義者何可盡據耶左氏以為不書日官之失是也穀梁又以為言朔不言日食既朔也則臆説矣荘王三年十有八年齊襄四年晋緡十一年衛恵六年黔牟二年蔡哀侯獻舞元年鄭厲七年子亹元年曺荘八年陳荘六年杞靖十年宋荘十六年秦武四年楚武四十七年春王正月正傳曰無事亦書時月國史編年紀事之常也胡氏曰是年桓公己終復書王者春秋之時諸侯放恣弑君篡國者已列於㑹則不復致討故魯宣殺惡及視以取國賂齊請㑹而傳曰㑹于平州以定公位曺伯負芻殺太子自立見執於晋而曺人請之曰若為有罪則君列諸㑹矣孔子為此懼作春秋於十八年復書王者明弑君之賊雖身已沒而王法不得赦也又據桓十五年天王崩至是新君嗣立三年之䘮畢矣明弑君之賊雖在前朝而古今之惡一也然則篡弑者不容於天地之間身無存沒時無古今皆得討而不赦聖人之法嚴矣已列於㑹則不致討可乎故曰春秋成而亂臣賊子懼愚謂此可見胡氏穿鑿之􅍝矣此桓公十八年春正至夏四月公乃薨安得先為稱王以誅其罪於身後以為王法雖沒不得赦耶或書王或不書王愚於前說盡之矣今不復贅但桓元年二年稱王則曰稱王以誅之三年以後不稱王則曰桓無王及十年稱王則曰十乃數之盈桓罪己見誅矣今稱王以常紀其後不稱王則無說矣今十八年正月又稱王則又如此云云是其說屡變靡一而不足徴信矣公㑹齊侯于濼公與夫人姜氏遂如齊正傳曰書公㑹齊侯于濼公與夫人遂如齊著非所宜㑹而㑹非所與如而如也則夫此㑹者以夫人之意而㑹如者以夫人之意而如從欲肆淫以及敗也左氏曰公將有行遂與姜氏如齊申繻曰女有家男有室無相凟也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊程子曰人雖不能無欲然當有以制之而惟欲之從則人道廢而入於禽獸矣胡氏曰按齊詩惡魯桓微弱不能防閑文姜使至淫亂為二國患而其詞曰敝笱在梁其魚唯唯齊子歸止其從如水言公於齊姜委曲順從如水從地無所不可故為亂者文姜而春秋罪桓公治其本也愚謂此是也至又謂與者許可之詞曰與者罪桓公也而公羊又以為不言及夫人夫人外公也則皆泥文私意為經累也夏四月丙子公薨于齊丁酉公之喪至自齊正傳曰書公薨于齊公之喪至自齊紀國之大變也而其齊侯文姜之惡自見矣左氏曰公及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乗公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生愚謂此其實傳也觀此則不必他有論辯而其惡自不可掩矣而胡氏又以為魯公弑而薨者則以不地見其弑今書桓公薨于齊豈不沒其實乎前書公與夫人姜氏如齊後書夫人孫于齊去其姓氏而荘公不書即位則其實亦明矣愚謂此何其費於詞耶秋七月正傳曰書秋七月而無事者紀時月以待事國史之法也聖人存而不去因舊史也冬十有二月己丑葬我君桓公正傳曰書冬十有二月己丑葬我君桓公紀國之大事故具時月日謹書之也内史也故詳公穀胡氏皆以為賊未討何以書葬及在外在内之說皆後人𧺫例耳聖人未嘗有明訓也他倣此春秋正傳卷六
