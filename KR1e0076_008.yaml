body:
  text: 春秋正傳卷八明湛若水撰荘公荘王十一年八年齊襄十二年弑晉緡十九年衛恵十四年蔡哀九年鄭厲十五年子儀八年曹荘十六年陳宣七年杞靖十八年宋閔六年秦武十二年楚文四年春王正月師次于郎以俟陳人蔡人正傳曰書師次于郎以俟陳人蔡人則魯侯妄興之罪見矣穀梁曰次止也俟待也公羊以為言俟不得已也愚謂非也夫兵者㓙噐戰者危事春秋無義戰敵加於己不得已而應之曰守吾先君之土地猶之可也人來㑹己不得已而㑹之猶可言也至於先出而俟之罪在我矣不可言也胡氏曰用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘是也救而次者有緩師畏敵之意其次譏之也次于匡于聶北于雍榆是也俟而次者有無名妄動之意次于郎以俟陳人蔡人是也何俟乎陳蔡或曰陳蔡将過我俟而邀之也或曰魯将與陳蔡有事於鄰國而陳蔡不至故次于郎以待之也若是皆非義矣其曰次曰以俟者深貶之也愚謂春秋有經文即見義者此類是也然亦魯史之文詳而核者耳他則未必然也甲午治兵正傳曰治者整振之也胡氏以為治于郎是也左氏以為治兵于廟禮也非也書甲午治兵則魯侯妄動之罪再見矣夫兵者有仁義之兵有應敵之兵今魯侯無故而動衆次俟于郎及陳蔡不至乃治兵焉夫非時而治兵非義也榖梁曰出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣兵事以嚴終故曰善陳者不戰此之謂也善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡胡氏曰俟而不至暴師露衆役乆不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也夏師及齊師圍郕郕降于齊師正傳曰及者魯為主書師及齊師圍郕郕降于齊師則莊公忘讎暴弱之罪自見矣左氏曰仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種徳徳乃降姑務修徳以待時乎愚謂齊侯親殺其父而淫其母不共載天之讎也而可謂之無罪乎舍復讎之義而不行荘公於是乎無人心矣天理㓕矣尚何徳之可修乎忘讎不復而反同之以伐郕宜郕人之不服而降齊也然則慶父之請然歟曰亦非也為荘公者當上告天子聲大義以討之必有得志者矣舍此不為而請於郕降之時亦可以見魯之無人矣胡氏曰書及齊師者親仇讎也圍郕者伐同姓也郕降于齊師者見伐國無義不能服也於是荘公之惡著矣秋師還正傳曰師者衆之稱言師則公在其中矣胡氏以不稱公而稱師以衆為重非也書秋師還則曠時妄舉之罪見矣左氏以為善荘公公羊以為善亂皆非也書秋則可以知夏知春矣胡氏曰書師還譏役乆也按左氏仲慶父請伐齊師荘公不可是國君上将親與圍郕之役也然其次其及其還皆不稱公者重衆也春秋正例君将不稱帥師則以君為重今此不稱公又以為重衆何也輕舉大衆妄動乆役俟陳蔡而陳蔡不至圍郕而郕不服歴三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣愚謂此説多是但君重師重之説則君師豈有二耶又所謂正例者公榖之徒為之耳非聖人之指也例立而後聖人春秋之義亡冬十有一月癸未齊無知弑其君諸兒正傳曰此二句先儒分為二節無義今合為一無知者齊公孫夷仲年之子年僖公母弟也書齊無知弑其君諸兒紀鄰國簒弑之大變也左氏曰齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宫無寵使間公曰㨗吾以女為夫人冬十二月齊侯㳺于姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屦反誅屨於徒人費弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死於門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于户下遂弑之而立無知初襄公立無常鮑叔牙曰君使民慢亂将作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔初公孫無知虐于雍廩九年春雍廩殺無知愚謂此其實録傳也觀此則連稱管至弑僖公也而書無知弑者無知受其立則罪重在無知矣無知固有罪也而僖公偏愛過寵以成無知之亂過亦不可謂無矣徒人費及石之紛如二人雖死君難胡氏所謂逄君虐民之人其節亦不足稱也荘王十二年九年齊桓公小白元年晉緡二十年衛恵十五年蔡哀十年鄭厲十六年子儀九年曹荘十七年陳宣八年杞靖十九年宋閔七年秦武十三年楚文五年春齊人殺無知正傳曰人者衆人也稱殺不稱弑稱無知不稱君史之詞也連稱管至欲立之國人不與未成其君也書齊人殺無知則誅亂賊之義見矣夫殺無知者雍廩而曰齊人者國之衆人共討賊也公及齊大夫盟于蔇正傳曰蔇魯地書公及齊大夫盟于蔇則非其盟之義見矣春秋無善盟盟則非信也與其君盟且不可况其大夫乎左氏曰齊無君也榖梁曰盟納子糾也不日其盟渝也當齊無君制在公矣當可納而不納故惡内也愚謂是也九世之讎猶可復况其近者乎當此之時荘公度子糾之不宜立則已矣如其宜立則當上告天子聲大義以納之孰有敢當之者而義且不可又下與其大夫盟則其卑陋甚矣况新讎未復而可與盟乎宜其盟之渝也然以為其盟渝故不日者謬矣胡氏曰曰公及齊大夫盟者譏公之釋父怨親仇讎也或曰以徳報怨寛身之仁何以譏之也曰徳有輕重怨有深淺怨莫甚於父母之仇而徳莫重乎安定其國家而圖其後嗣也有父之讎而不知怨乃欲以重徳報之也則人倫廢天理㓕矣然則如之何以直報怨以徳報徳愚謂此説盡之矣夏公伐齊納糾正傳曰糾者公子糾也書公伐齊納糾則忘讎妄舉之罪自見矣荘公當父之見弑於齊首不能興問罪復讎之師次不能從慶父圍郕之請今又不能舉於彼國無君疑亂之際乃無故伐齊納糾以續讎人之後其罪孰甚焉失此機㑹無恠乎其有乾時之敗也公羊謂糾不稱公子君前臣名非也史失之耳齊小白入于齊正傳曰小白桓公名曰齊曰入字無他義公羊以為當國為簒詞非也左氏曰公伐齊納子糾桓公自莒先入此實傳也書齊小白入于齊著兄弟争國之大變也桓公與子糾襄公之二子也皆未有父命立之而小白則長而當立為小白者宜以義請命於天子乃立置其弟而使終其天年夫誰曰不可乃無君父之命而入以自立焉此春秋所以書之又至於殺其弟則罪甚矣榖梁曰齊公孫無知弑襄公公子糾公子小白不能存出亡齊人殺無知而迎公子糾於魯公子小白不讓公子糾先入又殺之於魯故曰齊小白入於齊惡之也程子曰桓公兄而子糾弟襄公死則桓公當立是也然程子又以為於小白曰齊言當有齊國於子糾則曰糾言不當有齊國又言不言子非君之嗣子又言糾見殺然後言子而榖梁又有以惡歸曰入胡氏又有納者不受而强致之稱入者難詞則三子之説皆義例為之蔽也秋七月丁酉葬齊襄公正傳曰書丁酉葬齊襄公紀恤鄰之大事也有報則史書之聖人筆之而不去寓此義也杜氏曰九月乃葬亂故也無貶八月庚申及齊師戰于乾時我師敗績正傳曰乾時齊地書及齊師戰于乾時我師敗績紀國之大事而公輕舉取敗之義見矣魯與齊殺父之讎不共戴天也公當以告于天子聲大義以討之夫誰能當之荘公乃忘復讎之義而為納糾之舉而與之戰其道已顛置矣焉得而不敗左氏曰師及齊師戰于乾時我師敗績公喪戎路傳乗而歸秦子梁子以公旗辟于下道是以皆止愚謂此實傳也諸傳多以為内諱敗内不言敗皆非也使有董狐南史猶宜靣書之何諱之有胡氏又曰與讎戰雖敗亦榮公本忘親釋怨欲納讎人之子謀定其國家不為復讎而與之戰也是故沒公以見貶若以復讎舉事則此戰為義戰當書公冠于敗績之上與沙隨之不得見平丘之不與盟為比以示榮矣惟不以復讎戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣愚謂此説良是但謂沒公以見貶諱公以重貶則不免泥文而恐非經意耳九月齊人取子糾殺之正傳曰書齊人取子糾殺之則齊魯之害義並著矣子糾奔魯以託生也荘公以讎人之子不納之可也乃與齊大夫盟又伐齊納子糾又與齊師戰皆為子糾耳一旦畏齊之强而聽其取以殺之魯一害義也齊桓己得國念子糾同氣之恩置而不問或以小邑居之使吏治而納其貢税焉以終其身存其子孫可也乃窮追諸魯而殺之齊一害義也左氏曰鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而税之歸而以告曰管夷吾治於髙傒使相可也公從之榖梁曰十室之邑可以逃難百里之邑可以隠死以千乗之魯而不能存子糾以公為病矣胡氏亦曰仁人之于兄弟不藏怒焉不宿怨焉親愛之而已糾雖争立越在他國置而勿問可也必請于魯殺之然後快于心其不仁亦甚矣愚謂皆是也但公羊謂稱子為貴之之義未必然爾冬浚洙正傳曰書冬浚洙著非所當作而作雖時非也公羊曰洙者何水也浚之者何深之也曷為深之畏齊也胡氏曰固國以保民為本輕用民力妄興大作邦本一揺雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見勞民於守國之末務而不知本為後戒也莊王十三年十年齊桓二年晉緡二十一年衛惠十六年蔡哀十一年鄭厲十七年子儀十年曹莊十八年陳宣九年杞靖二十年宋閔八年秦武十四年楚文六年春王正月公敗齊師于長勺正傳曰長勺魯地書公敗齊師于長勺紀國之大事著應敵之兵也何以知之以地而知之長勺魯地齊來加兵而魯禦之也非取其能敗人也春秋無義戰此所謂彼善於此者也左氏曰齊師伐我公将戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乗戰于長勺将鼓之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之愚謂此其實傳也胡氏又有不書齊伐魯責魯之説有詐戰曰敗之説殆謂此類歟又曰或謂長勺魯地而齊師至此所謂敵加於己不得已而後應者也疑若無罪焉何以見責乎善為國者不師善師者不陣善陣者不戰故行使則有文告之詞而疆塲則有守禦之備至於善陣徳己衰矣而况兵刃相接又以詐謀取勝故書魯為主以責之皆已亂之道寡怨之方王者之事也愚謂此極致之論然曹劌與公所言皆主於忠至於相時而動好謀而成亦兵家之道未見其有詐謀取勝之跡也舍是則不為宋襄陳餘之兵者幾希矣所謂敗者敗其兵乃勝之别名耳詐戰曰敗亦後儒起例之説也二月公侵宋正傳曰侵者潜師畧境之謂書二月公侵宋則荘公不義之兵可見矣周官九伐之法負固不服則侵之此盖天子之命諸侯以侵者列國擅行之已為得罪於王法矣又王氏曰宋閔以荘三年即位二公未嘗有隙而乗敗齊師之勝而潜師以侵之可謂無名可謂不義矣故春秋書以著之此月而不時不日者史之畧文耳榖梁又為侵時而不月之説謬矣三月宋人遷宿正傳曰宿介於宋魯之間属於宋而親魯宋疑其貳己故遷之書宋人遷宿則宋閔之無道可見矣遷㓕人國乃隣國之大事有報則史書之聖人筆而不削以示戒也胡氏曰其曰遷宿者宿非欲遷為宋人之所遷也懐土常物之大情遷國重事也雖違害就利去危即安猶或恐泥于衆不率從而况廹于横逆非其所欲棄乆宅之田里刈新徙之蓬翟道塗之勤營築之勞起怨諮傷和氣豈不惻然有隠乎肆行莫之顧也其不仁亦甚矣凡書遷不再貶而惡己見矣愚謂既曰不再貶則此稱人何無取義乎可類推也夏六月齊師宋師次于郎公敗宋師于乗丘正傳曰乗丘魯地公羊曰其言次于郎伐也愚謂伐者二國來伐我也書齊師宋師次于郎公敗宋師于乗丘則荘公應敵之兵見矣何以知之以郎乗丘皆魯邑而知之所謂敵加於己不得已而應之者也左氏曰齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之公從之大敗宋師于乗丘齊師乃還先儒以為詐戰為敗非也春秋無義戰彼善於此則有之矣戰則欲勝欲勝則好謀而成故兵法有正有竒荘公以應敵之兵用竒取勝守先君之疆土社稷未為不可胡氏曰齊宋輕舉大衆深入他境肆其報復之心誠有罪也魯人若能不用詐謀奉其辭令二國去矣偷得一時之㨗而積四鄰之忿此小人之道故次者不以其事勝者不以其理交譏之愚謂以為交譏之則過矣秋九月荆敗蔡師于莘以蔡侯獻舞歸正傳曰荆楚也楚夷狄之國獻舞蔡侯名書荆敗蔡師于莘以蔡侯獻舞歸紀荆夷憑陵中國之罪也左氏曰蔡哀侯娶于陳息侯亦娶焉息媯将歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸愚謂此其實録也息侯以此小忿搆楚以興大患夷狄陵中國自此始矣故春秋書之先儒謂獻舞被執故賤而稱名非也史之文也冬十月齊師㓕譚譚子奔莒正傳曰譚莒皆小國名書齊師㓕譚譚子奔莒則齊恃强以陵人譚不自强以守國之罪皆可見矣左氏曰齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師㓕譚譚無禮也譚子奔莒同盟故也此實録也荘王十四年十有一年齊桓三年晉緡二十二年衛恵十七年蔡哀十二年鄭厲十八年子儀十一年曹荘十九年陳宣十年杞靖二十一年宋閔九年秦武十五年楚文七年春王正月正傳曰無事亦書義見于前夏五月戊寅公敗宋師于鄑正傳曰敗者我勝之也若以為詐戰曰敗則古有司敗之官又何謂乎是故義例去然後春秋之㫖明矣鄑魯地宋師來伐我故敗之書公敗宋師于鄑則魯荘應敵之義著矣左氏曰夏宋為乗丘之役故侵我公禦之宋師未便而薄之敗諸鄑愚謂此其實録也秋宋大水正傳曰高下有水災曰大水書宋大水紀隣國之災也此外國何以書有來報則書之非但書之宜且吊之也左氏曰秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭臧孫逹曰是宜為君有恤民之心愚謂此其實傳也胡氏曰諸侯於四隣有恤病救急之義則告為得禮而不可以不弔故四國同災許人不弔君子以是知許之先亡也凡志災見春秋有謹天戒恤民隱之心王者之事也冬王姬歸于齊正傳曰書王姬歸于齊正昏姻之義也何以書左氏曰齊侯來逆共姬公榖皆曰過我也故書之胡氏曰按周制王姬嫁於諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁於齊侯亦執婦道成肅雍之徳其詩曰曷不肅雍王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈於婦逆隂陽之位故王陽條奏世務指此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦原其意雖欲尊君抑臣為治而使人倫悖於上風俗壊於下又豈所以為治也其流至此然後知春秋書王姬侯女同詞而不異垂訓之義大矣荘王十五年崩十有二年齊桓四年晉緡二十三年衛惠十八年蔡哀十三年鄭厲十九年子儀十二年曹荘二十年陳宣十一年杞靖二十二年宋閔十年弑秦武十六年楚文八年春王三月紀叔姬歸于􅈶正傳曰叔姬者魯伯姬之妹隨嫁于紀者也伯姬既死叔姬攝治内事紀亡故歸于􅈶以奉紀祀書紀叔姬歸于􅈶表叔姬之盡婦道也胡氏曰荘公四年紀侯去國叔姬至此始歸于􅈶者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在􅈶奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸于魯所謂全節守義不以亡故而虧婦道者也魯以高其節義恩禮有加焉是故其歸于􅈶其卒其𦵏史冊悉書夫子修經存而弗削使與衛之共姜同垂不朽為後世勸若夏侯令女曹爽之弟婦也寡居守志父母欲奪而嫁之誓而弗許而曰曹氏全盛之時尚欲保終况今衰亡何忍棄之聞者為之感動其聞叔姬之風而興起者乎愚謂胡氏謂歸為順詞泥矣婦謂嫁曰歸􅈶有紀之宗廟叔姬歸而守之全所歸之義也故曰歸耳夏四月正傳曰無事亦書義見于前秋八月甲午宋萬弑其君㨗及其大夫仇牧正傳曰㨗宋閔公名仇牧宋萬皆宋大夫書宋萬弑其君㨗及其大夫仇牧則弑君之賊死難之節竝見矣左氏曰宋萬弑閔公于蒙澤遇仇牧于門批而殺之遇太宰督於東宫之西又殺之立子㳺羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳公羊曰仇牧可謂不畏疆禦矣萬怒搏閔公絶其脰仇牧聞君弑趨而至遇之于門手劒而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏疆禦矣胡氏曰君弑而大夫死其難春秋書之者其所取也大夫死于弑君之難而有不書者故知孔父牧息皆所取也夫仇牧可謂不畏疆禦矣然徒殺其身不能執賊無益於事也亦足取乎食焉不避其難義也徒殺其身不能執賊亦足為求利焉而迯其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也太宰督亦死於閔公之難削而不書者身有罪也恵伯死於子惡之難亦削而不書者非君命也召忽死於子糾之難孔子比於匹夫匹婦之諒自經於溝瀆而莫之知者所事不正也崔杼弑君晏平仲曰人有君而人弑之吾焉得死之而焉得亡之君子不以是罪晏子者齊荘公不為社稷死而晏子非其私昵之臣也若仇牧荀息立乎人之本朝執國之政而君見弑不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而迯其難者之勸也惟此義不行然後有視棄其君猶土梗弁髦曽莫之省而三綱絶矣冬十月宋萬出奔陳正傳曰書宋萬出奔陳志逸賊也萬弑君之賊也左氏曰冬十月蕭叔大心及戴武宣穆荘之族以曹師伐之殺南宫牛于師殺子㳺于宋立桓公猛獲奔衛南宫萬奔陳以乗車輦其母一日而至宋人請猛獲于衛衛人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之愚謂此實傳也僖王元年十有三年齊桓五年晉緡二十四年衛惠十九年蔡哀十四年鄭厲二十年子儀十三年曹荘二十一年陳宣十二年杞靖二十三年卒宋桓公御説元年秦武十七年楚文九年春齊侯宋人陳人蔡人邾人㑹于北杏正傳曰北杏齊地書齊侯宋人陳人蔡人邾人㑹于北杏著其㑹之非也左氏曰春㑹于北杏以平宋亂是也然則平宋亂與國相恤之義也何以非之夫平宋亂者必當上告天子約與國奉王法以平之而私相㑹盟則非矣首齊侯者桓公為之主也此五伯之始也平宋亂可也而列國相與戴齊以為主是無王也所謂功之首罪之魁也春秋此書其喜懼之情見矣其首齊侯者盟主也稱人者衆稱之詞榖梁以為始疑之詞者非也胡氏一以為稱人者春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚荘秦穆交主夏盟跡此而為之者也桓非受命之伯諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也一以為齊侯稱爵者上無天子下無方伯有能㑹諸侯安中國而免民於左衽則雖與之可也誅諸侯者正也與桓公者權也或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也愚謂胡氏二説自相矛盾也夫既人四國以罪之則不宜爵齊侯矣爵齊侯以與之則不宜罪四國矣盖齊桓之主伯四國成之其是非一體也凡此皆史氏之詞不必泥耳夏六月齊人滅遂正傳曰遂小國也書夏六月齊人㓕遂則齊侯貪暴之罪自見矣左氏謂北杏之㑹遂人不至又曰齊人㓕遂而戍之則因其不至遂假以㓕取之濟其私也齊桓之覇可得謂乆假而不歸乎胡氏曰取國而書㓕奪人土地使不得有其民人毁人宗廟使不得奉其祭祀非至不仁者莫之忍為語有之曰興㓕國繼絶世天下之民歸心焉今乃㓕人之國而絶其世罪莫重矣又云凡書㓕者不待再貶而惡己見愚謂皆是矣然又謂其稱人㣲者耳榖梁又謂不日㣲者也皆臆説也且上文北杏之㑹又何以不月不日耶秋七月正傳曰無事亦書義見前冬公㑹齊侯盟于柯正傳曰柯者齊之阿邑書公㑹齊侯盟于柯則忘讎之罪㑹盟之非自著矣左氏曰冬盟于柯始及齊平也公羊曰荘公将㑹乎桓曹子進曰君之意何如荘公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣荘公曰諾於是㑹乎桓荘公升壇曹子手劒而從之管子進曰君何求乎曹子曰城壊壓竟君不圖與管子曰然則君将何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟己盟曹子標劒而去之要盟可犯而桓不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始焉愚謂㑹盟以講信修睦也荘公用曹子之謀而必且行刼焉此愚所謂㑹盟之非也胡氏曰始及齊平也世讎而平可乎於傳有之敵恵敵怨不在後嗣魯於襄公有不共戴天之讎當其身則釋怨不復而主王姬狩于禚㑹伐衛同圍郕納子糾故聖人詳加譏貶以著其忘親之罪今易世矣而桓公始合諸侯安中國攘夷狄尊天王乃欲修怨怒鄰而危其宗社可謂孝乎愚謂九世之讎猶可復况易世乎不修怨可也忘怨以㑹盟不可也此愚所謂忘讎之罪也僖王二年十有四年齊桓六年晉緡二十五年衛恵二十年蔡哀十五年鄭厲二十一年子儀十四年弑曹荘二十二年陳宣十三年杞共公元年宋桓二年秦武十八年楚文十年春齊人陳人曹人伐宋正傳曰此三國皆稱人可見上或侯或人為無他義矣書齊人陳人曹人伐宋著擅伐之罪也夫征伐自天子出而桓公私與二國伐宋其罪著矣左氏曰宋人背北杏之㑹是齊桓因假此㑹二國伐之所謂五伯假之者是也其皆稱人者胡氏云或以為貶齊侯固非也程子又舉将卑師少曰某人以為春秋之法而胡氏從之則北杏之㑹列國皆稱人者豈皆将卑師少耶是皆沿襲於義例之蔽遂以為春秋之法雖大儒猶不能自免也夏單伯㑹伐宋正傳曰此與上春三國之㑹伐宋同一事故此不再叙三國而云㑹伐宋孟春㑹而至夏乃即行伐也單伯舊無與㑹左氏云春諸侯伐宋齊請師于周夏單伯㑹之取成于宋而還此實傳也由是觀之則周因齊桓之請師而命單伯奉詞往㑹三國伐之也春秋於此書之著伐宋之猶為有義也何也桓公上請天子下率諸侯而行此齊桓為覇之機也然禮天子討而不伐而單伯王人下與諸侯同行征伐則亦異乎先王之法矣秋七月荆入蔡正傳曰荆即楚也榖梁以為州舉之非也書荆入蔡再著荆蠻憑陵中國之罪也左氏曰蔡哀侯為莘故䋲息媯以語楚子楚子如息以食入享遂㓕息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯㓕息遂伐蔡秋七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲㓕者其如蔡哀侯乎冬單伯㑹齊侯宋公衛侯鄭伯于鄄正傳曰言冬單伯㑹者單伯奉王命故首之也書之以終伐宋之事也左氏曰冬㑹于鄄宋服故也愚謂宋服則止而釋兵而㑹以歸於義無傷也春秋正傳卷八
