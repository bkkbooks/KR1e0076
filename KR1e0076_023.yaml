body:
  text: 春秋正傳卷二十三明湛若水撰成公簡王元年六年晉景十五年齊頃十四年衞定四年蔡景七年鄭悼二年卒曹宣十年陳成十四年杞桓五十二年宋共四年秦桓二十年楚共六年呉子夀夢元年春王正月公至自㑹正傳曰書公至自㑹謹君之出入以始終乎非禮之㑹也二月辛巳立武宫正傳曰立者始建之名武宫者公羊以為武公之宫是也書立武宫明非禮也胡氏曰立武宫非禮也喪事即逺有進而無退宫廟即逺有毁而無立故二昭二穆與太祖而五者諸侯之廟制也曰考廟曰王考廟曰皇考廟皆月祭焉曰顯考廟曰祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱則祭無禱乃止去墠為鬼諸侯之祭法也武公至是厯世十一其毁已久而輒立焉非即逺有終之意故特書曰立立者不宜立也愚謂但如此直書而不宜之義自見矣不必執立之一字而以謂不宜立也取鄟正傳曰鄟公羊以為邾婁之邑榖梁以為國然而書取則榖梁之説是也書取鄟則魯君滅國絶世之罪見矣胡氏曰鄟微國也書取者滅之也滅而書取為君隱也項亦國也其書滅者以僖公在㑹季孫所為故直書其事而不隱此春秋尊君抑臣以辨上下謹於微之意也人倫之際差之毫釐繆以千里故仲尼特立此義以示後世臣子使以道事君而無朋附權臣之惡於傳有之犯上干主其罪可救乖忤貴臣禍在不測故臣子多不憚人主而畏權臣如漢谷永之徒直攻成帝不以為嫌至於王氏則周旋相此結為死黨而人主不之覺此世世之公患也歸父家遣縁季氏也朝呉出奔因無極也王章殺身忤王鳳也鄴侯寄館避元載也惟殺生在下而人主失其柄也是以黨與衆多知有權臣而不知有君父矣使春秋之義得行尊君抑臣以辨上下每謹於微豈有此患乎愚謂春秋垂世立教之書其文既因魯史其義孔子以為竊取豈容有所曲意以隱君父乎胡氏之説以此愈離而愈逺至謂滅而書取為隱而尊君其直書滅為不隱而抑季氏之為臣則非夫子之意且所謂取者即滅矣何足以為隱乎故不立文義據事直書書之者無罪聞之者足以戒亦春秋之本意也衞孫良夫帥師侵宋正傳曰書衞孫良夫帥師侵宋紀憤兵也左氏曰二月晉伯宗夏陽説衞孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也師于鍼衞人不保説欲襲衞曰雖不可入多俘而歸有罪不及死伯宗曰不可衞唯信晉故師在其郊而不設備若襲之是棄信也雖多衞俘而晉無信何以來諸侯乃止師還愚謂由是觀之衞晉特以宋之辭㑹而遽不勝其憤興大衆援吳楚之兵以伐諸侯帝王之裔其罪自見矣夏六月邾子來朝正傳曰汪氏云蓋成公即位而始朝也夫天王崩報赴諸侯所當奔喪之不遑而乃朝魯據事直書觀者自見其不臣之罪矣公孫嬰齊如晉正傳曰嬰齊叔肸子書公孫嬰齊如晉著非禮也夫邦交之禮有㑹同聘弔而已今據左氏云子叔聲伯如晉命伐宋則是非禮之行也夫以天王之喪不奔而汲汲於謀伐宋以如晉其罪大矣壬申鄭伯費卒正傳曰費鄭伯名謚悼公書壬申鄭伯費卒紀隣國之大故也書日者報之詳故詳書之非有可與而日之也故凡日者不足以為與之矣秋仲孫蔑叔孫僑如帥師侵宋正傳曰書仲孫蔑叔孫僑如帥師侵宋紀無名之兵也左氏曰秋孟獻子叔孫宣伯侵宋晉命也胡氏曰魯遣二卿為主將動大衆焉有事於宋而以侵書者潜師侵掠無名之意葢陋之也於衞孫良夫亦然上三年嘗㑹宋衞同伐鄭矣次年宋使華元來聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背楚求成于晉而魯衞與宋又同盟于蟲牢矣今而有事于宋上卿授鉞大衆就行而師出無名可乎故特書侵以罪之也左氏載此師晉命也後二年宋來納幣請伯姬焉則此師為晉而舉非魯志明矣兵戎有國之重事邦交人道之大倫聽命於人不得已焉將能立乎春秋所以罪之也愚謂他不足恠也曽謂以獻子之賢而不知乎楚公子嬰齊帥師伐鄭正傳曰書楚公子嬰齊帥師伐鄭譏不義也而其伐喪之罪可見矣左氏曰楚子重伐鄭鄭從晉故也觀此則楚之伐鄭無他罪惟以其從晉之私憤耳夫以鄭伯費之喪未踰時在禮諸侯有吊賻相恤之義而楚遽興大衆逞私憤雖冒伐喪之名而不顧真夷狄之行矣冬季孫行父如晉正傳曰書季孫行父如晉著聘禮也左氏曰冬季文子如晉賀遷也夫遷都大事也以賀遷而聘為有詞矣故曰近禮而無害於義也晉欒書帥師救鄭正傳曰書晉欒書帥師救鄭善其救也夫鄭舎楚從晉棄楚即晉一宜救也楚伐鄭之喪二宜救也故春秋書以善之左氏曰晉樂書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知荘子范文子韓獻子諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善均從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎胡氏曰荆楚僣號稱王聖人比諸大逆而不赦者大一統以存周使民著於君臣之義也鄭能背逆即順是改過遷善出幽谷而遷喬木也嬰齊為是帥師又因其喪而伐之不義甚矣經所以深惡之也書卿帥師伐鄭於文無貶辭何以知其深惡楚也下書欒武子帥師救鄭則知之矣凡書救者未有不善之也而伐者之罪著矣按左氏晉楚遇于桑隧軍師之欲戰者八人武子遂還則無功也亦何善之有曰此春秋之所以善欒書也兩軍相加兵刃既接折馘執俘計功受賞此非仁人之心王者之事故舞干羽而苗格者舜也因壘而崇降者文也次于陘而屈完服者齊桓也㑹于蕭魚而鄭不叛者晉悼也武子之能不遷戮而知還也亦庶㡬哉簡王二年七年晉景十六年齊頃十五年衞定五年蔡景八年鄭成公睔元年曹宣十一年陳成十五年杞桓五十三年宋共五年秦桓二十一年楚共七年吳夀夢二年春王正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛正傳曰何以書志異也夫牛祀天之大牲也鼷䑕再食其角異之大者也書之旣以志異又使人思之以為神不歆非類魯之郊天非類也天或不歆之故䑕再食其牛角乎聖人之意深矣書正月者古之郊天以冬至十一月周之正月是也其不日者忘乎日有司之怠也免牛則不郊矣穀梁曰免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然免牲不曰不郊免牛亦然杜氏曰稱牛未卜曰免放也吳伐郯正傳曰呉古荆蠻之國太伯之後也書吳伐郯紀吳人侵中國之始也左氏曰春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣愚謂按此則當時已疾其入伐中國矣此亦春秋之意乎其稱國而不爵者魯史以逺而畧之也胡氏謂稱國以伐為狄之者非聖人之意也他倣此夏五月曹伯來朝正傳曰書曹伯來朝著邦交之禮也汪氏曰蓋成公嗣位而始來朝也夫以嗣位來朝則得邦交之正禮事大之常道而非為私而來矣故春秋書以與之不郊猶三望正傳曰書不郊猶三望則非禮之非禮自見矣夫魯之郊非禮也其三望亦非禮也天子祭天地日月星辰天下山川夫山川則四望也魯諸侯祭境内泰山於一望得禮矣而又僣三望而四焉非僣天子之禮乎故春秋非之意在言表矣胡氏曰呉郡朱長文曰禮天子有四望諸侯則蔡境内山川而已魯當祭泰山泰山魯之境也禮所得祭故不書三望僣天子禮是以書之其説是矣楚子軫言三代命祀祭不越望而曰江漢沮漳楚之望非也楚始受封濱江之國漢水沮漳豈其境内哉此亦據後世并兼封畧言之爾秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衞侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵正傳曰書楚伐鄭著憤怨之兵也書諸侯救鄭大攘夷之義也書同盟見同心於攘夷狄尊中國也左氏曰秋楚子重伐鄭師于汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉八月同盟于馬陵尋蟲牢之盟且莒服故也晉人以鍾儀歸囚諸軍府胡氏曰楚人軍旅數起頻年伐鄭以其背已而從諸夏也與莊之欲討徵舒而入陳亦異矣書大夫之名氏書帥師書伐而無貶詞者所謂不待貶絶而罪自見者也晉合八國之君親往救鄭則攘夷狄安中國之師也欲著其善故特書救鄭以美之言救則楚罪益明而鄭能背夷即華善亦著矣前此晉遣上將諸國不與焉此則其君自行而㑹合諸國則楚人暴横慿陵諸夏之勢益張亦可見矣故盟于馬陵而書同盟者同病楚也愚謂胡氏謂不待貶絶而罪自見此春秋之正義聖人之所竊取而因魯史之文者也若皆以此觀春秋豈不灑然矣哉然又以為書名書帥師書伐而無貶詞則亦未免猶泥於義例之説也公至自㑹正傳曰書公至自㑹始終其善㑹也且以謹君之動而重反面之禮也呉入州來正傳曰州來楚之附庸要害之地書呉入州來著交暴之兵也而傷中國霸圖之不振聖人攘夷之情見矣左氏曰楚圍宋之役師還子重請取於申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以禦北方若取之是無申吕也晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黒要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黒要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪惏事君而多殺不辜余必使爾罷於奔命以死巫臣請使於呉晉侯許之吴子壽夢説之乃通呉于晉以兩之一卒適吳舎偏兩之一焉與其射御教呉乗車教之戰陳教之叛楚寘其子狐庸焉使為行人於吳呉始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反於是乎一歲七奔命蠻夷屬於楚者呉盡取之是以始大通呉於上國愚謂此州來之入巫臣之為也有制夷之功亦有召夷之患如病人之苦毒藥者又引毒藥以攻之一毒去而一毒生豈其國家之利乎冬大雩正傳曰書冬大雩則非禮之禮自見矣榖梁曰雩不月而時非之也冬無為雩也餘義見于前衞孫林父出奔晉正傳曰林父良夫子書衞孫林父出奔晉著叛君之罪也左氏曰衞定公惡孫林父冬林父出奔晉衞侯如晉晉反戚焉愚謂戚者林父之邑左氏謂衞侯如晉晉反戚者髙氏所謂恃晉反衞也夫君臣之義無所迯於天地之間者也林父忠義苟孚於君則何必去父母之邦以堕先君之世祿而定公惡之必有以先見其惡矣及恃晉反衞終成逐君之惡宜哉簡王三年八年晉景十七年齊頃十六年䘙定六年蔡景九年鄭成二年曹宣十二年陳成十六年杞桓五十四年宋共六年秦桓二十二年楚共八年吳夀夢三年春晉侯使韓穿來言汶陽之田歸之于齊正傳曰書晉侯使韓穿來言汶陽之田歸之于齊並譏之也夫晉侯使韓穿來言晉以一言與之又以一言奪之是晉之失也魯以晉力復之又以晉言歸之是魯之失也左氏曰晉侯使韓穿來言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷徳畏討無有二心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有貳命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士貳其行士也罔極二三其徳七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而況霸主霸主將徳是以而二三之其何以長有諸侯乎公羊曰鞌之戰齊師大敗齊侯歸弔死視疾七年不飲酒不食肉晉侯聞之曰嘻奈何使人之君七年不飲酒不食肉請皆反其所侵地愚謂果如公羊此言則晉侯小不忍而忘大義也夫汶陽之田魯舊物也齊還其所侵於魯天下之大義也惜也晉不足以知此宜其伯圖之不振也胡氏曰汶陽之田本魯田也魯人恃大國之威以兵力脅齊得其故地而不正疆理於天王則取之不以其道也郤克戰勝令於齊曰反魯衞之侵地齊既從之今復有命俾歸諸齊則歸之不以其道也而齊人貪得晉有二命穿也列卿無所諫止皆罪也蓋得之矣晉欒書帥師侵蔡正傳曰書晉欒書帥師侵蔡則陵暴之罪自見矣夫蔡有罪奉詞致討可也而以中國霸主為盜賊之計可乎許氏曰侵蔡報伐鄭也高氏曰為其不與晉盟㑹也此皆以私憤報復非仗天下之大義聲罪致討者也左氏曰晉欒書侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣愚謂由是觀之則晉之君臣惟功利之急而非有服天下之逺圖其得罪於春秋宜矣公孫嬰齊如莒正傳曰書公孫嬰齊如莒非禮也左氏曰聲伯如莒逆也夫大夫非君命不出境故聘禮也託而逆婦非禮也是故春秋非之宋公使華元來聘正傳曰來聘行昏聘之禮也左氏曰宋華元來聘聘共姬也是矣何以書志禮也賢伯姬也伯姬賢也夏宋公使公孫壽來納幣正傳曰書宋公使公孫壽來納幣志禮也表伯姬之賢也左氏曰禮也公羊子曰納幣不書此何以書録伯姬也愚謂合二氏之言而觀之則納幣為為昏禮之常而亦書者以伯姬之賢而表異之爾若胡氏以使卿為非禮而書之則是譏其非禮矣豈其然乎夫昏人道之始禮之至重者也陽先乎陰男先乎女凡可以致其重者無不重焉故丈夫親為授綏親行合卺之禮而不以為卑屈皆所以致重之之意也曽謂以伯姬之賢重之以公孫壽即以為非禮而譏之乎參以二氏之傳則知其為禮書之以録伯姬之賢而謂譏之者誤矣觀於九年二月季孫行父如宋致女非卿耶晉殺其大夫趙同趙括正傳曰書晉殺其大夫趙同趙括著專殺之罪也夫大夫皆命於天子故其禁曰無專殺大夫今按左氏曰晉趙荘姬為趙嬰之士故譛之于晉侯曰原屏將為亂樂郤為徵六月晉討趙同趙括武從姬氏畜于公官以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者其懼矣三代之令主皆數百年保天之禄夫豈無辟王頼前哲以免也周書曰不敢侮鰥寡所以明徳也乃立武而反其田焉由是觀之則同括無罪特以譛見殺耳是專殺之罪成於譛也春秋書之晉侯之罪著矣不必如胡氏所謂稱國以殺而不去其官而後可以見晉之失政刑矣故春秋之不明以義例害之耳秋七月天子使召伯來賜公命正傳曰書天子使召伯來賜公命則其失禮自見矣榖梁曰禮有受命無來錫命錫命非正也胡氏曰諸侯嗣立而入見則有賜已修聘禮而來朝則有賜敵王所愾而獻功則有賜成公即位服喪已畢而不入見既更五服一朝之歲矣而不如京師又未嘗敵王所愾而有功也何為來賜命乎召伯者縣内諸侯為王卿士者也來賜公命罪邦君之不王譏天子之僣賞也臨諸侯曰天王君天下曰天子蓋一人之通稱冬十月癸卯杞叔姬卒正傳曰書杞叔姬卒志歸女之大故也左氏曰來歸自杞故書晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯正傳曰書晉侯使士燮來聘僑如㑹士燮齊邾伐郯著陵暴之罪也且見成於晉也左氏曰晉士燮來聘言伐郯也以其事呉故公賂之請緩師文子不可曰君命無貳失信不立禮無加貨事無貳成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師㑹伐郯由是觀之則伐郯之師强陵弱衆暴寡此謀起於晉晉之罪也魯不能自立而從之魯之罪也呉氏曰吳初伐郯季孫固曰中國不振旅蠻夷入伐而莫或恤亡無日矣當其伐旣不能救及其旣成豈獲已也而又率諸國伐之何義乎前書來聘下書㑹伐晉侯之為盟主可見矣魯既知其不可從大國之令而不敢違其不能立亦可知矣衞人來媵正傳曰何以書志禮也公羊曰録伯姬也左氏曰衞人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否程子曰媵小事不書伯姬之嫁諸侯皆來媵之故書以見其一女子之賢尚聞於諸侯況君子乎胡氏曰媵者何諸侯有三歸嫡夫人行則姪娣從二國來媵亦以姪娣從凡一娶九女所以廣繼嗣三國來媵非禮也夫以禮制欲則治以欲敗禮則亂而諸侯一娶十有二女則是以欲敗禮矣備書三國以明逾制為後戒也愚謂禮於衞晉二國之媵無貶獨齊人來媵則為異姓且越禮矣簡王四年九年晉景十八年齊頃十七年卒䘙定七年蔡景十年鄭成三年曹宣十三年陳成十七年杞桓五十五年宋共七年秦桓二十三年楚共九年吳夀夢四年春王正月杞伯來逆叔姬之喪以歸正傳曰書杞伯來逆叔姬之喪以歸葢善之也善其悔也善歸乎正也左氏曰春杞桓公來逆叔姬之喪請之也把叔姬卒為把故也逆叔姬為我也愚謂把伯來請逆則叔姬未有可出之罪及歸魯不得其所而死是把致之也此把伯所以悔而來請逆其喪以歸云歸者歸其家也婦人謂夫家為歸也春秋善改過遷善故與之榖梁引以為夫無逆出妻之喪而為之是使人絶改過遷善之門矣胡氏曰凡筆於經者皆經邦大訓也杞叔姬一女子爾而四書于策何也有男女然後有夫婦有夫婦然後有父子故春秋慎男女之配重大昏之禮以是為人倫之本也事有大於此者乎男而賢也得淑女以為配則自家刑國可以移風俗女而賢也得君子以為歸則承宗廟奉祭祀能化天下以婦道豈曰小補之哉夷攷杞叔姬之行雖賢不若宋共姬亦不至如鄫季姬之越禮也杞伯初來朝魯然後出之卒而復逆其喪以歸者豈非叔姬本不應出故魯人得以義責之使復歸𦵏乎魯在春秋時内女之歸不得其所者有矣聖人詳録其始卒欲為後鑒使得有終而無弊也其經世之慮逺矣公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲正傳曰蒲衞地也書公㑹晉及諸侯同盟志譏也其同不同於事可考矣左氏曰為歸汶陽之田故諸侯貳於晉晉人懼㑹于蒲以尋馬陵之盟季文子謂范文子曰徳則不競尋盟何為范文子曰勤以撫之寛以待之堅疆以御之明神以要之柔服而伐貳徳之次也是行也將始㑹呉吳人不至胡氏曰按左氏為歸汶陽之田故諸侯貳於晉晉人懼㑹于蒲以尋馬陵之盟夫盟非固結之本也衞獻公言于甯喜求復國喜曰必子鮮在不然必敗小邾射以句繹來奔曰使季路要我吾無盟夫信在言前者不言而自喻誠在令外者不令而自行晉初下令於齊反魯衞之侵地而齊不敢違者以其順也齊既從之魯君親往拜其賜矣復有貳命俾歸諸齊一與一奪信不可知無惑乎諸侯之解體也晉人不知反求諸己惇信明義以補前行之愆而又欲刑牲㰱血要質鬼神以御之是從事於末而不知本矣特書同盟以罪晉也愚謂觀於二傳蓋得之矣然他經書同盟以為同心者泥一字之文不亦異乎公至自㑹正傳曰書公至自㑹謹出入也君舉必書況逺出乎二月伯姬歸于宋正傳曰書伯姬歸于宋重昏禮也昏禮人道之始也夏季孫行父如宋致女正傳曰季孫行父卿也書季孫行父如宋致女紀異禮也以著伯姬之賢也致女使卿異之也致女而書異之也公羊曰未有言致女者此其言致女何録伯姬也榖梁曰致女詳其事賢伯姬也程子曰女既嫁父母使人安之謂之致女古者三月而廟見始成婦也伯姬賢魯國重之故使卿致也愚謂觀此則胡氏前於宋使公孫壽來納幣以使卿非禮書之為貶則誤矣又按左氏載季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入觀此亦可見一時禮意之隆而伯姬之賢益彰矣晉人來媵正傳曰書晉人來媵志禮之正也著伯姬之賢也左氏曰禮也夫禮一國嫁女二國媵之其姪娣皆從禮之正也公羊曰媵不書此何以書録伯姬也愚故曰著伯姬之賢也胡氏曰伯姬賢行著於家故致女使卿特厚其嫁遣之禮賢名聞于逺故諸國爭媵信其無妬忌之行程氏以為一女子之賢尚聞於諸侯況君子哉或曰魯女雖賢豈能聞於逺乎曰古者庶女與非敵者則求為媵固為之擇賢小君則諸侯之賢女白當聞矣愚謂觀此説則前公孫壽納幣使卿為特厚伯姬之賢不得為非禮矣且此亦稱人又何義乎秋七月丙子齊侯無野卒正傳曰無野齊侯名名之無他義則夫先儒以名不名取義者惑矣書齊侯無野卒紀與國之大故也書日者報之詳也則夫以日不日取義者惑矣晉人執鄭伯晉欒書帥師伐鄭正傳曰書晉人執鄭伯見其執之非也書晉欒書帥師伐鄭見其伐之非也左氏曰秋鄭伯如晉晉人討其貳於楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭愚謂按此則晉之惡自見矣夫國君於逺人不服當修文徳以來之既來之則安之可也孟子曰治人不治反其智愛人不親反其仁楚人以重賂求鄭鄭貪其賂而與公子成㑹于鄧則鄭貳於楚背華而從夷固有罪矣晉於鄭伯復來歸歸斯受之可也旣來則安之可也不知自反乃執諸銅鞮猶之人來禮已而執之座上可乎又使帥師伐之而乗其虚如執禮已者於座上又使乗其主不在而掠其家可乎故直書其事不待人晉而罪自見矣冬十有一月葬齊頃公正傳曰書葬齊頃公禮也諸侯五月而葬同盟至故有恤隣之禮焉楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆正傳曰鄆莒别邑也書楚公子嬰齊帥師伐莒著楚罪也書莒潰楚人入鄆甚楚罪也聖人抑楚尊周之情見矣左氏曰冬十一月楚子重自陳伐莒圍渠邱渠邱城惡衆潰奔莒戊申楚入渠邱莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫詩曰雖有絲麻無棄菅蒯雖有姬姜無棄憔悴凡百君子莫不代匱言備之不可以已也胡氏曰孟子曰鑿斯池也築斯城也與民守之效死而民不去是則可為也夫鑿池築城者為國之備所謂事也效死而民不去為國之本所謂政也莒恃其陋不修城郭浹辰之間楚克其三都信無備矣然兵至而民迯其上不能使兵效死而不去則昧於為國之本也雖隆莒之城何益乎故經於莒潰特書日以謹之者以明城郭溝池重門擊柝皆守邦之末務必以固本安民為政之急耳愚謂此言是也但謂特書日以謹之云云則鑿矣秦人白狄伐晉正傳曰書秦人白狄伐晉重秦罪也按左氏伐晉之舉與諸侯貳故也晉如有罪約與國請王命聲罪致討夫誰敢不服今乃不請王命而伐之一罪矣又援白狄而伐之是猶引外人而攻其閲墻之兄弟可乎二罪矣又如引毒藥以攻疾疾去而毒病愈甚可謂得計乎三罪矣胡氏曰經所謹者華夷之辨也晉嘗與白狄伐秦秦亦與白狄伐晉族類不復分以武王伐商誓師牧野庸蜀𦍑髳微盧彭濮皆與焉豈亦不謹乎除天下之殘賊而出民於水火之中雖蠻夷戎狄以義驅之可也亦慮其同惡相濟貽患於後也中國友邦自相侵伐已為不義又與非我族類者共焉不亦甚乎晉既失信復聽婦人讒説殺其世臣而諸侯皆貳秦狄交伐比事以觀可謂深切著明矣愚謂此説是也至於謂稱人為貶詞則觀所書不待稱人而貶責之義見矣鄭人圍許正傳曰其君不在皆其大夫國人之謀故曰鄭人衆之稱也書鄭人圍許志詭謀以圖全也左氏曰示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君愚謂信斯言也則謀雖詭而意正矣項羽執太公將烹之以告漢髙祖曰吾與項王結為弟兄吾翁即若翁而欲烹而翁幸分我一盃羮項羽乃不烹太公亦此意耳城中城正傳曰中城者内宫之外外城之内也書城中城則其是非自見矣左氏曰書時也榖梁曰城中城者非外民也由二傳觀之城於冬為時城中城為非為外民故城中城雖時猶非也胡氏曰經世安民視道之得失不倚城郭溝池以為固也榖梁子謂凡城之誌皆譏其説是矣莒雖恃陋不設備至使楚人入鄆苟有令政使民效死而不潰冦亦豈能入也城非春秋所貴而書城中城其為儆守益微矣王公設險以守其國非歟曰百雉之城七里之國設險之大端也謹於禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僣限隔上下者乃體險之大用也獨城郭溝池之足恃乎簡王五年十年晉景十九年卒齊靈公環元年衛定八年蔡景十一年鄭成四年曹宣十四年陳成十八年杞桓五十六年宋共八年秦桓二十四年楚共十年呉壽夢五年春衞侯之弟黒背帥師侵鄭正傳曰書衞侯之弟黒背帥師侵鄭譏伐危也鄭伯執在晉矣乗其虚危伐之得為武乎不行聲罪之師而潜師掠境為盜賊之計耳故春秋直書而其罪見矣左氏曰衞子叔黒背侵鄭晉命也愚謂不揆於義而惟晉命之從以陷於不義見衞之無人矣胡氏乃又謂其曰衞侯之弟者以子叔黒背有寵愛之私故孫林父甯殖得以出衞侯衎而立黒背之子剽特書弟以為後戒則去經之本指甚逺矣葢其書弟自是實事耳夏四月五卜郊不從乃不郊正傳曰不從者不從人謀也書夏四月五卜郊不從乃不郊則非禮自見矣夫魯之郊非禮也古者郊以至日故不卜郊考前經可見今所卜者葢是祈榖四月乃四陽之月夏之二月也因不從不郊而書之則魯僣竊之罪見矣榖梁曰五卜強也則又非禮矣公羊曰不免牲故言乃不郊也五月公㑹晉侯齊侯宋公衞侯曹伯伐鄭正傳曰書公㑹晉齊宋衞曹五國之君伐鄭而伐之善惡自見矣左氏曰鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立太子州蒲以為君而㑹諸侯伐鄭鄭子罕賂以襄鍾子然盟於修澤子駟為質辛巳鄭伯歸愚謂左氏誤矣豈有父病未卒而遽立其子以㑹者乎然則是篡也蓋鄭伯在晉晉與諸侯伐而歸之以求成也夫伐其亂可也歸其君亦可也成其平亦可也而使其國有殺立之禍亂者誰歟故春秋書之齊人來媵正傳曰書齊人來媵著非禮也禮同姓媵異姓否媵以二國而不以三國以九女而不以十二女魯伯姬之嫁晉衞來媵矣齊又媵於魯則為異姓為三國為十二女矣其來者受者皆非禮也公羊曰三國來媵非禮是也然又以為皆録伯姬婦人以衆多為侈則其言支矣丙午晉侯獳卒正傳曰獳晉侯名書晉侯獳卒紀霸國之大故也諸侯有弔賻相恤之禮焉秋七月公如晉正傳曰書公如晉志弔禮也而其非禮見矣禮必以序稱情而行者也天王崩魯不如周故不見於策書今晉侯卒隣國固有奔喪弔賻之禮事大之儀然使卿大夫往而已今又不行於天王而行於盟主可得為循序稱情之禮乎左氏曰公如晉晉人止公使送葬於是糴茷未反冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也胡氏曰此葬晉侯也而不書諱之也天子之喪動天下属諸侯諸侯之喪動通國属大夫公之喪晉侯非禮也唯天子之事焉可也傳以晉人止公送葬諸侯莫在焉魯人辱之故諱而不書非矣假令諸侯皆在魯人不以為辱而可書乎愚謂奔喪吊賻諸侯親往者事天子之禮使大夫士往者事大之禮也今不行於周而行於晉非禮也左氏謂公如晉晉人止之使送葬晉侯之卒至是三月非葬期二傳皆以為葬晉侯非也初本來奔弔而晉人脅之使送葬耳然則書如不書𦵏宜也非諱也然禮有諸侯五月而𦵏同盟至之文據胡子之説則禮之文皆非歟然而此既不行於今使大夫往可也冬十月正傳曰無事亦書時月義見于前春秋正傳卷二十三
