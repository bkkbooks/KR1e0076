body:
  text: 春秋正傳卷三十二明湛若水撰昭公景王二十五年崩二十有二年晉頃六年齊景二十八年衛靈十五年蔡悼二年鄭定十年曹悼四年陳惠十年杞平十六年宋元十二年秦哀十七年楚平九年吳僚七年春齊侯伐莒正傳曰齊侯齊景也書齊侯伐莒志矜憤之兵也左氏曰春王三月甲子齊北郭啓齊大夫帥師伐莒莒子将戰苑羊牧之莒大夫諌曰齊帥賤其求不多不如下之大國不可怒也弗聴敗齊師于夀餘齊侯伐莒莒子行成司馬竈齊大夫如莒涖盟莒子如齊涖盟盟于稷門之外莒於是大惡其君宋華亥向寜華定自宋南里出奔楚正傳曰書宋華亥向寧華定自宋南里出奔楚則宋再逸賊楚重納叛之罪並見矣左氏曰楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寜以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若恵保敝邑無亢不衷以獎亂人孤之望也唯君圖之楚人患之諸侯之戌謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬邊卬為大司徒樂祁為司城仲幾為左師樂大心為右師樂輓為大司寇以靖國人胡氏曰華向誘殺羣公子又刼其君取其太子母弟為質又求助于吴楚蠻夷入據其國都以叛此必誅不赦之賊也宋宜竭力以討之於内諸侯宜協心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戌怠於救患固請逸賊而宋又從之則皆罪也故晉荀吴齊苑何忌衛公子朝曹大夫皆略而不書其曰自宋南里者譏宋之縱釋有罪不能致討出奔楚者不待貶絶而亢不衷奨亂人之惡自見矣大蒐于昌間正傳曰昌間魯地何以書胡氏曰昭公之時凡三書蒐或以非其時或以非其地而大意在權臣専行公不與也三綱軍政之本古者春蒐夏苗秋獮冬狩皆於農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民於軌物而非馳射擊刺之末矣是故觀於有莘少長有禮知可用也而文公遂霸臨於洛陽袒而𤼵䘮為義帝也而漢祖遂王今魯國其君則設兩觀乗大輅其臣則舞佾歌雍徹其宰則據大都執國命而軍政之本亡矣何以蒐為此春秋所書為後戒之意也夏四月乙丑天王崩正傳曰書乙丑天王崩志天下之大變也左氏曰王子朝景王庶長子賔起子朝傅有寵于景王王與賔孟説之欲立之劉獻公名摯之庶子伯蚠事單穆公名旗惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰鷄其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賓起殺之盟羣王子於單氏愚謂由是觀之則景王不得崩於正寢非以正終矣六月叔鞅如京師𦵏景王正傳曰書叔鞅如京師𦵏景王著非禮也天子七月而𦵏同軌畢至今景王踰月而𦵏無天王之禮矣魯公不奔天子之喪而使大夫往㑹𦵏失禮不臣之大者也故春秋詳書以並見之王室亂正傳曰書王室亂志内變也左氏曰丁巳𦵏景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子壬戌劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫癸亥單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣從之樊頃子曰非言也必不克遂奉王以追單子及領大盟而復殺摯荒以説劉子如劉單子亡乙丑奔于平畤羣王子追之單子殺還姑𤼵弱騣延定稠子朝奔京丙寅伐之京人奔山劉子入于王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也愚謂王室京師也京師天下之本本亂則天下亂矣故春秋書之聖人憂世之志可見矣公羊以為王室亂言不及外鑿矣胡氏曰何言乎王室亂王者以天下為家則以京師為室京師者本也周公作立政曰迪惟有夏乃有室大競其作䲭鴞詩以遺成王亦曰既取我子無毁我室皆指京師言之也以京師為室王畿為堂諸夏為庭戶四夷為藩籬治外者先自内治逺者先自近本亂而末治者否矣景王寵愛子朝使孽子匹嫡以本亂者其言王室譏國本之不正也本正而天下定矣劉子單子以王猛居于皇正傳曰劉子名蚠單子名旗以者以之也後倣此榖梁以為稱以者不以者也胡氏為尊不以乎卑非矣左氏曰單子欲告急於晉秋七月戊寅以王如平畤遂如圃車次于皇愚按猛太子夀之弟景王之子夀卒宜立而八年未立者王愛庶子朝欲立之未果而崩故諸大臣競欲立君諸王子争立此王室所以亂然以正則有猛以寵則有朝立猛正也立朝非正也故劉單二公奉之居于皇書劉子單子以王猛居於皇志得正也秋劉子單子以王猛入于王城正傳曰書劉子單子以王猛入于王城善得正也左氏曰劉子如劉單子使王子處守于王城盟百工于平宫辛夘鄩肹伐皇大敗獲鄩肹壬辰焚諸王城之市八月辛酉司徒醜以王師敗績于前城百工叛己巳伐單氏之宫敗焉庚午反伐之辛未伐東圉冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕温原之師以納王于王城庚申單子劉蚠以王師敗績于郊前城人敗陸渾于杜胡氏曰猛未踰年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也君前臣名劉單不名而王名不嫌於倒置乎曰君前臣名常禮也禮當其變臣有不名名其君而不嫌者矣王不當稱未踰年而稱王名不當稱立為君而稱猛皆禮之變也惟可與權者能知其變而不越乎道之中此正論也又謂再書劉單之以王詞繁而不殺必有羙惡焉劉單專國柄書而未足故再書以著上下舛逆為後世戒則過矣盖春秋就事論事而羙惡見焉二子之翊戴王猛正矣不保其往固仲尼之心也冬十月王子猛卒正傳曰書王子猛卒志天下之大變也通鑑王猛為庻弟子朝所弑左氏曰十一月乙酉王子猛卒不成喪也己丑敬王即子匄猛母弟即位館于子旅氏十二月庚戌晉籍談荀躒賈辛司馬督帥師軍于隂籍談軍隂于侯氏荀躒軍侯氏于谿泉賈荀軍谿泉次于杜司馬督軍王師軍于汜于解次於任人閏月晉箕遺樂徴右行詭濟師于前城軍其東南王師軍于京楚辛丑伐京毁其西南十有二月癸酉朔日有食之正傳曰書癸酉朔日有食之志天變也敬王元年二十有三年晉頃七年齊景二十九年衞靈十六年蔡悼三年卒鄭定十一年曹悼五年陳恵十一年杞平十七年宋元十三年秦哀十八年楚平十年吴僚八年春王正月叔孫舍如晉正傳曰書叔孫舍如晉志邦交之禮也癸丑叔鞅卒正傳曰書叔鞅卒志國卿之大故也晉人執我行人叔孫舍正傳曰書晉人執我行人叔孫舍失信義也左氏曰邾人城翼邾邑還將自離姑邾邑公孫鉏曰魯将御我欲自武城還循山而南徐鉏丘弱茅地三大夫曰道下遇雨将不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鉏弱地邾人愬于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服囘在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆将以叔孫與之叔孫聞之去衆與兵而朝士彌牟即士景伯謂韓宣子曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國将焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一舘士伯聴其辭而愬諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病将館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及将歸殺而與之食之叔孫所館者雖一日必葺其墻屋去之如始至愚謂觀此傳叔孫卑邾大夫而不與之坐及宣子将以叔孫與邾則去衆與兵而朝以弭其難獻子求貨請冠而皆隨機應之及所舘者雖一日必葺其墻屋去之日如始至跡其始末以忠信待人而於顛沛之際畧無自失可謂不辱君命矣晉乃執之於通聘之時可謂無信義之甚者也何以為盟主故春秋書之晉人圍郊正傳曰郊周邑子朝在焉據以作亂故敬王之師及晉師圍之獨書晉師者為晉志也書晉人圍郊見勤王之不力也言晉人則大夫也書大夫見晉侯之不親往也晉侯之不親往則非方伯率連帥勤王之義也其忘君無王之罪見矣左氏曰春王正月壬寅朔二師二師晉師王師不以告故不書圍郊癸夘郊鄩潰丁未晉師在平隂王師在澤邑王使告閒庚戌還胡氏曰按左氏晉籍談荀躒帥師軍于侯氏箕遺樂徴濟師軍其東南正月二師圍郊郊子朝邑也既不書大夫之名氏又不稱師而曰晉人㣲之也所謂以其事而㣲之者也當是時天子蒙塵晉為方伯不奔問官守省視器具徐遣大夫往焉勤王尊主之義若是乎書晉人圍郊而罪自見矣夏六月蔡侯東國卒于楚正傳曰書蔡侯東國卒于楚志不得其正也諸侯薨于正寢正也蔡侯東國為楚人行譛為逐君者所立王父殺父見用又奔之朝于楚而卒是始終生死不得其正矣故春秋惡之秋七月莒子庚輿來奔正傳曰書莒子庚輿來奔罪自奔也左氏曰莒子庚輿著丘公弟虐而好劍苟鑄劍必試諸人國人患之又将叛齊烏存帥國人以逐之庚輿将出聞烏存執殳而立於道左懼将止死苑羊牧之曰君過之烏存以力聞可矣何必以弑君成名遂來奔由是觀之則庚輿之惡為國人所不容乃自奔也胡氏曰三代之得失天下仁與不仁而已矣苟無仁心甚則身弑國亡不甚則身危國削庚輿免死道左而出奔於魯幸耳入國不書而書其出奔惡之也戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧正傳曰髠胡子名逞沈子名夏齧陳大夫書吴敗六國之師于雞父著詭謀之兵也書滅書獲甚吴罪也吴恃其强馮陵中國無故而伐州來六國救之正也而又以詭詐敗滅二國之君而獲其大夫是干先王之誅矣故春秋書之深著其罪也公羊亦謂以詐戰之辟言之是也左氏曰吳人伐州來楚薳越帥師及諸侯之師奔命救州來吴人禦諸鍾離子瑕卒楚師熸吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫齧壮而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃揺心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吴子從之戊辰朔戰于雞父吴子以罪人三千先犯胡沈與陳三國爭之吴為三軍以繫於後中軍從王光帥右掩餘帥左吴之罪人或奔或止三國亂吴師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也不言戰楚未陳也愚謂按此則楚雖夷狄六國從之疑於從夷然從之以救州來則所從者正即不可以夷狄之矣楚與六國救之為是則吴敗之滅之獲之為非他皆不足論也春秋就事論事苟是矣豈復較其從夷乎左氏之言皆實録也至於謂書髠逞滅獲夏齧為君臣之詞則鑿矣公穀胡氏用之豈春秋之本指乎天王居于狄泉尹氏立王子朝正傳曰天王敬王匄尹氏周之世卿也公羊謂此未三年其稱天王何著有天子是也然而立位一日即為天子何待三年書天王居于狄泉正名分也而亂賊之罪可從而誅矣書尹氏立王子朝誅亂賊也而簒立之罪可從而定矣左氏曰夏四月乙酉單子穆公取訾子朝邑劉子即伯蚠取墻人直人二邑皆屬子朝六月壬午王子朝入于尹癸未尹圉尹文公名誘劉佗劉蚠族敬王黨殺之丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還己丑召伯奐南宫極以成周人戌尹庚寅單子劉子樊齊以王如劉甲午王子朝入于王城次于左巷秋七月戊申鄩羅納諸荘宫尹辛敗劉師于唐丙辰又敗諸鄩甲子尹辛取西闈丙寅攻蒯蒯潰愚謂此本傳也正天子之名分誅世卿之簒立春秋撥亂反正之情見矣榖梁為立者不宜立之説胡氏因之義例之説行以其小者害其大而春秋之指亡矣八月乙未地震正傳曰書地震志異也地道主静而震焉則異矣故書之以為戒左氏曰八月丁酉南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其三川震今西王入于王城謂之西王之大臣亦震天棄之矣東王居于狄泉謂之東王必大克杜氏曰經書地震魯地也南宫極為屋所壓而死周地亦震也冬公如晉至河有疾乃復正傳曰書公如晉至河有疾乃復志非所如也左氏曰公為叔孫故如晉及河有疾而復公羊曰何言乎公有疾乃復殺恥也愚謂昭公忘前日之恥非有會同之禮徒以叔孫之故輕身如晉是失禮而近恥辱矣雖至河有疾乃復何足以殺恥乎猶曰無疾則至矣見止矣不得入矣乃所以深恥之也胡氏曰昭公兩朝于晉而一見止五如晉而四不得入焉今此書有疾乃復殺恥也以周公之胄千乗之君執幣帛修兩君之好而不見納斯亦可恥矣有恥而後能知憤知憤而後能自强自强而後能為善為善而後能立身立身而後能行其政令保其國家矣昭公内則受制於權臣外則見陵於方伯此正憂患疢疾有德慧術智保生免死之時也而安於屈辱其處㣲弱無憤恥自强之心其失國出奔死於境外其自取之哉敬王二年二十有四年晉頃八年齊景三十年衛靈十七年蔡昭公申元年鄭定十二年曹悼六年陳惠十二年杞平十八年卒宋元十四年秦哀十九年楚平十一年吴僚九年春王二月丙戌仲孫貜卒正傳曰書仲孫貜卒志國卿之大故也叔孫舍至自晉正傳曰書叔孫舍至自晉重其至也賢叔孫也左氏曰晉士彌牟逆叔孫于箕叔孫使梁其踁待于門内曰余左顧而欬乃殺之右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以久子不腆敝邑之禮将致諸從者使彌牟逆吾子叔孫受禮而歸左氏以書婼至為尊晉非也晉無信義於聘而執其使不足為盟主矣何足尊乎故愚以為書之者賢叔孫而重其至也胡氏曰大夫執而至則名此獨書其姓氏何賢之也叔孫舍以禮立身而不屈於强國以忠事主而不順於强臣此社稷之衛魯之良大夫也使昭公稍有動心忍性强於為善之意舉國以聴豈其死於乾侯觀意如之稽顙於昭子叔孫之以逐君責意如其事可見矣及意如有異志而昭子使祝宗祈死所謂知其無可奈何安之若命者故舍至自晉特以姓氏書其死也公雖在外而特書日以卒之所以表其節為後世勸也愚謂胡氏所論是也其云書姓氏書日以賢之者非也但書其事則竊取之義在賢之矣夏五月乙未朔日有食之正傳曰書日有食之志天變也左氏曰梓慎曰将水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫将積聚也愚謂或以為水或以為旱水旱之相去逺矣二子皆臆説也夫日者太陽之精日食則陽氣不足故虧而見食人君法之宜益修剛徳以弭之此聖人立教之義也若謂某災祥有某事應乃瞽史之言非聖人之意也秋八月大雩正傳曰書八月大雩志非禮也餘義見前丁酉杞伯郁釐卒正傳曰書杞伯郁釐卒志小國之大故也餘見于前冬吳滅巢正傳曰書吳滅巢志貪暴之兵也左氏曰楚子為舟師以畧吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吴不動而速之吴踵楚而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乗舟倉及夀夢帥師從王王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王壹動而亡二姓之帥㡬如是而不及郢詩曰誰生厲階至今為梗其王之謂乎胡氏曰巢楚之附庸實邑之也書吳入州來著陵楚之漸書吴滅巢著入郢之漸四鄰封境之守既不能制則封境震矣四境國都之守既不能保則國都危矣故沈尹戌以此為亡郢之始也春秋内失地不書明此為有國之大罪外取滅皆書明見取滅者之不能有其土地人民則不君矣故諸侯之寳三以土地為首𦵏杞平公正傳曰書𦵏杞平公著諸侯㑹𦵏相恤之義也敬王三年二十有五年晉頃九年齊景三十一年衛靈十八年蔡昭二年鄭定十三年曹悼七年陳惠十三年杞悼公成元年宋元十五年卒秦哀二十年楚平十二年吴僚十年春叔孫舍如宋正傳曰書叔孫舍如宋志聘禮也左氏曰春叔孫婼聘于宋桐門右師樂大心見之語卑宋而賤司城氏樂氏大家昭子即叔孫婼告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡宋公享昭子賦新宫逸詩名昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祈佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也心之精爽是為魂魄魂魄去之何以能久夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父正傳曰黄父即黒壤晉地書㑹于黄父善之也善其謀王室也左氏曰夏㑹于黄父謀王室也趙簡子令諸侯之大夫輸王粟具戌人曰明年将納王宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不會而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師即樂大心不敢對受牒而退士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉胡氏曰按左氏鄭子太叔如晉范獻子曰若王室何對曰王室之不寜大國之憂晉之恥也吾子其早圖之獻子懼乃徴㑹于諸侯㑹于黄父謀王室也趙簡子令諸侯之大夫輸王粟具戌人将納王夫以王猛之無寵單旗劉蚠之屢敗敬王初立子朝之衆召伯奂南宫嚚甘桓公之黨疑若多助之在朝也然會於黄父凡十國而諸侯之大夫無異議焉是知邪不勝正久矣猶有寵愛庶孽配適奪正至於滅亡而不寤者不知幽王晉獻之父子亦何足效哉然則黄父之㑹王事也而無羙辭何也王室不靖亦惟友邦冢君克修厥職以綏定王都非異人任亦何羙之有免於譏貶足矣此春秋以正待人之體也後世以濫賞報臣子所當為之事為臣子者亦受而不辭失此義矣愚謂此書㑹于黄父則聖人竊取與之之義見矣何必羙詞乎有鸜鵒來巢正傳曰書鸜鵒來巢志異也左氏曰書所無也師已曰異哉吾聞文武之世童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與𥜗鸜鵒之巢逺哉遥遥稠父䘮勞宋父以驕鸜鵒鸜鵒往歌來哭童謡有是今鸜鵒來巢其将及乎胡氏曰傳曰鸜鵒不踰濟濟水東北㑹于汶魯在汶南其所無也故書曰有巢者去穴而巢隂居陽位臣逐君象也鸜鵒宜穴處於下而巢居於上季孫宜臣順於家而主祭於國反常為異之兆能以徳消則無其應矣或曰此公子宋有國之祥也愚謂左氏胡氏所言徴應未可知然而反常之異魯國之君臣亦可以警戒矣秋七月上辛大雩季辛又雩正傳曰何以書七月大雩又雩左氏曰書再雩旱甚也胡氏曰左氏以再雩為旱甚聖人書此者以志禦災之非道而區區於禱祠之末也昭公之時雨雹地震四見於經旱乾為虐相繼而起有鸜鵒來巢異之甚也季辛又雩災之甚也考諸列位則國有人焉觀諸天時則猶有眷顧之心未終棄也若反身修徳信用忠賢災異之來必可禦矣昔髙宗肜日雉升鼎耳異亦甚矣聴於祖已克正厥事故能嘉靖殷邦享國長久宣王之時旱魃藴隆災亦甚矣側身修行遇災而懼故能興衰撥亂王化復行此皆以人勝天以徳消變之騐也昭公至是猶不知畏罔克自省而求於禱祠之末将能勝乎故特書此以為後世鍳九月己亥公孫于齊次于陽州正傳曰孫猶避也次于陽州待齊也何以書譏之也著魯不君不臣之罪也昭公不能自立以收政權而使政移於大夫至於惡極勢大然後謀以去之反為其黨所逐播遷於外而宗社不守是君不君而臣不臣也春秋書之其罪並見矣左氏曰季公鳥娶妻於齊鮑文子生甲公鳥死季公亥與公思展季氏族與公鳥公亥兄平子庶叔之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶已以示秦遄魯大夫之妻曰公若即公亥欲使余余不可而抶余又訴於公甫平子弟曰展與夜姑将要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑将殺之公若泣而哀之曰殺是是殺余也将為之請平子使竪勿内日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬭季氏介其難郈氏為之金距平子怒益宫于郈氏且讓之故郈昭伯亦怨平子臧昭伯之從弟會為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老将禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為昭公子且與之出射於外而謀去季氏公為告公果公賁皆公子公果公賁使侍人僚柤告公公寢将以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯名羈懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若洩臣不獲死乃舘於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之平子族黨于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚於費弗許請以五乗亡弗許子家子曰君其許之政自之出久矣隠民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治将藴藴蓄民将生心生心同求将合君必悔之弗聴郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執氷而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之於南門之西遂伐公徒子家子曰諸臣偽刼君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行己亥公孫于齊次于陽州胡氏曰内出奔稱孫隠也次于陽州待齊命也以君伐臣曷為不勝魯自東門遂殺適立庶魯君于是乎失政禄去公室政在季氏於此君已四公矣作三軍盡征其一舍中軍兼有其二民賦入於其家半矣受命救台也遂入鄆帥師取卞也不以聞軍政在其手専矣行父片言而東門氏逐南蒯一動而公子憗奔魯之羣臣亦無敢忠於公室而獻謀者所謂屯難之時也在易屯之六五曰屯其膏小貞吉大貞凶象曰屯其膏施未光也昭公不明乎消息盈虚之理正身率徳擇任忠賢待時馴致不忍一朝之忿求逞其私欲而以羣小謀之其及也宜矣齊侯唁公于野井正傳曰書齊侯唁公于野井志恤難之禮也諸侯失國則諸侯弔之禮也榖梁子曰弔失國曰唁唁公不得入於魯也左氏曰齊侯将唁公于平隂公先至于野井齊侯曰是寡人之罪也使有司待于平隂為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也将求於人則先下之禮之善物也齊侯曰自莒疆以西請致千社以待君命寡人将帥敝賦以從執事唯命是聴君之憂寡人之憂也公喜子家子曰天禄不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如之晉弗從臧昭伯率從者将盟載書曰戮力壹心好惡同之信罪之有無繾綣從公無通外内以公命示子家子子家子曰如此吾不可以盟覊也不佞不能與二三子同心而以為皆有罪或欲通外内且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外内而去君君将速入弗通何為而何守焉乃不與盟公羊曰唁公者何昭公将弑當作殺季氏告子家駒曰季氏為無道僣於公室久矣吾欲殺之何如子家駒曰諸侯僣於天子大夫僣於諸侯久矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大路朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也且夫牛馬維婁委己者也而柔焉季氏得民衆久矣君無多辱焉昭公不從其言終弑而敗焉走之齊齊侯唁公于野井曰奈何君去魯國之社稷昭公曰䘮人不佞失守魯國之社稷執事以羞再拜顙慶子家駒曰慶子免君于大難矣子家駒曰臣不佞陷君於大難君不忍加之以鈇鑕賜之以死再拜顙髙子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗于從者昭公曰君不志吾先君延及䘮人錫之以大禮再拜稽首以袵受髙子曰有夫不祥君無所辱大禮昭公盖祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰䘮人其何稱景公曰孰君而無稱昭公於是噭然而哭諸大夫皆哭既哭以人為菑以幦為席以鞌為几以遇禮相見孔子曰其禮與其辭足觀矣胡氏曰齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣然則何以失國而不反乎禮有本末正身治人禮之本也威儀文辭禮之末也昭公䘮齊歸無戚容而不顧娶孟子為夫人而不命政令在家而不能取有子家子之賢而不能用而屑屑焉習儀以亟能有國乎雖齊侯來唁其禮與辭是矣而方伯連帥之職則未修也又豈所以為禮哉其言曰自莒疆以西請致千社将率敝賦以從而子家子曰失魯而以千社為臣誰與之立且齊君無信不如早之晉書曰唁公亦明其無納公之實譏之也冬十月戊辰叔孫舍卒正傳曰書叔孫舍卒志國卿之大故也善其死也死於忠也左氏曰昭子即叔孫舍自闞歸見平子即意如平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎将若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公於齊與公言子家子命適公館者執之公與昭子言於幄内曰将安衆而納公公徒将殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左師展将以公乗馬而歸公徒執之愚謂按此則舍盖忠於公室者也責意如之逐君成名以辱其子孫及聞意如欲改而事君而適齊以周旋納公及歸見意如異志乃齊於寢析死乃死非所謂死得其所者耶春秋書之而竊取之義自見矣十有一月己亥宋公佐卒于曲棘正傳曰曲棘宋地書宋公佐卒于曲棘善其卒也善其卒於恤患也左氏曰十一月宋元公将為公故如晉夢太子欒即位於廟已與平公元公父服而相之旦召六卿公曰寡人不佞不能事父兄以為二三子憂寡人之罪也若以羣子之靈獲保首領以沒唯是楄柎所以藉幹者請無及先君仲㡬對曰君若以社稷之故私降昵宴羣臣弗敢知若夫宋國之法死生之度先君有命羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祗辱宋公遂行己亥卒于曲棘愚謂此實傳也魯昭公為强臣意如所逐奔齊齊侯但唁之而已未聞有諸侯告方伯連帥而討意如之罪以復昭公者宋元公獨能為昭公之故以如晉首倡大義以恤難定亂其過人逺矣不幸志不競而卒於道路而其義氣已足以風天下也春秋書以善之胡氏曰宋元之夫人曹氏生子妻意如或謂曹氏勿與魯将逐之曹氏告元公元公告欒祁祁曰與之如是魯君必出無民而能逞其志者未之有也魯君失民久矣然則宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不匿其私親之惡者也其賢於當時諸侯逺矣故雖卒於封内而特書其地以别之也愚謂謂特書其地以别之者非也卒于曲棘自是實事書之者憫其志未就而卒于道路也然則死于善與正寢一矣十有二月齊侯取鄆正傳曰鄆魯邑書齊侯取鄆志善取也猶不能無憾焉公羊曰此何以書為公取之也愚謂春秋凡取皆不善也魯昭公為季氏所逐奔于齊齊侯為公取鄆以居公故春秋猶在所取也然而齊侯不能倡大義討亂臣復昭公之國而徒取鄆以居之則亦末矣此聖人所以不能無憾也已胡氏曰直書齊侯取之何也齊不自取而為公取鄆使居之也昭公出奔經書次于陽州見公于魯未絶而季氏逐君為不臣及書齊侯取鄆則見公已絶於魯而逐於季氏為不君君者有其土地人民以奉宗廟之典籍者也已不能有而他人是保則不君矣春秋之義欲為君盡君道為臣盡臣道各守其職而不渝也昭公失君道季氏為亂臣各渝其職而不守矣其為後世戒深切著明矣春秋正傳卷三十二
