body:
  text: 春秋正傳卷三十六明湛若水撰哀公名蔣定公子母定姒四嵗即位在位二十七年其十四年春春秋絶筆敬王二十六年元年晉定十八年齊景五十四年衛靈四十一年蔡昭二十五年鄭聲七年曹陽八年陳閔八年杞僖十二年宋景二十三年秦惠七年楚昭二十二年吳夫差二年春王正月公即位正傳曰書公即位正始也楚子陳侯隨侯許男圍蔡正傳曰書楚子三國之君圍蔡志報怨也左氏曰春楚子圍蔡報柏舉也里而栽廣丈髙倍夫屯晝夜九日如子西之素蔡人男女以辨使疆於江汝間而還蔡於是乎請遷於吳胡氏曰夫男女以辨則是降也疆於江汝則遷其國也而獨書圍蔡何也蔡嘗以吳師入郢昭王奔隨壞宗廟徙陳器撻平王之墓矣至是楚國復寧帥師圍蔡降其衆遷其國而春秋書之略者見蔡宜得報而楚子復讎之事可恕也聖人本無怨而怨出於不怨故議讎之輕重有至於不與共戴天者今楚人禍及宗廟辱逮父母若包羞忍恥而不能一灑之則不可以有立而天理滅矣故特書圍蔡而稱爵恕楚之罪詞也愚謂胡氏之論是矣然不必稱爵乃可恕楚之罪也鼷鼠食郊牛改卜牛夏四月辛巳郊正傳曰何以書榖梁曰鼷鼠食郊牛改卜牛志不敬也郊牛日展斛角而知傷夏四月郊不時也胡氏曰昔者周公郊祀后稷以配天此成王亮隂之時位冡宰攝國政行天子之事也魯何以得郊成王追念周公有大勳勞於天下而欲尊魯故賜以重祭得郊禘大雩然則可乎孔子曰魯之郊禘非禮也周公其衰矣欲尊魯而賜以人臣不得用之禮樂豈所以康周公也哉天子祭天地諸侯祭社稷大夫祭五祀庶人祭先祖此定理也今魯得郊以為常事春秋欲削而不書則無以見其失禮盡書之乎則有不勝書者故聖人因其失禮之中又有失焉者則書於䇿所謂由性命而發言也聖人奚容心哉因事而書以志其失為後世戒其垂訓之義大矣秋齊侯衛侯伐晉正傳曰書齊衛伐晉罪黨叛也左氏曰齊侯衛侯會於乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲愚謂晉為天下主盟之國范中行晉之叛臣也齊景公當修霸業率與國往正其罪可也乃與衛伐晉取地以助范氏之叛負不義之罪於天下矣冬仲孫何忌帥師伐邾正傳曰書伐邾志非義也邾事魯之謹無罪而伐之是昧恩德之報無恤小之義矣敬王二十七年二年晉定十九年齊景五十五年衛靈四十二年卒蔡昭二十六年鄭聲八年曹陽九年陳閔九年杞僖十三年宋景二十四年秦惠八年楚昭二十三年吳夫差三年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟於句繹正傳曰何以書取田志貪利也何以書盟志為利也左氏曰伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟是貪利之兵也榖梁子曰三人伐而二人盟何也各盟其所得也是以得利而盟也夫以利而伐人者亦以利而受伐於人以利而盟者亦利盡而寒盟何以質於神而結忠信於人乎胡氏曰曷為列書三卿哀公得國不張公室三卿並將魯衆悉行伐國取地以盟其君而已不與焉適越之辱兆矣定公之薨邾子來奔喪事魯恭矣而不免於見伐徒自辱焉不知以禮為國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田而又强與之盟不知以義睦鄰之故也故詳書以著其罪三人伐則曷為二人盟盟者各盟其所得也莫强乎季孫何獨無得季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田蓋季氏以歸二家而不取也夏四月丙子衛侯元卒正傳曰書衛侯元卒志鄰國之大故也是以有相恤之義焉左氏曰初衛侯遊於郊子南僕公曰余無子將立汝不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祇辱夏衛靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒愚謂蒯聵得罪出奔而立輒是立子以拒父也且郢已有靈公之命矣若遵公命以立郢則輒免於拒父之罪而聵負殺母之名必不敢動則衛無後來之亂矣惟立輒則以子拒父子不子父不父亂大倫以危其國家實在此舉矣滕子來朝正傳曰何以書志邦交之禮也晉趙鞅帥師納衛世子蒯聵於戚正傳曰戚衛邑何以書納志猶夫義也憾其非大義也不以大義告於天王以正名分而徒以力納之也左氏曰六月乙酉晉趙鞅納衛太子於戚宵迷陽虎曰右河而南必至焉使太子絻八人衰絰僞自衛逆者告於門哭而入遂居之然則何以志猶夫義納也靈公志溺於愛而亂其家太子志在正家而自陷於惡夫人啼訴之言已入靈公廢立之命未出則太子者固昔太子耳太子未有廢命為國人之所拒為子輒之所拒晉帥師納之於義未為不可也獨晉以霸國不能奉王命聲大義以正之此春秋所以書之之意乎夫蒯聵雖得罪於父而繼以出奔輒不可以居位而得罪於父宜不用夫人之亂命避位以讓父安社稷重宗廟可也是則輒之義得矣乃居位據國以拒父天下豈有無父之人而可以為人君乎晉帥師納之於戚比之為子以拒父者有間矣未為過舉也胡氏以納為國人不受而鞅為不知義過矣夫輒拒之而晉固納之納之書實事也何義例之有胡氏曰世子不言納位其所固有國其所宜君謂之儲副則無所事乎納矣凡公子出奔復而得國者其順且易則曰歸有奉焉則曰自其難也則曰入不稱納矣况世子哉今趙鞅帥師以蒯聵復國而書納者見蒯聵無道為國人之所不受也國人不受而稱世子者罪衛人之拒之也所以然者緣蒯聵出奔靈公未嘗有命廢之而立他子及公之卒大臣又未嘗謀於國人數聵之罪選公子之賢者以主其國乃從輒之所欲而君之以子拒父此其所以稱世子也人莫不愛其親而志於殺莫不敬其父而忘其喪莫不慈其子欲其子之富且貴也而奪其位蒯聵之於天理逆矣何疑於廢黜然父雖不父子不可以不子輒乃據國而與之爭可乎故特繫納衛世子蒯聵於戚於趙鞅帥師之下而鞅不知義靈公與衛國大臣不能早正國家之本以致禍亂其罪皆見矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰於鐡鄭師敗績正傳曰書晉趙鞅及鄭罕達戰於鐡鄭師敗績而其善惡自見矣左氏曰秋八月齊人輸范氏粟鄭子姚即罕達子般即駟𢎞送之士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後隨而從之彼見吾貌必有懼心於是乎會之必大敗之從之卜戰龜焦樂丁曰詩曰爰始爰謀爰契我龜謀協以故兆詢可也簡子即趙鞅誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車朴馬無入於兆下卿之罰也甲戌將戰郵無恤即王良也御簡子衛太子為右登鐡上望見鄭師衆太子懼自投於車下子良授太子綏而乘之曰婦人也簡子巡列曰畢萬晉獻公卿匹夫也七戰皆獲有馬百乘死於牖下羣子勉之死不在冦繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衛太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無靣傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃於車中獲其蜂旗太子蒯聵救之以戈鄭師北獲溫大夫趙羅太子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傳叟曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨范氏臣稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐡之戰以徒五百人宵攻鄭師取蜂旗於子姚之幕下獻曰請報主德追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏韜嘔血鼓音不衰今日我上也太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乘材兩靷皆絶愚謂觀此趙簡子數范中行與鄭之罪則簡子忠於晉者也齊鄭忘晉君之好以助叛臣黨惡者也其善惡功罪較然矣然而二子皆書名而不言大夫則諸儒所謂義例者何在乎故直書其事而善惡自見者為不易之論矣冬十月葬衛靈公正傳曰書葬衛靈公志恤哀之禮也十有一月蔡遷於州來蔡殺其大夫公子駟正傳曰何以並書之並譏蔡君也見蔡君之無道也既召禍機而遷國又殺忠臣以媚敵故曰並譏之也左氏曰吳泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以說哭而遷墓冬蔡遷於州來胡氏曰州來吳所滅也蔡請遷於吳而中悔吳人如蔡納聘而師畢入蔡侯告大夫殺公子駟以說哭而遷墓如此則實吳人之所遷也而經以自遷為文何也楚既降蔡使疆於江汝蔡人聽命而還師矣復背楚請遷於吳而又自悔也其謀之不臧甚矣夫遷國大事也盤庚五遷利害甚明衆猶胥怨不適有居至於丁寧反復播告之修而後定也今蔡介於吳楚二大國之間背楚誑吳及其事急又委罪於執政其誰之咎也故經以自遷為文而殺公子駟則書大夫而稱國言君與用事大臣擅殺之也放公孫獵則書大夫而稱人言國亂無政衆人擅放之也駟與獵其以請遷於吳為非者乎而委之罪以說誰敢有復盡忠而與謀其國者哉愚謂或稱大夫或不稱或書國或不書史之文也而仲尼取義則固不係乎此也何居曰文之不一也敬王二十八年三年晉定二十年齊景五十六年衛出公輒元年蔡昭二十七年鄭聲九年曹陽十年陳閔十年杞僖十四年宋景二十五年秦惠九年卒楚昭二十四年吳夫差四年春齊國夏衛石曼姑帥師圍戚正傳曰何以書圍戚罪黨惡也夫國之所以為國君之所以為君以其有人倫也舜竊負而逃遵海濵終身樂忘天下以人倫為重也蒯聵傷家之亂而欲割恩正義以陷於大惡其得罪於父非有關於宗社也輒未嘗受命於靈公乃夫人先以公命命郢郢不居故立輒耳國夏與曼姑不能因晉之納以輒迎蒯聵於戚而避位讓父以正倫理乃助人之子以圍人之父是無人倫矣其得罪於舜也大矣何以立國而為人主大臣乎公羊以輒不以父命辭王父命而宜立以曼姑受命於靈公義可以拒之是不知天理人倫為君國之本也胡氏曰按左氏靈公游於郊公子郢御公曰余無子將立汝對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祇辱靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若有郢必聞且亡人之子輒在乃立輒以拒蒯聵蒯聵前稱世子者所以深罪輒之見立不辭而拒其父也輒若可立則蒯聵為未絶未絶則是世子尚存而可以拒乎主兵者衛也何以序齊為首罪齊人與衛之為惡而黨之也公孫文仲主兵伐鄭而序宋為首以誅殤公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也古者孫從祖又孫氏王父之字考於廟制昭常為昭穆常為穆不以父命辭王父命禮也輒雖由嫡孫得立然非有靈公之命安得云受之王父辭父命哉故冉有謂子貢曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而讓其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者也然則為輒者奈何宜辭於國曰若以父為有罪將從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣是故輒辭其位以避父則衛之臣子拒蒯聵而輔之可也輒立其位以拒父則衛之臣子舍爵祿而去之可也烏有父不慈子不孝爭利其國滅天理而可為者乎夏四月甲午地震正傳曰書地震志異也夫地道尚靜而震動焉失其道矣當是之時天子諸侯之國皆君弱而臣强是其應乎五月辛卯桓宫僖宫災正傳曰書桓宫僖宫災志變也天火曰災災從天降也所以示譴戒乎魯也諸侯之廟五親盡則遷天之道也所謂遷者主遷而廟不遷謂之桓宫僖宫則桓僖親盡而不遷非天之道矣因天變以驗人事其咎固在此乎左氏曰夏五月辛卯司鐸官名火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守宫人肅給濟濡帷幕鬱攸從之蒙葺公屋自太廟始外內以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立於衆魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之稿道還公宫孔子在陳聞火曰其桓僖乎愚謂春秋書此不過志二宫之災耳而公穀又鑿為不言及敵也一也之說而胡氏從之又有不言及等也稱及則祖有尊卑矣之說皆穿鑿之過而不知經之取義不係乎此也季孫斯叔孫州仇帥師城啓陽正傳曰何以書譏不宜城也黨范啓釁懼晉而城一不宜也不顧民時大興工役二不宜也地震廟災不知修省三不宜也宋樂髠帥師伐曹正傳曰書宋樂髠帥師伐曹志陵暴之兵也曹為小國以宋之大宜以大字小可也乃肆其陵弱暴寡之心擅興大衆以伐之宋為無道矣然而曹以小弱界乎其鄰不能盡事大之禮以致禍變惡得無罪故此年樂髠伐六年向巢伐七年圍八年入而以曹伯歸有由然矣秋七月丙子季孫斯卒正傳曰書季孫斯卒志國卿之大故也左氏曰秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之召正常正常不反蔡人放其大夫公孫獵於吳正傳曰放猶逐也以其公子駟之黨也何以書罪擅放也胡氏謂駟獵蓋以請遷於吳為非者故蔡因吳怒其二於楚而遷其國遂殺駟逐獵以說吳此則無政刑而陵替以亡之漸矣冬十月癸卯秦伯卒正傳曰書秦伯卒志霸國之大故也於是乎有弔賻贈葬之禮焉是以書之叔孫州仇仲孫何忌帥師圍邾正傳曰書二卿圍邾則不義之罪自見矣夫既與邾盟於句繹而又伐之背信棄義甚矣夫邾之事魯來會來奔獻漷沂之田亦已至矣不得免焉何以示信義於諸侯哉敬王二十九年四年晉定二十一年齊景五十七年衛出二年蔡昭二十八年殺鄭聲十年曹陽十一年陳閔十一年杞僖十五年宋景二十六年秦悼公元年楚昭二十五年吳夫差五年春王二月庚戌盜殺蔡侯申正傳曰盜殺蔡侯申何以書志亂賊也以報之未詳也使人考其跡而罪人斯得矣如下文蔡昭公書葬公孫辰奔公孫姓公孫霍見殺即此盜矣左氏曰蔡昭侯將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇蔡大夫後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫盱即公孫霍公穀胡氏皆以稱盜不名人為賤微又言蔡侯不能以禮信自衛夫人得而害之故變文稱盜以警有國皆非矣夫如是則使弒君之賊得逸其罪名將何憚而不為乎是又與於弒逆之甚者也蔡公孫辰出奔吳正傳曰書蔡公孫辰出奔吳志逸賊也其出奔吳蔡人逐之也辰蓋與聞乎盜殺者故書出奔而盜人之名斯得矣葬秦惠公正傳曰書葬秦惠公志恤哀之義也宋人執小邾子正傳曰書宋人執小邾子志陵暴之罪也小邾子無罪可聲而宋伐其國俘其君以私意擅行又不歸之京師故春秋罪之夏蔡殺其大夫公孫姓公孫霍正傳曰霍即盱二人翩之黨也何以書誅弒君之黨也於是乎盜弒之名斯得矣晉人執戎蠻子赤歸於楚正傳曰書晉人執戎蠻子赤歸於楚罪晉也晉以伯國不能自振詐蠻子而執之歸楚是背信以尊荆夷也詐戎蠻背信也尊荆夷忘義也春秋書以惡之左氏曰夏楚人既克夷虎乃謀北方左司馬販申公夀餘葉公諸梁致蔡於負函致方城之外於繒關曰吳將泝江入郢將奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍於莬和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師於三户司馬致邑立宗焉以誘其遺民而盡俘以歸愚謂言歸於楚者猶曰歸於京師尊楚之詞也城西郛正傳曰外城謂之郛書城西郛著不宜城也城西郛則城西之民盡棄之矣杜氏曰魯城西郛備晉也夫魯助晉叛臣以召怨於晉又城西郛以備之善謀國者如是乎六月辛丑亳社災正傳曰書亳社災志災變也穀梁子曰亳社者亳之社也亳亡國也亡國之社以為廟屋戒也其屋亡國之社不得達上也程子曰書曰湯既勝夏欲遷其社不可作夏社國既亡則社自當遷湯存之以為後戒故但屋之則與遷之無異既為亡國之社則自王都至國都皆有之使為戒也記曰喪國之社屋之不受天陽也又曰亳社北牖使隂明也魯有亳社災屋之故有災此制計之必始於湯也秋八月甲寅滕子結卒正傳曰書滕子結卒志與國之大故也冬十有二月葬蔡昭公正傳曰書葬蔡昭公志禮也君弒不討賊則不葬禮也今公孫姓等已討故葬禮也葬滕頃公正傳曰書葬滕頃公志恤鄰之禮也敬王三十年五年晉定二十二年齊景五十八年卒衛出三年蔡成公朔元年鄭聲十一年曹陽十二年陳閔十二年杞僖十六年宋景二十七年秦悼二年楚昭二十六年吳夫差六年春城毗正傳曰書春城毗譏不時也不宜城也杜氏以為城毗備晉也夫禮義惟城而金湯不與焉魯助晉叛人以起晉釁可謂墮禮義之大間而乃屢城以自備焉末矣豈其時乎豈其宜乎夏齊侯伐宋正傳曰書齊侯伐宋則無名擅興之罪自見矣定之六年齊侯宋公為洮之㑹今甫六年耳宋未有可聲之罪而齊遽興無名之師故春秋書以惡之晏子以其君顯固如是乎晉趙鞅帥師伐衛正傳曰書晉趙鞅帥師伐衛善討黨叛也衛助范氏以叛是黨臣叛君負罪大矣趙鞅討而伐之忠於晉正矣故春秋書而善之左氏曰春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張栁朔范氏家臣言諸昭子即士吉射使為柏人昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及范氏出張栁朔謂其子爾從主勉之我將止死王生授我矣吾不可以僣之遂死於柏人夏趙鞅伐衛范氏之故也遂圍中牟秋九月癸酉齊侯杵臼卒正傳曰書齊侯杵臼卒志鄰國之大故也諸侯有弔賻贈葬之禮焉左氏曰齊燕姬生子不成而死諸子鬻姒景公妾之子荼即安孺子嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子即國夏髙昭子即髙張立荼置羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎愚謂此景公卒時事也大學之道誠意正心修身齊家治國平天下此其始終本末之貫也晏子不知聖賢大學之道引君當道修身正家以及其國徒矜智能卒之家道不正孽嬖立而羣子奔至於危亡可哀也已君子因其卒而遡其平生而善惡見矣冬叔還如齊正傳曰叔還音旋魯卿如齊往弔且會葬也何以書志邦交之禮也而非禮自見矣諸侯卒諸侯使士弔使大夫會葬禮也而使卿焉非禮矣閏月葬齊景公正傳曰書閏月葬齊景公志恤鄰之禮也而非禮見矣何謂非禮公羊曰閏不書此何以書喪以閏數也曷為以閏數喪數略也榖梁子曰不正其閏也愚謂喪事不數閏數閏則哀殺矣諸侯五月而葬以閏月葬則數閏矣數閏則哀殺矣非仁人孝子之心也此春秋竊取之義乎敬王三十一年六年晉定二十三年齊安孺子荼元年弒衛出四年蔡成二年鄭聲十二年曹陽十三年陳閔十三年杞僖十七年宋景二十八年秦悼三年楚昭二十七年卒吳夫差七年春城邾瑕正傳曰書春城邾瑕志非時也譏非所宜城也魯以備晉城瑕一非所城强取邾之邑而城之二非所城春農方殷而奪時以妄作三非所城春秋非之之意備矣晉趙鞅帥師伐鮮虞正傳曰鮮虞即中山之狄書晉趙鞅帥師伐鮮虞善誅黨叛也左氏曰春晉伐鮮虞治范氏之亂也杜氏曰晉伐鮮虞納荀寅於柏人愚按四年鮮虞納荀寅於柏人則固黨叛者也晉鞅伐之有名矣宜春秋善之吳伐陳正傳曰書吳伐陳志憤怨之兵也左氏曰復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師於城父髙氏曰陳楚與也吳之入楚使召陳侯陳侯不來吳人怨之故元年既侵之今復伐之修怨也陳自是與吳成愚謂陳非有可聲之罪其不肯二於己猶己之不肯二於人耳乃怨而侵之而伐之必强之與成焉則吳之為夷可知矣故春秋惡之夏齊國夏及髙張來奔正傳曰書齊國夏及髙張來奔則奔之者之罪見矣左氏曰齊陳乞僞事髙國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰髙國得君必逼我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入於公宫昭子即髙張聞之與惠子國夏乘如公戰於莊敗國人追之國夏奔莒遂及髙張晏圉弦施來奔愚謂據此則讒人亂國者陳乞也既以僞事髙國進讒言使與諸大夫生隙又以詭言進讒諸大夫使與髙國有隙遂兩下興兵相殺使髙國貴戚之卿不能安其位以守其宗社而出奔他國讒人亂國豈虛語哉詩曰取彼讒人投之有比其亦春秋之意乎叔還會吳於柤正傳曰書叔還會吳於柤非其會也許氏曰叔還以吳在柤故往會之始終吳好也愚謂以堂堂中國之望禮義之宗吳不慕義求㑹而魯下與㑹焉則為妄動所以感之者不誠矣安能以固結其好哉秋七月庚寅楚子軫卒正傳曰書楚子軫卒志與國之大故也來赴故書之左氏曰秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申即子西為王不可則命公子結即子期亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大冥卒於城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潜師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤烏夾日以飛三日楚子使問於周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉齊陽生入於齊齊陳乞弒其君荼正傳曰書齊陽生入於齊齊陳乞弒其君荼而篡弒之罪見矣左氏曰陳僖子即陳乞使召公子陽生陽生駕而見南郭且于即子鉏曰嘗獻馬於季孫不入於上乘故又獻此請與子乘之出萊門而告之故闞止即子我知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至於齊國人知之僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而往其臣差車鮑㸃曰此誰之命也陳子即乞曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公即陽生稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江說囚王豹於句竇之丘公即陽生使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳公羊曰景公謂陳乞曰吾欲立舍何如陳乞曰所樂乎為君者欲立之則立之不欲立則不立君如欲立之則臣請立之陽生謂陳乞曰吾聞子蓋將不欲立我也陳乞曰夫千乘之主將廢正而立不正必殺正者吾不立子者所以生子者也走矣與之玉節而走之景公死而舍立陳乞使人迎陽生於諸其家除景公之喪諸大夫皆在朝陳乞曰常之毋有魚菽之祭願諸大夫之化我也諸大夫皆曰諾於是皆之陳乞之家坐陳乞曰吾有所為甲請以示焉諸大夫皆曰諾於是使力士舉巨囊而至於中霤諸大夫見之皆色然而駭開之則闖然公子陽生也陳乞曰此君也已諸大夫不得已皆逡巡北靣再拜稽首而君之爾自是往弒舍愚謂春秋但書陽生入陳乞弒則主謀與弒之罪自見矣夫主謀與弒其君之罪罪莫大焉公羊謂弒立不當國而國榖梁謂弒君以陳乞不以陽生君荼胡氏又謂不稱公子以為先君立荼而已弒之為非先君之子稱齊著亂由景公則所求於義者末矣所以誅陽生者反薄矣冬仲孫何忌帥師伐邾正傳曰書伐邾志陵暴之師也宋向巢帥師伐曹正傳曰書伐曹著擅興陵暴之罪也敬王三十二年七年晉定二十四年齊悼公陽生元年衛出五年蔡成三年鄭聲十三年曹陽十四年陳閔十四年杞僖十八年宋景二十九年秦悼四年楚惠王章元年吳夫差八年春宋皇瑗帥師侵鄭正傳曰何以書宋皇瑗侵鄭志貪暴之師也左氏以為為鄭叛晉非也宋久叛晉豈復討鄭叛晉哉當是之時世無霸主諸侯肆其狼貪虎噬之心以無名之兵加於人豈知修德之為務乎故春秋惡之晉魏曼多帥師侵衛正傳曰書晉魏曼多帥師侵魏非伯討也夫伯討者必奉詞聲罪而致討也左氏曰晉師侵衛衛不服也愚謂觀此則此舉特為衛不服耳衛輒拒父天下之罪人也晉不行聲罪之師而為私竊以行侵焉春秋直書而其罪見矣夏公會吳於鄫正傳曰書公會吳於鄫志非禮也左氏曰夏公會吳於鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋伯牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人弗聽景伯曰吳將亡矣棄天而背本不與必棄疾於我乃與之太宰嚭召季康子康子使子貢辭太宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯苟不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髮文身裸以為飾豈禮也哉有由然也反自鄫以吳為無能為也愚謂㑹者中國諸侯修好講睦之道必有禮義以交接有誠意以交孚吳為夷狄與中國其類既殊其心自異安可以禮義誠信相交接魯不務自修其德畏吳之强欲藉其勢而往與之逺㑹於鄫自卑屈甚矣卒致百牢之徴不亦宜乎秋公伐邾八月己酉入邾以邾子益來正傳曰書公伐邾入邾以邾子益來而貪暴之罪自見矣左氏曰季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯德如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鍾聲大夫諫不聽茅成子請告於吳不許曰魯擊柝聞於邾吳二十里不三月不至何及於我且國內豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保於繹師宵掠以邾子益來獻於亳社囚諸負瑕負瑕故有繹邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之吳子從之愚謂觀此傳則主此役者康子也康子親聞仲尼之教音其恣欲如此又不聽景伯孟孫之忠言果失二德伐邾入處其宫虜其君獻於亳社囚諸負瑕其罪大惡極矣其致邾之訴召吳之兵克東陽宜哉胡氏謂春秋隱魯之惡故滅國書取婉以成章而不失其實非也如此經直書其事而罪惡不可掩矣烏乎能隱宋人圍曹正傳曰書宋人圍曹罪陵弱也冬鄭駟𢎞帥師救曹正傳曰書鄭駟𢎞帥師救曹善之也恤災救難固春秋之所善也左氏曰宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救鄭師救曹侵宋愚按此則鄭之救曹雖出於有意而其事則善矣故春秋與進之所謂假之者其此之類乎春秋正傳卷三十六
