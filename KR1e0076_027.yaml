body:
  text: 春秋正傳卷二十七明湛若水撰襄公靈王十八年十有九年晉平四年齊靈二十八年卒衛獻二十三年殤五年蔡景三十八年鄭簡十二年曹武公滕元年陳哀十五年杞孝十三年宋平二十二年秦景二十三年楚康六年吳諸樊七年春王正月諸侯盟于祝柯正傳曰祝柯齊地書諸侯盟于祝柯志善盟也左氏曰諸侯還自沂上盟于督楊曰大毋侵小據左氏之言則此盟得以大字小之仁矣盟非春秋之所善祝柯之盟則彼善於此者也晉人執邾子正傳曰書晉人執邾子著其執之非也左氏曰執邾悼公以其伐我故邾屢伐魯以小犯大其罪固可誅矣然必告于天子奉辭往問其罪可也至於擅興繫纍其君則過矣公至自伐齊正傳曰書公至自伐齊謹君之出入也同圍齊而云伐齊者圍即伐也公報齊之意也取邾田自漷水正傳曰自漷水者以漷水為界也書取邾田自漷水著非義也左氏曰遂次于泗上疆我田取邾田自漷水歸之于我晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空與尉侯奄皆受一命之服賄荀偃束錦加璧乘馬先吳壽夢之鼎愚謂邾數伐魯固為有罪矣魯仗晉之强而伐之又仗晉而取其田所謂非其有而取之非禮矣故春秋非之魯侯乃享六卿而厚賜之以為德可謂識見之卑陋矣季孫宿如晉正傳曰書季孫宿如晉見其如之非禮也左氏曰季武子如晉拜師晉侯享之范宣子為政賦黍苖季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月愚謂邦交之儀朝聘㑹同所以睦鄰也魯不自治而致邾之數侮不以告于天子聲大義以討之而汲汲乎資晉之强執其君取其田所謂因人成事者而其勢不得不往拜之非聘禮之正也其為道卑矣葬曹成公正傳曰書葬曹成公志鄰國之大事也來赴故史書之夏衛孫林父帥師伐齊正傳曰書衛孫林父伐齊著無名之師也左氏曰晉欒魴帥師從衛孫文子伐齊愚謂按此則晉衛之伐齊無他名義皆所謂摟諸侯以伐諸侯者三王之罪人耳秋七月卒卯齊侯環卒正傳曰書齊侯環卒志鄰國之大故也來赴則書之左氏曰齊侯娶于魯曰顔懿姬無子其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光使髙厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月壬辰晦齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛愚謂春秋特書其卒而平生之善惡自見矣晉士丐帥師侵齊至穀聞齊侯卒乃還正傳曰穀齊地書晉士丐帥師侵齊聞齊侯卒乃還善不伐喪也禮也左氏曰晉士丐侵齊及穀聞喪而還禮也公羊曰還者何善辭也何善爾大其不伐喪也此受命於君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也胡氏曰古之為師不伐喪大夫以君命出境有可以安國家利社稷者則專之可也世衰道微暴行交作利人之難以成其私欲者衆矣士丐乃有惻隱之心聞齊侯卒而還不亦善乎或曰君不尸小事臣不專大名為士丐者宜墠帷而歸命乎介則非矣使士丐未出晉境如是焉可也已至齊地則進退在士丐矣猶欲墠帷而歸命乎介則非古者命將不從中覆專制境外之意而況喪必不可伐非進退可疑而待請者故至穀聞齊侯卒乃還善之也八月丙辰仲孫蔑卒正傳曰書仲孫蔑卒志大夫之大故也齊殺其大夫髙厚正傳曰書齊殺其大夫髙厚罪擅殺也左氏曰秋八月齊崔杼殺髙厚於灑藍而兼其室書曰齊殺其大夫從君於昏也愚謂此崔杼殺之也而曰齊殺其大夫髙厚何聖人據報而書使人求其故則罪人斯得矣鄭殺其大夫公子嘉正傳曰嘉字子孔書鄭殺其大夫公子嘉著擅殺之罪也左氏曰鄭子孔之為政也專國人患之乃討西宮之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西帥國人伐之殺子孔而分其室書曰鄭殺其大夫專也子然子孔宋子之子也士子孔圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也僖之四年子然卒簡之元年士子孔卒司徒孔實相子革子良之室三室如一故及於難子革子良出奔楚子革為右尹鄭人使子展當國子西聽政立子産為卿愚謂此本傳也所謂西宮之難者謂盜殺三卿於西宮之朝公子嘉知而不言也所謂純門之師者言公子嘉不惟不言又欲起楚師以去諸大夫楚師伐鄭至於純門也嘉既有此二罪又其為政之專則其罪固可殺也而子展子西不以告于天子刑之司寇乃帥國人伐而殺之而又分其室焉擅殺之罪蓋與之均矣故春秋誅之冬葬齊靈公正傳曰書葬齊靈公志鄰國之大事也城西郛正傳曰書城西郛著其城之非也左氏曰懼齊也蓋懼齊人之數見侵伐故城其西郛以備之耳然則西郛之外之民將棄之矣諸侯有道守在四鄰城郭何足賴焉叔孫豹㑹晉士丐于柯正傳曰柯衛地後屬晉書叔孫豹㑹晉士丐于柯著其㑹之非也懼齊以援晉之權臣以自固非禮也左氏曰齊及晉平盟于大隧故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命愚謂觀此傳則柯之㑹豹專以國託晉大夫叔向專以政許魯大夫當是之時政在大夫可見矣城武城正傳曰書城武城著謀國之不善也左氏曰穆叔歸曰齊猶未也不可以不懼乃城武城夫魯誠懼齊患之未巳當及是時明其政刑賢能在位是所謂萬里長城可以自固居則以守戰則以勝誰得而侮之胡為區區以一城為哉故春秋書之雖時亦譏也靈王十九年二十年晉平五年齊莊公光元年衛獻二十四年殤六年蔡景三十九年鄭簡十三年曹武二年陳哀十六年杞孝十四年宋平二十三年秦景二十四年楚康七年吳諸樊八年春王正月辛亥仲孫速㑹莒人盟于向正傳曰向舊為莒邑魯已取之書仲孫速㑹莒人盟于向著其盟之非也左氏曰及莒平孟莊子㑹莒人盟于向督楊之盟故也愚謂莒數伐魯曲在莒也諸侯前年為督楊之盟以和解之已非其道矣為莒者宜自悔過遵諸侯之約修事大之禮可也莒未渝盟而魯大夫乃私㑹以尋盟此召侮之道也故春秋非之夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵正傳曰書公㑹諸侯盟于澶淵善之也㑹一也而有不同有㑹而謀人者有㑹而平人者㑹而平人則息兵安民固春秋之所善也左氏曰夏盟于澶淵齊成故也愚謂成也者平也齊之伐魯屢矣今一旦而與平成焉盟雖非春秋所取而此猶為彼善於此者歟夫平怨講睦息兵安民則天下無事矣善莫大焉故春秋與之秋公至自㑹正傳曰書公至自㑹謹君之出入也亦以始終乎㑹之善焉仲孫速帥師伐邾正傳曰書仲孫速帥師伐邾譏非義之兵也左氏曰邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之愚謂據此則魯之伐邾以邾驟犯已所以報之也然夏六月邾已與魯㑹諸侯盟于澶淵矣夫以有罪而與之盟既與盟而復懷宿怨以伐之皆非義矣故春秋惡之蔡殺其大夫公子燮蔡公子履出奔楚正傳曰書蔡殺其大夫公子燮著擅殺之罪也書公子履出奔楚著去國之非也左氏曰蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚胡氏曰按左氏初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常楚政不常公子燮求從先君以利蔡謀國之合於義者也國人乃不順焉而殺燮此何罪矣故左氏曰書蔡殺其大夫公子燮言不與民同欲也胡氏又曰公子履其母弟也進不能正國退不能逺害懼禍而奔從於夷狄書者罪之也愚謂觀左氏胡氏之言得春秋之指矣胡氏又謂燮以無罪見殺故稱國而不去其官則泥於義例之惑矣陳侯之弟黃出奔楚正傳曰書陳侯之弟黃出奔楚著奔之者之罪也左氏曰陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃出奔楚書曰陳侯之弟黃出奔楚言非其罪也公子黃將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也愚謂觀此則公子黃之奔楚慶虎慶寅譛逼之也故左氏以黃之出奔楚言無罪也書之所以罪虎寅也叔老如齊正傳曰書叔老如齊志邦交之禮也左氏曰初聘于齊禮也夫齊魯婚姻之國也以齊屢加侵伐於魯而絶好矣今以澶淵之盟㑹而魯復使叔老如齊以聘焉繼好息民禮之大者也故春秋取之冬十月丙辰朔日有食之正傳曰書日有食之志天變也季孫宿如宋正傳曰書季孫宿如宋志邦交之禮也左氏曰冬季武子如宋報向戌之聘也褚師段逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也愚謂禮尚往來禮無不答今魯季孫之如宋報聘也禮之正也故春秋取之靈王二十年二十有一年晉平六年齊莊二年衛獻二十五年殤七年蔡景四十年鄭簡十四年曹武三年陳哀十七年杞孝十五年宋平二十四年秦景二十五年楚康八年吳諸樊九年春王正月公如晉正傳曰書公如晉著其如之非禮也左氏曰春公如晉拜師及取邾田也愚謂朝聘㑹同禮有常期非其期而往非朝聘㑹同之正矣襄公特以附晉之強兵取邾之田而往拜之是相交以利而不以義矣邾庶其以漆閭丘來奔正傳曰庶其邾大夫漆閭丘邾二邑也書邾庶其以漆閭丘來奔則叛君者與納叛者之罪並見矣左氏曰邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劔帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎庶其非卿也以地來雖賤必書重地也愚謂諸侯之土地受之於天子傳之於先君人臣之義無所逃於天地之間況竊其地而逃以與人乎而魯受其地而賞之是誨盜使吾之臣亦竊我也臧武仲之言善矣惜乎季武子不能聽而使魯為淵藪溝壑也夏公至自晉正傳曰書公至自晉謹君之出入也秋晉欒盈出奔楚正傳曰書晉欒盈出奔楚使人求其故則奔之者之罪可見矣左氏曰欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能欒祁與其老州賓通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而專政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆囚伯華叔向籍偃欒盈過於周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅愚謂此本傳也由是觀之則欒盈之出奔非自叛其君而去父母之邦也為欒祁之譛宣子之逐不得已也夫大夫命之於君者也無故譛而逐之則罪在宣子無君之心擅專之罪自不可掩矣故春秋惡之九月庚戌朔日有食之正傳曰何以書志天變也冬十月庚辰朔日有食之正傳曰何以屢書志天之屢變也日主陽也父道也君道也秋九月日食冬十月又日食越月之間日食者再焉則陽衰隂盛君弱臣强之兆見矣是時三家專魯政在大夫故其兆如此雖然滔滔者天下皆是也獨魯也哉聖人直書於經其傷世之情見矣曹伯來朝正傳曰書曹伯來朝則禮之得失可考見矣左氏曰冬曹武公來朝始見也愚謂曹伯即位三年喪畢而朝宗國似得禮矣然而不朝於天子而朝於同列推類而觀失禮甚矣故春秋直書而得失自見也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任正傳曰書㑹諸侯于商任著其㑹之非也左氏曰㑹于商任錮欒氏也知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也愚謂觀此則欒盈之與其黨四子皆勇士之雄也宣子既以譛而逐之使出奔齊楚是棄雄士以與他國也而晉侯又㑹諸侯禁錮之一何謬乎記曰又極之於其所往此之謂寇讎寇讎何服之有晉君舉措如此何以為盟主乎故春秋書其㑹以非之靈王二十一年二十有二年晉平七年齊莊三年衛獻二十六年殤八年蔡景四十一年鄭簡十五年曹武四年陳哀十八年杞孝十六年宋平二十五年秦景二十六年楚康九年吳諸樊十年春王正月公至自㑹正傳曰書公至自㑹謹君之出入也餘義見前夏四月正傳曰無事亦書時月義見于前秋七月辛酉叔老卒正傳曰叔老魯大夫子叔齊子也書卒志國卿之大故也冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨正傳曰書公㑹諸侯于沙隨志㑹之非也左氏曰冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼愚謂古者君臣相與以恩義如一體焉故君之視臣如手足則臣之視君如腹心有故而去則君使人導之出疆又先之於其所往豈至禁錮之如商任之㑹復錮之如沙隨之㑹也哉自是之後黨錮於漢再錮於宋空人之國其禍皆作俑於此也胡氏曰按左氏㑹于商任銅欒氏也㑹于沙隨復銅欒氏也古者大夫去國君不掃其社稷不繫纍其子弟不收其田邑使人導之出疆又先之於其所往敕五典厚人倫也今晉不念欒氏世勳而逐盈又將縛執之而命諸侯無得納焉則亦過也楚逐申公巫臣子反請以重幣銅之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉其賢於商任沙隨之謀逺矣公至自㑹正傳曰書公至自㑹謹君之出入也而非善之㑹見矣楚殺其大夫公子追舒正傳曰追舒即令尹子南書楚殺其大夫公子追舒著刑政之失也左氏曰楚觀起有寵於令尹子南未益祿而有焉數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四境子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之愚謂由是觀之則子南比寵觀起不如薳子之知能辭八人故及於難然楚子不能素制以禮使免於刑又以不能制所寵觀起而殺之刑政非當矣能逃專殺之罪乎靈王二十二年二十有三年晉平八年齊莊四年衛獻二十七年殤九年蔡景四十二年鄭簡十六年曹武五年陳哀十九年杞孝十七年卒宋平二十六年秦景二十七年楚康十年吳諸樊十一年春王二月癸酉朔日有食之正傳曰書日有食之志天變也三月己巳杞伯丐卒正傳曰丐杞伯名書杞伯丐卒志鄰國之大故也左氏曰杞孝公卒晉悼夫人杞孝公姊喪之平公不徹樂非禮也夏邾畀我來奔正傳曰畀我公羊以為邾婁大夫是也書邾畀我來奔則奔者與受奔者之罪並見矣夫畀我來奔叛君之人也魯受之則是納叛君之人而教我臣之叛我也一間耳安知我之臣不叛我而他國之君不納叛我者乎故是年冬臧紇奔邾邾亦受之循環之理也故春秋前年書邾庶其以漆閭丘來奔今年書畀我來奔聖人之情見矣葬杞孝公正傳曰書葬杞孝公志與國之大事也陳殺其大夫慶虎及慶寅正傳曰書陳殺其大夫慶虎及慶寅則陳之失刑政可見矣左氏曰陳侯如楚公子黃訴二慶於楚楚人召之使慶約殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也故書曰惟命不于常愚謂慶氏以陳叛屈建從陳侯圍陳役人遂殺虎寅夫圍之者有楚兵也殺之者役人也而言陳殺之欲使觀者推其故而知陳失其政刑不能聲罪致討而假强楚之力役人之手然後能殺之也胡氏曰按左氏慶虎無道求專陳國暴蔑其君畏公子黃之逼而訴之楚曰與蔡司馬同謀楚人以為討公子黃奔楚訴之二慶以陳叛楚屈建圍陳殺二慶夫人君擅一國之利勢使權臣暴蔑其身而不能逺欲去其親而不能保譛訴之於大國而不能辨至因夷狄之力然後能克則非君人之道也愚謂是矣又謂二慶稱國以殺為譏歸陳侯也則鑿於義例矣陳侯之弟黃自楚歸于陳正傳曰書陳侯之弟黃自楚歸于陳善其歸也左氏謂楚人納公子黃黃之奔楚以慶虎慶寅逼之也虎寅誅而楚納黃歸于陳小人道消君子道長以為順矣或謂罪奔夷狄之國藉夷狄之力以歸以為進退不正則過矣逆者為夷狄順者為中國晉欒盈復入于晉入于曲沃正傳曰曲沃晉邑也書晉欒盈復入于晉入于曲沃罪其入之非也夫欒盈雖為宣子所逐而晉兩㑹諸侯以錮之是又重見絶於君矣今乃復強入焉則其逆而不受君命罪益甚矣左氏曰晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之趙氏以原屏之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聽於中行氏程鄭嬖於公唯魏氏及七輿大夫與之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宮必無害也公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宮范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劔左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劔以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乘槐本而覆或以㦸鈎之斷肘而死欒魴傷欒盈奔曲沃晉人圍之愚謂觀此則曲沃之人願為之死猶不死也則國人之心固歸之似順矣然而宣子持之於下晉侯錮之於上且無所容於天下矣況能強以入乎胡氏曰欒氏晉室之世臣故盈雖出奔猶繫於晉復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故聞語欒孺子者則或泣或嘆以為得主而為之死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在於錮之甚急使無所容於天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉愚謂恐春秋之正意不在此特見其入之非耳且以復入為甚逆之詞泥矣秋齊侯伐衛遂伐晉正傳曰書齊侯伐衛遂伐晉甚非義之兵也而其背同盟犯盟主之罪並見矣二十二年冬沙隨之㑹衛侯與焉主是㑹者晉侯也不踰年間欒氏之亂即將伐晉而先伐衛犯此二罪而不恤齊之無道亦既甚矣左氏曰秋齊侯伐衛自衛將伐晋晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諌曰不可臣聞之小國間大國之敗而毁焉必受其咎弗聽齊侯遂伐晉取朝歌為二隊入孟門登太行張武軍於滎庭戍郫邵封少水以報平隂之役乃還愚謂使齊侯用晏子之言而止焉則不得罪於春秋矣八月叔孫豹帥師救晉次于雍榆正傳曰書救晉次于雍榆著其善而非善也夫救晉善矣而次焉豈善乎夫救者如救焚然當速趨而往可也今救盟主之見伐乃次而逡巡焉故春秋書以非之左氏以為禮誤矣己卯仲孫速卒正傳曰書仲孫速卒志國卿之大故也左氏曰季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌即公鉏與紇即悼子吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃故公鉏氏富愚謂按此則仲孫速以一念之私溺愛舍長立少貽家禍於子孫則其平生為人可知矣書卒使人求其故以為後鑒戒也冬十月乙亥臧孫紇出奔邾正傳曰書臧孫紇出奔邾則其罪自見矣蘧伯玉曰不以道事君者其出乎紇之出奔以阿季氏廢長立少為之也邾為世讐而奔就之是與讐也其不以道可知矣左氏曰孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟子將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶於鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長於公宮姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺嫡立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰毋或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎愚謂紇既負不道之名而奔又斬關犯門而出及聞孟椒之言而嘆國之有人於是乎始伏其罪矣仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也晉人殺欒盈正傳曰書晉人殺欒盈伏其罪也左氏曰晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋書曰晉人殺欒盈不言大夫言自外也愚謂盈之逃君不受君命君㑹諸侯再錮而強入其見殺乃自取之也齊侯襲莒正傳曰書齊侯襲莒則其不義之兵見矣左氏曰齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰期于壽舒杞殖華還載甲夜入且于之隧宿于莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成愚謂古人有言兵凶器也戰危事也豈不信哉莒無可聲之罪而齊侯襲之可謂無義及傷其股而不已杞梁又見獲焉豈非自取之也哉靈王二十三年二十有四年晉平九年齊莊五年衛獻二十八年殤十一年蔡景四十三年鄭簡十七年曹武六年陳哀二十年杞文公益姑元年宋平二十七年秦景二十八年楚康十一年吳諸樊十二年春叔孫豹如晉正傳曰書叔孫豹如晉著其如之非也諸侯邦交之禮有朝聘㑹同之期非其期則謂之非禮矣杜氏曰賀克欒氏也夫討曰天討天之道也欒氏之不臣克之乃天討也而以為賀焉豈禮乎仲孫羯帥師侵齊正傳曰羯代速為政書仲孫羯帥師侵齊著無名之兵也夫敵侵於已不得已而應之名也彼國有罪告于天王帥與國往伐之名也按左氏孟孝伯侵齊晉故也則知為前使叔孫豹救齊之伐晉次于雍榆而無功故又使羯侵之為晉報怨焉耳何名之有耶夏楚子伐吳正傳曰書楚子伐吳著貪憤之兵也左氏曰夏楚子為舟師以伐吳不為軍政無功而還秋七月甲子朔日有食之既正傳曰書日有食之既志天變也日陽道也日食則君弱臣強之象況食之既乎其當時諸侯政在大夫之應歟齊崔杼帥師伐莒正傳曰書齊崔杼帥師伐莒著無名之師也左氏曰齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊社搜軍實使客觀之陳文子曰齊將有寇吾聞之兵不戢必取其族秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒大水正傳曰書大水志災也八月癸巳朔日有食之正傳曰書日有食之志天變也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀正傳曰書公㑹諸侯于夷儀著非義也左氏曰㑹于夷儀將以伐齊水不克愚謂古者諸侯之㑹也所以修好今之諸侯之㑹也將以搆怨魯晉雖見伐於齊不以訴于天子乃摟諸侯以伐之豈禮義乎冬楚子蔡侯陳侯許男伐鄭正傳曰書楚子蔡侯陳侯許男伐鄭著不義之兵也左氏曰冬楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭楚子自棘澤還使薳啓疆帥師送陳無宇吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹壽與師祁犂讓之舒鳩子敬逆二子而告無之且請受盟二子受命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還愚謂楚欲救齊而乃帥三國以伐鄭鄭為無罪伐之不義矣公至自㑹正傳曰書公至自㑹義見前陳針宜咎出奔楚正傳曰宜咎陳大夫書陳針宜咎出奔楚著其奔之非也左氏曰陳人復討慶氏之黨針宜咎出奔楚愚謂針宜咎既為慶氏之黨棄其宗祧而去父母之邦又不擇所從而奔楚焉以中國而變於夷其罪莫逭矣叔孫豹如京師正傳曰書叔孫豹如京師則其善惡皆見矣左氏曰齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路愚謂襄公即位未嘗朝天子及穀雒鬪毁王宮齊人城郟乃一使大夫如京師聘且賀焉似敬王而實慢之也故曰其善惡皆見矣王嘉其有禮而賜之大路過矣大饑正傳曰書大饑志災也穀梁子曰五穀不升為大饑又曰五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛候廷道不除百官布而不制鬼神禱而不祀此大侵之禮也胡氏曰古者救災之政若國凶荒或發廩以賑乏或移栗以通用或徙民以就食或為粥溢以救饑莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑蓋所以賑業之者有不備矣故書之以為戒靈王二十四年二十有五年晉平十年齊莊六年弒衛獻二十九年殤十一年蔡景四十四年鄭簡十八年曹武七年陳哀二十一年杞文二年宋平二十八年秦景二十九年楚康十二年吳諸樊十三年卒春齊崔杼帥師伐我北鄙正傳曰書齊崔杼帥師伐我北鄙志警也而陵暴之罪亦可見矣左氏曰以報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異於他日齊師徒歸夏五月乙亥齊崔杼弒其君光正傳曰光齊莊公名書齊崔杼弒其君光誅亂賊也齊太史書之魯史因報而書之冊使君之昏淫臣之弒逆者知所以戒焉左氏曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子遂取之莊公通焉崔子因是又以其間伐晉也曰晉必將報欲弒公以說于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入于室與崔子自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近於公宮陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弒之晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭之興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人于太宮曰所不與崔慶者晏子仰天嘆曰嬰所不唯忠於君利社稷者是與有如上帝乃歃太史書曰崔杼弒其君崔子殺之其弟嗣書而殺者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲愚謂此實傳也莊公以淫惡見弒雖其自取而崔杼犯君臣之大義不能逃誅於萬世矣又按左傳稱太史書崔杼弒其君兄弟再見殺而不回南史復繼以往由是觀之則今之春秋皆太史之所書也孟子其文則史之言不誣矣後儒乃謂字字皆出聖人之手豈不謬哉胡氏曰齊莊公見弒賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不苟者是也雖在屬車後乘必不肯同入崔氏之宮矣若此十人者獨勇力聞皆逢君之惡從於昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經於溝瀆而莫之知者猶不逺也晏平仲曰君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之此十人者真其私昵任此宜矣雖殺身不償責安得以死節許之哉公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀正傳曰書公㑹晉侯列國于夷儀則使人考其跡而其㑹之失自見矣左氏曰晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賄晉侯許之使叔向告于諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣愚謂據此傳則此㑹乃為報朝歌之役耳而齊弒君之賊乃舍其罪而不問一失也及晉受齊人之賂而舍之二失也而襄公與諸侯皆從之三失也又何以服齊而免春秋之誅乎胡氏曰諸侯㑹于夷儀將以討齊齊使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之夫晉本為報朝歌之役來討及㑹夷儀既聞崔杼之弒則宜下令三軍建而復斾聲於齊人問莊公之故執崔杼以戮之謀於齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云六月壬子鄭公孫舍之帥師入陳正傳曰書鄭公孫舍之帥師入陳著貪憤之兵也左氏曰初陳侯㑹楚子伐鄭當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宮與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還愚謂據此傳則鄭以憤怨而入陳以賄賂而還兵是貪憤之兵也故春秋書之以著其罪夫鄭之諸臣不足責有一子産而猶為非義之舉又可以見功利之移人賢者猶不能自免也秋八月己巳諸侯同盟于重丘正傳曰重丘齊地書諸侯同盟于重丘病諸侯也稱諸侯有齊焉左氏曰齊成故也愚謂齊崔杼弒其君有滔天之罪諸侯不能請討之晉與諸侯皆受賂而同與之盟焉是同惡相濟也故春秋惡之胡氏曰崔杼既弒其君矣晉侯受其賂而許之成故盟于重丘特書曰同愚謂同者同心於惡也公至自㑹正傳曰書公至自㑹謹君之出入也而其非義具見矣衛侯入于夷儀正傳曰衛侯名衎夷儀衛邑書衛侯入于夷儀則其出其入之善惡自見矣夫衛侯衎蔑其冢卿失國出奔是為君無道不守其宗社其惡不可掩矣然有世叔儀以守有母弟鱄以出一撫其內一營其外以為可歸未絶之道故其入猶可與也春秋書之其義備矣楚屈建帥師滅舒鳩正傳曰舒鳩小國名書楚屈建帥師滅舒鳩著暴虐之師也左氏曰楚薳子馮卒屈建為令尹屈蕩為莫敖舒鳩人卒叛楚令尹子木伐之及離城吳人救之子木遽以右師先子疆息桓子捷子駢子孟帥左師以退吳人居其間七日子疆曰久將墊隘隘乃禽也不如速戰請以私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師㑹之吳人大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩愚按此傳則楚人無字小恤禍之義逞其陵弱暴寡之惡不問叛君之罪而絶人宗社之祀其斯以為夷乎冬鄭公孫夏帥師伐陳正傳曰書鄭公孫夏帥師伐陳著報怨之師也左氏曰鄭子産獻捷于晉戎服將事晋人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女太姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳亡周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而耻太姬天誘其𠂻啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉愚謂此本傳也世稱子産有詞似矣然以先王之命惟罪所在各致其辟晉將詰之曰先王之法天子討而不伐諸侯伐而不討今鄭何故不告於天王㑹方伯連帥以伐之而私自擅興大衆而肆陵弱暴寡之憤為報怨之舉乎則子産將無詞以對矣孰謂子産有詞至於傳所引非孔子之言也說士之語也十有一月吳子遏伐楚門于巢卒正傳曰巢南小國也遏公羊作謁吳子名書吳子遏伐楚門于巢卒罪吳子之自輕而巢人之犯順也何謂自輕左氏曰吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒由此觀之則吳子之自輕而見殺可見矣何謂犯順穀梁曰古者大國過小邑小邑必飾城而請罪禮也吳子遏伐楚至巢入其門門人射吳子有矢創及舍而卒由是觀之則巢人之越禮而犯順可見矣又曰非巢之不飾城而請罪非吳子之自輕也愚謂得之矣靈王二十五年二十有六年晉平十一年齊景公杵臼元年衛獻三十年殤十二年弒蔡景四十五年鄭簡十九年曹武八年陳哀二十二年杞文三年宋平二十九年秦景三十年楚康十三年吳餘祭元年春王二月辛邜衛寧喜弒其君剽正傳曰書寧喜弒其君剽正逆罪也左氏曰衛獻公使子鮮即公子鱄為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命於敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰穀右宰穀曰不可獲罪於兩君天下誰畜之悼子即寧喜曰吾受命於先人不可以二穀曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子林父在戚孫嘉聘於齊孫襄嘉襄皆林父子居守二月庚寅寧喜右宰穀伐孫氏不克伯國孫襄傷寧子出舍於郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔及太子角書曰寧喜弒其君剽言罪之在寧氏也愚謂此其實傳也又按左氏衛獻公衛衎自夷儀使與寧喜言寧喜許之大叔文子聞之曰嗚呼詩所謂我躬不恤遑恤其後者寧子可謂不恤其後矣詩曰夙夜匪懈以事一人今寧喜視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而況置君而弗定乎必不免矣愚謂由是觀之則喜固許衎以入而弒剽之罪著矣胡氏曰於衎則殖也出之喜也納之於剽則殖也立之喜也弒之是奕棋之不若也不思其終亦甚矣故聖人特正其為弒君之罪示天下後世使知慎於廢立之際而不敢忽也霍光以大義廢昌邑立宣帝猶有言其罪者而朝廷加肅況私意邪范桀桓彛之徒殺身不顧君子所以深取之者知春秋之旨矣衛孫林父入于戚以叛正傳曰戚衛邑名書衛孫林父入于戚以叛誅逆臣也左氏曰孫林父以戚如晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退專祿以周旋戮也甲午衛侯衎復歸于衛正傳曰衎衛獻公名書衛侯衎復歸于衛則出之者入之者之罪皆著而衛侯君國之義不白其罪均矣夫衎之出也以殖其入也以喜未有天子連帥聲大義於天下而復之特出入於權臣之手耳其將何以自立於天下乎左氏曰甲午衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已公至使讓太叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通內外之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之愚謂由是觀之則衎之始歸恩怨分明略無悔過遷善之意矣春秋書之竊取之義使人深繹之也不在乎書名書日與否而其意獨至矣胡氏曰按左氏孫林父以戚如晉書曰入于戚以叛者著其據土背君之罪也臣之祿君實有焉專祿以周旋戮也衛侯出奔齊入于夷儀皆以爵稱今既復歸而得國矣乃書其名何也人之有德慧術知者常存乎疢疾衛侯淹恤在外十有二年困於心衡於慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其強於為善之意也夏晉侯使荀吳來聘正傳曰書晉侯使荀吳來聘非其聘也著非禮也左氏曰晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也由是觀之則荀吳之來非聘也召公以討衛也夫衛林父據戚以叛而晉人戍之黨逆也至於衛伐戚戍卒見殺者三百乃召諸侯伐衛其不直甚矣焉能以令諸侯乎故春秋惡之公㑹晉人鄭良霄宋人曹人于澶淵正傳曰澶淵衛地近戚書公㑹晉鄭宋曹之人于澶淵著其㑹之非也此晉志也為晉討衛也左氏曰六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏趙武不書尊公也向戌不書後也鄭先宋不失所也於是衛侯㑹之晉人執寧喜北宮遣使女齊以先歸衛侯如晉晉人執而囚之士弱氏秋七月齊侯鄭伯為衛侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也國子使晏平仲私與叔向曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晉侯乃許歸衛侯愚謂晉以黨叛戍戚而見敗於衛乃其自取猶為此㑹以勤列國之衆而不知自咎春秋所深惡也秋宋公殺其世子痤正傳曰痤宋太子名書宋公殺其世子痤兩傷父子之大倫也左氏曰初宋芮司徒生女赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉太子痤美而狠合左師畏而惡之寺人惠牆伊戾為太子內師而無寵秋楚客聘於晉過宋太子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徵之而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為太子公徐聞其無罪也乃亨伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之愚謂據此則世子之見疑於其父也以外交宋公之殺世子也以聽讒天性之愛一旦而移遂至相賊父固不仁矣子亦非孝也胡氏曰殺世子母弟直書君者甚之也宋寺人伊戾為太子內師無寵譛於宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譛言之得行也必有嬖妾配嫡以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意晉人執衛寧喜正傳曰書晉人執衛寧喜著執之者與見執者之罪也夫寧喜弒君之罪已書在諸侯之䇿矣晉人不以此罪聞之天王歸之司寇而徒怨其殺戚戍之故以執之所謂舍斬關之盜而問穿踰者故公羊曰此執有罪何以不得為伯討不以其罪執之也八月壬午許男寧卒于楚正傳曰書許男寧卒于楚不正其卒也左氏曰許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚夫諸侯卒于正寢正也許男徒為區區報怨之舉而身死夷國可謂不正之甚矣故春秋書之冬楚子蔡侯陳侯伐鄭正傳曰書楚子蔡侯陳侯伐鄭著貪憤之師也左氏曰楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展說不禦寇十二月乙酉入南里墮其城涉於樂氏門于師之梁縣門發獲九人焉涉于汜而歸而後葬許靈公愚謂觀此則子産之深謀可見矣語曰柔能勝剛弱能勝强豈不然乎春秋書之見陳蔡淪於夷狄其罪同也葬許靈公正傳曰書葬許靈公以時也禮也見諸侯同盟畢至之義焉春秋正傳卷二十七
