body:
  text: 春秋正傳卷二十五明湛若水撰襄公名午成公妾定姒之子四嵗即位在位三十一年簡王十四年崩元年晉悼公周元年齊靈十年衛獻五年蔡景二十年鄭成十三年曹成六年陳成二十七年杞桓六十五年宋平四年秦景五年楚共十九年吳夀夢十四年春王正月公即位正傳曰書春王正月公即位正統也即位者君道之始也所以正始也仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城正傳曰書會諸侯之兵圍宋彭城著禦叛攘夷之義也楚強以兵納魚石于彭城欲據彭城以自固非楚以其地封之也彭城故宋地故曰宋彭城圍宋彭城以討宋叛臣也左氏以為彭城非宋地追書也公羊以為楚取彭城以封魚石者皆非也胡氏曰按左氏曰非宋地追書也然則書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也楚已取彭城封魚石戍之三百乘矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登叛人所以正疆域固封守謹王度也愚謂胡氏謂彭城繫之宋楚不得取之宋魚石不得受之楚是也但此皆當時史之舊文非仲尼筆之也當時之史豈無如董狐南史之良者乎審如胡氏之言則與孟子之説異矣故劉氏曰春秋故史也有所不革孟子曰其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣愚謂謂之竊者如竊比老彭之竊不敢顯然之謂也況革乎夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫正傳曰鄫鄭地書晉韓厥帥師伐鄭列國之師次于鄫討背夏也左氏曰夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援愚謂以天下諸侯與晉相為犄角以討鄭之叛夏其名義正矣故春秋詳書而深與之胡氏曰楚人釋君而臣是助事已悖矣晉於是乎降彭城以魚石等歸遂伐鄭諸侯次于鄫此皆放於義而行者也傳書楚子辛救鄭而經不書者鄭本為楚以其君之故親集矢於目是以與楚而不二也棄王國從荆蠻不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削之不言救也秋楚公子壬夫帥師侵宋正傳曰書楚公子壬夫帥師侵宋著猾夏之師也左氏曰秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘汪氏曰楚憤宋之復彭城且欲援鄭而退諸侯之師故復釋憾於宋愚謂楚以彭城之故侵宋是憤兵也書曰蠻夷猾夏冦賊姦宄其楚之謂乎故春秋惡之九月辛酉天王崩正傳曰天王簡王也書天王崩志天下之大變也天下如喪考妣諸侯有奔喪之禮焉故史因來赴而書之邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘正傳曰書邾子來朝冬衛晉使來聘則失禮之非自見矣左氏以凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者非也夫天王之崩已赴大小之國乃不聞有奔喪于京師者而且小國大國盛修朝聘其無君滅天甚矣故聖人書之以繼於天王崩之下所以誅列國之罪以厲天下意亦至矣胡氏曰簡王崩赴告已及藏在諸侯之䇿矣則宜以所聞先後而奔喪今邾子方來修朝禮衛侯晉侯方來修聘事於王喪若越人視秦人之肥瘠曾不與焉而左氏以為禮此何禮乎滕定公薨世子定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀益廢民習於耳目而不察故後世以日易月人子安而行之不知春秋之義無君臣之禮豈不惜哉靈王元年二年晉悼二年齊靈十一年衛獻六年蔡景二十一年鄭成十四年卒曹成七年陳成二十八年杞桓六十六年宋平五年秦景六年楚共二十年吳壽夢十五年春王正月葬簡王正傳曰書春王正月葬簡王志葬之非禮也禮天子七月而葬同軌畢至今簡王五月而葬非禮矣鄭師伐宋正傳曰書鄭師伐宋則鄭從夷之罪自見矣左氏曰春鄭師侵宋楚令也愚謂鄭以中國從楚之令以伐中國帝王之裔其罪大矣故春秋惡之夏五月庚寅夫人薑氏薨正傳曰薑氏襄公嫡母也書庚寅夫人薑氏薨志君母之大故也薑氏成公之嫡夫人書薨禮也國中臣民如喪妣焉春秋書此與四年七月書夫人姒氏薨其文同也然而聖人竊取之義一與一刺大有不同矣而先儒謂春秋為聖人之筆一字之間有美刺不同焉可乎左氏曰夏齊薑薨初穆薑使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順德之行季孫於是為不哲矣六月庚辰鄭伯睔卒正傳曰睔鄭伯名書庚辰鄭伯睔卒志大故也而鄭伯平生之惡可考矣左氏曰鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰昵我免寡人惟二三子秋七月庚辰鄭伯睔卒愚謂觀左傳所言則鄭伯至死而不肯背楚以息肩於晉其亦異乎人之性矣所謂鳥之將死其鳴也哀人之將死其言也善鄭伯臨死其言不善豈人之性乎夫以鄭伯不念祖宗之德華夏之裔棄王國之盟以從荆蠻力行其惡而不悛至死猶無悔悟之心不能反躬天理滅矣悲夫晉師宋師衛寧殖侵鄭正傳曰書晉宋衛侵鄭譏伐喪也夫諸侯有相恤之義鄭伯睔卒未踰月而三國侵之失禮害義之大者也左氏曰於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改愚謂子駟之言蓋謂鄭伯臨終之命也秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚正傳曰仲孫蔑會晉宋衛曹邾于戚著其會之非也左氏曰會于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之會吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之愚謂諸侯邦交之禮朝聘會同所以修好今六國之會乃以謀鄭為事可謂善會乎已丑葬我小君齊薑正傳曰書葬我小君齊薑志國之大事也左氏曰齊侯使諸薑宗婦來送葬召萊子萊子不會故晏弱城東陽以逼之叔孫豹如宋正傳曰書叔孫豹如宋志禮也左氏曰穆叔聘於宋通嗣君也夫國君嗣位而使大夫通聘問焉可謂得禮矣故春秋善之冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢正傳曰虎牢鄭之制邑也書十國之大夫會于戚遂城虎牢志禦侮之義也左氏曰冬復會于戚齊崔武子及滕薛小邾之大夫皆會知武子之言故也遂城虎牢鄭人乃成愚謂鄭援楚屢為中國之患城虎牢鄭失所據矣公羊以為虎牢不言取不繫乎鄭為中國諱伐喪者非也十國但城虎牢以禦鄭之猾夏而未嘗取之也以王國合諸侯以擯荆蠻仗大義者不計小節聖人斯與之而已矣程子曰設險所以守國也有虎牢之險而不能守故不繫於鄭責其不能有也胡氏曰虎牢鄭地故稱制邑至漢為成臯今為汜水縣巖險聞於天下猶虞之下陽趙之上黨魏之安邑燕之榆關吳之西陵蜀之漢樂地有所必據城有所必守而不可以棄焉者也有是險而不能守故不繫於鄭然則據地設險亦所貴乎天險不可升也地險山川丘陵也王公設險以守其國大易之訓也城郭溝池以為固亦君子之所謹也鑿斯池築斯城與民同守孟子之所以語滕君也夫狡焉思啓封疆而爭地以戰殺人盈野爭城以戰殺人盈城者固非春秋之所貴守天子之土繼先君之世不能設險守國將至於遷潰滅亡亦非聖人之所與故城虎牢而不繫於鄭程氏以為責鄭之不能有也其聖人以待衰世之意小康之事邪愚謂二子之言皆泥於文義而不知經之大指矣經之大指不過紀城虎牢見諸侯同禦鄭抑楚之義耳豈論鄭之能守與不能守而遂以不繫於鄭以取義哉且十年冬又書戍鄭虎牢者復何謂乎可類觀矣楚殺其大夫公子申正傳曰書楚殺其大夫公子申則擅殺之罪自見矣左氏曰楚公子申為右司馬多受外國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申愚謂禁曰無專殺大夫申多受外國之賂是申誠可殺也然必以告於天子歸之司冦而殺之可也又云以逼子重子辛楚人殺之是子重子辛畏其逼已使國人殺之耳夫聽楚人之殺其大夫而楚君不能禁亦不之問則楚之不競亦可知矣靈王二年三年晉悼三年齊靈十二年衛獻七年蔡景二十二年鄭僖公髠頑元年曺成八年陳成二十九年杞桓六十七年宋平六年秦景七年楚共二十一年吳壽夢十六年春楚公子嬰齊帥師伐吳正傳曰書楚公子嬰齊帥師伐吳著貪憤之兵也左氏曰楚子重伐吳為簡之師克鳩兹至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒愚謂兵凶器也用之不以其道未有不反自傷者也故貪人者自殘憤人者自僨觀於左傳嬰齊伐吳為簡之師克鳩兹至于衡山使鄧廖侵吳此非貪憤之兵乎宜乎子重之喪師喪心以死也公如晉正傳曰書公如晉志失禮也左氏曰始朝也髙氏曰童子侯不朝王蓋不可接以成人之禮也豈可反朝同列乎觀此可以見朝晉之非矣夏四月壬戌公及晉侯盟于長樗正傳曰書公及晉侯盟于長樗則非禮之禮可考見矣左氏曰孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首愚謂以禮天子之禮禮同列非所謂非禮之禮乎孟獻子之對不知惟禮之守足以自安而惟利之圖孟獻子亦不得為賢大夫矣公至自晉正傳曰書公至自晉謹君之出入也六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤正傳曰單子為王卿士書同盟于雞澤志修好也而非禮自見矣夫以諸侯同盟修好禮也以王人下會盟于諸侯非禮也左氏曰晉為鄭服故且欲修吳好將合諸侯使士丐告于齊曰寡君使丐以歲之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協乃盟于耐外六月公會單頃公及諸侯己未同盟于雞澤晉侯使荀會逆吳子于淮上吳子不至愚謂此為鄭服而與王人諸侯修好息兵安民則未有不善然單子以王人下盟則失天王之尊矣春秋書之雖以取彼善於此亦以憾王道之陵夷也歟程子曰楚強諸侯皆畏之而修盟故書同胡傳曰同盟或以為有三例一則王臣預盟而書同二則諸侯同欲而書同三則惡其反覆而書同夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟于女栗及蘇子也而不書同盟于洮翟泉會王人也而不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同病楚也會于柯陵之歲夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師于汝上而諸侯還雞澤之盟陳袁僑如會楚師在繁陽而韓獻子懼平丘之行楚棄疾立復封陳蔡而中國恐是知此三盟者諸侯皆有戒心而修盟故稱同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣陳侯使袁僑如會正傳曰書陳侯使袁僑如會善歸會也榖梁曰如會外乎會也於會受命也左氏曰楚子辛為令尹侵欲於小國陳成公使袁僑如會求成晉侯使和組父告于諸侯愚謂由是觀之則袁僑之如會非正會也蓋不堪於楚之侵而欲如會以求成耳其意則善矣故春秋與之戊寅叔孫豹及諸侯之大夫及陳袁僑盟正傳曰書叔孫豹及諸侯大夫及袁僑盟罪私盟也左氏曰陳請服也愚謂諸侯大夫以陳袁僑之來服既已受命於諸侯而又私與之盟是二政也春秋直書之而其罪自見矣善乎榖梁子曰諸侯以為可與則與之不可與則釋之諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失政矣大夫執國權曰袁僑異之也秋公至自會正傳曰書公至自會謹君之出入也冬晉荀罃帥師伐許正傳曰書晉荀罃伐許見可伐也非所伐也左氏曰許靈公事楚不會於雞澤冬晉知武子帥師伐許夫許背華事夷誠有罪矣然晉不以王命而伐之猶為擅興之師與許一間耳靈王三年四年晉悼四年齊靈十三年衛獻八年蔡景二十三年鄭僖二年曹成九年陳成三十年卒杞桓六十八年宋平七年秦景八年楚共二十二年吳夀夢十七年春王三月己酉陳侯午卒正傳曰午陳侯名胡氏論諱名不諱名之義止可諱之於交際之時一時之事也若春秋垂訓之書萬世之事也其可以諱乎書陳侯午卒志與國之大故也諸侯卒則相赴以其有相弔賻相恤之義焉左氏曰春楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂惟知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聽命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而況小乎夏楚彭名侵陳陳無禮故也夏叔孫豹如晉正傳曰書叔孫豹如晉著禮也夫禮尚往來惟其稱而已矣左氏曰穆叔如晉報知武子之聘也非所謂往來而稱者乎又按左傳晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜愚謂觀此可謂得禮也已秋七月戊子夫人姒氏薨正傳曰姒氏成公妾襄公母姒杞姓書夫人姒氏薨志君母之大故也而禮之得失自見矣姒氏妾也就以子貴無乃為貴妾耳而稱夫人書薨以妾僣嫡非禮矣臣民僣稱之國史因其故而書之聖人因史文而不改而其非禮自見矣左氏曰秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為已樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎愚謂據此則姒氏以妾不殯于廟及觀季孫之意蓋謂妾不可以僣嫡故曰略之耳於禮未失也又觀匠慶以為小君之喪云云則襄公違禮尊其母季孫不得違之故史以夫人之禮書薨耳先儒皆謂春秋是聖人之筆豈聖人有此越禮之書哉其説可不攻自破矣又可以此例觀其他矣葬陳成公正傳曰書葬陳成公志時也有同盟皆至之禮焉八月辛亥葬我小君定姒正傳曰定姒氏諡書八月辛亥葬我小君定姒志君母之大事也則不時違禮之非自見矣髙氏曰死才二十三日耳前書夫人此書小君則以國君之嫡禮喪葬之矣冬公如晉正傳曰書公如晉則非禮之行自見矣左氏曰冬公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑褊小闕而為罪寡君是以願借助焉晉侯許之愚謂按此則棄喪屈已之罪大矣夫襄公喪母至是才三四月耳而棄喪以朝晉為忘哀非孝也以魯與晉敵國同列耳而曰如晉聽政又請鄫焉為辱已非仁也襄公一行而有二失焉故曰吉凶悔吝生乎動君子慎動陳人圍頓正傳曰頓小國書陳人圍頓著陵弱憤怨之兵也左氏曰楚人使頓間陳而侵伐之故陳人圍頓靈王四年五年晉悼五年齊靈十四年衛獻九年蔡景二十四年鄭僖三年曹成十年陳哀公溺元年杞桓六十九年宋平八年秦景九年楚共二十三年吳夀夢十八年春公至自晉正傳曰書公至自晉謹君之出入也而公取辱於晉之道不朝正於廟之失並見矣夏鄭伯使公子發來聘正傳曰書鄭伯使公子發來聘與其悔過之善也左氏曰夏鄭子國來聘通嗣君也鄭背華從楚久矣今來聘通嗣君得中國邦交之禮故聖人書以善之叔孫豹鄫世子巫如晉正傳曰書叔孫豹鄫世子巫如晉著非禮也左氏曰穆叔覿鄫太子于晉以成屬鄫書曰叔孫豹鄫太子巫如晉言比諸魯大夫也愚謂先王疆理天下分封大小諸國所以固封守親鄰國而尊天子也使其後世子孫各守其社稷宗廟以輯其人民今魯以鄫之弱小不能自立屢困於鄭楚不知相恤濟弱扶傾之義乃又假晉之強而請屬之穆叔又覿鄫世子于晉以成屬焉其如先王分封社稷以奉天子之制何非禮甚矣故春秋直書而竊取之義自見矣仲孫蔑衛孫林父會吳于善道正傳曰善道吳地書仲孫蔑衛孫林父會吳于善道著會之非禮也左氏曰吳子使壽越如晉辭不會于雞澤之故且請聽諸侯之好晉人將為之合諸侯使衛魯先會吳且告會期故孟獻子孫文子會吳于善道愚謂聖人與天地萬物為一體也然於華夷之辨甚嚴非外二之也其禮分則然也所以正冠屨而防外侮也以中國與夷狄會盟華夷之辨已混矣聖人之心不欲絶物來則受之可也乃使二大夫往會于彼境則非禮矣故張氏曰悼公初立其風聲所及逺人慕之故吳有志於親中國辭請雞澤之不會而請聽後會之期悼公告以會期而聽其自來足矣至使魯衛往會之則是以王國大邦而為吳子屈此二大夫會吳之所以書也是矣秋大雩正傳曰大雩者祭天禱雨天子之祭也周之秋夏之五六七月正農人憂旱之時也左氏曰旱也是魯因旱而舉大雩聖人因史而書之其僣禮之罪自見矣楚殺其大夫公子壬夫正傳曰壬夫楚令尹子辛名書楚殺其大夫公子壬夫則専殺之罪自見矣葵丘之誓曰無専殺大夫楚専殺壬夫是犯禁矣左氏曰楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑詩曰周道挺挺我心扃扃講事不令集人來定已則無信而殺人以逞不亦難乎愚謂壬夫以貪敗政而逺人叛之可殺也然不以請於天子歸之司冦而殺之是乃専殺自干先王之誅矣故春秋書之公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚正傳曰書公會晉宋陳衛鄭曹莒邾滕薛齊吳鄫之諸侯世子大夫于戚善其會也善拒楚也左氏曰九月丙午盟于戚會吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于會愚謂戍陳所以拒楚也拒楚善矣然援吳以入中國則恐有勾賊破家之患焉聖人於春秋皆書之其竊取之義見矣程子曰吳來會非為主也胡氏又謂來會諸侯而不為主則進而稱人諸侯往與之會而主吳則貶而稱國則泥矣公至自會正傳曰書公至自會謹君之出入也冬戍陳正傳曰戍者以兵守之也公羊曰孰戍之諸侯戍之故言魯則諸侯之戍可知矣何以書戍陳程子曰非王命而勤民逺戍罪也而善於戍陳何哉蓋陳附中國而楚爭之則戍之者在於助陳而距楚與之可也愚謂斯義得之矣楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳正傳曰書楚伐陳諸侯救陳善之也善拒楚也攘楚以尊周也左氏曰楚子囊公子貞為令尹范宣子士丐曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午會于城棣以救之十有二月公至自救陳正傳曰書公至自救陳謹君之出入也榖梁曰善救陳也辛未季孫行父卒正傳曰稱名不稱大夫無他義然則以稱官不稱官觀春秋則不足以明春秋矣書辛未季孫行父卒則其平生之善可考知矣左氏曰季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎愚謂由是觀之則平生之善豈不可見乎靈王五年六年晉悼六年齊靈十五年衛獻十年蔡景二十五年鄭僖四年曹成十一年陳哀二年杞桓七十年卒宋平九年秦景十年楚共二十四年吳壽夢十九年春王三月壬午杞伯姑容卒正傳曰姑容杞伯名諡桓公書杞伯姑容卒志同盟之大故也左氏曰春杞桓公卒始赴以名同盟故也夏宋華弱來奔正傳曰華弱宋大夫書宋華弱來奔憫奔者而罪夫奔之者也左氏曰宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初愚謂弱不能以禮自保守先人之遺而至於出奔子蕩以忿嫉而梏之平公因而逐之使奔他國是子蕩之忌嫉平公之輕棄大夫而弱之奔亦不能無罪焉然而猶在所可憫者也春秋書之之意可見矣秋葬杞桓公正傳曰書葬杞桓公以來赴而志之著諸侯有同盟皆至之禮焉滕子來朝正傳曰書滕子來朝志邦交之禮也左氏曰秋滕成公來朝始朝公也愚謂諸侯初立同列有相朝之禮滕子來朝可謂得禮矣莒人滅鄫正傳曰書莒人滅鄫誅貪暴也而聖人興滅繼絶之情見矣左氏曰鄫恃賂也是矣蓋鄫恃賂而不修備故莒得而滅之穀梁以為莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也胡氏又謂公羊亦云莒女有為鄫夫人者蓋欲立其出也或曰鄫取莒公子為後愚謂皆非也按左傳襄公四年冬公如晉孟獻子相請屬鄫晉許之五年夏叔孫豹覿鄫世子巫于晉以成屬鄫其年秋九月公會十三國諸侯大夫于戚鄫人又與焉左氏以為穆叔以屬鄫為不利使鄫大夫聽命於會則魯復又不屬鄫矣故至是莒人取之至昭四年九月書魯取鄫左氏謂莒亂著丘公立不撫鄫鄫叛而來則莒人襄六年滅鄫以為邑乃其實事明矣至昭四年鄫人乃叛而來魯魯取之也自經書九月取鄫之後鄫再不書於經不與於會盟則到彼時為魯所取焉耳況此經書滅在於六年之秋明有其時豈有世子巫已如晉又謂立異姓取莒公子為後而始於此時耶諸儒之説皆誤矣冬叔孫豹如邾正傳曰書冬叔孫豹如邾善其如也左氏曰冬穆叔如邾聘且修平愚謂聘而修平者聖人之所善也故春秋書之其亦與人為善之意乎季孫宿如晉正傳曰宿行父之子始嗣立為大夫據左氏謂晉人以鄫滅來討故宿如晉此季孫宿如晉之由也蓋魯前既以屬鄫告晉至是聽莒滅之故晉人來討若曰爾屬鄫何以聽鄫之見滅也然宿以父喪未周非有國家金革之事而遽如晉則其如之非禮可見矣此春秋所以書之歟十有二月齊侯滅萊正傳曰書齊侯滅萊則貪殘之兵可見矣左氏曰十一月齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅於堞及杞桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器於襄宫晏弱圍棠十一月丙辰滅之遷萊于郳髙厚崔杼定其田愚謂以大事小國君之仁也興滅國繼絶世先王之政也齊侯恃其強大逞其憤而滅小國非仁矣絶滅人之社稷宗廟定其田焉其悖先王興滅繼絶之道矣何以令天下乎靈王六年七年晉悼七年齊靈十六年衛獻十一年蔡景二十六年鄭僖五年卒曹成十二年陳哀三年杞孝公丐元年宋平十年秦景十一年楚共二十五年吳壽夢二十年春郯子來朝正傳曰書郯子來朝志邦交之禮也左氏以為始朝公也蓋公即位至是七年矣而始朝者以為慢然而雖加一日猶愈於已也故春秋書之髙氏曰郯少皥氏之後也前世聖賢之後所封之國皆逼近四夷先王之意非特以蕃王室蓋用夏變夷也後世子孫往往多變於夷者反漸其習俗然也夏四月三卜郊不從乃免牲正傳曰周夏四月即夏之春二月此郊乃祈榖之祀也書夏四月三卜郊不從乃免牲見非禮之中又非禮也榖梁曰夏四月不時也左氏曰孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也愚謂古者冬至日郊天迎陽至故不卜郊此卜郊乃祈穀左氏榖梁二傳乃謂不時既耕卜郊皆誤也魯之郊非禮矣以四陽而郊非其時又非禮矣故春秋以非時書而非禮之祀自見矣小邾子來朝正傳曰書小邾子來朝志邦交之禮也左氏曰小邾穆公來朝亦始朝公也愚謂小邾以襄公即位而來朝得朝聘之正禮也城費正傳曰城者築城也費季氏邑也書城費志非禮也孔子曰大夫無百雉之城而季氏城費又以夏役奪民時二者皆非禮之甚矣左氏曰南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費胡氏曰夫文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至於帥師墮費其越禮不度可知矣然則書城費乃履霜堅氷之戒強私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉秋季孫宿如衛正傳曰書季孫宿如衛志其如之禮也左氏曰秋季武子如衛報子叔之聘且辭緩報非二也愚謂春秋之如有不同有謀人而如者有貪利而如者非聖人之所與也至於報聘而辭緩則有睦鄰修好之道故春秋書而與之八月螽正傳曰書螽志災也聖人重民食之情見矣冬十月衛侯使孫林父來聘壬戌及孫林父盟正傳曰書衛侯使孫林父來聘及林父盟禮也而非禮並見矣夫聘者諸侯邦交之禮使大夫禮也因而使盟非禮也故春秋並書而其似禮而非禮見矣左氏曰衛孫文子來聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折楚公子貞帥師圍陳正傳曰書楚公子貞帥師圍陳志蠻夷之猾夏也十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬正傳曰書公會諸侯于鄬善其會也左氏曰楚子囊公子貞也圍陳會于鄬以救之愚謂會諸侯救陳以擯楚尊夏攘夷善之大者也故春秋與之鄭伯髠頑如會未見諸侯丙午卒于鄵正傳曰鄵鄭地書鄭伯如會未見諸侯卒于鄵志變也憫其遷善之念也夫鄭伯如會棄楚以救陳逃夷以歸華一念悔過遷善之正也而遽卒焉聖人之所憫也故書之春秋左氏曰鄭僖公之為太子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝于晉子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諌不聽又諌殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯簡公生五年奉而立之愚謂事雖未可考信而春秋之書皆史氏據赴而書者而聖人竊取之義則不係乎此亦不足深論也胡氏曰按鄭僖公三傳皆以為弒而春秋書卒者左氏則曰以瘧疾赴也公羊則曰為中國諱也榖梁則曰不使夷狄之民加乎中國之君也夫弒而可以偽赴又順其欲而不彰則亂臣賊子免於見討而春秋非傳信之書矣然則弒而書卒二傳以為為中國諱不使荆蠻之民加鄭國之君疑得聖人之意顧習其説者未之察耳夫弒君之賊其惡不待貶絶而自見矣見弒者豈無不善之積以及其身者乎衛桓則以嫡母無寵宋殤則以亟戰疲民齊襄則以行同鳥獸鄭夷則以侮慢大臣蔡固則以淫而不父陳平國則以殺諌臣而通于夏氏楚虔則以多行無禮奚齊則以嬖孽而國人不之君吳餘祭則以輕近刑人而晉州蒲欲盡去羣大夫而立其左右也若夫鄭僖公則異於是矣中國者禮義之所出也荆蠻者苗粵之與鄰也僖公欲從諸侯會于鄬則是貴禮義為中國之君也諸大夫欲背諸夏與荆楚則是近苗粵為荆蠻之民也以鄭國之君而見弒於荆蠻之民豈有不善之積以及其身者乎聖人至是傷之甚懼之甚故變文而書曰鄭伯髠頑如會未見諸侯丙戌卒于鄵未見諸侯其曰如會何致其志也諸侯卒于境內不地鄵鄭邑也其曰卒于鄵見其弒而隱之也卒鄭伯逃歸陳侯聖人之旨微而公榖之義精矣存天理抑人欲之意逺矣愚謂諸侯卒于境內不地此所謂義例不知此孔子為之耶抑後儒為之耶拘聖經所無之例昧聖人竊取之義皆此之類為之蔽也吾敢謂孟子之後無善治春秋者陳侯逃歸正傳曰書陳侯逃歸則陳侯之罪自見矣左氏曰陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯於會曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸愚謂諸侯之會凡以救陳也陳侯既無預防之䇿又背其信義以逃歸其何以自立乎胡氏曰榖梁子曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申警備立太子以固守親聽命于諸侯謀禦敵之䇿當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衛而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟蠻夷之懼是不能由是路出入是門故書逃歸以罪之可謂深切著明矣愚謂逃義曰逃之説非也逃則非義矣靈王七年八年晉悼八年齊靈十七年衛獻十二年蔡景二十七年鄭簡公嘉元年曹成十三年陳哀四年杞孝二年宋平十一年秦景十二年楚共二十六年吳壽夢二十一年春王正月公如晉正傳曰書公如晉見其如之過禮也左氏曰春公如晉朝且聽朝聘之數夫襄公立八年而三朝于晉過於五年一朝天子之禮矣至是又朝以聽朝聘之數焉宛若諸侯聽命于天子者此魯所以日卑也惜哉夏葬鄭僖公正傳曰書葬鄭僖公志鄰國之大事也公羊曰賊未討何以書葬為中國諱也愚謂當是鄭以病卒赴未嘗以賊也故春秋因其赴而書之耳若以賊弒赴則春秋當直書之以為天下後世戒何必為中國諱哉若云賊未討不葬乃彼國事也何與於魯鄭人侵蔡獲蔡公子燮正傳曰書鄭人侵蔡獲蔡公子燮則罪不義也左氏曰庚寅鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣愚謂記曰國必自伐然後人伐之故侵人者人亦侵之矣伐人者人亦伐之失子産有至言而鄭之君臣不之知從多行不義鮮不反自及矣季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘正傳曰書季孫宿與諸侯之大夫會晉侯鄭伯于邢丘志非禮也左氏曰五月甲辰會于邢丘以命朝聘之數使諸侯之大夫聼命季孫宿齊髙厚宋向戌衛寧殖邾大夫會之鄭伯獻捷于會故親聼命大夫不書尊晉侯也愚謂據左氏此言則使諸侯之大夫聼命朝聘之數使若以臣承命於君然未為不可然而非禮也天下有道禮樂自天子出晉以諸侯之霸而専制天子之命是禮樂自諸侯出矣故曰非禮也使晉侯知禮則必請天子五載一巡狩羣后四朝及諸侯聘問之禮使禮樂自天子出則為得禮之正矣惜乎其不知出此也胡氏曰蘇轍曰晉悼公修文襄之業改命朝聘之數使諸侯之大夫聼命於會大夫稱人衆辭也朝聘之節儉而有禮衆之所安也臣則以為大夫稱人貶也昔周公戒成王以繼自今我其立政立事夫不自為政而委於臣下是以國之利器示人而不知寶也朝聘事之大者重煩諸侯而使大夫聼命無乃以姑息愛人而不由德乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿會見魯之失政也諸侯之大夫貶而稱人謹其始也愚謂禮樂自天子出是則然矣至於稱人非貶也以諸大夫聽命於晉晉君屬也以臣承君順也何足貶若以諸侯聽命則以同列承命同列如奉天子然乃大不可耳公至自晉正傳曰書公至自晉謹君之出入也莒人伐我東鄙正傳曰書莒人伐我東鄙志警也罪小國之陵大也秋九月大雩正傳曰周之秋九月即夏七月也左氏曰旱也記曰七八月之間旱則苗稿矣以旱而雩春秋書之而非禮見矣冬楚公子貞帥師伐鄭正傳曰書楚公子貞帥師伐鄭則伐之者與致伐者其罪並見矣左氏曰冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人夀幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟以待強者而庇民焉冦不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道請從楚騑也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦敬而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵于蔡民知窮困而受盟于楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之愚謂觀此則楚之伐鄭固為非義而鄭不自守而伐蔡亦有以召之也及楚兵壓境又背晉以與楚平是又以召晉兵之至也前不聽子産之言後又不聽子展之言以至於此也胡氏曰齊宣王問孟子交鄰國有道乎孟子曰有唯智者為能以小事大故太王事獯鬻勾踐事吳以小事大畏天者也畏天者保其國鄭介大國之間困強楚之令而欲息肩於晉若能信任仁賢明其刑政經畫財賦以禮法自守而親比四鄰必能保其封境荆楚雖大何畏焉而子耳子國加兵于蔡獲公子燮無故怒楚所謂不修文德而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚之爭鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服於楚而不信也犧牲玉帛待於境上以待強者而請盟其能國乎晉侯使士丐來聘正傳曰書晉侯使士丐來聘志邦交也往來之禮也左氏曰晉范宣子來聘且拜公之辱告將用師于鄭公享之宣子賦摽有梅季武子曰誰敢哉今譬于草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賓將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓於襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮愚謂公先如晉而晉侯使士丐來聘拜辱可謂一往一來禮無不報者矣及告伐鄭賦詩相求而應命如響其於邦交之儀得其正矣故君子以為知禮春秋與之靈王八年九年晉悼九年齊靈十八年衛獻十三年蔡景二十八年鄭簡二年曹成十四年陳哀五年杞孝三年宋平十二年秦景十三年楚共二十七年吳夀夢二十二年春宋災正傳曰書宋災志相恤之義也左氏曰宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戌討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯警宫二師令四鄉正敬享祝宗用馬于四墉祀盤庚于西門之外晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也夏季孫宿如晉正傳曰書季孫宿如晉志邦交之禮也左氏曰季武子如晉報宣子之聘也報聘者禮也禮尚往來也五月辛酉夫人薑氏薨正傳曰薑氏穆薑成公母也書辛酉夫人薑氏薨志國母之大故也左氏曰穆薑薨於東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出薑曰亡是於周易曰隨元亨利貞元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害人不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣秋八月癸未葬我小君穆薑正傳曰穆薑氏諡書葬我小君穆薑謹國母之大事也冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲正傳曰戲鄭地書公會諸侯伐鄭罪從夷也同盟于戲善歸正也左氏曰冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士丐門于鄟門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門杞人郳人從趙武魏絳斬行栗甲戌師于汜令於諸侯曰修器備盛糇糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子知罃曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趍進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與強可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還愚謂觀此則鄭有罪而伐之既服而盟釋之與窮兵黷武者異矣亦聖人之所與也故書之胡氏曰夫善為國者不師善師者不陳善陳者不戰知武子明於善陳之法以佐晉悼公屢與諸侯伐鄭楚輒救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之會以美之楚子伐鄭正傳曰書楚子伐鄭志憤怨之兵也鄭與晉平故楚憤其二心而伐之夫鄭一懷二心於兩大國之間而干戈相尋無已苟失其忠信國其能自立乎子展之言驗矣左氏曰楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平公子罷戎入盟同盟于中分楚莊夫人卒王未能定鄭而歸愚謂君子盡其在我者耳夫信在我見信不見信在人豈可以其要盟而背之乎此鄭之棄信所以互見討於晉楚也不亡何待春秋正傳卷二十五
