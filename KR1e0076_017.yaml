body:
  text: 春秋正傳卷十七明湛若水撰文公名興僖公子母聲姜夫人出姜在位十八年襄王二十六年元年晉襄二年齊昭七年衛成九年蔡莊二七年鄭穆二年曹共二十七年陳共六年杞桓十一年宋成十一年秦穆三十四年楚成四十六年春王正月公即位正傳曰書春王正月公即位正始也胡氏曰即位者告廟臨羣臣也國君嗣世定於初喪必逾年然後改元書即位者緣始終之義一年不二君緣民臣之心不可曠年無君按書載舜禹受終傳位之事在舜則曰月正元日格于文祖在禹則曰正月朔旦受命于神宗率百官若帝之初夫于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通喪三年其以凶服則不可入宗廟其以吉服則斬焉在衰絰之中不可既成而又易之也如之何而可子張問於孔子髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冡宰三年則告廟臨羣臣固有攝行之禮矣按周書稱太甲元年伊尹祠于先王則攝而告廟之證也百官總已以聽冡宰則攝而臨羣臣之證也其曰祗見厥祖者言伊尹以奉嗣王之事祗見太甲之祖也至三祀十有二月伊尹以冕服奉嗣王則免喪從吉之證也然顧命康誥紀成王之崩其君臣皆冕服何也當是時成王方崩就殯猶未成服故用麻冕黼裳入受顧命已受命誥諸侯而後釋冕反喪服者於是成服而宅憂也或以為康王釋服離次而即吉則誤矣愚謂所謂諒隂三年不言百官總已以聽冡宰乃言其居喪之禮非初喪即位時攝行也以顧命考之則即位者繼統之大事而居喪之禮次焉若於初喪未成服之時受顧命即廟告祖臨羣臣然後行喪禮明承重也未明承重則不可以行喪禮也蓋受命告祖於廟即臨羣臣於廟然後行含斂之禮則三者皆得並行而不相悖矣古人行大禮皆於廟故也二月癸亥日有食之正傳曰書癸亥日有食之紀天變也迅雷風烈必變聖人所以敬天也天王使叔服來㑹葬正傳曰書天王使叔服來㑹葬紀恤下之禮也而諸侯失禮之罪著矣左氏曰春王使內史叔服來㑹葬公羊曰㑹葬禮也夫天子之於諸侯吉凶慶弔之禮一往一來無不答也故五載天子一巡狩羣后四朝故上下之間亦有弔葬之禮所以通上下之情也春秋之所載未聞有諸侯朝天王奔喪㑹葬者而襄王此舉為得恤下之義然而下先乎臣當時君弱臣强亦可見矣胡氏曰崩薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害於王法之甚者聖人則有削而不存以示義者矣夏四月丁巳葬我君僖公正傳曰書夏四月丁巳葬我君僖公紀禮之正也諸侯五月而葬同盟畢至禮也葬送終之大事也故書之穀梁曰薨稱公舉上也葬我君接上下也僖公葬而後舉諡諡所以成德也於卒事乎加之矣天王使毛伯來錫公命正傳曰毛國伯爵諸侯入為天子卿士者書天王使毛伯來錫公命則其非禮自見矣公羊曰錫者何賜也命者何加我服也穀梁曰禮有受命無來錫命錫命非正也胡氏曰諸侯終喪入見則有錫嵗時來朝則有錫能敵王所愾則有錫韍冕圭璧因其終喪入見而錫之者也禮所謂喪畢以士服見天子已見賜之黻冕圭璧然後歸是已車馬衮黼其嵗時來朝而錫之者也詩所謂君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝享之是已今文公繼世喪制未畢非初見繼朝而獻功也何為來錫命乎晉侯伐衛正傳曰書晉侯伐衛紀伐不庭也其可伐而不可伐之義見矣左氏曰晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于溫先且居胥臣伐衛五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子愚謂此實傳也夫以衛侯之不朝而侵鄭伐綿匡彼固謂之可伐矣然惟正己者則可以伐之也襄公能聽且居之言先自朝王而後伐衛之不朝而伐人所謂先正己而後正人者也然其不奉天王之討而伐之則非所可伐矣又為將伐衛而先朝王則亦非出於敬君之誠焉所謂五霸假之也叔孫得臣如京師正傳曰叔孫氏得臣名叔牙之孫也左氏曰王使毛伯衛來錫公命叔孫得臣如周拜謝何以書著非禮也諸侯既畢喪而以繼世見天子天子錫之命諸侯拜而受之禮也今文公之立未嘗朝王而王錫之命又不自朝以拜賜而使得臣以往不臣之甚者也故春秋書以非之衛人伐晉正傳曰書衛人伐晉則衛侯之罪見矣何罪乎不自反而不縮也夫衛不朝晉是背盟主也晉侯先朝王而後伐之得正己以正人之義為衛君者宜屈服矣乃又使孔達帥師伐晉是不自反而犯盟主其罪大矣故春秋非之秋公孫敖㑹晉侯于戚正傳曰公孫敖魯大夫左氏曰晉侯疆戚田故公孫敖㑹之書公孫敖㑹晉侯于戚見其㑹之非禮也禮卿不得㑹公侯敖以大夫㑹晉侯非禮也故春秋書之而非禮之罪見矣冬十月丁未楚世子商臣弒其君頵正傳曰頵楚君名商臣世子名書楚世子商臣弒其君頵誅亂賊也左氏曰初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恆在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芊而勿敬也從之江芊怒曰呼役夫宜君王之欲殺汝而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊諡之曰靈不瞑曰成乃瞑穆王立以其為太子之室與潘崇使為太師且掌環列之尹胡氏曰書世子弒君者有父之親有君之尊而至於弒逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲誡也唐世子𢎞受左氏春秋至此廢書歎曰經籍聖人垂訓何書此耶郭瑜對曰春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅𢎞曰非惟不可道故亦耳不忍聞願受他書瑜請讀禮世子從之嗚呼聖人大訓不明於後世皆腐儒學經不知其義者之罪耳夫亂臣賊子雖陷穽在前斧鉞加於頸而不避顧謂身後惡名足以係其邪志而懲於為惡豈不謬哉持此曉人可謂茅塞其心意矣若語之曰為人君父而不通於春秋之義者必蒙首惡之名為臣子而不通於春秋之義者必陷篡弒誅死之罪聖人書此者使天下後世察於人倫知所以為君臣父子之道而免於首惡之名誅死之罪也則世子𢎞而聞此必將悚然畏懼知春秋之不可不學矣學於春秋必明臣子之義不至於奏請怫㫖而見鴆矣傳者案也經者斷也考於傳之所載可以見其所由致之漸豈隱乎嫡妾必正而楚子多愛立子必長而楚國之舉常在少者養世子不可不慎也而以潘崇為之師侍膳問安世子職也而多置宫甲降而不憾憾而能眕者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江芊知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僣王憑陵中國戰勝諸侯毒被天下然昧於君臣父子之道禍發蕭牆而不之覺也不善之積豈可掩哉君不君則臣不臣父不父則子不子春秋書世子弒其君推本所由而著其首惡為萬世之大戒也然則商臣無貶矣曰弒父與君之賊其惡猶待於貶而後著乎愚謂商臣猶稱世子而無貶而云其惡自著則其他小惡者何待貶而後著耶公孫敖如齊正傳曰書公孫敖如齊著聘禮之非也居喪讀喪禮既葬讀祭禮喪復常讀樂章言吉凶不可以相襲也左氏曰穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也愚謂聘禮也居喪而行之非禮也故春秋書如齊使人考如齊之故則行聘禮也而其居喪行聘之非禮自可見焉其指微矣襄王二十七年二年晉襄三年齊昭八年衛成十年蔡莊二十一年鄭穆三年曹共二十八年陳共七年杞桓十二年宋成十二年秦穆三十五年楚穆商臣元年春王二月甲子晉侯及秦師戰于彭衙秦師敗績正傳曰彭衙秦地書晉侯及秦師戰于彭衙秦師敗績罪交忿之兵也左氏曰秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縳秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師胡氏曰夫敵加於己不得已而起者謂之應兵爭恨小故不忍忿怒者謂之忿兵按左氏秦孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉侯主之何哉處已息爭之道逺怨之方也然則敵加於己縱其侵暴將不得應乎曰敵加於己而已有罪焉引咎責躬服其罪則可矣已則無罪而不義見加諭之以辭命猶不得免焉亦告於天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎愚謂此確論矣據左氏秦經人之國以襲人報殽之役是秦加忿於晉也晉以居喪自處謹守以禦去則勿逐可也乃追至於彭衙戰於秦境是晉加忿於秦也故曰交忿之兵也丁丑作僖公主正傳曰書丁丑作僖公主左氏曰書不時也公羊曰虞主用桑練主用栗用栗者藏主也穀梁曰喪主於虞吉主於練胡氏曰作主者造木主也既葬而反虞虞主用桑期年而練祭練主用栗用栗者藏主也何以書僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至於惡積而不可掩所以謹之也愚謂主者所以依神者也神無二主其初喪之主乃所謂重也既葬而立曰是憑是依者乃真主也武王伐紂載文王僞主以行君子以為非實矣三月乙巳及晉處父盟正傳曰書及晉處父盟著其盟之非也春秋無善盟盟者忠信之薄也况君與其臣盟乎况越國乎其及不言公處父不稱氏公穀諸儒皆以為諱非也言及則公可知矣言處父則陽氏可知矣不言地而言晉則於晉越國可知矣曾是以為諱乎左氏曰晉人以公不朝來討公如晉夏四月乙巳晉人使陽處父盟以恥之此實傳也然則公以己之不朝晉為失禮則修令詞以平之可也而越國以盟是失己矣竟取晉人之恥使大夫與之盟以臣抗君於己之地是失人矣失己失人則上下君臣之倫紊矣曾是以為霸乎夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴正傳曰垂隴鄭地書公孫敖㑹宋公陳侯鄭伯晉士縠盟於垂隴著非禮也左氏曰公未至六月穆伯㑹諸侯及晉司空士縠盟于垂隴晉討衛故也書士縠堪其事也陳侯為衛請成於晉執孔達以說愚謂此實傳也夫盟誓非古也况敖與縠以大夫㑹諸侯乎按左氏謂公未至是及晉處父盟未至也而敖以大夫擅行盟㑹之大事非但見大夫盟諸侯且以見大夫專執國政矣春秋書之以著其彼此上下之罪自十有二月不雨至于秋七月正傳曰云自十有二月者去嵗十有二月即夏之十月也自十有二月至秋七月不雨則不雨者歷四時八閲月旱之甚也何以書紀災之甚也八月丁卯大事于太廟躋僖公正傳曰大事者大合食祫祭也五年一祫毁廟與羣廟之主皆合祭於太廟之室太祖東向其餘皆以南北相向以為昭穆父子異昭穆兄弟同昭穆躋僖公者至合食之時見僖與閔同昭穆而僖兄閔弟遂躋其主於閔之上蓋於時夏父弗忌為宗伯主之且曰吾見新鬼大舊鬼小而不知閔雖弟先為君而僖雖兄時已為臣君臣之義己前定今升而上之非禮矣如僖公者但當以兄弟相及之義及於閔之次昭則同昭位在昭之左次穆則同穆位在穆之右次可也三傳皆以閔為祖僖為禰先禰而後祖為逆祀誤矣若父子相繼異昭穆乃為異世乃稱祖禰閔僖兄弟同世而稱祖禰可乎若如三傳胡氏之言以兄弟為異世為祖為禰則殷之兄弟四人相繼其長兄當為髙祖矣其名位反易豈不甚乎穀梁曰君子不以親親害尊尊故春秋書躋僖公三傳皆以為逆祀是也譏以後君先先君也非禮也或曰非是之謂也紀大事也蓋前二月作僖公主既祔而猶在几筵今乃祭告升之於太廟然而亦非時矣冬晉人宋人陳人鄭人伐秦正傳曰書晉人宋人陳人鄭人伐秦譏貪忿之兵也左氏曰冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役愚謂此實録也夫彭衙之勝可以已而不已非貪忿之兵而何左氏又曰卿不書為穆公故尊秦也謂之崇德愚謂此則妄也既推尊穆公之意以及其卿又何不推穆公之德以及其民而勿伐之乎其稱人者史略之也胡氏曰晉人再勝秦師在常情亦可以已矣而復興此役結怨勤民是全不務德專欲力爭而報復之無已也以致濟河焚舟之師故特貶而稱人愚謂胡氏謂晉報復結怨是也謂貶而稱人非也公子遂如齊納幣正傳曰書公子遂如齊納幣紀大禮也昏禮之大者人道之始也納幣又昏禮之始也公胡皆以為譏喪昏非也按僖公三十三年十二月乙巳薨至此文公二年十二月已大祥矣夫謂之祥則行納幣之禮未得為喪娶左氏曰襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也愚謂奉宗廟以繼先君之統事之大者也故曰不孝有三無後為大如之何其勿急乎公羊胡氏乃至責文公之志過矣襄王二十八年三年晉襄四年齊昭九年衛成十一年蔡莊二十二年鄭穆四年曹共二十九年陳共八年杞桓十三年宋成十三年秦穆三十六年楚穆二年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰正傳曰得臣魯大夫沈小國姬姓稱得臣㑹諸侯是主在魯也書伐沈譏不義之兵也左氏曰莊叔㑹諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃愚謂沈不與中國之盟㑹而外服於楚是變於夷固有罪矣然魯於沈為同姓而伐之是伐同姓也沈國微小動諸侯之兵而伐之是不能恤小也其與沈之罪均耳何以伐人而使其人民逃散亦可悲夫胡氏以為無譏誤矣夏五月王子虎卒正傳曰王子虎周大夫書王子虎卒著非禮也左氏曰夏四月乙亥王叔文公卒來赴弔如同盟禮也愚謂諸侯卒而赴於諸侯禮也大夫卒而赴於諸侯非禮也胡氏曰天子內臣無外交或曰禮稱情而為之節文者也叔服新使乎我則宜有恩禮矣仲尼脫驂於舊館雖卒叔服可也夫脫驂於舊館惡夫涕之無從而為之者非理之經也天子內臣無外交而以新使乎我致恩禮焉是以私情害公義失輕重之權矣秦人伐晉正傳曰書秦人伐晉著貪憤之兵也不待稱人以貶而其罪自見矣左氏曰秦伯伐晉濟河焚舟取王官及郊晉人不出自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也愚謂此實録也吾於濟河焚舟以見其憤矣於取王官及郊見其貪矣貪憤之兵謂之不義孟子曰為善戰者服上刑長君之惡其罪小逢君之惡其罪大穆公惡能知人三子惡得為賢臣程子曰搆怨連禍殘民以逞晉人畏之而不敢出秦人極其忿而後悔過聖人取其終能悔耳秋楚人圍江正傳曰書楚人圍江紀蠻荆肆暴也左氏曰楚師圍江晉先僕伐楚以救江愚謂自齊桓之霸江黃以近楚之國而從齊故既滅黃今又圍江晉使先僕救之此晉所以繼齊桓而霸也雨螽于宋正傳曰書雨螽于宋紀災異也雨者如雨也雨于宋宋有報則書也穀梁曰外災不志此何以志也曰災甚也其甚奈何茅茨盡矣著於上見於下謂之雨冬公如晉十有二月己巳公及晉侯盟正傳曰如晉者往朝晉也何以言之以下公及晉侯盟可知二事也故春秋書公如晉十有二月己巳公及晉侯盟著其非禮之舉也夫朝聘於國盟誓於境二事不相沿公如晉以朝聘矣又為晉所要而與之盟不思前年與其臣處父盟於晉國之辱故春秋書以非之左氏曰晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯享公賦菁菁者莪莊叔以公降拜小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂愚謂無禮者前使陽處父與盟於國外之事也請改盟者實欲召公以朝也公如晉者實朝之也既朝乃及晉侯盟盟已非禮矣况又二之乎晉陽處父帥師伐楚以救江正傳曰書晉陽處父帥師伐楚以救江善其救也江黃二小國逺而逼於楚而從於齊與中國之盟㑹楚以蠻荆肆暴欲吞二國既以滅黃而又圍江晉伐楚而救之可謂攘楚安夏之師矣故春秋善之左氏曰晉以江故告於周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還愚謂此雖未足盡據然而能以江故告於周則是奉王命以行又足以聲大義於天下矣胡氏又曰其書以何楚嘗伐鄭矣齊桓公逺結江黃合九國之師於召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛㑹四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武關齊以東兵略陳蔡而南處父等兵方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻强國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也愚謂此亦經外之意也襄王二十九年四年晉襄五年齊昭十年衛成十二年蔡莊二十三年鄭穆五年曹共三十年陳共九年杞桓十四年宋成十四年秦穆三十七年楚穆三年春公至自晉正傳曰書公至自晉以始終乎非禮之舉也君舉必書至必反面也夏逆婦姜于齊正傳曰書逆婦姜于齊紀大昏之禮也昏者人道之始上承宗廟而繼先君之統於無窮可不重乎左氏曰卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也公羊曰其謂之逆婦姜于齊何略之也髙子曰娶乎大夫者略之也程胡二子皆以稱婦姜為已成婦蓋謂其喪中納幣然以時考之納幣已在大祥之後况繼嗣尤為孝先之大事乎况娶又在納幣踰年之後乎君子當於有過中求無過亦立法嚴而待物恕之意也諸儒蓋因婦姜之言而起此議耳狄侵齊正傳曰書狄侵齊紀中國之不振也秋楚人滅江正傳曰書楚人滅江罪蠻荆之肆暴也於是乎見霸圖之衰矣左氏曰楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云維彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣愚謂晉人救兵之不力終不能全江之亡秦穆公聞江之滅乃為之不舉是晉人千萬之兵不如秦伯之一念也惜夫晉侯伐秦正傳曰書晉侯伐秦紀報怨之兵也左氏曰圍祁新城以報王官之役程子曰秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也愚謂讀春秋者當就事論事此書特見晉之報怨程子又以秦之悔過不復報而稱晉侯不復加譏而善之則支矣衛侯使寧俞來聘正傳曰俞寧武子名衛大夫書衛侯使寧俞來聘紀邦交之禮也左氏曰衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾愚謂於是見魯侯之失舉而武子之為知禮也交際之間其可不謹乎冬十有一月壬寅夫人風氏薨正傳曰風氏成風也妾母也而稱夫人者史從僭號也然則非孔子之文明矣後書稱小君倣此書夫人風氏薨紀君母之大故也而其失禮不可掩矣程子曰自成風以後妾母稱夫人嫡妾亂矣仲子始僭尚未敢同嫡也胡氏曰風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其沒亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為其母無服不敢二尊者也春秋於成風記其卒葬各以實書不為異辭者謹禮之所由變也襄王三十年五年晉襄六年齊昭十一年衛成十三年蔡莊二十四年鄭穆六年曹共三十一年陳共十年杞桓十五年宋成十五年秦穆三十八年楚穆四年春王正月王使榮叔歸含且賵正傳曰珠玉實於口曰含車馬以􅉠其喪曰賵書王使榮叔歸含且賵譏非禮也斯舉也有非禮四焉以天子之尊而含賵諸侯之妾非禮一也含者初斂之禮而既喪三月矣行之非禮二也含賵兼行厚禮妾母非禮三也遂成妾母為夫人亂倫失理非禮四也一舉而四失禮焉直書其事而其非自見矣胡氏乃以為王不稱天為弗克若天則詞贅而意鑿矣三月辛亥葬我小君成風正傳曰成風莊公之妾僖公之庶母文公之庶祖母也以妾僭嫡故稱小君書葬我小君成風則其僭禮之非自見矣云葬我小君則是以夫人之禮葬之也以妾僭嫡以下陵上天理人倫之大變故春秋因葬而書而其罪自見矣胡氏曰仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為立宫而羽數特異此雖非禮之正然不祔于姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也王使召伯來㑹葬正傳曰召伯召昭公書王使召伯來㑹葬則非禮自見矣夫㑹葬之禮諸侯所以尊天子天子答施於諸侯猶之可也而施於妾母是成其為夫人而教人以妾僭嫡矣以妾僭嫡紊名分逆天理莫此之甚焉者也故春秋既書王使榮叔來歸含且賵又書王使召伯來㑹葬則其禮之非禮而王之不王不待去天而其過不可掩矣二傳皆以為禮程胡皆以不稱天以謹戒者鑿矣夏公孫敖如晉正傳曰如晉行聘也書如晉譏非所宜如也天子致含賵㑹葬而未之拜謝葬土未乾即使公孫敖如晉行聘焉直書其事與時而其失自見矣秦人入鄀正傳曰鄀小國名書秦人入鄀譏非伯討也而其擅興陵虐之罪見矣左氏曰初鄀叛楚即秦又二於楚夏秦人入鄀愚謂此實傳也鄀反覆背理舍夏變於夷誠有罪矣然而惟天子得以討之惟天吏得以伐之秦不奉王命德非天吏而擅伐之可乎又虐而入之可乎交譏並罪不可逃矣秋楚人滅六正傳曰六小國在夀州安豐縣書楚人滅六著蠻夷之猾夏而霸業之不競也左氏曰六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉吳氏曰晉襄公志氣不能如初年之盛紹霸之業寖以衰微故西戎之秦南蠻之楚敢於肆行中國吞噬弱小而無所忌是矣冬十月甲申許男業卒正傳曰業許僖公名書許男業卒紀同盟之大故也襄王三十一年六年晉襄七年卒齊昭十二年衛成十四年蔡莊二十五年鄭穆七年曹共三十二年陳共十一年杞桓十六年宋成十六年秦穆三十九年楚穆五年春葬許僖公正傳曰書葬許僖公紀同盟相恤之大義也餘見前夏季孫行父如陳正傳曰書季孫行父如陳著其如之非禮也左氏曰臧文仲以陳衛之睦也欲求好於陳夏季文子聘於陳且娶焉愚謂此實録也夫禮主乎一聘則聘昏則昏假聘以成昏假公以遂私非禮也故春秋書之而其非自見矣秋季孫行父如晉正傳曰如晉聘也書季孫行父如晉著其聘之非禮也古者朝聘以時五年夏公孫敖如晉矣今踰年而行父再聘焉既為非禮又左氏曰季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害愚謂此又行父之非禮也汪氏曰王制諸侯於天子比年一小聘三年一大聘五年一朝文公即位六年自朝於晉者再而貴卿比年往聘過於事天子之禮而京師之朝終其世不見於經蓋知有霸主而不知有天王也八月乙亥晉侯歡卒正傳曰歡晉侯名書晉侯歡卒紀霸主之大故也何以書之於是有㑹葬之禮焉左氏曰晉襄公卒靈公少晉人以難故欲以長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四德者難必紓矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍賈季亦使召公子樂於陳趙孟使殺諸郫愚謂觀此亦足以為戒矣晉襄公紹霸業以威諸侯身死未久而冡嗣不立假於强臣之手六卿分晉有自來矣冬十月公子遂如晉葬晉襄公正傳曰書公子遂如晉葬晉襄公紀㑹葬之禮也禮諸侯五月而葬同盟至今晉有亂故不待期而葬觀此則以赴㑹葬者為禮不待期而葬者為非禮矣晉殺其大夫陽處父晉狐射姑出奔狄正傳曰書晉殺其大夫陽處父晉狐射姑出奔狄則其賊殺之罪與逸賊失臣之端並可考見矣公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也君將使射姑將陽處父曰民衆不說不可使將於是廢將君謂射姑曰陽處父曰射姑民衆不說不可使將射姑怒出刺陽處父於朝而走愚謂觀此則射姑賊殺之罪著矣然刺於朝而君不正其罪而縱之出奔則晉君逸賊之罪又著矣易曰君不密則失臣晉君漏處父之言而使殺焉則其君失臣之罪又著矣其兩稱晉者他國之史之詞耳公胡二氏乃有稱國稱君稱氏之辨鑿矣閏月不告月猶朝于廟正傳曰書閏月不告月猶朝于廟紀非禮也夫朝廟為告朔也不告月是不告朔非禮也猶朝于廟亦非禮也左氏曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民胡氏曰不告朔則曷為不言朔也因月之虧盈而致閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣閏不可廢乎曰迎日推策則有其數轉璣觀衡則有其象歸竒於扐以象閏數也斗指兩辰之間象也象數者天理也非人之所能為也故以定時成嵗者唐典也以詔王居門終月者周制也班告朔於邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不已之詞子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮愚謂猶朝于廟乃書實事胡氏以為幸其不已之詞鑿矣襄王三十二年七年晉靈公夷臯元年齊昭十三年衛成十五年蔡莊二十六年鄭穆八年曹共三十三年陳共十二年杞桓十七年宋成十七年卒秦康公罃元年楚穆六年春公伐邾正傳曰書公伐邾則陵弱之罪自見矣左氏曰間晉難也然則因霸國之有難肆其侵小之虐其不義甚矣三月甲戌取須句正傳曰須句小國書取須句則文公貪虐之罪自見矣左氏曰置文公子焉非禮也杜氏曰絶太皥之祀以與鄰國叛臣僖公反其君之後邾復滅之今邾文公子叛邾在魯故公使為守須句大夫愚謂魯文公斯舉有不義三焉以大吞小失字小之義一也取非其有以與叛臣二也絶太皥之祀三也舉一貪兵負三不義之名魯文公何以自立於天下乎遂城郚正傳曰郚魯邑穀梁曰遂繼事也書遂城郚譏不時且非義也遂因伐邾之師以城郚也夫文公以邾叛臣守須句之地又虐用民力城郚以備邾又違農時而不恤文公之無道甚矣夏四月宋公王臣卒正傳曰王臣宋成公名書宋公王臣卒紀與國之大故也於是乎有㑹葬之義焉故聖人筆之宋人殺其大夫正傳曰書宋人殺其大夫著擅殺之罪也左氏曰宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司冦昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢擕二若之何去之不聽穆襄之族率國人以攻公殺公孫固公孫鄭於公宫六卿和公室樂豫舍司馬以讓公子卬昭公即位而葬書曰宋人殺其大夫不稱名衆也且言非其罪也胡氏曰書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫於殺大夫而其名不足紀也戊子晉人及秦人戰于令狐晉先蔑奔秦正傳曰令狐晉地書晉人及秦人戰于令狐先蔑奔秦則晉大夫仗義之師而先蔑負義之罪皆可見矣按左氏襄公卒太子幼晉人欲立長君使先蔑迎公子雍于秦秦康公多其徒衛送公子雍於晉穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及堇隂宣子曰我若受秦秦則賔也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐至於刳首愚謂此晉諸大夫悟迎雍之非而從立嫡之是故起兵以禦秦人納雍之兵所謂仗義矣又按己丑先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章又弗聽愚謂此先蔑既不能聽林父之忠告克己以從善變逆以為順至於身去父母之邦負不韙之名於天下所謂背義矣狄侵我西鄙正傳曰西鄙魯西邊之地也書狄侵我西鄙志警也見夷狄之陵中國也晉襄既沒霸業陵替秦晉交爭狄人窺伺其間大肆內侵故侵魯侵齊侵宋侵衛之事漸見矣秋八月公㑹諸侯晉大夫盟于扈正傳曰扈鄭地書公㑹諸侯晉大夫盟于扈則其盟之義而非禮皆可見矣左氏曰齊侯宋公衛侯陳侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也何以謂之義晉立太子為君是立嫡也而魯與諸侯盟㑹以定之定立嫡之義也何以謂之非禮諸侯與諸侯㑹君與君盟禮也而公以諸侯不與晉之新君盟而與趙盾盟焉是置立在盾益盾之强而紊君臣之分非禮矣左氏諸儒皆以不序諸侯不名大夫為公後至不與㑹盟者非也不序不名蓋史略之耳此㑹繫於公不繫於諸侯大夫故可略之也且書云公㑹是公至可知矣冬徐伐莒公孫敖如莒涖盟正傳曰涖臨之也書徐伐莒公孫敖如莒涖盟著其如之非禮也夫莒以小弱之國見伐于徐公孫敖如盟以救之似禮矣而敖之意不在於救莒因盟莒以為逆娶之地假公以圖私濟邪以害正故左氏曰穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之夫穆伯所為如此其私營邪謀不道甚矣故春秋書之使人考其跡知其心而非禮自見矣襄王三十三年崩八年晉靈二年齊昭十四年衛成十六年蔡莊二十七年鄭穆九年曹共三十四年陳共十三年杞桓十八年宋昭公杵臼元年秦康二年楚穆七年春王正月夏四月正傳曰無事並書時月義見前秋八月戊申天王崩正傳曰書秋八月戊申天王崩備時月日者何以紀天下之大變故詳之也於是乎天下如喪考妣為之服斬衰諸侯有奔喪㑹葬之禮同軌畢至焉是故詳書之冬十月壬午公子遂㑹晉趙盾盟于衡雍正傳曰衡雍鄭地書公子遂㑹晉趙盾盟于衡雍譏大夫㑹盟之非也左氏曰晉人以扈之盟來討冬襄仲㑹晉趙孟盟于衡雍報扈之盟也夫上古不事盟誓盟誓後世諸侯之事也諸侯失道政在大夫故大夫㑹盟自此始矣髙氏曰衡雍晉文公㑹諸侯朝王之處也天王崩諸侯不奔喪而盾遂皆國之正卿乃自相㑹盟於王畿之內惡莫大焉春秋直書其罪自見矣乙酉公子遂㑹雒戎盟于暴正傳曰暴鄭地書公子遂㑹雒戎盟于暴譏內外之無辨也亂禮也左氏曰遂㑹伊雒之戎書曰公子遂珍之也愚謂珍之者重之也重之所以責之至也以公子之貴而屈下㑹盟于雒戎之賤尊卑混矣罪莫大焉胡氏曰春秋記約而志詳其書公子遂盟趙盾及雒戎何詞之贅乎曰聖人謹內外之辨所以明族類别內外也雒邑天地之中而戎醜居之無備甚矣自東漢已來乃羌漠雜處而不辨晉至於神州陸沉唐亦世有安史之亂許翰以為謀國者不知學春秋之過信矣愚謂其稱公子及日與地與名史文之詳耳非以此為義也公孫敖如京師不至而復丙戌奔莒正傳曰書公孫敖如京師不至而復丙戌奔莒著非義也罪敖廢君命而從己欲也左氏曰穆伯如周弔喪不至以幣奔莒從已氏焉愚謂天理人欲繫乎志之向背而已矣夫志於京師則有天王之尊敬莫大焉志於莒則有已氏之淫肆莫大焉一志於敬則為天理一志於肆則為人欲一念之微天人判而善惡分焉胡氏曰男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣然欲生於色而縱於淫色出於性目之所視有同美焉不可掩也淫出於氣不持其志則放僻趨蹶無不為矣敖如京師其書不至而復者言敖無入使於周之意惟已氏之欲從也夫以志徇氣肆行淫欲而不能為之帥至於棄家國出奔而不顧此天下之大戒也春秋謹書其事於敖與何誅使後人為鑒必持其志修窒欲之方也螽正傳曰書螽紀災異也宋人殺其大夫司馬宋司城來奔正傳曰大夫司馬者公子卬也司城者蕩意諸也書宋人殺其大夫司馬宋司城來奔紀宋之亂也有來報故書之以示戒焉左氏曰宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也胡氏曰初宋昭公將去羣公子樂豫以為不可遂舍司馬以讓公子卬則卬固昭公之黨欲專宋政而昭公固欲以其弟卬自衛也夫司馬掌兵之官不選衆舉賢以素有威望為國人所畏服者使居其任乃欲寵其私眤鮮有不亡者矣公子卬蕩意諸皆以官舉者見主兵者不能其官至於見殺守土者不能其官至於出奔而其君不免失身見弒之禍宜矣愚謂書以官乃據實詳記史之文耳何繫於義耶春秋正傳卷十七
