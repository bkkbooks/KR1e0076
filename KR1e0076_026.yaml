body:
  text: 春秋正傳卷二十六明湛若水撰襄公靈王九年十年晉悼十年齊靈十九年衛獻十四年蔡景二十九年鄭簡三年曹成十五年陳哀六年杞孝四年宋平十三年秦景十四年楚共二十八年吳壽夣二十三年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹吳于柤正傳曰柤楚地書公㑹晉宋衛曹莒邾滕薛把小邾諸侯齊世子㑹吳子于柤志其㑹㑹之非也㑹中國以㑹吳子非禮也糓梁曰不以中國從夷狄是也夫中國之待吳子來則受之去則勿追可也今乃率中國諸侯而徃㑹之其禮則卑矣冠雖敝不以加於足嚴其分也於此可以見中國之無人矣左氏曰春㑹于柤㑹呉子壽夢也三月癸丑齊髙厚相太子光以先㑹諸侯于鍾離不敬士荘子曰髙子相太子以㑹諸侯將社稷是衛而皆不敬棄社稷也其將不免乎夏四月戊午㑹于柤夏五月甲午遂滅偪陽正傳曰偪陽妘姓楚與國也遂者繼事之詞諸侯因㑹而遂滅偪陽也何以書見中國無興㓕恤小之義也夫率中國諸侯以徃㑹吳其義已卑矣又因而滅無罪之小國則彼吳蠻者見之何以服其心乎左氏曰晉荀偃士匄請伐偪陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以机出於其間曰女成二事而後告余余恐亂命以不女違七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午㓕之書曰遂㓕偪陽言自㑹也以與向戌向戌辭曰君若猶辱鎮撫宋國而以偪陽光啓寡君羣臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予宋公宋公享晉侯於楚丘請以桑林荀罃辭荀偃士匄曰諸侯宋魯於是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎晉侯有間以偪陽子歸獻于武宫愚謂以偪陽封向戌向戌固辭不受是矣以與宋公宋公受之亦非福也公至自㑹正傳曰書公至自㑹謹君之出入也所以始終乎是㑹之非也楚公子貞鄭公孫輒帥師伐宋正傳曰書楚鄭伐宋著從蠻陵夏之罪也左氏曰六月楚子囊鄭子耳伐宋師于訾毋庚午圍宋門于桐門愚謂是亦宋不能無致之之罪焉諸侯滅偪陽以與宋宋受之為不義矣此其所以召楚鄭之兵乎鄭初盟中國乃背中國以從荆蠻又助荆蠻以伐中國其罪在不赦矣春秋書之深惡之之義見矣晉師伐秦正傳曰書晉師伐秦著報怨之師也左氏曰晉荀罃伐秦報其侵也愚謂晉不勝其怨憤之心勞師相報以怨報怨何時已乎赤子糜爛何辜乎故春秋罪之秋莒人伐我東鄙正傳曰書莒人伐我東鄙志警也左氏曰莒人間諸侯之有事也故伐我東鄙愚謂由是觀之莒人間諸侯之有事而來伐以無警備故也書曰惟事事乃其有備有備無患詩曰迨天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮予警而有備誰敢侮之公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭正傳曰書十二諸侯伐鄭志討罪也鄭既與中國諸侯盟背之以從楚又助楚以伐中國其罪不容誅矣故十二諸侯徃討之左氏曰諸侯伐鄭齊崔杼使太子光先至于師故長於滕己酉師于牛首冬盗殺鄭公子騑公子發公孫輒正傳曰書盗殺鄭三卿志亂賊也左氏曰初子駟與尉止有争將禦諸侯之師而黜其車尉止獲又與之争子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝殺子駟子國子耳刼鄭伯以如北宫子孔知之故不死書曰盗言無大夫焉子西聞盗不儆而出尸而追盗盗入於北宫乃歸授甲臣妾多逃噐用多喪子産聞盗為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乗尸而攻盗於北宫子蟜帥國人助之殺尉止子師僕盗衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋愚謂書盗殺則罪人斯得矣然而曾子曰吾得正而斃焉斯已矣騑發輒皆大夫也不良于政身死于盜不得其正矣聖人之取義將於是乎在程子乃以為不稱大夫失卿職也胡氏以為卿大夫者國君之陪貳政之本乃至於身不能保而盜得殺之於朝為失陪貳之道故削其大夫則皆求義之過而失誅亂賊之指矣戍鄭虎牢楚公子貞帥師救鄭正傳曰虎牢復曰鄭者鄭之舊封猶言宋彭城云爾也亦可以証前虎牢不言鄭者之無他義矣書戍鄭虎牢楚救鄭譏之也罪諸侯之不能存鄭以棄之於楚也夫諸侯初城虎牢以偪鄭鄭懼而服則宜思既來則安之之義圖所以安存乎鄭可也鄭之復變而為楚豈得已哉以諸侯莫之救也既而變以從楚而楚能救之則楚反能存鄭矣中國諸侯能無愧乎春秋書此其意深矣左氏曰諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之耻也合諸侯以益耻不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵渉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還公至自伐鄭正傳曰書公至自伐鄭義見于前靈王十年十有一年晉悼十一年齊靈二十年衛獻十五年蔡景三十年鄭簡四年曹成十六年陳哀七年杞孝五年宋平十四年秦景十五年楚共二十九年吳壽夢二十四年春王正月作三軍正傳曰作者新其舊之義書作三軍志始變制也變公家之制而為三家也而三家不臣之罪見矣左氏曰春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍愚按左傳季武子之為三軍各征其軍則是分三軍入三家私門張而公室亡矣胡氏曰三軍魯之舊也古者大國三軍次國二軍小國一軍魯侯封於曲阜地方數百里天下莫强焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘說者以為大國之賦也又曰公徒三萬說者以為大國之軍也故知三軍魯之舊爾然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於丘卒還於邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門襄公㓜弱季氏益張廢公室之三軍三家各有其一季氏盡征焉而舊法亡矣是以謂之作其明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知矣春秋書其作舍以見昭公失國定公無政而兵權不可去公室有天下國家者之所宜鑒也夏四月四卜郊不從乃不郊正傳曰書夏四月四卜郊不從乃不郊則三非禮可見矣榖梁曰夏四月不時也四卜非禮也愚謂古者至日而郊四月四陽之月是謂不時一非禮也古者郊以至日而不卜卜而且至四焉二非禮也禮天子之祭乃郊天而魯以諸侯僣之三非禮也亦因書而見矣鄭公孫舍之帥師侵宋正傳曰書鄭公孫舍之帥師侵宋著詭道之兵也左氏曰鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何爲而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆埸之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋愚謂觀此則鄭之侵宋非誠侵宋也侵宋以致諸侯之師而聴命焉以告楚楚師至而與之盟是得免於二國也是之謂詭道之兵公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭正傳曰書公㑹諸侯伐鄭著討叛之師也鄭叛盟從楚又以侵宋負罪於中國矣故又㑹伐之左氏曰四月諸侯伐鄭己亥齊太子光宋向戌先至于鄭門于東門其莫晉荀罃至于西郊東侵舊許衛孫林父侵其北鄙六月諸侯㑹于北林師于向右還次于𤨏圍鄭觀兵于南門西濟于濟隧秋七月己未同盟于亳城北正傳曰書同盟于亳城北善同好也春秋之義莫不善於戰莫善於同好故書之左氏曰鄭人懼乃行成秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家程子曰鄭服而同盟也隨復從楚伐宋云同見其反覆愚謂聖人之心如天地物各付物不追既徃不逆將來即事即時因其同而書同與其進也不保其徃也安得因其後之反覆而遽書同以見之哉公至自伐鄭正傳曰書公至自伐鄭謹君之出入也穀梁曰不以㑹至盟後復伐鄭也楚子鄭伯伐宋正傳曰書楚子鄭伯伐宋繼于盟亳之後明失信義也左氏曰楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋胡氏曰盟于亳城北鄭服而同盟也尋復從楚伐宋故書同盟見其旣同而又叛也旣同而叛又從子展之謀欲致晉師而後與之也故亳之盟其載書曰或間兹命明神殛之俾失其民隊命亡氏踣其國家雖渝此盟而不顧也噫慢鬼神至於此極而盟猶足恃乎公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚正傳曰蕭魚鄭地何以兩書善之也先書諸侯伐鄭繼書㑹于蕭魚則伐而服之然後與之㑹春秋與人遷善之意見矣左氏曰九月諸侯悉師以復伐鄭諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅㑹于蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以籍手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲三人皆鄭樂師廣車軘車淳十五乘甲兵備凡兵車百乘歌鍾二肆及其鎛磬女樂二八愚謂始伐其犯中國鄭服而即與之㑹盟與人遷善之意則善矣然而晉受其賂焉而欲鄭之心服得乎程氏謂㑹于蕭魚鄭又服而請㑹是也又謂不書鄭㑹謂其不可信非也晉悼公猶與之㑹而不疑豈有旣書與之㑹而又去其鄭字以見其不可信耶胡氏曰晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥候禁侵掠遣叔肸告于諸侯而鄭自此不復背晉者二十四年至哉誠之能感人也自悼公能謀於魏絳以息民聴於知武子而不與楚戰故三駕而楚不能與之争雖城濮之績不越是矣公至自㑹正傳曰書公至自㑹謹君之出入也於是乎有反靣飲至書勞之禮焉糓梁曰伐而後㑹不以伐鄭至得鄭伯之辭也愚謂書至舍伐言㑹者重㑹也重服鄭也楚人執鄭行人良霄正傳曰書楚人執鄭行人良霄罪忿暴也左氏曰鄭人使良霄太宰石㚟如楚告將服于晉曰孤以社稷之故不能懐君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也愚謂鄭使行人告服晉言不得已之故是鄭舒誠於楚也鄭爲無罪矣楚乃不勝其憤怒之心而遷怒於行人行人又何罪焉此楚之所以終爲夷也冬秦人伐晉正傳曰書秦人伐晉無名之師也左氏曰秦庻長鮑庻長武帥師伐晉以救鄭鮑先入晉地士魴御之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師已丑秦晉戰于櫟晉師敗績易秦故也按高氏曰秦景公妹爲楚共王夫人於是爲楚伐晉報去年之役則晉未嘗有罪可聲秦特爲楚之故伐之耳是謂無名之兵也故春秋惡之靈王十一年十有二年晉悼十二年齊靈二十一年衛獻十六年蔡景二十一年鄭簡五年曹成十七年陳哀八年杞孝六年宋平十五年秦景十六年楚共三十年呉壽夢二十五年卒春王三月莒人伐我東鄙圍台正傳曰台魯邑名琅邪費縣書莒人伐我東鄙圍台志國警也夫莒小國而屢犯大國者豈非魯君徒從事於外而不暇自治故乘間而伐以圍之耶記曰國必自伐而後人伐之又曰及是時明其政刑誰敢侮之季孫宿帥師救台遂入鄆正傳曰鄆莒邑名書季孫宿帥師救台著正也書遂入鄆著非正也夫救台者承君命而禦侮也故於義爲正因救台而入鄆者非君命遂已私也故於義爲不正據事而書褒貶之義見矣左氏曰季武子救台遂入鄆取其鍾以爲公盤糓梁曰遂繼事也受命而救台不受命而入鄆惡季孫宿也胡氏曰或曰古者命將得專制閫外之事有可以安國家利社稷者專之可也曰此爲境外言之也台在邦域之守而專行之非有無君之心者不敢爲也昭公逐定無正豈一朝一夕之故哉其所由來者漸矣夏晉侯使士魴來聘正傳曰書晉侯使士魴來聘志邦交之禮也左氏曰夏晉士魴來聘且拜師愚謂據此則士魴之來且聘且拜師晉悼公於是乎得睦隣之禮矣故春秋書以表之秋九月吳子乘卒正傳曰書吳子乘卒來赴故也左氏曰秋吳子壽夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯爲諸姬臨於周廟爲邢凡蔣茅胙祭臨於周公之廟冬楚公子貞帥師侵宋正傳曰書楚公子貞帥師侵宋則猾夏之罪自見矣左氏曰冬楚子囊秦庻長無地伐宋師于楊梁以報晉之取鄭也愚謂楚之伐宋既無可名之罪特以報晉而遷怒於宋耳書曰蠻夷猾夏冦賊姦宄其楚之謂乎公如晉正傳曰書公如晉見如之過禮也左氏曰公如晉朝且拜士魴之辱禮也趙氏曰大國使聘即湏自徃拜之是公無寧嵗也而左氏言禮也一何謬乎愚謂禮貴得中欲其稱而已禮尚徃來來而不徃非禮也若使大夫徃拜焉則徃來相答無不稱矣靈王十二年十有三年晉悼十三年齊靈二十二年衛獻十七年蔡景三十二年鄭簡六年曹成十八年陳哀九年杞孝七年宋平十六年秦景十七年楚共三十一年卒吳諸樊遏元年春公至自晉正傳曰書公至自晉謹君之出入也左氏曰孟獻子書勞于廟禮也愚謂書至則有告廟飲至書勞之禮焉夏取邿正傳曰邿小國在任城縣書夏取邿著貪兵也左氏曰夏邿亂分爲三師救邿遂取之凡書取言易也用大師焉曰㓕弗地曰入愚謂言易言用大師言弗地皆義例之蔽也取者以爲已有也故春秋非之秋九月庚辰楚子審卒正傳曰書楚子審卒來赴故也左氏曰楚子疾告大夫曰不糓不德少主社稷生十年而喪先君未及習師保之教訓而膺受多福是以不德而亡師于鄢以辱社稷爲大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請爲靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之冬城防正傳曰周之冬夏八九十月也防魯邑名書冬城防左氏曰書事時也於是將早城臧武仲請俟畢農事禮也愚謂早者冬早夏八月也適農穫之時故武仲請俟畢農事則周之十二月夏時之十月也於是爲得時矣得時而亦書者凡無故而興作皆非聖人之所善也閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中此聖人之意也靈王十三年十有四年晉悼十四年齊靈二十三年衛獻十八年蔡景三十三年鄭簡七年曹成十九年陳哀十年杞孝八年宋平十七年秦景十八年楚康王昭元年吴諸樊二年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吳于向正傳曰向在鄭地吳來在向諸侯㑹之也書諸侯㑹吳于向善其與吳之歸華而拒楚之强橫也詩曰戎狄是膺荆舒是懲攘楚人尊王國聖人與物同體之心非有所外也盖抑隂而扶陽去邪而與正禦冦賊而崇禮義此聖人之心也左氏曰春吳告敗于晉㑹于向爲吳謀楚故也吳與楚皆蠻地呉能慕中國而來歸見敗於楚則因其來而㑹之以謀楚焉盖取其用夏變蠻而與之攘之也二月乙未朔日有食之正傳曰書日有食之志天變也夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦正傳曰書㑹諸侯之師伐秦著憤怨之兵也左氏曰夏諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子說二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰鷄鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之耻也吾有二位於戎路敢不耻乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲徃而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦於是齊崔杼宋華閱仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書於向書於伐秦攝也己未衛侯出奔齊正傳曰書衛侯出奔齊則自奔者與奔君者之罪人斯著矣左氏曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章太師辭師曹請爲之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近闗出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤鄄人執之子鮮從公及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以爲師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔于衛厚孫歸復命語臧武仲曰衛君其必歸乎有太叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衛侯及其復也以郲糧歸衛人立公孫剽孫林父甯殖相之以聴命於諸侯衛侯在邪臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫說謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎愚謂此實傳也以孫林父甯殖逐其君而使之奔齊則其罪不容誅矣以定姜之言觀之則衛侯負此三罪而奔乃其所自取棄封守捐社稷宗廟而不顧其罪豈小哉故春秋書衛侯奔齊則自奔者與奔君者之罪見矣左氏曰衛甯殖將死語其子曰吾得罪於君名在諸侯之䇿曰孫林父甯殖出其君又曰師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神之祀百姓絶望社稷無主將安用之弗去何爲天生民而立之君使司牧之勿使失性有君而爲之貳使師保之勿使過度天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣愚謂觀此二傳則衛國君臣之罪均矣然則有君如衛衎爲之臣者奈何語曰君有過三諫而不聴則易位爲貴戚之卿上告于天子下告于連帥而易之可也逐之不可也莒人侵我東鄙正傳曰書莒人侵我東鄙志警也秋楚公子貞帥師伐吳正傳曰書楚公子貞帥師伐呉志憤怨之兵也楚既不得志於中國故發憤於吳左氏曰秋楚子爲庸浦之役故子囊師于棠以伐呉吳不出而還子囊殿以吳爲不能而弗儆吳人自臯舟之隘要而擊之楚人不能相救呉人敗之獲楚公子宜糓愚謂觀此則凡無故而逞其憤怨以兵加人者未有不自敗者也故兵以守爲常勝而應敵之師次之冬季孫宿㑹晉士匄宋華閲衛孫林父鄭公孫蠆莒人邾人于戚正傳曰書季孫宿㑹諸侯之大夫于戚則㑹之善否可考見矣左氏曰晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎冬㑹于戚謀定衛也范宣子假羽毛於齊而弗歸齊人始貳愚按此則戚之㑹爲謀定衛也衛之卿大夫不勝其君之惡諌之而不聽不以告于天子而請易之既逐其君而擅立焉又謀定之又不謀于列國之君而謀于列國之臣是君之易置在臣掌握中矣春秋特書其㑹使人求其故而知其取義之深意也靈王十四年十有五年晉悼十五年卒齊靈二十四年衛獻十九年殤公剽元年蔡景三十四年鄭簡八年曹成二十年陳哀十一年杞孝九年宋平十八年秦景十九年楚康二年呉諸樊三年春宋公使向戌來聘二月己亥及向戌盟于劉正傳曰書來聘而及盟志非禮也聘者邦交修睦之道也盟者要質鬼神未信之事也夫信而後行聘向戌既來聘而又與之盟而結信焉烏在其爲聘哉故曰非禮也劉夏逆王后于齊正傳曰劉夏胡氏以爲天子之士書劉夏逆王后于齊志非禮也左氏曰官師從單靖公逆王后于齊卿不行非禮也禮逆后以卿而公監之故無使士之禮使士則輕天下之母而凟宗廟之主矣故來報而史書之聖人存之而非禮見矣公羊謂外逆女不書此何以書過我也愚謂非也王者無外逆天下之母必在布告豈得以過我而志之哉劉夏不言使者史畧之而義自具矣胡氏謂不與天子之使夏也則鑿之甚矣胡氏曰昏姻人倫之本王后天下之母劉夏士也士而逆后是不重人倫之本而輕天下之母矣然則何使卿徃逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿徃逆公監之禮也春秋昏姻得禮者常事不書愚謂逆王后天下之母昏禮人道之始豈得謂常事不書乎夏齊侯伐我北鄙圍成公救成至遇正傳曰成遇皆魯地書齊圍成公救成至遇志禦侮之師也公羊曰其言至遇何不敢進也愚謂至遇而不進以不戰爲功亦春秋之所善也季孫宿叔孫豹帥師城成郛正傳曰郛者城之外城書城成郛志非時也左氏曰齊侯圍成貳於晉故也於是乎城成郛愚謂據左氏則魯之城成爲禦齊之故耳而遽以大衆作於農務之時則惑甚矣故春秋書之秋八月丁巳日有食之正傳曰書日有食之志天變也邾人伐我南鄙正傳曰書邾人伐我南鄙志警也左氏曰秋邾人伐我南鄙使告于晉晉將爲㑹以討邾莒晉侯有疾乃止冬晉悼公卒遂不克㑹冬十有一月癸亥晉侯周卒正傳曰書晉侯周卒志盟主之大故也於是諸侯有奔喪弔葬之禮焉故書之左氏曰鄭公孫夏如晉奔喪子蟜送葬靈王十五年十有六年晉平公彪元年齊靈二十五年衛獻二十年殤二年蔡景三十五年鄭簡九年曹成二十一年陳哀十二年杞孝十年宋平十九年秦景二十年楚康三年吳諸樊四年春王正月𦵏晉悼公正傳曰書𦵏晉悼公志盟主之大事也三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟正傳曰書三月公與諸侯㑹戊寅大夫盟聖人喜懼之情見矣喜者喜其㑹曰將討罪乎懼者大夫盟征伐之權將下移也夫公與諸侯㑹若無所事而使大夫盟則君若贅旒於上而臣執大權於下此聖人喜懼之情而春秋所以作也左氏曰晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸於是叔孫豹晉荀偃宋向戌衛甯殖鄭公孫蠆小邾之大夫盟曰同討不庭髙氏曰爲討邾莒也邾莒連伐魯魯使告于晉悼公將爲㑹以討之遇疾乃止平公即位遂成父志愚謂參以二傳觀之則此盟盖爲同討不庭而所謂不庭者邾莒耳然此征伐之事天下有道禮樂征伐自天子出征伐者天子之事也一變而自諸侯出再變而自大夫出故此書諸侯㑹大夫盟則見世道之大變也公羊曰諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫徧刺天下之大夫也曷爲徧刺天下之大夫君若贅旒然糓梁曰溴梁之㑹諸侯失政矣諸侯㑹而曰大夫盟政在大夫也胡氏曰牡丘之㑹諸侯既次于匡則書曰公孫敖帥師及諸侯之大夫救齊雞澤之㑹諸侯既盟而陳侯使袁僑盟今溴梁之㑹諸侯皆在是若欲使大夫盟者則宜書魯卿及諸侯之大夫盟可也而獨書大夫何也諸侯夫政大夫皆不臣也上二年春正月㑹于向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹于戚七國之大夫也此三㑹皆國之大事也而使大夫皆專之而諸侯皆不與焉是列國之君不自爲政弗躬弗親禮樂征伐已自大夫出矣况悼公既沒晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積於至㣲而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晉靖公廢趙籍韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也晉人執莒子邾子以歸正傳曰書晉人執莒子邾子以歸著詭謀討罪之非其所也夫莒邾之罪可討而㑹盟非討罪之所也左氏曰以我故執邾宣公莒犂比公且曰通齊楚之使愚謂莒邾數加侵魯以小犯大而又貳齊楚誠為有罪晉為霸主宜告于天子聲罪致討可也於是來㑹盟而許之乃又執之於盟㑹又以歸焉刑政紊矣其可乎故春秋非之齊侯伐我北鄙正傳曰何以書志警也夏公至自㑹正傳曰書公至自㑹謹君之出入也五月甲子地震正傳曰書地震志變異也地道主静其常也而震動焉則反常矣反常爲變爲臣下荆蠻小人弄權干正陵犯之象故春秋志之示警戒也叔老㑹鄭伯晉荀偃衛甯殖宋人伐許正傳曰書叔老㑹鄭伯諸侯之師伐許討背約也左氏曰許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃書曰㑹鄭伯爲夷故也夏六月次于棫林庚寅伐許次于函氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰于湛阪楚師敗績晉師遂侵方城之外復伐許而還愚謂許請遷于晉盖欲從晉以背楚棄夷狄以歸中國其約善矣乃爲諸大夫所不可以背約焉故晉與諸侯之師伐之討其貳約也其道於諸侯爲直於許爲曲矣先鄭伯者許氏以爲臣不可過君是也左氏以爲爲夷者非矣秋齊侯伐我北鄙圍郕正傳曰書齊侯伐我北鄙圍郕甚齊擅興背義之罪也左氏曰秋齊侯圍郕孟孺子速徼之齊侯曰是好勇去之以爲之名速遂塞海陘而還愚謂齊屢伐魯今再圍郕盖與楚故伐魯致晉而與之戰其惡甚矣故春秋惡之大雩正傳曰秋書大雩後時非禮也非禮之中又見其非禮焉也冬叔孫豹如晉正傳曰書叔孫豹如晉著其如之非也左氏曰冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之也是以大請敝邑之急朝不及夕引領西望曰庻幾乎比執事之閒恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰匄在此敢使魯無鳩乎愚謂魯國之君臣苟能明其政刑使其德威足以懾服敵人之氣誰取侮之惟其政在三家而君道不立齊人得以乘間而屢侮之乃汲汲於援晉以報怨抑亦末矣靈王十六年十有七年晉平二年齊靈二十六年衛獻二十一年殤三年蔡景三十六年鄭簡十年曹成二十二年陳哀十三年杞孝十一年宋平二十年秦景二十一年楚康四年吴諸樊五年春王二月庚午邾子牼卒正傳曰牼邾子名書卒以其來赴也宋人伐陳正傳曰書宋人伐陳則擅興之罪自見矣左氏曰宋莊朝伐陳獲司徒卬卑宋也髙氏曰七年鄢之㑹陳侯逃歸自是不復與諸侯㑹而楚鄭連年侵宋宋於是請於晉而伐之愚謂據此則陳自逃歸不與中國盟㑹誠爲有罪然不以告于天子而伐之則春秋所惡也夏衛石買帥師伐曹正傳曰書衛石買帥師伐曹著憤怨之兵也左氏曰衞孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而訽之曰親逐而君爾父爲厲是之不憂而何以田爲夏衛石買孫蒯伐曹取重丘曹人愬于晉愚謂此本傳也據此則孫蒯越境田獵取辱於重丘之人此私怨之㣲事非有國家之大計遂附重臣興大衆伐曹取其地是又遷怒於曹君而負罪於天下也秋齊侯伐我北鄙圍桃齊高厚帥師伐我北鄙圍防正傳曰書齊侯伐我北鄙圍桃齊高厚帥師伐我北鄙圍防志警也而齊君臣之暴兵可見矣左氏曰齊人以其未得志于我故秋齊侯伐我北鄙圍桃高厚圍臧紇于防師自陽闗逆臧孫至于旅松鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死愚謂齊魯婚姻舊好之國也齊屢加侵伐於魯以未得志而其君臣至是乃交加兵焉貪暴爲甚故春秋直書之而其罪自見矣九月大雩正傳曰書九月大雩譏非時也而失禮自見矣餘見于前宋華臣出奔陳正傳曰書宋華臣出奔陳譏逸賊也左氏曰宋華閱卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴天亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之耻也不如盖之乃舍之左師爲已短䇿苟過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳愚按華閱臯比之父也華閱卒而臯比弱華臣使賊殺其宰華吳殘宗室以亂宋政擅殺無君其罪大矣宋公知其罪欲逐之聴左師之言而不果乃至爲國人所逐而奔陳宋之刑政乖矣聖人書之以罪宋也冬邾人伐我南鄙正傳曰書邾人伐我南鄙志警也左氏曰爲齊故也然則邾以小國黨齊之强以犯大國其得罪於王法不待貶而自見矣靈王十七年十有八年晉平三年齊靈二十七年衛獻二十二年殤四年蔡景三十七年鄭簡十一年曹成二十三年陳哀十四年杞孝十二年宋平二十一年秦景二十二年楚康五年吴諸樊六年春白狄來正傳曰來者來期也不言朝者史臣以其夷狄畧之也而朝之義已具公羊以爲不能朝誤矣史稱越裳氏重譯而來朝何謂乎書白狄來謹逺人之至也王國之御逺人也於其歸義而來則受之於其背義而去則勿追不必其來朝亦不不必其來朝書稱四夷來王有苖格春秋之書白狄來其義一也胡氏據劉敞不與其朝之說則非聖人不棄物之心矣夏晉人執衛行人石買正傳曰書晉人執衛行人石買罪非義也左氏曰夏晉人執衛行人石買于長子執孫蒯于純留爲曹故也愚謂孫蒯不勝其重丘之私憤與石買帥師伐曹輕動大衆以糜爛其民其罪可誅矣晉爲盟主不能告於天王聲其罪以伐之乃執之於行人又不以歸之京師則刑政失矣可得爲義舉乎故春秋直書之而其罪自見秋齊師伐我北鄙正傳曰書齊師伐我北鄙志警也冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊正傳曰書公㑹諸侯同圍齊善其同罪齊也左氏曰秋齊侯伐我北鄙晉侯伐齊將濟河獻子以朱絲係玉二瑴而禱曰齊環怙恃其險負其衆庻棄好背盟陵虐神主曽臣彪將率諸侯以討馬其官臣偃實先後之苟㨗有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹于魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聴諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右偽以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰曰止將爲三軍獲不止將取其𠂻顧曰爲私誓州綽曰有如日乃弛弓而自後縳之其右具丙亦舍兵而縳郭最皆衿甲靣縳坐于中軍之鼓下晉人欲逐歸者魯衛請攻險己卯荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩范鞅門于雍門其御追喜以戈殺犬于門中孟莊子斬其橁以爲公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門于揚門州綽門于東閭左驂廹還于門中以枚數闔齊侯駕將走郵棠太子與郭榮扣馬曰師速而疾畧也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之太子抽劍㫁鞅乃止甲辰東侵及濰南及沂愚謂齊以背盟棄好屢加侵伐于魯負不義之罪於天下天下諸侯同心惡之故春秋書同圍言共棄之也程子曰書同圍見諸侯之惡齊是也曹伯負芻卒于師正傳曰負芻曹伯名書曹伯負芻卒志與國之大故也而其平生之大惡人可以考而知矣糓梁以爲閔之非也楚公子午帥師伐鄭正傳曰午字子庚書公子午帥師伐鄭著不義之師也左氏曰鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子唐子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不糓主社稷而不出師死不從禮不糓即位於今五年師徒不出人其以不糓爲自逸而忘先君之業矣大夫圖之其若之何子庚嘆曰君王其謂午懐安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次於魚陵右師城上棘遂渉潁次于旃然蒍子馮公子格帥銳師侵費滑胥靡獻于雍梁右回梅山侵鄭東北王于蟲牢而反子庚門于純門信于城下而還涉於魚齒之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之德也愚謂楚為子孔去諸大夫叛晉而請楚伐鄭固已負不義之罪矣春秋書之而其竊取之義自見也春秋正傳卷二十六
