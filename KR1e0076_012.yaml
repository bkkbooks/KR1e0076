body:
  text: 春秋正傳卷十二明湛若水撰僖公名申莊公子閔公兄母成風夫人聲薑在位三十三年惠王十八年元年齊桓二十七年晉獻十八年衛文公燬元年蔡穆十六年鄭文十四年曹昭三年陳宣三十四年杞惠十四年宋桓二十三年秦穆公任好元年楚成十三年春王正月正傳曰書元年書春王正月而不書即位義見前左氏曰不稱即位公出故也公出復入不書諱之也理或然也齊師宋師曹師次于聶北救邢正傳曰聶北邢地次者止也書乃止齊焉頓兵整旅之意書齊師宋師曹師次子聶北救邢著伯主攘夷崇華之義也邢雖小中國也狄人滅之是夷狄陵中國冠屨之反易矣桓公為盟主帥與國之師而往救之緩而不及邢人出奔乃為之城邢焉然其始終仗義亦可見矣而以為書次以譏之者非也夏六月邢遷于夷儀正傳曰夷儀杜氏以為邢地書邢遷于夷儀紀避狄也左氏曰諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀愚謂此實傳也穀梁曰遷者猶得其國家以往者也其地邢復見也齊師宋師曹師城邢正傳曰城邢者邢城為狄所壞故為之修而築之也復書齊師宋師曹師城邢著伯主恤小全華之義也此猶是初次于聶北之師會邢潰遂為之逐狄人今又為之城邢故國也左氏曰諸侯城之救患也凡侯伯救患分災討罪禮也公羊曰此一事也不復言師則無以知其為一事也穀梁曰美齊侯之功也胡氏曰再書齊師宋師曹師城邢者美桓公志義卒有救患之功也不以王命興師亦聖人之所與乎中國衰微夷狄猾夏天子不能正至於遷徙奔亡諸侯有能救而存之則救而存之可也以王命興師者正能救而與之者權秋七月戊辰夫人薑氏薨于夷齊人以歸正傳曰夷齊地薑氏哀薑齊女也閔公哀薑之娣所生哀薑通于慶父與聞弒閔公奔于齊地以薨或自死或人死之無所據不敢質疑公羊以為桓公召而縊殺之者無此理穀梁胡氏遂宗之非也夫桓公於哀薑為親獨無議親之義乎縊殺之為擅殺獨不顧無王之義乎何以為霸主乎既在齊地齊侯宜嚴加兵衛以防守之待其自盡恩義之兩得也以歸者以喪歸于魯也生既嫁魯死當歸魯哀薑雖與殺子之罪子無出母之義葬以小君之禮夫誰曰不宜觀不去其夫人可知矣書夫人薑氏薨于夷齊人以歸紀國之大事也其曰地不地皆後儒臆説私例也楚人伐鄭正傳曰書楚人伐鄭紀夷狄之犯中國也有報則史書之聖人筆之而不削以著其罪也胡氏以此稱人為楚寖強夫中國之於楚以夷狄視之豈以其強弱而異其稱耶其他稱人又以為貶為師少者何其義例之不一矣八月公會齊侯宋公鄭伯曹伯邾人于柳正傳曰柳杜氏以為宋地書公會齊侯宋公鄭伯曹伯邾人于柳著善會也何以為會之善善其同謀救鄭也左氏曰盟于犖謀救鄭是也犖即柳也楚人伐鄭桓公合諸侯而救之崇中國攘夷狄霸者之義也九月公敗邾師于偃正傳曰偃邾地敗者勝之之詞也書公敗邾師于偃著非義也左氏曰虛丘之戍將歸者也胡氏曰柳之會謀救鄭而公與邾人咸與焉則是志同而謀協也今既會邾人于柳又敗邾師于偃於此責公無攘夷狄安中國之誠矣凡此類皆直書其事而義自見矣冬十月壬午公子友帥師敗莒師于酈獲莒拏正傳曰酈杜氏以為魯地敗者勝之之名莒拏莒大夫也公子友即季友也書公子友帥師敗莒師于酈獲莒拏著公子應敵取勝之善也春秋無義戰莒師臨魯地而與之戰戰而能勝則善矣公羊曰慶父弒閔公走而之莒莒人逐之將由乎齊齊人不納却反舍于汶水之上使公子奚斯入請季子曰公子不可以入入則殺矣奚斯不忍反命于慶父自南涘北面而哭慶父聞之曰嘻此奚斯之聲也諾己曰吾不得入矣於是抗輈經而死莒人聞之曰吾已得子之賊矣以求賂乎魯魯人不與為是興師而伐魯左氏曰冬莒人來求賂公子友敗諸酈獲莒子之弟拏非卿也嘉獲之也公賜季友汶陽之田及費此實傳也以為責之者非也十有二月丁巳夫人氏之喪至自齊正傳曰稱夫人稱氏不稱薑者史闕文耳公穀胡氏皆以為貶者非也若以為貶何以又書氏字乎夫人預殺二子幾於亡國其罪不待乎不薑而自見矣書夫人薑氏之喪至自齊則夫人不母之罪子無絶母之義並見矣其至自齊左氏曰女子從人者也故義不得不歸夫人預殺二子而竄死于外可謂不母矣胡氏以為大義已絶不可復入宗廟矣書孫于邾薨于夷者絶哀薑也而云子無絶母之義者何禮曰為伋也妻則為白也母不為伋也妻則不為白也母今哀薑雖身犯大惡而莊公生時未出之也是猶為魯君母也義當從人則齊人當歸之魯侯當受之葬以小君之禮也蓋名分未絶則義亦未絶也惠王十九年二年齊桓二十八年晉獻十九年衛文二年蔡穆十七年鄭文十五年曹昭四年陳宣三十五年杞惠十五年宋桓二十四年秦穆二年楚成十四年春王正月城楚丘正傳曰楚丘衛邑也城者築城也書城楚丘著霸主興滅之義也衛為狄所滅桓公合諸侯與之城楚丘以避狄而存衛也左氏公穀皆以為封衛而責其専封之非胡氏從之皆非也衛之服命名爵如故也特徙城于楚丘耳地不同而爵同何事於封乎然則邢遷于夷儀亦可謂之自封乎胡氏曰衛人渡河野處曹邑許穆夫人閔其亡而載馳賦文公徙居楚丘而後百姓説夫如是則徙居楚丘耳焉得謂之封此與古公亶父避狄遷于岐山之下正同未聞謂周亡於狄而再自封也夏五月辛巳葬我小君哀薑正傳曰邦君之妻稱諸異邦曰寡小君哀薑者莊公之夫人也有小君之道焉書辛巳葬我小君哀薑紀國母喪葬之大事也哀薑雖徙死于夷然而未有君父與夫出之者則小君之名猶在葬當以小君之禮也此猶稱小君猶書哀薑則上夫人氏之喪歸自齊諸儒以為去其薑姓而絶之者妄矣凡觀春秋者當以此知義例之非虞師晉師滅下陽正傳曰下陽虢之邑也書虞師晉師滅下陽著陵暴之罪也左氏曰晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能強諫且少長於君君䁥之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦唯君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宫之竒諫不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽先書虞賄故也愚謂此實傳也程子曰虞假道而助晉伐虢虢之亡虞實致之故以虞為主下陽邑也虢之亡由此故即書滅胡氏曰孟子晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之竒諫百里奚不諫然則晉人造意以虞首惡何也貪得重賂遂其強暴滅兄弟之國以及其身而亡其社稷所以為首乎秋九月齊侯宋公江人黃人盟于貫正傳曰貫宋地書齊侯宋公江人黃人盟于貫著盟會之善也春秋無善盟何以善貫之盟善其威夷以尊華也穀梁曰貫之盟不期而至者江人黃人也江人黃人者逺國之辭也中國稱齊宋逺國稱江黃以為諸侯皆來至也胡氏曰按左氏盟于貫服江黃也荆楚天下莫強焉江黃者其東方之與國也二國來定盟則楚人失其右臂矣樂毅破齊先結韓趙孔明伐魏申好江東雖武王牧野之師亦誓友邦逺及庸蜀彭濮八國之人共為掎角之勢也桓公此盟其服荆楚之慮周矣其帖荆安夏救災恤鄰之義著矣盟雖春秋所惡然諸侯皆在獨言逺國者許是盟也冬十月不雨正傳曰書冬十月不雨紀災異也周冬十月夏之八月用雨之時也冬不雨則春無麥禾可知矣無麥禾則民飢可知矣楚人侵鄭正傳曰書楚人侵鄭著中國不自振之患也左氏曰楚人伐鄭鬭章囚鄭聃伯惠王二十年三年齊桓二十九年晉獻二十年衛文三年蔡穆十八年鄭文十六年曹昭五年陳宣三十六年杞惠十六年宋桓二十五年秦穆三年楚成十五年春王正月不雨夏四月不雨正傳曰二年既書冬十月不雨今又書春正月不雨夏四月不雨連三時而不雨紀大災也聖人筆之憂民之情見矣胡氏因穀梁一時言不雨者閔雨有志乎民之説而遂以為冬不雨而書春不雨而書夏不雨而書以著僖公之勤謬矣夫史者直書以示後世雨暘不時以為咎徵之戒可也豈可因其勤慢以為書之疏數耶愚故曰聖人憂民之情見矣徐人取舒正傳曰書徐人取舒著兼併之罪也舒附楚國家氏曰荆舒是懲舒與荆比而為中國患其來久矣徐伐舒為中國撓楚也春秋書此蓋與其伐而不與其取也六月雨正傳曰書六月雨志喜也上書三時不雨志憂也五事修則休徵應五事不修則咎徵應聖人志天時以為人事之勸懲其憂喜之情見矣秋齊侯宋公江人黃人會于陽穀正傳曰陽穀齊地書齊侯宋公江人黃人會于陽穀著諸侯同會攘夷之善也言齊宋不言公者舉齊宋則公與諸侯皆在矣言江黃不言諸國者舉江黃則諸國皆在矣左氏曰謀伐楚也胡氏曰次陘之師諸侯皆在江黃獨不與焉則安知其為謀伐楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次乎陘所謂聚而為正也江人黃人各守其地所謂分而為竒也次陘大衆厚集其陳聲罪致討以震中國之威江人黃人各守其境按兵不動以為八國之援此克敵制勝之謀也退于召陵而盟禮定循海以歸而濤塗執然後及江人黃人伐陳則知侵蔡次陘而二國不會自為掎角之勢明矣此大會而未言者善是謀也冬公子友如齊涖盟正傳曰涖猶臨也就彼而盟之謂書公子友如齊涖盟著尋盟之非也陽穀之會不言盟葵丘之會載書而不歃血不貴盟也盟者忠信之薄也左氏曰齊侯為陽穀之會來尋盟冬公子友如齊涖盟愚謂陽穀之會天下諸侯大會也大會者大公也天下諸侯大會聲大公之道以伐楚攘夷狄以尊中國則善矣不踰時又如齊以尋盟則私小之道也夫盟可尋也亦可寒也非霸者之道矣故春秋書而非之楚人伐鄭正傳曰書楚人伐鄭見夷狄屢犯中國也左氏曰鄭伯欲成孔叔不可曰齊方勤我棄德不祥惠王二十一年四年齊桓三十年晉獻二十一年衛文四年蔡穆十九年鄭文十七年曹昭六年陳宣三十七年杞惠十七年宋桓二十六年秦穆四年楚成十六年春王正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘正傳曰陘楚地書公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘著霸者仁義之師也侵蔡伐楚義也蔡潰不土其地不分其民於楚次陘以問罪不肆強深入皆仁也何以侵蔡遂伐楚張氏曰蔡自獻舞以來屈服于楚桓公欲討楚而加兵于附楚之蔡先責其以文王之胄而甘心於僣竊之夷所謂中國而僭亂則甚惡之也左氏曰春齊侯會諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濱師進次于陘愚謂此見仗義執言之事乃實傳也胡氏曰潛師掠境曰侵侵蔡者竒也聲罪致討曰伐伐楚者正也遂者繼事之詞而有專意次止也楚貢包茅不入王祭不共無以縮酒桓公是徵而楚人服罪師則有名矣孟氏何以獨言春秋無義戰也譬之殺人者或曰人可殺歟曰可孰可以殺之曰為士師則可以殺之矣國可伐歟曰可孰可以伐之曰為天吏則可以伐之矣楚雖暴橫憑陵上國齊不請命擅合諸侯豈可謂為天吏以伐之乎愚謂此又不可不知也夏許男新臣卒正傳曰新臣許男名書許男新臣卒紀同盟之大故也而其卒之非正自見矣夫既許諸侯以盟則死生以之在國則死于國在師則死于師正也許男病則復歸于國而死故春秋書以非之胡氏曰劉敞曰諸侯卒于外者在師則稱師在會則稱會今許男一無稱者此去師與會而復歸其國之驗也召陵地在潁川是以許男復焉古者國君即位而為椑嵗一漆之出疆必載椑卒于師曰師卒于會曰會正也許男新臣卒非正也其為人君不知命者也不知命則必畏死畏死則必貪生貪生則必亂於禮矣而後有容身苟免之恥而後有淫祀非望之惑此説是也夫知死生之説通晝夜之道者亦豈有以異於人哉苟得正而斃焉則無求矣楚屈完來盟于師盟于召陵正傳曰屈完楚大夫召陵在潁川縣楚地也書楚屈完來盟于師盟于召陵則楚之服義齊之仗義而攘夷尊王之義並見矣左氏曰夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟公羊曰其言盟于師盟于召陵何師在召陵也師在召陵則曷為再言盟喜服楚也楚夷狄也而亟病中國南狄與北夷交中國不絶若線桓公救中國而攘夷狄卒帖荆以此為王者之事也胡氏亦曰來盟于師嘉服義也盟于召陵序桓績也桓公帥八國之師侵蔡而蔡潰伐楚而楚人震恐兵力強矣責包茅之不貢則諾問昭王之不復則辭徼與同好則承以寡君之願語其戰勝攻克則對以用力之難然而桓公退師召陵以禮楚使卒與之盟而不遂也於此見齊師雖強桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事矣故春秋之盟於斯為盛而楊子稱之曰齊桓之時緼而春秋美召陵是也齊人執陳轅濤塗正傳曰轅濤塗陳大夫書齊人執陳轅濤塗著其執之非正也左氏曰陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告濟侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧扉屨其可也齊侯説與之虎牢執轅濤塗愚謂此實傳也據左氏之説乃因轅濤塗一言之誤而遂以為不忠而執之也然陳與諸侯同盟以伐楚楚服而歸雖宥之可也濤塗非有逆上之罪而乃因小故越國而執之非伯討之正矣故家氏以為不與其執是也秋及江人黃人伐陳正傳曰及者承上文齊及之也何以知為非魯公及之以下書公至自伐楚而知之也夏執轅濤塗秋即及江黃以伐陳若一事然也左氏曰秋伐陳討不忠也愚謂所謂不忠者未有所見必因轅濤塗之誤師以為不忠也既執其大夫又伐其國豈奉詞討罪伯者之師乎春秋書之著其伐之非也桓公於是乎霸業衰矣八月公至自伐楚正傳曰書公至自伐楚者君舉必書也况征戰大事久勞于外乎且歸必有反面告至之禮焉公羊曰楚已服矣何以致伐楚叛盟也愚謂楚非叛盟也公始以伐楚行安得不以伐楚至乎葬許穆公正傳曰書葬許穆公紀同盟之大事也有來赴則史書之聖人筆之致同盟恤患之義耳冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳正傳曰兹叔牙子書公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳著其侵之不正也遷怒也非王者大公至正一怒而安天下之心也左氏曰叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗胡氏曰揚子法言或問為政有幾曰思斁昔在周公征于東方四國是王其思矣夫齊桓公欲徑陳陳不果納執轅濤塗其斁矣夫桓公識明而量淺管仲器不足而才有餘方楚人未帖而齊以為憂也致勤於鄭振中夏之威會于陽穀惇逺國之信按兵于陘修文告之辭退舍召陵結會盟之禮何其念之深禮之謹也存此心以進善則桓有王德而管氏為王佐矣堯舜性之也湯武身之也五霸假之也久假而不歸烏知其非有惜乎桓公假之不久而遽歸也楚方受盟志已驕溢陳大夫一謀不協其身見執其國見伐見侵而怒猶未怠也桓德於是乎衰矣愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之曽可厚以責人不自反乎原其失在於量淺而器不宏也魏武才得荆州而張松見忽唐莊宗自矜取汴而髙氏不朝成湯勝夏撫有萬方乃曰兹朕未知獲戾于上下栗栗危懼若將隕于深淵其爾萬方有罪在豫一人豫一人有罪無以爾萬方人之度量相越豈不逺哉愚謂胡氏此論是矣又謂春秋稱人以執罪齊侯則鑿矣惠王二十二年五年齊桓三十一年晉獻二十二年衛文五年蔡穆二十年鄭文十八年曹昭七年陳宣三十八年杞惠十八年宋桓二十七年秦穆五年楚成十七年春正傳曰五年春不書王正月者史逸之耳可見春秋不可以一字起義矣按正月左氏曰正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也愚謂左氏志正月於春之下志辛亥日南至於正月之下蓋至日在子月由是觀之則知子月為至日為周之春為周之正月無疑矣晉侯殺其世子申生正傳曰書晉侯殺其世子申生紀人倫之大變也左氏曰晉侯使以殺太子申生之故來告愚謂來告故史氏因其告而書之聖人筆之而為天下後世戒也穀梁曰目晉侯斥殺惡晉侯也胡氏謂公羊子曰殺世子母弟直稱君者甚之也申生進不能自明退不能違難愛父以姑息而陷之不義讒人得志幾至亡國先儒以為大仁之賊也而目晉侯斥殺專罪獻公何也春秋端本清源之書也內寵並后嬖子配適亂之本也驪姬寵奚齊卓子嬖亂本成矣尸此者其誰乎是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂適庶之位縱人欲滅天理以敗其家國者知所戒焉以此防民猶有以堯母名門使姦臣逆探其意有危皇后太子之心以成巫蠱之禍者杞伯姬來朝其子正傳曰云來朝其子者以其子來朝也書杞伯姬來朝其子著三失禮也婦人越國一失禮也把伯從其母來朝二失禮也僖公受之三失禮也穀梁曰婦人既嫁不踰竟踰竟非正也諸侯相見曰朝伯姬為志乎朝其子也伯姬為志乎朝其子則是把伯失夫之道矣諸侯相見曰朝以待人父之道待人之子非正也故曰把伯姬來朝其子參譏也夏公孫兹如牟正傳曰牟小國書夏公孫兹如牟著非禮也左氏曰公孫兹如牟娶焉愚謂大夫非君命公事不越境公孫兹因娶而往牟焉則是以私事越國非禮也或曰如牟親迎何以為非禮娶私事也如為館于境內行親迎焉又何不可之有公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止正傳曰首止衛地及猶與也書公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止善其會也善寧周尊王之義也左氏曰會于首止會王大子鄭謀寧周也此其實傳也程子曰世子王之二不可與諸侯列世子出諸侯會之故其辭異是也而其義自明胡氏又泥特書及以會之説則鑿矣秋八月諸侯盟于首止正傳曰諸侯即上列國也書秋八月諸侯盟于首止著善盟也春秋無善盟此何以善盟夏諸侯會王世子于首止而不敢與盟秋諸侯盟于首止而世子不與尊王世子也尊王世子所以尊王也所以定王世子也穀梁曰無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天王尊王世子于首戴乃所以尊天王之命也世子含王命會齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊己而天王尊矣世子受之可也胡氏曰首止之盟美之大者也王將以愛易世子桓公有憂之控大國扶小國會于首止以定其位太子踐阼是為襄王一舉而父子君臣之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到于今受其賜微管仲吾其被髮左袵矣首止之盟為天下正君臣父子之大倫故曰首止之盟美之大者也鄭伯逃歸不盟正傳曰書鄭伯逃歸不盟罪鄭伯之無信也諸侯會王世子于首止左氏以為謀寧周也今以王非義之命遂逃歸不盟吾故曰春秋書之以罪鄭之無信也左氏曰王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝于齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸胡氏曰事有惡者不與為幸其善者不與為貶平丘之盟惡也請魯無勤是以為幸故直書曰公不與盟首止之盟善也犯衆不盟是以為貶故特書曰鄭伯逃歸逃者匹夫之事以諸侯之尊下行匹夫之事雖悔於終病而乞盟如所喪何其書逃歸不盟深貶之也或曰首止之會非王志也王惡齊侯定世子而使周公召鄭伯曰吾撫汝以從楚可以少安鄭伯喜於王命而畏齊故逃歸不盟然則何罪乎曰春秋道名分尊天王而以大義為主夫義者權名分之中而當其可之謂也諸侯會王世子雖衰世之事而春秋與之者是變之中也鄭伯雖承王命而制命非義春秋逃之者亦變之中也楚人滅弦弦子奔黃正傳曰弦小國也書楚人滅弦弦子奔黃著夷狄陵暴之罪也左氏曰楚鬭穀於莬圍弦弦子奔黃於是江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡愚謂此實傳也九月戊申朔日有食之正傳曰書日有食之紀天變也聖人筆之示人君修省之義耳冬晉人執虞公正傳曰書晉人執虞公交譏之也晉陰謀假道滅人之國而執其君虞鴆酣貨寶自滅其國而身被執戮均之為不義也故交譏之左氏曰晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也虞公不聽冬十二月丙子朔晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王故書曰晉人執虞公罪虞且言易也胡氏曰書滅夏陽於始而記執虞公於後可以見棄義趨利黷貨無厭之能亡國敗家審矣春秋正傳卷十二
