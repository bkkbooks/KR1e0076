body:
  text: 春秋正傳卷十五明湛若水撰僖公襄王十七年二十有五年晉文公重耳元年齊孝八年衛文二十五年卒蔡荘十一年鄭文三十八年曹共十八年陳穆十三年杞桓二年宋成二年秦穆二十五年楚成三十七年春王正月丙午衛侯燬滅邢正傳曰書春王正月丙午衛侯燬滅邢則滅同姓之罪見矣邢乃衛之同姓也同姓者如木同根相滅是自滅而拔其根也何以自生夫存亡繼絶國君之仁施於凡國者也而况於同姓之國乎故書滅邢則其滅同姓之罪不可掩矣不待乎名之而後見也經中名之而無所貶者多矣三傳皆以名燬以罪其滅同姓胡氏從之至以晉滅虞楚滅夔亦同姓也而不名則又引例之常與例之變以為言何其支吾也惟據事直書而滅同姓之罪自見為簡易直截也義例者皆先儒公穀之徒專門之學為之殊不知他或不能充其類則不免為支吾之説以為之詞而坐此蔽聖人之本指為累又大也夏四月癸酉衛侯燬卒正傳曰燬衛侯名名之亦無他義書癸酉衛侯燬卒紀隣國之大故其以日者史文之詳也諸儒謂衛侯滅同姓而名以貶之則夫此卒而名之又日之者何謂耶宋蕩伯姬來逆婦正傳曰蕩氏宋人伯姬公之女嫁于蕩氏故云宋蕩伯姬也逆婦逆其子之婦也書蕩伯姬來逆婦著失禮也婦人既嫁不踰境踰境惟歸寧父母耳伯姬來不以歸寧而以逆婦一失禮也自來逆婦二失禮也胡氏謂國君不與大夫敵魯公下主大夫之昏是慢宗廟卑朝廷三失禮也宋殺其大夫正傳曰書宋殺其大夫罪宋公之擅殺也其不名者史佚之耳然亦不必名而義自見矣秋楚人圍陳納頓子于頓正傳曰頓小國名在汝陰南頓縣杜氏曰頓迫於陳而出奔楚故楚圍陳以納頓子書楚人圍陳納頓子于頓紀夷狄正中國以譏中國之諸侯也胡氏曰陳先代之後不能以禮安靖鄰國保䘏寡小中國諸侯又不能脩方伯連帥之職而使楚人納之是夷狄仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正本自治之意也葬衛文公正傳曰書葬衛文公紀鄰國之大事也餘義見前冬十有二月癸亥公㑹衛子莒慶盟于洮正傳曰洮魯地衛子者衛成公稱子喪未踰年也莒慶莒國之臣名慶也書公㑹衛子莒慶盟于洮著脩好之義也左氏曰衛人平莒于我十二月盟于洮脩衛文公之好且及莒平也愚謂平者言歸于好春秋之義也襄王十八年二十有六年晉文二年齊孝九年衛成公鄭元年蔡荘十二年鄭文三十九年曹共十九年陳穆十四年杞桓三年宋成三年秦穆二十六年楚成三十八年春王正月己未公㑹莒子衛寗速盟于向正傳曰寗速衛大夫寗莊子也向莒地書公㑹莒子衛寗速盟于向著數盟之非也十二月已盟于洮矣今正月又盟向不越月而兩盟者吴氏曰洮盟莒子不親至公必欲與莒子盟故又為此㑹也愚謂據此則不但數盟乃要盟矣盟洮猶可盟向過矣張氏曰十二月已盟今又要盟所以召齊之討也左氏曰正月公㑹莒茲丕公寗莊子盟于向尋洮之盟也愚謂易初筮告再三瀆瀆則不告以言乎二三其徳也初盟猶恐不信况二三乎况要盟乎其召釁必矣齊人侵我西鄙公追齊師至酅弗及正傳曰潜師入境曰侵彼兵已退而逐之曰追西鄙者魯之邊境也酅者齊之地書齊人侵我西鄙著齊無名之兵也書公追齊師至酅弗及著魯窮追之兵也左氏曰齊師侵我西鄙討是二盟也公羊曰其言至酅弗及侈也故胡氏曰齊魯皆私憤之兵而非正也故交譏之是也夫魯有罪齊聲其罪明以討之可也乃潜師而來且入其境齊為非正矣齊來侵魯備而禦之去則不追可也乃窮追而入其境為非正矣故曰交譏之也夏齊人伐我北鄙正傳曰書齊人伐我北鄙甚其非義之罪也春侵魯西鄙夏伐魯北鄙非義甚矣其悖先君之徳甚矣左氏曰公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣磬野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還衛人伐齊正傳曰書衛人伐齊罪搆怨之兵也齊桓有徳於衛桓卒而衛伐喪助少陵長是以怨報徳而齊與衛有宿怨矣衛不知自反乃因為莒平魯之盟怒齊伐魯之故遂興兵以伐齊是兵出於私怨而非公義矣故春秋非之公子遂如楚乞師正傳曰乞云者公羊以為卑詞也書公子遂如楚乞師著不義也楚雖強仇讎也齊魯雖不和婚姻也比之兄弟也婚姻之與仇讎其分限嚴矣兄弟鬩于牆外禦其侮僖公乃不忍齊人侵伐之怨使遂乞師于楚是援夷入華置毒于心腹也其害義釀禍孰大焉胡氏曰衛人報徳以怨伐齊之喪助少陵長又遷怒於邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省徳自反深思逺慮計安社稷乃乞楚師與齊為敵是以蠻夷殘中國也於義可乎其書公子遂如楚乞師而惡自見矣秋楚人滅夔以夔子歸正傳曰夔小國書楚人滅夔以夔子歸著楚滅同姓之罪也左氏曰夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬭宜申帥師滅夔以夔子歸愚謂此其實傳也夫楚有三不義焉楚於夔為同姓故夔子有竄夔失楚之説而滅之是滅同姓罪一矣鬼神不歆非類非鬼不祭也夔祖熊摯止祀熊摯禮也楚乃執以不祀祝融鬻熊夔有辭焉而猶滅之是其罪二矣夫彼不祀使人告之祀如湯於葛伯之為可也乃滅之使絶其祀又以其君歸是其罪三矣故一事書而三罪見焉豈係乎名不名耶冬楚人伐宋圍緡正傳曰書楚伐宋圍緡著私憤之兵也左氏曰宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡愚謂楚師伐宋而即伐齊是魯僖召讐以伐親也其罪大矣公以楚師伐齊取穀正傳曰穀齊邑以猶用也左氏能左右之曰以非也書公以楚師伐齊取穀著不義也夫以夷伐華一不義也伐之因而取其地二不義也左氏曰寘桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚愚謂事之有無不可考然亦慘矣公至自伐齊正傳曰書公至自伐齊紀戎事也始終乎不義之舉也君舉必書况兵戎大事故書至有反面告廟之禮焉然而其不義之非自見矣胡氏曰夫背齊即夷取人之邑為已有失正甚矣患之起必自此始襄王十九年二十有七年晉文三年齊孝十年卒衛成二年蔡莊十三年鄭文四十年曹共二十年陳穆十五年杞桓四年宋成四年秦穆二十七年楚成三十九年春杞子來朝正傳曰書杞子來朝著違禮也魯秉周禮朝覲㑹同有周公之遺焉春秋書之則其不循禮可見矣左氏曰杞桓公來朝用夷禮故曰子公卑杞杞不共也愚謂由是觀之則其不循周禮可知矣夏六月庚寅齊侯昭卒正傳曰昭齊侯名書齊侯昭卒紀鄰國之大故也餘義見前左氏曰齊孝公卒有齊怨不廢喪紀禮也秋八月乙未葬齊孝公正傳曰書葬齊孝公紀葬禮也國君葬諸侯有㑹葬之禮焉不以怨而廢禮也乙巳公子遂帥師入杞正傳曰書公子遂帥師入杞著私怨之師也杞子來朝於春來朝於秋伐之且入焉何也左氏曰入杞責無禮也愚謂以其無禮而教之教之不改然後誅之可也而即伐焉所謂不教而誅之非恤小之仁也冬楚人陳侯蔡侯鄭伯許男圍宋正傳曰書楚人陳侯蔡侯鄭伯許男圍宋罪諸侯援蠻夷以伐中國也宋中國聖王之後所以建之世世象賢也陳蔡鄭許以中國之諸侯乃協楚而圍之中國之禮義於是乎滅矣冠履之分於是乎紊矣罪孰大焉左氏曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乗其不能以入矣苟入而賀何後之有冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎蒐于被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也乃使郤穀將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犨為右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懐生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大蒐以示之禮作執秩以正其官民聴不惑而後用之出穀戍釋宋圍一戰而霸文之教也愚謂晉文公於是乎得攘夷尊周之道矣為中國之諸侯者得無愧乎謂楚稱人為貶者非是榖梁謂人楚子所以人諸侯然則何以不并人諸侯乎十有二月甲戌公會諸侯盟于宋正傳曰諸侯者即前圍宋之諸侯也書公㑹諸侯盟于宋譏失盟也宋先代聖王之後非有大惡猶將百世保之故齊桓之霸必以首焉圍宋之舉魯未與也乃不勝其區區感楚乞師之恩就圍之宋地而會盟焉雖舎曰欲之其可得乎雖然楚之為中國患固魯之乞師圍齊啓之矣胡氏曰公與楚結好故徃會盟其地以宋者宋方見圍無嫌於與盟而公之罪亦著矣襄王二十年二十有八年晋文四年齊昭公潘元年衞成三年蔡莊十四年鄭文四十一年曹共二十一年陳穆十六年卒杞桓五年宋成五年秦穆二十八年楚成四十年春晉侯侵曹晉侯伐衞正傳曰書晉侯侵曹晉侯伐衞著貪憤譎謀之兵也晉文之伐曹衞有二意焉方其為公子而出亡也曹衛皆不禮焉至是侵伐之者為復怨此其一也是之謂貪憤之兵方宋告楚之急于晉也狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之故伐曹衛以致楚師此其二也是之謂譎謀之兵二者皆非春秋所與也左氏曰晉侯將伐曹假道於衛衛人弗許還自南河濟侵曹伐衛正月戊申取五鹿二月晉郤穀卒原軫將中軍胥臣佐下軍上徳也晉侯齊侯盟于斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛愚謂此其實傳也胡氏曰春秋之時用兵者非懐私復怨則利人土地耳詩云百爾君子不知徳行不忮不求何用不臧不忮則能懲忿不求則能窒慾然後貪憤之兵亡矣公子買戍衛不卒戍刺之正傳曰戍衛者買為楚以兵守衛也不卒戍者魯託言買不卒戍故殺之實以説晉也刺之者公羊謂殺之也書公子買戍衛不卒戍刺之譏魯君之失刑也左氏曰公子買戍衛楚人救衛不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也愚謂此其實傳也魯史并告楚不卒戍之言而書之可見春秋皆史之文非聖人之筆矣既使買戍衛以説楚又殺買以説晉非但見魯君之失刑其無道亦已甚矣何以立國乎胡氏曰周官有三刺一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民刺未有書其故者而以不卒戍刺之則知買為無罪矣孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙今乃殺無罪之士將以苟説於強國於是乎不君矣故特書其故以貶之也楚人救衛正傳曰書楚人救衛著善之歸夷也夫救衛善事善事歸夷則中國病矣故善楚所以病晉也文公之霸業於是乎疵矣衛服罪請盟而文公不許以私怨勝公義以人欲滅天理惜夫三月丙午晉侯入曹執曹伯畀宋人正傳曰晉宋或稱侯或稱人無他義穀梁泥之非也畀與也與宋使聴之也書晉侯入曹執曹伯畀宋人罪晉侯之憤兵也晉侯怨曹之不禮又為魯乞師遂伐曹以致楚乃侵而入其境又執其君以與宋其肆暴以逞私憤亦已甚矣左氏曰晉侯圍曹門焉多死曹人尸諸城上晉侯患之聴輿人之謀曰稱舍於墓師遷焉曹人兇懼為其所得者棺而出之因其兇也而攻之三月入曹數之以其不用僖負羈而乗軒者三百人也且曰令無入僖負羈之宫而免其族報施也魏犨顛頡怒曰勞之不圖報於何有爇僖負羈氏魏犨傷於胷公欲殺之而愛其才使問且視之病將殺之魏犨束胷見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡以徇于師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯分曹衛之田以畀宋人胡氏曰古者覿文匿武脩其訓典序成而不至於是乎有攻伐之兵故孟子謂萬章曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎曹伯嬴者未狎晉政莫知所承晉文不脩詞令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主中夏舉動不中於禮亦多矣徒亂人上下之分無君臣之禮其功雖多道不足尚也故曰五伯三王之罪人仲尼之徒無道桓文之事者夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績正傳曰及者猶言與也胡氏以為誅晉之意非也書晉侯齊師宋師秦師及楚人戰于城濮楚師敗績善晉合諸侯以攘夷也楚人圍宋是以强陵弱矣晉為盟主合中國諸侯以伐之得崇夏攘夷之義其餘在所略矣左氏曰楚子入居于申使申叔去穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春於衛且私許復曹衛曹衛告絶于楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之恵不及此退三舍辟之所以報也背恵食言以亢其讐我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憗次于城濮楚師背酅而舍晉侯患之聴輿人之頌曰原田每每舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚恵何欒貞子曰漢陽諸姬楚實盡之思小恵而忘大恥不如戰也晉侯夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬭勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之恵未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫為二三子戒爾車乗敬爾君事詰朝將見晉車七百乗韅靷鞅靽晉侯登有莘之虚以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曵柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀及癸酉而還愚謂此其實傳也其事雖多出於譎而其攘夷尊華之大義足以蔽其愆矣胡氏曰荆楚恃强憑陵諸夏滅黄而霸主不能恤敗徐于婁林而諸大夫不能救執中國盟主而在㑹者不敢與之争今又戍穀逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則民其被髮左袵矣宜有美辭稱揚其績而春秋所書如此其畧何也仁人明其道不計其功正其義不謀其利文公一戰勝楚遂主夏盟以功利言則高矣語道義則三王之罪人也知此説則曽西不為管仲而仲尼孟子雖老于行而不悔其有以夫愚謂春秋直書其事而美惡自見不待詞之稱揚也仲尼之徒雖無道桓文之事者自王道視之則然也然而又取管仲之功以為如其仁微管仲吾其被髮左袵矣則聖人廣大之心胷可見矣今楚圍宋晉侯㑹諸侯以伐楚而救宋正得攘夷崇夏之義而乃以譎詐罪之是猶奪禦冦之兵以資冦之虐也以其小者失其大者奚可哉楚殺其大夫得臣正傳曰書楚殺其大夫得臣譏楚之棄其將也左氏曰楚子玉既敗楚子使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連穀而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣胡氏曰按左氏晉師既克曹衛楚子入居于申使申叔去穀使子玉去宋曰晉侯在外十九年而果得晉國險阻艱難備嘗之矣民之情偽備知之矣天假之年而除其害其可廢乎子玉使伯棼請戰楚子怒少與之師惟西廣東宫與若敖之六卒實從之而不止也子玉從晉師文公退三舍辟之楚衆欲止子玉不可戰于城濮楚師敗績夫得臣信有罪矣而楚子知其不可敵不能使之勿敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也此説是矣又謂稱國以殺而不去其官則義例之鑿矣衛侯出奔楚正傳曰書衛侯出奔楚著棄親從敵之非也而晉侯棄義並見矣衛侯之奔楚晉逼之也故書奔楚苟求其奔楚之故則晉侯驅同姓以歸敵國其棄大義可見矣胡氏曰衛侯失守社稷背晉即楚於文公何罪乎衛之禍文公為之也初齊晉盟于斂盂衛侯請盟晉人不許是塞其向善之心雖欲自新改轍而其道無由也高帝一封雍齒而功臣不競世祖燒棄文書而反側悉安使文公釋怨許衛結盟南向諸侯棄楚而歸晉矣忿不思難惟怨是圖必使衛侯竄身無所奔于荆蠻歸于京師兄弟相殘君臣交訟誰之咎也夫心不外者乃能統大衆智不鑿者乃能處大事文公欲主夏盟取威定霸而舉動煩擾若不勝任者惟鑿智自私而心不廣也春秋於衛侯失國出奔不以其罪名之而重文公之咎盖端本議刑責備賢者之意也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土正傳曰衛子者衛叔武也衛侯出奔楚故使其弟叔武往㑹稱子者將立以為君也書公㑹晉侯與諸侯盟于踐土著晉侯尊王之義也主盟者晉侯而云公㑹者内史之詞也據左傳甲午至于衡雍作王宫于踐土鄉役之三月則是晉侯作王宫以俟天子巡狩而與諸侯先為此㑹盟以尊周室此時王未㑹也盖諸侯之㑹盟為王也而公穀諸儒謂王亦㑹盟有何義乎盖諸侯㑹盟此一事也王以巡狩而出居于王宫以臨諸侯享醴命晉侯為伯此又一事也復兩言公朝于王所者即此也但經有諸侯㑹盟而無天王同㑹又不見䇿命之文則公穀左氏所載䇿命之事及晉侯召王致王㑹王之事則知諸傳皆未可信也所謂以經證傳之真偽也陳侯如㑹正傳曰書陳侯如㑹善歸義也附㑹于踐土也公羊曰其言如㑹何後㑹也穀梁曰如㑹外乎㑹也於㑹受命也公朝于王所正傳曰王所者即作王宫于踐土者也書公朝于王所著尊王之義也臣之於君惟其所在而朝覲焉所以尊尊也公穀乃有非其所之論又有不與致天子之論皆非也胡氏又以為朝于廟禮也于外非禮也則古之天子巡狩諸侯各朝于方岳者皆非歟又曰古者天子巡狩于四方有常時諸侯朝于方岳有常所其宫室道途可以預脩故民不勞其共給調度可以預備故國不費今天王下勞晉侯公朝于王所則非其時與地矣愚謂如胡氏之説責王巡狩之非時可也責魯以不必朝王所可乎必執時與地而不朝魯受誅矣又曰然則天子在是其可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也愚謂此胡氏之説小變矣六月衛侯鄭自楚復歸于衛正傳曰鄭衛侯名書衛侯鄭自楚復歸于衛罪衛侯也夫國有人民社稷宗廟命于天子傳之先君守死而弗去者也衛侯無道不能自立舍其社稷宗廟以奔楚使其弟叔武受盟踐土立以為君矣又自楚以歸衛兄弟相戮君臣相訟亂國敗倫鄭之罪大矣何以容於天地之間乎衛元咺出奔晉正傳曰書衛元咺出奔晉著非義也君臣之義無所逃於天地之間元咺既奉衛侯鄭之命以立叔武叔武立以治反衛侯則是君臣之義未絶也聞鄭之將歸勸叔武遜位以迎之則君臣之義全矣不知出此及鄭既入殺叔武乃奔晉以訟其君可謂義乎左氏曰或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寗武子與衛人盟于宛濮曰天禍衛國君臣不協以及此憂也今天誘其𠂻使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天𠂻自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不貳衛侯先期入寗子先長牂守門以為使也與之乗而入公子歂犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉愚謂考傳以觀經則直書奔晉而義自見矣胡氏之説又謂稱名以罪鄭及稱復不稱復與易詞之説皆義例之鑿也陳侯欵卒正傳曰欵陳侯名書卒義見前秋杞伯姬來正傳曰伯姬杜氏以為莊公女歸寧曰來書杞伯姬來著歸寧之非禮也禮女子嫁父母在嵗一歸寧猶慮不得伯姬莊公之女而歸寧非禮矣吴氏曰杞桓公伯姬之次子繼其兄成公而立即來朝魯為魯所卑又使卿帥師入其國魯之待杞可謂無恩矣故伯姬又來謝過求平也公子遂如齊正傳曰書公子遂如齊紀平齊也吴氏曰魯以楚師伐齊取穀幸而孝公遄卒未及報怨晉文既伯齊魯均為受盟之國齊不敢背盟以報魯故魯因使遂聘講好釋怨也是矣冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温正傳曰温本畿内地為狄所滅者書公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温左氏曰討不服也愚以文觀之此書㑹在天王狩于河陽之上則知天王將出狩諸侯會以朝之所以尊王也且議討衛許所以服有罪也穀梁曰諱㑹天王非也夫温㑹將以朝王討罪而天王亦㑹有何義乎若以此㑹為諱王㑹則下不當又有天王狩河陽之文矣盖諸侯㑹與天王狩各為一事且㑹温無㑹天王之文以經證傳之偽不足信矣但因穀梁兩倡㑹天王之説公羊遂為致天子之説而胡氏因之誤矣何以言之以兩書公朝于王所可見諸侯皆朝天王而非天王下與諸侯之㑹矣欲尊周而全晉者當以此論為正而祛公穀之惑可也天王狩于河陽正傳曰河陽即温也穀梁曰水北為陽山南為陽温在河北也狩巡狩也天子巡狩于河陽而臨諸侯之朝也書天王狩于河陽譏非禮也禮五載天子一巡狩羣后四朝天子巡狩之年至于方岳其方諸侯來朝今狩非方岳天下諸侯畢㑹而朝王所非周禮矣故春秋書以譏之左氏曰是㑹也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也愚謂此非孔子之言也若以為非其地則是也公羊以為不與再致天子穀梁以為為天王諱左氏召王與公穀之説皆非也天子自往巡狩而諸侯適㑹朝于王所也盖當時王以巡狩之名而往故史亦以狩書非仲尼特書以尊周全晉也胡氏引啖助謂原晉自嫌之心嘉其尊王之意則請王之狩忠亦至矣又曰既為王諱之又為晉解之豈聖人大公至正之心哉壬申公朝于王所正傳曰其稱日者公羊以為録于内是也書公朝于王所著尊王之義也諸侯㑹於是天王來狩故朝之穀梁以為朝于廟禮也於外非禮也愚謂非也夫禮者敬而已矣惟其所在而致敬焉禮也故天子巡狩諸侯各朝于方岳何莫非禮乎言公朝則非獨公朝也故穀梁曰獨公朝歟諸侯盡朝也觀諸侯盡朝則諸侯尊王之義同也此晉之所以為伯也故穀梁謂曰公朝而尊天子㑹于温言小諸侯若以為召王致天子則不臣甚矣何以服天下何足以為伯乎晉人執衛侯歸之于京師正傳曰書晉人執衛侯歸之于京師言執之非義也罪晉侯聴君臣之訟也衛侯殺叔武固有罪矣然君臣無訟不思投鼠忌器之義乎天子之禁無專殺大夫衛侯專殺叔武聲大義討之可也而使與元咺辨曲直衛侯不勝遂刑其大夫乃執其君以歸之于京師使若斷在京師然則文公之譎亦可見矣公羊曰衛侯之罪殺叔武也叔武讓國文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故於是已立然後為踐土之盟治反衛侯衛侯得反曰叔武簒我元咺爭之曰叔武無罪終殺叔武元咺走而出左氏曰衛侯與元咺訟寗武子為輔鍼荘子為坐士榮為大士衛侯不勝殺士榮刖鍼莊子謂寗俞忠而免之執衛侯歸之于京師寘諸深室寗子職納橐饘焉愚謂無上之風漸不可長討衛侯可也聴元咺之訟不可也元咺可以訟衛侯則文公可以訟天王矣奚可哉國語謂晉侯執衛成公歸之于周請殺之王曰不可夫君臣無獄今元咺雖直不可聴也君臣皆獄父子將獄是無上下也而叔父聴之一逆矣又為臣殺其君而安庸刑布刑而不庸再逆矣一合諸侯而有再逆故余懼其無後夫刑必依於人倫以為之斷天下之大義也衛元咺自晉復歸于衛正傳曰自晉復歸者猶言從晉復歸也公穀胡氏有力有奉之説求之太深矣書衛元咺復歸于衛著其歸之非道也左氏曰元咺歸于衛立公子瑕愚謂衛侯不知其弟叔武守國以俟已之歸而殺之衛侯有罪矣元咺為臣而訴其君於晉元咺之罪一矣與其君辨曲直使之被執歸之于京師罪二矣又歸衛而立公子瑕不聴命於天王而擅廢立罪三矣故春秋書其歸則其歸之非道見矣諸侯遂圍許正傳曰諸侯即上㑹朝之諸侯也穀梁曰遂繼事也書諸侯遂圍許討許不臣之罪也胡氏曰諸侯此再㑹天子再至皆朝于王所而許獨不㑹以其不臣也故諸侯圍許按古者巡狩諸侯各朝于方岳今法天子行幸三百里内亦皆問起居許距河陽踐土近矣而可以不㑹乎愚謂觀胡氏巡狩朝岳之説則上踐土之盟温之㑹河陽之狩王所之朝為上臨下之禮下尊君之義居然可見胡氏已明之而又何必惑於左氏公穀之論以傷尊周全晉之義矣乎曹伯襄復歸于曹遂㑹諸侯圍許正傳曰穀梁云天子免之其曰復通王命也遂繼事也伯襄曹子也書曹伯襄復歸于曹遂㑹諸侯圍許著晉文之補過也晉文滅曹為滅同姓其罪過大矣春秋書其補過樂與人為善之義見矣左氏曰丁丑諸侯圍許晉侯有疾曹伯之竪侯獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公說復曹伯遂㑹諸侯圍許愚謂晉文雖因疾而感於筮史之言然人之将死其言也善至是其貪憤之心息而悔過之心生矣春秋正傳卷十五
