body:
  text: 春秋正傳卷十一明湛若水撰閔公名啓方史記名開年九嵗即位在位二年惠王十六年元年齊桓二十五年晉獻十六年衛懿八年蔡穆十四年鄭文十二年曹昭公班元年陳宣三十二年杞惠十二年宋桓二十一年秦成三年楚成十一年春王正月正傳曰無事亦書義見于前此宜書閔公即位而不書者左氏曰亂故也胡氏謂不書即位内無所承上不請命信如此說則亦不當即位也不當即位則亦不當有元年矣元年者即位之始年也書元年而不書即位或史以亂故而失之耳未可知也疑以傳疑史之闕文聖人之意也齊人救邢正傳曰書齊人救邢穀梁曰善救邢也左氏曰狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親䁥不可棄也宴安酖毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢此其實傳也愚謂邢者中國也狄者强敵也詩云戎狄是膺荆舒是懲狄人伐邢齊桓救之攘夷狄以尊中國桓之霸業於此乎見矣此春秋所以書而善之然則以稱人為將卑師少之說豈其然乎夏六月辛酉𦵏我君莊公正傳曰書𦵏我君莊公紀國之大事也而其𦵏之後時自可見矣莊公之薨至是十一月矣而始克𦵏左氏曰夏六月𦵏莊公亂故是以緩汪氏曰國亂子弑嗣君幼弱危不得𦵏是也秋八月公及齊侯盟于落姑正傳曰落姑齊地公徃就齊地而盟也書公及齊侯盟于落姑紀㑹盟之善也左氏曰請復季友也齊人許之使召諸陳公次于郎以待之愚謂季友魯之忠臣以子般見弑而奔于陳魯人賢之故與齊盟而復之春秋書之以與其善也季子來歸正傳曰季子即季友也季子來歸齊魯賢而召之也書季子來歸左氏曰嘉之也公羊曰其稱季子何賢也其言來歸何喜之也程子曰書曰季子而不名異其文以嘉之也胡氏曰自外至者為歸是嘗出奔矣莊公薨子般弑慶父主兵勢傾公室季子力不能支避難而出奔魯國方危内賊未討國人思得季子以安社稷而公為落姑之盟以請於齊則是賢也又曰其不稱公子見季友自以賢徳為國人所與不緣宗親之故也其季子不書奔者或為亂或在黨氏逃難以圖全史逸書之耳以為沒其恥以為諱其賢者皆非也冬齊仲孫來正傳曰齊仲孫名湫齊大夫也公穀皆以為慶父者非也書冬齊仲孫來者紀齊侯省難之義也左氏曰齊仲孫湫來省難仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜貳覆昏亂霸王之器也愚謂此實傳也然而省難恤鄰之義善矣桓公因是乗魯難而有窺取之心仲孫答問而有未可動之說是猶欲紾兄之臂者謂之姑徐徐云爾烏得為善故曰五霸假之也仲尼之徒無道桓文之事者惠王十七年二年齊桓二十六年晉獻十七年衛懿九年蔡穆十五年鄭文十三年曹昭二年陳宣三十三年杞惠十三年宋桓二十二年秦成四年楚成十二年春王正月齊人遷陽正傳曰陽國名書齊人遷陽著陵弱之罪也啖氏曰移其國於中國而為附庸盖桓公之強力施於可取者如此非有與滅繼絶之心也夏五月乙酉吉禘于莊公正傳曰書夏五月乙酉吉禘于莊公著祭禮之非也胡氏謂程子曰天子曰禘諸侯曰祫其禮皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食於前此之謂禘諸侯無所出之帝則止於太祖之廟合羣廟之主以食此之謂祫天子禘諸侯祫大夫享庶人薦上下之殺也魯諸侯爾何以有禘成王追念周公有大勲勞於天下賜魯公以天子禮樂使用諸太廟以上祀周公魯於是乎有禘祭春秋之中所以言禘不言祫也然則可乎孔子曰魯之郊禘非禮也周公其衰矣禘曰吉者喪未三年行之太早也于莊公者方祀于寢非宫廟也一舉而三失禮焉春秋之所謹也四時之祭有禘之名盖禮文交錯之失秋八月辛丑公薨正傳曰書八月辛丑公薨據傳而觀則弑逆之罪自不可掩矣不在乎地不地言弑不言弑也左氏曰初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公于武闈愚謂據此則慶父弑君之罪不容誅矣或以為為親者諱故不言弑非也夫以弑君之賊人人得而誅之臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦君父之讎不共戴天豈復有為諱之理乎夫弑而言薨則諸儒春秋書法之義例可據信乎九月夫人姜氏孫于邾正傳曰孫猶避也姜氏哀姜莊公之夫人閔公之嫡母也書九月夫人孫于邾紀人倫之大變也哀姜以母而與聞乎弑天理人心之所不容遂不自安孫于邾可謂人倫之大變矣胡氏曰莊公忘親釋怨無志於復讎春秋深加貶絶一書再書又再書屢書而不諱者以謂三綱人道所由立也忘父子之恩絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弑械成於前慶父之無君動於後圉人犖卜齮之刃交發于黨氏武闈之間哀姜以國君母與聞乎故而不忌也當是時魯君再弑幾至亡國其應不亦憯乎春秋以復讎為重而書法如此所謂治之於未亂保之於未危不可不察愚謂此言是也其謂夫人稱孫與聞乎故不去姓氏降文姜也則皆泥於文義之病矣公子慶父出奔莒正傳曰慶父即共仲書公子慶父出奔莒紀逸賊也左氏曰成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及宻使公子魚請不許哭而徃共仲曰奚斯之聲也乃縊閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之愚謂此實傳也穀梁以出為絶之者非也弑君之賊又何足絶乎冬齊高子來盟正傳曰高子齊大夫盟者穀梁曰盟立僖公也書齊高子來盟善髙子之恤鄰難也程子曰高子來省難然後盟穀梁曰其曰來喜之也公羊曰何以不名喜之也何喜爾正我也其正我柰何莊公死子般弑閔公弑比三君死曠年無君設以齊取魯曽不興師徒以言而已矣桓公使高子將南陽之甲立僖公而城魯或曰自鹿門至于争門者是也或曰自争門至于吏門者是也魯人至今以為美談曰猶望高子也愚謂此實傳也故春秋書之善髙子之恤魯也十有二月狄入衛正傳曰書狄入衛悲中國之莫能救也左氏曰冬十一月狄人伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鹤鹤實有祿位余焉能戰公與石祁子玦與寗莊子矢使守曰以此賛國擇利而為之與夫人繡衣曰聴於二子渠孔御戎子伯為右黄夷前驅孔嬰齊殿戰于熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄人囚史華龍滑與禮孔以逐衛人二人曰我太史也實掌其祭不先國不可得也乃先之至則告守曰不可待也夜與國人出狄入衛遂從之又敗諸河初惠公之即位也少齊人使昭伯烝於宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹許穆夫人賦載馳齊侯使公子無虧帥車三百乗甲士三千人以戍曹歸公乗馬祭服五稱牛羊豚雞犬皆三百與門材歸夫人魚軒重錦三十兩愚謂此實傳也鄭棄其師正傳曰書鄭棄其師譏文公失馭衆之道也文公惡高克棄高克可也而使之帥師是棄高克所以棄其師也左氏曰鄭人惡高克使帥師次于河上乆而弗召師潰而歸高克奔陳鄭人為之賦清人公羊曰鄭伯惡高克使之將逐而不納棄師之道也胡氏曰按鄭詩清人刺文公也高克好利而不顧其君文公惡之而不能逺使克將兵禦狄於境陳其師旅翺翔河上乆而不召衆散而歸高克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩觀此則鄭棄其師可知矣或曰高克進不以禮曷不書其出奔以貶克為人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵殺生予奪惟我所制爾使克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎愚謂此論是矣然又謂棄師者鄭伯乃以國稱以歸於二三執政不能進謀於君黜逐小人而國事至此則又泥於一字之文而不知舉鄭者魯史紀他國之詞耳不在乎一字生義矣春秋正傳卷十一
