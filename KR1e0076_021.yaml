body:
  text: 春秋正傳卷二十一明湛若水撰宣公定王十年十有二年晉景三年齊頃二年衛穆三年蔡文十五年鄭襄八年曹文二十一年陳成二年杞桓四十年宋文十四年秦桓八年楚莊十七年春葬陳靈公正傳曰書葬陳靈公紀鄰國之大事也諸侯五月而葬同盟至蓋諸侯有相恤之義也或又謂楚討弒賊陳之臣子怨釋故得書葬則非也楚子圍鄭正傳曰書楚子圍鄭紀以力服人之師也而荆夷之陵甸侯與王政之不行霸圖之不振具可見矣孔子曰微管仲吾其被髮左袵矣此聖人之心也胡氏謂取楚之能討亂賊者非也按左氏曰春楚子圍鄭旬有七日鄭人卜行成不吉卜臨于太宫且巷出車吉國人大臨守陴者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質此實傳也由是觀之楚子意在服鄭以橫行中國而不在於討篡弒之罪也何也傳之所載略無聲罪之詞可見矣夫以荆楚之慿陵中國入王畿之鄭天王不能討方伯諸侯不能奉天討以行征王政不行霸圖不振矣故春秋憾之夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績正傳曰書晉荀林父帥師及楚子戰于邲並著不義之兵也夫楚之伐鄭非討罪之師也晉之救鄭非恤鄰之舉也二國要皆爭服鄭而已也孟子曰春秋無義戰非此之謂乎當晉師之出苟為鄭也而鄭已與楚平則亦可以已矣而又與楚戰其至於敗績非自取乎春秋直書之而罪自見矣胡氏又泥及之一字而言釋楚不貶使晉主之又許楚能討賊而獨責林父冒進棄師之罪則其義有未盡也秋七月正傳曰無事亦書時月義見于前冬十有二月戊寅楚子滅蕭正傳曰蕭宋附庸小國書楚子滅蕭則貪暴慿陵之罪可見矣左氏曰冬楚子滅蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣楚申縣尹曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊遂傅于蕭還無社蕭大夫與司馬卯言號申叔展卯展皆楚大夫叔展曰有麥麴乎可禦濕也曰無有山鞠窮乎示可禦濕欲無社逃泥水中曰無河魚腹疾奈何曰目於背井而拯之若為茅絰哭井則已明日蕭潰申叔即叔展視其井則茅絰存焉號而出之案胡氏曰假於討賊而滅陳春秋以討賊之義重也末減而書入惡其二已而入鄭春秋以退師之情恕也末減而書圍與人為善之德宏矣至是肆其強暴滅無罪之國其志已盈雖欲赦之不得也故傳稱蕭潰經以滅書斷其罪也孟子曰以力假人者伯伯必有大國楚莊蓋以力假仁不能久假而遽歸者也建萬國親諸侯者先王之政興滅國繼絶世者仲尼之法今乃滅人社稷而絶其祀亦不仁甚矣蕭既滅亡必無赴者何以得書于魯史楚莊縣陳入鄭大敗晉師于邲莫與校者不知以禮制心至於驕溢克伐怨欲皆得行焉遂以滅蕭告赴諸侯矜其威力以恐中國耳孟子定其功罪以五伯為三王之罪人春秋史外傳心之要典推此類求之斯得矣愚謂直書入書圍書滅蕭則楚罪之輕重自見矣聖人因史而書代天以言垂訓萬世烏得以意而加減之哉況厯稽諸傳未有奉天王之命聲罪致討之詞大抵欲以力服人耳而謂以是末減其罪可乎晉人宋人衛人曹人同盟于清丘正傳曰書晉宋衛曹同盟于清丘非其盟也盟非聖人之所貴也晉會諸侯為此盟以懼楚也及是時明其政刑楚烏得而侮之舍是而汲汲於盟誓盟誓未幾而渝盟之事至矣此春秋所以非之左氏曰晉原縠宋華椒衛孔達曹人同盟于清丘曰恤病討二於是卿不書不實其言也愚謂此實傳也傳云不實其言則聖人非之之情可見矣胡氏曰書同盟志同欲也或以惡其反覆而書同盟非也春秋不貴盟誓自隱公始年書儀父盟蔑宋人盟宿已不實言矣奚待清丘然後惡反覆乎清丘載書恤病討二口血未乾敗其盟好所謂不待貶而惡自見者也又奚必人諸國之卿然後知反覆之可罪乎楚既入陳圍鄭大敗晉師伐蕭滅之慿陵中國甚矣為諸侯計者宜信任仁賢修明政事自強於為善則可以保其國耳曽不是圖而刑牲歃血要質鬼神蘄以禦楚謀之不臧孰大於是故國卿貶而稱人譏失職也愚謂胡氏前云奚必人諸國之卿而後知反覆之可罪是不在乎人之矣後又云國卿貶而稱人譏失職則前後自相矛盾矣宋師伐陳衛人救陳正傳曰宋師伐陳衛人救陳則宋衛之是非可考見矣蓋宋之伐陳責盟也衛之救陳叛盟也其罪惟均矣左氏曰宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之愚謂據此則宋責陳之不與盟而向楚衛乃叛盟而救陳合是而觀則盟之不足恃可知矣二國乃輕於動無名之兵而求無益之事其罪不亦均乎胡氏不責衛之背盟而取其恤陳之無罪而受兵故書救以責宋誤矣定王十一年十有三年晉景四年齊頃三年衛穆四年蔡文十六年鄭襄九年曹文二十二年陳成三年杞桓四十一年宋文十五年秦桓九年楚莊十八年春齊師伐莒正傳曰書齊師伐莒著貪忿之兵也左氏曰莒恃晉而不事齊故也愚謂莒小弱之國也未嘗有罪齊特以其事晉而不事已遂興大衆以伐之是謂以強陵弱以私報怨非貪忿之兵乎夏楚子伐宋正傳曰書楚子伐宋紀荆蠻之慿陵也左氏曰以其救蕭也君子曰清邱之盟惟宋可以免焉夫楚以兵力陵諸侯而滅小弱之蕭將以威中國而動王室也宋之救蕭恤小攘夷未為不當楚以其救蕭而伐之真蠻夷猾夏矣胡氏乃謂楚人滅蕭將以脅宋諸侯懼而同盟而責宋人不務恤民固本使民效死親上以待敵而急於伐陳攻楚為非策也則緩矣又謂楚人有詞於伐而得書爵則誤矣秋螽正傳曰螽蟲之害禾者也冬晉殺其大夫先縠正傳曰書晉殺其大夫先縠罪專殺也左氏曰秋赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪于先縠而殺之盡滅其族君子曰惡之來也己則取之其先縠之謂乎愚謂左氏此言徒知喪師之罪當殺為先縠之自取而不知葵邱之會天子之禁無專殺大夫之為得罪也夫大夫皆命於天子也如其有罪宜歸於司冦故曰惟天吏可以殺之也胡氏乃謂晉人治先縠之罪殺之義也而稱國以殺不去其官者敗師之由君之過罪纍上也則鑿矣定王十二年十有四年晉景五年齊頃四年衛穆五年蔡文十七年鄭襄十年曹文二十三年卒陳成四年杞桓四十二年宋文十六年秦桓十年楚莊十九年春衛殺其大夫孔達正傳曰書衛殺其大夫孔達則其罪之當否可考矣左氏曰清邱之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰苟利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之春孔達縊而死衛人以説于晉而免遂告于諸侯曰寡君有不令之臣達構我敝邑于大國既伏其罪矣敢告衛人以為成勞平國之功復室其子使復其位愚謂孔達背盟棄信以致晉師之討社稷幾危矣兵法所當誅也然大夫命於天子今不由於司冦而死焉故書如此夏五月壬申曹伯壽卒正傳曰書曹伯壽卒紀鄰國之大故也來赴故書之晉侯伐鄭正傳曰書晉侯伐鄭著報復之兵也左氏曰夏晉侯伐鄭為邲故也告于諸侯搜焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張穆公孫代子良于楚子良質楚鄭伯如楚謀晉故也鄭以子良為有禮故召之胡氏曰按左氏傳為邲故也比事以觀知其為報怨復讎之兵詞無所貶者直書其事而義自見矣愚謂胡氏之言是也使皆以是而觀春秋則聖人之取義得之矣不亦可乎秋九月楚子圍宋正傳曰書楚子圍宋則蠻荆肆暴之罪與宋人自取之故皆可見矣夫蠻夷犯華天下之大亂也故聖人慎其所以御之之道使其無間而入可也今按左氏曰楚子使申舟聘於齊曰無假道于宋亦使公子馮聘於晉不假道于鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投𬒮而起屨及於窒皇劒及于寢門之外車及于蒲胥之市秋九月楚子圍宋愚謂由是觀之楚之圍宋由宋殺其使者招之也輕舉以致其兵則罪不專在楚矣春秋書此欲人考傳之迹而得其由以罪宋也胡氏曰宋人要結盟誓欲以禦楚已非持國之道輕舉大衆勦民妄動又非恤患之兵特書救陳以著其罪明見伐之由也國必自伐然後人伐之凡事其作始也簡其將畢也必巨易於訟卦曰君子以作事謀始始而不謀必至於訟訟而不竟必至於師若宋是矣始謀不臧至於見伐見圍幾亡其國則自取之也春秋端本故責宋為深若蠻夷圍中國則亦明矣葬曹文公正傳曰書葬曹文公紀與國之大事也諸侯五月而葬同盟至禮也冬公孫歸父會齊侯于榖正傳曰公孫歸父會齊侯于榖何以書明是會之非禮也曷為非禮自為私會一也以臣抗君二也胡氏曰夫禮别嫌明微制治於未亂自天子出者也列國之君非王事而自相會聚是禮自諸侯出矣以國君而降班失列下與外臣會以外臣而抗尊出位上與諸侯會是禮自大夫出矣君若贅旒陪臣執命豈一朝一夕之故其所由來漸矣故易於坤之初六曰馴致其道至堅氷也易言其理春秋見諸行事若合符節可謂深切著明矣定王十三年十有五年晉景六年齊頃五年衛穆六年蔡文十八年鄭襄十一年曹宣公盧元年陳成五年杞桓四十三年宋文十七年秦桓十一年楚莊二十年春公孫歸父會楚子于宋正傳曰書公孫歸父會楚子于宋著其會之非也夫楚方圍宋以強陵弱諸侯宜糾合以控禦之而不能然又從而往會之可乎胡氏曰楚子不假道於宋以啓釁端而圍之陵蔑諸侯甚矣諸侯縱不能畏簡書攘夷狄存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乘之國謀其不免至於薦賄不亦鄙乎若此類聖人不徒筆之於經也比事以觀則知晉楚吳越盛衰之由春秋經世之略矣夏五月宋人及楚人平正傳曰書宋人及楚人平善其平也春秋無義戰故為善戰者服上刑宋楚之平罷兵息民固聖人之所與也左氏曰宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之夏五月楚師將去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞榖梁曰平者成也善其量力而反善也人者衆辭也平稱衆上下欲之也外平不道以吾人之存焉道之也愚謂此言是也胡氏乃以稱人為貶二子而引善則稱君過則稱己乃責二子以實情私告以成平國之功攘以為己善則非也夫二子既受命於君專梱外之制則二子所為之善皆君之善也又既歸而以實告君不可謂欺詐矣而以為貶豈其然乎六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸正傳曰杜氏謂潞氏赤狄之别種子爵是也書晉師滅赤狄潞氏以潞子嬰兒歸則其義利是非之辨自見矣左氏曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而若之何待之晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之愚謂由是觀之則數酆舒之罪而伐之義也因而滅其國絶其宗社虜其君主非義也公羊謂潞君以為善而稱子胡氏謂滅而舉號及氏減見滅者之罪而甚滅者之不仁則皆臆説也又曰夫伐國之要討其罪人斯止矣按左氏潞子夫人晉景公之姊也酆舒為政而殺之又傷潞子之目則酆舒者罪之在也為晉計者執酆舒轘諸市立黎侯安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土滅潞氏以其君歸何義乎此皆是也秦人伐晉正傳曰書秦人伐晉著暴人之兵也左氏曰秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以略狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也髙氏曰秦師伐晉晉不報秦今十四年矣復來伐之者乘晉略狄土而伐其虛也由是觀之則乘人之虛而困人是謂暴兵矣其師取敗而杜回見獲也固宜王札子殺召伯毛伯正傳曰王札子者公羊以為長庶之號也書王札子殺召伯毛伯則其專殺之罪王朝之亂不待書字書子而自見矣左氏曰王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衛卒立召襄榖梁曰王札子者當上之辭也殺召伯毛伯不言其何也兩下相殺也兩下相殺不志乎春秋此其志何也矯王命以殺之非忿怒相殺也故曰以王命殺也以王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也胡氏曰邢侯專殺雍子於朝叔向以殺人不忌為賊請施邢侯君子以為義王札子之罪當服此刑而天王不能施之無政刑矣何以保其國而不替乎秋螽正傳曰書秋螽紀災也胡氏曰人事感於此則物變應於彼宣公為國虛內以事外去實而務華煩於朝會聘問賂遺之末而不知務其本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五牟復螽府庫匱倉廩竭調度不給而言利尅民之事起矣仲孫蔑會齊髙固于無婁正傳曰無婁公羊作牟婁杞邑也書仲孫蔑會齊髙固于無婁則其失禮之非自見矣諸侯非時私會已非禮矣況大夫私會乎胡氏曰禮之始失也諸侯非王事而自相會也無以正之不自天子出矣然後諸侯與大夫會又無以正之然後大夫與大夫會禮亦不自諸侯出矣田氏篡齊六卿分晉三家專魯理固然也不能辨於早雖欲正之其將能乎初稅畝正傳曰初稅畝何以書志虐民之始也左氏曰非禮也榖出不過藉以豐財也公羊曰初者何始也稅畝者何履畝而稅也初稅畝何以書譏何譏爾譏始履畝而稅也何譏乎始履畝而稅古者什一而藉古者曷為什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣胡氏曰孟子曰耕者助而不稅則天下之農皆悅而願耕於其野矣書初稅畝者譏宣公廢助法而用稅也殷制公田為助助者藉也周因其法為徹徹者通也其實皆什一也古者上下相親上之於下則曰駿發爾私終三十里惟恐民食之不給也下之於上則曰雨我公田遂及我私惟恐公田之不善也故助法行而頌聲作矣世衰道微上下交惡民惟私家之利而不竭力以奉公上惟邦賦之入而不惻怛以利下水旱凶災相繼而起公田之入薄矣所以廢助法而稅畝乎初者志變法之始也其後作邱甲用田賦至于二猶不足則皆宣公啓之也故曰作法於涼其弊猶貪作法於貪弊將若何有國家者必欲克守成法而不變其必先務本乎冬蝝生正傳曰書冬蝝生紀蕃災也胡氏曰始生曰蝝既大曰螽秋螽未息冬又生子災重及民也而詳志之如此者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修而又為繁政重賦以感之國之危無日矣飢正傳曰書飢重民食也胡氏曰春秋飢歲多矣書于經者三而宣公獨有其二何也古者三年耕餘一年之畜九年耕餘三年之食雖有凶旱民無菜色是歲雖螽蝝而遽至於飢者宣公為國務華去實虛內事外煩於朝會聘問賂遺之末而不敦其本府庫竭矣倉廩匱矣水旱螽蝝天降飢饉亦無以振業貧乏矣經所以獨兩書飢以示後世為國之不可不敦本也定王十四年十有六年晉景七年齊頃六年衛穆七年蔡文十九年鄭襄十二年曹宣二年陳成六年杞桓四十四年宋文十八年秦桓十二年楚莊二十一年春王正月晉人滅赤狄甲氏及留吁正傳曰甲氏者赤狄之種胡氏以為潞之餘種留吁其殘邑也書滅赤狄甲氏及留吁其罪不待稱人而自見矣聖人之治夷狄治之以不治攘之而已矣滅之則有貪殘之罪矣左氏曰晉士會帥師滅赤狄甲氏及留吁鐸辰留吁之屬三月獻狄俘晉侯請于王戊申以黻冕命士會將中軍且為太傅於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也愚謂觀此則士會可謂貪殘之兵矣而反以為功豈非惑耶胡氏曰伯禽征徐夷東郊既開而止宣王伐玁狁至于太原而止武侯征戎瀘服其渠帥而止必欲盡殄滅之無遺種豈仁人之心王者之事乎愚謂此説是矣至於又謂士會所以貶而稱人則惑也蓋人者他國國史稱之之詞仲尼豈肯擅奪大夫之爵乎夏成周宣榭火正傳曰成周公羊以為東周是也書成周宣榭火紀王室之災變也周來報故書之左氏曰人火之也凡火人火曰火天火曰災胡氏曰成周天子之東都宣榭宣王之廟也按吕大臨考古圖有􅌏敦音對者稱王格于宣榭呼內史策命􅌏是知宣榭者宣王之廟也古者爵有德祿有功必於太廟示不敢專也榭者射堂之制其堂無室以便射事故凡無室者皆謂之榭宣王之廟謂之榭者其廟制如榭也宣榭火何以書以宗廟之重書之也貴戚專殺大臣而天子不討王室不復能中興矣人火之天所以見戒乎秋郯伯姬來歸正傳曰來歸者大歸也左氏所謂出是也書郯伯姬來歸紀人倫之大變也胡氏曰內女出書之策者男女居室人之大倫也婚姻之禮廢則夫婦之道苦淫辟之罪多矣復相棄背喪其配耦氓之詩所以刺衛日以衰薄室家相棄中谷有蓷所以閔周易敘咸恆為下經首春秋內女出夫人歸凡男女之際詳書于策所以正人倫之本也其旨微矣冬大有年正傳曰大有年榖梁以為五榖大熟之稱書大有年幸之也夫以宣公之無道亂倫逆理厚稅虐民螽蝝頻生飢饉荐臻固其所也而乃大有年焉非幸耶故春秋書以幸之胡氏云程氏曰大有年記異也旱乾水溢飢饉荐臻者災也山崩地震彗孛飛流者異也景星甘露醴泉芝草百榖順成者祥也大有年上瑞矣何以為記異乎凡災異慶祥皆人為所感而天以其類應之者也人事順於下則天氣和於上宣公弒立逆理亂倫水旱螽蝝飢饉之變相繼而作史不絶書宜也獨於是冬乃大有年所以為異乎夫有年大有年一耳古史書之則為祥仲尼筆之則為異此言外微旨非聖人莫能修之者也愚謂古史之書仲尼之筆一也聖人觀魯史而有感焉故存之耳定王十五年十有七年晉景八年齊頃七年衛穆八年蔡文二十年卒鄭襄十三年曹宣三年陳成七年杞桓四十五年宋文十九年秦桓十三年楚莊二十二年春王正月庚子許男錫我卒丁未蔡侯申卒正傳曰何以書紀與國之大故也二國來赴故史書之聖人存之以示有弔賻會葬之禮焉夏葬許昭公葬蔡文公正傳曰書葬許昭公葬蔡文公兩志會葬之禮也胡氏曰卒書名赴而得禮記之詳也葬而不月其略在內宣公為國務華而無忠信誠慤之心計利而不知禮義邦交之實哀死送終獨厚於齊而利害不切其身者皆闕如也大則薄其君親次則忽於盟王其又次若秦若衛若滕雖來告訃怠於禮而不會也比事以親義自見矣六月癸卯日有食之正傳曰書日有食之紀天變也聖人示人君克謹天戒之道焉己未公會晉侯衛侯曹伯邾子同盟于斷道正傳曰書公會晉衛曹邾同盟于斷道志同心也左氏曰晉侯使郤克徴會于齊齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃會及斂盂髙固逃歸夏會于斷道討二也程子曰諸國同心欲伐齊故書同盟胡氏曰書同盟者志同欲也大國率之小國畏威而從命非同欲也小國訴之大國勉強而應焉非同欲也若斷道之盟諸侯同日謀欲伐齊釋其憤怒非有不得已而要之者也或以為會同天子之事築宫為壇設方明如方嶽之盟故書同疑其説之誤矣秋公至自會正傳曰書公至自會謹出告返面之義也冬十有一月壬午公弟叔肸卒正傳曰公弟公母弟也叔肸其字書公弟叔肸卒紀賢者之正終也榖梁曰其曰公弟叔肸賢之其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋愚謂弟叔肸者自是書其實謂其弟字叔肸卒耳胡氏又有稱弟得弟道稱字賢也之説則益支矣定王十六年十有八年晉景九年齊頃八年衛穆九年蔡景公固元年鄭襄十四年曹宣四年陳成八年杞桓四十六年宋文二十年秦桓十四年楚莊二十三年卒春晉侯衛世子臧伐齊正傳曰書晉侯衛世子臧伐齊著私憤討二之兵也郤克怨齊是謂憤矣髙固逃歸是謂二矣左氏曰晉侯衛大子臧伐齊至于陽榖齊侯會晉侯盟于繒以公子強為質于晉晉師還蔡朝南郭偃逃歸胡氏曰保國以禮為本者也齊頃公不謹於禮自己致冦所謂國必自伐而後人伐之矣諸侯上卿皆執國命取必於其君以行其克伐怨欲之私故盟于斷道師于陽榖大戰于鞍逞其志而後止春秋詳書于策見伐與伐者之罪皆可以為鑒矣公伐杞止傳曰書公伐杞則陵弱之罪見矣語曰惟仁者為能以大字小故曰小邦懷其德匪德之務小邦不懷則興兵伐之豈仁者之君乎髙氏曰杞自文十六年來朝不復至故伐之已不修德而欲人朝已亦不思之甚矣夏四月正傳曰無事亦書時月義見于前秋七月邾人戕鄫子于鄫正傳曰書邾人戕鄫子于鄫則戕人者與見戕者皆不能無罪矣夫邾子戕人之君則為盜賊之行鄫子見戕於人則其君臣素無保衛之圖皆無道矣胡氏曰戕者殘賊而殺之也于鄫者刺臣子不能救君難也夷貉無城郭宫室百官有司單車使者直造其廬帳虜其酋長者則有之矣中國則重門擊柝廉陛等威侍衛守禦之嚴奚至於坐使其君為邾人殘賊殺之而莫禦乎邾人蓋嘗執鄫子用之則不共戴天之世讎也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子至此極也甲戌楚子旅卒正傳曰楚子旅書卒以其與盟也故卒之榖梁曰夷狄不卒卒少進也胡氏以為楚僣稱王而稱子者仲尼筆之非也夫楚之稱王楚國之人稱之耳其書子者魯史則然也何待仲尼之筆改之乎公孫歸父如晉正傳曰書公孫歸父如晉見其聘之非禮也夫朝聘以時邦交之禮也今歸父聘晉將以除三桓豈朝聘之正乎觀左氏曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之夫以謀去三桓而聘則是聘也豈誠心直道哉胡氏曰宣公因齊得國故刻意事之雖易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國決策討之晉方強盛齊少懦矣於是背齊而事晉其於邦交以利為向背無忠信誠慤之心者也按左氏歸父欲去三桓以張公室與公謀而聘于晉欲以晉人去之夫輕於背與國易於謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道正心以正朝廷禮樂刑政自己出也其庶幾乎必欲倚外援以去之是去疥瘍而得腹心之疾也庸愈哉冬十月壬戌公薨于路寢正傳曰路寢者榖梁以為正寢也書公薨于路寢志正終也夫以正始者以正終正也以不正始者得以正終非正也故桓公弒立則斃于齊正也宣公亦弒立而獲正終非正也春秋書之聖人之情可見矣歸父還自晉至笙遂奔齊正傳曰書歸父還自晉至笙遂奔齊善歸父之畢使罪成公奔之之亟也左氏曰冬公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊書曰歸父還自晉善之也胡氏曰仲尼稱孟莊子之孝其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬必存始終進退之禮而不遽也歸父以君命出使未返而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之詞也至笙遂奔齊者罪成公君臣死君而忘父逐之亟也榖梁子曰捐殯而奔其父之使者是亦奔父也得經意矣君薨家遣方寸宜亦亂而造次顛沛不失禮焉非志於仁者弗能也詞繁而不殺歸父之善自著矣比事以觀則見當國者有無君之心此春秋所以作不可不察也春秋正傳卷二十一
