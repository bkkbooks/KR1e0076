body:
  text: 春秋正傳卷三十五明湛若水撰定公敬王十八年八年晉定十年齊景四十六年衛靈三十三年蔡昭十七年鄭獻十二年曹靖四年卒陳懷四年卒杞僖四年宋景十五年秦哀三十五年楚昭十四年吳闔廬十三年春王正月公侵齊正傳曰書公侵齊志憤怨之兵也以去年齊伐我西鄙故報其怨夫潜師掠境謂之侵魯定公不聲齊之罪而潜師以掠其境焉境之民何罪乎杜氏謂傳言魯無軍政士無鬬志髙氏謂魯政不復在公而三家欲公親行以歸怨於公左氏曰門于陽州士皆坐列曰顔髙之弓六鈞皆取而傳觀之陽州人出顔髙奪人弱弓籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪顔息射人中眉退曰我無勇吾志其目也師退冉猛僞傷足而先其兄㑹乃呼曰猛也殿愚謂此亦可以見魯之無軍政而政不自公矣公至自侵齊正傳曰公至自侵齊志反面之禮也始終乎非義之行也二月公侵齊正傳曰書公侵齊志非義之甚也公以正月侵齊而未得志故復侵之則結怨之甚矣左氏曰攻廩丘之郛主人焚衝或濡馬褐以救之遂毁之三月公至自侵齊正傳曰書公至自侵齊謹君之出入也始終乎非義之甚也曹伯露卒正傳曰書曹伯露卒志與國之大故也來赴故書之夏齊國夏帥師伐我西鄙正傳曰何以書志國警也而齊之報怨公之召釁並見矣公㑹晉師於瓦正傳曰瓦衛地書公㑹晉師于瓦善㑹也或曰晉師其君不來而公與其大夫㑹得為善乎據左氏晉士鞅趙鞅荀寅救我公㑹晉師於瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔愚謂夫義何常之有夫晉之師雖其君不親行而遣三大夫以師來救魯之見侵於齊且三大夫皆有禮焉公不往㑹之何以答其恤鄰救難之義乎春秋書以善之宜矣公至自瓦正傳曰書公至自瓦謹君之出入也著以善至也秋七月戊辰陳侯栁卒正傳曰何以書卒著恤鄰之義也來赴則書之也晉士鞅帥師侵鄭遂侵衛正傳曰書晉士鞅帥師侵鄭遂侵衛譏暴兵也鄭衛之盟齊以晉霸圖之衰也晉為伯國之餘烈天王播越而不能約與國以定周難乃區區忿鄭衛與齊而二已焉烏足以服諸侯興霸圖乎左氏曰晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何晉大夫曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次於郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質大夫曰苟有益也公子則往羣臣之子敢不皆負羈絏以從將行王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅㑹成桓公侵衛圍蟲牢報伊闕也遂侵衛由是觀之則不能自反而徒以攻人晉之為晉可知矣葬曹靖公正傳曰書葬曹靖公志恤鄰之義也志時也九月葬陳懷公正傳曰何以書志恤鄰之義也而速葬之失禮見矣蓋卒至是三月也季孫斯仲孫何忌帥師侵衛正傳曰何以書侵衛志非義之兵也左氏曰師侵衛晉故也愚謂衛無可聲之罪魯特以二晉之故而為晉侵之不義甚矣冬衛侯鄭伯盟于曲濮正傳曰曲濮衛地書衛鄭盟于曲濮譏非義之盟也搆怨也諸侯之義在守其社稷宗祀承天子之命以為民而已敵來侵己不得已而應之所以自安也鄭衛附齊而叛晉私盟㑹以結怨與晉憤其二已而伐之一間耳皆春秋之所惡也從祀先公正傳曰書從祀先公志慢祀也從祀者以昭公從祀先公之昭穆也昭公薨于乾侯而不得正其正寢之終至此九年矣乃從祀而不得正其祔廟之禮春秋書之所以罪定公也所以罪季孫也左氏曰季窹公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季窹更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘于僖公公羊曰從祀者何順祀也文公逆祀去者三人定公順祀叛者五人胡氏曰蜀人馮山曰昭公至是始得從祀於太廟其說是也季氏逐君而制其死生之命公薨乾侯不得終正寢既薨七月又不得以時歸葬既葬絶其兆域又不得同於先君而在墓道之南至孔子為司冦然後溝而合諸墓則其主雖久未得從昭穆而祔祭宜矣及意如已卒陽虎專季氏將殺季孫斯而亂魯國託於正以售其不正始以昭公之主從祀太廟蓋欲著季氏之罪以取媚於國人然其事雖順其情則逆春秋原情制法故不書禘事與日特曰從祀先公於盜竊寶玉大弓之上見事出陽虎而不可詳也其亦深切著明矣盜竊寶玉大弓正傳曰寶玉榖梁以為封圭大弓武王之戎弓周公受而藏之者也盜謂陽貨不名之者欲人習其文考其事取其義而盜人斯得也何以書誅亂賊也左氏曰壬辰將享季氏於蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟子曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徴死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壯者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越虎從弟殺之陽虎劫公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰於南門之內弗勝又戰於棘下陽氏敗陽虎說甲如公宫取寶玉大弓以出舍於五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余從者曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之子言辨舍爵於季氏之廟而出陽虎入于歡陽關以叛敬王十九年九年晉定十一年齊景四十七年衛靈三十四年蔡昭十八年鄭獻十三年卒曹伯陽元年陳閔公越元年杞僖五年宋景十六年秦哀三十六年卒楚昭十五年吳闔廬十四年春王正月正傳曰無事亦書時月義見於前夏四月戊申鄭伯蠆卒正傳曰書鄭伯蠆卒志鄰國之大故也得寶玉大弓正傳曰書得寶玉大弓重寶也罪國君大臣也始終乎失得所以重寶也寶者先世之遺祭則陳之以致孝者也重寶所以重孝先也左氏曰夏陽虎歸寶玉大弓書曰得器用也凡獲器用曰得得用焉曰獲六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載葱靈輜車名寢於其中而逃追而得之囚於齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎公羊曰何以書國寶也喪之書得之書榖梁曰惡得之得之堤下或曰陽虎以解衆也胡氏曰榖梁子曰寶玉封圭大弓武王之戎弓周公受賜藏之魯或曰夏后氏之璜封父之繁弱也子孫世守罔敢失墜以昭先祖之德存肅敬之心耳古者告終易代𢎞璧琬琰天球夷玉兊之戈和之弓垂之竹矢莫不陳列非真為美觀也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣六月葬鄭獻公正傳曰書葬鄭獻公志恤鄰之禮也秋齊侯衛侯次于五氏正傳曰五氏晉地書齊侯衛侯次于五氏著非義之謀也諸侯有罪則諸侯告於天子率與國而伐之乃義也次于五氏實伐晉也晉為霸主因其衰齊衛與鄭叛晉相盟以致兵連禍結而伐之可謂義乎故春秋書以非之秦伯卒正傳曰書秦伯卒志霸國之大故也不名史略之也秦逺在西戎故略也冬葬秦哀公正傳曰書葬秦哀公志相恤之義也敬王二十年十年晉定十二年齊景四十八年衛靈三十五年蔡昭十九年鄭聲公勝元年曹陽二年陳閔二年杞僖六年宋景十七年秦惠公元年楚昭十六年吳闔廬十五年春王三月及齊平正傳曰書及齊平善釋怨也孔子為政於魯釋怨以安民也於是再侵齊之怨平矣夏公㑹齊侯於夾谷正傳曰夾谷之㑹何以書志善㑹也左氏曰夏公㑹齊侯於祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出境而不以甲車三百乘從我者有如此盟孔丘使茲無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享齊人來歸鄆歡龜隂之田胡氏曰仲尼一言威重於三軍亦順於理而已矣故天下莫大於理而强衆不與焉愚謂此見聖人之作用感動人心之機綏來動和之驗矣彼管晏之徒矜尚智力平時無事動以儒者無用相訾如犂彌之言者多見其不知量矣公至自夾谷正傳曰書公至自夾谷謹君之出入也始終乎禮㑹之善也榖梁以為危之故以地至非也夫既以為危之則孔子何為相危㑹乎於此見禮之足以服人矣穀梁子曰夾谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷㑹齊人使優施舞於魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆歡龜隂之田者蓋為此也因是以見雖有文事必有武備孔子於夾谷之㑹見之矣晉趙鞅帥師圍衛正傳曰書晉圍衛志報怨之兵也左氏曰晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午晉守邯鄲大夫名於寒氏即五氏地名城其西北而守之宵熸及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役涉他曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉步左右皆至而立如植日中不啓門乃退反役晉人討衛之叛故曰由涉他成何於是執涉他以求成於衛衛人不許晉人遂殺涉他成何奔燕君子曰此之謂棄禮必不鈞詩曰人而無禮胡不遄死涉他亦遄矣哉齊人來歸鄆歡龜隂田正傳曰杜氏謂三邑皆汶陽田也泰山博縣有龜山隂田在其北也何以書志復舊物也善齊之服禮也公羊曰齊人曷為來歸鄆歡龜隂田孔子行乎季孫三月不違齊人為是來歸之程子曰齊服義而來歸之故書來歸愚謂孔子相定公與齊侯夾谷之㑹以禮却萊兵而罷其享辨嘉禮野合之非故齊人服義而自歸其侵田聖人功化神速如此期月而已可也豈虛語哉或謂此書孔子自叙其績而不以為嫌小之矣夫春秋魯史也孔子因其舊文而筆之於冊豈孔子所得加損哉直書其實事耳因附其說於後胡氏曰齊人前此嘗歸濟西田矣後此嘗歸歡及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也定公齊侯㑹於夾谷孔子攝相事具左右司馬以從至于㑹所以禮相見卻裔俘拒兵車之命而罷享禮之設於野由是齊侯歸三邑以謝過故揚子法言曰仲尼用於魯齊人章章歸其侵疆桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人㑹人物於一身萬象異形而同體通古今於一息百王異世而同神於土皆安而無所避也於我皆真而無所妄也其曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何是以天自處矣而亦何嫌之有叔孫州仇仲孫何忌帥師圍郈正傳曰郈叔孫之邑書二子帥師圍郈志討叛也而魯政之亂自見矣左氏曰初叔孫成子欲立武叔公若藐固諫曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劒過朝公若必曰誰之劒也吾稱子謂侯犯也以告必觀之吾僞固而授之末則可殺也使如之公若曰爾欲吳王我乎遂殺公若侯犯以郈叛武叔懿子圍郈弗克愚謂據此而觀則二子之圍郈為侯犯據郈以叛也侯犯之叛為殺公若也公若之見殺為固諫立武子也夫天下有道征伐自天子出天下無道征伐自諸侯出諸侯失政征伐自大夫出則陪臣亦叛之矣今叔孫仲孫上不能事其君下不能御其臣擅興大衆自圍其邑而猶不克焉則魯之無道從可見矣秋叔孫州仇仲孫何忌帥師圍郈正傳曰再志圍郈再志討叛而甚魯之無道也左氏曰秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然將叛犯從之齊使至駟赤與郈人為之宣言於郈中曰侯犯將以郈易於齊齊人將遷郈民衆凶懼駟赤謂侯犯曰衆言異矣子不如易於齊與其死也猶是郈也而得紓焉何必此齊人欲以此逼魯必倍與子地且盍多舍甲於子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤將射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之駟赤止而納魯人侯犯奔齊齊人乃致郈愚案胡氏曰郈叔孫氏邑也侯犯以郈叛不書於䇿書圍郈則叛可知矣再書二卿帥師圍郈則彊亦可知矣天子失道征伐自諸侯出而後大夫彊諸侯失道征伐自大夫出而後家臣强其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家專魯為日已久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施諸人故所惡於上不以使下所惡於下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣宋樂大心出奔曹正傳曰書樂大心出奔曹交罪之也髙氏曰辭使非大譴而讒言乘之罪纍上也則是景公之過也王氏曰宋公信讒而刑罰無章然大心不能任家國之難而進退無據且挾詐以避事是則大心之過也故春秋書此而其君臣之罪並見矣宋公子地出奔陳正傳曰書宋公子地出奔陳則君臣之罪並見矣左氏曰宋公子地嬖蘧富獵十一分其室而以其五與之公子地有白馬四公嬖向魋即司馬桓魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰地弟曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子公子地出奔陳公弗止愚謂觀此傳則景公以嬖魋之故而使地不能自安其身地以不忍其愛物之故而去父母之邦皆有罪矣故春秋書之冬齊侯衛侯鄭游速㑹於安甫正傳曰安甫齊地書齊衛鄭㑹於安甫善之也㑹而不盟善之也志修好也其進於盟鹹盟沙之善矣叔孫州仇如齊正傳曰此謝致郈之事書叔孫如齊非所如也使人讀其文考其事而知其取義在非之矣左氏曰武叔即州仇聘於齊齊侯享之曰子叔孫若使郈在君之他境寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜愚謂觀此則見齊景公之言私而驕武叔之對公而正矣然魯君不能攬其政而授於大夫大夫不能御其家臣而借威於鄰國不可以言智矣他尚何取耶宋公之弟辰暨仲他石彄出奔陳正傳曰書宋公之弟辰暨仲他石彄出奔陳則奔者與奔之者之罪並見矣胡氏曰按左氏宋公子地有白馬四公以與桓魋地怒抶魋奪之魋懼將走公泣之母弟辰曰子為君禮不過出境君必止子地出奔陳公弗止辰為之請弗聽辰曰是我廷吾兄謂公子地也吾以國人出君誰與處書曰宋公之弟辰暨仲他石彄出奔陳其弟云者罪宋公以嬖魋故以失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得已之詞又以見仲他石彄見脅於辰不能自立無大臣之節也愚謂胡氏所以責三臣者是也至於謂暨為不得已之詞則鑿矣宋君以嬖而奔其弟辰他以小忿而去其君其罪均矣敬王二十一年十有一年晉定十三年齊景四十九年衛靈三十六年蔡昭二十年鄭聲二年曹陽三年陳閔三年杞僖七年宋景十八年秦惠二年楚昭十七年吳闔廬十六年春宋公之弟辰及仲他石彄公子地自陳入於蕭以叛正傳曰及亦暨之義胡氏分别以為不得已與得已而不已則鑿矣何以書誅亂黨也夏四月正傳曰無事亦書時月義見於前秋宋樂大心自曹入於蕭正傳曰書宋樂大心自曹入於蕭志黨亂也左氏曰宋公母弟辰暨仲他石彄公子地入於蕭以叛秋樂大心從之大為宋患寵向魋故也愚謂四叛臣自罹於惡逆故春秋詳書以罪之然宋公以寵嬖生亂亦可罪矣均為萬世有國者之大戒也可不慎乎冬及鄭平叔還如鄭涖盟正傳曰叔還叔弓曾孫書及鄭平善釋怨也於是六年侵鄭取匡之怨平矣書如鄭涖盟著魯志也左氏曰始叛晉也吳氏曰及鄭平者我欲之故鄭卿不來盟而我卿往涖盟也愚謂先平侵鄭之怨而乃往涖盟以絶晉也然而不能無比黨之私矣敬王二十二年十有二年晉定十四年齊景五十年衛靈三十七年蔡昭二十一年鄭聲三年曹陽四年陳閔四年杞僖八年宋景十九年秦惠三年楚昭十八年吳闔廬十七年春薛伯定卒正傳曰書薛伯定卒志與國之大故也夏葬薛襄公正傳曰何以書葬我㑹葬之也志禮也叔孫州仇帥師墮郈正傳曰墮隳同毁其城也榖梁以為隳猶取非也書墮郈志去患也禮也孔子曰家無藏甲邑無百雉之城欲隳三都髙氏曰是時三家之邑皆為城以自固故其家臣因之以叛於是毁之愚謂所謂惟禮可以止亂此之謂矣衛公孟彄帥師伐曹正傳曰書公孟彄伐曹志陵暴之兵也左氏曰夏衛公孟彄伐曹克郊還滑羅殿未出不退於列其御曰殿而在列其為無勇乎羅曰與其素厲寧為無勇季孫斯仲孫何忌帥師墮費正傳曰何以前書墮郈此書墮費志除患也而定公能任聖人率禮為國之善可見矣左氏曰仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費公羊曰曷為帥師墮郈帥師墮費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師墮郈帥師墮費雉者何五板而堵五堵而雉百雉而城胡氏曰禮曰制國不過千乘都城不過百雉家富不過百乘以此坊民諸侯猶有叛者故家不藏甲邑無百雉之城禮所當謹也郈費成者三家之邑政在大夫三卿越禮各固其城公室欲張而不得也三桓既微陪臣擅命憑倚其城數有叛者三家亦不能制也而問於仲尼遂墮三都是謂以禮為國可以為之兆也推而行諸魯國而凖則地方五百里凡侵小而得者必有興滅國繼絶世之義諸侯大夫各謹於禮不以所惡於上者使其下亦不以所惡於下者事其上上下交相順而王政行矣故曰苟有用我者期月而可三年有成秋大雩正傳曰書大雩志非禮也冬十月癸亥公會齊侯盟於黃正傳曰黃齊地書公㑹齊侯盟於黃志魯之求也結信也蓋齊非有同心於魯乃魯往求於齊耳以其地而知之也夫春秋無善盟盟者忠信之薄也心已相信何必外要鬼神乎春秋志魯之事非取之也十有一月丙寅朔日有食之正傳曰何以書志天變也公至自黃正傳曰書公至自黃謹君之出入也十有二月公圍成正傳曰成孟氏邑書公圍成何榖梁子曰圍成大公也左氏曰將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子僞不知我將不墮冬十二月公圍成弗克愚謂語有之尾大不掉其成之謂乎夫成孟孫之邑耳易置初若易然三家越禮城以自固陪臣據以作叛遂如敵國矣至於勤公親圍之而弗克豈一朝一夕之故其所由來者漸矣是以君子謹履霜之戒焉胡氏曰仲由為季氏宰孔子為魯司寇而不能墮成何也按是冬公圍成不克越明年孔子由大司寇攝相事然後誅少正卯與聞國政三月而商賈信於市男女别於途及齊饋女樂孔子遂行然則圍成之時仲尼雖用事未能專得魯國之政也而辨言亂政如少正卯等必肆疑沮於其間矣成雖未墮無與為比亦不能為患使聖人得志行乎魯國以及期月則不待兵革而自墮矣公至自圍成正傳曰書公至自圍成謹君之出入也而强臣之罪自見矣或謂其至危之非也敬王二十三年十有三年晉定十五年齊景五十一年衛靈三十八年蔡昭二十二年鄭聲四年曹陽五年陳閔五年杞僖九年宋景二十年秦惠四年楚昭十九年吳闔廬十八年春齊侯衛侯次於垂葭正傳曰垂葭衛地一名郥氏書齊衛次於垂葭志非義也黨謀晉也左氏曰春齊侯衛侯次於垂葭實郥氏使師伐晉將濟河諸大夫皆曰不可邴意茲曰可鋭師伐河內傳必數日而後及綘綘不三月不能出河則我既濟水矣乃伐河內齊侯皆斂諸大夫之軒唯邴意兹乘軒齊侯欲與衛侯乘與之宴而駕乘廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝乃介而與之乘驅之或告曰無晉師乃止愚謂按此二國謀晉也夫晉天下之伯國也當其盛時天下諸侯奔走朝聘之不暇及其伯業之衰齊衛與鄭諸國乃相與謀叛之又相與謀伐之多見其背義之甚矣夏築蛇淵囿正傳曰書夏築蛇淵囿志不時也時者農食所自出民之天也而違之是棄民也大搜於比蒲正傳曰何以書志非禮也搜春畋也而行之於夏且大聚衆焉非禮矣衛公孟彄帥師伐曹正傳曰書衛伐曹著陵弱之亟也曹本無罪可聲衛特以其不叛晉而亟伐之非義也秋晉趙鞅入於晉陽以叛正傳曰背君曰叛書趙鞅入於晉陽以叛則無上之罪見矣左氏曰晉趙鞅謂邯鄆午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而置諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之於晉陽趙孟怒召午而囚諸晉陽使其從者說劍而入涉賔不可乃使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷午之子涉賔以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寧獨我死請以我說趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之愚謂君臣之義無所逃於天地之間者也故臣叛之間不容以髮趙孟專權自恣始欲易置邯鄲午而不可遂擅殺午以召中行之伐而奔晉陽其背君無上甚矣非叛而何胡氏曰趙鞅之入拒范中行也而直書曰叛何也人臣專土與君為市則是篡弒之階堅氷之戒豈無以有已之義乎後世大臣有困於讒間遷延居外不敢釋兵卒以憂死者亦未明人臣之義故爾故直書入於晉陽以叛冬晉荀寅士吉射入於朝歌以叛正傳曰朝歌晉屬邑書荀寅士吉射入於朝歌以叛討無上之罪也左氏曰范皋夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子即荀躒文子欲以為卿韓簡子與中行文子即荀寅相惡魏襄子名曼多亦與范昭子即吉射相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范皋夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙彊子尾子曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌愚謂臣叛之間不能以髮者也二子擅伐趙鞅而逐之則背君無上矣又奔朝歌是背君無上之大者也故春秋書以罪之胡氏曰按左氏知文韓簡魏襄子與荀寅范吉射相惡將逐范荀言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不均矣請皆逐之遂奉公以伐二子二子敗奔朝歌晉主夏盟威服天下及大夫專政賄賂公行內外離析示威平丘而齊叛辭請召陵而蔡叛盟於沙鹹而鄭叛次於五氏而衛叛涖於鄭㑹於夾谷歃於黃而魯叛諸侯叛於外大夫叛於內故奔於晉陽而趙鞅叛入於朝歌而荀寅與士吉射叛以晉國之大天下莫强焉邦分崩而不能守也春秋於晉事或略而不序或賤而稱人或書侵以陋之責亦備矣至是三卿內叛直書於䇿見其效也故臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祁見執獻揚楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室自是不復能主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣晉趙鞅歸於晉正傳曰書晉趙鞅歸於晉則晉君縱賊之罪見矣左氏曰韓魏以趙氏為請十二月辛未趙鞅入於絳盟於公宫愚謂趙鞅之背君無上春秋既以叛書之矣此其來歸韓魏為請之耳趙鞅負叛君之大罪而聽韓魏之請以歸之春秋書此見晉君之無刑政也胡氏曰三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸於晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡始禍晉國之載書既不能致辟於鞅奉行天討以警亂臣又亢不衷狥韓魏之請而許之復無政刑矣其能國乎先儒或謂言歸者以地正國也鞅取晉陽之甲以逐君側之惡人則其說誤矣以地正國而可是人主可得而脅人臣擅興無罪以兵諫者真愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者則此說啓之也大失春秋之意矣薛弒其君比正傳曰書薛弒其君比使人求其跡而罪人斯得矣何以言薛而不名其人史之書以報之未實其人也疑以傳疑史之法也故書薛然而弒君之罪人不可終逃矣胡氏以稱國而弒為大臣之罪與孫明復以為舉國之人皆可誅均之為誤矣敬王二十四年十有四年晉定十六年齊景五十二年衛靈三十九年蔡昭二十三年鄭聲五年曹陽六年陳閔六年杞僖十年宋景二十一年秦惠五年楚昭二十年吳闔廬十九年卒春衛公叔戌來奔衛趙陽出奔宋正傳曰何以並書奔志衛侯之不君公叔戌之不臣也左氏曰初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及文子卒衛侯始惡於公叔戌以其富也公叔戌又將去夫人之黨夫人訴之曰戍將為亂又曰春衛侯逐公孫戌與其黨故趙陽奔宋戍來奔愚謂由二傳觀之則靈公以貪而信讒故不能容其臣公叔戌以驕而行怨故不能安其身春秋直書屢書其事而君不君臣不臣之罪並見矣胡氏曰公叔戌將去南子之黨夫人訴曰戍將為亂故公叔來奔趙陽北宫結皆戍黨也故亦出奔而靈公無道不能正家以喪其大臣之罪著矣戍又以富見惡於衛侯夫富者怨之府也使戍積而能散以財發身不為貪人之所怨於以保其爵位尚庶幾乎三月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸正傳曰書楚陳滅頓以頓子牂歸則二國陵暴之罪見矣左氏曰頓子牂欲事晉背楚而絶陳好二月楚滅頓愚謂由是觀之頓無可聲之罪惟以欲事晉而背楚以絶陳耳愛人不親反其仁而遽以其不親已合二國之衆以伐微小之國俘其君滅其宗社可為愛人乎於繼滅舉廢之義何如也夏衛北宫結來奔正傳曰結與趙陽皆公叔戌之黨書衛北宫結來奔罪靈公之棄其臣也左氏曰公叔戌之故也愚謂靈公以南子之讒而棄三臣結等三臣附黨行私使身見逐而宗祀不守則不知世卿貴戚無可去之義春秋屢書交譏之也五月於越敗吳於檇李吳子光卒正傳曰何以書著詐兵也左氏曰吳伐越越子勾踐禦之陳於檇李勾踐患吳之整也使死士再禽焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自頸也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越愚按此乃越詐兵隂謀以取勝者也先使死士再禽而不動又使罪人三行屬劍自剄以亂吳師之心目而伐之此勾踐敗吳之詭謀也吳雖有擅興首禍之罪然而越之以詐而敗人之兵其罪更甚矣胡氏曰書敗者詐戰也定公五年於越入吳至是敗吳於檇李會黃池之嵗越又入吳悉書於史以其告也哀之元年吳子敗越棲勾踐於會稽之上豈獨不告而史䇿不書疑仲尼削之也吳子光卒夫差使人立於庭苟出入必謂己曰而忘越王之殺而父乎則對曰唯不敢忘三年乃報越然則夫椒之戰復父讎也非報怨也春秋削而不書以為常事也其㫖微矣愚謂非仲尼削之以為常事也夫春秋無義戰而書之者多矣夫差為父報讎庶幾義戰矣仲尼乃削而不書烏乎書大扺史之法為報書也不報則不書聖人因史之文而不改耳公會齊侯衛侯於牽正傳曰書公會齊衛於牽著非義之會也左氏曰晉人圍朝歌公會齊侯衛侯於脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰於絳中不克而還士鮒奔周小王桃甲入於朝歌愚謂由是觀之三國之會於牽為謀救中行氏也張氏曰齊景公苟欲求霸誅晉之亂臣以正其國可也當是時孔子已去魯故會齊衛合謀救范中行氏三國之君同為會而助不衷得春秋書之之㫖矣公至自會正傳曰何以書謹君之出入也而不義之會將何以致反靣之詞乎秋齊侯宋公會於洮正傳曰書齊宋會於洮著不義之會也左氏曰范氏故也然則此會為助范中行氏也齊侯前既與魯衛為牽之會今復與宋為洮之會是果於不義之行而不知悔矣天王使石尚來歸脤正傳曰公羊以為石尚天子之士脤者俎實也腥曰脤熟曰膰何以書志非禮也受胙禮也致胙非禮也相維辟公天子穆穆言諸侯助王祭也天子祭而受胙於神乃頒胙於助祭之諸侯以諸侯助祭同受之於神故也魯未嘗助祭於周而天王致之胙何謂乎春秋書之見天子之不君而諸侯之不臣其所感慨深矣衛世子蒯聵出奔宋正傳曰書蒯聵出奔宋則父子亂倫之罪並著矣左氏曰衛侯為夫人南子召宋朝會於洮太子蒯聵獻盂於齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余公執其手以登臺太子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊太子告人曰戲陽速禍余戲陽速告人曰太子則禍余太子無道使余殺其母余不許將戕於余若殺夫人將以余說余是故許而弗為以紓余死諺曰民保於信吾以信義也胡氏曰世子國本也以寵南子故不能保世子而使之去國以欲殺南子故不能安其身至於出奔是輕宗廟社稷之所付託而恣行矣春秋兩著其罪故特書世子其義不繫於與蒯聵之世其國也而靈公無道不能正家以危其國本至使父子相殘毁滅天理之所由著矣衛公孟彄出奔鄭正傳曰公孟彄曾帥師乃衛用事之卿也靈公疑其為蒯聵之黨而逐之遂出奔鄭靈公惑於南子所以不正凡正人皆為所惡春秋書出奔著靈公之無道也正人盡去而邪道大行矣宋公之弟辰自蕭來奔正傳曰何以書交譏之也宋景公寵嬖向魋公子地出奔母弟辰為之請止弗聽而辰亦出奔入蕭與地叛又自蕭而來奔春秋書之一以見景嬖佞棄親為不君辰不勝一朝之忿出奔忘君為不臣胥得罪矣大搜於比蒲正傳曰書大搜譏亟也五年大搜禮也邾子來會公正傳曰會者偶相見之詞先儒以為會公於比蒲夫小之事大當修朝禮於都受之於廟邾子偶因比蒲之搜而來會公於此則非禮矣春秋書之譏非禮也見邾子之來定公之受皆非禮也城莒父及霄正傳曰莒父及霄魯二邑書城二邑譏勞民也夫既方墮費郈矣今又城莒父及霄魯可謂反覆而政令不一矣或曰蓋公叛晉助范中行氏故懼齊而城二邑是則惑之甚也已不治而欲治人以不正可得乎墮三都孔子深謀也既墮費郈未能墮成孔子遽以女樂去司寇自此而孔子之說不行矣此二邑之所以復城也或曰此或者譏不時乎曰非也或曰此當是冬事其搜其城非不時也逸其文故是年無冬耳應之者曰然則先儒謂春秋以一字為褒貶苟文有脫誤烏乎徴諸敬王二十五年十有五年晉定十七年齊景五十三年衛靈四十年蔡昭二十四年鄭聲六年曹陽七年陳閔七年杞僖十一年宋景二十二年秦惠六年楚昭二十一年吳夫差元年春王正月邾子來朝正傳曰何以書志禮也以小事大邦交之宜也悔過之善也邾子以比蒲之會為不成禮故正月來朝悔前過蓋前愆而得以小事大邦交之禮矣故春秋善之左氏曰邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎鼷鼠食郊牛牛死改卜牛正傳曰鼷鼠即小鼠噬牛傷皮無不死者何以書志災異也著不敬也榖梁子曰不敬莫大焉愚謂災異由天敬謹由人故能致敬謹盡視牲之禮重典守之責則雖有天災無從生矣故郊牛鼠食而死雖或天災乃不敬之致也春秋書此則魯君臣之不敬而僣竊之非禮皆可見矣二月辛丑楚子滅胡以胡子豹歸正傳曰書楚子滅胡以胡子豹歸著楚之憤暴也左氏曰吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡胡氏曰夫滅人之國其罪大矣然胡子豹乘楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命者既以為有命而又貪生忍辱不死於社稷則是不知命矣書以歸罪豹之不能死位而與歸也故楚子書爵而胡子豹名愚謂直書其事而其罪自見不繫乎名與否矣若夫楚子滅人之罪大胡子侵楚之罪小春秋書之特罪其大者耳非罪豹也夏五月辛亥郊正傳曰此周之夏五月即夏之春三月也此因郊牛死改卜牛滌之故在五月也何以書失禮之中又失禮焉於此見矣魯不當郊一失也郊牛之死二失也行之夏五月非時三失也壬申公薨於髙寢正傳曰書公薨於髙寢志國君之大故也而其非正見矣左氏曰夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也穀梁曰髙寢非正也愚謂命不可言禮則有定子貢以髙卑俯仰而知公之不久偶中耳至於諸侯死正寢禮也曾子曰吾何求哉吾得正而斃焉斯已矣貴正也公之薨不於正寢而於髙寢非正終矣其生也為叛臣季孫意如所立已不得正其始其終也於髙寢又不得正其終春秋書之竊取之情可見矣鄭罕達帥師伐宋正傳曰書鄭伐宋志非義之兵也左氏曰鄭罕達敗宋師於老丘愚謂鄭納宋叛人公子地又為地伐大國欲取地以居之蓋不待貶而罪惡見齊侯衛侯次於渠蒢正傳曰何以書志義舉也左氏曰齊侯衛侯次於遽拿謀救宋也愚謂據此則二君渠蒢之會蓋因鄭為叛人公子地伐宋故合兵救之也其義則善矣然而次於渠蒢不免逗遛觀望所謂見義而不為無勇矣邾子來奔喪正傳曰書邾子來奔喪則非禮自見矣公羊子曰其言來奔喪何奔喪非禮也天子崩諸侯奔喪會葬諸侯薨諸侯使士弔賵之大夫葬之禮也今邾子不知禮之品秩而惟大國之畏以所行於天子者行之同列失禮之甚者也故春秋書之而取義自見秋七月壬申姒氏卒正傳曰姒氏哀公之母定公之妾其稱姒氏者妾母以子貴哀公未君不得推貴其母也故公羊氏曰何以不稱夫人哀未君是也左氏以為不赴且不祔者非也何以書志君母之大故也八月庚辰朔日有食之正傳曰書日有食之志天變也九月滕子來會葬正傳曰書滕子來㑹葬志非禮也以所事天子者事魯也丁巳葬我君定公雨不克葬戊午日下昃乃克葬正傳曰書雨不克葬戊午日昃乃葬志不得乎禮也夫葬必有備有備無患何雨不克葬之有書雨不克葬則是無備非禮矣葬之日日中而虞所以安親之神也今日下昃乃克葬則是無虞祭無虞非禮矣穀梁子曰葬既有日不為雨止禮也雨不克葬喪不以制也左氏以為雨不克襄事禮也非矣辛巳葬定姒正傳曰書葬定姒志君母之大事也公羊子曰定姒何以書葬未踰年之君也有子則廟廟則書葬胡氏曰曾子問並有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕冬城漆正傳曰書冬城漆志非禮也定公定姒連喪繼葬土血未乾而興不急之役忘哀以勞民非禮矣張氏曰城漆謀伐邾也定公之喪邾子來奔事魯謹矣哀公初立不務善鄰而以土地之故勞民力啓民怨二年取其田七年俘其君卒使吳人乘間以伐其國齊人問罪而取歡闡利未得而害隨之謀國如此其不終也宜哉春秋正傳卷三十五
