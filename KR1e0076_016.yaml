body:
  text: 春秋正傳卷十六明湛若水撰僖公襄王二十一年二十有九年晉文五年齊昭二年衛成四年蔡莊十五年鄭文四十二年曹共二十二年陳共公朔元年杞桓六年宋成六年秦穆二十九年楚成四十一年春介葛盧來正傳曰介東夷國也葛盧介君名未爵者杜氏曰不稱朝不能行朝禮書介葛盧來紀夷之歸夏也左氏曰介葛盧來朝舍于昌衍之上公在㑹饋之芻米禮也公至自圍許正傳曰書公至自圍許紀反面之禮也君舉必書史之職也然公初往㑹盟諸侯朝王而遂圍許則圍許乃遂事舍正事而書遂事者遂事在後也夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉正傳曰㑹者公㑹也翟泉在洛陽城内書㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉交譏之也以其失上下之道也左氏曰公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子愸盟于翟泉尋踐土之盟且謀伐鄭也愚謂王子虎天子之佐也降而下與諸大夫之盟周王於是乎失為上之道矣程子曰晉文連年㑹盟皆在王畿之側而此盟復迫王城又與王人盟强逼甚矣愚謂且以大夫上與王人盟諸侯於是乎失為下之道矣胡氏曰翟泉近在洛陽王城之内而王子虎於此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而於此上盟王子虎是謂下陵而無君之心著矣故以為大惡愚謂此言是也至謂諱公不書則㑹之者誰歟謂貶諸侯之卿稱人則王子亦宜稱人貶之耶誤矣秋大雨雹正傳曰周之秋即夏之五六七月也書秋大雨雹左氏以為灾也胡氏曰正蒙曰凡陰氣凝聚陽在内者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風和而散則為霜雪雨露不和而散則為戾氣曀霾陰常散緩受交於陽則風雨調寒暑正雹者戾氣也陰脅陽臣侵君之象當是時僖公即位日久季氏世卿公子遂專權政在大夫萌於此矣冬介葛盧來正傳曰書介葛盧來再紀逺人之歸也左氏曰以未見公故復來朝禮加之燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信愚謂此人聞牛鳴而知其生三犧又知皆用之則亦桀驁非常者矣襄王二十二年三十年晉文六年齊昭三年衛成五年蔡荘十六年鄭文四十三年曹共二十三年陳共二年杞桓七年宋成七年秦穆三十年楚成四十二年春王正月正傳曰無事亦書時月義見于前夏狄侵齊正傳曰書夏狄侵齊志晉霸之衰已甚也則晉侯霸圖之不競可知矣左氏曰晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也夏狄侵齊由是觀之狄之侵齊晉侯啓之也及狄侵齊是大國日衰弱矣所貴乎霸者行仁義以安隣國今反舍而不討乃謀秦圍鄭其無志於伯圖可知矣胡氏曰詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連帥之職脩矣上書狄侵齊下書圍鄭此直書其事而義自見者也秋衛殺其大夫元咺及公子瑕正傳曰及猶并也書衛殺其大夫元咺及公子瑕紀專殺大夫及同氣之罪也左氏曰晉侯使醫衍酖衛侯寗俞貨醫使薄其酖不死公為之請納玉於王與晉侯皆十㲄王許之秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服將命周歂先入及門遇疾而死冶厪辭卿愚謂此其實傳也胡氏亦以為公子瑕未聞有罪元咺立以為君故衛侯忌而殺之是也夫以無罪而殺之可謂暴矣元咺所自為忠於叔武者也元咺奉叔武而治反乎衛君叔武無罪而衛君殺之元咺訴於晉明叔武之無罪其心皆明白不欺者也然而訟君則陷於惡公羊謂其君出則已入君入則已出以為不臣是矣然而諸侯無專殺大夫天子之禁也衛人不以告于天子而使周冶殺之其犯專殺之罪而不可赦矣至於瑕能辭咺之立也忌而殺之傷同氣之大義矣胡氏又有衛侯在外稱國以殺待殺後入之説則求之過矣衛侯鄭歸于衛正傳曰書衛侯鄭歸于衛則鄭之罪自見矣鄭無道至於失國是得罪於宗廟社稷矣叔武不守則鄭不得歸及一歸而殺叔武再歸而殺公子瑕故紀其歸而戕殺同氣之罪著矣胡氏曰末世隆怨薄恩趨利棄義有國家者恐公族之軋已至網羅誅殺無以芘其本根而社稷傾覆如六朝者衆矣衛侯始歸而殺叔武再歸而及公子瑕是葛藟之不若而春秋之所惡也晉人秦人圍鄭正傳曰書晉人秦人圍鄭紀不義之兵也春秋無義戰而秦從晉之私忿假貳楚之言擅興甲兵以圍鄭非義舉矣左氏曰九月甲午晉侯秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逢孫揚孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為太子以求成于晉晉人許之此其實傳也愚謂晉侯初為公子出亡過鄭而鄭文公不禮焉君子比之睚眦之怨耳人君以天下為度霸者猶當仗仁義以服天下而可以小怨興大衆乎既以殘衛又以圍鄭非伯圗矣秦人無義惟晉威之畏而利是從隨晉以圍鄭然以利而合則亦以利而離秦聴燭之武一言兩國解體釋圍而釁生連兵糜民禍盖有所由來矣故以利而離合者亦以利而受害理勢使之然也為列國者亦可以鑑矣介人侵蕭正傳曰蕭小國書介人侵蕭紀中國不振旅之罪也詩云戎狄是膺荆舒是懲言荆舒之無禮義不可以納之而召侮也介人兩朝于魯亦見逺楚慕魯之義矣乃有侵蕭之舉然則詩之言豈誣也哉冬天王使宰周公來聘正傳曰宰周公者周之公為宰者也書天王使宰周公來聘則非禮可見矣禮比年一小聘三年一大聘五年一朝魯與諸侯未有朝聘之禮而王乃使宰下聘焉觀於下文公子遂如京師可見矣君先於臣非禮之正也左氏曰王使周公閱來聘饗有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉穀鹽虎形以獻其功吾何以堪之愚謂此實傳也觀於此言亦可以見宰之無王人之度而辱君命甚矣公子遂如京師遂如晉正傳曰遂者繼事之詞書公子遂如京師遂如晉著魯之貳於敬君也左氏曰東門襄仲将聘于周遂初聘于晉愚謂由是觀之是貳聘矣貳聘遂行者如二君矣其不敬莫大乎此夫魯初未行朝聘之禮于周而使周以宰先下聘焉公又不親來朝而使遂以貳行魯僖不臣之罪不可逭矣胡氏曰大夫出疆有以二事出者有以一事出而專繼事者其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則專繼事者也是非得失則存乎其事矣冢宰上兼三公其職任為至重而來聘于魯天王之禮意莫厚焉魯侯既不朝京師而使公子遂往又以二事出夷周室於列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聴者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡愚謂不待詞之褒貶而善惡自見此夫子所謂竊取之義也襄王二十三年三十有一年晉文七年齊昭四年衛成六年蔡荘十七年鄭文四十四年曹共二十四年陳共三年杞桓八年宋成八年秦穆三十一年楚成四十三年春取濟西田正傳曰書取濟西田著取之非義也濟西者曹田也夫國君之土田受封乎先王世守乎宗社晉侯執曹子而分其田與諸侯非義矣諸侯受之其不義之罪均矣况曹為同姓其可滅乎其可分之田乎左氏曰春取濟西田分曹地也使臧文仲往宿于重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也愚謂此實傳也不言國者史之省文耳内史之詞何待國乎公子遂如晉正傳曰書公子遂如晉始終乎非義之取也左氏曰襄仲如晉拜曹田也愚謂既受之則不得不拜矣既拜受之則不得不為利懾矣夏四月四卜郊正傳曰周之夏四月即夏之春二月也於此亦可以見周時與月數皆起於子矣若謂夏時之四月則已月矣豈郊禮之時乎書夏四月四卜郊見非禮之非禮也魯之郊非也祀不於至日而於四月焉而卜焉卜不主一而二焉三焉且四焉是非禮之中又非禮矣胡氏曰記禮者曰祭帝于郊所以定天位也禮行於郊而百神受職焉魯諸侯何以有郊成王以周公有大勲勞於天下命魯公世世祀周公以天子之禮樂是故魯君孟春乗大輅載弧䪅旂十有二旒日月之章祀帝于郊配以后稷天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也揚子曰天子之制諸侯庸節節莫差於僣僣莫重於祭祭莫重於地地莫重於天諸侯而祀天其僣極矣聖人於春秋欲削而不存則無以志其失而為後世戒悉書之乎則嵗事之常有不勝書者是故因禮之變而書于䇿或以卜或以時或以望或以牲或以牛於變之中又有變焉者悉書其事而謂言偃曰魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也言把宋夏商之後受命于周作賓王家統承先王脩其禮物其得行郊祀而配以其祖非列國諸侯之比也是故天子祭天地諸侯祭社稷祝嘏莫敢易其常古易則亂名犯分人道之大經拂矣故曰郊社之禮所以祀上帝也宗廟之禮所以祀乎其先也眀乎郊社之禮禘嘗之義治國其如指諸掌乎夫庶人之不得祭五祀大夫之不得祭社稷諸侯之不得祭天地非欲故為等衰盖不易之定理也知其理之不可易則安於分守無欲僣之心矣為天下國家乎何有不從乃免牲正傳曰書不從紀異也神不歆非類可知矣乃免牲紀非禮也夫牲者為祀設也既不祀猶免牲焉豈禮乎穀梁曰免牲者為之緇衣熏裳有司𤣥端奉送至於南郊免牛亦然據穀梁之言此免牲之禮也杜氏以為免猶縱也非也若云縦放之則又何必書乃免乎胡氏曰古者大事決於卜故洪範稽疑獨以龜為主卜而不從則不郊矣故免牲愚謂郊之卜日非禮也古者郊以冬至以迎陽也猶三望正傳曰猶之為言尚也穀梁以為可以已之詞非也望者祭名三望者望三方也書猶三望著非禮也左氏曰四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也公羊曰山川有能潤千百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山爾河海潤於千里何以書譏不郊而望祭也胡氏曰有虞氏受終而望因於類巡狩而望因於柴皆天子之事也今魯不郊而望故特書曰猶其言三望何也天子有方望無所不通諸侯非名山大川在其封内者則不祭魯得用重禮視王室則殺故望止於三比諸侯則隆故河海雖不在其封而亦祭然非諸侯之所得為也秋七月正傳曰無事亦書義見前冬把伯姬來求婦正傳曰婦者從姑之稱也書把伯姬來求婦著其來之非正也穀梁曰婦人既嫁不踰境把伯姬來求婦非正也胡氏曰蕩伯姬來逆婦而書者以公自為之主失其班列書也把伯姬敵矣其來求婦曷為亦書見婦人之不可預國事也王后之詔命不施於天下夫人之教令不施於境中昏姻大事也把獨無君乎而夫人主之也故特書于䇿以為婦人亂政之戒為子求婦猶曰不可况於他乎此義行無吕武之禍矣狄圍衛正傳曰書狄圍衛見中夏之衰弱甚也晉文攘夷之志衰矣十有二月衛遷于帝丘正傳曰書衛遷于帝丘記鄰國遷都之大事可以見伯主之不能安中國也胡氏曰帝丘東郡濮陽顓頊之虚亦衛地也狄嘗逼逐黎侯黎侯寓于衛而衛不能脩方伯連率之職戎嘗伐凡伯于楚丘而衛不能救王臣之患其後遂為狄人所滅東徙渡河矣齊桓公攘戎狄封之而衛國忘亡今又為狄所圍其遷于帝丘避狄難也而霸主衰微夷狄强盛衛侯不能自强於政治晉文無卻四夷安諸夏之功莫不見矣襄王二十四年三十有二年晉文八年卒齊昭五年衛成七年蔡莊十八年鄭文四十五年卒曹共二十五年陳共四年杞桓九年宋成九年秦穆三十二年楚成四十四年春王正月正傳曰無事亦書義見前夏四月己丑鄭伯捷卒正傳曰捷鄭伯名名之亦無他義可見凡書名者未必皆係於義也衛人侵狄秋衛人及狄盟正傳曰及猶與也書衛人侵狄秋衛人及狄盟著衛人之非義也左氏曰夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟愚謂衛見圍于狄而遷帝丘衛侯以不振之徳當新造之時宜持重養鋭以俟時可也乃因狄之亂而侵之而又與之盟夫盟者忠信之薄中國諸侯衰世之事也施之中國君子猶不取焉况因亂要盟非可以結忠信者乎胡氏曰盟㑹中國諸侯之禮衰世之事已非春秋之所貴况與狄人輕信結盟而乃刑牲㰱血以要之哉冬十有二月己卯晉侯重耳卒正傳曰書晉侯重耳卒紀伯主之大故也於是乎有相恤之義焉有賻𦵏之禮焉胡氏曰按左氏載秦伯納晉文公及殺懐公於髙梁其事甚詳而春秋不書者以為不告也徐邈曰諸侯有朝聘之禮赴告之命所以敦交好通憂虞若鄰國相望而情志否隔存亡禍福不以相闗則他國之史無由得書魯政雖陵典刑猶在史䇿所録不失常法其文足證仲尼脩之事仍本史有可損而不能益也愚謂既云不能益則亦不能損矣故曰其事則齊桓晉文其文則史其義則丘竊取之矣竊取者不敢顯然取之况損益乎襄王二十五年三十有三年晉襄公驩元年齊昭六年衛成八年蔡莊十九年鄭穆公蘭元年曹共二十六年陳共五年杞桓十年宋成十年秦穆三十三年楚成四十五年春王二月秦人入滑正傳曰滑者穀梁以為國也書秦人入滑著不義之兵也秦師之出本欲圖鄭也鄭有備遂移兵以入滑何義乎春秋書以罪之也左氏曰秦師過周北門左右免胄而下超乗者三百乗王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脱入險而脱又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乗韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以間敝邑若何把子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還愚謂觀此傳則秦之不義亦可見矣齊侯使國歸父來聘正傳曰歸父齊大夫書齊侯使國歸父來聘紀鄰國之脩好也左氏曰齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也夏四月辛巳晉人及姜戎敗秦于殽正傳曰人者衆人之稱書晉人及姜戎敗秦于殽著晉不義之兵也秦人無道越晉踰周之境以襲鄭可謂惡矣晉人敗之于殽其惡均矣程子謂晉子居喪未葬不可以從戎忘親背恵其惡甚矣左氏曰晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縦縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縦敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟眀視西乞術白乙丙以歸遂墨以葬文公晉於是始墨文嬴請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮於秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦仇亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君恵而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟眀孤之過也大夫何罪且吾不以一眚掩大徳愚謂此實傳也然居喪未𦵏爰及干戈為不孝一惡矣又援姜戎之兵以禍中國譬之引外侮以戕兄弟為不仁二惡矣雖舍三帥以為大徳似徳而非徳曽不足以贖其不義之罪也胡氏曰夫把子先軫之謀偷見一時之利徼倖其成自以為功者也二君皆過聴焉而貪其利是使為人臣者懐利以事其君為人子者懐利以事其父君臣父子去仁義懐利以相與利之所在則從之矣何有於君父故一失則夷狄再失則禽獸而大倫滅矣癸巳葬晉文公正傳曰書𦵏晉文公紀鄰國之大事也霸主之𦵏故赴之詳赴之詳故日以詳書之也諸侯於鄰國有弔喪㑹葬之禮焉穀梁謂日葬危不得葬者非也狄侵齊正傳曰書狄侵齊紀夷狄之犯中國也左氏曰因晉喪也夫因文公之喪而遂侵齊則晉之威足以懾狄人矣而晉不之恤可見伯者以力服人身死而隨滅也夫惟先王之威徳沒世為不亡矣公伐邾取訾婁秋公子遂帥師伐邾正傳曰訾婁邾地書公伐邾取訾婁秋公子遂帥師伐邾著不義之兵也夫兵者所以伐不庭也外是則為貪為忿為暴皆不義之兵也左氏曰公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾夫魯取訾婁則為貪兵報升陘之役則為忿兵既伐以取之矣又乗其不備而再伐凡二時而再伐焉則為暴兵此其不義甚矣胡氏曰此不勝忿欲報怨貪得恃强凌弱不義之兵也直書其事而罪自見矣或曰取須句訾婁有為為之也伐邾至于再三念母勤矣夫念母者必當止乎禮義平王不撫其民而逺屯戍于母家詩人刺之夫子録焉僖公以成風之有功于己也越禮以尊其身違義以報其怨殘民動衆取人之邑曽是以為可乎晉人敗狄于箕正傳曰箕者杜氏曰太原陽邑縣南有箕城左氏曰狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志于君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生此其實傳也愚謂書晉人敗狄于箕紀晉侯振復攘夷之功也狄嘗侵齊圍衛陵蔑中國晉文不能禦之而伯業衰矣襄公初立因狄見伐而敗之于箕盖其應敵攘夷之義雖墨衰從事可也冬十月公如齊十有二月公至自齊正傳曰書公如齊公至自齊著非禮也左氏曰公如齊朝且弔有狄師也夫諸侯聘㑹有常禮弔則弔朝則朝使大夫可也而遽輕易越境雜二事行之非禮也乙巳公薨于小寢正傳曰書公薨于小寢志薨之非正矣穀梁曰小寝非正也胡氏曰周制王宫六寢路寢一小寢五君日出而眡朝退適路寢聴政使人眡大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寝魯子以諸侯有三宫則列國之制盖降於王其以路寢為正則一爾君終不於路寢則非正矣曽子曰吾得正而斃焉又何求哉古人貴於得正乃如此凡此直書而義自見矣愚謂此云直書而義自見為得春秋之指隕霜不殺草李梅實正傳曰書隕霜不殺草李梅實公羊以為紀異也何異爾不時也周之冬十二月即夏之冬十月也陽氣在内陰氣在外正天地肅殺之時也而猶隕霜而猶不殺草則隂氣不固陽氣不藏故李梅結實非常之異也夫君相所職在燮理隂陽而化育萬物也今陰陽不和則君相失職而凶咎將至矣故春秋書以示後世胡氏曰哀公問於仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則其權必喪無以服萬民矣哀公欲去三桓張公室問社於宰我對以使民戰慄盖勸之斷也仲尼則曰成事不説既往不咎其自與哀公言乃以為可殺何也在聖人則能處變而不失其常在賢者必有小貞吉大貞凶之戒矣其論隕霜不殺草則李梅冬實盖除惡於微慮患於早之意也晉人陳人鄭人伐許正傳曰書晉人陳人鄭人伐許著不義之兵也左氏曰晉陳鄭伐許討其貳於楚也愚謂許貳於楚背中國而變夷狄固有罪矣晉襄不思父喪之未葬非有門庭之冦而從墨衰之例忘親動衆㑹諸侯以逺伐先世所不致之許其失道甚矣豈非不義之兵乎故春秋書以著其罪焉春秋正傳卷十六
