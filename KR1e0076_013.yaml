body:
  text: 春秋正傳卷十三明湛若水撰僖公惠王二十三年六年齊桓三十二年晉獻二十三年衛文六年蔡穆二十一年鄭文十九年曹昭八年陳宣三十九年杞成公元年宋桓二十八年秦穆六年楚成十八年春王正月正傳曰無事亦書義見于前夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城正傳曰新城鄭邑書公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城則鄭伯自致之禍諸侯擅興之罪並見矣左氏曰夏諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也齊桓倡攘夷尊華之義以寧周室鄭乃背之諸侯伐之乃其自取耳然齊桓摟諸侯以伐諸侯不請命於天王薄乎云耳烏得無罪秋楚人圍許諸侯遂救許正傳曰遂者繼事之詞承上伐鄭之師也書楚人圍許諸侯遂救許著桓公攘夷安華之義也穀梁曰善救許也左氏曰楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子于武城許男面縳銜璧大夫衰絰士輿櫬楚子問諸逄伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所楚子從之冬公至自伐鄭正傳曰書公至自伐鄭紀大事也國之大事在戎况大舉乎君舉必書况逺伐乎故書至則有反面告廟之禮焉胡氏謂以久而致非也穀梁曰其不以救許致何也大伐鄭也胡氏曰齊自召陵之後兵服四夷威動諸夏今合六國之師圍新造之邑宜若振槁然圍而不舉有遺力者矣及楚之攻許即解新城之圍移師救許是又得討罪分灾救急之義也故特書曰楚人圍許諸侯遂救許凡書救者未有不善之也其曰遂救許善之尤者也惠王二十四年七年齊桓三十三年晉獻二十四年衛文七年蔡穆二十二年鄭文二十年曹昭九年卒陳宣四十年杞成二年宋桓二十九年秦穆七年楚成十九年春齊人伐鄭正傳曰再書齊人伐鄭著已甚之兵也夫齊桓初以諸侯之師倡大公以伐逃盟之鄭而圍新城不遂入而遂救許可謂仁義之兵矣今諸侯之兵既散乃又自伐鄭焉其不公無王之心可見矣左氏曰齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君愚謂鄭伯背晉即楚與楚合而未離又不知事大鄭之自取此實傳也張氏曰鄭未服故復伐齊力足以制之不煩諸侯也夫鄭既未服初以諸侯伐之今復以諸侯之兵次于其郊而問罪焉可也乃釋天下之大義而恃一已之私憤以自行伐焉何以示大公之義於天下也夏小邾子來朝正傳曰小邾子者杜氏云郳黎來始得王命而來朝邾之别封故曰小邾子來朝志小邦之禮也鄭殺其大夫申侯正傳曰申侯鄭大夫書鄭殺其大夫申侯罪擅殺也夫命德討罪皆天子之事諸侯之大夫皆命於天子有罪則請命以刑之可也今乃不請而殺之是無王非義之甚矣鄭殺申侯即左氏載鄭伯所謂吾知所由來者也左氏曰夏鄭殺申侯以說于齊且用陳轅濤塗之譛也初申侯申出也有寵於楚文王楚文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵于厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已愚謂此實傳也濤塗見執於齊申侯之言為之也申侯以言賈禍幾危國家罪當殺也鄭伯不請而專殺之此春秋所以罪之耳胡氏曰鄭伯不知自反內忌聽讒而擅殺其大夫信失刑矣如申侯者其見殺何也專利而不厭則足以殺其身而已矣秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧母正傳曰寧母魯地書公㑹齊侯宋公陳世子欵鄭世子華盟于寧母則霸者之情見矣霸者以力服人者也㑹諸侯將以服鄭也此桓志何以首言公內史之詞也左氏曰秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷逺以德德禮不易無人不懷齊人修禮於諸侯諸侯官受方物鄭伯使大子華聽命於㑹言於齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今苟有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫諸侯之㑹其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯請盟于齊愚謂此實傳也於此見桓公之所以為霸管仲之所以為霸佐何謂霸佐觀管仲之言有意於服人也曹伯班卒正傳曰班曹伯名書曹伯班卒紀與國之大故也諸侯有恤災之義有赴則史書之公子友如齊正傳曰書公子友如齊紀聘禮之不時也汪氏曰甫盟寧母而又使季友修聘所以勤霸國之好也愚謂書曰禮煩則亂其是之謂乎冬葬曹昭公正傳曰書冬葬曹昭公紀與國之大事也惠王二十五年崩八年齊桓三十四年晉獻二十五年衛文八年蔡穆二十三年鄭文二十一年曹共公襄元年陳宣四十一年杞成三年宋桓三十年秦穆八年楚成二十年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟正傳曰洮曹地書公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮見王人來而公與諸侯盟之也書鄭乞盟者著鄭伯之服罪也首王人者尊王命也左氏曰春盟于洮謀王室也鄭伯乞盟請服也襄王定位而後發喪愚謂觀王人之來必為王室也此云謀王室是有變乃謀也又云襄王定位而後發喪則惠王崩于去冬亦略可知矣然而至冬厯三時乃書崩者豈以諸侯雖以盟定之大叔帶之餘難未已如周三監之延禍然至冬乃底定而告喪史但因其告時而書之耶未可知也始而逃歸今則乞盟於此見舉動人君之大節不可不慎也夏狄伐晉正傳曰狄北狄書狄伐晉紀中國之不振旅也左氏曰晉里克帥師梁由靡御虢射為古以敗狄于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月愚謂此實傳也然晉不與齊桓之盟以攘夷狄故狄人侮之吳氏曰齊桓嘗存邢而未能挫狄師故狄無所忌而伐晉春秋傷齊霸之不能攘夷狄也秋七月禘于大廟用致夫人正傳曰書禘于太廟用致夫人著失禮之中又失禮也魯不宜禘一失禮也用致夫人二失禮也胡氏曰禘用致夫人禮大禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之禮樂也踐其位則行其禮奏其樂故雍禘太祖周頌也而其詩曰相維辟公天子穆穆周公人臣不踐其位魯侯國而用天子之禮亂名犯分莫大乎是故夫子志之曰郊社之禮所以祀上帝也宗廟之禮所以祀乎其先也魯侯國而以王禮祀大廟是誣僞不誠而非所以祀乎其先矣故夫子傷之曰禘自既灌而往者吾不欲觀之夫灌以降神乃祭之始而已不欲觀是自始至終皆非禮矣愚謂此用禘大廟之非禮也又曰夫人者風氏也初成風聞季友之繇遂事之而屬僖公焉故季子立之公賜季友汾陽之田及費又生而命之氏俾世其卿而私門強矣於成風則舉大事於始祖之廟立以為夫人而嫡妾亂矣以私勞寵其臣而卑公室以私恩崇其母而輕宗廟皆越禮之罪愚謂此用致夫人之非禮也冬十有二月丁未天王崩正傳曰書天王崩紀天下之大變也天下宜三年如喪考妣四海遏密八音諸侯有奔赴之禮焉是以書之左氏曰冬王人來告喪難故也是以緩又按七年冬左氏曰七年閏月惠王崩襄王惡大叔之亂懼不立不發喪而告難于齊然次年正月齊與諸侯盟定之矣越一年至冬十二月乃告喪何耶疑以傳疑可也襄王元年九年齊桓三十五年晉獻二十六年卒衛文九年蔡穆二十四年鄭文二十二年曹共二年陳宣四十二年杞成四年宋桓三十一年卒秦穆九年楚成二十一年春王正月丁丑宋公御說卒正傳曰御說宋公名書宋公御說卒紀與國之大故也諸侯有恤災之義故有赴則書之公羊謂不書葬為襄公諱非也啖氏以為魯不㑹耳是也則凡書葬者皆㑹也夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘正傳曰宰周公者猶言宰周之公以冢宰兼三公天子之為政者也即左氏所謂宰孔也宋稱子以在喪未葬也左氏曰夏㑹于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耄老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受愚謂此實傳也可以見齊桓尊周之義矣書公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘大尊周之義也宰周公來而齊桓帥諸侯㑹之于葵丘也秋七月乙酉伯姬卒正傳曰伯姬公女之未適人者書伯姬卒紀內之大事也鄉鄰有喪猶當匍匐弔之舂不相不巷歌同居者猶生緦况國君之女乎啖氏曰內女為夫人書卒許嫁為夫人亦然禮諸侯姑姊妹女子子嫁為諸侯夫人則服大功是諸侯有大功服也汪氏謂大功以下則無服諸侯絶期然所謂絶期者絶傍期也若夫子女之服父母三年父母服之期乃報服也正期也若以為絶期則禮何以有服女嫁諸侯以大功之文况女子出嫁者宜降室女一等則未適人又不止大功矣公穀曰婦人許嫁字而笄之死則以成人之禮治之理或然也惟其喪而服之是以書之九月戊辰諸侯盟于葵丘正傳曰諸侯者即上所叙之諸侯也書諸侯盟于葵丘著桓公之美惡也何以為惡曰不言宰者宰不與也左氏謂宰孔先歸遇晉侯曰可無㑹也齊侯不務德而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還公羊又曰貫澤之㑹桓公有憂中國之心不召而至者江人黃人也葵丘之㑹桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫若我也愚謂觀宰周公之不與理則然也是之謂惡何以為美曰穀梁曰葵丘之盟陳牲而不殺讀書加於牲上一明天子之禁初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好束牲載書而不㰱血也尊天子之禁不㰱血以要神是之謂美然而徒尊天子之禁而不能帥諸侯朝天子以盡臣職反假以服諸侯使宗已而肆其專征伐之侈心必合左氏公羊之論與穀梁孟子之論然後桓之美惡見而功罪兩著也甲子晉侯詭諸卒正傳曰詭諸晉侯名書晉侯詭諸卒著恤鄰之義也左氏曰九月晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀息曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎愚謂此實傳也冬晉里克殺其君之子奚齊正傳曰里克晉大夫書里克殺其君之子奚齊紀鄰國之大變也稱君之子穀梁以為國人不子非也是猶朝覲訟獄謳歌不之益而之啓曰吾君之子云耳夫君之子即有君道焉里克殺奚齊以臣弒君人倫之大變故聖人因史之文筆之以示戒左氏曰冬十月里克殺奚齊于次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉襄王二年十年齊桓三十六年晉惠公夷吾元年衛文十年蔡穆二十五年鄭文二十三年曹共三年陳宣四十三年杞成五年宋襄公兹父元年秦穆十年楚成二十二年春王正月公如齊正傳曰書公如齊譏始朝齊也諸侯見天子曰朝五年一朝諸侯使大夫來相見則聘今魯僖忘讎畏勢不朝天子而朝齊故春秋書以譏之狄滅溫溫子奔衛正傳曰溫即司冦蘇公之後國于溫故謂之溫書狄滅溫溫子奔衛紀夷狄陵中國也左氏曰春秋滅溫蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛愚謂齊與諸侯不能攘夷尊華此王道之所以衰而伯圖之所以不競也晉里克弒其君卓正傳曰卓稱君荀息已立之也觀左傳言里克殺之于朝可見書晉里克弒其君卓誅弒逆之賊也克者世子申生之傅也奚齊卓則克之讐也其連弒二君豈不曰復吾君之讐也殊不知立之為君則君矣將欲復讐乃弒君也當驪姬將殺世子而難里克使優施飲之酒而以告其故里克聽其謀乃欲以中立自免稱疾不朝居三旬而難作是謂持祿容身速獻公殺適立庶之禍者里克也趙盾出不越境入不討賊春秋猶書弒其君若里克者實與知殺太子申生之謀雖書曰弒其太子申生可也而可以自免乎其後乃又弒奚齊卓子是弒三君矣胡氏曰使克明於大臣之義據經廷諍以動其君執節不二固太子以攜其黨多為之故以變其志其濟則國之福也其不濟而死於其職亦無歉矣人臣所明者義於功不貴幸而成所立者節於死不貴幸而免克欲以中立祈免自謂智矣而終亦不能免等死耳不死於世子而死於弒君其亦不知命之蔽哉語曰不知命無以為君子也為人臣而不知春秋之義者必陷於篡弒誅死之罪克之謂也愚謂克連弒三君天下之大惡而不以赦者胡氏以此責之豈其倫耶及其大夫荀息正傳曰及者猶并殺之也書及其大夫荀息著里克之逆暴荀息之死忠也公羊曰荀息可謂不食其言矣其不食其言奈何奚齊卓子者驪姬之子也荀息傅焉驪姬者國色也獻公愛之甚欲立其子於是殺世子申生申生者里克傅之獻公病將死謂荀息曰士何如則可謂之信矣荀息對曰使死者反生生者不愧乎其言則可謂信矣獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立幼如之何願與子慮之荀息曰君常訊臣矣臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退弒奚齊荀息立卓子里克弒卓子荀息死之荀息可謂不食其言矣愚謂此實傳也胡氏曰孰有可託六尺之孤寄百里之命臨死節不可奪如息者哉自古皆有死民無信不立故聖人以信易食而君子以信易生息不食言其可少乎愚謂如公羊胡氏之言荀息誠信矣然而仁則吾不知也以荀息之忠信以傅奚齊卓子當獻公之蠱惑宜引之以當道而志於仁使嫡庶之分明而上下之義定獻公不陷於殺嫡立庶之惡而後遂免奚齊卓子見殺之慘則君豈不為仁君臣豈不為仁德之臣保其三子諭之德義安其身以安社稷萬世稱賢可也不知出此而從君於邪乃以不食言為信為忠是匹夫匹婦之為諒也君子貞而不諒天下大信其可得乎里克雖陷於大逆吾猶憫其志焉耳夏齊侯許男伐北狄正傳曰書齊侯許男伐北狄著窮兵黷武之罪也聖人之於要荒以羈縻待之來則驅之去則不逐是之謂得勝算今許方患楚而毆之逺伐北狄勝之不足以為武一失利則反為外域所輕非以全取勝攘夷圖霸之略也宰孔謂其不務德而勤逺略不亦宜乎晉殺其大夫里克正傳曰書晉殺其大夫里克則討罪之義隱矣何以隱若里克者志在重耳撥亂反正以報太子申生也其大夫云者重耳之大夫忠於重耳太子者也然而克實申生奚齊卓子之弒賊矣是可殺也何謂可以殺里克聽驪姬之邪謀而中立稱疾不朝以成太子之禍又不死難遂弒二君則可以殺矣左氏曰夏四月周公忌父王子黨㑹齊隰朋立晉侯晉侯殺里克以說將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死愚謂里克連弒三君宜尸諸市朝以正其罪而乃止如此故曰討罪之義隱矣穀梁曰獻公伐虢得驪姬獻公私之有二子長曰奚齊稚曰卓子驪姬欲為亂故謂君曰吾夜者夢夫人趨而來曰吾苦畏胡不使大夫將衛士而衛冢乎公曰孰可使曰臣莫尊於世子則世子可故君謂世子曰驪姬夢夫人趨而來曰吾苦畏女其將衛士而往衛冢乎世子曰敬諾築宫宫成驪姬又曰吾夜者夢夫人趨而來曰吾苦飢世子之宫已成則何為不使祠也故獻公謂世子曰其祠世子祠已祠致福於君君田而不在驪姬以鴆為酒藥脯以毒獻公田來驪姬曰世子己祠故致福於君君將食驪姬跪曰食自外來者不可不試也覆酒於地而地賁以脯與犬犬死驪姬下堂而啼呼曰天乎天乎國子之國也子何遲於為君君喟然歎曰吾與女未有過切是何與我之深也使人謂世子曰爾其圖之世子之傅里克謂世子曰入自明則可以生世子曰吾君已老矣已昏矣吾若此而入自明則驪姬必死驪姬死則吾君不安所以使吾君不安者吾不若自死吾寧自殺以安吾君以重耳為寄矣刎脰而死故里克所為弒者為重耳也夷吾曰是又將殺我也胡氏曰若惠公既立而謂克曰先君命大夫為世子傅世子死非其罪而大夫不之恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣秋七月正傳曰無事亦書義見于前冬大雨雪正傳曰雨者從天而下如雨然也書冬大雨雪者公羊以為記異也何以為異也周之冬酉戌亥月即夏之八九十月也是時隂結而未凝故唐氏曰此以時書申酉戌月皆非大雨雪之時也故此尤為異愚謂於此亦見周時之不同矣若夏之冬正雨雪之時何以為異襄王三年十有一年齊桓三十七年晉惠二年衛文十一年蔡穆二十六年鄭文二十四年曹共四年陳宣四十四年杞成六年宋襄二年秦穆十一年楚成二十三年春晉殺其大夫㔻鄭父正傳曰㔻鄭父晉大夫也書晉殺其大夫㔻鄭父則討罪之義隱矣曰其大夫云者猶言重耳之大夫也㔻鄭者重耳申生之忠臣也左氏曰春晉侯使以㔻鄭之亂來告故紀之太子申生賢子也孝也獻公蠱惑於驪姬用其譛而殺之立其子奚齊里克太子申生之傅而㔻鄭其大夫也太子死二人有撥亂反正之志故克殺奚齊卓子㔻鄭告秦蓋欲為重耳也左氏曰㔻鄭之如秦也言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣以此觀之二人為重耳也為重耳者奚齊卓子之賊臣乃重耳之忠臣也申生之忠臣也二人欲立重耳將撥亂反正以報太子申生然而不知春秋之義自陷弒逆之罪而不自知矣夏公及夫人姜氏㑹齊侯于陽穀正傳曰書公及夫人姜氏㑹齊侯于陽穀著非禮也諸侯相㑹好猶有禮節况婦人乎故陽穀之㑹有二失禮焉婦人不出梱閾父母在則嵗歸寧為父母也而與公及齊侯㑹于野一失禮也公與齊侯㑹之非時而以婦人參焉無內外男女之别則二失禮也許氏曰以公夫人陽穀之㑹觀之齊桓伯業怠矣愚謂久假而不歸齊桓未之有焉秋八月大雩正傳曰雩者旱而禱雨之祀大雩者天子禱雨之名書秋八月大雩著非禮也臨川吳氏曰諸侯旱而雩禮也大雩祀及上帝非禮也愚謂天子祭天地諸侯祭山川魯以諸侯而雩于天則僣矣周之秋午未申月即夏之五六七月正憂旱之時故穀梁以為雩月正也於此亦可以見周之改時矣冬楚人伐黃正傳曰黃小國近楚者書楚人伐黃著夷狄之犯中國也左氏曰黃人不歸楚貢冬楚人伐黃胡氏曰按穀梁子曰貫之盟管敬仲言於桓公江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也逺國慕義背夷即華所謂出自幽谷遷于喬木春秋之所取也被兵城守更厯三時告命已至而援師不出則失救患分災攘夷狄安與國之義矣滅弦滅溫皆不書伐滅黃而書伐者罪桓公既與㑹盟而又不能救也愚謂初江人黃人與盟于貫已為楚人所疾矣今被兵而齊不能救桓公之伯業衰矣襄王四年十有二年齊桓三十八年晉惠三年衛文十二年蔡穆二十七年鄭文二十五年曹共五年陳宣四十五年卒杞成七年宋襄三年秦穆十二年楚成二十四年春王三月庚午日有食之正傳曰書日有食之紀天變也夏楚人滅黃正傳曰書楚人滅黃罪蠻荆之暴橫而霸主之不能救也前十一年冬楚人伐黃矣厯三時報久至而諸侯之救援不至此黃之所以滅也左氏曰黃人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃穀梁曰貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也胡氏曰於禮為合於時為不幸若江黃二國是也其書滅者見楚人之強罪諸侯之弱責方伯連帥之不修其職使小國賢君困於強暴不得其所是也其又謂公羊子所謂亡國之善詞上下之同力者則泥矣秋七月正傳曰無事亦書義見于前冬十有二月丁丑陳侯杵臼卒正傳曰杵臼陳侯名書陳侯杵臼卒紀與國之大故也著恤災也襄王五年十有三年齊桓三十九年晉惠四年衛文十三年蔡穆二十八年鄭文二十六年曹共六年陳穆公欵元年杞成八年宋襄四年秦穆十三年楚成二十五年春狄侵衛正傳曰書狄侵衛著華夏之見陵伯圖之不競也胡氏曰齊桓公為陽穀之㑹是肆于寵樂其行荒矣楚人伐黃而救兵不起是忽于簡書其業怠矣然後狄人得以肆暴今年侵衛明年侵鄭近在王都之側淮夷亦來病把而不忌也伯益戒于舜曰無怠無荒四夷來王此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書于䇿其義則游聖門者默識於言意之表矣愚謂此正吾今之說而孔子所以謂其義則丘竊取之者也何嘗顯然改其文耶惜乎明于此而昧于其他夏四月葬陳宣公正傳曰書夏四月葬陳宣公紀恤鄰之大義也而其葬之得禮見矣宣公卒於十一年冬十二月至是五月矣諸侯五月而葬禮也葬則有赴有㑹葬之禮焉故書之公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹正傳曰書㑹于鹹著勤王之義也穀梁曰兵車之㑹也左氏曰夏㑹于鹹淮夷病把故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之秋九月大雩正傳曰周之季秋九月即夏之孟秋七月正農人憂旱之時若以九月為夏之九月則五穀成熟非用雨之時矣書秋九月大雩著禮之非也大雩者祀上帝天子行之諸侯僣用非禮也冬公子友如齊正傳曰書公子友如齊紀大夫之出境也禮大夫非君命不出境出境史必書之是疑於非禮矣然繼是即有諸侯城緣陵之事殆為是乎則又疑於得禮矣諸儒謂春秋凡於書必有一宇褒貶善惡若此一節於經何所據以見善惡耶襄王六年十有四年齊桓四十年晉惠五年衛文十四年蔡穆二十九年卒鄭文二十七年曹共七年陳穆二年杞成九年宋襄五年秦穆十四年楚成二十六年春諸侯城緣陵正傳曰書諸侯城緣陵著霸者恤鄰之義也左氏曰春諸侯城緣陵而遷把焉蓋淮夷病把諸侯㑹于鹹城緣陵以遷把避之也以諸侯之力非不能救以把不幸與淮夷為鄰所謂切近災者也故合謀遷其城以避之其恤小之義見矣而公羊乃起專封之說胡氏從之誤矣夫所謂封者必分之茅而胙之土命之誥而錫之車服焉也此與大王避狄遷岐之事何以異乃以為專封之罪乎然而不告于天子而擅與諸侯遷之以此責之必無詞矣夏六月季姬及鄫子遇于防使鄫子來朝正傳曰季姬僖公之季女未適人及猶與也防魯地書季姬及鄫子遇于防使鄫子來朝則三失禮可見矣來朝者公穀皆以為來請已也胡氏又有春秋內女適人繫諸國之說其未適人書其字之說季姬書字而未繫諸國明其女而非婦之說及者內為志之說朝不言使言使非正之說季姬使之朝病鄫之說則皆陷於義例之蔽而非春秋直書見義之道矣愚謂斯舉也於是乎見三綱之絶矣夫父之於子有君道焉故曰家有嚴君父之謂也僖公溺愛其季女不能教以內外之别使自擇配又使之肆其欲出遇諸侯于外失君道父道矣鄫子以國君丈夫而為婦人所使朝魯以定昏失夫道矣愚故曰於是乎見三綱之絶矣秋八月辛卯沙鹿崩正傳曰沙鹿杜氏以為山名平陽元城縣有沙鹿土山在晉地書沙鹿崩紀異也公羊曰外異不書此何以書為天下紀異也左傳卜偃曰期年將有大咎幾亡國愚謂地道靜也載華嶽而不重今沙鹿崩是大異也夫天地者繫天下之事也今地道虧非小咎故書胡氏曰詩稱百川沸騰山冡崒崩言西周之將亡也書沙鹿崩於前書獲晉侯於後雖不指其事應而事應具存此春秋畏物之反常為異使人恐懼修省之意也其垂戒明矣狄侵鄭正傳曰書狄侵鄭著夷狄犯中國而霸圖之衰也張氏曰狄數犯畿內之諸侯而齊桓不能治自入衛伐邢滅溫而至此霸圖弱而王室卑諸侯受禍著桓公之怠也冬蔡侯肸卒正傳曰書蔡侯肸卒紀鄰國之大故有赴則史書之聖人筆之致恤鄰之義耳穀梁謂諸侯時卒惡之是義例之非也襄王七年十有五年齊桓四十一年晉惠六年衛文十五年蔡莊公甲午元年鄭文二十八年曹共八年陳穆三年杞成十年宋襄六年秦穆十五年楚成二十七年春王正月公如齊正傳曰如齊者朝齊也周禮諸侯世相朝也諸侯於天子猶五年一朝禮也魯僖公十年朝齊今十有五年又朝齊是以朝天子之禮事齊而非諸侯相朝之禮矣故書十有五年春王正月公如齊譏失禮也楚人伐徐正傳曰書楚人伐徐紀夷狄犯中國也而霸圖之衰亦可見矣左氏曰徐即諸夏故也吳氏曰徐楚僣王同惡者也因齊桓之合諸侯匡天下徐亦革面而即諸夏以即諸夏為楚所伐愚謂徐背夷而向華見伐於楚而齊桓不能帥中國之諸侯以救之故曰見霸圖之衰也三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘正傳曰書公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘著㑹盟之非禮也易曰初筮告再三瀆瀆則不告人神之理一也左氏曰盟于牡丘尋葵丘之盟耳救徐也夫葵丘之盟所謂初筮也又㑹牡丘以尋前盟則可以見人心之離怠矣尋而盟之其可以復結乎以是心而救徐其可克乎故誠者感人心之本也盟者不誠之幾也故曰盟于牡丘著㑹盟之非禮也是以春秋無善盟遂次于匡正傳曰書遂次于匡著救徐之不力也穀梁曰遂繼事也次止也有畏也愚謂以齊桓之強帥列國之衆何畏於楚桓公之心既蠱是先不誠矣則列國之人心感之是亦以不誠焉於是乎解體矣是以有尋盟焉惟尋盟而不信是以有次焉其勢使之然也孟子曰壯者以暇日修其孝弟忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣苟仗其忠信而往雖匹夫可也而况以齊之強列國之衆乎公孫敖帥師及諸侯之大夫救徐正傳曰敖慶父之子魯大夫也書公孫敖帥師及諸侯之大夫救徐善其救患而憾其不力也夫救徐善也而使大夫行其不力甚矣左氏曰孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之愚謂桓公攘夷安夏之心怠而霸業衰矣夫惟心之蠱是以不誠不誠則不信不信則尋盟尋盟則次于匡次于匡而使大夫以往救其勢使之然也故胡氏曰楚都于郢距徐亦逺而舉兵伐徐暴橫憑陵之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見霸主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而禦夷狄安中國之志怠矣凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能久而無以固其國矣夏五月日有食之正傳曰書日有食之紀天變也迅雷風烈必變聖人之心也所以致修省之意以為後世人君警也左氏曰不書朔與日官失之也愚謂然則史氏亦有失之者多矣諸儒以一字取義者不亦侮聖經矣乎秋七月齊師曹師伐厲正傳曰厲在徐揚之間義陽隨縣北有厲鄉書齊師曹師伐厲善之也善救徐也左氏曰秋伐厲以救徐也愚謂左氏必有所據兵法曰攻所必救杜氏曰厲楚之與國伐厲者致楚之必救所以解徐也故春秋善之八月螽正傳曰螽穀梁曰蟲災也蟲之害禾者周之八月即夏之六月正苗長之時而有螽則害苗也書八月螽紀災異也所以憂民食也九月公至自㑹正傳曰書公至自㑹紀反面也君舉必書况兵車大事乎危事乎况出告則有反面之禮乎季姬歸于鄫正傳曰婦人謂嫁為歸書季姬歸于鄫終始乎昏禮之非也夫昏禮有納采問名納幣請期所以逺嫌而致重也季姬始遇鄫子于防以自擇配則所謂納采問名諸禮皆廢無乃苟合耳此又書其歸所以終其禮之非也己卯晦震夷伯之廟正傳曰己卯者日也晦者日之晦冥也夷伯者魯大夫展氏之祖父夷其諡伯其字書己卯晦震夷伯之廟紀異也為展氏紀也左氏震夷伯之廟罪之也於是展氏有隱慝焉穀梁曰因此以見天子至于士皆有廟天子七廟諸侯五大夫三士二故德厚者流光德薄者流卑是以貴始德之本也始封必為祖胡氏謂曰震夷伯之廟者天應之也天人相感之際微矣愚謂君子之澤五世而斬故自天子至於士庶人五等之服同記曰祭繼養也五世而上則親盡而服窮五世而下親未盡而服未窮則繼養之恩未絶故髙曽祖考四代有服則亦四代有祭蓋親親之義無貴賤一也天子亦四親廟與始祖之廟而五有功德則不祧故加二而七書曰七世之廟可以觀德是也諸侯亦四親廟與始封之廟而五諸侯無功德之祖故止於五大夫士亦四親祭與始分之祖而五大夫富於士故大夫三廟士二廟官師一廟以其貧富為差而制其廟之數故禮有曰祖禰同廟夫祖者髙曽祖也禰者考也其實四代之供養皆同若云一廟一代則親未盡而可以不服乎夫祭由服生者也官師一則知父而不知祖為禽道矣豈理也哉冬宋人伐曹正傳曰書宋人伐曹著霸圖之衰也左氏曰討舊怨也夫宋與曹同盟而云凡我同盟之人既盟之後言歸于好今乃擅興以伐同盟之人尚可謂之霸乎楚人敗徐于婁林正傳曰婁林徐地書楚人敗徐于婁林罪諸侯之不克救也左氏曰楚敗徐于婁林徐待救也愚謂待救而救不至春秋記之以見上無王法下無霸圖也十有一月壬戌晉侯及秦伯戰于韓獲晉侯正傳曰韓地名書晉侯及秦伯戰于韓獲晉侯則秦君之仗義而晉君之背德皆可見矣左氏曰晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉三敗及韓秦伯獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君覆后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君十月晉隂飴甥㑹秦伯盟于王城對秦伯曰小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是嵗晉又飢秦伯又饋之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大愚謂此其實傳也於此可以見秦晉之得失矣按此傳則晉侯蒸於賈君一不德也負約而不納羣公子許賂以地而不信二不德也忘秦輸粟恤災之義而閉之糴三不德也秦伐之仗此義矣及秦獲晉侯以歸改館饋牢以德禮而還之又從而饋其飢恤其災而矜其民不忘唐叔之舊焉秦伯可謂善補過矣春秋正傳卷十三
