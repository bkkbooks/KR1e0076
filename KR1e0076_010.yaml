body:
  text: 春秋正傳卷十明湛若水撰莊公惠王七年二十有四年齊桓十六年晉獻七年衛惠三十年蔡穆五年鄭文三年曹僖公赤元年陳宣二十三年杞惠三年宋桓十二年秦宣六年楚成二年春王三月刻桓宫桷正傳曰刻者刻鏤之也書刻桓宫桷著非禮也左氏曰春刻其桷皆非禮也御孫諌曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎榖梁曰禮天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也刻桓宫桷丹桓宫楹斥言桓公以惡莊也胡氏曰公將逆姜氏丹桓宫之楹刻其桷為盛飾以誇示之此非特有童心而已自常情觀之丹楹刻桷宜若小失而春秋詳書于䇿御孫以為大惡何也桓公見殺于齊則不能復而盛飾其宫誇示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知為大惡而不敢盡言春秋謹禮於微正後世人主之心術者也故詳書于䇿斥言桓宮以惡莊為後鑒也葬曹莊公正傳曰書葬曹莊公著恤鄰之大事也有報則史書之也鄰國有賻贈之義焉夏公如齊逆女正傳曰書公如齊逆女著昏讎之非也榖梁曰親迎恆事也不志此其志何也不正其親迎於齊也公羊以親迎為禮者非矣秋公至自齊正傳曰書公至自齊始終乎昏讎之非也至者必反靣告廟則將曰某親迎於齊而還桓公親見殺于齊者也則將謂何故曰始終乎昏讎之非也八月丁丑夫人姜氏入正傳曰書八月丁丑夫人姜氏入著昏禮之非也左氏曰秋哀姜至而書八月丁丑者見不與公同至也何以不與公同至至則見廟則廟有弗受弗受讎人之女薦食也義不在入之一字其言難詞不順之詞其言惡入皆非也胡氏曰昏義以正為先而公不與夫人皆至姜氏不從公而入已失夫婦之正弒閔孫邾之亂兆矣莊公不勝其母越禮踰時俟仇人之女薦舍於宗廟以成好合卒使宗嗣不立弒逆相仍幾至亡國故春秋詳書其事以著莊公不孝之罪為後戒也戊寅大夫宗婦覿用幣正傳曰宗婦者大夫之妻也覿見也書戊寅大夫宗婦覿用幣則其男女同禮之非失正始之道可見矣左氏曰公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎胡氏曰禮夫人至大夫郊迎明日執贄以見又曰男女同贄是無别公子牙慶父之亂兆矣春秋詳書正始之道也大水正傳曰高下皆水曰大水書大水紀災也著重民食之義焉冬戎侵曹曹羈出奔陳赤歸于曹正傳曰羈公羊以為大夫杜預以為世子皆非也以經羈赤出歸之文觀之則臨川吳氏以為世子嗣位是也書戎侵曹曹羈出奔陳赤歸于曹則夷狄陵中國羈不能守社稷赤為戎所納之罪並見矣賈氏曰赤戎之外孫杜氏曰赤曹僖公蓋為戎所納吳氏曰上年十二月曹莊公卒今年三月葬則羈以世子嗣位葬其先君至是冬在位期年矣為戎所逐而出愚故曰夷狄犯中國羈不能守社稷赤為戎所納之罪並見矣其羈赤皆書名而不書爵史之文耳不係此以為褒貶也郭公正傳曰郭者小國名郭公公榖皆以為赤非也惟胡氏以為當作郭亡之衍文是也然此或春秋成後流傳之誤未必聖人之闕文也若聖人之闕文何所取義乎於此見先儒多執經文以起義例安知其非有衍文闕文存乎其間乎書郭亡史紀小國之變也有報則史書之聖人存之見恤小之義耳胡氏曰先儒或以為郭亡者於傳有之齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事謂之郭亡理或然也夫善善而不能用則無貴於知其善惡惡而不能去則無貴於知其惡未之或知者猶有所覬也夫既或知之矣不能行其所知君子所以高舉逺引小人所以肆行而無忌憚也然則非有能亡郭者郭自亡爾惠王八年二十有五年齊桓十七年晉獻八年衛惠三十一年卒蔡穆六年鄭文四年曹僖二年陳宣二十四年杞惠四年宋桓十三年秦宣七年楚成三年春陳侯使女叔來聘正傳曰女叔者杜氏以為女氏叔字也書陳侯使女叔來聘紀諸侯交聘之始也稱字不名史臣之詞非有他義義在紀其始加聘禮也左氏以為嘉之故不名榖梁以為天子之命大夫皆非也此獨書春而不言王正月史失之耳則他以王不王月日不月日為義者惑矣夏五月癸丑衛侯朔卒正傳曰書夏五月癸丑衛侯朔卒紀鄰國之大故赴之詳故史書之詳聖人筆之於冊取恤鄰之義也可見此名之與日之無他義矣則夫諸儒治春秋者類以日為詳而謹書之以為與之者則此又何說乎六月辛未朔日有食之鼓用牲于社正傳曰朔者榖梁以為食正朔也書六月辛未朔日有食之鼓用牲于社紀天變著非禮也榖梁曰鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也胡氏曰鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣伯姬歸于杞正傳曰婦人謂嫁為歸莊氏曰伯姬莊公女書伯姬歸于杞紀昏禮也昏禮之大者故史書之聖人存之其不言逆史逸之耳胡氏以其非卿其姓名不登於史䇿可乎遂以為志其非禮可乎及榖梁以為不言逆逆之道微皆非也秋大水鼓用牲于社于門正傳曰榖梁以為高下有水災曰大水書秋大水鼓用牲于社于門著非禮也左氏曰凡天災有幣無牲非日月之眚不鼓公羊曰其言于社于門何于社禮也于門非禮也愚謂于社固為禮然而虛禮也求之于神而不反之于己以恐懼修省非應天之實也苟能恐懼修省以正其本燮理隂陽隂陽和而雨暘時若何有隂盛陽微之咎而致大水之災乎冬公子友如陳正傳曰友莊公之母弟也如陳報聘也書冬公子友如陳紀報聘之禮邦交之宜也惠王九年二十有六年齊桓十八年晉獻九年衛懿公赤元年蔡穆七年鄭文五年曹僖三年陳宣二十五年杞惠五年宋桓十四年秦宣八年楚成四年春公伐戎正傳曰此亦不書王某月史逸之耳議見前書公伐戎著攘夷尊華之義也夏公至自伐戎正傳曰書公至自伐戎紀反靣之禮而以伐戎告也始終乎伐戎之義也曹殺其大夫正傳曰書曹殺其大夫著専殺之罪也大夫不名者史逸其名耳義不重於名而重於専殺故略之也胡氏分别名與不名之義則泥矣經中逸名闕文衍文者多矣豈皆足以憑據而考信耶胡氏又有稱國以殺者國君大夫與謀其事不請於天子而擅殺之之說皆泥文之弊也又曰古者諸侯之卿大夫士命于天子而諸侯不敢専命也有罪則請於天子而諸侯不敢専殺也及春秋時國無大小卿大夫士皆専命之而不以告于王朝有罪無罪皆専殺之而不以歸於司冦無王甚矣五伯三王之罪人而葵丘之㑹猶曰無専殺大夫故春秋明書于䇿備天子之禁也愚謂此論是矣然則稱人稱爵者夫子獨得而與奪之耶秋公㑹宋人齊人伐徐正傳曰人者衆稱之詞而以為將卑師少之名乃諸儒之私例也書公㑹宋人齊人伐徐紀國之大事也國之大事在祀與戎故舉必書之魯公前追戎伐戎今又伐徐者胡氏曰按書伯禽嘗征徐戎則戎在徐州之域為魯患舊矣是年春公伐戎秋又伐徐者必戎與徐合兵表裏為魯國之患也愚謂徐與戎為黨所謂中國而夷狄則夷狄之者也故魯莊前年追戎今春伐戎秋又伐徐皆應敵攘夷之兵春秋書之非貶也冬十有二月癸亥朔日有食之正傳曰書癸亥朔日有食之紀天變也惠王十年二十有七年齊桓十九年晉獻十年衛懿二年蔡穆八年鄭文六年曹僖四年陳宣二十六年杞惠六年宋桓十五年秦宣九年楚成五年春公㑹杞伯姬于洮正傳曰杞伯姬莊公之女嫁于杞者也洮魯地書春公㑹杞伯姬于洮著相㑹之非禮也禮內言不出於梱外言不入於梱况肯相㑹耶况肯相㑹于野外耶左氏曰非事也天子非展義不巡守諸侯非民事不舉卿非君命不越境胡氏曰伯姬莊公之女非事而特㑹于洮愛其女之過而不能節之以禮此春秋之所禁也惟不節之以禮然後有使自擇配如僖公之於季姬而典訓亡矣夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽正傳曰書公㑹齊侯宋公陳侯鄭伯同盟于幽大其同志之義也程子曰同志而盟非率之也榖梁曰同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也又曰衣裳之㑹十有一未嘗有歃血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也愚謂同盟尊周故春秋以其同取之胡氏以為鄭伯之所欲而書同者非也然而鄭伯嘗二於齊矣今亦同盟者蓋至是齊桓强盛有伯中國攘夷狄之勢諸侯皆歸故鄭有畏服之心左氏以為同盟于幽陳鄭服是也秋公子友如陳葬原仲正傳曰書秋公子友如陳葬原仲著私行之非禮也左氏曰非禮也原仲季友之舊也胡氏曰公子友如陳葬原仲私行也臣之禮無私交大夫非君命不越境何以通季子之私行而無貶乎曰春秋端本之書也京師諸夏之表也祭伯以寰內諸侯而來朝祭叔以王朝大夫而來聘尹氏以天子三公來告其喪誣上行私表不正矣是故季子違王制委國事越境而㑹葬齊高固莒慶以大夫即魯而圖昏其後陳莊子死赴喪於魯魯人欲勿哭繆公召縣子而問焉曰古者大夫束修之問不出境雖欲哭焉得而哭諸今之大夫交政于中國雖欲勿哭焉得而勿哭末流可知矣春秋深貶王臣以明始亂備書諸國大夫而無譏焉則以著其效也凡此皆正其本之意冬杞伯姬來正傳曰書冬杞伯姬來譏非所來而來也胡氏曰左氏曰歸寧也禮父母在嵗一歸寧若歸而合禮則常事不書其曰杞伯姬來者不當來也女子有行逺父母兄弟春㑹于洮矣冬又歸魯故知其不當也來而必書春秋於男女往來之際嚴矣莒慶來逆叔姬正傳曰莒慶莒大夫字也叔姬莊公之次女也書莒慶來逆叔姬紀昏嫁之非禮也公羊曰大夫越境逆女非禮也胡氏曰諸侯嫁女於大夫而公自主之非禮也愚謂於此見稱字亦無取之之義則他或字或名不足為褒貶矣杞伯來朝正傳曰書杞伯來朝著其朝之非禮也朝聘有時杞伯因伯姬之來而來朝非時非禮也高氏曰致伯姬也杞伯不能制其內縱伯姬之數出又來朝而致之其卑弱可知矣公㑹齊侯于城濮正傳曰書公㑹齊侯于城濮講伯事也杜氏曰賜齊侯命為侯伯㑹于城濮將討衛也惠王十一年二十有八年齊桓二十年晉獻十一年衛懿三年蔡穆九年鄭文七年曹僖五年陳宣二十七年杞惠七年宋桓十六年秦宣十年楚成六年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績正傳曰人者衆稱之詞榖梁以為微之非也謂衛人微可也而謂齊人微可乎胡氏以為將卑師少之稱桓奉王命伐罪衛宜悉衆以當之而皆謂將卑師少可乎凡此之類皆私例惑之也及者猶言與也亦無他義書甲寅齊人伐衛衛人及齊人戰衛人敗績則齊桓奉命之師而衛侯抗命之罪可見矣胡氏曰按左氏衛嘗伐周立子頽至是王使召伯廖賜齊侯命且請伐衛則齊人舉兵乃奉王命聲衛立子頽之罪以討之也為衛計者誠有是罪則當請歸司冦服刑可也若惠徼康叔不泯其社稷使得自新亦唯命則可以免矣今不徴詞請罪而上逆王命下拒方伯之師直與交戰則是衛人為志乎此戰故以衛主之也愚謂胡氏所謂以衛主之則泥矣惟據本文而義自見矣夏四月丁未邾子瑣卒正傳曰瑣邾子名書邾子瑣卒紀小國之大故也聖人存之寓恤小之義耳秋荆伐鄭公㑹齊人宋人救鄭正傳曰荆楚也書荆伐鄭公㑹齊人宋人救鄭著伯主攘夷尊華之功也故榖梁曰善救鄭左氏曰子元以車六百乘伐鄭入于桔柣之門子元鬭御疆鬭梧耿之不比為斾鬬班王孫遊王孫嘉殿衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止愚謂此實傳也程子曰齊桓伯主魯望國宋王者之後此救鄭制楚之始蓋天下大勢所在胡氏曰按左氏楚令尹子元無故以車六百乘伐鄭人入純門是陵弱暴寡之師也故以州舉狄之也鄭人將奔桐丘諸侯救之楚師夜遁是得救急恤鄰之義也故書救鄭善之也又曰桓公主兵攘荆楚安中國之事見矣愚謂荆楚之本號也云以州舉狄之者義例之鑿矣冬築郿正傳曰築者築土為城也胡氏有用功大曰城小曰築之義非也書冬築郿著不急之務凶嵗之役雖時亦非也何謂時冬農隙之侯乃時也何謂凶嵗觀下同時書大無麥禾可知也胡氏亦曰其志不視嵗之豐凶而輕用民力於其所不必為也則非人君之心也大無麥禾正傳曰書大無麥禾志災也書於冬繼築郿之後者著莊公不顧嵗凶而妄興作也其書大無麥禾於冬者周之冬乃夏之八九十月也至收成之時而後知麥禾皆無故曰大無也此曰麥禾而胡氏以為大無者倉廪皆竭之詞歸咎於莊公費用不充則非經書麥禾之義矣臧孫辰告糴于齊正傳曰臧孫辰魯大夫告糴者請糴也書臧孫辰告糴于齊見魯國之無備也此與冬築郿大無麥禾同時而書則當國之凶凶而無備無備而妄興作焉則魯之為魯可知矣榖梁曰國無九年之畜曰不足無六年之畜曰急無三年之畜曰國非其國也諸侯無粟諸侯俱歸粟正也臧孫告糴于齊告然後與之言內之無外交也古者稅什一豐年補敗不外求而上下皆足也雖素凶年民弗病也一年不艾而百姓饑君子非之胡氏曰魯人悅其名而以急病攘夷為功君子責其實而以不能務農重榖節用愛人為罪惠王十二年二十有九年齊桓二十一年晉獻十二年衛懿四年蔡穆十年鄭文八年曹僖六年陳宣二十八年杞惠八年宋桓十七年秦宣十一年楚成七年春新延廏正傳曰延廏者法廏也國馬之所也凡馬日中而出日中而入新者修舊也書春新延廏見小大之非時也當春農作方與一嵗之所係而舉工作焉是之謂小不時上年大無麥禾而告糴于齊矣正宜節縮以為數年之圖此又與築郿相繼而興焉是之謂大不時榖梁曰古之君人者必時視民之所勤民勤於力則工築罕民勤於財則貢賦少民勤於食則百事廢矣冬築郿春新延廄以其用民力為己悉矣是也夏鄭人侵許正傳曰書鄭人侵許著陵暴之罪也秋有蜚正傳曰蜚介蟲之孽書有蜚紀災異也冬十有二月紀叔姬卒正傳曰叔姬者伯姬之娣桓公之女莊公之姑也莊公所宜為服大功者也書紀叔姬卒紀國姑之大故也叔姬於紀亡不歸宗國而歸于􅈶為紀守節執義至此卒于􅈶也然此乃史氏書之之詞耳而聖人竊取之義存焉若使聖人肯改書之必曰卒于􅈶義益明矣城諸及防正傳曰諸防二邑名書城諸及防著興作之頻煩雖時猶不利也左氏曰書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢愚謂左氏之言道其常也春新延廏冬城二邑且繼於凶年告糴之後民食困矣民力竭矣而妄興作不己焉故書之聖人節用愛民之義可見矣惠王十三年三十年齊桓二十二年晉獻十三年衛懿五年蔡穆十一年鄭文九年曹僖七年陳宣二十九年杞惠九年宋桓十八年秦宣十二年楚成八年春王正月正傳曰無事亦書義見于前夏師次于成正傳曰成魯地次者止也書師次于成著妄動之兵也夫兵出必有名名則必行今出矣而次于成非妄動而何榖梁曰有畏也欲救鄣而不能也不言公耻不能救鄣也愚謂不言公公在其中矣何足以諱耻耶夫鄣紀之遺邑也公念伯姬之親叔姬之賢欲存之以為紀後則當請之於齊不獲則聲義决戰以存之可也欲救鄣而兵出畏齊而不前次于成焉非妄動而何秋七月齊人降鄣正傳曰書齊人降鄣著齊人擅取之罪而齊桓於是乎不足為霸矣夫五霸假之也猶將假仁義而為之恤小尊王皆其事今鄣無罪以勢降取之是强陵弱衆暴寡利人之有下負恤小之義上冒無王之罪何仁義之假乎胡氏曰降者脅服之詞前書郕降于齊師意責魯也此言齊人降鄣専罪齊也鄣者紀之附庸微乎微者也齊人不道肆其强力脅使降附不書鄣降而曰降鄣者以齊之强故罪之深以鄣之微故責之薄春秋之法扶弱抑强明道義也霸者之政以强臨弱急事功也故曰五伯三王之罪人仲尼之徒無道桓文之事者愚謂齊桓於是乎失霸而强矣八月癸亥葬紀叔姬正傳曰書癸亥葬紀叔姬志公葬國姑之禮也公葬之焉得而不書况其賢乎胡氏曰紀侯既卒不歸宗國而歸于􅈶所謂秉節守義不以亡故而睽婦道者也故繫之於紀而録其卒葬先儒謂賢而得書是也賢而得書所以為後世勸也愚謂不日卒而日葬史有詳略耳榖梁以為閔紀之亡非也九月庚午朔日有食之鼓用牲于社正傳曰書庚午朔日有食之鼓用牲于社著非禮也餘義見前冬公及齊侯遇于魯濟正傳曰魯濟魯地榖梁謂遇者志相得也書公及齊侯遇于魯濟著其遇之非也齊魯之志相得相得於謀山戎也左氏曰冬遇于魯濟謀山戎也以其病燕故也然則豈非道義之遇乎齊人伐山戎正傳曰山戎杜氏以為北狄人者衆稱之詞齊人即齊侯也觀上文可見公羊胡氏以為貶以為譏榖梁以為愛齊侯以為善皆非也書齊人伐山戎著攘夷安華之義也燕者周之分子也山戎病燕久矣桓公仗義伐戎以安燕是霸者之事也伐之者何公羊曰桓公之與戎狄驅之爾胡氏乃謂桓不務德勤兵逺伐過矣惠王十四年三十有一年齊桓二十三年晉獻十四年衛懿六年蔡穆十二年鄭文十年曹僖八年陳宣三十年杞惠十年宋桓十九年秦成公元年楚成九年春築臺于郎正傳曰郎魯邑書春築臺于郎則妨時勞民之非見矣於春為妨時於郎非所宜臺而臺為勞民二者皆非聖人節用愛人使民以時之道矣胡氏曰天子有靈臺以候天地諸侯有時臺以候四時去國築于逺而不緣占候是為遊觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺豈能獨樂乎夏四月薛伯卒正傳曰書薛伯卒紀小國之大故也聖人存而不削寓恤小之義耳薛伯不名史略之耳築臺于薛正傳曰薛杜氏以為魯地是也書築臺于薛義與築臺于郎同春築于郎夏築于薛失時以妨農煩役以害民又益甚焉者也公羊曰何以書譏何譏爾逺也六月齊侯來獻戎捷正傳曰捷者榖梁以為軍獲之名書齊侯來獻戎捷紀非禮也於上為慢於下為驕左氏曰凡諸侯有四夷之功則獻于王王以警于夷中國則否愚謂今戎捷不以獻于王是之謂慢上又曰諸侯不相遺俘公羊亦曰來獻戎捷威我也其威我奈何旗獲而過我也愚謂是之謂驕下胡氏曰獻者下奉上之辭齊伐山戎以其所得躬來誇示書來獻者國史之詞蓋抑之也秋築臺于秦正傳曰秦魯地書秋築臺于秦譏失時厲民之甚也春築于郎夏築于薛秋築于秦三時役民民力竭矣民時妨矣魯莊之棄其民至此極矣其不亡者幸耳冬不雨正傳曰書冬不雨紀災也程子曰一嵗三築臺明年春城小榖故冬書不雨閔之深也愚謂書冬無雨于三時築臺之後明春城小榖之前春秋之意可見矣惠王十五年三十有二年齊桓二十四年晉獻十五年衛懿七年蔡穆十三年鄭文十一年曹僖九年陳宣三十一年杞惠十一年宋桓二十年秦成二年楚成十年春城小榖正傳曰小榖魯地書春城小榖紀失時也夏宋公齊侯遇于梁丘正傳曰志相得為遇梁丘者榖梁以為在曹邾之間去齊八百里書宋公齊侯遇于梁丘譏私遇也左氏曰齊侯為楚伐鄭之故請㑹于諸侯宋公請先見于齊侯夏遇于梁丘愚謂既非㑹同之正而又請先見焉非私乎秋七月癸巳公子牙卒正傳曰牙即叔牙僖叔也是為叔孫氏慶父同母弟季友母兄也書公子牙卒紀正義以存恩也左氏莊公築臺臨黨氏見孟任從之生子般為太子公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏公羊亦曰莊公病將死以病召季子季子至而授之以國政曰寡人即不起此病吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成季子和藥而飲之曰公子從吾言而飲之則必可以無為天下戮笑必有後乎魯國不從吾言而不飲此則必為天下戮笑必無後乎魯國於是從其言而飲之又曰君親無將將而誅焉季子殺母兄誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾死然親親之道也愚謂此皆實録也然則季友殺之也何以不言殺而言卒季友誅牙以存世子以安國家與周公之誅管蔡同周公之誅也顯季友之誅也隱隱則國人不知國史不知而卒之權而得中隱於無跡尊尊親親之道盡矣胡氏謂陸淳曰季子恩義俱立變而得中是也然又謂夫子書其自卒以示無譏則出於有意非聖人之心矣八月癸亥公薨于路寢正傳曰路寢正寢也書公薨于路寢紀國君之大故也而正終之義見矣榖梁曰寢疾居正寢正也男子不絶于婦人之手以齊終也左氏曰子般即位次于黨氏胡氏謂趙匡曰君終必於正寢就公卿也大位姦之窺也危病邪之伺也若蔽於隱是女子小人得行其志矣然則莊公以世適承國不為不貴周公之後奄有龜蒙不為不强即位三十有二年不為不久薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵柄不分而王威不立得免其身幸矣冬十月己未子般卒正傳曰書子般卒紀國之大變也此慶父弒之也而稱卒不稱曰慶父弒者何史不得其書也不曰君而曰子般者何未成君也公羊曰君存稱世子君薨稱子某既葬稱公子踰年稱公胡氏曰初公築臺臨黨氏見孟任生子般焉般嘗鞭圉人犖公薨即位次于黨氏慶父使犖賊般成季奔陳立閔公昔舜不告而娶恐廢人之大倫以懟父母君子以為猶告也莊公過時越禮謬於易基乾坤詩始關雎大舜不告而娶之義甚矣而子般乃孟任之所出也胡能有定乎雖享國日久獲終於路寢而嗣子見弒幾至亡國有國者可不以為戒哉公子慶父如齊正傳曰如齊者奔齊也書公子慶父如齊紀逆賊也慶父弒逆之賊也而猶稱公子者史之詞也然而不必去公子而已見其惡矣胡氏曰莊公幼年即位專以兵權授之慶父嵗月既久威行中外其流至此故於餘丘法不當書而聖人特書慶父帥師以志得兵之始而卒書公薨子般卒慶父如齊以見其出入自如無敢討之者愚謂慶父弒逆大惡史宜去其公子而不去實奔齊也而曰如齊亦以見慶父掌兵專而且久積威行於中外國人莫知其非或敢怒而不敢言是以史以此書之聖人因存之而不改以其惡之極不係於此而後見也愚故曰史不得其書也春秋正傳卷十
