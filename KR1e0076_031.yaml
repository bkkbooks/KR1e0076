body:
  text: 春秋正傳卷三十一明湛若水撰公昭景王十七年十有四年晉昭四年齊景二十年衛靈七年蔡平二年鄭定二年曹武二十七年卒陳惠二年杞平八年宋元四年秦哀九年楚平王居元年吳夷昧十六年春意如至自晉正傳曰書春意如至自晉始終乎罪晉之義也晉拒其君執其卿於㑹盟之際不義甚矣故前書其執今又書其至以深惡之也胡氏曰按左氏季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國土地猶大所命能具若為夷棄之使事齊楚何瘳於晉乃歸季孫其始執之為乏邾莒之供而非有扶弱擊强之義也其終歸之為土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之㑹深加貶斥自是而後諸侯不合二十餘年至于召陵又以賄敗十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜內叛不復振矣利之能敗人國家乃如此春秋之深戒也二月曹伯滕卒正傳曰書曹伯滕卒志與國之大故也夏四月正傳曰無事亦書義見于前秋葬曹武公正傳曰書葬曹武公志鄰國之大事也八月莒子去疾卒正傳曰書莒子去疾卒志鄰國之大故也來赴故史書之左氏曰秋八月莒著丘公卒郊公不戚國人弗順欲立著丘公之弟庚輿蒲餘侯莒大夫惡公子意恢而善於庚輿亦公子郊公惡公子鐸亦公子而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之胡氏曰卒自外録者也莒人來赴故魯史書其卒葬自內録者也魯人不往是以闕其葬自昭公以來雖薛杞微國無不㑹其葬者何獨於莒則不往乎方是時意如專政而莒嘗訴其疆鄆取郠之罪於方伯而見執矣為是怒莒故獨不㑹其葬也夫怨不棄義惡不忘親怒不廢禮在桓公時雖與衛戰而宣公卒則往葬之不以私故絶吉凶慶弔往來施報之常禮也以此見意如之專恣矣若意如者其傲狠修怨敢施於昭公與莒子及其在晉聞除館西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是耳苟不逺之其能國乎冬莒殺其公子意恢正傳曰書莒殺其公子意恢誅亂賊也左氏曰冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田愚謂此公子鐸與蒲餘侯之謀也徒以愛憎之故不顧大義而賊殺公子以擅置立亂人之國其罪惡大矣故春秋書而誅之景王十八年十有五年晉昭五年齊景二十一年衛靈八年蔡平三年鄭定三年曹平公須元年陳惠三年杞平九年宋元五年秦哀十年楚平二年吳夷昧十七年卒春王正月吳子夷昧卒正傳曰書吳子夷昧卒志外國之大故也二月癸酉有事于武宮籥入叔弓卒去樂卒事正傳曰何以書志禮之變也左氏曰春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也公羊曰其言去樂卒事何禮也君有事于廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往大夫聞大夫之喪尸事畢而往愚謂大夫涖事卒於其位則去樂卒事體祖宗不忍之心故曰禮也若如公羊所謂有事于廟聞大夫之喪去樂卒事則非也與卒于祭位者異矣蓋非卒于祭位則禮不當以聞矣安得而聞之此不可不辨胡氏曰左氏曰禘于武宮叔弓涖事籥入而卒去樂卒事有事於宗廟聞大夫之喪則去樂而祭可乎按曽子問君在祭不得成禮者夫子語之詳矣而無有及大臣者是知祭而去樂不可也有事於宗廟遭大夫之變則以聞可乎按禮衛有太史栁莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義取也有事於宗廟大臣涖事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視己設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之者也夏蔡朝吳出奔鄭正傳曰朝吳蔡忠臣書蔡朝吳出奔鄭譏不能自信而奔也亦以罪夫奔之者也左氏曰楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也觀此則朝吳之奔以無極之讒使之奔鄭也然亦朝吳明不能逺奸誠不能格物之所致也向使朝吳誠明既立則佞人逺矣下位之言奚為而至哉均之為有罪矣胡氏曰朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信也則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪太子建殺連尹奢屏王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地苟有譛之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利纍其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之正傳曰書日有食之志天變也餘義見前秋晉荀吳帥師伐鮮虞正傳曰書晉荀吳帥師伐鮮虞志非義也左氏曰晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而不取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸愚謂據此傳則荀吳不納叛不急利誠為善矣然不能推此加諸彼何耶夫征者正有罪也鮮虞無罪而征之尚為能充其類也乎不知無罪而征人之國為非義而徒以不納叛不急利之為善是猶紾兄之臂而奪之食姑徐徐云耳冬公如晉正傳曰書公如晉志非所如也左氏曰平丘之㑹故也愚謂平丘之㑹見拒於晉而不與盟則辱亦甚矣而又因是以如晉焉不能自立其國而惴惴乎惟大國之畏無怪乎其自卑賤也己按左傳十六年春王正月公在晉晉人止公則不惟卑賤又自陷於危辱矣景王十九年十有六年晉昭六年卒齊景二十二年衛靈九年蔡平四年鄭定四年曹平二年陳惠四年杞平十年宋元六年秦哀十一年楚平三年吳僚元年春齊侯伐徐正傳曰書齊侯伐徐著非義也左氏曰二月丙申齊師至于蒲隧徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父古國名之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎愚謂昭子之言得春秋之意夫徐無罪而伐之受其賂而與之成可謂非義矣故春秋惡之楚子誘戎蠻子殺之正傳曰書楚子誘戎蠻子殺之著詐暴之罪也左氏曰楚子聞蠻氏之亂也戎蠻子嘉也在河南新城與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也夫御戎狄之道誠信而已因其亂誘而殺之無道甚矣以夷殘夷春秋直書而其罪惡著矣公羊以為楚子不名夷狄相誘殺不疾之則非矣夫既不疾之則聖人何所取義以書乎夏公至自晉正傳曰書公至自晉始終乎非禮之行也夫書至者凡以謹人君之出入舉而必書而善惡著焉凡書至者有飲至有書勞有反面于廟之禮也其反面于廟則將何詞以告祖考乎故春秋恥之左氏曰子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿强而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國胡氏曰左氏曰公如晉平丘之㑹故也至是始歸者晉人止公其不書諱之也昭公數朝於晉三至於河而不得入兩得見晉侯又欲討其罪而止旃其困辱亦甚矣在易之困曰困亨者因困窮而致亨也夫困於心衡於慮而後作徴於色發於聲而後喻此正憤悱自强之時而夏少康衛文公越勾踐燕昭王四君子者由此其選也今昭公安於危辱無激昂勉勵之志即所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也愚謂只一書如一書至中間隔三時而其事自著矣又何必謂諱乎秋八月己亥晉侯夷卒正傳曰書晉侯夷卒志盟主之大故也餘義見前九月大雩正傳曰書九月大雩左氏曰旱也而魯大雩之非因以並見矣餘義見前季孫意如如晉正傳曰書意如如晉志非禮也以卿㑹葬非禮也冬十月葬晉昭公正傳曰葬者意如㑹葬蓋秋往而冬十月乃至葬也何以書志㑹葬之禮也諸侯五月而葬同盟至禮也左氏曰冬十月季平子如晉葬昭公平子曰子服回之言猶信子服氏有子哉景王二十年十有七年晉頃公去疾元年齊景二十三年衛靈十年蔡平五年鄭定五年曹平三年陳惠五年杞平十一年宋元七年秦哀十二年楚平四年吳僚二年春小邾子來朝正傳曰書小邾子來朝志邦交之禮也左氏曰春小邾穆公來朝公與之宴季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎愚謂諸侯邦交之禮朝聘以時所以通好也况小邾子又能以小事大而賦詩有樂見之誠可謂知禮以保其國矣故春秋善之夏六月甲戌朔日有食之正傳曰書日有食之志天變也左氏曰祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣秋郯子來朝正傳曰書郯子來朝志邦交之禮也以小事大之義也左氏曰公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皥氏以龍紀故為龍師而龍名我高祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏歷正也𤣥鳥𤣥鳥燕也以春分秋分來去氏司分者也伯趙即伯勞也以夏冬二至鳴止氏司至者也青鳥氏司啓者也丹鳥鷩雉也以二立來去入大水化為蜃氏司閉者也祝鳩即鷦性孝氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信愚謂觀此則郯子能博通古今知歷代建官之義仲尼以為賢者也故書於冊表其賢也不但志邦交之禮以小事大之義而已也禮失求之野豈不信夫八月晉荀吳帥師滅陸渾之戎正傳曰書晉荀吳帥師滅陸渾之戎則聖人褒貶之意並見矣左氏曰晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘於文宮文公之廟愚謂詩云戎狄是膺荆舒是懲陸渾之戎本戎狄而從於荆楚晉伐之不失為膺戎狄之義也然有陽不能無陰有王國不能無荒服伐之可也滅之不可也故春秋書之而褒貶與奪之義並見焉胡氏曰林父之於潞氏士㑹之於甲氏荀吳之於陸渾戎皆滅之也而林父士㑹稱師稱人荀吳舉其名氏何哉夷不亂華陸渾之戎密邇王室而縱之雜處則非膺戎狄别內外之義也與闢土服逺以圖强霸則異矣然舉其名氏非褒詞也才得無貶耳則窮兵於逺虛內事外者可知矣愚謂此不稱大夫而名之類於貶矣胡氏特以其事善故不以為貶耳然則義例之說果能充其類也乎冬有星孛于大辰正傳曰孛即彗星也大辰大火也心星也書有星孛于大辰志天變也為天下志也左氏曰有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火灾乎梓慎曰往年吾見之是其徴也火出而見今茲火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳太皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言于子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與胡氏曰大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿名者不加宿也當是時吳人僣亂慿陵上國日敝於兵暴骨如莽其戾氣所感固將壅吳而降之罰也故氛祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣楚人及吳戰于長岸正傳曰書楚人及吳戰于長岸罪交爭也師出無名惟以力相爭此夷狄之道也故春秋書以惡之左氏曰吳伐楚陽丐楚穆公曾孫為令尹卜戰不吉司馬子魚即公子魴曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇吳乘舟名使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請於其衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚人亂吳人大敗之取餘皇以歸胡氏曰言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而策士奇才為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益强而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末强弱之由其為後世戒明矣景王二十一年十有八年晉頃二年齊景二十四年衛靈十一年蔡平六年鄭定六年曹平四年卒陳惠六年杞平十二年宋元八年秦哀十三年楚平五年吳僚三年春王三月曹伯須卒正傳曰曹伯名須諡平公書曹伯須卒志與國之大故也餘義見前夏五月壬午宋衛陳鄭灾正傳曰書壬午宋衛陳鄭灾志大異也何以為大異也公羊曰以其同日而俱灾也外異不書此何以書為天下記異也左氏曰五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子太叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言耳豈不或信遂不與亦不復火鄭之未灾也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫于東門使司冦出新客禁舊客勿出於宮使子寬子上巡羣屏攝至於太宮使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各警其事商成公警司宮出舊宮人置諸火所不及司馬司冦列居火道行火所焮城下之人伍列登城明日使野司冦各保其徵郊人助祝史除於國北禳火于𤣥冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔灾君子是以知陳許之先亡也胡氏曰左氏鄭灾子産臨事而備初禆竈言於子産宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗與及鄭既灾竈曰不用吾言鄭又將火鄭人請用之子産不可曰天道逺人道邇非所及也何以知之亦不復火禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德消變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也六月邾人入鄅正傳曰鄅小國姒姓禹之後書邾人入鄅罪詭謀也左氏曰鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑于邾邾莊公反鄅夫人而舍其女愚謂觀此則鄅人無可聲之罪而邾人出其不意襲而入之俘其民以及其君無道之甚者也故春秋惡之秋葬曹平公正傳曰書葬曹平公志相恤之義也左氏曰葬曹平公往者見周原伯魯焉與之語不說學歸以語閔子馬閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則苟而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎愚謂學也者覺也效也不效而無覺則惑心生而邪惡乘之弒父與君不學之漸也冬許遷于白羽正傳曰書許遷于白羽則楚陵蔑中國之罪甚矣左氏曰楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讐不可啓君其圖之楚子說冬楚子使王子勝遷許於析實白羽愚謂先王分封有定受之天子傳之先君楚十五年復遷邑許自夷還居葉今又自葉遷白羽其以夷陵夏犯先王之誅矣景王二十二年十有九年晉頃三年齊景二十五年衛靈十二年蔡平七年鄭定七年曹悼公午元年陳惠七年杞平十三年宋元九年秦哀十四年椘平六年吳僚四年春宋公伐邾正傳曰書宋公伐邾著擅興之罪也左氏曰鄅夫人宋向戌之女也故向寧向戌之子請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘邾人郳人徐人㑹宋公乙亥同盟於蟲愚謂鄅人藉稻邾襲而俘之辱及其君夫人其罪大矣胡氏以為向寧請師圍蟲取之盡歸鄅俘為聲罪執言之兵是也然邾固有罪宋亦不能無罪焉不以告於天子率方伯連帥以聲罪致討乃擅興動衆又取其邑故史書之聖人竊取之義見矣其不書圍不書取者宋不以報告故爾胡氏以為取其善而釋其罪過矣夏五月戊辰許世子止弒其君買正傳曰書許世子止弒其君買罪世子也罪其有致弒之道也左氏曰夏許悼公瘧五月戊辰飲太子止之藥卒太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也穀梁謂止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死故君子即止自責而責之也愚謂五刑之屬三千而罪莫大於弒父與君據左氏所載則太子止但為不嘗藥之故耳而春秋遽以莫大之罪加之者豈聖人公恕之心哉觀此者必以經而正其傳可也左氏君子曰盡心力以事君舍藥物可也非也胡氏又以為謹微履霜之義亦非也此皆不過見止之自責哭泣而死不立其位而為此言耳當時必有實事史逸其傳而隱其詞矣故傳謂飲止之藥而卒止亦受之曰我與夫弒者豈無故而受與弒之名邪或者止之比黨速欲止之定位因藥進毒以殺之或太子察之不早而比其匪人又不先嘗藥以杜其邪謀或後稍知知之未真而隱之皆不能免於與弒之罪矣如漢之霍光豈不亦為忠臣其妻毒許后光為隱其邪謀設使漢有春秋則當書曰霍光弒皇后許氏則光豈敢不受之乎大抵不學無術則愚而陷於弒父之罪不能免於春秋之書而後儒紛紛皆徒以歸於不嘗藥之罪則夫山野愚氓憂親之疾付於庸醫之手而致親死初不知有嘗藥之禮者皆為有弒父之罪矣豈理也哉曰焉知止不實與之同謀乎曰以不立乎其位以與其弟虺哭泣啜粥不粒而死以此知其决不然也己卯地震正傳曰書地震志變異也地道尚靜今震而動焉失其常矣失常為變為異故春秋書之以示戒焉秋齊高發帥師伐莒正傳曰書齊高發帥師伐莒志非義之兵也夫非義者必計功謀利者也莒非有可聲之罪齊徒以其不事已而伐之是為計功謀利之心非義舉何以為霸主乎左氏曰齊高發伐莒莒子奔紀鄣使孫書陳無宇之子伐之初莒有婦人莒子殺其夫已為婺婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占即書子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀冬葬許悼公正傳曰書葬許悼公志恤鄰之大事也其與諸侯㑹葬可知矣夫與諸侯㑹葬者必諸侯安之而非實弒矣許止質美而不學不能敬謹以事其親比之匪人以致進藥而不嘗藥進而毒發以殺其親又不追賊以陷於與弒之罪其與實弒者異矣推類至義之盡耳故諸侯安之而與葬也不然賊之未討何以書葬耶胡氏曰觀止自責可謂有過人之質矣乃至以弒君獲罪此為人臣子而不知春秋之義者也古者太子自其初生固舉以禮有司端冕見之南郊過闕則下過廟則趍為赤子而其教已有齊肅敬慎之端矣此春秋訓臣子除惡於微積善於早之意也景王二十三年二十年晉頃四年齊景二十六年衛靈十三年蔡平八年卒鄭定八年曹悼二年陳惠八年杞平十四年宋元十年秦哀十五年楚平七年吳僚五年春王正月正傳曰無事亦書時月義見于前夏曹公孫㑹自鄸出奔宋正傳曰㑹子臧之子鄸子臧之采邑也書曹公孫㑹自鄸出奔宋善其奔也盡奔之禮也公孫㑹得罪而出奔猶待放於其邑也劉敞曰待放也古者大夫有罪待放於其境三年君賜之環則復賜之玦則去逾境則為位向國而哭素衣裳冠不說人以無罪此去國之禮也㑹待放于鄸自鄸而出奔宋得臣子惓惓不敢忘君之義可謂得禮矣故春秋善之公羊以為奔未有言自言自畔也為賢子臧之後諱也胡氏從之穀梁又以為自鄸專乎鄸也皆非矣夫春秋紀事之書就事論事豈得比賞延于世善善長之義以父祖之賢及其子孫者哉凡此皆義例臆說為之蔽春秋之指所以不明也秋盜殺衛侯之兄縶正傳曰縶衛侯之庶兄也書盜殺衛侯之兄縶誅亂賊也左氏曰衛公孟縶靈公之兄狎齊豹齊惡之子奪之司冦與鄄有役則反之無則取之公孟縶之字也惡北宮喜即北宮貞子褚師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宮喜褚師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衛侯在平壽公孟有事於蓋獲門名之門外齊子氏即齊豹帷於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中門名齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車及公宮鴻駵魋駟乘于公公載寶以出褚師子申遇公於馬路之衝遂從過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥地名析朱鉏臣名宵從竇出徒行從公齊氏之宰渠子召此宮子北宮氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宮喜盟于彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子高魴出奔晉閏月戊辰殺宣姜衛侯賜北宮喜諡曰貞子賜析朱鉏諡曰成子而以齊氏之墓豫之衛侯告寧于齊且言子石琴張孔子弟子聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食奸不受亂不為利疚於回不以回待人不蓋不義不犯非禮愚謂按此則為盜者齊豹也殺君之兄不書賊名者衛不以名報也故魯史亦不得而名之使人按跡而求而盜人斯得矣其云盜者為盜賊之事深誅亂賊之罪也若夫宗魯縶之忠臣也以身蔽縶與之俱死死不恤矣其欲為豹盜者何求乎左氏所載非孔子之言矣其不以變告縶者蓋不忍負豹之知已好仁而不好學者也與雍糾之婦祭仲之女同其愚矣左氏以盜歸之胡氏從之過矣是則如酷吏之任法非聖人於有過中求無過之心矣謹録其說于後胡氏曰左氏以為齊豹殺之也齊豹為衛司冦守嗣大夫其書為盜所謂求名而不得者也若艱難其身以險危大人而有名章徹攻難之士將奔走之臣竊以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乘也於法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖人又靳此名而不與者哉然則齊豹首謀作亂宗魯雖與聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗乎曰豹之不義夫人皆知之也若宗魯欲周事豹而死於公孟蓋未有知其罪也故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉非聖人發其食奸受亂蓋不義犯非禮之罪書於春秋則齊豹所畜養之盜孟縶所見殺之賊其大惡隱矣冬十月宋華亥向寧華定出奔陳正傳曰書宋華亥向寧華定出奔陳志亂也左氏曰宋華向之亂公子城平公子公孫忌樂舍欒喜孫司馬彊向宜向鄭皆向戌子楚建即亡太子郳申即邾穆公子出奔鄭其徒與華氏戰于鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺太子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司冦牼以歸曰子之齒長矣不能事人而以三公于為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所陳氏曰於是公子城公孫忌八子奔鄭華亥向寧華定奔陳其但書三子何凡奔罪也衆不可勝罪則罪其甚者入南以叛乞師于楚為宋患之日久是以甚三子也十有一月辛卯蔡侯廬卒正傳曰書蔡侯廬卒志鄰國之大故也景王二十四年二十有一年晉頃五年齊景二十七年衛靈十四年蔡悼公東國元年鄭定九年曹悼三年陳惠九年杞平十五年宋元十一年秦哀十六年楚平八年吳僚六年春王三月葬蔡平公正傳曰書葬蔡平公志鄰國之大事也而諸侯相恤之義見矣左氏曰三月葬蔡平公蔡太子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子嘆曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之夏晉侯使士鞅來聘正傳曰書晉侯使士鞅來聘志邦交之禮也而其失可考見矣諸侯邦交有朝聘之禮所以通往來晉之聘魯得禮之正乎按左氏夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢愚謂晉鞅來聘以修好責小以相攜而魯季孫私惡以妨公失歡於盟主是邦交通好之禮胥失之矣故春秋書之宋華亥向寧華定自陳入于宋南里以叛正傳曰南里宋鄙也書宋華亥向寧華定自陳入于宋南里以叛則叛逆之罪見矣左氏曰宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譛諸公曰貙將納亡人華亥等亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若受司馬則如亡死如可逃何逺之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬嘆曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐華貙家臣尤之曰必有故使子皮華貙字承宜僚以劒而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩華貙家臣殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之愚謂三大夫之叛宋久矣而此復書叛者以始終其叛逆之跡以大其罪也胡氏曰按左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨言宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居盧門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君已甚之詞也愚謂言叛則不必問其邑其境而叛逆之罪均矣孟子曰孔子成春秋而亂臣賊子懼此之謂乎秋七月壬午朔日有食之正傳曰書日有食之志天變也左氏曰公問于梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水八月乙亥叔輒卒正傳曰叔輒叔弓之子伯張也書叔輒卒志國卿之大故也左氏曰於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒冬蔡侯朱出奔楚正傳曰書蔡侯朱出奔楚罪不能守社稷也左氏曰費無極取貨于東國隱太子之子平侯唐之弟蔡侯朱之叔父而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱太子其子與君同惡平侯與公子比弒靈王故同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣觀此則蔡侯之奔不能修德以鎮乎讒邪為讒邪之所逐皆可見矣公如晉至河乃復正傳曰何以書非所如也人君之舉動必惟其時時然後動乃無悔也按左氏公如晉鼓叛晉晉將伐鮮虞故辭公是昭公不時其動屢見拒於晉可恥之甚者也故春秋書之春秋正傳卷三十一
