body:
  text: 春秋正傳卷二十二明湛若水撰成公名黑肱宣公子母穆薑在位十八年定王十七年元年晉景十年齊頃九年衛穆十年蔡景二年鄭襄十五年曹宣五年陳成九年杞桓四十七年宋文二十一年秦桓十五年楚共王審元年春王正月公即位正傳曰書春王正月公即位正始也二月辛酉葬我君宣公正傳曰書辛酉葬我君宣公紀國之大事也志禮也送死人之大事也諸侯五月而葬禮也無冰正傳曰書無冰紀異也二月繫於春者周正建子則子丑寅皆春也春二月丑月也即夏之十二月也則時與月皆易明矣丑月宜寒而水乃無冰是陽不閉而常燠則為災異矣胡氏曰寒極而無冰者常燠也按洪範傳曰豫恆燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見故當固陰沍寒而常燠應之古者日在北陸而藏氷獻羔而啓朝之祿位賓食喪祭氷皆與焉此亦燮調愆伏之一事也今既寒而燠遂廢凌人之職然策書所載皆經邦大訓人有微而不登其姓名事有小而不記其本末雨雹氷雪何以悉書天人一理也萬物一氣也觀於陰陽寒暑之變以察其消息盈虛此制治於未亂慎於微之意也每慎於微然後王事備矣愚謂胡氏所謂既寒而燠者惟子丑兩月為然若至寅卯兩月則寒過而燠無氷為常事矣此亦可以見時月皆改之證也三月作丘甲正傳曰書三月作丘甲紀重賦也左氏曰為齊難故作丘甲胡氏曰作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乘此司馬法一成之賦也為齊難作丘甲益兵備敵重困農民非為國之道唐太宗問李靖楚廣與周制如何靖曰周制一乘步卒七十二人甲士三人以二十五人為一甲共七十五人然則一丘所出十有八人積四丘而具一乘耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣則未知其所作者三甸而增一乘乎每乘而增一甲乎魯至昭公時嘗搜于紅革車千乘則計甸而增乘未可知也楚人二廣之法一乘至用百有五十人則魯每乘而增一甲亦未可知也賦雖不同其實皆為益兵其數皆增三之一耳先儒或言甲皆人人之所能為又以為丘出甸賦加四倍者誤矣愚謂作者創立之名直書作丘甲則其不宜作之義自見胡氏乃又以謂作者不宜作則拘於義例一字之文矣夏臧孫許及晉侯盟于赤棘正傳曰及猶言與也書臧孫許及晉侯盟于赤棘著其盟之非也左氏曰聞齊將出楚師夏盟于赤棘則是為齊出楚師而盟以禦之也夫盟以求援於晉孰若修德於已及時明其政刑賢能在位休養以結民心制梃以撻齊楚之堅甲利兵乎故曰著其盟之非也胡氏曰初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟赤棘晉地也其稱及魯所欲也盟非春秋所貴而惡屢盟者非惟長亂亦國用民力所難給也成公即位之初方經大故未有施舍已責逮鰥寡救乏困之事也為齊難既作丘甲矣聞將出楚師又逺與晉尋盟豈固本保邦之道乎書及晉侯盟于赤棘非特備齊懼晉蓋三桓懷忿懟君父之心將有事于齊而汲汲欲之者罪可見矣愚謂此言多是但云稱及者魯所欲則魯所欲傳已明白不在乎稱及一詞之贅矣秋王師敗績于茅戎正傳曰書王師敗績于茅戎則王道之失可知矣夫征伐自天子出諸侯承天子之命而正其罪者乃王道也故曰天子討而不伐諸侯伐而不討討者出令也伐者行兵也今天子自行兵而致敗失王道矣故書以見之左氏曰王人來告敗故書之先儒謂書敗不書戰莫敢敵也則支離而失其指矣冬十月正傳曰無事亦書時月義見于前定王十八年二年晉景十一年齊頃十年衛穆十一年蔡景三年鄭襄十六年曹宣六年陳成十年杞桓四十八年宋文二十二年卒秦桓十六年楚共二年春齊侯伐我北鄙正傳曰書齊侯伐我北鄙志警也紀憤兵也左氏曰齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊之城上齊侯親鼓士陵城三日取龍遂南侵及巢邱胡氏曰初魯事齊謹甚雖易世而聘會不絶也及與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞍之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣愚謂不待貶而罪自見乃春秋之正義也餘皆倣此夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績正傳曰新築鄭地書衛孫良夫帥師及齊師戰于新築衛師敗績著二國之憤兵也其非義具見矣左氏曰衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已愚謂記曰春秋無義戰夫戰有二義焉其上則奉王命以伐有罪義也其次則人加兵於已不得已而以兵應之守其封疆社稷猶不失為義也今齊忿衛與晉斷道之盟及世子臧同晉伐已而以兵侵衛是非奉王命擅以兵加人其為不義甚矣及衛孫良夫帥師伐齊戰于新築以至敗績是衛兵越境及鄭地而與戰則非守封疆之義矣故春秋書之而其罪自見也或謂書法以衛主戰者誤矣六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績正傳曰書魯四卿會晉衛曹大夫公子及齊侯戰于鞍齊師敗績則四國貪憤之兵具見矣左氏曰孫桓子還于新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥一師會之及衛地師從齊師于莘六月壬申師至于靡笄之下齊侯使請戰曰詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君使羣臣請於大國無令輿師淹於君地能進不能退齊侯曰大夫之許寡人之願也癸酉師陳于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭邱緩為右郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御豈敢言病吾子忍之緩曰自始合苟有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓若之何其以病敗君之大事也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中綦母張喪車從厥逢丑父與公易位將及華泉驂絓於木而止丑父不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士丑父使公下如華泉取飲鄭周父御佐車宛筏為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者郤子曰人不難以死免其君我戮之不祥乃免之齊侯免求丑父三入三出晉師從齊師入自邱輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子寡君之母也以匹敵亦晉君之母也吾子布命於諸侯而曰必質其母以為信是以不孝令也先王疆理天下物土之宜而布其利今吾子疆理諸侯而曰盡東其畝而已其無乃非先王之命也乎反先王則不義何以為盟主詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也況其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親䁥也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣對曰羣臣帥賦輿以為魯衛請苟有以藉口而復於寡君君之惠也敢不唯命是聽愚按左氏此傳詳矣見四國諸大夫合兵勝齊之功矣然皆貪憤之兵也記曰為善戰者服上刑連諸侯者次之則其所謂功祗足以為罪耳有王者作當以此服其刑秋七月齊侯使國佐如師己酉及國佐盟于袁婁正傳曰洛陽西有袁婁師者四國之師也及者晉及之也書齊侯使國佐如師己酉及國佐盟于袁婁善釋怨也左氏曰秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公羊曰鞍之戰齊師大敗齊侯使國佐如師郤克曰與我紀侯之甗及魯衛之侵地使耕者東畝且以蕭同姪子為質則吾舍子矣國佐曰與我紀侯之甗請諾反魯衛之侵地請諾使耕者東畝是則土齊也蕭同姪子者齊君之母也齊君之母猶晉君之母也不可請戰一戰不勝請再再戰不勝請三三戰不勝則齊國盡子之有也何必以蕭同姪子為質揖而去之郤克瞬魯衛之使使以其辭而為之請然後許之逮于袁婁而與之盟愚謂按此則以四國強兵逞其欲而滅齊無難也晉以吞齊之氣而與之盟而平焉是齊求於晉晉許於齊善釋怨矣春秋之善莫大乎釋怨息兵直書其事而義自見矣八月壬午宋公鮑卒正傳曰鮑宋公名書壬午宋公鮑卒紀與國之大故也來赴之詳故詳其日左氏曰八月宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為愚謂此又因卒而見義不可掩矣庚寅衛侯速卒正傳曰書庚寅衛侯速卒紀與國之大故也何以書日因赴之詳故書之詳左氏曰九月衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬取汶陽田正傳曰取者對與之稱或以為得非其有之稱見聖人謂魯在所損益者皆非也蓋汶陽魯侵地齊來與還而魯受之也然以強兵得之不告於天王而復之亦非春秋之全美故書取汶陽田則褒貶之情並見矣公羊曰汶陽田者何鞍之賂也杜氏曰汶陽田汶水北地汶水出泰山萊蕪縣西入濟胡氏曰汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎然則宜奈何考於建邦土地之圖若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟氏語慎子曰如有王者作在所損乎在所益乎經於復其故田而書取所損益亦可知矣愚謂胡氏此言非也公侯皆方百里先王之制也而五百里者魯先君之貽也先君不能損之以歸天王而子孫顧可以見奪於齊而因以為不當有乎夫國君之孝莫大乎守疆土保社稷而已齊昔以強而侵之今以其敗而還之於我克復舊物子孫之大孝也何為不可但以強兵戰勝而得之為未盡善耳故孔子相夾谷之會亦曰而不還我汶陽之田有如此盟聖人固取之有道矣冬楚師鄭師侵衛正傳曰書楚師鄭師侵衛則猾夏伐喪之罪著矣髙氏曰以甸服從蠻荆而首伐衛喪是猶受戈與冦而攻其親戚罪不勝誅矣十有一月公會楚公子嬰齊于蜀正傳曰書公會楚公子嬰齊于蜀則其會之非禮自見矣夫以君與臣會為首足混殽中國之君與夷狄之臣會為冠屨倒置是失禮之中又失禮焉故榖梁曰其曰公子嬰齊亢也左氏曰宣公使求好于楚莊王卒宣公薨不克作好公即位受盟于晉會晉伐齊衛人不行使于楚而亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之乃大戶已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之冬楚師侵衛遂侵我師于蜀使臧孫往辭曰楚逺而久固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平胡氏曰二國稱師著其衆也侵衛則書侵我師于蜀致賂納質沒而不書非諱也書其重者則莫重乎其以中國諸侯降班失列下與夷狄之大夫會也季孫行父為國上卿當使其君尊榮其民免於侵陵之患而危辱至此特起於忿忮肆其褊心而不知制之以禮也書曰必有忍乃其有濟懲忿窒欲德之修也不忮不求行之善也躬自厚而薄責於人逺怨之方也季孫忿忮弗能懲也而辱逮君父不亦􅉃乎故春秋史外傳心之要典也考其行事深切著明於以反求諸己則亦知戒矣丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀正傳曰書公及楚秦諸國之人盟于蜀見其盟之非也葵邱之會霸主率諸侯以聽王禁今霸主乃盡中國之諸侯以受盟於強悍之楚天地之大變也春秋書之則其罪自不可逭不待如胡氏所謂人諸國之大夫以見意也又曰春秋於魯君盟會不信不臣棄周即異皆諱不書而盟蜀書而不諱不得其説而為之詞謂事同既貶而從同則遁矣左氏曰十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯況其下乎詩曰不解於位民之攸墍其是之謂矣愚謂經既書人使人求其實則卿之名自不可匿矣以是為匱盟可乎定王十九年三年晉景十二年齊頃十一年衛定公臧元年蔡景四年鄭襄十七年曹宣七年陳成十一年杞桓四十九年宋共公固元年秦桓十七年楚共三年春王正月公會晉侯宋公衛侯曹伯伐鄭正傳曰書公會晉宋衛曹之諸侯伐鄭使人考其傳求其迹而其勝負得失可見矣左氏曰諸侯伐鄭次于伯牛討邲之敗也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸邱輿皇戍如楚獻捷愚謂鄭之從楚故諸侯伐之及以詐敗諸侯之兵而復以獻捷于楚始終棄諸姬從荆楚略無有因諸侯問罪之師而自反以悔真有罪矣然而鄭不自反以詐敗諸侯之兵固雖勝猶非義矣諸侯之擅興大衆伐鄭不請天子之命而行討均於不義是宜其敗也其勝負得失蓋兩分之矣胡氏曰夫討邲之役則復怨勦民非觀釁也遂東侵則潛師掠境非以律也覆而敗諸則專用詐謀非正勝也度彼參此皆無善也是矣然必謂略而不紀勝負微也晉侯稱爵而以伐書盟主有詞于伐者則鑿矣辛亥葬衛穆公正傳曰書辛亥葬衛穆公紀與國之大事也書日者赴之詳也以此見凡書日不書日皆赴之詳略而不足以取義也書葬者諸侯會葬之禮禮也二月公至自伐鄭正傳曰書公至自伐鄭謹出告返面之義也蓋君舉必書而其得失可見也無故越境以伐人非王制矣甲子新宫災三日哭正傳曰書甲子新宫災紀變也三日哭紀禮也公羊曰新官者何宣公之宫也宣官則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也新宫災何以書紀災也胡氏曰廟災而哭禮也得禮為常事則何以書緱氏劉絢曰新宫者宣宫也不曰宣官者神主未遷也知然者丹楹刻桷皆稱桓宫此不舉諡故知其未遷也宫成而主未入遇災而哭何禮焉宣公薨至是二十有八月緩於遷主可知矣言災則不恭之致亦自見矣此説據經為合或曰禮稱有焚其先人之室則三日哭新宫將以安神主也雖未遷而哭不亦可乎曰先人之室蓋嘗寢於斯食于斯會族屬於斯其居處笑語之所在皆可想也事死如事生故有焚其室則哭之禮也神主未遷而哭於人情何居愚謂劉絢主未遷故為新宫之説蓋臆説也豈有薨二十八月而不遷主者其説非也公羊以謂新宫不忍言亦非也蓋同一宫也以其近則謂之新宫以其逺則謂之宣官乙亥葬宋文公正傳曰書葬宋文公於三年二月之下使人數月而知其越禮也書乙亥來赴之詳也故史詳而直書之義自見矣胡氏曰按左氏文公卒始厚葬益車馬重器備君子謂華元樂舉於是乎不臣考於經未有以驗其厚也數其葬之月則信然矣天子七月諸侯五月大夫三月士踰月以降殺遲速為禮之節不可亂也文公之卒國家安靜外無危難曷為越禮踰時逮乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚葬其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道微禮法既壞無以制其侈心至於秦漢之間窮竭民力以事邱隴其禍有不可勝言者春秋據事直書而其失自見此類是也豈不為永戒哉夏公如晉正傳曰書夏公如晉譏其如也公之輕出非禮也左氏曰拜汶陽之田夫國君守社稷宗廟之重非朝覲會同莫宜以輕出出則史書之今據左傳則公之如晉非有朝覲會同之大禮乃以拜汶陽之田而行非禮之甚矣鄭公子去疾帥師伐許正傳曰去疾鄭公子名書鄭公子去疾帥師伐許則其非義之兵可考而知矣左氏曰許恃楚而不事鄭鄭子良伐許愚謂此實傳也夫國君有睦鄰之義恤小之仁德修於已而人服之可也鄭上不事天王下不事中國之盟主委身俯首以從楚蠻已之不修乃責許之不事已不勝其區區之憤以往伐之可謂能自反而縮乎可謂之義兵乎公至自晉正傳曰書公至自晉始終乎非禮之行也且君出入史必書之入則有返面之禮焉胡氏曰宣公薨至是三年之喪畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之事而不朝于周以拜汶陽田之故而往朝于晉其行事亦悖矣此春秋所為作也公行多不致其書公至自晉何其至也必有以也愚謂君出入必書史之常也而其非之之義自見矣秋叔孫僑如帥師圍棘正傳曰棘者公羊云汶陽之不服邑也書叔孫僑如帥師圍棘非其圍也譏以力服也左氏曰叔孫僑如圍棘取汶陽之田棘不服故圍之愚謂魯能使齊歸之汶陽之田而不能服其田間之小邑何耶能使歸之侵田者晉之威力也其不能服小邑者魯成之德不足以服之必待加之威力圍之然後可也孔子曰逺人不服則修文德以來之既來之則安之惜也當時魯國之臣不知此義無有以告其君者此魯之所以卒為魯也胡氏曰復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初稅畝作邱甲稅役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄稅斂輕力役修德政以來之而肆其兵力雖得之亦必失之矣大雩正傳曰書大雩則非禮之禮自見矣雩者祭天禱雨之名惟天子得以祭天諸侯祭禱于山川魯之大雩僣也春秋書之其義見矣晉郤克衛孫良夫伐牆咎如正傳曰牆咎如赤狄别種書晉郤克衛孫良夫伐牆咎如紀貪殘之兵也左氏曰討赤狄之餘焉牆咎如潰上失民也按此則牆咎如之民自潰耳非二國之兵能潰之也夫民心之向背得失係乎上之舉措何如耳記曰得衆則得國失衆則失國由是言之國之得失由民心之得失民心之得失由上舉措之是非故曰牆咎如之潰民自潰也晉為中國盟主其於夷狄來則禦之去則勿追可也晉嘗滅赤狄潞氏甲氏及留吁矣今又欲盡牆咎如而滅之豈仁者之心乎其為貪殘甚矣冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟正傳曰何以書聘志禮也何以書盟志非禮也聘者諸侯邦交之禮禮也盟者歃血以要鬼神非先王之禮非禮也且聘且盟非禮也左氏曰冬十一月晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛禮也愚謂臧宣叔言處二卿之先後禮也其且聘且盟非禮也春秋不貴盟盟者忠信之薄也故方聘問所以致誠信也而又盟以要誠信焉則何信之有故曰且聘且盟非禮也胡氏謂劉敞曰諸侯有聘無盟聘禮也盟非禮也庚與良夫不務引其君當道而生事專命為非禮不信以干先王之典故不繫於國以見其遂事之辱非人臣之操此説然也其言及者公與之盟而不言公見二卿之抗也盟者春秋所惡於惡之中又有惡焉者此類是也愚謂言及者則公及之可知不待乎言公也胡氏乃謂不言公見二卿之抗鑿矣盟不稱國者承上來聘之文也劉敞謂不繫於國以見其遂事之辱誤矣鄭伐許正傳曰書鄭伐許則擅興陵暴之罪自見矣夫許小國也惟仁者為能以大字小鄭一年而再伐之其陵暴甚矣其為不仁亦甚矣不待稱國以伐棄絶之而後罪可著也程胡二子以鄭歸乎楚以甸侯即荆楚遂皆以稱國以伐為棄絶之則泥矣信斯言也則後四年冬伐許又稱鄭伯者何謂乎春秋雖因告詞之略而略之不係乎略之而其夷狄之行已見矣定王二十年四年晉景公十三年齊頃十二年衛定二年蔡景五年鄭襄十八年卒曹宣八年陳成十二年杞桓五十年宋共二年秦桓十八年楚共四年春宋公使華元來聘正傳曰書宋公使華元來聘紀邦交之禮也左氏曰宋華元來聘通嗣君也按此則聘為有詞蓋庶乎得禮矣三月壬申鄭伯堅卒正傳曰堅鄭伯名書鄭伯堅卒紀鄰國之大故也書日者來赴之詳也使人因此而求其平生從夷背華之罪惡著矣杞伯來朝正傳曰書杞伯來朝譏非禮之正也左氏曰歸叔姬故也杜氏曰將出叔姬先修朝禮言其故由是言之非朝覲之正禮矣夏四月甲寅臧孫許卒正傳曰許臧宣叔之名文仲之子也書臧孫許卒紀內大夫之大故也公如晉正傳曰書公如晉著非禮也夫禮不欲數數則瀆語曰恭近於禮逺恥辱也成公頻年如晉豈為恭近於禮乎左氏曰夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天維顯思命不易哉夫晉侯之命在諸侯矣可不敬乎愚謂晉侯不敬成公非特其禍患之先兆亦成公之卑屈頻瀆有以致之也葬鄭襄公正傳曰書葬鄭襄公紀恤鄰之大事也因來赴而書之然使人循月而數之則知非禮之正矣諸侯五月而葬公薨至是未五月而葬焉太速矣太速者不懷非孝愛之情也秋公至自晉正傳曰書公至自晉謹出入也始終乎非禮之行也左氏曰秋公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖天非吾族也其肯字我乎公乃止冬城鄆正傳曰書冬城鄆志得時也重興作也周之冬十月收藏農暇之時也然興作聖人之所重民力也故書之鄭伯伐許正傳曰書鄭伯伐許著陵暴之兵也而忘喪之罪見矣二年而三伐許其陵暴甚矣況其喪葬血未乾而從戎以伐人其忘哀甚矣蓋至是則其不仁不孝豈復有人心乎人類已化為禽獸矣左氏曰冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任冷敦之田程子曰稱鄭伯見其不復為喪以吉禮從戎胡氏曰前此鄭襄公伐許既狄之矣今悼公又伐許乃復稱爵何也喪未踰年以吉禮從金革之事則忘親矣稱爵非美詞所以著其惡也愚謂二先生之言不能無疑焉前既以不稱伯為惡之矣今之稱伯又以為惡之是前後自相矛盾也夫此之稱爵既足以著忘哀之惡則三年何不亦稱爵以著其從楚之夷乎無乃史書之有詳略而不係於一字以為褒貶也歟定王二十一年崩五年晉景十四年齊頃十三年衛定三年蔡景六年鄭悼公費元年曹宣九年陳成十三年杞桓五十一年宋共三年秦桓十九年楚共五年春王正月把叔姬來歸正傳曰書把叔姬來歸紀人倫之變也榖梁曰婦人之義嫁曰歸反曰來歸胡氏曰前書把伯來朝左氏以為歸叔姬也此書把叔姬來歸則出也春秋於內女其歸其出録之詳者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦淫僻之罪多矣王法所重人倫之本録之詳也為世戒也仲孫蔑如宋正傳曰仲孫氏蔑名魯之賢大夫也何以書志聘禮也左氏曰孟獻子如宋報華元也按此則獻子之如宋報聘也禮尚往來一來一往禮無不報正也夏叔孫僑如會晉荀首于榖正傳曰書叔孫僑如會晉荀首于榖著非禮也左氏曰晉荀首如齊逆女故宣伯會諸榖愚謂人臣無私交荀首之如齊非有君命於魯僑如之會榖非有君命於晉二卿私相交會非禮矣梁山崩正傳曰書梁山崩公羊曰記異也外異不書此何以書為天下記異也左氏曰梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何愚謂絳人則亦非常人矣其謂山有朽壤而崩斯言也殆知天地隂陽貫通之理矣夫天地間陰陽之氣一而已也一則天地位萬物育故天之陽氣常貫乎地故山川不崩竭其山有崩者陽氣微而不能貫乎地故山有枯朽之壤而崩在人事則君子道消之應也絳人至於以禮文消異者則末矣本之則無如之何胡氏曰梁山韓國也詩曰奕奕梁山韓侯受命而謂之韓奕者言奕然髙大為韓國之鎮也後為晉所滅而大夫韓氏以為邑焉書而不繫國者為天下記異是以不言晉也左氏載絳人之語於禮文備矣而未記其實也夫降服乘縵徹樂出次祝幣史辭六者禮之文也古之遭變異而外為此文者必有恐懼修省之心主於內若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至於崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弒君十有四亡國三十二其應亦􅉃矣春秋不明著其事應而事應具存其可忽諸秋大水正傳曰髙下皆水謂之大水書大水紀災異也陰盛陽衰之應冬十有一月己酉天王崩正傳曰書己酉天王崩紀天下之大變也左氏曰十一月己酉定王崩夫天王崩天下如喪考妣赴告四方諸侯故史書之於是諸侯有奔喪會葬之禮同軌畢至焉十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢正傳曰書公會諸侯同盟于蟲牢則非禮非時之盟可見矣夫非時者非禮也前十一月己酉天王崩十二月己丑諸侯會盟則非時矣比事而觀其越禮無君之罪可逭耶左氏曰冬同盟于蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難程子曰天王崩而會盟不廢書同見其皆不臣胡氏曰按左氏許靈公訴鄭伯于楚鄭伯如楚訟不勝歸而請成于晉盟于蟲牢鄭服也鄭服則何以書同盟天王崩赴告已及在諸侯之策矣以所聞先後而奔喪禮也而九國諸侯會盟不廢故特書同盟以見其皆不臣春秋惡盟誓於惡之中又有惡焉者此類是也愚謂盟誓非禮也天王崩而會盟焉非禮之中又非禮也春秋正傳卷二十二
