body:
  text: 春秋正傳卷二十八明湛若水撰襄公靈王二十六年二十有七年晉平十二年齊景二年衛獻三十一年蔡景四十六年鄭簡二十年曹武九年陳哀二十三年杞文四年宋平三十年秦景三十一年楚康十四年吳餘祭二年春齊侯使慶封來聘正傳曰書齊侯使慶封來聘志邦交之禮也左氏曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋正傳曰書叔孫豹會諸侯大夫于宋聖人憂喜之情見矣弭兵息民固聖人之所喜混夷夏而召外侮亦聖人之所甚憂也左氏曰宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大災也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為會于宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折爼禮也仲尼使舉是禮也以為多文辭戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至丙辰邾悼公至壬戌楚公子黑肱先至成言於晉丁卯宋向戌如陳從子木成言於楚戊辰滕成公至子木謂向戌請晉楚之從交相見也庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使驛謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳陳孔奐蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙即晉荀盈謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入于宋若我何愚謂觀此則斯會楚反主之以外齊秦而晉楚各處其偏趙孟知楚氛之甚惡則此會雖以弭兵為名而兵甲藏於其間楚勢益張不但混華夷之分為可憂已也衛殺其大夫寧喜正傳曰書衛殺其大夫寧喜著失刑也衛國不能正弒君之罪也左氏曰衛寧喜專公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寧氏殺寧喜及右宰穀尸諸朝石惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行愚謂寧喜弒其君剽已書在諸侯之䇿矣鄰國不能問其罪國人不能正其誅特以公患其專而免餘請殺之耳故魯史因衛國之報而直書之而其不能名正其罪之意春秋有遺憾矣胡氏曰寧喜既坐弒君之罪矣不以討賊之詞何也初衛侯使與喜言苟反政由寧氏祭則寡人寧氏納之衛侯復國患寧喜之專也公孫免餘請殺之曰微寧子不及此吾與之言矣對曰臣殺之君勿與知乃攻寧氏殺喜尸諸朝子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信而國無刑不亦難乎衛侯之弟鱄出奔晉正傳曰書衛侯之弟鱄出奔晉則衛君不能安其弟而弟之賢並可見矣穀梁子曰鱄出奔晉織絇邯鄲終身不言衛其去合乎春秋夫弟同氣也方衛君衎之出也鱄亦出經營于外以為歸道今衛侯既歸而使其弟之賢不能自安以出奔晉窮約以終身於同氣且然而況他人乎左氏曰子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎吾不可以立於人之朝矣終身不仕公喪之如稅服終身愚謂觀此寧喜之見殺衛國刑政之不章此鱄之所以出奔實衛衎為之也公羊曰衛殺其大夫寧喜則衛侯之弟鱄曷為出奔晉為殺寧喜出奔也曷為為殺寧喜出奔衛寧殖與孫林父逐衛侯而立公孫剽寧殖病將死謂喜曰黜公者非吾意也孫氏為之我即死女能固納公乎喜曰諾寧殖死喜立為大夫使人謂獻公曰黜公者非寧氏也孫氏為之吾欲納公何如獻公曰子茍欲納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子縳曰寧氏將納我吾欲與之盟其言曰無所用盟請使公子鱄約之子固為我與之約矣公子鱄辭曰夫負羈縶執鈇鑕從君東西南北則是臣僕庶孽之事也若夫約言為信則非臣僕庶孽之所敢與也獻公怒曰黜我者非寧氏與孫氏凡在爾公孫鱄不得已而與之約己約歸至殺寧喜公子縳挈其妻子而去之將濟于河携其妻子而與之盟曰苟有履衛地食衛粟者昧昧者割也雉彼視秋七月辛巳豹及諸侯之大夫盟于宋正傳曰諸侯之大夫即前晉楚蔡衛陳鄭許曹之大夫也書豹及諸侯之大夫盟于宋著其盟之非也何非也瀆也夏既會于宋趙孟既以楚氛之惡是懼矣今又盟焉宜中國之不競也左氏曰辛巳將盟于宋西門之外楚人𠂻甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信太宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚𠂻甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以憯濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人乙酉宋公及諸侯之大夫盟于蒙門之外愚謂此會蓋合諸侯大夫以弭兵其名則善矣而楚𠂻甲以會而又爭先焉其信安在晉既以德讓而楚勢益張中國諸侯自兹有北面之勢矣夫以盡中國諸侯之大夫而與楚會盟僅閲時而再至于宋紊冠履之辨失王國之尊而瀆大信者必自此盟矣胡氏曰宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南向而朝楚及申之會荆蠻之君篡弒之賊大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐吳滅賴無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也或者乃以宋之盟中國不出荆蠻不入玉帛之使交乎天下以尊周室為晉趙武楚屈建之力而善此盟也其説誤矣冬十有二月乙亥朔曰有食之正傳曰書乙亥朔日有食之義見前靈王二十七年崩二十有八年晉平十三年齊景三年衛獻三十二年蔡景四十七年鄭簡二十一年曹武十年陳哀二十四年杞文五年宋平三十一年秦景三十二年楚康十五年卒吳餘祭三年春無冰正傳曰書春無冰志災異也夏之春寅卯辰月也周之春子丑寅月也夏之春無冰時之燠不足異也子丑之月氣方寒固正鑿氷之時而乃無氷則為災異矣左氏曰梓慎曰今兹宋鄭其飢乎歲在星紀而淫於玄枵以有時災隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢玄枵虛中也枵耗名也土虛而民耗不飢何為愚謂天時地理人事之相應固有是理然分野之説非天之所以普天下之義也且古者列國未分宋鄭之名未有而已有此天地四時之氣運矣又將何所分屬乎其説謬矣夏衛石惡出奔晉正傳曰書衛石惡出奔晉志惡黨之逸罪也夫石惡寧喜之黨也按免餘既殺寧喜尸諸朝石惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不克且曰受命矣乃行是惡既行而遂奔者也春秋書寧喜弒其君剽則惡與乎弒君者也天子諸侯國人不能誅春秋書之有遺憾矣左氏曰衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也邾子來朝正傳曰書邾子來朝志事大之禮也左氏曰邾悼公來朝時事也夫小國之事大國朝聘有時邾以晉執其君魯取其田不以憾於大國而益修時聘焉有改過遷善之心得以小事大之禮矣故左氏曰時事也秋八月大雩正傳曰書秋八月大雩志非禮也左氏曰旱也夫大雩者天子祭天禱雨之祀也魯僣郊禘故因旱而舉大雩非禮矣又行之不以其時又非禮矣故春秋因其事而直書之而其非禮自見矣聖人之感深矣乎仲孫羯如晉正傳曰書仲孫羯如晉譏失如也左氏曰孟孝伯如晉告將為宋之盟故如楚也愚謂宋之盟雖以弭諸侯之兵為名使羯如晉蓋告晉將為宋之盟故如楚如楚者強荆蠻弱王國之幾也中國諸侯皆將朝楚以聽命焉蠻夏之紊亂冠屨之倒置未有甚於此時者也故春秋書其如譏其失其感深矣冬齊慶封來奔正傳曰書齊慶封來奔譏納叛也左氏曰齊慶封好田而嗜酒與慶舍慶封之子政則以其內實遷于盧蒲嫳氏易而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸莊公之黨癸臣子之有寵妻之慶舍封子之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何亦莊公黨而反之二人癸與何皆嬖使執寢戈而先後之公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾皆惠公孫怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也子家曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已盧蒲癸王何皆莊公黨卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必於嘗歸猶可及也子家弗聽亦無悛志子息即慶嗣也曰亡矣幸而獲在吳越陳無宇濟水而戕舟發梁盧蒲薑謂癸曰有事而不告我必不捷矣癸告之薑曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于太公之廟慶舍涖事盧蒲薑告之且止之弗聽曰誰敢者遂如公麻嬰為尸慶奊為上獻盧蒲癸王何執寢戈慶氏以其甲環公宮陳氏須無鮑氏鮑國之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒子雅髙子尾陳須無鮑鮑國之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍以爼壺投殺人而後死遂殺慶繩麻嬰公懼鮑國曰群臣為君故也陳須無以公歸稅服而如內宮慶封歸遇告亂者丁亥伐西門不克還伐北門克之入伐內宮弗克反陳于嶽請戰弗許遂來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封汜祭穆子不説使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘子之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃愚謂此本傳也由是觀之則慶封之惡逆無所容於天地之間矣魯為望國乃納享之宜齊人來讓奔也已春秋書之册所以病魯也十有一月公如楚正傳曰書公如楚志中國諸侯之失道也左氏曰為宋之盟故公及宋公陳侯鄭伯許男如楚公過鄭鄭伯不在伯有迋勞於黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎愚按此傳則公率王國之諸侯以朝荆蠻矣前仲孫羯之如晉以告正為此也夫天地之大分人道之大防諸侯皆隳之矣乃穆叔責伯有之不敬是舍己而求人舍肩背而求其一指也豈不惑哉十有二月甲寅天王崩正傳曰書天王崩志天下之大變也天下如喪考妣諸侯皆有奔赴會葬之禮焉故書之按左氏冬記癸巳天王崩未來赴亦未書禮也則是十月癸巳也今書以十有二月甲寅者何左氏曰王人來告喪問崩日以甲寅告故書之以懲過也愚謂天王崩天下大變天下之事莫有大於此而赴不以時日使失其真天下諸侯之失道可知矣乙未楚子昭卒正傳曰昭楚子名書楚子昭卒志與國之大故也楚來赴則史書之左氏公如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇飢寒不恤誰遑其後不如姑歸也叔孫穆子曰仲子專之矣子服子始學者也榮成伯曰逺圖者忠也公遂行宋向戌曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反胡氏曰甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月明殺恩之非禮也景王元年二十有九年晉平十四年齊景四年衛獻三十三年卒蔡景四十八年鄭簡二十二年曹武十一年陳哀二十五年杞文六年宋平三十二年秦景三十三年楚郟敖麋元年吳餘祭四年弒春王正月公在楚正傳曰書春王正月公在楚謹君也而魯侯之非道見矣左氏曰釋不朝正于廟也楚人使公親襚公患之穆叔曰祓殯而襚則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之愚謂書公在楚繫於春王正月之下則公內不朝廟外不朝王不忠不孝之罪著矣宜其召親襚之辱也故穀梁曰罪公也愚按左氏自是而後夏四月公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓則列國禮楚如臣禮君然蓋為強力所制而不得歸者六月中間天王之崩曽不見奔春秋治襄公之罪深矣胡氏曰歲之首月公在他國者有矣此特書公在楚者外為荆蠻所制以俟其葬而不得歸內為強臣所逼欲擅其國而不敢入故特書所在以存君也按左氏楚人使公親襚夏四月送楚子葬至于西門之外還及方城季武子取卞以自封使公冶告曰聞守卞者將叛臣帥師徒以討既得之矣公曰欲而言叛祗見疏也吾不可以入矣將適諸侯有賦式微者乃歸故特於歲首朝正之時而書曰公在楚使後世臣子戴天履地視君父之危且困者必有天威不違顔咫尺食坐見於羮墻之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者乎夏五月公至自楚正傳曰書夏五月公至自楚謹君之出入也使人考其時斯病之矣蓋襄公在楚者六月矣一不謹於始遂為強楚所制使之親襚使之送葬中國諸侯臣於夷狄自此行也春秋書之其憾深矣左氏曰公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥師徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我愚謂觀此則襄公一失此行外為強楚所制內為季氏所拒春秋書至之深意可見矣公冶其亦賢矣世之欺君以圖富貴利達者猶將意氣揚揚以誇耀於人其視公冶致邑不入冕服不斂以為非德賞者得無厚顔乎穀梁曰喜之也致君者殆其往而喜其反此致君之意義也庚午衛侯衎卒正傳曰書衛侯衎卒書赴也閽弒吳子餘祭正傳曰書閽弒吳子餘祭誅弒賊也何以不名賊魯史以逺而略之故逸其名而書其事以為近刑人之戒也左氏曰吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之公羊曰閽者何門人也刑人也刑人則曷為謂之閽刑人非其人也君子不近刑人近刑人則輕死之道也穀梁曰禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞正傳曰書仲孫羯會諸侯之大夫城杞從晉志也而其非義見矣左氏曰晉平公把出也故治杞六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子太叔與伯石往子太叔見太叔文子與之語文子曰甚乎其城杞也子太叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰婚姻孔云晉不鄰矣其誰云之穀梁曰古者天子封諸侯其地足以容其民其民足以滿城以自守也杞危而不能自守故諸侯之大夫相帥以城之此變之正也愚謂觀左穀二傳則晉主於城杞而合諸侯以為之也文子甚哉之嘆為是則穀梁變正之語為非而其城杞之失可知矣胡氏曰晉平公杞出也故合諸侯之大夫以城杞古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為次也晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍于母家周人怨思焉揚之水所以降為國風不得列于雅也城杞之役亦不待貶絶而可見矣愚謂棄同而即異厚母而忘君此晉之失一事耳至於非有戡定禍亂尊奬王室之大義而擅興十國之衆使暴露於逺外棄天之民失地之利其罪大矣何以為盟主乎晉侯使士鞅來聘正傳曰書晉侯使士鞅來聘著其聘之失也左氏曰范獻子來聘拜城杞也公享之展莊叔執幣射者三耦公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦愚謂觀此則士鞅之聘無乃拜城杞之私耳非朝聘會同之典也其失不待貶而自見矣又觀三耦公私之説則君弱臣強可見而城杞之失亦強臣成之耳杞子來盟正傳曰書杞子來盟則其盟之非禮可見矣左氏曰晉侯使司馬女叔侯來治杞田弗盡歸也晉悼夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍楊韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虛月如是可矣何必瘠魯以肥杞且先君而有知也毋寧夫人而焉用老臣杞文公來盟書曰子賤之也愚謂觀此則杞子來盟蓋為晉治魯之侵田而遂要盟恃晉之強以陵魯耳豈誠心與直道哉春秋書之惡其非禮也蓋不待書子以賤之矣吳子使札來聘正傳曰札吳公子名名之無他義書吳子使札來聘善其聘也通嗣君也正也善其慕華夏而來也左氏曰吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也愚謂夫子昔固以延陵季子為知禮矣及觀此傳則季子聞歷代之樂而知其德之盛衰蓋又知道者也其知慕中國之盛而使吳之用夏變夷此其所以為賢公子也仲尼書之春秋蓋喜其來而著其善也公羊以為以讓國為賢而書之胡氏又以為以辭國生亂而貶之皆非聖人灑然大公無意必固我之心矣夫不立長而欲致位乎季之幼者謂貽謀之未善也季子不受亂弒之讓守正之道也季子何與焉公羊之所謂賢季子之讓國胡氏之所謂貶季子辭國以生亂皆非矣其稱吳子稱札國史略逺人而聖人因之耳故曰其文則史也秋七月葬衛獻公正傳曰書葬衛獻公志鄰國之大事也諸侯之葬有同盟皆至之禮焉齊髙止出奔北燕正傳曰書齊髙止出奔北燕著奔者與奔之者之罪也左氏曰秋九月齊公孫蠆公孫竈放其大夫髙止於北燕乙未出書曰出奔罪髙止也髙止好以事自為功且專故難及之穀梁曰其曰北燕從史文也愚謂觀此二傳則髙止公孫之罪與春秋之文皆可得之矣夫髙止不知以臣道自處好事自專至於身不見容去父母之邦而宗祧不守此其罪也至於蠆與竈擅放大夫是無上蔑君其罪均耳穀梁曰北燕從史文則春秋之文皆從史者矣蓋燕則一燕耳何有南北以燕在魯北故史謂北燕聖人從之竊取之義有不繫焉其文則史之語豈欺我哉冬仲孫羯如晉正傳曰書仲孫羯如晉志邦交之禮也左氏曰冬孟孝伯如晉報范叔也愚謂禮尚往來范獻叔夏來聘故冬使羯報之得施報往來之宜矣故春秋書之景王二年三十年晉平十五年齊景五年衛襄公惡元年蔡景四十九年弒鄭簡二十三年曹武十二年陳哀二十六年杞文七年宋平三十三年秦景三十四年楚郯敖二年吳夷昧元年春王正月楚子使薳罷來聘正傳曰書楚子使薳罷來聘志禮也左氏曰通嗣君也穆叔問王子王子圍之為政何如對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩薳字將與焉助之匿其情矣愚謂凡諸侯新立則使大夫相通聘邦交之禮也再觀此傳則聘問之使國之輕重安危繫焉不可假於匪人也薳罷與穆叔一問答之際而楚之亂已見可不慎哉夏四月蔡世子般弒其君固正傳曰書蔡世子般弒其君固誅弒逆之賊也左氏曰蔡景侯為太子般娶于楚通焉太子弒景侯愚謂觀此傳則般不但有弒君之罪而且有弒父之罪矣孟子謂春秋之時臣弒其君者有之子弒其父者有之今般兼二罪而有焉而春秋獨書弒君者何臣子一道特書其大者耳其不日者外事略也穀梁以為其不日子奪父政是謂夷之非也五月甲午宋災宋伯姬卒正傳曰書五月甲午宋災宋伯姬卒卒于災也詳卒之賢伯姬也左氏曰或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也穀梁曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不丁堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也胡氏曰易曰恆其德貞婦人吉夫子凶而或以為共姬女而不婦非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見於春秋者宋伯姬耳聖人冠以夫諡書於春秋曰葬宋共姬以著其賢行勵天下之婦道天王殺其弟佞夫景王也正傳曰書天王殺其弟佞夫罪歸王也王有殺之之道也左氏曰初王儋季周靈王弟卒其子括將見王而歎單公子愆期為靈王御士遇諸庭聞其歎而言曰嗚呼必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫靈王子景王弟佞夫弗知戊子儋括圍蒍周邑逐成愆成愆奔平畤周邑五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也穀梁曰傳曰諸侯且不首惡况於天子乎君無忍親之義天子諸侯所親者惟長子母弟耳天王殺其弟佞夫甚之也愚謂天王者天下彛倫之攸敘王有弟佞夫既不能教之於平素又不能保全之於危疑而明其不知儋括之謀乃聽其見殺於尹劉單甘諸人之手是王殺之也春秋書之左氏穀梁以為罪在王也甚之也宜矣王子瑕奔晉正傳曰瑕景王之弟書王子瑕奔晉交譏之也罪瑕之逃王而王不能存之也吳氏曰瑕蓋亦與聞乎儋括之謀括事敗而佞夫見殺瑕懼及禍而奔晉愚謂君臣父子之義無所逃於天地之間者也瑕不能明忠孝之道而自比於逆亂之黨奔以免死而自絶於君父矣雖然景王不能庇其同氣使佞夫見殺於尹劉之黨而瑕懼以出奔則瑕固有罪矣王獨無罪乎春秋書之譏及王也秋七月叔弓如宋葬宋共姬正傳曰叔弓叔老之子共姬從夫諡也書叔弓如宋葬宋共姬親之也賢之也公羊曰宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅姆不下堂逮乎火而死鄭良霄出奔許自許入于鄭鄭人殺良霄正傳曰良霄鄭大夫伯有其字書鄭良霄出奔許自許入于鄭鄭人殺良霄罪惡逆也左氏曰鄭伯有嗜酒為窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳即駟以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許大夫聚謀子皮即罕曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助強子産曰豈為我徒國之禍難誰知所敝或主強直難乃不生姑成吾所辛丑子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者況生者乎遂自止之壬寅子産入癸卯石子入皆受盟于子晳氏乙巳鄭伯及其大夫盟于太宮盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶帥國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是遊吉如晉還聞難不入復命于介八月甲子奔晉駟帶追之及酸棗與子上駟帶盟用兩圭質于河使公孫肸入盟大夫己巳復歸書曰鄭人殺良霄不稱大夫言自外入也胡氏曰按左氏良霄汰侈嗜酒諸大夫皆惡之而與公孫黑爭黑因其醉伐之良霄奔許自許襲鄭以伐公門弗勝死于羊肆不言復入者其位未絶也冬十月葬蔡景公正傳曰書葬蔡景公志鄰國之大事也使人求其所以死所以葬之故而其罪惡自見矣鄰國諸侯不討弒君之賊而乃公然會葬諸侯之罪與般罪均矣晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故正傳曰書諸侯之大夫會于澶淵宋災故則其善惡並見矣左氏曰為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宮他鄭罕虎及小邾之大夫會于澶淵既而無歸於宋故不書其人君子曰信其不可不慎乎澶淵之會卿不書不信也夫諸侯之上卿會而不信寵名皆棄不信之不可也如是書曰某人某人會于澶淵宋災故尤之也公羊曰宋災故者何諸侯會于澶淵凡為宋災故也諸侯相聚而更宋之所喪曰死者不可復生爾財復矣愚謂以二傳觀之澶淵之會諸侯之大夫謀歸宋財曰爾財復矣於此得救患恤災之義矣諸侯不會而大夫會政在大夫矣既而無歸宋財是又失信矣失信者必忘義忘義失信其可乎故曰其善惡並見矣或以不書卿為諱稱人為貶者非竊取之義也胡氏曰春秋大法君弒而賊不討則不書葬況世子之於君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致襚為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之䇿而往會其葬是恩義情禮之篤於世子般不以為賊而討之也人之所以異於禽獸王國之所以貴於苗蠻以其有父子之親君臣之義耳世子弒君是父子君臣之道滅也而不知討豈不廢人倫滅天理乎故春秋大法弒君賊不討則不書葬而蔡景公特書葬者聖人深痛其所為遍刺天下之諸侯也魯隱宋殤之賊不討則不書葬蔡景公賊亦不討而特書葬猶閔僖二公不承國於先君則不書即位桓篡弒以立而反書之也何以知聖人罪諸侯之意如此乎以下文書會于澶淵宋災故而貶其大夫則知之矣二百四十二年之間列會亦衆而未有言其所為者此獨言其所為何遍刺天下之大夫也大夫以智帥人者也智者無不知當務之為急不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可為知務乎陳恆弒簡公孔子沐浴而告於哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至於淪絶無父與君是禽獸也禽獸逼人雖得天下弗能一朝處矣昔者伯禹過門而不入放龍蛇也周公坐而俟旦驅猛獸也今世子弒君三綱淪絶禽獸逼人則與之同羣而不恤有國者不戒于火自亡其財苟其來告弔之可也則合十二國之大夫駐于澶淵而謀更其所喪尚為知類也乎夫蔡之亂其猶人身有腹心之疾而宋之災譬諸桐梓與雞犬也謀宋災而不恤蔡之亂奚啻於養桐梓求雞犬不顧其身有腹心危疾而不知療者哉以為未之察也可為不智苟察此而不謀則亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言會之所為以垂戒後世其欲人之自别於禽獸之害也可謂深切著明矣或曰夫穆叔趙孟向戌子皮皆諸侯之良也而所謀若是何也世衰道微邪説交作以利害謀國家而不知本於仁義也久矣是以至此極孔子所為懼春秋所以作乎愚謂胡氏此篇誠多確論但能超然去其義例之蔽則甚善矣景王三年三十有一年晉平十六年齊景六年衛襄二年蔡靈公般元年鄭簡二十四年曹武十三年陳哀二十七年杞文八年宋平三十四年秦景三十五年楚郟敖三年吳夷昧二年春王正月正傳曰無事亦書時月義見于前夏六月辛巳公薨于楚宮正傳曰書公薨于楚宮穀梁曰楚宮非正也諸侯卒于正寢禮也于楚宮是不以正終矣左氏曰公作楚宮穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宮若不復適楚必死是宮也六月辛巳公薨于楚宮叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪秋九月癸巳子野卒正傳曰子野胡女敬歸之出襄公子也書秋九月癸巳子野卒志君嗣之大故也且閔其傷於孝也左氏曰立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子稠穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞以卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰袵如故衰於是昭公十九年矣猶有童心君子是以知其不能終也愚按左氏以子野之卒為毁則知其卒為哀毁之過矣汪氏曰居喪毁瘠不形者先王之禮也毁不滅性者先王之教也故不勝喪者比於不慈不孝子野過毁瘠以致滅性亦為不子矣愚謂汪氏之言正矣然當春秋之時臣弒其君子弒其父者相尋於天下而視野之傷孝何如也春秋書之聖人之感深矣己亥仲孫羯卒正傳曰書仲孫羯卒志國卿之大故也冬十月滕子來會葬正傳曰書滕子來會葬志非禮也天子七月而葬同軌畢至諸侯五月而葬同盟至禮也然所謂至者諸侯則弔以士葬以大夫天子則諸侯親奔也夫國君以守宗社為重者也諸侯會葬親往則自輕其宗社且卑甚矣故非禮也左氏曰滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎癸酉葬我君襄公正傳曰書癸酉葬我君襄公志國之大事也十有一月莒人弒其君密州正傳曰密州莒子名書莒人弒其君密州誅逆賊也左氏曰莒犂比公密州之號生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子即密州弒之乃立去疾奔齊齊出也展輿吳出也書曰莒人弒其君買朱鉏言罪之在也程子曰莒子虐國人弒之而立展輿展輿非親弒也故書國人愚謂弒父與君天下之大惡左氏稱展輿因國人弒父春秋何以不書其名而誅之宜從程子之説為正也考胡氏曰經以傳為案傳有乖繆則信經而棄傳可也若密州之事是矣左氏稱莒子生去疾及展輿既立展輿又廢之莒子虐國人患焉展輿因國人以攻莒子弒之乃立信斯言則子弒其父也而春秋有不書乎故趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾左氏博通諸史敘事尤詳皆令後人得見本未因以求意經文可知而門弟子轉相傳受日月既久浸失本真如書晉趙盾許世子止等事詳考傳之所載以求經之大義可也而傳不可疑如莒人弒其君密州獨依經之所言以證傳之謬誤可也而傳不可信盡以為可疑而廢傳則無以知其事之本末盡以為可信而任傳則經之𢎞意大旨或泥而不通矣要在學者詳考而精擇之可也愚謂據此言則胡氏所謂因傳之本末以求意經文可知此正愚今之説也若使胡氏盡以此説求之則與孟子所謂其文則史其義則丘竊取之意合而春秋之本指明矣惜乎其他不如此也春秋正傳卷二十八
