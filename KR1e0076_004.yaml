body:
  text: 春秋正傳卷四明湛若水撰桓公名軌史記名允惠公之子隐公弟在位十八年桓王九年元年齊僖二十年晉哀七年衛宣八年蔡桓四年鄭莊三十三年曹桓四十六年陳桓三十四年杞武四十年宋殤九年秦寧五年楚武三十年正傳曰元者始也元年者胡氏曰即位之始年也自是累數雖久而不易此前古人君記事之例春秋祖述為編年法是也胡氏又引乾元亨利貞乾元坤元體元調元仁人心之義以證元為人君之用則支離而逺於事實矣春王正月公卽位正傳曰書春王正月公即位國史之法直書其即位之月紀大事也而桓公簒弑之罪自不可掩矣榖梁以為桓無王非也隐不書即位而桓書即位何也史之舊文有詳畧聖人因之其善惡固不係乎此也然桓書即位公羊以為如其意榖梁以為與聞乎弑程胡從之若然則隐之即位亦非正也而胡氏以為隐闕即位者是仲尼削之惡其與爭亂造端而簒弑所由起也何以不如桓之書即位以著其罪乎於隐之不書則曰削之不與其為君於桓之書則曰著其罪是前後不一紛紛為之説而不憚煩使聖人之心益晦也餘見隐公元年三月公㑹鄭伯于垂正傳曰垂者杜預曰衛地榖梁曰㑹者外為主焉耳愚謂書公㑹鄭伯于垂則違禮之失黨比之私皆可見矣古者朝覲㑹同必有其時非其時而㑹皆非禮也髙氏曰鄭知桓之簒不自安為㑹以求賂魯急㑹諸侯以従欲是所謂黨比之私也下文鄭伯以璧假許田亦其一事矣鄭伯以璧假許田正傳曰假猶易也不言易而言假鄭行人為美詞耳公榖程胡皆以為諱為𨼆非也許田者公羊曰魯朝宿之邑也諸侯時朝于天子天子之郊諸侯皆有朝宿之邑左氏曰公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也愚謂是矣書鄭伯以璧假許田則私相易地之非可見矣何以謂之非公羊曰有天子存則諸侯不得專地也榖梁曰禮天子在上諸侯不得以地相與也程子曰𨼆公八年鄭伯使宛來歸祊盖欲易許田魯受祊而未與許田及桓弑立故為㑹以求之復加以璧夫朝宿之邑先祖受之於先王豈可相易也胡氏曰鄭既歸祊矣又加璧者祊薄于許愚謂非也祊歸而許未與故加以禮要之耳胡氏又以為聖人惡之為其放於利而行孟子極陳利國之害皆拔本塞源杜簒弑之漸也愚謂此則推義愈逺而愈支恐非聖人取義之本意矣夏四月丁未公及鄭伯盟于越正傳曰越地名及者公及之也書公及鄭伯盟于越則非其盟之義見矣何謂非盟左氏曰結祊成也盟曰渝盟無享國程子曰桓公欲結鄭好以自安故既與田又為盟也弑君之人凡民罔不懟而鄭與之盟以定之其罪大矣胡氏曰鄭人欲得許田以自廣是以爲垂之㑹桓公欲結鄭好以自安是以為越之盟夫弑逆之人凡民罔弗憝即孟子所謂不待教人得而誅之者也而鄭與之盟以定其位是肆人欲滅天理變中國為夷狄化人𩔖為禽獸聖人所為懼春秋所以作無俟於貶絶而惡自見矣愚謂由胡氏之言觀之則愚所謂春秋褒貶不待聖人字字而筆之而善惡自不可掩者此之謂也夫聖人之心如天然天豈物物而雕刻之哉胡子宜持此以觀春秋秋大水正傳曰書秋大水誌災也左氏曰凡平原出水為大水榖梁曰髙下有水灾曰大水愚謂天人感應之理微矣或灾而有應者程子所謂若桓行逆徳而致隂沴乃其宜是也或灾而無應者胡氏所謂堯之時豈有致之者是也皆不可執一以為必然之説而反啓後世人君不信之心也盖人君之於灾變之來如上天之所示謫聖人敬天之心不得不戒故堯曰洚水警予而變理隂陽寅亮天工以致位育乃人君性分内事耳故堯舜憂洪水使禹治焉然後人得平土而居之此其分内事也胡氏又以為天非為堯有洪水之灾至禹而後水由地中行爾則又不免固執不通而為之詞矣冬十月正傳曰無事亦書冬十月具時以待事國史之法也仲尼於史法猶存之而不削亦可以見春秋為史之文而非仲尼之文矣桓王十年二年齊僖二十一年晉哀八年衛宣九年蔡桓五年鄭莊三十四年曹桓四十七年陳桓三十五年杞武四十一年宋殤十年弑秦寧六年楚武三十一年春王正月戊申宋督弑其君與夷正傳曰以臣弑君人倫之大變天地之反覆故書之所以誅亂賊也書春王正月戊申以時月日紀其實大變不可不詳史之法也榖梁以為桓無王而曰王正與夷之卒胡氏以為桓無王而元年書春王正月以天道正王法正桓公之罪二年書春王正月以天道正王法正宋督之罪皆非也若桓督之大惡天下之所共知而共誅之者何待以天道正王法而後可以正其罪乎盖書春王正月史之通例耳及其大夫孔父正傳曰書及其大夫孔父則弑亂之謀忠君之節皆可見矣孔姓父名宋大夫及者兼并之稱公榖皆以為累之非也左氏曰宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心然後動於惡故先書弑其君此可見宋督弑亂之謀也公羊曰督將弑殤公孔父生而存則殤公不得而弑也故於是先攻孔父之家殤公知孔父死巳必死趨而攻之皆死焉孔父正色立於朝則人莫敢而致難於其君者榖梁曰督欲弑君而恐不立於是乎先殺孔父程子曰人臣死君難書以著其節胡氏曰君弑死於其難處命不渝亦可以無愧矣此可見孔父忠君之節也滕子來朝正傳曰書滕子來朝則悖禮之罪黨賊之惡皆可見矣夫朝覲㑹同有王者之制而私相朝是無君悖禮其罪一矣况桓乃弑君之賊隣國所宜告於天子約與國而討之滕反朝焉則其黨惡之罪二也不可解矣程子曰首朝桓公罪自見矣胡氏曰桓公弟弑兄臣弑君天下之大惡凡民罔弗憝也巳不能討又先鄰國而朝之是反天理肆人欲與夷狄無異而春秋之所深惡愚謂此皆是也至於程子以為滕本侯爵後服於楚故降稱子夷狄之胡氏又以為孔子作春秋嚴亂賊之黨故降而稱子以正其罪則皆求之太過矣夫侯而侯之子而子之則滕之罪安可逃耶夫禮樂征伐自天子出非天子不議禮故爵乃命之於天子所謂天命天討也孔子作春秋以遏亂賊乃公然自執天子征伐爵命與奪之權是自墮於無上之歸而不自免矣孟子所謂春秋天子之事知我罪我惟春秋者盖我者我衆人也謂天下後世善者惡者觀春秋之所善惡若知我罪我者此所以亂臣賊子懼而寓天子之法也譬之懸明鑑於此而妍者蚩者過之皆惕然以為若妍蚩我也先儒解書之誤至使此兩言與前其文則史其義竊取之指大相矛盾其累聖人之心豈小小哉然則何以稱子曰滕本五十里小國也子男之國也或其先僣稱或今出於史官之稱皆未可知非聖人黜之也三月公㑹齊侯陳侯鄭伯于稷以成宋亂正傳曰書公㑹齊侯陳侯鄭伯于稷以成宋亂則直書其以惡濟惡之罪矣曰公㑹者公主之也曰以者公以之也故榖梁曰以者内為志焉爾公為志乎成是亂也愚謂使公不㑹則宋之亂賊不討乎左氏曰㑹于稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰故因民之不堪命先宣言曰司馬則然巳殺孔父而弑殤公召莊公于鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故督遂相宋公愚謂觀此則宋亂公成之也桓公宋督皆弑君之賊故曰以惡濟惡也其不諱國惡者史之直筆以示天下後世之公也其於桓直而於隐諱者公羊以為隐賢而桓賤非也史之文有詳畧耳程子曰宋弑其君而四國共成定之天下之大惡也胡氏曰邾定公時有弑父者公瞿然失席曰是寡人之罪也嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦殺其人壊其室洿其宫而瀦焉盖君踰月而後舉爵華督弑君之賊凡民罔不憝也而桓與諸侯㑹而受賂以立華氏使相宋公甚矣故特書其所為而曰成宋亂又曰桓弑隐督弑殤般弑景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋灾而不能討故特書其事以示貶焉然澶淵之㑹既不書魯卿又貶諸國之大夫而稱人此則書公又序諸侯之爵何也澶淵之㑹欲謀宋灾而不討弑君之賊雖書曰宋灾故而未能表其誅責之意也必深諱魯卿而重貶諸國之大夫然後足以啓問者見是非也稷之㑹前有宋督弑君後有取宋鼎之事書曰成宋亂則其責己明不必諱公與貶諸侯之爵次然後見其罪矣愚嘗謂春秋中未嘗以一字定是非其間有之者若此書以成宋亂是也亦罕矣若諸儒之説春秋皆執泥其一字之文故他或又有不然者不得其説從而為之詞耳胡氏於此始謂不必諱公與貶諸侯之爵然後見其罪則凡春秋皆據事以求聖人竊取之義而不必問其名與不名貶與不貶而其是非自見不亦快乎夏四月取郜大鼎于宋戊申納于太廟正傳曰書取郜大鼎于宋納于太廟罪納賊賂也取猶致也納猶入也程朱皆以為弗受而強致之之辭則泥矣左氏曰非禮也臧哀伯諫曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽𢃄裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鑾和鈴昭其聲也三辰旂旗昭其明也夫徳儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅徳立違而寘其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聽周内史聞之曰臧孫達其有後於魯乎君違不忘諌之以徳公羊曰何譏爾遂亂受賂納于太廟非禮也榖梁曰桓内弑其君外成人之亂受賂而退以事其祖非禮也程子曰四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂以為功而受之故書取以成亂之賂器置于周公之廟周公其享之乎胡氏曰弑逆之賊不得致討而受其賂器寘于太廟以明示百官是教之習為夷狄禽獸之行也公子牙慶父仲遂意如之惡又何誅焉聖人為此懼而作春秋故直載其事謹書其日垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣愚謂日者亦史日之耳秋七月杞侯來朝正傳曰杞公榖程子皆作紀書七月杞侯來朝則其違禮黨惡之罪可見矣月者榖梁以為惡之故月以謹書之非也據事直書而其惡自見何係月與不月乎胡氏曰桓弟弑兄臣弑君天下之大惡王與諸侯不奉天討反行朝聘之禮則皆有貶焉所以存天理正人倫也紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之主非為桓立而朝之也左氏又曰杞侯來朝不敬杞侯歸乃謀伐之愚謂左胡二説相矛盾夫紀既求魯為之主則必無不敬之事有不敬者必為桓立而朝之也諸侯朝聘皆有定制無故而私朝以成弑君之賊則違禮黨惡之罪不容誅矣蔡侯鄭伯㑹于鄧正傳曰書蔡侯鄭伯㑹于鄧則三國非禮之失隂謀召禍之端皆可見矣夫三國不守㑹同之大義不宜㑹而㑹以謀禦楚則終不免矣左氏曰始懼楚也胡氏曰其地以國鄧亦與焉楚自西周已為中國之患宣王盖嘗命將南征矣及周東遷僭號稱王憑陵江漢此三國者地與之隣是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人盖傷之也夫天下莫大於天理莫強於信義循天理惇信義以自守其國家荆楚雖大何懼焉不知本此事醜徳齊莫能相尚則以地之大小力之强弱分勝負矣九月入杞正傳曰書九月入杞著擅興憤暴之罪也左傳曰討不敬也入者榖梁曰我入之也程子又有將卑師少外則稱人内則止云入某伐某之説則求之太鑿矣愚謂禮人不答反其敬敬立而人敬之矣况已本未敬而責人以敬而討之而入之可乎公及戎盟于唐正傳曰左氏謂修舊好也書公及戎盟于唐著其盟之非也春秋無善盟盟者非先王之法而忠信之薄也况及戎盟乎况逺盟于唐乎故春秋書以非之冬公至自唐正傳曰書公至自唐紀人君出告反靣之節也而其出與反之是非自見矣君舉必書國史之職也左氏曰告于廟也凡公行告于宗廟反行飲至舎爵䇿勲焉禮也特相㑹往來稱地讓事也自參以上則往稱地來稱㑹成事也愚按榖梁以為逺之也是也程胡皆以為危之者非也至於居夷浮海之説愈迂逺矣盖人子出告反靣常禮耳况唐之盟又逺出乎何謂出與反之是非也盖聖人嚴華夷内外之防重天冠地履之分而盟于夷皆悖先王之禮也其出也必曰為某人出其反靣亦如之則將何以致詞於周公之前乎故曰其是非自見矣桓王十一年三年齊僖二十二年晉哀九年衛宣十年蔡桓六年鄭莊三十五年曹桓四十八年陳桓三十六年杞武四十二年宋莊元年秦寧七年楚武三十二年春正月公㑹齊侯于嬴正傳曰嬴齊地春正月三字當與下公㑹六字相連先儒分之悮矣書春正月公㑹齊侯于嬴著㑹之非禮也左傳曰㑹于嬴成昏于齊也夫昏必有媒介必行采幣魯桓不此之由而自越境以㑹成昏於齊以自託自安其簒是㑹不以禮昏不以禮也故春秋譏之春正月而不言王者蒙元年二年之文國史畧之耳且正月非王之正月而誰正月乎若以為桓弑賊無王故不稱王則元年二年何以稱王若以為元年二年稱王以正桓公宋督之罪則何必待三年後乃不稱王乎若以為周不班厯故不稱王如是則雖正月亦不宜書矣此皆不通之論程胡従之誤矣夏齊侯衛胥命于蒲正傳曰蒲者地名衛下缺一侯字書夏齊侯衛侯胥命于蒲善二國之胥命也春秋無善盟而善胥命左氏曰不盟也公羊曰胥命者相命也近正也古者不盟結言而退程子曰二國為㑹約言相命而不為盟詛近於理也故善之胡氏曰人愛其情私相疑貳以成傾危之俗其所由來漸矣有能相命而信諭豈不獨為近正乎故特起胥命之文於此有取焉聖人以信易食答子貢之問君子以信易生重桓王之失信去則民不立矣故荀卿言春秋善胥命六月公㑹杞侯于郕正傳曰杞當作紀書公㑹紀侯于郕著不正之㑹也㑹同有禮此其正也非期而㑹㑹必以私皆不正矣左氏曰杞求成也程子曰自桓公簒立無歳不與諸侯盟㑹結外援以自固也愚謂如是而㑹豈禮之正乎故春秋書以非之秋七月壬辰朔日有食之既正傳曰七月壬辰朔者七月初一日壬辰也榖梁曰言日言朔食正朔則其詞愈支而晦矣胡氏因之又有食晦食夜之説公羊曰既者何盡也愚謂書壬辰朔日有食之既紀非常之異也程子曰食盡為異大也胡氏曰日者衆陽之宗人君之象而有食之既則其為變大矣先儒以為荆楚僭號鄭拒王師之應愚謂日食有常度聖人書之以示人君克謹天戒之道然而天道逺人道邇雖無楚鄭之應聖人猶宜致謹也公子翬如齊逆女正傳曰書公子翬如齊逆女著桓公之非禮也禮重大昏昏必親迎所以合二姓之好以嗣先君之嫡也今使公子逆女未聞親迎於其國於境上於所館焉非禮之正也榖梁曰逆女親者也使大夫非正也胡氏曰娶妻必親迎禮之正也若夫邦君以爵則有尊卑以國則有大小以道途則有逺邇或迎之於其國或迎之於境上或迎之於所館禮之節也紀侯於魯以小大言則親之者也而使履緰來魯侯於齊以逺邇言則親之者也而使公子翬往是不重大昏之禮失其節矣故書愚謂皆是也其稱公子不稱公子史之文有詳畧耳左氏以為脩先君之好故曰公子程子以為翬於𨼆世不稱公子𨼆之賊也於桓世稱公子桓之黨也是翬於𨼆時弑逆之惡未見而反先去其公子於桓時弑逆之惡己成而反完其公子是與奪反易而不通矣凡此𩔖者皆先儒擬經之過不可不辨也九月齊侯送姜氏于讙公㑹齊侯于讙夫人姜氏至自齊正傳曰一事也三書者何譏昏之三失禮也故其詞複夫昏禮之重也榖梁引子貢曰冕而親迎不己重乎孔子曰合二姓之好以繼萬世之後何謂己重乎何以謂之三失禮左氏曰凡公女嫁于敵國姊妹則上卿送之公不自送故齊侯送嫁之非一失禮矣愚謂㑹則有㑹禮親迎則有親迎之禮公不行親迎之禮而于讙乃又㑹焉是失親迎之禮又非㑹同之時故程子曰齊侯出疆送女公逺㑹之皆非禮也是二失禮矣書夫人姜氏至自齊程子曰告于廟是也何以知其為告廟告廟然後成其為婦以稱夫人見之也今不言以至則至不在公是三失禮矣胡氏曰古者昏禮必親迎則授受明後世親迎之禮廢於是有父母兄弟越境而送其女者以公子翬往逆逆則既輕矣為齊侯來乃逆而㑹之于讙是公之行其重在齊侯而不在姜氏豈禮也哉不言以至者既得見乎公也不能防閑於是乎在敝笱之刺兆矣禮者所以别嫌明㣲制治于未亂不可不謹也娶夫人國之大事故詳冬齊侯使其弟年來聘正傳曰書齊侯使其弟年來聘紀致女之禮也左氏曰冬齊仲年來聘致夫人是也有年正傳曰書有年誌喜也榖梁以為五榖皆熟為有年公羊曰有年何以書以喜書也大有年何以書亦以喜書也此其曰有年何僅有年也彼其曰大有年何大豐年也僅有年亦足以當喜乎特有年也愚謂觀春秋者當大其心胷而觀之然後得聖人之心如書有年不過魯史見魯之有年而書之以誌喜聖人因而存之重民食耳而程子乃有紀異之説桓弑逆而天乃有年之説胡氏宗之既有舊史不記聖人不附益之説又有豐年不見於經聖人削之之説又有桓宣他有歉可知之説紛紛辨説牴牾而不能救其不通之論殊不知以聖人大公之心觀經則不費手段而自見且有年之書魯史然耳安知他國之境不有年乎安知有周之境不有年乎又安知有年之應為誰乎是皆以一國觀天而不以天下觀天也先儒觀春秋之謬多𩔖此桓王十二年四年齊僖二十三年晉小子侯元年衛宣十一年蔡桓七年鄭莊三十六年曹桓四十九年陳桓三十七年祀武四十三年宋莊二年秦寧八年楚武三十三年春正月公狩于郎正傳曰書公狩于郎則狩之非禮見矣左氏以為書時禮也非也公羊曰逺也諸侯曷為必田狩一曰乾豆二曰賓客三曰充君之庖程子曰公出動衆皆當書于郎逺也胡氏曰何以書譏逺也戎祀國之大事狩所以講大事也用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以蒐中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則傷農不地則害物田狩之地如鄭有原圃秦有具囿皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙額而相告可不謹乎以非其地而必書是春秋謹於微之意也毎謹於微然後王徳全矣夏天王使宰渠伯糾來聘正傳曰天王者天子之通稱宰者冡宰也渠者其氏也伯者其爵糾者其名也書天王使宰渠伯糾來聘則聘之非禮見矣古者諸侯各脩臣職遞年來朝而後天子聘之今諸侯不脩臣軄而桓又弑賊王未之能討乃使貴卿聘之非禮之甚矣如是義則顯矣程子以為稱天王言當奉天而其所為如此愚謂其稱天者則既如此説譏之矣胡氏又言於桓公之沒王使榮叔來錫命不稱天以示譏是則稱天亦譏也不稱天亦譏也將何適従乎至於其名糾者左氏以為父在故名公羊以為下大夫故名則固不足信矣胡氏又以為糾位六卿之長降従中士之例而書名貶也而曰在周制大司馬九伐之法諸侯而有賊殺其親則正之放弑其君則殘之桓公之行當此二者舍曰不討而又聘焉失天軄矣操刑賞之柄以馭下者王也論刑賞之法以詔王者宰也乃為亂首承命以聘弑君之賊故特貶而書名以見宰之非宰也是則似矣然至於桓公之沒王使榮叔錫命書字而不名則今之名糾者不足以為貶矣不得其説乃為咺或初得政未封而糾或以諸侯入相之説夫或者或之也疑之也而以此説春秋可乎以其執泥之弊至自相矛盾而不一其為説亦煩矣春秋正傳卷四
