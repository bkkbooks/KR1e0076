body:
  text: 春秋正傳卷三十明湛若水撰昭公景王十年七年晉平二十三年齊景十三年衞襄九年卒蔡靈八年鄭簡三十一年曹武二十年陳哀三十四年杞平公郁釐元年宋平四十一年秦哀二年楚靈六年吳夷昧九年春王正月暨齊平正傳曰暨與也平者成也書暨齊平善其平也罷兵息民固春秋之所善也左氏曰齊求之也癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晢曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還愚謂俟釁受賂雖非誠心直道然能罷兵息民豈不猶勝於搆怨窮兵而不知止者哉春秋書之聖人之情見矣今之較其平之所以然而罪之者是所謂如追放豚既入其笠又從而招之者也胡氏亦曰平者聖人之所貴則經之取義在是矣而又分别我所欲曰及不得已曰暨則徒為穀梁之紛鑿而無係於取義之大指也三月公如楚正傳曰書公如楚著非禮也左氏曰楚子成章華之臺願與諸侯落之太宰薳啟疆曰臣能得魯侯薳啟疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民成二年魯使公衡為質於楚嬰齊楚令尹子重受命于蜀奉承以來弗敢失隕而致諸宗祧日我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我喪孤與其二三臣悼心失圖社稷之不皇况能懷思君德今君若步玉趾辱見寡君寵臨楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期寡君將承質幣而見於蜀以請先君之貺三月公如楚鄭伯勞于師之梁孟僖子為介不能相儀及楚不能答郊勞愚謂觀此則公之如楚楚實召之也非聘問邦交之典而徒以其召以落章華之臺是失禮之行也宜乎其見辱也已叔孫舎如齊涖盟正傳曰涖臨也謂往臨其國而與之盟書叔孫舎如齊涖盟著非禮也諸侯邦交之禮惟以時聘問結好修信而已若涖盟以為信何信之可恃故春秋非之夏四月甲辰朔日有食之正傳曰書日有食之志天變也天有常道人有常敬故聖人於天變而書之教人以敬也左氏曰晉侯問於士文伯曰誰將當日食對曰魯衞惡之衞大魯小公曰何故對曰去衞地如魯地於是有災魯實受之其大咎其衞君乎魯將上卿公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫於日月之災故政不可不愼也務三而已一曰擇人二曰因民三曰從時愚謂左氏務三之言所謂克謹天戒而能用敬其政者是先王消災之道也秋八月戊辰衞侯惡卒正傳曰惡衞侯名書衞侯惡卒志隣國之大故也衞使來赴故書之左氏曰衞襄公卒晉大夫言于范獻子曰衞事晉為睦晉不禮焉庇其賊人孫林父而取其地故諸侯貳詩曰鶺鴒在原兄弟急難又曰死喪之威兄弟孔懷兄弟之不睦於是乎不弔况逺人誰敢歸之今又不禮於衞之嗣衞必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衞弔且反戚田衞齊惡告喪於周且請命王使成簡公如衞弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘高圉亞圉周之先為殷諸侯者九月公至自楚正傳曰書公至自楚謹人君之出入也左氏曰孟僖子病不能相禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命滋益共故其鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以餬余口其共也如是臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲没必屬説與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效已矣冬十有一月癸未季孫宿卒正傳曰書季孫宿卒志國卿之大故也左氏曰十一月季武子卒晉侯謂伯瑕曰吾所問日食從矣十有二月癸亥葬衞襄公正傳曰書葬衞襄公志隣國之大事也而諸侯五月而葬同盟至之禮得矣景王十一年八年晉平二十四年齊景十四年衞靈公元年蔡靈九年鄭簡三十二年曹武二十一年陳哀三十五年卒杞平二年宋平四十二年秦哀三年楚靈七年呉夷昧十年春陳侯之弟招殺陳世子偃師正傳曰書陳侯之弟招殺陳世子偃師罪滅父子君臣兄弟之倫也左氏曰陳哀公元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留穀梁曰陳侯之弟招盡其親所以惡招也其弟云者親之也親而殺之惡也愚謂招過於偃師尊則君親則猶子也於陳侯尊則君親則兄也分則臣也君廢而殺其君之子是滅其父子君臣兄弟之倫矣胡氏曰此公子招特以弟稱者著招憑寵稔惡而陳侯失親親之道也招以公子為司徒乃貴戚之卿親則介弟尊則叔父號令廢立自己而出莫敢干之者也不能援立嫡冢安靖國家而逢君之惡戕殺偃師以致大冦宗社覆没罪固大矣陳侯信愛其弟何以為失親親乎尊賢者親親之本不能擇親之賢者厚加尊寵以表儀公族而徇其私愛施於不令之人以至亡國敗家豈不失親親之道乎其曰陳侯之弟招殺陳世子偃師交貶之也夏四月辛丑陳侯溺卒正傳曰溺陳侯名書陳侯溺卒志與國之大故也而其卒之正否可考矣左氏曰夏四月辛亥哀公縊杜氏以為憂恚自殺觀此則陳侯之死不得其正矣叔弓如晉正傳曰書叔弓如晉著其如之非禮也左氏曰賀􅫧祁也游吉相鄭伯以如晉亦賀􅫧祁也史趙見子太叔即游吉曰甚哉其相䝉也可弔也而又賀之子太叔曰若何弔也其非唯我賀將天下實賀愚謂晉作􅫧祁宜民叛而諸侯背矣史趙之言是也魯叔弓與鄭伯同致賀焉則一時諸侯之賀之者多矣夫楚成章華而諸侯落之晉作虒祁而諸侯賀之民彛天理至此滅盡而人欲橫流矣春秋書之非其往也楚人執陳行人于徴師殺之正傳曰書楚人執陳行人于徴師殺之罪失刑也專殺也左氏曰于徴師赴于楚且告有立君公子勝愬之于楚楚人執而殺之公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚人執陳行人于徴師殺之罪不在行人也愚謂招擅權殺偃師固為罪惡不可赦楚宜因公子勝之愬告之天王以討之可也行人何罪乃因其來而執殺之則罪在楚矣陳公子留出奔鄭正傳曰書陳公子留出奔鄭志亂也秋蒐于紅正傳曰紅地名左氏曰秋大蒐于紅自根牟至于商衞革車千乘公羊曰蒐者何簡車徒也穀梁曰因蒐狩以習武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為􅈏流房握御轚者不得入車軌塵馬候蹄掩禽旅御者不失其馳然後射者能中過防弗逐不從奔之道也面傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也愚謂書秋蒐于紅則非禮自見矣蒐不稱公者公不與也自季氏舎中軍四分公室而公室無兵蒐者皆三家之兵也春秋書之可以觀魯矣胡氏曰蒐春事也秋興之則違天時有常所矣其于紅則易地利三家專行公不與焉而兵權在臣下則悖人理此亦直書其事不待貶絶而自見者也凡亂臣之欲竊國命必先為非禮以動民而後上及於君父昭公至是民食於他不恤其所昧於履霜之戒甚矣陳人殺其大夫公子過正傳曰書陳人殺其大夫公子過罪之也其逸賊專殺之惡並著矣左氏曰陳公子招歸罪於公子過而殺之愚謂過與招同殺世子偃師而擅立其罪均在不赦而招獨歸罪之而擅殺之春秋書于冊使人求其故而招之罪斯得矣大雩正傳曰書大雩志非禮也餘見前冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐正傳曰孔奐公子招之黨何以書罪滅國與專殺也夫招與孔奐有罪殺之可也不告于天王而殺之放之不可也滅其國以絶其宗祀又不可也公子招擅權無君致哀公縊殺世子偃師而立公子留卒致滅其國而殺其身亡其家以及其黨春秋書之以為世戒且以愧中國諸侯之不能討也而使夷狄主之聖人有遺憾矣左氏曰九月楚公子棄疾帥師奉孫吳偃師子圍陳宋戴惡㑹之冬十一月壬午滅陳輿嬖袁克殺馬毁玉以葬楚人將殺之請寘之既又請私私於幄加絰於顙而逃使穿封戌為陳公曰城麇之役不諂侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚國葬陳哀公正傳曰書葬陳哀公志與國之大事也而聖人於楚滅陳之憾見矣景王十二年九年晉平二十五年齊景十五年衞靈二年蔡靈十年鄭簡三十三年曹武二十二年陳滅杞平三年宋平四十三年秦哀四年楚靈八年呉夷昧十一年春叔弓㑹楚子于陳正傳曰書叔弓㑹楚子於陳著其㑹之非也左氏曰春叔弓宋華亥鄭㳺吉衞趙黶㑹楚子於陳愚謂楚靈滅陳陵中國之尊絶先王之祀其惡極罪大天地所不容而魯乃使大夫及列國以往㑹之是成其罪惡而莫之恤矣故春秋非之許遷于夷正傳曰書許遷于夷罪楚也亂先王之封也左氏曰二月庚申楚公子棄疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之遷方城外人於許愚謂先王疆理天下分封有定而楚乃遷許于夷肆為繆亂其罪大矣夏四月陳災正傳曰書陳災志變也而陳之名存矣是時陳已滅矣春秋因其災而書之存陳國之名而楚滅陳之罪再著矣公羊曰陳已滅矣其言陳火何存陳也穀梁曰火不志此何以志閔陳而存之也胡氏曰凡外災告則書今楚已滅陳夷於屬縣使穿封戌為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之䇿乎當是時叔弓與楚子㑹于陳則目撃其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳或曰國史所書必承赴告豈有憑使人之言而載之於史者曰周景王崩有尹單猛朝之變固無赴告矣叔鞅至自京師言王室之亂也春秋承其言遂書于策亦此類耳仲尼作經存而弗革者葢興滅國繼絶世以堯舜三代公天下之心為心異於孤秦罷侯置守欲私一人以自奉者所以歸民心合天德也穀梁以為存陳得其㫖矣秋仲孫貜如齊正傳曰書仲孫貜如齊志禮也左氏曰孟僖子如齊殷聘禮也愚謂自叔老之聘齊二十年於此矣殷聘者盛聘也盛聘所以修睦結好以無忘乎其舊邦交之宜也故春秋與之冬築郎囿正傳曰郎邑名書冬築郎囿罪輕作也左氏曰書時也季平子欲其速成也叔孫昭子曰詩云經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎愚謂左氏以為書時非也夫囿之築非所以為民也乃所以厲民也叔孫昭子之言是矣然但云焉用速耳而不言其不宜築也夫不宜築而築者雖時亦病也春秋書之其輕作之罪見矣景王十三年十年晉平二十六年卒齊景十六年衞靈三年蔡靈十一年鄭簡三十四年曹武二十三年陳滅杞平四年宋平四十四年卒秦哀五年楚靈九年呉夷昧十二年春王正月正傳曰無事亦書時月義見于前夏齊欒施來奔正傳曰書齊欒施來奔罪納亡也左氏曰齊惠欒高氏即子雅子尾之後皆嗜酒信内多怨彊於陳鮑氏而惡之夏有告陳桓子曰子旗即欒施子雅之子子良即高彊子尾之子將攻陳鮑亦告鮑氏桓子受甲而如鮑氏遭子良醉而騁遂見文子即鮑國則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏五月庚辰戰于稷欒高敗又敗諸莊國人追之又敗諸鹿門欒施高彊來奔陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可强思義為愈義利之本也蕰利生孽姑使無蕰乎可以滋長桓子盡致諸公而請老于莒秋七月季孫意如叔弓仲孫貜帥師伐莒正傳曰書季孫意如叔弓仲孫貜帥師伐莒著非義也左氏曰秋七月平子伐莒取郠獻俘始用人於亳社臧武仲在齊聞之曰周公其不享魯祭乎周公享義魯無義詩曰德音孔昭視民不佻佻之謂甚矣而壹用之將誰福哉胡氏曰前已舎中軍矣曷為猶以三卿並將乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舎之者特欲中分魯國之衆為己私耳以為復古則誤矣襄公已來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無與焉是知雖舎中軍而三卿並將舊額固存矣戊子晉侯彪卒正傳曰彪晉侯名書戊子晉侯彪卒志盟主之大故也史因赴而書之見諸侯相恤之義焉左氏曰戊子晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫舎如晉葬晉平公正傳曰書叔孫舎如晉葬晉平公志禮也諸侯之喪五月而葬同盟至禮也葬使卿往㑹焉禮也左氏曰九月叔孫婼齊國弱宋華定衞北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見昭子至自晉大夫皆見高彊見而退昭子語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之惟不愼也喪夫人之力棄德曠宗以及其身不亦害乎十有二月甲子宋公成卒正傳曰書宋公成卒志隣國之大故也來赴故史書之景王十四年十有一年晉昭公夷元年齊景十七年衞靈四年蔡靈十二年弑鄭簡三十五年曹武二十四年陳滅杞平五年宋元公佐元年秦哀六年楚靈十年呉夷昧十三年春王二月叔弓如宋葬宋平公正傳曰書叔弓如宋葬宋平公志禮也諸侯之喪卿往㑹葬禮也夏四月丁巳楚子䖍誘蔡侯般殺之于申正傳曰書楚子䖍誘蔡侯般殺之于申則楚之不義甚矣左氏曰景王問於萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之歳也歳在豕韋弗過此矣楚將有之然壅也歳及大梁蔡復楚凶天之道也楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於憾今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏申而享蔡侯于申醉而執之夏四月丁巳殺之刑其士七十人公羊以為為其誘討也此討賊也雖誘之則曷為絶之懐惡而討不義君子不與也愚謂觀此二傳則蔡侯固有可討之罪然不以聲其罪而行討乃誘而討之是以賊討賊也故春秋罪之楚公子棄疾帥師圍蔡正傳曰書楚公子棄疾帥師圍蔡則楚貪殘之罪自見矣夫般有罪聲而討之歸之司冦可也誘執而殺之可乎殺其君則已甚矣又圍其國以暴其民可乎春秋書圍國於誘君之後則楚之罪惡並見矣左氏曰公子棄疾帥師圍蔡韓宣子問于叔向曰楚其克乎對曰克哉蔡侯獲罪於君而不能恤其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷以隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可没振愚謂左氏此傳可謂詳且盡矣胡氏曰世子般弑其君諸侯與通㑹盟十有三年矣是王國制於荆楚而莫之覺也楚子若以大義唱天下奉辭致討執般於蔡討其弑父之罪而在宫者無赦焉討其弑君之罪而在官者無赦焉殘其身瀦其宫室謀於蔡衆置君而去雖古之征暴亂者不越是矣又何惡乎今䖍本心欲圖其國不為討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒於後棄疾以是殺戎蠻商鞅以是紿魏將秦人以是刼懐王傾危成俗天下大亂劉項之際死者十九聖人深惡楚䖍而名之也其慮遠矣後世誅討亂臣者或畏其彊或幸其弱不以大義興師至用詭謀詐力徼倖勝之若事之捷反側皆懼苟其不捷適足長亂如代宗之圖思明憲宗之紿王弁昧於春秋垂戒之㫖矣愚謂胡氏之論是也但楚䖍之惡不待貶而稱名而自見矣五月甲申夫人歸氏薨正傳曰歸氏昭公母書夫人歸氏薨志君母之大故也而禮之變亦可見矣左氏曰五月齊歸薨杜氏曰胡女歸姓汪氏曰襄公三十一年左傳敬歸之姊齊歸則襄公之妾也妾母稱夫人義見成風薨葬大蒐于比蒲正傳曰何以書左氏曰非禮也公羊曰大蒐者簡車徒也胡氏曰其曰大蒐越禮也君有重喪國不廢蒐不忌君也三綱君政之本君執此以馭其下臣執此以事其上政之大本於是乎在君有三年之慼而國不廢一日之蒐則無本矣然則君有重喪喪不二事以簡車徒為非禮也乃有身從金革而無避者獨何歟曰喪不二事大蒐而簡車徒則廢其常可也有門庭之冦而宗廟社稷之存亡繋焉必從權制而無避矣伯禽服喪徐夷並興至于東郊出戰之師與築城之役同日並舉度緩急輕重葢有不得已焉者矣晉王克用薨梁兵壓境而莊宗決勝於夾寨周太祖殂契丹入冦而世宗接戰於高平若此者君行為顯親非不顧也臣行為愛君非不忌也惟審於緩急輕重之宜斯可矣仲孫貜㑹邾子盟于祲祥正傳曰書仲孫貜㑹邾子盟于祲祥志非禮也盟非禮也臣與君盟又非禮也左氏以孟僖子㑹邾莊公盟于祲祥修好禮也非也秋季孫意如㑹晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憖正傳曰書㑹于厥憖善其㑹也義救蔡也夫蔡亡其君不足惜也蔡之民何罪焉君已亡而救蔡則無所為而為之義也左氏曰楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也己為盟主而不恤亡國將焉用之秋㑹于厥憖謀救蔡也鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而弗德天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡於楚弗許胡氏曰文十五年晉靈公帥八國之諸侯盟于扈春秋畧而不序者謀伐齊而不克定其亂也襄公三十年叔孫豹㑹十二國之大夫于澶淵諸國之大夫皆稱人魯卿諱而不書者視蔡亂而不能討其賊也今楚將滅蔡請于楚而弗許晉之不能亦可知矣曷為諸國猶序大夫無貶乎扈之盟晉侯受賂弗克而還諸侯畧而不序亡義利之分也澶淵之㑹謀救宋災而不討蔡罪大夫貶而稱人魯卿諱而不書失重輕之别也亡義利之分為不仁失重輕之别為不智今晉與諸侯心欲救蔡而力弗加焉則無惡也凡此見春秋明義利審重輕以恕待人而不求其備矣愚謂稱人以為貶不書以為諱非春秋直筆之義也餘義見前九月己亥葬我小君齊歸正傳曰書葬我小君齊歸志君母之大事也左氏曰葬齊歸公不慼晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之正傳曰此何以書見楚無道之甚也既殺其君又圍其國用其世子暴虐甚矣蔡君有罪世子何罪焉左氏曰冬十一月楚子滅蔡用隠太子于岡山申無宇曰不祥五牲不相為用况用諸侯乎王必悔之胡氏曰内入國而以其君來外滅國而以其君歸皆服而以之易詞也既書滅蔡矣又書執蔡世子有者世子無降服之状强執以歸而虐用之也或以為未踰年之君其稱世子者不君靈公故不成其子非也楚䖍殺蔡般棄疾圍其國凡八月而見滅世子在窮迫危懼之中固未暇立其位安得以為未踰年之君而稱子也假使立乎其位而般死於楚其喪未至不斂不葬世子亦不成乎為君矣然世子繼世有國之稱必以此稱蔡有者父母之仇不與共天下與民守國效死不降至于力屈就擒虐用其身而不顧也則有之為世子之道得矣愚謂胡氏辯或人之説是矣然又以以為易詞而又以世子不降為得世子之道類非聖經取義之大指也景王十五年十有二年晉昭二年齊景十八年衛靈五年蔡陳滅鄭簡三十六年卒曹武二十五年滅杞平六年宋元二年秦哀七年楚靈十一年呉夷昧十四年春齊高偃帥師納北燕伯于陽正傳曰陽即唐燕之别邑也書齊高偃帥師納北燕伯于陽志義舉也左氏曰春齊高偃納北燕伯款于唐因其衆也愚謂諸侯無罪為强臣所迫出奔而諸侯納之禮也三年北燕伯出奔齊六年齊將納之不果葢十年亡在外矣今則終能納之於其境内其恤隣濟難之義得矣故春秋書之公羊子曰子曰我乃知之矣在側者曰子苟知之何以不革曰如爾所不知何春秋之信史也其序則齊桓晉文其㑹則主㑹者為之也其詞則丘有罪焉爾愚謂此與孟子之言其事則齊桓晉文其文則史其義則丘竊取之詞不合葢治春秋為義例之詞者為之也三月壬申鄭伯嘉卒正傳曰書鄭伯嘉卒志隣國之大故也諸侯有㑹葬之禮故來赴則史書之夏宋公使華定來聘正傳曰書宋公使華定來聘志禮也左氏曰夏宋華定來聘通嗣君也享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懐寵光之不宣令德之不知同福之不受將何以在公如晉至河乃復正傳曰書公如晉至河乃復志非禮也語曰恭近於禮逺恥辱也諸侯嗣位諸侯使卿大夫往聘禮也其自往朝之非禮也是時齊衞鄭君朝晉而魯公亦往焉宜其見辭于河而逮恥辱也左氏曰取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子憖遂如晉五月葬鄭簡公正傳曰書葬鄭簡公志非禮也諸侯五月而葬鄭簡公三月而葬太速矣非禮也故春秋因赴而書之以著其非禮之舉焉楚殺其大夫成熊正傳曰成熊即成虎令尹子玉之孫與鬬氏同出若敖氏宣四年鬬椒作亂故楚子信譛而追討之書楚殺其大夫成熊著專殺之罪也左氏曰楚子謂成虎若敖之餘也遂殺之或譛成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懐寵也秋七月正傳曰無事亦書時月義見于前冬十月公子憖出奔齊正傳曰憖字子仲書公子憖出奔齊志亂也左氏曰季平子立而不禮於南蒯季氏家臣南遺子南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且告之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲構二家謂平子曰三命踰父兄非禮也平子曰然故使昭子昭子曰叔孫有家禍殺適立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼將與季氏訟書辭無頗季孫懼而歸罪於叔仲子故叔仲子小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯懼不克以費叛如齊子仲即公孫憖還及衞聞亂逃介而先及郊聞費叛遂奔齊愚謂南蒯之謀憖實與焉至於亂其國以危其君是誰之罪歟春秋書出奔所以深罪之而究亂之由起也楚子伐徐正傳曰書楚子伐徐著陵暴之罪也左氏曰楚子狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舎鞭與之語曰昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無有今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山蓽路藍縷以處草莽跋涉山林以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衞王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剥圭以為鏚秘敢請命王入視之析父謂子革即鄭丹也吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其志周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲没於祗宫臣問其詩而不知也若逺問焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及于難仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾谿愚謂此本傳也信斯言也至此得非楚子暴侈之心其有悔乎晉伐鮮虞正傳曰鮮虞虞國也書晉伐鮮虞志非義也左氏曰因肥之役也程子曰晉假道於鮮虞而遂伐之見利忘義夷狄之道也胡氏曰左氏曰晉荀吳偽㑹齊師者假道鮮虞遂入晉陽冬書晉伐鮮虞狄之也獻公假道于虞以滅虢因執虞公則以師與人稱之今晉雖為諼固可罪也而狄之不亦過乎楚奉孫吳討陳因以滅陳誘蔡般殺之因以滅蔡晉人視其殘虐莫能救則亦已矣而效其所為以伐人國是王國居而荆人行也人之所以為人王國之所以為王國信義而已矣信義一失充類至盡孟子故謂禽獸逼人人將相食自春秋末世至于六國亡秦變詐並興傾危成俗河決魚爛不可壅而收之皆失信棄義之明驗也春秋謹嚴於此制治未亂拔本塞源之意豈曰過乎景王十六年十有三年晉昭三年齊景十九年衞靈六年蔡平公廬元年鄭定公寧元年曹武二十六年陳惠公呉元年杞平七年宋元三年秦哀八年楚靈十二年弑呉夷昧十五年春叔弓帥師圍費正傳曰書叔弓帥師圍費誅叛臣也而在上者所以致之之罪不可掩矣南蒯據費以叛故叔弓帥師圍之而不思臣之叛己也由己之叛君以為之倡也孔子曰陪臣執國命三桓之子孫微矣此書圍費之意也乎左氏曰春叔弓圍費弗克敗焉平子怒今見費人執之以為囚俘冶區夫魯大夫也曰非也若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏胡氏曰費内邑也命正卿為主將舉大衆圍其城若敵國然者家臣彊大夫弱也語不云乎有一言而可以終身行之者其恕矣乎已所不欲勿施於人所惡於下者毋以事上也所惡於上者毋以使下也然後家齊而國治矣季孫意如以所惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書内叛反求諸已而已矣其書圍欲著其實不沒之也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿正傳曰書楚公子比自晉歸于楚弑其君䖍于乾谿正弑君之罪也左氏曰楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居掩之族田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之㑹越大夫戮焉王奪鬭韋龜中犨又奪成然即子旗邑而使為郊尹蔓成然故事蔡公即棄疾故薳氏之族及薳居許圍蔡洧曼成然皆王所不禮也因羣喪職之族啟越大夫常壽過作亂圍固城克息舟城而居之觀從以蔡公之命召子干子晢楚公子比公子黑肱公子棄疾曼成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲為名故請為武軍蔡公知之曰欲速且役病矣請藩而已乃藩為軍蔡公使須務牟與史猈先入因正僕人殺太子禄及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子棄疾為司馬先除王宫使觀從從師于乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祇取辱焉然丹乃歸于楚王㳂夏將欲入鄢芋尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘圍以歸夏五月癸亥王縊於芈尹申亥氏申亥以其二女殉而葬之公羊曰此弑其君其言歸何歸無惡於弑立也歸無惡於弑立者何靈王為無道作乾谿之臺三年不成楚公子棄疾脇比而立之然後令于乾谿之役曰彼已立矣後歸者不得復其田里衆罷而去之靈王經而死胡氏曰楚師伐徐楚子䖍次于乾谿為之援公子棄疾召陳蔡主方城之外有觀從者率羣失職以棄疾命召比于晉既至脇比而立之令于乾谿曰先至者復其田里師潰而歸楚子經而死或曰昭元年楚䖍弑立比出奔晉十三年比歸而䖍縊于棘圍則比未甞一日北面事䖍為之臣䖍又弑立固非比之君矣而書曰比弑其君䖍何也曰凡去國出奔而君不以為臣則晉於欒盈是也臣不以為君則公子鱄於衞是也若去國雖久而爵禄有列於朝出入有詔於國不掃其墳墓不收其田里不繋纍其宗族即君臣之分猶在也比雖奔晉而晉人以羈待比以國底禄固楚之亡公子也楚又未嘗錮之如晉之於欒盈比又未甞不向楚而坐如子鮮之於衞安得以為比非楚臣而䖍非比之君乎春秋書比弑其君䖍明於君臣之義也或曰䖍弑郟敖以立比之獲罪豈其無討賊之心而徒貪夫位歟曰春秋罪比不明夫君臣之義夫比雖當次及之序而棄疾亦居楚國之常以取國言之此事之變也為比者宜乎效死不立若國有所歸為曹子臧魯叔肸不亦善乎不然身居令尹都貴戚之卿為社稷鎭亂不自己亦可也今乃脇於執而忘其守怵于利而忘其義被之大惡欲辭而不可得矣為人臣而不知春秋守經事而不知其宜遭變事而不知其權者若此類是也悲夫聖人垂戒之意明矣楚公子棄疾殺公子比正傳曰䖍新見弑而比未立故稱公子書楚公子棄疾殺公子比罪逆賊也迎比而入假手以弑其君䖍者棄疾也殺比而奪之位者亦棄疾也故春秋上既罪比而又罪棄疾比之罪實棄疾為之也左氏曰觀從謂子干即公子比曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣國人大驚使曼成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位名曰熊居葬子干于訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗即曼成然為令尹楚師還自徐吳人敗諸豫章獲其五帥平王封陳蔡復遷邑致羣賂施舎寛民宥罪舉職召觀從王曰唯爾所欲對曰臣之先佐開卜乃使為卜尹愚謂子干從亂陷於弑君之罪棄疾既為弑君謀主又殺公子而以自立皆逆賊也故春秋誅之胡氏曰棄疾立比為王而已為司馬固君比矣而又殺之則宜書曰棄疾殺其君比而曰殺公子比何也初子干歸自晉觀從假棄疾命而召之來則來坎牲加書而强之盟則盟帥四族衆而使之入楚則入殺太子禄而立之為王則王周走而呼於國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未嘗可否之也安得為棄疾之君乎然比兄也黑肱弟也棄疾其季弟也立比為王肱為令尹棄疾為司馬葢國人以長幼之序立之也則宜書曰楚人殺比而春秋變文歸獄棄疾者誅其本意在於代比而非討之也所謂輕重之權衡曲直之繩墨而懐惡者亦無所隠其情矣秋公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘正傳曰書公㑹諸侯于平丘惡晉志也惡其盟也上盟王人而下脇同列也左氏曰晉成虒祁諸侯朝而歸者皆有貳心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴㑹告于吳秋晉侯㑹吳子于良水道不可吳子辭乃還七月丙寅治兵于邾南甲車四千乘羊舌鮒攝司馬遂合諸侯於平丘子産子太叔相鄭伯以㑹子産以幄幕九張行子太叔以四十既而悔之每舎損焉及㑹亦如之次於衞地叔鮒求貨於衞淫芻蕘者衞人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜貳况衞在君之宇下而敢有異志芻蕘者異于他日敢請之叔向受羮反錦曰晉有羊舌鮒者瀆貨無厭亦将及矣為此役也子若以君命賜之其已客從之未退而禁之胡氏曰按左氏晉成虒祁諸侯朝而歸者皆有貳心齊侯往朝於晉燕而投壺曰寡人中此與君代興晉人知其亦將貳也叔向曰諸侯不可以不示威乃並徴㑹治兵於邾南甲車四千乘遂合諸侯于平丘方是時楚人暴橫陵蔑中華在宋之盟爭晉先歃及虢之㑹仍讀舊書遂召諸侯為申之舉遷賴于鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚於法家拂士以德修國政其臣當急於責難陳善以禮格君心内結夏盟外攘夷狄復悼公之業若弗暇也今乃施施然安於不競無憤恥自强之志惟宫室臺榭是崇是飾及諸侯皆二顧欲示威徴㑹而以兵甲耀之不亦末乎春秋之法制治於未亂保邦於未危貴事之預恥以苟成而不要諸道者也是以深惡此㑹如下文所貶云明其義者然後知仲尼作經於一臺囿之築一宫室門觀之作必謹而書以重民力其弭亂持危固結人心之慮逺矣八月甲戌同盟于平丘正傳曰書同盟于平丘著非禮也夫斯盟也乃晉脇服乎諸侯非諸侯心服乎晉也故曰非禮左氏曰晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以㡳信君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啟行遲速唯君叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也是故明王之制使諸侯歳聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆告信於神自古以來未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有惟君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人愬于晉曰魯朝夕伐我㡬亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戌同盟于平丘齊服也愚謂此其本傳也盟固非春秋之所貴也况晉之尋盟乎要盟乎以威武臨之乎故春秋書同盟同服其威也夫㑹盟以講信修睦也而乃如此則何信睦之有胡氏曰其書同盟者劉子與盟同懼楚也是盟葢或善之而以為惡何哉盟雖衰世之事然有定人道之大倫者矣有備天子之明禁者矣有束牲不歃相命而信自喻者矣有納斥侯禁侵掠誠格而不復叛者矣其次猶以載書辭命相爭約於大神而無敢越者則未聞主盟中國奉承齊犧而矜其威力恐迫諸侯又信蠻夷之訴絶兄弟之歡求逞私憤間其憂疑如此盟者流及戰國强衆相誇恫疑恐喝恣行陵暴死者十九積習所致有自來矣春秋禮義之大宗也曽是以為善乎公不與盟正傳曰書公不與盟使人考其盟之善否則不與者非憾之也幸之也程子曰晉罪公不使與盟雖欲辱公然得不與同盟之罪實為幸也胡氏曰臣子之於君父隠諱其恥禮也十二國㑹于平丘公獨見辭不得與盟斯亦可恥矣曷為直書其事而不隠也晉主此盟德則不競而矜兵甲之威肆脇持之術以諸侯上要天子之老而歃血以中國同惴夷狄簒立之主而結盟無禮義忠信誠慤之心而以威詐涖之具此五不韙者得不與焉幸也聖人筆削春秋凡魯君可恥者必為之隠諱至㑹于沙隨而公不得見盟于平丘而公不得與自衆人常情必深沮喪以為辱矣仲尼推明其故自反而縮雖晉國之嚴不可及也彼以其威我以其理彼以其勢我以其義夫何慊乎哉直書其事示後世立身行己之道也其垂訓之用大矣晉人執季孫意如以歸正傳曰書晉人執季孫意如以歸罪晉之專横而執之於盟好也夫魯君以晉㑹盟之約而來矣晉信邾莒之愬而拒魯侯不得與盟㑹又執其卿以歸是行橫暴於禮義之時也豈非無信義之甚乎故春秋直書之則晉之罪自見矣左氏曰公不與盟晉人執季孫意如以幕䝉之使狄人守之司鐸射懐錦奉壺飲冰以蒲伏焉守者御之及與之錦而入晉人以平子歸子服湫從胡氏曰自文以來公室微弱三家專魯而季氏罪之首也宿及意如尤為强逼元年伐莒疆鄆十年伐莒取鄆中分魯國以自封殖而使其君民食於家其不臣甚矣何以為非伯討乎晉人若按邾莒所訴有無之状究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公室之民使政令在君三家臣順則方伯之職修矣今魯與邾通好亦不朝夕伐莒而鄆郠之故又非昭公意也徒以莒人之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨財而不責其無君臣之義也何得為伯討乎稱人以執罪晉之偷也愚謂胡氏之論正矣但又謂稱人以執非伯討則鑿矣稱人者夫子因史之文也若晉人所執之非義則雖書國書爵以執猶為不義非伯討也如使晉人執之是則雖稱人猶為義舉為伯討也春秋之義則係乎竊取而不在乎魯史之文矣公至自㑹正傳曰書公至自㑹謹君之出入也公與平丘之㑹故書至自㑹公羊曰公不與盟者何公不見與盟也公不見與盟大夫執何以致㑹不恥也曷為不恥諸侯遂亂反陳蔡君子不恥不與焉蔡侯廬歸于蔡陳侯吳歸于陳正傳曰廬隠太子有之子吳悼太子偃師之子書蔡侯廬歸于蔡陳侯吳歸于陳善楚也亦以憾楚也二公子之子而稱侯者復其爵也得興滅繼絶之義矣故曰善之也然非天子不得專封楚以夷狄之國而擅封置焉則天王不得為天王中國不得為中國矣故春秋之義實憾之也左氏曰楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也隠太子之子廬歸于蔡禮也悼太子之子吳歸于陳禮也胡氏曰楚䖍遷六小國於荆山又滅陳蔡而縣之及棄疾即位復諸遷國封蔡及陳隠太子有之子廬歸于蔡悼太子偃師之子吳歸于陳曰歸者順辭也陳蔡昔皆滅矣不稱復歸者不與楚䖍之得滅也其稱歸于者國其所宜歸也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也其稱侯者位其所固有也陳列聖之後蔡王室之親見滅於楚䖍而諸侯不能救復封於棄疾而諸侯不能與是以夷狄制諸夏也聖人至是懼之甚葢有不得已焉制春秋為後法大要皆天子之事也其義則以公天下為心興滅國繼絶世異於自私其身欲擅而有之者也故書法如此為天下國家而不封建欲望先王之治難矣愚謂但直書之而其得失自見不必如胡氏所謂歸為順辭不稱復歸其稱歸于不言自楚其稱侯者之紛鑿也冬十月葬蔡靈公正傳曰書葬蔡靈公何左氏曰禮也公如晉至河乃復正傳曰書公如晉至河乃復志恥辱也夫魯侯赴盟而見拒而又執其卿斯亦已矣又如晉以朝之則足恭而恥辱至矣宜乎其再見却至河而復也左氏曰公如晉荀呉謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河吳滅州來正傳曰州來小國舊屬吳近楚楚甞取之為附庸今楚亂吳取之書吳滅州來譏之也乘人之亂以貪地也左氏曰令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在呉猶在楚也子姑待之春秋正傳卷三十
