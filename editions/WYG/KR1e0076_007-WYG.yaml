body:
  text: 春秋正傳卷七明湛若水撰莊公名同桓公子母文姜夫人哀姜年十四即位在位三十二年荘王四年元年齊㐮五年晋緡十二年衛恵七年黔牟三年蔡哀二年鄭厲八年子儀元年曺荘九年陳荘七年卒杞靖十一年宋荘十七年秦武五年楚武四十八年春王正月正傳曰書春王正月義已見前元年宜書即位不書者或史之闕文耳夫所謂元年者即位之始年也既不宜書即位即不宜書元年矣左氏以為文姜出故不稱即位公穀皆以為君弑子不言即位為正胡氏以為内無所承上不請命之故則桓公書即位矣乃為有所承與請命耶其說之不一皆不可信也三月夫人孫于齊正傳曰夫人即文姜孫者遜避也夫人先在齊因而不歸若孫避然君母雖惡不可以言奔國史之詞也書三月夫人孫于齊則夫人之惡自見矣夫人􅁋亂致構二􅀦之禍而桓公見弑於齊文姜與焉内不自安外不見容觀其孫則其罪惡可知而莫掩矣固不待去夫人之氏然後見也左氏以為不稱姜氏絶不為親禮也則孰若不稱夫人乎胡氏又以書夫人孫于齊為權恩義之輕重為得之亦時史之善書者為之也夫人姜氏何以與弑公羊曰夫人譛公於齊侯公曰同非吾子齊侯之子也齊侯怒與之飲酒於其出焉使公子彭生送之於其乗焉搚幹而殺之愚謂此其實𫝊也觀其𫝊而其弑逆之罪可見矣夏單伯逆王姬正傳曰單姓伯字魯大夫之命於天子者也逆者迎也王姬者天子之女下嫁於齊者也逆王姬在冬至秋乃築館而此夏書單伯逆王姬者見單伯始承命之非正而魯君臣之􅁯禮義也斯時也失禮義之端也天子方召單伯使逆王姬而使魯君主之單伯魯君當以喪服辭於天子之廷而其與弑君父之賊不共戴天之大義居喪不可與婚姻之大禮並著矣失此不圖卒陷於不忠不孝之罪可追悔耶故穀梁曰其義不可受於京師也躬君弑於齊使之主婚姻與齊為禮其義不可受也胡氏曰此明􅁯親釋怨則無以立人道矣皆是也秋築王姬之館于外正傳曰外者魯之郊外也書築王姬之館于外著失禮之中又失禮也忘君父之讐棄居喪之禮而與齊主婚以逆王姬已為有罪矣其築館于外者左氏以為為外禮穀梁以為變禮之正謂仇讎之人非所以接婚􅊚也衰麻非所以接弁冕也故築之於外也此猶紾兄之臂者謂之姑徐徐云爾夫主王姬者以自公門出禮也其初受命之不正則今並與主王姬之禮皆失之此所謂失禮之中又失禮焉者也春秋書之其罪不可掩矣胡氏亦曰荘公有父之讎方居苫塊此禮之大變也而為之主婚是廢人倫㓕天理矣春秋於此事一書再書又再書者其義以復讎為重示天下後世臣子不可忘君親之意故雖築館于外不以為得禮而特書之也冬十月乙亥陳侯林卒正傳曰林陳侯名書冬十月乙亥陳侯林卒紀隣􅀦之大變也有赴則史書之王使榮叔來錫桓公命正傳曰榮叔王之大夫公羊曰錫者何賜也命者何加我服也其言桓公何追命也愚謂書使榮叔來錫桓公命觀於此傳則其非自見矣是故一舉而有三失焉穀梁曰禮有受命無來錫命錫命非正也是一失矣又曰生服之死行之禮也生不服死追錫之不正甚矣是二失也胡氏曰桓公弑君􅆲國而王不能誅反追命之無天甚矣是三失也愚謂書曰一人三失怨豈在明周王之無道具三失焉何以立於天之下諸侯之上乎其不稱天者史之省文耳豈有孔子以匹夫作春秋去天王而不天之耶啖助以為不稱天王寵􅆲弑以瀆三綱誤矣王姬歸于齊正傳曰書王姬歸于齊見不義非禮之始中終也公羊曰何以書我主之也穀梁曰為之主者歸之也胡氏曰魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讎之義明矣愚謂觀於此三傳而其所書王姬歸齊之取義自見矣齊師遷紀郱鄑郚正傳曰遷者遷其民物而取之也公羊謂不言取之為㐮公諱穀梁謂遷紀于郱鄑郚皆非也書齊師遷紀郱鄑郚則齊君暴横之罪甚矣胡氏曰郱鄑郚者紀三邑邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人强暴用大衆以廹之為己屬也凡書遷者自是而㓕矣春秋興㓕􅀦繼絶世則遷􅀦邑者不再貶而罪已見矣愚謂此無貶詞而其罪自見誠如胡氏之言則他經有一字近似者又何必執之而後義可見耶可以𩔖推矣至於邑不言遷遷不言師之語亦義例之不通者荘王五年二年齊襄六年晋緡十三年衛恵八年黔牟四年蔡哀三年鄭厲九年子儀二年曺荘十年陳宣公杵臼元年杞靖十二年宋荘十八年卒秦武六年楚武四十九年春王二月葬陳荘公正傳曰書葬陳荘公紀鄰國之大事又見葬之得禮也陳侯林元年十月卒至是乃五月而葬諸侯之禮也夏公子慶父帥師伐於餘丘正傳曰慶父者杜氏以為荘公時年十五則慶父荘公庶兄於餘丘者公穀皆以為邾之邑也書公子慶父帥師伐於餘丘則慶父弱君專權用衆暴小之罪見矣胡氏曰荘公㓜年即位首以慶父主兵卒􅆀子般之禍於餘丘法不當書聖人特書以誌亂之所由為後戒也魯在春秋中見弑者三君其賊未有不得魯􅀦之兵權者公子翬冄為主將專㑹諸侯不出隐公之命仲遂擅兵兩世入杞伐邾㑹師救鄭三軍服其威令之日久矣故翬弑𨼆公而寪氏不能明其罪慶父弑子般而成季不能遏其惡公子遂殺惡及視而叔仲恵伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣愚謂此則經外之意也至於謂􅀦而曰伐此邑耳其曰伐誌慶父之得兵權則泥矣語季氏伐顓􅁷非伐邑耶秋七月齊王姬卒正傳曰書齊王姬卒著忘義失禮之終也魯棄齊之讎為􅁯義以喪主婚為失禮至是王姬之卒猶以繫魯焉罪之終也罪之終者罪之始始之也公羊曰外夫人不卒此其卒者我主之也穀梁謂為之主者卒之也胡氏曰内女嫁為諸侯妻則書卒王姬何以書比内女為之服也故檀弓曰齊告王姬之喪魯荘公為之大功或曰由魯嫁故為之服姊妹之服夫服稱情而為之節者也荘公於齊王姬厚矣如不共戴天之義何此所謂不能三年之喪而緦小功之察也特卒王姬以著其罪冬十有二月夫人姜氏㑹齊侯于禚正傳曰禚地名書夫人姜氏㑹齊侯於禚則姜氏齊侯􅁋亂之罪自見矣左氏曰書姦也姜氏於齊侯為妹齊侯於姜氏為兄同産相􅁋天理人倫之大變王法所必誅而不以赦者穀梁謂踰境言㑹為非正是責斬闗之盗以穿窬也胡氏曰婦人無外事送迎不出門見兄弟不踰閾在家從父既嫁從夫夫死從子今㑹齊侯于禚是荘公不能防閑其母失子道也故趙匡曰姜氏齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下况於國君君者人神之主風教之本也不能正家如正􅀦何若荘公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒徃乎夫人之徃也則公威命之不行哀戚之不至爾愚謂此正論也然前謂去姜氏為貶之者則此不去姜氏又何說耶乙酉宋公馮卒正傳曰馮宋公名書宋公馮卒義見前荘王六年三年齊㐮七年晋緡十四年衛恵九年黔牟五年蔡哀四年鄭厲十年子儀三年曺荘十一年陳宣二年杞靖十三年宋閔公㨗元年秦武七年楚武五十年春王正月溺㑹齊師伐衛正傳曰溺者公子名溺也公羊謂吾大夫之未命者理或然也書溺㑹齊師伐衛則魯之君臣忘讎伐親之罪並著矣故左氏以為疾之是也夫衛於魯為同姓兄弟之國義不可伐而弑君之讎未復乃與之㑹兵同伐人其忘讎釋怨天理滅矣故春秋書之而著其罪不待不稱公子以為貶穀梁之說鑿矣夏四月葬宋荘公正傳曰書葬宋荘公紀恤鄰之大事也其月而不日者史畧之也穀梁以為月葬故也非也五月葬桓王正傳曰書五月葬桓王紀天下之大事而其失禮之非自見矣天子七月而葬過之非禮也公羊以為改葬穀梁以為或尸以求諸侯或危不得葬皆非也左氏曰緩也是也胡氏曰左氏曰緩也天子七月而𦵏同軌畢至諸侯五月同盟至大夫三月同位至士踰月外􅊚至王崩至是盖七年矣先儒或言天子不志𦵏又以為不言𦵏者常也夫事孰有大於𦵏天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也愚謂此說得之矣秋紀季以􅈶入于齊正傳曰季者紀侯之弟也􅈶紀邑名入于齊者以􅈶事齊也書紀季以􅈶入于齊則紀能以小事大存宗祀可見矣􅀦君死社稷正也然而太王亦甞去邠矣曰狄人之所欲者吾土地也今季度勢不支能以地事齊請後五廟以存姑姊權而得正也左氏曰紀於是乎始判胡氏曰大夫不得用地公子不當去􅀦盗地以下敵棄君以避患非人臣也故春秋之義私逃者必書奔有罪者必加貶今季不書奔則非竊地也不書名則非貶也諸侯兄弟貶則書名宋辰秦鍼之類是也不貶則書字蔡季許叔之𩔖是也紀季所以不書奔者有紀侯之命矣所以不書名者天下無道強衆相陵天子不能正方伯不能伐屈己事齊請後五廟其亦不得已而為之者非其罪也所以無貶乎愚謂是也然書名者未必皆貶可貶者未必皆名而其是非自見矣其又云入者難詞也穀梁亦云入者内弗受也則皆當時義例之惑也冬公次于滑正傳曰滑鄭地名書公次于滑譏救難之不勇也左氏曰將㑹鄭伯謀地故也鄭伯辭以難凡師一宿為舍再宿為信過信為次穀梁曰次止也有畏也欲救紀而不能也胡氏曰次于滑譏之也魯紀有婚􅊚之好當恤其患於齊有父之讎不共戴天苟能救紀抑齊一舉而兩善并矣見義不為而有畏也春秋之所惡書公次于滑以譏之也或言夫子意在刺無王命若譏其怯懦則當褒其勇者春秋乃鼓亂之書為此言者誤矣易於謙之六五則曰利用侵伐師之六四則曰左次旡咎進退勇怯顧義何如耳豈可專以勇為鼓亂而不與乎荘王七年四年齊㐮八年晋緡十五年衛恵十年黔牟六年蔡哀五年鄭厲十一年子儀四年曺荘十二年陳宣三年杞靖十四年宋閔二年秦武八年楚武五十一年春王二月夫人姜氏享齊侯于祝丘正傳曰祝丘魯地名書夫人姜氏享齊侯于祝丘則非禮之罪自見矣禮内言不出於梱外言不入於梱兄弟相見不踰閾而可以與外國諸侯相享於外乎穀梁曰饗甚矣享齊侯所以病齊侯也胡氏曰享者兩君之禮所以訓共儉也兩君相見享於廟中禮也犧象不出門嘉樂不野合非兩君相見又去其􅀦而享諸侯甚矣三月紀伯姬卒正傳曰紀伯姬者魯女之嫁於紀者也書紀伯姬卒則親親之義見矣穀梁曰外夫人不卒此其言卒何也吾女也愚謂吾女則有服有𦵏故來赴來赴則史書之故春秋有無他褒貶者此之𩔖也又何詞之執乎夏齊侯陳侯鄭伯遇于垂正傳曰垂地名遇者㑹之别名假若不期而㑹如偶相遇然也書齊侯陳侯鄭伯遇于垂則不正之義自見矣蘇氏以鄭伯為子儀胡氏以為實厲公也非子儀也紀侯大去其國正傳曰大去者猶言盡去也書紀侯大去其􅀦著不能守國之罪也左氏曰紀侯不能下齊以與紀季夏紀侯大去其􅀦違齊難也愚謂此實録也公羊以大去為齊滅之不言滅為齊㐮公賢者諱以其能復九世之讎及穀梁又云不言滅而曰大去其國者不使小人加乎君子皆非也惟程子曰大去責在紀也非齊之罪也齊侯鄭伯遇于垂方謀伐之紀侯遂去其國齊師未加而已去故非齊之罪也而胡氏又曰大去者土地人民儀章器物悉委置之而不顧也或曰以争􅀦為小而不為以去􅀦為大而為之者也夫守天子之土疆承先祖之祭祀義莫重焉委而去之無貶歟曰有國家者以義言之世守也非身之所能為則當效死而勿去以道言之不以其所以養人者害人亦可去而不守於斯二者顧所擇如何爾然則擬諸太王去邠之事其可以無愧矣曰太王去邠從之者如歸市紀侯去國日以微滅則何太王之可擬哉愚謂擇者擇於義也故死之其義正也度其去􅀦而不失其人民不棄其宗廟其義權也胡氏又謂聖人與其不争而去而不與其去而不存與不争而去是以異於失地之君而不名不與其去而不存是故書叔姬歸􅈶而不録紀侯之卒則非矣夫去而不存則雖不争而去以失人民宗祀非聖人之大義所與也焉得遂以不名為與之反以不卒為非之耶六月乙丑齊侯𦵏紀伯姬正傳曰書齊侯葬紀伯姬紀吾女之大事有報則書之而齊侯之罪益著矣夫㓕紀者齊也紀有伯姬之䘮而滅之者亦齊也使其䘮之無所歸而於我殯者亦齊也故曰書之則齊侯之罪益著矣公穀皆以為隐而𦵏之誤矣胡氏曰𦵏紀伯姬不稱其人而目其君者見齊㐮廹逐紀侯使之去􅀦雖其夫人在殯而不及𦵏然後㐮公之罪著矣愚謂不待不稱齊人而目其君而義亦已見矣秋七月正傳曰無事亦書時月義見前冬公及齊人狩于禚正傳曰齊人穀梁以為齊侯是也史外之之詞公穀以為諱與讎及卑公之敵以卑公非也及者言公與之主在公也書公及齊人狩於禚則魯忘親與讎之罪自見矣穀梁子曰公不復讎而怨不釋刺釋怨也胡氏曰父母之讎不共戴天兄弟之讎不與同􅀦九族之讐不同鄉黨朋友之讐不同市朝今荘公與齊侯不與共戴天則無時焉可通也而與之狩是忘親釋怨非人子矣夫狩者馳騁田獵其為樂下主乎己一為乾豆其事上主乎宗廟以為有人心者宜於此焉變矣故齊侯稱人而魯公書及以著其罪愚謂及者與也非貶詞也但書此事則魯之罪著矣不待以書及稱人而後見也荘王八年五年齊㐮九年晋緡十六年衛恵十一年黔牟七年蔡哀六年鄭厲十二年子儀五年曺荘十三年陳宣四年杞靖十五年宋閔三年秦武九年楚文王熊貲元年春王正月正傳曰無事亦書時月義見前夏夫人姜氏如齊師正傳曰書夫人姜氏如齊師則夫人齊侯之醜大暴于衆矣胡氏曰師者衆多之地按齊詩載驅刺㐮公無禮義盛其車服疾驅於通道大都與文姜􅁋之詩也其三章曰汶水湯湯行人彭彭魯道有蕩齊子翺翔彭彭者多貎也其四章曰汶水滔滔行人儦儦魯道有蕩齊子遊遨儦儦衆貎也曰㑹曰享猶為之名也至是如齊羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮於微慮患於早之意也秋郳犂來來朝正傳曰郳􅀦名即後王命以為小邾者夷狄之附庸也犂來其名書郳犂來來朝則以小事大之義見矣凡不朝王而私相朝㑹者皆非之此何以取之曰已朝王也史未之傳耳觀王命以為小邾可見其朝矣胡氏曰能修朝禮故特書曰朝其後王命以為小邾子盖於此己能自進於禮矣愚謂名之者乃史之常非有他義義在取其來朝耳左氏以為未命公羊以為微􅀦穀梁以為微􅀦之未爵命者胡氏以為夷狄之附庸故名皆求義之過也冬公㑹齊人宋人陳人蔡人伐衛正傳曰書公㑹齊人宋人陳人蔡人伐衛則列國擅興無王之罪著矣左氏曰冬伐衛納恵公也公羊曰此伐衛何納朔也曷為不言納衛侯朔辟王也愚謂所謂辟王者辟違王命也故穀梁程子皆以為諸侯逆抗王命故人以貶之胡氏曰桓公十六年衛侯朔出奔齊經書其名以王命絶之也又黨有罪以納之故貶而稱人愚謂抗違王命觀下王人子􅋓救衛可知矣設若朔果當納則當約與􅀦上告天子正其名去其不當立者而納之於禮為得矣况不當耶乃私相興兵而納焉非擅興無王而何盖不待稱人以貶之而其罪不可逭矣凡諸傳所謂貶其爵而稱人者皆未敢信也諸侯之爵未有天子之命豈得擅貶再不朝則削其爵乃天子之權也而擅行焉則與擅興伐人之罪何以異耶盖人者乃史氏衆稱之詞耳荘王九年六年齊㐮十年晋緡十七年衛恵十二年黔牟八年蔡哀七年鄭厲十三年子儀六年曺荘十四年陳宣五年杞靖十六年宋閔四年秦武十年楚文二年春王正月王人子􅋓救衛正傳曰子􅋓其字書王人子􅋓救衛則王法持危之道與列􅀦抗王之罪見矣王人者王者之人尊貴之稱非書人而貴之也胡氏曰朔陷其兄使至於死罪固大矣然其父所立諸侯莫得而治也王治其舊罪而廢之可也又藉諸侯之力抗王命以入􅀦愚謂觀此則諸侯助之入者為非而子􅋓救衛者為是盖不待稱人稱字而後見矣夏六月衛侯朔入于衛正傳曰朔衛侯名書衛侯朔入于衛則王人不能勝列國之衆而列􅀦與衛侯抗王之罪已著不必泥入字而後見也胡氏惑矣衛宣公之子三人曰急子烝於夷姜所生曰夀曰朔宣姜所生夷姜縊宣姜與朔構急子使盗殺之夀子争徃俱死焉朔立是為恵公於是左公子洩右公子職怨朔共立公子黔牟朔奔齊故程子曰朔搆其兄而使至於死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也愚謂黔牟之立當時左右二公子必受命於王也故王使王人子􅋓救之秋公至自伐衛正傳曰書公至自伐衛者君舉必書而兵戎又國之大事也故書之則其抗王黨惡之罪自見矣公穀乃以致不致為言而胡氏亦曰衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人内則荘公書至而春秋之情見矣是皆拘於義例之惑也故春秋之不明皆義例蔽之也螟正傳曰螟蟲之食禾者書螟者􅀦史有災則書也聖人筆之而不削示天戒也冬齊人來歸衛俘正傳曰俘左氏公羊皆作寳盖以釋所謂俘者寳也書齊人來歸衛俘則列國黨惡受賂之証魯侯首惡之罪不可掩矣左氏曰齊人來歸衛寳文姜請之也愚謂左氏必有所據公羊以為齊人讓衛寳乎我也奈何齊侯曰此非寡人之力魯侯之力也胡氏曰俘者二傳以為寳按商書稱遂伐三朡俘厥寳玉則俘者正文也寳者釋詞也言齊歸衛寳則知四􅀦皆受朔之賂矣春秋特書此事結正諸侯之罪也夫以弟弑兄臣弑君􅆲居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以騐其䘮心失志迷惑之端也及書齊人歸寳然後知其有欲貨之心而後動於惡也世衰道微暴行交作狥于貨寳賄賂公行使君臣父子兄弟終去仁義懐利以相與不至於簒弑奪攘則不厭也春秋書此結正諸侯之罪垂戒明矣愚謂此說是也荘王十年七年齊襄十一年晋緡十八年衛恵十三年蔡哀八年鄭厲十四年子儀七年曺荘十五年陳宣六年杞靖十七年宋閔五年秦武十一年楚文三年春夫人姜氏㑹齊侯于防正傳曰防魯地云㑹者齊侯來防而姜氏㑹之也左氏以為齊志是也書夫人姜氏㑹齊侯于防則其非禮不正之惡凟亂之罪不可掩矣此據事直書夫人姜氏而其惡自見又可以見前之不書姜氏先儒以為貶者之類皆非也夏四月辛夘夜恆星不見夜中星隕如雨正傳曰夜中者夜之中也書夜恒星不見夜中星隕如雨史紀天變也聖人筆之於春秋示戒焉耳胡氏曰恆星者列星也如雨者言衆也人事惑於下則天變動於上前此者五􅀦連衡旅拒王命後此者齊桓晋文更霸中􅀦政歸盟主而王室遂虚其為法度廢絶威信陵遲之象著矣漢成帝永始中亦有星隕之異而五侯擅權賊莽居攝漢之宗支掃蕩㡬盡天之示人顯矣春秋謹於天象至矣愚謂雖無應聖人猶書以示戒迅雷風烈必變之意也若必一一求其事以應之則鑿矣若有不應則人君能無萌不信之心矣乎秋大水無麥苗正傳曰大水者穀梁曰髙下有水災曰大水書秋大水無麥苗史紀災也聖人筆之畏天災而傷人窮也麥苗麥早於穀苖杜氏曰周之秋今五月平地出水漂熟麥及五穀之苗愚謂此正麥苖之時穀梁以為麥苖同時是也胡氏曰書大水畏天災也無麥苖重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖􅀦之亡無日矣春秋所以謹之也冬夫人姜氏㑹齊侯于穀正傳曰穀即濟北穀城縣齊地也書夫人姜氏㑹齊侯于穀則夫人越境而㑹其凟亂甚矣胡氏曰防魯地也穀齊地也初會于禚次享于祝丘又次如齊師又一嵗而冄㑹焉其為惡益逺矣明年無知弑諸兒其禍􅁋之明騐也春秋正傳卷七
