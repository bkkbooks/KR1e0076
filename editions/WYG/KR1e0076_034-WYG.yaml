body:
  text: 春秋正傳卷三十四明湛若水撰定公名宋襄公庶子昭公弟在位十五年敬王十一年元年晉定三年齊景三十九年衛靈二十六年蔡昭十年鄭獻五年曹隠公通元年陳惠二十一年杞悼九年宋景八年秦哀二十八年楚昭七年吳闔廬六年春王正傳曰書春王而不書正月者何史之逸文也於此見春秋魯史之文非仲尼之加損也公羊以為公即位後故無正月榖梁以為定無正明不得正始胡文定從之以為季氏廢太子衍及務人而立公子宋宋者昭公之弟其主社稷非先君所命而専受之於意如者也故不書正月見定公無正皆非也盖定公即位後在夏六月何以先時去其正月見其無正始耶凡春秋春王正月史氏書時月紀事之法其文以春字為讀王正月為句言在春時王之正月也謂之正月者以為正之月周則子月是也今書春王而不言正月以為定公即位不正故不書是何文理耶陸象山謂諸儒説經之謬莫甚於春秋皆此之類也故春秋之不明諸儒壊之也或上春王連下三月為文亦非也他年或有如此者即位之元年豈有不書正月之理斷為史之缺文無疑矣三月晉人執宋仲幾于京師正傳曰書晉人執宋仲幾于京師者何公羊子曰主人習其讀問其傳而伯討可知矣夫晉率諸侯城成周尊王之義也宋仲㡬不肯受功而晉執之仗義也而歸于京師仗義以尊王也左氏曰春王正月辛巳晉魏舒合諸侯之大夫于狄泉将以城成周孟懿子㑹城成周庚寅栽植板幹也宋仲幾不受功曰滕薛郳即小邾號吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺即奚仲後居薛以為湯左相若復舊職将承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣且已無辭而抑我以神誣我也啓寵納侮其此之謂矣必以仲㡬為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍愚謂觀此則晉之執仲幾誠伯討矣公羊以稱人為貶大夫專執胡氏從之則皆非矣夫士伯以晉君之命而行必有專制之法宋仲幾不受功為無王其罪可執而執之其歸于周将付之司寇中間豈無晉侯之命而歸之周者而遽以為專執而貶之可乎稱人者他國之史稱之之詞耳惑其小者棄其大義必斯言之謂矣夏六月癸亥公之喪至自乾侯戊辰公即位正傳曰書六月癸亥公之喪至自乾侯戊辰公即位見昭公不得正其終定公不得正其始也而罪人斯得矣夫昭公為季孫所逐客死于乾侯且薨至此七月矣然後喪至自乾侯是使昭公不得正其終者季孫也禮君薨而世子即位于廟見羣臣而後喪服所以定位防變也昭公薨至此七月矣喪至又六日然後即位是使定公不得正其始者亦季孫也春秋詳書之所以誅季孫之罪者深切至矣左氏曰叔孫成子叔孫婼子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止留也之且聴命焉子家子不見叔孫易㡬而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見句叔孫使告之曰公衍公為昭公二子實使羣臣不得事君若公子宋昭公庶弟主社稷則羣臣之願也凢從君出而可以入者将唯子是聴子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也冦而出者行可也若羈也則君知其出也而未知其入也羈将逃也喪及壊隤公子宋先入從公者皆自壊隤反六月癸亥公之喪至自乾侯戊辰公即位胡氏曰昭公之薨已越𦵏期猶未得返至於六月癸亥然後喪至而定之即位乃在是月之戊辰盖遲速進退為意如所制不得専也以周書顧命考成王之崩在四月乙丑宰臣太保即於是日命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆王世子釗於南門之外延入翼室宅憂為天下主不待崇朝而後定也今昭公喪至在𦵏期之後公子宋自壊隤先入猶未得立是知為意如所制不得以時定非謂正棺乎兩楹之間故定之即位不可不察也夫即位大事也宗嗣先定則變故不生盖代君享國而主其祭宜戚宜懼一失機㑹或萌窺伺之心至於生變則為不孝矣古人所以貴於早定國家之本也今昭公之薨定公之即位春秋詳書于䇿非為後法乃見諸行事為永鑒耳秋七月癸巳𦵏我君昭公正傳曰書秋七月癸巳𦵏我君昭公志國之大事也而非禮之失强臣之罪並見矣夫諸侯之喪五月而𦵏禮也昭公薨至此七月乃𦵏遲而非禮矣是孰使之然季氏之不臣為之也春秋書之所以誅季孫也左氏曰季孫平子使役如闞有魯羣公墓公氏将溝以溝分界焉榮駕鵝魯大夫榮成伯曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也将焉用之乃止秋七月𦵏昭公於墓道南孔子之為司冦也溝而合諸墓九月大雩正傳曰書九月大雩志非禮也大雩天子祭天以禱雨既非魯之得用又龍見而雩禮也必待旱而後禱非禮也并失之矣立煬宫正傳曰書立煬宫則非禮自見矣左氏曰昭公出故季平子禱于煬公九月立煬宫公羊曰煬宫者何煬公之宫也立煬宫非禮也愚按煬公伯禽之子祧毁之主也禮有其廢之莫敢舉也故喪事即逺有進而無退宫廟即逺有毁而無立季平子因昭公之出乃禱諸煬公煬公有靈且怒而誅殺之矣其肯受其禱乎其肯享其立宫乎悖禮甚矣冬十月隕霜殺菽正傳曰書隕霜殺菽志災異也榖梁子曰菽舉重也未可以殺而殺舉重可殺而不殺舉輕胡氏以為其象則刑罰不中之應愚謂霜殺菽隂極之徴臣强君弱之象也是時季孫陵君無上故有此應敬王十二年二年晉定四年齊景四十年衛靈二十七年蔡昭十一年鄭獻六年曹隠二年陳恵二十二年杞悼十年宋景九年秦哀二十九年楚昭八年吳闔廬七年春王正月正傳曰無事亦書時月義見于前夏五月壬辰雉門及兩觀災正傳曰雉門公宫之南門兩觀闕也天火曰災何氏曰天子諸侯臺門天子外闕兩觀諸侯外闕一觀書雉門及兩觀災志變也而魯以諸侯僣天子之禮亦並見矣人火為常天火為變天之所以儆示乎魯之君臣亦切至矣災公宫雉門切近災也及兩觀言不足以觀乎逺邇也是時君弱臣强權移於下季氏逐昭公制定公切近災之象也三綱陵夷不足觀于逺邇之象也秋楚人伐吳正傳曰書楚人伐吳志非義也見吳之召釁也左氏曰桐小國叛楚吳子使舒鳩氏楚属國誘楚人曰以師臨我我伐桐為我使之無忌秋楚嚢瓦伐吳師于豫章吳人見舟於豫章而潜師于巢冬十月吳軍楚師于豫章敗之遂圍巢克之獲楚公子繁楚守巢大夫愚謂由是觀之則吳人詭謀以召楚而敗之罪不在楚而在吳矣春秋書之使人讀其文考其事而其竊取之義可見矣冬十月新作雉門及兩觀正傳曰新作者改作也何以書罪僣竊也公羊曰其言新作之修大也胡氏曰書新作者譏僣王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也僖公嘗修泮宫復閟宫非不用民力而春秋不書新作南門則獨書者南非一門也必有不當為者子家駒以設兩觀為僣天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僣君必書者必正之意也使定公遇災而懼革其僣禮三家陪臣雖欲僣諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主矣故特書新作以譏之也敬王十三年三年晉定五年齊景四十一年衛靈二十八年蔡昭十二年鄭獻七年曹隠三年陳恵二十三年杞悼十一年宋景十年秦哀三十年楚昭九年吳闔廬八年春王正月公如晉至河乃復正傳曰書公如晉至河乃復志君之出入也而失禮之舉召辱之恥並可見矣程子曰季孫意如上不請于天子下不告于方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟于臯鼬愚謂諸侯朝覲聘問邦交之禮也定公為逆臣所立不先行聘告之禮因晉之怒而後往朝霸主則非禮矣召見拒之辱不亦宜乎春秋詳書以非之二月辛夘邾子穿卒正傳曰書邾子穿卒志與國之大故也左氏曰春二月辛夘邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于牀廢于鑪炭爛遂卒先𦵏以車五乗殉五人莊公卞急而好潔故及是夏四月正傳曰無事亦書時月義見于前秋𦵏邾莊公正傳曰書秋𦵏邾莊公志與國之大事也冬仲孫何忌及邾子盟于㧞正傳曰書盟于拔志非禮也左氏曰冬盟于郯修邾好也非也邾子初立不脩朝王事大之禮而與大夫私盟且君臣同盟皆非禮也而是時臣强君弱並可見矣敬王十四年四年晉定六年齊景四十二年衛靈二十九年蔡昭十三年鄭獻八年曹隠四年弑陳恵二十四年卒杞悼十二年卒宋景十一年秦哀三十一年楚昭十年吳闔廬九年春王二月癸巳陳侯吳卒正傳曰書陳侯吳卒志與國之大故也三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚正傳曰書公㑹劉子晉侯及諸侯于召陵侵楚善攘夷也而不行討伐之禮焉見晉侯霸圖之失也先王之法天子討而不伐諸侯伐而不討夫討者出命以誅罪天子之事也伐者奉天子之命以誅罪諸侯之事也楚恃其强憑陵諸夏晉上請天子合諸侯奉天子之討以誅之是得諸侯行伐之義矣今天王不出命以行討使王人劉子亦雜於列國之間天子之討固如是耶晉侯為伯不能率諸侯奉天子之命聲其罪而誅之而徒為盗賊之行以行侵焉諸侯之伐固如是耶春秋直書其事而非之之義自見矣左氏曰三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳将以襲敵不亦難乎水潦方降疾瘧方起中山即鮮虞不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭明日或斾以㑹晉於是乎失諸侯愚謂晉為伯主以王命率天下諸侯而伐楚乃荀寅以蔡貨之故不能直己以聲大義但行侵而還此功之所以不能成也胡氏曰按左氏傳書伐而經書侵楚者楚為無道馮陵諸夏為一裘一馬拘唐蔡二君三年而後遣蔡侯既歸請師于晉晉人請命于周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶㡬哉王者之師齊桓晉文之功立矣有荀寅者求貨於蔡侯弗得遂辭蔡人晉由是失諸侯無功而還書曰侵楚陋之也愚謂實不能聲罪致討而侵之也程胡二子皆以為無功而還故書侵陋之也非矣夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之正傳曰書蔡公孫姓帥師滅沈以沈子嘉歸殺之罪暴虐也左氏曰沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈愚謂沈固有罪奉天子之命問其罪而伐之可也蔡不奉天子之命而受命於晉人可乎又從而滅之可乎又從而以其君歸而殺之可乎吾見沈之罪輕而蔡之罪重矣且晉人取貨於蔡不得而辭蔡遂以無功晉之負蔡與沈等耳春秋書此皆所以罪蔡也胡氏以為書滅沈罪公孫姓也書以歸罪沈子嘉也書殺之罪蔡侯也其言則支矣五月公及諸侯盟于臯鼬正傳曰書公及諸侯盟于臯鼬非其盟也以魯之求比于諸侯也程子曰公以不獲見于晉故因㑹而求盟焉則此盟公意也故書公及胡氏曰定公之立上不告于天王下不告于方伯而受國於季孫意如故三年如晉至河而復今㑹諸侯求為此盟故書公及者内為志也愚謂二子之言是也春秋書此則其非㑹盟之正卑屈之志盖由於不能正始皆可以考其實而知其君臣之罪矣左氏曰将㑹衛子行敬子衞大夫言於靈公曰㑹同難嘖有煩言莫之治也其使祝佗從公曰善乃使子魚即祝佗子魚辭焉公曰行也及臯鼬将長蔡於衛衞侯使祝佗私于萇𢎞曰聞諸道路不知信否若聞蔡将先衞信乎萇𢎞曰信蔡叔康叔之兄也先衞不亦可乎子魚曰以先王觀之則尚徳也昔武王克商成王定之選建明徳以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旂命以伯禽而封於少皥之虚分康叔以大路少帛命以康誥而封於殷虚分唐叔以大路宻須之鼓命以唐誥而封於夏虛三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而放蔡叔以車七乗徒七十人其子蔡仲改行帥徳周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衞也武王之母弟八人周公為太宰康叔為司冦􅆅季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今将尚之是反先王也晉文公為踐土之盟衞成公不在夷叔其母弟猶先蔡其載書云王若曰晉重魯申衞武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其徳将如之何萇𢎞説告劉子與范獻子謀之乃長衞侯於盟反自召陵鄭子太叔未至而卒杞伯成卒于㑹正傳曰何以書志憫也以其卒于㑹也六月𦵏陳恵公正傳曰何以書使人因𦵏而考其㑹陳子忘哀之罪見矣髙氏曰此見諸侯背殯出㑹也盖君在殯則辭㑹可也雖不得於晉令而齊亦使國夏來耳許遷于容城正傳曰此楚遷之也書許遷于容城罪楚也楚人遷許與許君之不能自立其罪並見矣秋七月公至自㑹正傳曰書公至自㑹謹君之出入也劉卷卒正傳曰劉卷即劉蚠公羊曰劉卷者天子之大夫也外大夫不卒此何以卒我主之也愚謂非也天子之卿大夫視諸侯故有赴則書所以尊天子也所以賢其賢也𦵏杞悼公正傳曰書𦵏杞悼公志恤小之禮也楚人圍蔡正傳曰書楚人圍蔡則楚之憤兵蔡之召釁並見之矣左氏曰楚為沈故圍蔡由是觀之則蔡以滅沈而召釁楚以憤怒而興兵一間耳晉士鞅衞孔圉帥師伐鮮虞正傳曰書二國伐鮮虞著陵弱暴寡之師也𦵏劉文公正傳曰書𦵏劉文公著非禮也王臣無外交劉文公天子之卿大夫魯不當𦵏故書以著其非焉冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭正傳曰書蔡侯以吳子及楚人戰于柏舉楚師敗績囊瓦出奔鄭著攘夷之師也左氏曰伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吴子唐侯伐楚舍舟於淮汭自豫章與楚夾漢左司馬戍即沈尹戌謂子常即囊瓦曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅㝠阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黒楚大夫謂子常曰吳用木也我用革也不可久也不如速戰史皇楚大夫謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之将何所入子必死之初罪必盡説十一月庚午二師陳于柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師􅅍吳師大敗之子常奔鄭史皇以其乗廣死公羊曰吳何以稱子夷狄也而憂中國其憂中國奈何伍子胥父誅乎楚挾弓而去楚以干闔廬闔廬曰才之甚勇之甚将為之興師而復讎于楚伍子胥復曰諸侯不為匹夫興師且臣聞之事君猶事父也虧君之義復父之讎臣不為也於是止蔡昭公朝乎楚有羙裘焉囊瓦求之昭公不與為是拘昭公於南郢數年然後歸之於其歸焉用事乎河曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使囊瓦将而伐蔡蔡請救於吳伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡榖梁曰吳其稱子何也以蔡侯之以之舉其貴者也蔡侯之以之則舉其貴者何也吳信中國而攘夷狄吳進矣愚謂春秋之法中國而夷狄則夷狄之夷狄而中國則中國之吳本夷狄能聴蔡侯之請而伐楚攘夷狄以尊中國是吳亦進而為中國矣是有憂中國之心可以愧晉之為霸主不能存中國之諸侯者多矣故春秋書其伐以與之又書楚之敗奔以褒其全功也後儒不知吳子為伯號而云稱子以與之殊不知書其事而善之之義已見不待乎稱子與否也胡氏又為闔廬子胥宰嚭皆懐謀楚之心蔡人往請㑹逢其適非有救災恤隣憂中國之實故不書救非也盖春秋書其事而救隣難憂中國之義見矣不待乎書救與否也使春秋不與吳之救蔡則此書也竊取之義烏乎在庚辰吳入郢正傳曰獨稱吳者史承上而省其文耳公榖胡氏皆以為反狄道非也書吳入郢則其窮兵黷武之罪自見矣不在乎去其子乃罪之也左氏曰吳從楚師及清發水名将撃之夫槩王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢己夘楚子取其妹季芈畀我皆平王女以出涉睢水名鍼尹固與王同舟王使執燧象以奔吳師庚辰吳入郢以班處宫子山吴王子處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戍及息而還敗吳師於雍澨傷初司馬臣闔廬故恥為禽焉謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免楚子涉睢濟江入于雲中王寢盗攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芈以從由于徐蘇而從鄖鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奨天𠂻君之恵也漢陽之田君實有之楚子在公宫之北吴人在其南子朝似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吴曰以隨之辟小而宻邇於楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不惟一人若鳩楚竟敢不聴命吴人乃退罏金初宦于子期氏實與随人要言王使見辭曰不敢以約為利王割子期之心以與隨人盟初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出榖梁曰何以謂之吴也狄之也何謂狄之也君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻盖有欲妻楚王之母者不正乗敗人之績而深為利居人之國故反其狄道也愚謂先王之道天子討而不伐諸侯伐而不討諸侯奉天子之命致討而問其罪弔其民而止耳不狥利不逞怒不窮兵不黷武夫郢者楚國之都也入其都則窮兵黷武逞忿狥利固為三王之罪人矣雖無分室淫凟之事猶不免於春秋之罪况其傳如此乎敬王十五年五年晉定七年齊景四十三年衞靈三十年蔡昭十四年鄭獻九年曹靖公露元年陳懐公栁元年杞僖公過元年宋景十二年秦哀三十二年楚昭十一年吳闔廬十年春王三月辛亥朔日有食之正傳曰書日有食之志天變也隂侵陽下陵上之象夏歸粟于蔡正傳曰歸猶送也魯送之也何以書歸粟于蔡㣲相恤之恵也左氏曰以周亟急也矜無資榖梁曰諸侯無粟諸侯相歸粟正也愚謂春秋書歸粟取諸侯周急相歸之小義而其恤隣從簡書之大義則無之夫蔡困於楚兵之圍則坐視而不救此春秋所以進吴之救蔡而㣲魯之歸粟於是諸侯之罪自見矣曰諸侯皆歸而不言諸侯者何也春秋魯史也書魯之事諸侯未有報則不得書也於越入吴正傳曰於越即越也云於越者夷方言也即其俗言稱之書於越入吳交譏之也左氏曰越入吳吳在楚也愚謂吳之破楚以解蔡圍有安中國之功然而趨楚利而忘後備越窺吳兵之在楚掩其不意而入之肆其夷狄貪殘之行而忘大義故是書也於越見其忘義於吳見其忘備交譏之義具矣六月丙申季孫意如卒正傳曰書季孫意如卒循國卿之常禮也使人求其平生逐君之罪惡則定公不能誅罪而使得其常以卒有遺憾矣左氏曰六月季平子行東野還未至丙申卒于房陽虎将以璵璠斂仲梁懐弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既𦵏桓子行東野及費子洩即不狃為費宰逆勞於郊桓子敬之勞仲梁懐仲梁懐弗敬不敬子洩也子洩怒謂陽虎子行之乎欲陽虎行其志也胡氏曰内大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也意如何以書卒見定公不討逐君之賊以為大夫全始終之禮也定雖受國於季氏苟有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室强矣今苟於利而忘其讎三綱滅公室益侵陪臣執命宜矣故意如書卒主人習其讀而問其傳則未知己之有罪焉耳愚謂習讀問傳凡觀春秋者皆當如此胡氏何獨明於此而惑於他耶秋七月壬子叔孫不敢卒正傳曰書叔孫不敢卒志國卿之大故也冬晉士鞅帥師圍鮮虞正傳曰書圍鮮虞志非義也左氏曰晉士鞅圍鮮虞報觀虎之役也愚謂以大字小霸主之道也晉乃圍鮮虞以報觀虎之役是憤兵也非義甚矣敬王十六年六年晉定八年齊景四十四年衞靈三十一年蔡昭十五年鄭獻十年曹靖二年陳懐二年杞僖二年宋景十三年秦哀三十三年楚昭十二年吳闔廬十一年春王正月癸亥鄭游速帥師滅許以許男斯歸正傳曰書游速滅許以許男斯歸交譏之也左氏曰鄭滅許因楚敗也據此則許以中國諸侯而恃附荆楚之夷為楚四遷國都卒不能賴楚以全其國見滅於鄭以亡宗社許固有以自取之矣鄭之於許非有問罪之義而擅興大衆以滅其國絶其宗杞而俘辱其君暴亦甚矣故春秋書之以並見其罪二月公侵鄭正傳曰書公侵鄭見非義之兵也左氏曰二月公侵鄭取匡為晉討鄭之伐胥靡也往不假道於衞及還陽虎使季孟自南門入出自東門舍於豚澤衞侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君将以文之舒鼎鼎名成之昭兆龜名定之鞶鑑苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之将以為之質此羣臣之所聞也今将以小忿蒙舊徳無乃不可乎太姒之子唯周公康叔為相睦也而傚小人以棄之不亦誣乎天将多陽虎之罪以斃之君姑待之若何乃止愚謂此本傳也觀此則魯之侵鄭乃以鄭之伐胥靡故為晉討之耳夫鄭有罪而問之與鄭兵加於己而應之可也今乃為晉報怨而討之又行侵暴之事春秋書以罪之公至自侵鄭正傳曰書公至自侵鄭始終乎非義之舉也公為晉報怨以搆怨而危其國則其告廟之詞亦難矣夏季孫斯仲孫何忌如晉正傳曰書季孫斯仲孫何忌如晉譏非所如也左氏曰夏季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之愚謂觀此則季桓子非所獻而獻矣夫魯既為晉討鄭以助其憤又獻鄭俘以為媚其如晉也非聘問之禮矣况二事兼行乎故春秋書其如晉以非之秋晉人執宋行人樂祁犂正傳曰此何以書志非義也使人讀其文求其事知由强臣之䜛致君於非義之罪矣左氏曰秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可以不討也乃執樂祁愚謂觀此則宋來修好於晉而晉以小故執其行人可謂禮義乎致君於非禮非義者范獻子與趙簡子争權為之也然則晉之為晉可知矣胡氏曰執異國行人出於列卿私意威福之柄移矣三家分晉而靖公廢為家人豈一朝一夕之故哉愚謂書晉人者魯史總稱他國之詞或謂稱人以執非伯討則非矣夫晉君以讒臣之言而執他國行人於行禮之時其不為伯討有不待稱人而後知之矣冬城中城正傳曰書城中城譏非禮也冬城時也何以非禮曰不正雖時亦非也左氏曰城中城者三家張也或曰非外民也愚謂二者皆非矣夫城其中以外城外之民非也三家為之以自張其勢亦非也春秋書之而義自見矣季孫斯仲孫忌帥師圍鄆正傳曰忌何忌書季孫斯仲孫忌帥師圍鄆著二氏之擅興也無公命也杜氏曰鄆貳於齊也髙氏曰鄆自昭二十五年齊取之以居昭公後鄆雖潰而猶貳於齊何忌不言何史之闕文也公羊以為譏二名非禮非也春秋書二卿圍鄆則見其無公室兆於此矣又按左氏其明年齊人歸鄆陽闗陽虎居之以為政則見其無三桓之機亦兆於此矣敬王十七年七年晉定九年齊景四十五年衞靈三十二年蔡昭十六年鄭獻十一年曹靖三年陳懐三年杞僖三年宋景十四年秦哀三十四年楚昭十三年吴闔廬十二年春王正月正傳曰無事亦書時月義見于前夏四月正傳曰無事亦書時月史之舊文也史法也秋齊侯鄭伯盟于鹹正傳曰鹹衞地書盟于鹹志善㑹也左氏曰齊鄭盟于鹹徴㑹于衞愚謂徴㑹于衞故齊鄭於衞地盟之是時周儋翩入于儀栗以叛天王處于姑蕕以避其亂晉為盟主不能興勤王之師霸圖隳矣故齊景公與鄭伯盟而徴㑹于衞以復興桓公之霸業也故春秋善之齊人執衞行人北宫結以侵衞正傳曰書齊人執衞行人北宫結以侵衞志非義也行人之如齊其事傳不可考以上文齊鄭盟鹹左氏以為徴㑹于衞下文齊衞盟于沙盖必衞侯貳齊而不與㑹故齊執而侵之然後乃與盟于沙也然齊方㑹盟諸侯以興霸圖衞不與㑹舉兵向之問其罪則衞無不服而齊為伯討矣不此之圖而執其行人行人何罪焉潜師掠境境内之民何罪焉是舍大義而窺小利不足為霸矣故春秋非其執與侵也榖梁以為重結先儒又以稱人為貶皆義例之誤也齊侯衞侯盟于沙正傳曰沙晉地書齊侯衞侯盟于沙譏刼盟也夫盟者忠信之薄也况刼盟乎齊鄭徴㑹于衞衞使行人辭之齊執其行人以伐其國乃與盟于沙非刼盟乎何以質諸鬼神而結其忠信乎左氏曰衞侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于𤨏愚謂此左氏傳聞附㑹之過也審如是則衞靈公之詭謀齊景公之詭行皆背忠信之大者也何以相固結乎何以盟告于鬼神乎大雩正傳曰書大雩志國之大事也而其非禮見矣齊國夏帥師伐我西鄙正傳曰何以書志警也而齊報怨之罪見矣夫魯方意如逐君定公擅立齊於是時不能約與國興師而問罪今齊鄭為黨惡魯事晉故為鄭伐魯且報二卿圍鄆之怨則非義兵矣左氏曰齊國夏伐我陽虎御季桓子公斂處父御孟懿子将宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎陥二子於難不待有司余必殺汝虎懼乃還不敗九月大雩正傳曰書九月大雩志國之大事也而其非時非禮並見矣冬十月正傳日無事亦書史之法也春秋正傳卷三十四
