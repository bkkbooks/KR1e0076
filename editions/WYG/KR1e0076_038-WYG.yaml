body:
  text: 春秋脩後魯史舊文魯哀公杜預云春秋止於獲麟自此以下至十六年皆魯史記之文弟子欲存孔子卒故并錄以續孔子所脩之經庚申經十有四年春西狩獲麟傳見前卷小邾射以句繹來奔句音鈎射音亦小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乗之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能夏四月齊陳恒執其君寘于舒州齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之驟顧諸朝諸御鞅言於公曰陳闞不可並也君其擇焉弗聴子我夕陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沭備酒肉焉饗守囚者醉而殺之而迯子我盟諸陳於陳宗初陳豹欲為子我臣使公孫言已已有喪而止既而言之曰有陳豹者長而上僂望視事君子必得志欲為子臣吾憚其為人也故緩以告子我曰何害是其在我也使為臣他日與之言政説遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺於陳氏矣且其違者不過數人何盡逐焉遂告陳氏子行曰彼得君弗先必禍子子行舍於公宫夏五月壬申成子兄弟四乗如公子我在幄出迎之遂入閉門侍人禦之子行殺侍人公與婦人飲酒于檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也成子出舍于庫聞公猶怒將出曰何所無君子行抽劍曰需事之賊也誰非陳宗所不殺子者有如陳宗乃止子我歸屬徒攻闈與大門皆不勝乃出陳氏追之失道於弇中適豐丘豐丘人執之以告殺諸郭闗成子將殺大陸子方陳逆請而免之以公命取車於道及耏衆知而東之出雍門陳豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讎何以見魯衛之士東郭賈奔衛庚辰陳恒執公于舒州公曰吾早從鞅之言不及此庚戌叔還卒五月庚申朔日有食之陳宗豎出奔楚宋向魋入于曹以叛宋桓魋之寵害於公公使夫人驟請享焉而將討之未及魋先謀公請以鞌易薄公曰不可薄宗邑也乃益鞌七邑而請享公焉以日中為期家備盡往公知之告皇野曰余長魋也今將禍余請即救司馬子仲曰有臣不順神之所惡也而况人乎敢不承命不得左師不可請以君命召之左師每食擊鍾聞鍾聲公曰夫子將食既食又奏公曰可矣以乗車往曰迹人來告曰逢澤有介麋焉公曰雖魋未來得左師吾與之田若何君憚告子野曰嘗私焉君欲速故以乗車逆之與之乗至公告之故拜不能起司馬曰公與之言公曰所難子者上有天下有先君對曰魋之不共宋之禍也敢不唯命是聴司馬請瑞焉以命其徒攻桓氏其父兄故臣曰不可其新臣曰從吾君之命遂攻之子頎騁而告桓司馬司馬欲入子車止之曰不能事君而又伐國民不與也祗取死焉向魋遂入于曹以叛六月使左師巢伐之欲質大夫以入焉不能亦入于曹取質魋曰不可既不能事君又得罪於民將若之何乃舍之民遂叛之向魋奔衛向巢來奔宋公使止之曰寡人與之有言矣不可以絶向氏之祀辭曰臣之罪大盡㓕桓氏可也若以先臣之故而使有後君之惠也若臣則不可以入矣司馬牛致其邑與珪焉而適齊向魋出於衛地公文氏攻之求夏后氏之璜焉與之他玉而奔齊陳成子使為次卿司馬牛又致其邑焉而適吳吳人惡之而反趙簡子召之陳成子亦召之卒於魯郭門之外阬氏𦵏諸丘輿莒子狅卒狅其廷反六月齊人弑其君壬於舒州甲午齊陳恒弑其君壬于舒州孔丘三日齊而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言秋晉趙鞅帥師伐衛八月辛丑仲孫何忌卒初孟孺子洩將圉馬於成成宰公孫宿不受曰孟孫為成之病不圉馬焉孺子怒襲成從者不得入乃反成有司使孺子鞭之秋八月辛丑孟懿子卒成人奔喪弗内􅃝免哭于衢聴共弗許懼不歸冬陳宗豎自楚復入于陳陳人殺之陳轅買出奔楚有星孛饑辛酉十有五年春王正月成叛春成叛于齊武伯伐成不克遂城輸夏五月齊髙無丕出奔北燕鄭伯伐宋秋八月大雩晉趙鞅帥師伐衛冬晉侯伐鄭及齊平冬及齊平子服景伯如齊子贛為介見公孫成曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎子周公之孫也多饗大利猶思不義利不可得而䘮宗國將焉用之成曰善哉吾不早聞命陳成子館客曰寡君使恒告曰寡人願事君如事衛君景伯揖子贛而進之對曰寡君之願也昔晉人伐衛齊為衛故伐晉冠氏䘮車五百因與衛地自齊以西禚媚杏以南書社五百吳人加敝邑以亂齊因其病取讙與闡寡君是以寒心若得視衛君之事君也則固所願也成子病之乃歸成公孫宿以其兵甲入于嬴衛公孟彄出奔齊壬戌經十有六年春王正月己夘衛世子蒯聵自戚入于衛衛侯輒來奔衛孔圉取太子蒯聵之姊生悝孔氏之竪渾良夫長而美孔文子卒通於内太子在戚孔姬使之焉太子與之言曰苟使我入獲國服冕乗軒三死無與與之盟為請於伯姬閏月良夫與太子入舍於孔氏之外圃昏二人蒙衣而乗寺人羅御如孔氏孔氏之老欒寧問之稱姻妾以告遂入適伯姬氏既食孔伯姬杖戈而先太子與五人介輿豭從之迫孔悝於厠強盟之遂刼以登臺樂寧將飲酒炙未熟聞亂使告季子召獲駕乗車行爵食炙奉衛侯輒來奔季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入及門公孫敢門焉曰無入為也季子曰是公孫也求利焉而迯其難由不然利其禄必救其患有使者出乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立莊公莊公害故政欲盡去之先謂司徒瞞成曰寡人離病於外久矣子請亦嘗之歸告褚師比欲與之伐公不果二月衛子還成出奔宋子還成即瞞成春瞞成褚師比出奔宋衛侯使鄢武子告于周曰蒯聵得罪于君父君母逋􅇡于晉晉以王室之故不棄兄弟寘諸河上天誘其衷獲嗣守封焉使下臣􅆄敢告執事王使單平公對曰􅆄以嘉命來告余一人往謂叔父余嘉乃成世復爾祿次敬之哉方天之休弗敬弗休悔其可追夏四月己丑孔丘卒仲尼既告老去位猶書卒者魯之君臣宗其聖徳殊而異之魯襄二十二年至今七十三此以下無復經夏四月己丑孔丘卒公誄之曰昊天不弔不憖遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子貢曰君其不沒於魯乎夫子之言曰禮失則昏名失則愆失智為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之右自獲麟而後至孔子卒凡二十五條皆魯史舊文孔子所未筆于經者也杜預云弟子欲存孔子卒故錄以續脩經之後今觀其文詞書法與經何異由是言之則經為因魯史舊文而筆之孔子未嘗有所損益而義則竊取焉斷乎而無疑矣故曰其事則齊桓晉文其文則史其義則丘竊取之矣後之儒者乃以為一字即存褒貶皆經聖人之手所筆是以創為義例之説而聖經始晦其違聖人灑然之心始逺矣世之君子或為舊説所惑而不信吾今本孟子之説以求春秋之指者盍亦請觀於此脩後之舊文乎嘉靖甲午四月六日後學甘泉湛若水謹識春秋脩後魯史舊文
