body:
  text: 春秋正傳卷三十三明湛若水撰昭公敬王四年二十有六年晉頃十年齊景三十二年衛靈十九年蔡昭三年鄭定十四年曹悼八年陳恵十四年杞悼二年宋景公欒元年秦哀二十一年楚平十三年卒吴僚十一年春王正月𦵏宋元公正傳曰書正月𦵏宋元公志相恤之禮也三月公至自齊居于鄆正傳曰書公至自齊居于鄆志復境也善齊也幸公也憫公也左氏曰三月公至自齊處于鄆言魯地也榖梁曰公次于陽州其曰至自齊何以齊侯之見公可以言至自齊也居于鄆者公在外也至自齊道義不外公也愚謂由二傳觀之則至自齊齊侯道義之舉而公賴焉故曰善齊也以居鄆為得入魯地故曰幸公也然猶在外耳故曰憫公也一書而三義備矣胡氏曰居者有其土地人民之稱也昭公失國出奔而稱居于鄆者存一國之防也襄王已出而稱居于鄭敬王未入而稱居于狄泉者存天下之防也天子之于天下率土之濱莫非其臣非諸侯所敢擅也諸侯之於封國四境之内莫非其土非大夫所得専也故諸侯避舍以待巡狩而大夫専邑是為叛君曰居於鄆其為防也至矣夏公圍成正傳曰成孟氏邑書圍成譏之也言公自伐其都也成雖孟氏之邑而莫非魯公之境土也自伐其都是不能有其境土也不能有其境土而反自伐之則見昭公之不君矣為强臣所逐故不能有土見季氏之不臣矣左氏曰夏齊侯将納公命無受魯貨申豐從女賈二人皆季氏家臣以幣錦二兩縳一如瑱適齊師謂子猶即梁丘據之人髙齮子猶家臣能貨子猶為髙氏後粟五千庾髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯有罪于鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公圍成胡氏曰不書齊師者景公怵於邪説為義不終故㣲之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連帥之職其罪咸具矣秋公㑹齊侯莒子邾子杞伯盟于鄟陵正傳曰書盟於鄟陵善其盟也左氏曰盟于鄟陵謀納公也愚謂諸侯失國諸侯納之禮也春秋書之則四國恤難扶危之義見矣公至自㑹居于鄆正傳曰書公至自㑹居于鄆幸公之入境也憫公之在外也榖梁曰公在外也至自㑹道義不外公也九月庚申楚子居卒正傳曰書楚子居卒志赴也左氏曰九月楚平王卒令尹子常欲立子西曰太子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治正順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王冬十月天王入于成周正傳曰成周公羊以為東周也書天王入于成周志復正也成周者天王之都也入于成周則復正其位為天下大一統也言成周則京師在其中矣尹氏召伯毛伯以王子朝奔楚正傳曰書尹氏召伯毛伯以王子朝奔楚則諸侯逸賊荆楚納叛之罪並著矣左氏曰冬十月丙申王起師于滑辛丑在郊遂次于尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚隂忌奔莒以叛召伯逆王于尸及劉子單子盟遂軍圉澤次于隄上癸酉王入于成周甲戌盟于襄宫晉師使成公般戌周而還十二月癸未王入于莊宫王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周亦曰吾無専享文武之功且為後人之迷敗顛覆而溺入于難則振救之至於夷王王愆于厥身諸侯莫不並走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昏不若用愆厥位􅂝王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力于王室也至于恵王天不靖周生頹禍心施于叔帶恵襄避難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剥亂天下壹行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭䂓求無度貫瀆鬼神慢棄刑法倍奸齊盟傲狠威儀矯誣先王晉為不道是攝是賛思肆其罔極兹不榖震盪播越竄在荆蠻未有攸底若我一二兄弟甥舅獎順天法無助狡猾以從先王之命毋速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以徳徳鈞以卜王不立愛公卿無私古之制也穆后及太子夀早夭即世單劉賛私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以専其志無禮甚矣文辭何為胡氏曰取國有五利寵居一焉子朝有寵於景王為之黨者衆矣卒不能立至於奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝将蘄於見是而天下不以為是踈薄子猛蘄於見非而天下卒不以為非徒設此心兩棄之也庶孽馮寵為羣小之所宗而人心不附適子恃正人心之所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄之也景王不鑒覆車王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉敬王五年二十有七年晉頃十一年齊景三十三年衛靈二十年蔡昭四年鄭定十五年曹悼九年卒陳恵十五年杞悼三年宋景二年秦哀二十二年楚昭王軫元年吴僚十二年弑春公如齊公至自齊居于鄆正傳曰書公如齊公至自齊居于鄆志君之出入猶在外也左氏曰公至自齊處于鄆言在外也愚謂昭公雖失國而魯君臣之義未絶也故史於君之出入必詳書之仲尼因而存之以正名分誅亂賊也夏四月吳弑其君僚正傳曰書吳弑其君僚則亂賊之罪可得矣左氏曰吴子欲因楚䘮而伐之使公子掩餘公子燭庸帥師圍潜使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇帥師救潛左司馬沈尹戌帥都君子與王馬之屬以濟師與吴師遇於窮令尹子常以舟師及沙汭而還左尹郤宛工尹夀帥師至于潜吴師不能退吴公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弑也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門堦戶席皆王親也夾之以鈹羞者獻體改服于門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入于堀室鱄設諸置劒于魚中以進抽劒刺王鈹交於胷遂弑王闔廬以其子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待吳公子掩餘奔徐公子燭庸奔鍾吾愚謂按此弑吳君僚者公子光専諸也而書曰吳者吳亂其報畧故史書之仲尼因之使人考其跡而罪人斯得矣後儒以吳國之亂歸罪於季子之讓國誤矣若夫季子所謂知禮者也方光之弑君公子掩餘燭庸皆出而季子乃曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也曽是以為知禮乎季子之罪獨在此耳胡氏曰此公子光使専諸弑之而稱國何也吳子夀夢有四子長諸樊次餘祭次夷昧次季札光諸樊之子也僚夷昧之子也諸樊兄弟以次相及必欲致國於季子而季子終不受則國宜之光者也僚烏得為君故稱國以弑而不歸獄於光其稱國以弑者吳大臣之罪也大臣任大事事莫大於置君矣故君存而國本定君終而嗣子立社稷嘉靖人無間言此秉政大臣之任伊召之所以安商周孔明之所以定劉漢也廢立進退出於羣小閽寺而當國大臣不預焉則将焉用彼相矣此春秋歸罪大臣稱國弑君之意其經世之慮深矣楚殺其大夫郤宛正傳曰書楚殺其大夫郤宛著讒賊之罪也左氏曰郤宛直而和國人説之鄢將師為右領與費無極比而惡之令尹子常即囊瓦賄而信讒無極譛郤宛焉謂子常曰子惡即郤宛欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹将必來辱為恵已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰寘諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾㡬禍子子惡将為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乗亂不祥吳乗我喪我乗其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢将師楚大夫而告之将師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及佗與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國将如何愚謂此讒人費無極之亂國囊瓦之賊殺也春秋特書楚殺其大夫郤宛而罪人斯得矣何必謂稱國以殺乎秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈正傳曰書諸侯大夫㑹于扈則列國善惡之辨聖人悲喜之情見矣左氏曰秋㑹于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁即宋樂祈犂與北宫貞子即北宫喜曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而説甲執冰以遊叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之賛有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復愚謂按此傳則扈之會列國之大夫為戍周謀納魯君也夫戍周為勤王納公為恤憐皆義舉善謀也可嘉矣晉鞅以取貨為詭言以敗之而其罪惡不容誅矣聖人書之其感慨之情千載有遺憾焉孰謂竊取之深意在乎一字之間乎冬十月曹伯午卒正傳曰書曹伯午卒志與國之大故也邾快來奔正傳曰快邾婁之臣書邾快來奔則叛君者與納叛者之罪並見矣夫快背君而奔為叛臣魯納之為納叛昔武王聲紂之罪為天下逋逃主聚淵藪前此邾畀我庶其二叛臣來奔并快則三叛人也魯皆納之季孫則固叛人快之來奔從其類耳然而季孫無君公然為逋逃主而無忌憚春秋書此所以並誅之其意深切矣公如齊正傳曰書公如齊志非禮也左氏曰齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲魯公子憗嘗去季氏而奔齊有女名重之子曰重為齊侯夫人曰請使重見子家子乃以君出又按左氏孟懿子陽虎伐鄆鄆人将戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也鳴呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知愚謂按此則魯君無道不能自立見逐於臣又不能上告天子下告方伯連帥聲大義以誅逆賊復安宗社而乃棲身于鄆為懿子陽虎所敗而依依於齊晉之間其為不仁不孝甚矣春秋書之其憫憾之意深矣公至自齊居于鄆正傳曰書公至自齊居于鄆憫公也敬王六年二十有八年晉頃十二年齊景三十四年衛靈二十一年蔡昭五年鄭定十六年卒曹聲公野元年陳恵十六年杞悼四年宋景三年秦哀二十三年楚昭二年吴闔廬元年春王三月𦵏曹悼公正傳曰書𦵏曹悼公志相恤之禮也公如晉次于乾侯正傳曰乾侯晉境内邑書公如晉次于乾侯志非禮也左氏曰公如晉将如乾侯子家子曰有求于人而即其安人孰矜之其造于境弗聴使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一介辱在寡人而即安于甥舅其亦使逆君使公復於竟而後逆之愚謂魯侯見逐於叛臣不以大義告于天子方伯一失也而依依以干人二失也入其境不造其國而次于乾侯三失也晉人不以恤難為急無方伯之義忘盟主之道胥失之矣春秋書之而彼此之罪自見矣夏四月丙戌鄭伯寜卒正傳曰書鄭伯寜卒志鄰國之大故也六月𦵏鄭定公正傳曰書𦵏鄭定公志恤隣之禮也而鄭𦵏之非禮見矣諸侯五月而𦵏此其速也秋七月癸巳滕子寜卒正傳曰書滕子寜卒志與國之大故也冬𦵏滕悼公正傳曰書冬塟滕悼公志恤鄰之禮也諸侯五月而塟禮也敬王七年二十有九年晉頃十三年齊景三十五年衛靈二十二年蔡昭六年鄭獻公蠆元年曹聲二年陳恵十七年杞悼五年宋景四年秦哀二十四年楚昭三年吴闔廬二年春公至自乾侯居于鄆正傳曰書公至自乾侯居于鄆閔公之久于外也齊侯使髙張來唁公正傳曰唁者榖梁以為唁公不得入於魯也書齊侯使髙張來唁公罪齊也罪齊之虚禮也左氏曰春公至自乾侯處於鄆齊侯使髙張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯胡氏曰遣使來唁淺事也亦書于經者罪齊侯不能修方伯連帥之職也昔狄人迫逐黎侯黎侯寓于衛衛人弗恤黎之臣子勸其君以歸而賦式㣲其一章曰㣲君之故者以事求人而人不有其事是謂㣲君之故若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納㣲君之故矣其二章曰㣲君之躬者以身下人而人不有其身是謂㣲君之躬若齊侯設禮以享而使宰獻遣使來唁而稱主君㣲君之躬矣諸侯失國諸侯納之正也齊之先世嘗主夏盟而太公受先王五侯九伯之命矣魯為隣境甥舅之國也昭公朝夕立於其朝曽不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎公如晉次于乾侯正傳曰書公如晉次于乾侯譏非禮也髙氏曰復如晉兾見恤而晉復不受故次于乾侯愚謂昭公知不可復進而進無恥愧之心晉侯可納而再不納為無恤難之義皆非禮矣故春秋書之以見其罪夏四月庚子叔詣卒正傳曰書叔詣卒志忠臣之大故也穀梁曰季孫意如曰叔詣無病而死此皆無公也是天命也非我罪也髙氏曰叔詣欲納公而卒由是觀之是叔詣昭公之忠臣無病而卒聖人書此其感嘆之意深矣秋七月正傳曰無事亦書時月義見于前冬十月鄆潰正傳曰書冬十月鄆潰志昭公之見棄於民也胡氏曰民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有也公之出奔處鄆四年民不見徳亡無愛徴至於潰散豈非昏迷不返自納於罟擭陷穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼蘄改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒敬王八年三十年晉頃十四年卒齊景三十六年衛靈二十三年蔡昭七年鄭獻二年曹聲三年陳恵十八年杞悼六年宋景五年秦哀二十五年楚昭四年吳闔廬三年春王正月公在乾侯正傳曰書公在乾侯志出奔也左氏曰不先書鄆與乾侯非公且徴過也胡氏曰公去社稷于今五年毎嵗首月不書公者在魯四封之内則無適而非其所也至是鄆潰客寄乾侯非其所矣嵗首必書公之所在者盖以存君不與季氏之専國也而罪臣子譏諸侯之意具矣唐武后廢遷中宗革命自立史臣列於本紀欲著其罪而君子以為非春秋之法其言曰天下者唐之天下中宗受之於其父武后安得絶先君之世復繫嗣君之年黜武氏之號自以為竊取春秋之義信矣夏六月庚辰晉侯去疾卒正傳曰何以書志霸主之大故也八月𦵏晉頃公正傳曰書八月𦵏晉頃公志相恤之禮也而晉之非禮見矣諸侯五月而𦵏禮也速𦵏非禮也左氏曰夏六月晉頃公卒秋八月𦵏鄭游吉弔且送𦵏魏獻子使士景伯詰之曰悼公之䘮子西弔子蟜送𦵏今吾子無貳何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之䘮士弔大夫送𦵏唯嘉好聘饗三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣大國之恵亦慶其嘉而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰冬十有二月吴滅徐徐子章羽奔楚羽左作禹正傳曰何以書志暴虐之兵也左氏曰吴子使徐人執掩餘吴公子使鍾吾人執燭庸吴公子二公子奔楚楚子大封而定其徙使監焉尹大心逆吳公子使居養莠尹然左司馬沈尹戌城之取於城父與胡田以與之将以害吴也子西諫曰吳光即闔廬新得國而親其民視民如子辛苦同之将用之也若好吳邊疆使柔服焉猶懼其至吾又彊其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濱不與姬通今而始大比于諸華光又甚文将自同於先王不知天将以為虐乎使剪喪吳國而封大異姓乎其抑亦将卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寜吾族姓以待其歸将焉用自播揚焉王弗聴吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之己夘滅徐徐子章禹斷其髪擕其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之愚謂吴子以徐子之不執二公子而使之奔也一怒之間遂至暴其師而滅其國奔其君而絶其宗杞虐之甚者也故春秋書而夷狄之敬王九年三十有一年晉定公午元年齊景三十七年衛靈二十四年蔡昭八年鄭獻三年曹聲四年陳恵十九年杞悼七年宋景六年秦哀二十六年楚昭五年吳闔廬四年春王正月公在乾侯正傳曰書公在乾侯著魯君之有在也而昭公之不君季氏之不臣益可見矣季孫意如㑹晉荀躒于適歴正傳曰書季孫意如會晉荀躒于適歴著其㑹之非也而濟惡之罪見矣左氏曰晉侯将以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適歴荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚於費以待君之察也亦唯君若以先君之故不絶季氏而賜之死若弗殺弗亡君之恵也死且不朽若得從君而歸則固臣之願也敢有異心愚謂此私㑹也胡氏以為㑹禮非也隂謀以濟惡也若季孫之逐君四五年於外豈待召之不來而後信其不臣哉士鞅受季孫之貨為此詭言以罔其臣晉君遂為之罔季孫素衣伏行請從君而歸竟不聞復辟而晉君遂為强臣所持而不遂納焉不特以哀魯亦可以觀晉禍之将及矣胡氏曰意如出君不事專有魯國晉實主盟不能致討而寵以㑹禮不亦悖哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱於煬宫求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其從自及也陸淳以為逐君之臣晉不之罪而反與為㑹書曰意如㑹晉荀躒于適歴晉侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而罪惡見者也得春秋所書之意矣愚謂如此之類則於何一字取褒貶之義乎足以見義例之不足信矣夏四月丁巳薛伯榖卒正傳曰書薛伯榖卒志與國之大故也左氏曰同盟故書愚謂聖人存之於册著相恤之義耳晉侯使荀躒唁公于乾侯正傳曰書晉侯使荀躒唁公于乾侯譏之也譏晉侯之虚禮而無恤難之義也晉侯始有以師納昭公之意卒為强臣所阻而徒唁之而已何其見義不為而無勇耶晉之為晉亦可知矣晉之諸臣實與季孫聲勢相倚同惡相濟而卒以分晉其兆於此哉左氏曰夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討意如意如不敢逃死君其入也公曰君恵顧先君之好施及亡人将使歸糞除宗祧以事君則不能見夫人己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乗入于魯師季孫必與公歸公欲從之衆從者脅公不得歸秋𦵏薛獻公正傳曰書𦵏薛獻公志禮也冬黒肱以濫來奔正傳曰黒肱邾大夫濫東海昌慮縣邾婁之邑也書黒肱以濫來奔則黒肱叛君之賊季氏納叛之罪皆可見矣故曰直書其事而其得失自見此之謂也左氏書名重地之説㣲顕婉辨豈不謬哉至於公羊以為叔術讓國之賢宜有地榖梁以為不言邾黒肱别乎邾則又皆逺矣十有二月辛亥朔日有食之正傳曰書辛亥朔日有食之志天變也所以致警戒之義焉左氏載火勝金决六年此月吳入郢而弗克之説則謬妄矣敬王十年三十有二年晉定二年齊景三十八年衛靈二十五年蔡昭九年鄭獻四年曹聲五年陳惠二十年杞悼八年宋景七年秦哀二十七年楚昭六年吴闔廬五年春王正月公在乾侯正傳曰書春王正月公在乾侯著魯君之有在也亦以憫公也左氏曰言不能外内又不能用其人也愚謂其人謂子家羇也子家子嘗勸公因季氏至乾侯乗一乗以入魯師必與俱歸公不能用遂坐困於乾侯如羈鳥栖栖然附於他林而莫之定止可憫之甚也春秋書此其感嘆之意深矣取闞正傳曰闞魯地在東平須昌縣東南書取闞志非謀也見昭公之無志於興復而取於㣲也而季氏不臣之罪益著矣夫昭公為魯君魯四境之内莫非其有也昭公無道强臣據有魯國乃復取闞若取諸他國然春秋書此則君臣之罪並見矣感嘆之意益深矣夏吳伐越正傳曰書吳伐越志不義之師也夫師之興必有名無名斯非義矣故春秋書之左氏曰始用師於越也史墨曰不及四十年越其有吳乎秋七月正傳曰無事亦書時月義見於前冬仲孫何忌㑹晉韓不信齊髙張宋仲㡬衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周正傳曰書諸侯大夫㑹城成周著尊王之義也左氏曰秋八月王使富辛與石張如晉請城成周天子曰天降禍於周俾我兄弟並有亂心以為伯父憂我一二親暱甥舅不皇啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大恵復二文文侯文公之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文徳焉今我欲徼福假靈於成王修成周之城俾戍人無勤諸侯用寜蝥賊逺屏晉之力也其委諸伯父伯父實重圖之俾我一人無徴怨於百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告于諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪徯曰魏子必有大咎干位以令大事非其任也己丑士彌牟營成周計文數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦文書以授師而效諸劉子韓簡子臨之以為成命愚謂此本傳也是時王室危亂諸侯用命以城成周則尊王之心猶不忘也故春秋書以與之胡氏曰天子有道守在四夷今至於城王都可以不書乎不曰城京師而曰城成周者京師衆大之稱成周地名也與列國等矣愚謂此論鑿矣成周非地名乃東都之名其來久矣則春秋安得變成周之名而為京師若云京師則與西周何别乎或云京師或云成周其義一也不然則後書晉執宋仲幾于京師又何耶以此見義例之不足信也已文定惑其小者棄其大義奚可哉十有二月己未公薨于乾侯正傳曰書公薨于乾侯志非正也而昬君逆臣之罪並著矣左氏曰公疾徧賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪貳故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乗乾曰大壮天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰文遂以名之既而有大功于魯受費以為上卿至于文子武子世増其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人愚謂史墨言名器不可假人探本之論也魯君之失國而客死於他境其咎在此矣至於三五陪貳之説妄矣反以啓强臣無君之心謂若天造地設者其助亂之罪不小矣胡氏曰諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔入于櫟而復國衛侯衎為孫寗所逐而出奔入于夷儀而復國昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯國季友受費以為上卿至於意如専執國命四世矣其臣皆季氏之俘也其民皆季氏之獲也而昭公有一子家駒言不見聴計不行也不能復國宜矣故春秋詳録其所因為後世之戒公雖失國然每嵗之首月必書公在乾侯誅意如也書齊侯取鄆公圍成鄆潰絶昭公也為人臣者觀毎嵗必書公所在必不敢萌跋扈不臣之心為人君者觀春秋所書圍成鄆潰知社稷之無常奉也亦必少警矣嗚呼可謂深切著明者矣春秋正傳卷三十三
