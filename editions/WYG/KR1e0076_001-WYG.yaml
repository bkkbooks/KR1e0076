body:
  text: 春秋正傳卷一明湛若水撰𨼆公名息姑姬姓侯爵自周公子伯禽始受封傳世二十三而至𨼆公惠公繼室所生在位十一年周平王四十九年元年齊僖公禄父九年晉鄂侯郄二年曲沃莊伯鮮十一年衛桓公完十三年蔡宣公考父二十八年鄭莊公寤生二十二年曹桓公終生三十五年陳桓公鮑二十三年杞武公二十九年宋穆公和七年秦文公四十四年楚武王熊通十九年春王正月正傳曰春王正月乃春秋表時以紀事之通例無事亦書虚以待事也公羊曰春者何歳之始也王者孰謂謂天王也曷為先言王而後言正月王正月也何言乎王正月大一綂也程子曰春天時正月王正月書王正月言人君當上奉天時下承王正是也然而因以為表時紀事之例榖梁曰雖無事必舉正月謹始也非也何以謂王之正月也春秋之時時月不協盖必有非王之正月者矣列國之正朔或不同也胡傳以為謂正朔改而時月不改者非也孔子作春秋皆因史之文况肯以匹夫改周之正朔生今而反古乎盖舜廵狩協時月正日時者謂春夏秋冬四時也而曰協則知春夏秋冬歴代異方容有不同者矣月􅁆之起容有不同者矣孔子曰行夏之時則知周時不同夏之春夏秋冬者矣盖三陽之月皆可以為歳首皆可以為春考之經書春正月無氷之𩔖可見或曰子月可以為來歳之始乎曰子時何以為來日之始也乎夫正月云者為正之月也周正子子正月也夏商正寅正丑亦如之如曰正朔改而月􅁆不改則名義不正於何稱月乎至於吴氏又謂周既有厯而魯自造厯以春為一歳之始於是改子丑寅之月為春夫子因而書之譏也誤矣盖夫子欲従周誡生今反古况肯書背王制之時月乎魯之書即周之制子為周之正斷可見矣其𨼆不書即位者何也史不書也不書不在夫子也其文則史也立君以嫡不以庶桓嫡而幼𨼆長而庶不宜立𨼆非嫡而立立不正也故上難以告天子下難以報列國不報故不書史之文也不書非夫子之所削也而其是非自見矣聖人何心哉左傳云不書即位攝也非也夫攝者必立桓而𨼆輔之如周公之輔成王可也必據其位焉非簒而何三傳之言皆非其正也何也左傳謂之攝公羊謂凡𨼆之立為桓立也榖梁曰不書即位將以讓桓也均之為濟惡之詞云爾三月公及邾儀父盟于蔑正傳曰邾附庸之國名克字儀父書公及盟者何也非其盟也程子曰諸侯交相盟誓亂世之事也胡氏曰春秋大義公天下以講信脩睦為事而刑牲㰱血要質鬼神非所貴也其又曰𨼆公之私何也左傳曰公攝位而欲求好於邾故為蔑之盟愚謂聖人因魯史之文而書之見失禮之中又失禮焉然則非之之義見矣左氏以為曰儀父貴之也公羊以為稱字褒之也皆非也程子曰附庸之君稱字同王臣也胡氏曰附庸例稱字其常也又何褒貴之云乎况此史之舊文非聖人加之也聖人書之竊取其義爾夏五月鄭伯克段于鄢正傳曰段鄭伯之弟名但直書鄭伯克段于鄢則其兄弟君臣之罪並見矣而程子以為稱鄭伯而不言弟榖梁以為段弟也而弗為弟公子也而弗為公子貶之以賤段而甚鄭伯也其意則贅矣又曰鄭伯之處心積慮而成於殺也于鄢逺也則得之矣夫仁人之於弟親愛之而已舜封象于有庳親愛而富貴之使吏治而納其貢税焉斯可矣何以致於惡而逺殺之乎左氏曰姜氏愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城太叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃姑待之既而太叔命西鄙北鄙貳於已公子吕曰國不堪貳君將若之何欲與太叔臣請事之若弗與則請除之無生民心公曰無庸將自及太叔又收貳以為已邑至于廪延子封曰可矣厚將得衆公曰不義不䁥厚將崩太叔完聚繕甲兵具卒乗將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乗以伐京京叛太叔段段入于鄢公伐諸鄢是鄭伯之處心積慮殺段也其曰鄭伯曰克曰段曰鄢魯史之文也聖人特書之以見義耳或曰然則周公之誅管蔡非歟曰周公愛弟之情憂國之志仁之至義之盡也直在周公曲在管蔡也鄭伯養弟之惡而殺之不仁不義之甚曲在鄭伯也烏得比而同之秋七月天王使宰咺來歸惠公仲子之賵正傳曰賵者公羊謂以乗馬束帛書天王使宰咺來歸惠公仲子之賵則非禮見矣王而曰天王者天之王也程子曰奉若天道也故以為稱天子之例其後或稱或不稱史之文有詳畧耳若以為與奪則以匹夫而奪天子之號何以為孔子宰冡宰也咺其名稱宰咺者並書其爵與名猶云某官某人耳况於禮有君前臣名之義而春秋為垂示萬世之書乎胡氏謂貶而書名以見宰之非宰然則成風亦莊公之妾榮叔歸含賵召伯來㑹葬又何以書字而不名也由是觀之則名不名史之文有詳畧耳聖人但舉其事而書之其義自見矣何以為非禮也程子曰以夫人禮賵人之妾不天亂倫之甚也胡氏曰天王紀法之宗也六卿紀法之守也議紀法而脩諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾是壊法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰也愚謂宰與名並書則名不足以辱宰但書云天王使某歸某賵則非禮自見矣何假乎一字之加乎九月及宋人盟于宿正傳曰左氏稱惠公之季年敗宋師于黄公立而求成焉九月及宋人盟于宿始通也此其實事也愚謂稱及稱人魯史舊文也公羊曰及内之微者也程子曰稱及稱人皆非卿也理或然也宿者宿國地宿亦與盟不日史畧之也榖梁曰卑者之盟不日非也聖人何以書其盟也不與其盟也春秋無善盟胡氏曰凡書盟者惡之或曰周官有司盟掌盟載之法詛祝作其詞玉府供其器戎右役其事太史藏其約蘇公亦曰出此三物以詛爾斯夫盟以結信出於人情先王猶不禁也愚謂周官固周公之書而此與夢人之𩔖則後人所為也夫周公之時天下同􅁤同倫豈有列國盟誓之事盖後世之人為之而不覺其偽之難掩也夫自盟誓作而忠信薄矣豈復可以結信哉故胡氏曰魯既及儀父宋人盟矣尋自叛之信安在乎愚故曰不與其盟也冬十有二月祭伯來正傳曰祭伯程子以為畿内諸侯為王卿士公羊以為天子之大夫是也何以書祭伯來罪祭伯也左氏曰非王命也榖梁謂來者來朝其弗謂朝弗與朝非也愚謂實非朝之禮也私交也夫人臣無私交况以王人而外交於諸侯乎况無王命而私越境乎胡氏曰人臣義無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有貳心者之明戒愚謂祭伯不能以禮自守天子不能以禮禁之世道可知矣聖人特表而書之則祭伯之罪不容逃矣公子益師卒正傳曰書公子益師卒志貴戚之大故也聖人竊取之義如是而已耳其不日者左氏以為公不與小斂公羊以為逺榖梁以為惡皆非也胡氏曰公羊以為逺然公子彄逺矣而書日則非逺也榖梁以為惡然公子牙季孫意如惡矣而書曰則非惡也左氏以為公不與小斂然公孫敖卒於外而公在内叔孫舎卒于内而公在外不與小斂明矣而書日左氏之説亦非也是也然又謂其見恩􅁆之有厚薄愚謂恩􅁆之厚薄有儀品隆殺焉豈在於日不日之間程子乃又謂不書官以公子故使為卿也胡氏因之皆非經之本指矣程子曰或日或不日因舊史也古之史記事簡略日月或不備春秋因舊史有可損而不能益也由是觀之則春秋皆魯史之文而孟子謂其文則史為􅃀乎不可易矣然而程子於他傳猶有不皆然者何也夫既曰不能益則又安能損惟無損無益其竊取之義繫於書不書耳平王五十年二年齊僖十年普鄂三年衛桓十四年蔡宣二十九年鄭莊二十三年曹桓三十六年陳桓二十四年把武三十年宋穆八年秦文四十五年楚武二十年春公㑹戎于􅅗正傳曰書公㑹戎于􅅗著𨼆公之非也左氏謂修惠公之好也戎請盟公辭夫辭盟可矣而獨可與之㑹乎榖梁以為危公非也胡氏曰戎狄舉號外之也愚謂非外之也戎者戎狄之本號也不此之書而何書乎聖人因魯史舊文而書之著𨼆公之非義在於嚴内外華夷之辨也程子曰春秋華夷之辨尤謹居其地而親中國與盟㑹者則與之公之㑹戎非義也愚謂因列國之㑹盟而夷狄來與者則與之所謂夷狄而中國則中國之春秋之義也無故而與之㑹非㑹盟之正破内外之防其為得罪於王法明矣夏五月莒人入向正傳曰書莒人入向著莒人之罪也程子曰入者入其國也侵人之境且為暴况入人之國乎春秋無義戰征伐出於天子無故而加兵於人春秋之所罪者也左氏曰莒子娶于向向姜不安莒而歸莒人入向以姜氏還審如是是因小忿無故而加兵於所親其無上滅親之罪莫大焉案與斷皆在是矣春秋標而著之而是非則存乎傳矣胡氏謂傳為案經為斷盖未之思耳無駭帥師入極正傳曰無駭者左氏謂司空無駭入極費庈父勝之公羊謂展無駭也何以不氏貶􅂚為貶疾始滅也愚謂聖人作春秋竊取其義耳無擅褒亦無擅貶而謂一字之褒貶皆聖人為之是孔子之文而非史之文矣其不氏者程子胡子皆謂未賜族或史之文記有詳略耳餘義見前秋八月庚辰公及戎盟于唐正傳曰左氏曰戎請盟秋盟于唐復修戎好也程子曰戎猾夏而與之盟非義也愚謂春書公㑹戎于􅅗秋又書公及戎盟于唐重書之甚公之罪也夫與之㑹且不可况盟乎胡氏曰費誓稱淮夷徐戎此盖徐州之戎久居中國在魯之東郊者也春秋謹嚴莫大於中外之辨矣中國而僭亂則甚惡之蠻夷猾夏則膺之此春秋之指也而與戎歃血以約盟非義矣是故成於日者必以事繫日而前此盟于蔑則不日盟于宿則不日後此盟于宻則不日盟于石門則不日獨盟于唐而書日者謹之也愚謂或日或不日史之文記有詳略聖人因而書之取罪盟之義耳故直書之而義自見固不繫乎日不日也九月紀履緰來逆女冬十月伯姬歸于紀正傳曰何以書謹婚禮也盖夫婦人倫之始也故謹之耳公羊曰紀履緰者何紀大夫左氏曰卿為君逆也公榖胡氏皆以為譏不親逆非也程子謂先儒皆謂諸侯當親迎親迎者迎於其所館故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯大夫而下皆然詩稱文王親迎于渭未常出疆也又曰逆夫人是國之重事使卿逆亦無妨由是觀之則春秋書此非為譏不親迎矣至入疆於所館而行親迎焉未可知也又烏得而譏之紀子伯莒子盟于宻正傳曰書盟于宻非其盟也春秋無善戰亦無善盟者自盟誓興而忠信之道亡矣故聖人傷之此紀莒事也而書于魯史者告報于魯也有告報則書之凡不書者無告報耳如元年八月紀人伐夷左氏曰夷不告故不書皆此𩔖也以不書為貶罪者謬也胡氏曰凡闕文有本據舊史因之而不能益者其説是矣然而於他處乃泥其一字而求褒貶之義者何耶可以自反而推其𩔖以及其餘而不至拘拘焉失聖人取義之心矣伯字之上程子以為此闕文也當云紀侯某伯莒子盟于宻愚謂得之矣十有二月乙卯夫人子氏薨正傳曰書夫人子氏薨謹正終也夫人子氏榖梁程子皆謂𨼆之妻也公羊以為𨼆之母者非也夫人國之小君正終人之大事故書之其不書葬者或史闕其文聖人因史之文不得而益之也或以為従君或以為公在故不書或以為先卒則不書葬以明順皆過求其義而非其實矣鄭人伐衛正傳曰書鄭人伐衛罪專伐也左氏曰討公孫滑之亂也程子曰聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也胡氏曰鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延至是鄭人伐衛討滑之亂也又曰鄭無王命雖有言可執亦王法所禁况於脩怨乎愚謂聖人書之特罪其擅伐耳至於不書戰安知非史之闕文乎凡先儒之説春秋皆泥此義春秋正傳卷一
