body:
  text: 春秋正傳卷十八明湛若水撰文公頃王元年九年晉靈三年齊昭十五年衞成十七年蔡莊二十八年鄭穆十年曹共三十五年卒陳共十四年杞桓十九年宋昭二年秦康三年楚穆八年春毛伯來求金正傳曰毛伯天子之大夫名衞書毛伯來求金譏非禮之求也文王以庶邦惟正之供王者無求求之非禮也左氏曰毛伯衞來求金非禮也不書王命未塟也愚謂不稱王使公羊以為未踰年即位胡氏以為當喪未君諒隂不言則是三年政令皆廢矣冢宰代言古有行之者矣程子曰毛伯風魯以求金故不云王使此言是也夫人姜氏如齊正傳曰姜氏即出姜齊昭公之女也書夫人姜氏如齊紀歸寧之禮也女嫁父母在嵗一歸寧禮也二月叔孫得臣如京師正傳曰叔孫氏得臣名魯大夫也書如京帥紀㑹塟之非禮也天子七月而塟同軌至今公不親奔使臣往焉非禮也辛丑塟襄王正傳曰書塟襄王紀天下之大事也於是乎同軌畢至諸侯有奔䘮之禮焉左氏曰莊叔如周塟襄王春秋書此以見公之不往非禮也晉人殺其大夫先都正傳曰先都晉大夫書晉人殺其大夫先都著擅殺之罪也而晉之亂可見矣夫大夫受命於天子者也先都之殺或晉侯晉人皆不可考然晉之亂無刑政矣罪之大者也左氏曰王正月己酉使賊殺先克乙丑晉人殺先都梁益耳愚謂若如左氏之言則又非特專擅而已非特一先都而已盖且行盜賊之計焉三月夫人姜氏至自齊正傳曰夫人之禮與君同故如齊必書至自齊必書出告反面之義也胡氏曰夫人與君敵體同主宗廟之事出必告行反必告至則書于䇿然適他國者或曰享或曰㑹或曰如衆矣未有至之者則其行非禮以不至見其罪也出姜如齊以寧父母於禮得行矣其至者非特以告廟書耳夫人初歸豈其不告為文公越禮故削而不書示誅意之法矣今此書至者又以見小君之重也夫承祭祀以為宗廟主一國之母儀而可以搖動乎出姜至是盖不安於魯故至而特書以示防微杜漸之意其為世慮深矣愚謂以不至見其罪不書為示誅意之法則夫至之書之者其罪反不可見不可誅之耶若此之類皆鑿矣晉人殺其大夫士縠及箕鄭父正傳曰晉人者衆人也胡氏曰國亂無政衆人擅殺之也書之著擅殺之罪也左氏曰三月甲戌晉人殺箕鄭父士縠蒯得是以胡氏又為之論曰夫三大夫者皆強家也求專晉不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷為不去其官當是時晉靈初立主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末減乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及示後世司賞罰者必本忠恕無有黨偏之意其義精矣愚謂只直書之不必稱國討不必去其官而專殺之罪自見矣楚人伐鄭公子遂㑹晉人宋人衞人許人救鄭正傳曰書楚人伐鄭罪其伐也書公子遂㑹晉人宋人衛人許人救鄭善其救也紀蠻荆之肆暴而諸侯攘夷之兵也左氏曰范山言於楚子曰晉君少不在諸侯北方可圖也楚子師於狼淵以伐鄭囚公子堅公子龍及樂耳鄭及楚平公子遂㑹晉趙盾宋華耦衞孔達許大夫救鄭不及楚師卿不書緩也以懲不恪愚謂觀此則楚有猾夏貪暴之罪而諸侯雖有攘夷之名而緩兵逸賊之罪不能辭矣夏狄侵齊正傳曰書狄侵齊紀外裔之犯中國也秋八月曹伯襄卒正傳曰襄曹伯名書曹伯襄卒紀鄰國之大故也為有弔葬之禮焉九月癸酉地震正傳曰地道主靜而震動焉書之以示戒也公羊曰地震者何動地也何以書記異也冬楚子使椒來聘正傳曰椒者越椒楚大夫也書楚子使椒來聘與夷狄慕華之善也朝聘中國諸侯相交之禮楚子始使來聘則必有慕義向華之心也故善之所謂夷狄而中國則中國之是也秦人來歸僖公成風之禭正傳曰成風者莊公之妾僖公之母也故云僖公成風秦人來歸其禭則以夫人之禮禮之矣故書秦人來歸僖公成風之禭譏非禮也過時而來亦非禮也程子云過時始至故云來歸又云盖嫡妾之亂自兹而始是也胡氏曰秦人歸禭而曰僖公成風者非兼禭也亦猶平王來賵仲子而謂之惠公仲子爾仲子惠公之妾也然則風氏亦莊公之妾曷不書曰來歸莊公成風之禭乎曰寵愛仲子以妾為妻者惠公也故書惠公仲子所以正後世之為人夫者當明夫道不可亂嫡妾之分以卑其身尊崇風氏立為夫人者僖公也故書僖公成風所以正後世之為人子者當明子道不可行僣亂之禮以賤其父聖人垂誡之義明矣愚謂此又經外之意也聖人直書止明禭之非禮非時耳葬曹共公正傳曰書葬曹共公紀㑹葬隣國之義也禮諸侯五月而葬同盟畢至禮也頃王二年十年晉靈四年齊昭十六年衞成十八年蔡莊二十九年鄭穆十一年曹文公壽元年陳共十五年杞桓二十年宋昭三年秦康四年楚穆九年春王三月辛卯臧孫辰卒正傳曰臧孫氏辰名魯之名大夫臧文仲也書臧孫辰卒紀國卿之大故也而其平生之善惡可考而知矣文仲自莊公末巳與聞國政四十餘年而魯政益衰知柳下惠之賢而不與立夫子以為竊位其為人可知矣夏秦伐晉正傳曰書秦伐晉譏貪憤之兵也左氏曰春晉人伐秦取少梁夏秦伯伐晉取北徵其彼此報復貪憤之罪可並見矣楚殺其大夫宜申正傳曰書楚殺其大夫宜申著楚穆擅殺之罪也左氏曰初楚范巫矞似謂成王與子玉子西曰三君皆將强死城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使為商公沿漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸愚謂據此則宜申楚大夫方楚世子商臣弑其君父以自立宜申懷報讐之心者久矣及今乃始與仲歸謀復十年之讐自以為成王之忠臣不知乃商臣之弑賊也夫既臣之而後謀逞其志與或人之與豫讓謀者相同雖陷於弑逆之罪然其志猶可憫也故春秋特書楚殺其大夫宜申罪楚穆之專殺而不罪宜申其意可見矣自正月不雨至于秋七月正傳曰書自正月不雨至于秋七月紀大災也周正月子月也七月午月也正田苗憂旱之時也及蘇子盟于女栗正傳曰蘇子周之卿士及者魯公及之也書及蘇子盟于女栗譏其盟之非禮也盟者諸侯之事相誓以為信者也諸侯不以忠信事天王至王人來盟乃盟之非禮矣左氏曰頃王立故也愚謂頃王立欲親諸侯故使蘇子來盟夫天王崩頃王立魯與諸侯皆不聞有往者而獨與王人盟是上失天子之尊下無人臣之禮矣故春秋書此兩見其非冬狄侵宋正傳曰書狄侵宋紀蠻夷之陵霸國也楚子蔡侯次于厥貉正傳曰書楚子蔡侯次于厥貉則蔡從夷楚陵夏之罪並見矣左氏曰陳侯鄭伯㑹楚子於息冬遂及蔡侯次於厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聴命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以狥或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎厥貉之㑹麇子逃歸愚謂此實傳也觀此則厥貉之次將以伐宋也夫宋商王之後覇國之裔也上書狄侵宋是中國衰弱已甚諸侯當救之而不救則亦已矣而蔡與陳鄭又從楚而謀伐焉引蠻夷之兵以滅先代之後有人心者肯為之乎故春秋書於冊以深罪之頃王三年十有一年晉靈五年齊昭十七年衞成十九年蔡莊三十年鄭穆十二年曹文二年陳共十六年杞桓二十一年宋昭四年秦康五年楚穆十年春楚子伐麇正傳曰麇小國近楚書楚子伐麇則蠻夷陵暴之罪見矣左傳言麇子逃歸故楚伐之為其逃也左氏又曰楚子伐麇成大心敗麇師於防渚潘崇復伐麇至於錫宂愚謂厥貉之㑹諸侯從蠻夷以陵霸國本非義也麇子逃歸不得為非而楚窮伐之其得罪於王法大矣春秋書此其亦禦外侮尊中國之義歟夏叔仲彭生㑹晉郤缺于承匡正傳曰承匡宋地名書叔仲彭生㑹晉郤缺於承匡則其㑹之善與臣之專而春秋喜懼之情見矣左氏曰叔仲惠伯㑹晉郤缺於承匡謀諸侯之從於楚者愚謂諸侯從楚以中國而為蠻夷矣惠伯郤缺㑹以謀之盖必有攘抑之術也其㑹善矣然而魯公不與晉侯㑹而使卿大夫自為㑹是以謀國大事委之於臣下也其事勢亦可知矣此春秋之所以懼也秋曹伯來朝正傳曰曹伯曹文公也書曹伯來朝著小國事大之禮也左氏曰曹文公來朝即位而來見也愚謂諸侯即位相朝聘禮也孟子曰唯智者為能以小事大曹伯有焉故春秋善之公子遂如宋正傳曰公子遂襄仲也書公子遂如宋紀聘問鄰國之禮也左氏曰襄仲聘於宋且言司城蕩意諸而復之因賀楚師之不害也於鄰國相恤之禮得矣狄侵齊正傳曰書狄侵齊紀蠻夷之陵霸國也夫齊有霸國之餘烈而狄侵之則狄人强盛而齊國浸弱可知矣冬十月甲午叔孫得臣敗狄於鹹正傳曰狄者三傳皆以為長狄也書叔孫得臣敗狄於鹹紀攘夷之兵也左氏曰鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔緜房甥為右富父終甥駟乘冬十月甲午敗狄於鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯愚謂觀此傳則得臣此舉有攘夷尊夏之功矣故春秋與之然不以聴命於天子歸於司冦則亦彼善於此而未盡善也頃王四年十有二年晉靈六年齊昭十八年衞成二十年蔡莊三十一年鄭穆十三年曹文三年陳共十七年杞桓二十二年宋昭五年秦康六年楚穆十一年春王正月郕伯來奔正傳曰書郕伯來奔則失國之罪見矣左氏曰郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔愚謂史盖因失稱而稱之也夫鍾郕邽皆郕邑也夫郕伯卒太子可以繼世為郕伯而不能自立以其邑奔人之國是自棄其爵而不能守其國矣故春秋書以譏之杞伯來朝正傳曰書杞伯來朝紀非禮也左氏曰杞桓公來朝始朝公也且請絶叔姬而無絶昏公許之據此則杞伯之來葢為絶叔姬而求再昏也於禮無據矣古者朝聘以時非其時非禮矣夫朝則朝昏則昏以朝為名而實求再昏得為禮之正乎二月庚子子叔姬卒正傳曰按左氏二月叔姬卒不言杞絶也書叔姬言非女也何以書叔姬見出於夫家卒於魯而無所歸則魯喪葬之是以書焉夏楚人圍巢正傳曰巢楚間小國書楚人圍巢紀楚之憑陵虐及小國也左氏曰楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢愚謂觀此傳則楚無道之甚誠蠻夷也詩云戎狄是膺荆舒是懲惡之至矣宜矣秋滕子來朝正傳曰書滕子來朝紀朝聘之禮也左氏曰秋滕昭公來朝亦始朝公也愚謂滕子來朝則善矣文公即位十二年受曹杞滕君之朝已而不思已曾不一往朝覲於天王何耶强恕而行何善不可為盖至是天下諸侯不復知有天王人心死而天理滅矣秦伯使術來聘正傳曰術者西乞術秦大夫也書秦伯使術來聘譏之也何以譏之以其聘之不專也左氏曰秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡者敢辭玉對曰不腆敝器不足辭也主人三辭賓荅曰寡君願徼福於周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之愚謂觀此傳則秦聘之不專志在言伐晉而不在修好也以貨利相交而不以禮義也故春秋書以非之冬十有二月戊午晉人秦人戰於河曲正傳曰河曲晉地書晉人秦人戰於河曲紀憤暴之兵也左氏曰秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍􅁷駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師於河曲􅁷駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰􅁷駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡􅁷駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰於河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裏糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其属出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見也􅁷駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕愚謂秦人以令狐之役以伐晉取羈馬是貪憤之兵也晉人不薄人於險則曲在秦矣聖人書之使考跡據事而其是非見矣季孫行父帥師城諸及鄆正傳曰諸鄆魯二邑城者築城也書季孫行父帥師城諸及鄆者左氏曰書時也魯與莒争鄆城所以備禦之且冬時役民得時以衞民矣故春秋與之頃王五年十有三年晉靈七年齊昭十九年衞成二十一年蔡莊三十二年鄭穆十四年曹文四年陳共十八年卒杞桓二十三年宋昭六年秦康七年楚穆十二年春王正月正傳曰無事亦書時月義見於前夏五月壬午陳侯朔卒正傳曰朔陳侯名書陳侯朔卒紀與國之大故也見相恤之義焉邾子蘧蒢卒正傳曰蘧蒢邾子名書邾子蘧蒢卒紀與國之大故也有赴則史書之有相恤塟賻之禮焉左氏曰邾文公卜遷於繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命愚謂觀此傳則邾文公賢君也春秋書之雖不為其賢然而因所書以考其跡而其賢可見矣自正月不雨至於秋七月正傳曰書自正月不雨至於秋七月紀甚災也春秋乃子至午月正農務之時而經三時不雨則五糓不熟而生民無育矣故春秋傷之世室屋壊正傳曰書世室屋壞則文公之不致孝乎宗廟可知矣左氏曰秋七月太室之屋壞書不共也愚謂自正月不雨至於秋七月而世室屋壞則文公不修宗廟所致也程子曰觀春秋中文公事宗廟最為不謹遂有世室屋壞之變天人之際可不畏哉胡氏曰世室魯公之廟也周公稱太廟魯公稱世室羣公稱宫書世室屋壞譏久不修也何以知久乎自正月不雨則無壊道也不雨凡七月而先君之廟壊不恭甚矣凡此皆志文公怠慢不謹事宗廟以致魯國衰削之由垂戒切矣冬公如晉衞侯㑹公於沓正傳曰沓地名書公如晉衞侯㑹公於沓著睦隣解難之義也吳氏曰公往朝晉衞侯要之於路而與公㑹於沓故因公以請平於晉夫朝晉睦隣之義也而與衞侯㑹以平晉則解難之義矣故春秋書以與之狄侵衞正傳曰書狄侵衞紀中國之弱也十有二月己丑公及晉侯盟公還自晉鄭伯㑹公於棐正傳曰書公及晉侯盟公還自晉鄭伯㑹公於棐始終乎睦鄰恤難之義也左氏曰冬公如晉朝且尋盟衞侯㑹公於沓請平於晉公還鄭伯㑹公于棐亦請平于晉公皆成之愚謂此與前一事也始終書之見文公睦鄰恤難之義矣頃王六年崩子班嗣位是為匡王十有四年晉靈八年齊昭二十年卒衞成二十二年蔡莊三十三年鄭穆十五年曹文五年陳靈公平國元年杞桓二十四年宋昭七年秦康八年楚莊王旅元年春王正月公至自晉正傳曰書公至自晉紀告廟之禮也凡為人子出必告反必面禮也邾人伐我南鄙叔彭生帥師伐邾正傳曰書伐邾應敵之兵也義也左氏曰邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾愚謂魯叔彭生帥師伐邾盖以邾伐魯南鄙所謂不得已而應之此舉不可謂無名矣夏五月乙亥齊侯潘卒正傳曰潘齊侯名名之亦無他義書齊侯潘卒以其來赴而書之也左氏曰子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟於新城正傳曰新城宋地書㑹盟于新城善其外楚之義也左氏曰從於楚者服且謀邾也糓梁曰同者有同也同外楚也程子曰諸侯始㑹議合而後盟盟者志同故書同同懼楚也胡氏曰同盟於新城同外楚也其曰同者志諸侯同欲非强之也愚謂同外楚者外其蠻夷猾夏也外其僣王而陵蔑周室犯尊號而滅君臣之義也故春秋善之秋七月有星孛入于北斗正傳曰孛與彗同光直上如帚者為彗光芒四散者為孛書有星孛入于北斗紀變異也天象人事一氣相符者故聖人記之示謹天戒也左氏曰周内史叔服曰不出七年宋齊晉之君皆將死亂糓梁曰孛之為言猶茀也胡氏曰孛者惡氣所生闇亂不明之貌也入于北斗者斗有環域天之三辰綱紀星也宋先代之後齊晉天子方伯中國紀綱彗者所以除舊布新也禎祥妖孽隨其所感先事而著後三年宋弑昭公又二年齊弑懿公又二年晉弑靈公此三君者皆違道失德而死於亂符叔服之言天之示人顯矣史之有占明矣愚謂雖無三君之應聖人書之猶示當時君臣以謹天戒也公至自㑹正傳曰書公至自㑹謹國君出入告反之義也晉人納捷菑于邾弗克納正傳曰書晉人納捷菑于邾弗克納紀悔過之義也左氏曰晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還胡氏曰邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰非吾力不能納也義實不爾克也引師而去之故君子善之而書曰弗克納也在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以改過為大過而不改將文過以遂非則有怙終之刑過而能悔不貳過以逺罪則有遷善之矣其曰弗克納見私欲不行可以為難矣愚謂改過則善矣然不知卑且庶之不可奪長而捷菑之不宜納而納動師逺役至其國徴於色𤼵於聲而後止則非所謂不逺復矣九月甲申公孫敖卒于齊正傳曰書公孫敖卒于齊不正其卒也外之也左氏曰穆伯之從已氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聴命復而不出三年而盡室以復適莒文伯疾而請曰糓之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請塟弗許愚謂為魯臣死於魯者塟於魯不為魯臣死於齊者不當塟於魯故書卒于齊外之也而其從已氏以客死於他邦不正終於牖下矣齊公子商人弑其君舍正傳曰書齊公子商人弑其君舍誅弑逆之罪也不必如胡氏以為稱公子者誅止其身也齊人立舍即為君矣書弑君實事也不必如公糓胡氏以為未踰年稱君成其為君以重商人之弑也左氏曰魯叔姬配齊昭公生舍叔姬無寵舍無威商人心知其孤危寡恃可以取而代也又曰齊人定懿公使來告難故書以九月宋子哀來奔正傳曰子哀髙子字書宋子哀來奔義其來也左氏曰宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也杜氏曰貴其不食汚君之禄避禍速也胡氏曰宋昭公無道髙哀為蕭封人以為卿不義宋公而出遂來奔書曰子哀貴之也易曰幾者動之㣲吉之先見者也君子見幾而作不俟終日宋子哀有焉昔㣲子去紂列為三仁之首子哀不立於危亂之邦而春秋書字謂能貴愛其身以存道也若偷生避禍而去國出奔亦何取之有愚謂按左氏杜氏則所謂書來奔而貴之者貴其能辭祿避亂而來也胡氏又以稱字為貴之則與二氏之説異而又拘於義例之説矣冬單伯如齊齊人執單伯正傳曰書單伯如齊齊人執單伯著齊人之不義也胡氏曰齊君舍魯之甥也商人弑舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執單伯并子叔姬而誣之以罪不稱行人公羊所謂以己執之也愚謂不稱行人史有詳畧耳只書齊人執而罪己見矣何必泥公羊以己執之之説耶齊人執子叔姬正傳曰齊人者商人之黨與盡齊之人也書齊人執子叔姬著逆黨之罪也左氏曰襄仲使告於王請以王寵求昭姬於齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬愚謂齊人既弑其君又執君母罪之極大者也故既書執單伯又書執子叔姬甚其罪也髙氏曰兩書齊人執者以明單伯子叔姬之無是事愚謂此一事也别兩書之詞煩而意益懇至所以甚齊人黨惡之罪也程子曰商人弑君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北面事之又敢執其君母齊之人均有罪焉故曰齊人胡氏曰子叔姬者齊君舍之母也弑其君執其母皆商人所為而以為齊人執之何也商人弑君之罪已顯而齊人黨賊之惡未彰商人驟施於國而多聚士是以財誘齊國之人而濟其惡也齊人懷商人之私惠忘君父之大倫弑其君而不能討執其母而莫之救則是舉國之人皆有不赦之罪也假有人焉正色而立於朝誰敢致難其君與執其母而不之顧乎故聖人書曰齊人執子叔姬所以窮逆賊之黨與而治之也其討罪之㫖嚴矣故曰春秋成而亂臣賊子懼匡王元年十有五年晉靈九年齊懿公啇人元年衞成二十三年蔡莊三十四年卒鄭穆十六年曹文六年陳靈二年杞桓二十五年宋昭八年秦康九年楚莊二年春季孫行父如晉正傳曰書季孫行父如晉譏其如之非也左氏曰春季文子如晉為單伯與子叔姬故也愚謂夫以齊人既弑其君又執君母與天子之命大夫其弑逆之罪暴横之惡極矣行父以國上卿不能請討于天王約與國以正其罪惡反因晉以求釋焉所謂厥罪惟均矣三月宋司馬華孫來盟正傳曰書宋司馬華孫來盟著其盟之非也諸侯相㑹以盟好禮雖非古亦近世之義也今司馬華孫特自來盟又以臣盟君則非禮義之正矣故春秋書之著其非也左氏曰宋華耦來盟其官皆從之書曰宋司馬華孫貴之也公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅魯人以為敏愚謂此其言雖侫而其來盟之義不足取也曾是以為貴乎曾是以為敏乎胡氏曰司馬主兵之官稱華孫者自督弑殤公諸侯受賂失賊不討使秉宋政及其後世繼掌兵權春秋之所禁者故傳載其承命亞旅之詞而經書曰宋司馬華孫來盟其曰華孫猶季孫叔孫仲孫臧孫之類不書名者義不繫於名也不稱使以是專行為無君矣孟子曰所謂故國非謂其有喬木有世臣之謂也春秋此義其欲後世有賢者之類功臣之胄為世臣然後委之以政乎愚謂此非經之本義也經書此不過著盟之非正耳至於左氏以為貴之誤矣夏曹伯來朝正傳曰書曹伯來朝交著其非也左氏曰禮也諸侯五年再相朝以修王命古之制也愚謂左氏知其為禮而不知非禮之禮矣夫曹伯忘君臣之義不朝天子而朝魯魯亦不朝天子而受曹之朝故春秋書此兩見其非焉耳矣齊人歸公孫敖之喪正傳曰書齊人歸公孫敖之喪善之也善齊人之不奪人喪也左氏曰齊人或為孟氏謀曰魯爾親也飭棺寘諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也胡氏曰公孫敖慶父之後行又醜矣出奔他國其卒與喪歸皆書于䇿者許翰以謂文伯惠叔二子之哀誠無已也故魯人從其請國史記其事仲尼因而不革者以敖著教也易曰有子考無咎周公命蔡仲曰爾尚盖前人之愆六月辛丑朔日有食之鼓用牲于社正傳曰書日有食之鼓用牲于社誌儆戒也非禮而無應天之誠皆可見矣左氏曰非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也愚謂左氏以伐鼓用幣之儀示等威之道為禮盖亦禮之末耳日有食之陽道不競君道不振之象也先王克謹天戒臣人克有常憲百官修輔此應天之實而禮之大者也單伯至自齊正傳曰書單伯至自齊著齊之罪也左氏曰齊人許單伯請而赦之使來致命書曰單伯至自齊貴之也愚謂單伯之見執於齊非單伯之罪也齊之罪也故書至自齊則齊人之罪大矣晉郤缺帥師伐蔡戊申入蔡正傳曰書晉郤缺帥帥伐蔡戊申入蔡著問罪之師也左氏曰新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之獲大城焉曰入之愚謂雖伐蔡入其國止於問罪而無所取亦春秋之彼善於此者也左氏既以入蔡盟城下而還而又云獲大城曰入則其言自相矛盾而不足信矣秋齊人伐我西鄙正傳曰書齊人伐我西鄙志警也而齊人擅興無名之罪自見矣季孫行父如晉正傳曰書季孫行父如晉謹國卿之出也卿大夫非公事不得出境出境則書之左氏曰齊人侵我西鄙故季文子告于晉愚謂晉霸主也故行父以齊人見侵之事告晉是為公事而行非私出者矣然行父惟知有霸主而不知有天子之尊以告于晉而不知以告于天王請討之是蔑君臣上下之義矣孟子曰國必自伐而後人伐之豈不信哉冬十有一月諸侯盟于扈正傳曰書諸侯盟于扈非其盟也而諸侯盟之不固而晉侯負盟之罪可考見矣左氏曰冬十一月晉侯宋公衞侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹書曰諸侯盟于扈無能為故也凡諸侯㑹公不與不書諱君惡也與而不書後也程子曰此盟為齊亂也魯以備齊不在㑹故不序又稱諸侯者衆辭見衆國無能為也愚謂二子之言是矣而左氏又以凡公不與㑹不書為諱與而不書為後胡氏又云不分爵號為諸侯等於夷狄而畧之以其受賂而不能討齊之罪又曰不言晉㑹而言諸侯以為分惡於諸侯則詞皆愈支離而義愈晦矣十有二月齊人來歸子叔姬正傳曰書齊人來歸子叔姬所以罪齊也其執其歸皆在齊也程子曰執之書故來歸不得不書胡氏曰不言齊子叔姬來歸而曰齊人來歸子叔姬者見子叔姬無罪齊人自絶而歸之爾春秋深罪齊人以商人為君而不知其惡故其執其歸與弑其君商人皆稱齊人深責之也愚謂但書齊人即商人在其中矣不必待稱商人為齊人而後見責之也餘倣此齊侯侵我西鄙遂伐曹入其郛正傳曰書齊侯侵我西鄙遂伐曹入其郛著齊横暴之罪也夫齊商人冒弑君之罪而不自反乃侵魯又伐曹又入其郛其暴横極矣左氏曰齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣匡王二年十有六年晉靈十年齊懿二年衞成二十四年蔡文公申元年鄭穆十七年曹文七年陳靈三年杞桓二十六年宋昭九年弑秦康十年楚莊三年春季孫行父㑹齊侯于陽榖齊侯弗及盟正傳曰此何以書著㑹盟之非禮而取辱也左氏曰春王正月及齊平公有疾使季文子㑹齊侯于陽穀請盟齊侯不肯曰請俟君間程子曰魯齊既先約盟而公稱疾不往及使季孫行父㑹故齊侯不及盟愚謂諸侯㑹盟為兩君修好睦鄰之道公既約與齊盟乃不親往而使大夫以往㑹請盟焉使臣與君盟非禮矣宜其見郤於齊而反生釁隙也記曰夫人必自侮而後人侮之文公之謂矣故春秋書之以見其非夏五月公四不視朔正傳曰不視朔者不告朔也書公四不視朔則其怠神慢民之罪甚矣穀梁曰天子班朔于諸侯諸侯受乎禰廟禮也公四不視朔公不臣也以公為厭政已甚矣胡氏曰天子班朔于諸侯諸侯每月奉以告廟出視朝政文公四不視朔公羊子以為有疾也不言疾自是公無疾不視朔也此見聖人所書之意若後復視朔者必於此書公有疾與昭公如晉之事比矣文公厭政備見於經閠不告朔不視無雨不閔㑹同不與廟壞不修作主不時事神治民之怠也則其心放而不知求久矣六月戊辰公子遂及齊侯盟于郪丘正傳曰郪丘齊地書公子遂及齊侯盟于郪丘兩譏其失禮也左氏曰公使襄仲納賂于齊侯故盟于郪丘穀梁曰復行父之盟也愚按此二傳則魯以齊却行父之盟而納賂以釋之齊以魯之納賂而復與其臣盟二者胥失之矣故春秋書以並著其非秋八月辛未夫人姜氏薨正傳曰姜氏聲姜僖公夫人文公母也書夫人姜氏薨紀君母之大故也毁泉臺正傳曰泉臺者公羊以為郎臺也莊公所築臺于郎者書毁泉臺於夫人姜氏薨之後同時並日紀遭母之大變而毁先君之所築為非禮也左氏曰有蛇自泉宫出入于國如先君之數魯自伯禽至僖十七君蛇數亦如之秋八月辛未聲姜薨毁泉臺愚按此傳事雖怪誕然而或有之遂因姜氏之薨以為不祥而速毁之也穀梁曰喪不貳事貳事緩喪也愚謂於母喪為非常之大變他不遑恤而乃同日急於毁臺哀誠薄矣先祖所築之臺一旦惑於怪而毁之其孝心亡矣春秋一書而衆惡並見焉文公之為君可知矣胡氏曰先祖為之非矣然臺之存毁非安危治亂之所繫也雖勿居可也而必毁之是暴揚其失有輕先祖之心此履霜之漸弑父與君之萌春秋之所謹也故書楚人秦人巴人滅庸正傳曰書滅庸紀報怨之兵也左氏曰楚大饑戎伐其西南至于阜山師於大林又伐其東南至于陽丘以侵訾枝庸人帥羣蠻以叛楚麇人帥百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往不如伐庸七遇皆北唯禆鯈魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸愚謂楚滅人之祀固為有罪亦庸有自取焉耳胡氏曰楚大饑戎與麇濮交伐之而庸人幸其弱帥羣蠻以叛楚此取滅之道也楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往不如伐庸亦見其謀國之善矣故列書三國而楚不稱師滅楚之罪詞也愚謂楚不稱師而稱人與秦巴等耳以為滅楚罪者非也冬十有一月宋人弑其君杵臼正傳曰宋人者國之衆也杵臼宋昭公名書宋人弑其君杵臼罪弑逆也左氏曰宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而豔襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司冦初司城蕩卒公子壽辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右而使行夫人使謂司城去公對曰臣之而迯其難若後君何冬十一月甲寅宋昭公將田孟諸未至夫人王姬使師甸攻而殺之蕩意諸死之書曰宋人弑其君杵臼君無道也愚謂君雖無道國之臣子不可以弑君國人皆夫人甸之惡黨也故書宋人則其首從皆得以誅之矣胡氏曰此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弑也君無道而弑之可乎諸侯殺其大夫雖當於罪若不歸司冦猶有專殺之嫌以為不臣矣況於北面歸戴奉之以為君也故曰人臣無將將而必誅昭公無道聖人以弑君之罪歸宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆於民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死於其職而明於去就從違之義斯可矣蕩意諸亦死職春秋削之不得班於孔父仇牧荀息何也三子閑其君而見殺春秋之所取也意諸知國人將弑其君而不能止知昭公之將見殺而不能正坐視其及而死之所謂匹夫匹婦自經於溝瀆而莫之知也奚得與死於其職者比乎聖人所以獨取髙哀之去而書字以褒之也愚謂此論多是然他亦書字而非賢之者而髙哀之賢則不待書字以為褒矣匡王三年十有七年晉靈十一年齊懿三年衞成二十五年蔡文二年鄭穆十八年曹文八年陳靈四年杞桓二十七年宋文公鮑元年秦康十一年楚莊四年春晉人衞人陳人鄭人伐宋正傳曰書晉人衞人陳人鄭人伐宋使人考其跡而功罪見矣何也諸國之大夫討賊不果而反成其亂也愚按左氏晉荀林父衞孔逹陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還是討之不果而反成其亂矣陳恒弑簡公孔子沐浴而朝請討孔子時已致仕且然而况四子為國之卿奉討賊之命而不果又立文公以成之乎夫不果罪矣而成之罪莫大焉夏四月癸亥塟我小君聲姜正傳曰聲姜文公之母也書塟我小君聲姜紀大事也而其塟之非時自見矣諸侯五月而塟聲姜薨至是九月矣是緩塟而非禮也左氏以為有齊難是以緩亦非也齊侯伐我西鄙六月癸未公及齊侯盟于穀正傳曰齊來伐以公不親盟故來討之也書齊侯伐我西鄙公及齊侯盟于穀著其盟之非禮也夫諸侯㑹同盟誓於平時猶之可也今魯公適有母喪兩不親往齊縱有詞來討何不以母喪為詞而乃與盟于穀葢非義非禮矣諸侯㑹于扈正傳曰書諸侯㑹于扈紀其㑹之非也而諸侯欲平宋而無功具可考見矣左氏曰晉侯蒐于黃父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也胡氏曰諸侯無討賊之功則畧而不序愚謂宋國之人皆弑君之賊晉為盟主宜以上告天子下連諸侯聲大義以討其罪以為天下後世戒可也乃徒㑹而不伐反罪鄭伯之不至其罪之相去能幾何哉秋公至自穀正傳曰書公至自穀紀以出㑹而反面也餘見前冬公子遂如齊正傳曰書公子遂如齊紀其聘之非也夫禮諸侯使大夫聘於隣國必有其時今魯於齊秋則君往冬又臣往非禮矣左氏曰襄仲如齊拜穀之盟愚謂聘有常禮襄仲拜穀之盟已非聘禮之正卑屈甚矣此魯所以不競乎匡王四年十有八年晉靈十二年齊懿四年弑衞成二十六年蔡文三年鄭穆十九年曹文九年陳靈五年杞桓二十八年宋文二年秦康十二年卒楚莊五年春王二月丁丑公薨于臺下正傳曰書公薨于臺下非正終也穀梁曰臺下非正也愚謂君薨于路寢正終也于臺下則以非命而終矣非命而終則不能順受其正可知矣左氏曰春齊侯戒帥期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨觀此傳事雖不經然必有因隕而暴斃矣秦伯罃卒正傳曰罃秦伯名書秦伯罃卒紀霸主之大故也以其有弔賻㑹塟之禮也夏五月戊戌齊人弑其君商人正傳曰云齊人者歜與職也何以書正弑君之賊也若二人於其弑舍未成君之初己未事之為君而討之則所謂弑君之賊人人得而誅之又不書弑矣左氏曰齊懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公游於申池二人浴於池歜以朴抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舍爵而行齊人立公子元愚謂由是觀之則二人此舉報私怨也非仗大義爲君報讎者也且已事之為君矣是以書弑六月癸酉塟我君文公正傳曰書塟我君文公紀國之大事也孟子曰惟送死足以當大事是以史謹書之又以見塟之合禮以時也諸侯五月而塟禮也秋公子遂叔孫得臣如齊正傳曰書公子遂叔孫得臣如齊則二子之邪謀可考見矣夫先君之喪甫塟二子何為而如齊乎為舍子赤之嫡而謀立宣公之庶長故請於齊也左氏曰秋襄仲莊叔如齊惠公立故且拜塟也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之愚謂觀此傳則襄仲葢假齊惠新立與拜塟之故其實為請宣公而往也其邪謀不可掩矣胡氏曰子赤夫人之子今卒于弑不著其實是為國諱惡無以傳信於將來而春秋之大義隠矣故上書大夫並使下書夫人歸于齊中曰子卒則見過亂邪謀𤼵於奉使之日而公子遂弑立其君之罪著矣冬十月子卒正傳曰子即子赤名惡夫人姜氏之子云子者或曰諸侯在喪之稱或曰遺子下赤字未詳孰是書子卒即子赤也而其卒之故可考而賊人斯得矣左氏曰冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聴弗聴乃入殺而埋之馬矢之中公冉務人奉其孥以奔蔡既而復叔仲氏愚謂諸傳皆以為諱之隠之非也弑君之賊宜明書之何以諱乎葢襄仲使盜弑之故史不如其日與地疑之也不然則國人皆其邪黨而史亦不得以正書弑焉共隠諱之葢襄仲執國命之久而人皆懾從之矣夫人姜氏歸于齊正傳曰夫人姜氏子赤之母也子赤見弑故歸于齊春秋書之重弑君之罪也左氏曰大歸也將行哭而過市曰天乎仲為不道殺適立庻市人皆哭魯人謂之哀姜愚謂此實傳也此天地之大變也有人心者聞之得無惻然乎胡氏曰書夫人則知其正書姜氏則知其非見絶於先君書歸于齊則知其無罪異於孫于邾者而魯國臣子殺適立庶敬嬴宣公不能事主君存適母其罪不書而並見矣季孫行父如齊正傳曰書季孫行父如齊則姦臣逆黨之謀見矣程氏曰遂得臣行父三人皆與謀以其前後如齊知之也又宣十八年行父云使我殺適立庶者仲也髙氏曰前乎子卒書如齊後乎子卒書如齊齊實聞乎故所以惡齊也惡實齊之甥恐齊人聴夫人之訴來討於是議納賂而請平焉行父之罪不可掩矣不容誅矣莒弑其君庶其正傳曰庶其莒紀公名書莒弑其君庶其誅弑逆之罪也左氏曰莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其玉寳來奔納諸宣公公命與之邑曰今日必授季文子使司冦出諸竟曰今日必達公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也愚謂行父之言善矣但其身與遂得臣同負弑逆之罪而徒以逐莒弑君之人豈非所謂所藏乎身不恕而欲喻諸人者耶春秋正傳卷十八
