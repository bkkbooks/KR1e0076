body:
  text: 春秋正傳卷二明湛若水撰𨼆公平王五十一年崩三年齊僖十一年普鄂四年衛桓十五年蔡宣三十年鄭莊二十四年曹桓三十七年陳桓二十五年杞武三十一年宋穆九年卒秦文四十六年楚武二十一年春王二月己巳日有食之正傳曰日有食之若有物食之耳非真有物也書日有食之公羊以為記異是也榖梁以為言日不言朔食晦日臆説也程子曰日食有定􅁆聖人必書者盖欲人君因此恐懼修省愚謂或曰有常度災而非異也星辰陵歴亦然然而亦有當食不食者其修徳之所弭歟胡氏曰日者衆陽之宗人君之表而有食之災咎象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣凡經所書者或妾婦乗其夫或臣子背君父或政權在臣下或夷狄侵中國皆陽微隂盛之證也愚謂此皆以利害言之聖人言畏天命而迅雷風烈必變則理固所當畏而未暇論其利害矣夫人君之於上天如人子之於父母父母有怒人子自當起敬起孝安暇計利害乎春秋書此所以教人敬天也後倣此三月庚戌天王崩正傳曰左氏謂壬戌平王崩赴以庚戌故書之愚謂由此觀之則春秋之書皆因魯史之文魯史之文皆因列國之赴告而諸儒拘拘謂聖人一字之褒貶為不足以得聖人心地之灑然而無疑此言可百世以俟聖人而不惑矣書崩不書葬諸儒之説皆無考信不足以按伏其罪也或者魯史因不赴故不書魯君因不赴故不奔然而當此之時天下巳無王王朝不以告則失其所以為君魯國不問而奔赴之則失其所以為臣足以見天朝之無人而列國之無君矣夏四月辛卯尹氏卒正傳曰尹氏周太師尹氏所謂赫赫師尹也左氏以為夫人聲子者非也公榖程胡皆以為天子之大夫是也書尹氏者公羊胡氏皆以為貶譏世卿程子以為見其世繼則皆泥矣然則春秋之時世卿者多矣豈得一一而盡譏乎恐累聖人竊取之義也其書卒者史因赴報而書之聖人因史文而存之豈特天子之卿宜然然而尹氏平生之惡使人可考矣公羊以為此何以卒天王崩諸侯之主也榖梁從之皆非也胡氏曰尹氏天子大夫世執朝權為周亂階家父所刺秉國之鈞不平謂何是也秋武氏子來求賻正傳曰愚謂書武氏子來求賻則上下之失道並可見矣武氏子公榖程胡皆以為天子之大夫卿是也不稱官稱武氏公榖以為未命爵程子以為見世官皆非據信也其不言使公榖以為未君無君胡氏以為君薨諒隂百官總己以聽於冡宰愚謂然則冡宰之命即代王之言命之也夫何不可盖皆不得其説而為之詞耳盖或舊史略之聖人因史之文不得而加詳也然而據事直書則夫上下之失不可掩矣榖梁曰歸死者曰賵歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之詞也交譏之是也八月庚辰宋公和卒正傳曰書宋公和卒志與國之大故也左氏謂宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘請子奉之以主社稷對曰羣臣願奉馮也公曰不可使公子馮出居於鄭穆公卒殤公即位愚謂如是則宋公和可謂賢矣然則春秋書卒豈非以其賢乎曰否賢不賢亦各言其義也程子曰吉凶慶弔講信脩睦鄰國之常禮人情所當然諸侯之卒與國之大故來告則書是也胡氏亦曰外諸侯卒國史承告而後書聖人皆存而弗削又曰諸侯曰薨大夫曰卒周室東遷諸侯放恣專享其國而不請命特書曰卒不與其為諸侯也是春秋皆聖人之文而孟子其文則史之言誣矣春秋之作皆因魯史之文而書其義自見故大夫則大夫之諸侯則諸侯之而其賢否自不可掩豈待易其名實而後見乎况以穆公之賢且承先君之舊乃不免乎冬十有二月齊侯鄭伯盟于石門正傳曰齊侯鄭伯盟于石門外國來告者也來告何以書之非其盟也春秋無善盟盟者忠信之衰也左氏曰齊鄭盟于石門尋盧之盟也愚謂盟且不可况尋盟乎盟可尋也亦可寒也程子曰天下無王諸侯不守信義􅁆相盟誓所以長亂也故外諸侯盟來告者則書之胡氏謂有虞氏未施信於民而民信夏后氏未施敬於民而民敬殷人作誓而民始畔周人作㑹而民始疑故凡書盟者惡之也愚故曰盟者忠信之衰也癸未葬宋穆公正傳曰書癸未葬宋穆公者與國睦鄰之義也告則國史書之聖人因而存之重睦隣之義也其或日或不日公榖或以為渴葬或以為慢葬或以為過時而𨼆之或以為不能葬或以為正或以為危不得葬且公羊曰此當時何危爾宣公謂穆公曰以吾愛與夷則不若愛女以為社稷宗廟主則與夷不若女盍終為君矣宣公死穆公立穆公逐其二子莊公馮與左師勃曰爾為吾子生毋相見死毋相哭與夷復曰先君之所為不與臣國而納國乎君者以君可為社稷宗廟主也今君逐君之二子而將致國于與夷此非先君之志也且使子而可逐則先君其逐臣矣穆公曰先君之不爾逐可知矣吾立于此攝也終致國乎與夷莊公馮弑與夷愚謂此以為危不得葬者盖因事而為之詞耳非聖人取義之本指也胡氏曰偹則書日略則書時又曰無其事則闕其文魯史之舊也愚謂若皆以此言春秋烏乎不可以此觀春秋則見聖人之心桓王元年四年齊僖十二年普鄂五年衛桓十六年弑蔡宣三十一年鄭莊二十五年曹桓三十八年陳桓二十六年杞武三十二年宋殤公與夷元年秦文四十七年楚武二十二年春王二月莒入伐杞取牟婁正傳曰牟婁者公羊胡氏皆以為杞之邑書莒人伐杞取牟婁者何罪之也其稱人稱伐稱取皆因舊史之文聖人未嘗一改也春秋無義戰夫戰伐且猶不可而况取之乎故書之榖梁曰言伐言取所惡是也公羊曰外取邑不書此何以書疾始取邑也榖梁曰諸侯相伐取地於是始故謹而書之二説皆非也愚謂或不報則不書耳而云始則謹書之則夫他日取地者遂不之恤乎程子曰諸侯土地有所受之伐其罪而奪取其土惡又甚焉王法所當誅也戊申衛州吁弑其君完正傳曰何以書正弑逆之賊也左氏謂衛州吁弑桓公而立完桓公名其名桓公而不稱桓公與州吁公子而不稱公子皆史舊文非有所與奪也而其罪不可掩矣州吁曰衛者衛之州吁也不謂衛而何謂公羊以為當國榖梁以為嫌者皆非也其不稱公子者胡氏以為削其屬籍特以國氏者罪莊公不待之以公子之道使預聞政事主兵權而當國則求之過深矣程子以為身為大惡自絶於先君豈復得為先君子孫又曰其後或以屬稱或見其以親而寵之太過或見其天屬之親而反為冦讎立義各不同盖不得其説而為之詞耳而不知於聖人作經灑然之心晦矣聖人特因魯史之文而存之則州吁弑君之罪萬世不可逃矣奚必他論乎夏公及宋公遇于清正傳曰清衛邑直書遇則其非禮自見矣公羊曰遇者何不期也程子曰諸侯相見不行朝㑹之禮如道路之相遇故書曰遇非周禮冬見曰遇之遇也胡氏亦曰春秋書遇私為之約自比於不期而遇者直欲簡其禮耳簡略慢易無國君之禮則莫適主矣又曰凡書遇者皆惡其無人君相見之禮也至於榖梁曰及者内為志焉耳左氏曰公與宋公為㑹将尋宿之盟未及期衛來告亂及宋公遇于清此其魯志也夫期㑹尋盟與倉卒而遇皆非禮也然聖人之直書考於此傳而其非禮自見矣宋公陳侯蔡人衛人伐鄭正傳曰書宋公陳侯蔡人衛人伐鄭罪列國之專伐也原情據實則列國之罪不可逭矣何謂情實左氏曰宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡従則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎對曰臣聞以徳和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民於是乎不務令徳而欲以亂成必不免矣程子曰宋摟諸侯以伐鄭固為罪矣而衛弑其君天下所當誅也乃與修好而同伐人其惡甚矣胡氏曰春秋之法誅首惡興是役者首謀在衛宋殤公不恤衛有弑君之難欲定州吁而從其邪説是肆人欲滅天理也故以宋公為首諸國為從示誅亂臣討賊子必先治其黨與之法也愚謂諸説一則以衛一則以宋皆未盡也衛首之而宋成之同惡相濟也宋以公子馮在鄭衛以先君之怨在鄭故魯史之書首宋而終衛聖人因之以見義觀於左傳則其同惡相濟之罪自可見矣或曰或稱爵或稱人有褒貶乎曰非也人衛可矣人蔡何為其不人宋又何為由是觀之則夫諸儒之説春秋以一字為褒貶者其説為謬非聖人之義而不足信矣他倣此秋翬帥師㑹宋公陳侯蔡人衛人伐鄭正傳曰此當為一章而左氏别為二章而於其帥師之末則云諸侯敗鄭徒兵取其禾而還則妄也書翬帥師㑹諸侯之兵伐鄭罪翬之擅興也左氏曰秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也然以為再伐則非也然則不稱公子貶之乎曰亦非也史略之耳然而直書之稱公子與不稱名與不名考傳據事而惡自見矣公羊榖梁程子皆以為不稱公子以翬與弑乎公故貶之弑逆之人辨之宜早愚謂三子之説吾皆未敢信也夫此與𨼆公之見弑于翬相隔七八年也盖今四年一翬也十一年又一翬也翬當時與弑之惡未至聖人安得先事而貶之乎非聖人無意必固我大公至正之心也程子以為再序四國重言其罪胡氏矯之則又以為春秋立義最精詞極簡嚴而不贅然又以為言之重詞之複其中必有大美惡焉四國合黨翬復㑹師同伐無罪之邦欲定弑君之賊惡之極也言之不足而再言聖人之情見矣愚謂聖人之作春秋皆因魯史舊文而不改魯史則必因報而後書况又豈有重書之理程胡二子皆為左氏所誤矣盖伐鄭之事乃一舉也夏之書宋公陳侯蔡人衛人伐鄭者四國始謀而欲動著四國之罪也秋之書翬㑹宋公陳侯蔡人衛人伐鄭者翬己動而行事著翬之罪也不然秋之言㑹上文不言某㑹非翬之㑹而誰㑹乎九月衛人殺州吁于濮正傳曰書衛人殺州吁于濮誅弑君之賊也稱人者史通稱之詞耳公羊以為討賊之詞榖梁以為稱人以殺殺有罪程子以為稱衛人衆詞也舉國殺之也胡氏亦以為然信斯四言也則夏秋之稱衛人者何耶蔡亦稱人者又何耶盖弑君之賊不必人衛而巳知其為一國之共棄天下之所共誅矣只據報直書而義自見矣左氏曰州吁未能和其民石厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚従州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弑寡君敢即圖之陳人執之而請莅于衛九月衛人使右宰醜莅殺州吁于濮石碏使其宰獳羊肩莅殺石厚于陳胡氏又曰于濮者憫衛國之人著諸侯之罪亦非也盖濮者地名也不言濮而奚言夫春秋之不明皆諸儒穿鑿害之也象山陸氏曰諸儒説經之謬春秋視他經尤甚信夫冬十有二月衛人立普正傳曰書衛人立普而衛國擅立之罪自可見矣左氏曰衛人逆公子普于邢冬十二月宣公即位公羊曰普者何公子普也程子曰書衛人立普衛人立之也諸侯自立必受命于天子當時雖不請命于天子猶受命于先君衛人以普公子也可以立故立之春秋所不與也胡氏曰普雖諸侯之子内不承國於先君上不禀命于天子故春秋於衛人特書曰立所以著擅置其君之罪皆是也但又謂於普絶其公子所以明專有其國之非而程子亦以為先君子孫不由天子先君之命不可立也故去其公子與公羊立者不宜立之説則皆鑿矣而左氏又以爲書衛人立普衆也榖梁胡氏皆以為衆詞也然則他國亦有稱人者豈皆衆詞耶盖衛人者他國稱之之詞耳苟得其義則凡此之𩔖皆不足泥也桓王二年五年齊僖十三年普鄂六年奔衛宣公普元年蔡宣三十二年鄭莊二十六年曹桓三十九年陳桓二十七年杞武三十三年宋殤二年秦文四十八年楚武二十三年春公觀魚于棠正傳曰書公觀魚于棠則譏慢逰之義著矣觀左傳則聖人譏慢逰之事見矣左傳曰公将如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也故春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以􅁆軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也公羊曰棠者何濟上之邑也程子曰諸侯非王事民事不逺出逺出觀魚非道也胡氏曰𨼆公慢棄國政逺事逸逰僖伯之忠言不見納亦已矣又從而為之辭是縱欲而不能自克之以禮也能無鍾巫之及乎特書觀魚譏之也愚謂榖梁謂常事曰視非常曰觀鑿乎其為説矣夏四月塟衛桓公正傳曰書夏四月塟衛桓公魯史因報而直書也聖人竊取之義則後時而塟之非禮㑹塟隣國之大事皆可見矣左氏曰衛亂是以緩程子曰魯往㑹故書是也程傳稱桓公見國人私諡胡氏亦以為然又謂春秋於邦君薨正以王法而書卒至於塟則從其私諡而稱公或革或因前以貶不臣順之諸侯後以罪不忠孝之臣子愚謂如是是自相矛盾矣恐非聖人竊取之正意也盖皆當時史之舊文耳不然則既死宜薨而貶之以卒未免有咎往之心及塟私諡稱公宜削而反因其桓公之號何以見聖人至公至明之心哉諸儒謂筆削褒貶一出於聖人之手者豈其然乎秋衛師入郕正傳曰書衛師入郕則衛君擅興之罪窮黷之暴可見矣左氏曰衛之亂也郕人侵衛故衛師入郕是也程子曰衛普乗亂得立不思安國保民之道以尊王為先居䘮為重乃興戎修怨入人之國書其失道胡氏亦曰衛宣繼州吁暴亂之後不施徳政固本䘏民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也皆得之矣其稱師者兵衆之詞公羊以為將卑師衆曰師胡氏則又有矜其盛著其暴惡其無名不義之三言則幾於以文害詞矣九月考仲子之宫初獻六羽正傳曰九月考仲子之宫初獻六羽當為一章左傳本如此盖自公榖分之程胡遂襲其誤耳而程子於考宫傳有曰聖人之意又在下句見其初獻六羽也考者始成而祀也初者始也六羽者六佾也書九月考仲子之宫初獻六羽者何志禮之變而著非禮之失也左氏曰九月考仲子之宫將萬焉公問羽􅁆於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也愚謂公榖皆以譏始僭諸公非也夫禮有天子諸侯大夫士四等如左氏所載而已矣程子曰成王賜魯用天子禮樂祀周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僭也胡氏従之是謂禮之小變然而魯以諸侯而僭天子之禮仲子以妾而僣諸侯夫人之禮是謂非禮之失矣諸侯僭於上妾僭於中大夫僭於下故其末流季氏八佾舞於庭而三家者以雍徹其所由來者漸也聖人因事而存魯史之文其義㣲矣邾人鄭人伐宋正傳曰書邾人鄭人伐宋譏擅興之罪也征伐自天子出也諸侯非王命而擅興師者皆無王之罪也春秋無義戰况聲罪致討乎左氏曰宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也程子曰先邾人為主也胡氏從之又曰雖附庸小國而序乎鄭之上凡班序上下以國之小大従禮之常也而盟㑹征伐以主者先因事之變也然則衛州吁告於宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣討賊子必深絶其黨愚謂史特因其報之首事者而書之聖人因而存焉而其罪之首従自見耳聖人未必如是之刻深也螟正傳曰書螟謹天戒而重民災也公羊曰螟何以書記災也榖梁以為甚則月不甚則時臆説也程子曰書螟書螽皆為災也國之大事故書胡氏曰蟲食苗心曰螟食葉曰螣食節曰賊食根曰蟊國以民為本民以食為天詩去螟螣害稼也春秋書螟記災也聖人以是為國之大事也故書而近世王安石乃稱為人牧者不必論奏災傷之事亦獨何哉甚矣其不講於聖人之經以欺當年而誤天下與來世也愚謂皆得之矣冬十有二月辛巳公子彄卒正傳曰書冬十有二月辛巳公子彄卒重親者貴者賢者之大故也彄臧僖伯名左氏曰臧僖伯卒公曰叔父有憾於寡人寡人不敢忘塟之加一等榖梁曰𨼆不爵命大夫其曰公子彄何也先君之大夫也胡氏曰以公羊三世考之則所傳聞之世也而書日見恩禮之厚明矣公將如棠觀魚者僖伯諫而不聽則稱疾不從可謂忠臣矣塟之加一等夫是之謂稱愚故曰重親者貴者賢者之大故也宋人伐鄭圍長葛正傳曰長葛鄭邑也書宋人伐鄭圍長葛著暴兵也春秋無義戰况伐乎况圍其邑乎左氏曰以報入郛之役也愚謂以是興師豈有義戰乎程子曰伐國而圍邑肆其暴也胡氏曰圍者繯其城邑絶其往來之使禁其樵采之途守城不下至於經年而不􅄙誅亂臣討賊子可也長葛鄭邑何罪乎書圍於此而書取於後宋人之惡彰矣桓王三年六年齊僖十四年普哀侯光元年衛宣二年蔡宣三十三年鄭莊二十七年曹桓四十年陳桓二十八年杞武三十四年宋殤三年秦文四十九年楚武二十四年春鄭人來輸平正傳曰書鄭人來輸平譏失信也輸平公穀皆以為墮成程子以為渝平胡氏則以為納成結好以離宋魯之黨二説皆未知然以理推之若納成結好必有㑹盟之舉而但云來輸平則絶交之義似有理而可信公羊曰輸平者何輸平猶墮成也何言乎墮成敗其成也曰吾成敗矣吾與鄭人未有成也吾與鄭人則􅂚為未有成狐壤之戰𨼆公𫉬焉程子曰魯與鄭舊修好既而迫於宋衛遂與之同伐鄭故鄭來絶交渝平變其平也匹夫且不肯失信於人為國君而負約可羞之甚也胡氏曰公之未立與鄭人戰于狐壤止焉元年及宋盟于宿四年遇于清其秋㑹師伐鄭即宋魯為黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失辭公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乗之隙也是以來納成耳愚謂據胡子之説公素有夙怨於鄭有結好於宋鄭又安得一旦因使者失辭之小嫌而遽投隙以納成乎且以魯鄭之深怨非盟㑹講睦如後公與齊盟艾之事則未易􅄙也而可遽爾納成哉夏五月辛酉公㑹齊侯盟于艾正傳曰書公㑹齊侯盟于艾譏非禮也非聘問朝㑹而以私㑹非禮之正也左氏曰夏盟于艾始平于齊也此所謂以私㑹也秋七月正傳曰書秋七月者何也無事亦書時月虚以待事史之法也聖人因而不削耳公羊以為春秋編年四時具然後為年程子曰無事書首月天時王月備而後成歲也胡氏曰四徳備而後為乾故易曰乾元亨利貞一徳不備則乾道熄矣四時具而後成歳故春秋雖無事首時過則書一時不具則歳功虧矣既書時又書月者時天時也月王月也書時又書月見天人之理合也易不云乎君子行此四徳者故曰乾元亨利貞愚謂諸説推之益逺而愈晦矣然則信斯言也夫聖人作經止舉春秋二時為名何耶皆以為不成歲歟後皆倣此冬宋人取長葛正傳曰書宋人取長葛著宋久師強取之罪也公羊榖梁皆以為外取邑不書此何以書久之也程子曰宋人之圍長葛歲且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而弗能保有赴訴卒䘮其邑皆罪也宋之強取不可勝誅矣胡氏従之又曰初穆公屬國於與夷使其子馮出居於鄭殤公既立忌馮而伐鄭不亦逆天理乎春秋序宋主兵以殤公之罪重也明年鄭人伐宋序邾為首以鄭伯之罪輕也至於宋又主兵伐鄭而圍其邑肆行暴虐不善之積已著而不可􅄙矣其見弑於亂臣豈一朝一夕之故哉凡此𩔖皆直書于䇿按其行事而善惡之應可考而知天理之不誣者也春秋正傳卷二
