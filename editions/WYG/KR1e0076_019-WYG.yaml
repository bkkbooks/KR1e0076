body:
  text: 春秋正傳卷十九明湛若水撰宣公名倭一名接文公子在位十八年匡王五年元年晉靈十三年齊恵公元元年衛成二十七年蔡文四年鄭穆二十年曹文十年陳靈六年杞桓二十九年宋文三年秦共公稻元年楚莊六年春王正月公即位正傳曰書春王正月公即位志初立也而其與聞乎弑之罪可考見矣公羊謂繼弑君不言即位非也然則此何以書即位耶其或事出於倉卒不成乎即位之禮故不書也書即位正也而其罪自不可掩矣公子遂如齊逆女正傳曰書公子遂如齊逆女則仲遂隂謀之邪非昏禮之正可考見矣胡氏曰魯秉周禮䘮未期年遣卿逆女何亟乎太子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討故結昏于齊為自安計越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年䘮父兄百官皆不欲曰吾宗國魯先君莫之行也䘮紀寖廢夫豈一朝一夕之故自文宣莫之行矣此所謂不待貶絶而罪惡見者也三月遂以夫人婦姜至自齊正傳曰姜不言氏程子曰脫氏字是也愚謂稱夫人以國君言之也稱婦以敬嬴言之也稱以以仲遂言之也書三月遂以夫人婦姜至自齊參譏之也而其昏禮之失公不當成昏敬嬴不當主昏仲遂不當為邪謀以將命皆可見矣夫在䘮而娶娶之非禮矣非仲遂謀之敬嬴主之公從之何以共成此失哉故春秋並書而參譏之夏季孫行父如齊正傳曰書季孫行父如齊使人考其所如而知其罪也左氏曰季文子如齊納賂以請㑹胡氏曰經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待𫝊而著者此事以觀斯得矣下書公㑹齊侯于平州則知請㑹行父請之也又書齊人取濟西田則知其請葢以賂也雖微𫝊其事著矣諸侯立卿為公室輔猶屋之有楹也而謀國如此亦不待貶絶而惡自見者也不然以行父之勤勞恭儉相三君而無私積必能以其君顯名與晏嬰等矣晉放其大夫胥甲父于衛正傳曰書晉放其大夫胥甲父于衛著擅放之罪也左氏曰晉人討不用命者放胥甲父于衛而立胥克先辛奔齊胡氏曰放猶羈置毋去其所比於専殺者其罪薄乎云爾或以為近正非矣大夫當官既不請於天子而自命以為有罪又不告于司冦而擅行猶不逺於正乎秦晉戰于河曲撓臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也桃園之罪其志固形於此矣愚謂此言是也又言稱國以放見晉政之在私門而成上侵為後戒也則鑿矣公㑹齊侯于平州正傳曰書公㑹齊侯于平州著其㑹之非也古者諸侯相㑹同以講信修睦非有為而為之也宣公非時有為而㑹齊侯于平州則非正矣左氏曰㑹于平州以定公位愚故謂此宣公平州之㑹有所為而為之非正也胡氏曰魯宣簒立踰年舉國臣子既從之矣若之何位猶未定而有待於平州之㑹也春秋以來弑君簒國者已列於諸侯則不復致討故曹人以此請負芻于晉夫簒弑之賊毁滅天理無所容於天地之間身無存没時無古今其罪不得赦也以列於㑹而不復討是率中國為僭竊棄人類為禽獸此仲尼所為懼春秋所以作也愚謂此説是也而胡氏又云魯宣宜稱及齊而曰㑹者以為討賊絶黨之法則鑿矣但曰㑹則齊黨惡之罪在其中矣公子遂如齊正傳曰書公子遂如齊則其如之為邪謀可考見矣同時公㑹齊侯于平州而仲遂如齊並書繼之以齊人取濟西之田則魯以田賂齊也公之㑹齊以賂與齊成以定已位也遂如齊以拜成也皆可見矣故左氏曰東門襄仲如齊拜成是也則遂之如齊以成邪謀也胡氏曰宣公簒立之罪仲遂主謀為首惡初請于齊遂為上客而並書介使者罪叔孫得臣不能為有無亦從之也大夫有以死争者矣然削而不書者以叔仲惠伯死非君命失其所也遂及行父則一再見于經矣如齊拜成雖削之可也又再書于策者於以著其始終成就弑立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出其手而人主不悟者其慮深矣凡此皆直書於䇿而義自見者也六月齊人取濟西田正傳曰濟西魯地書齊人取濟西田則取之者及與之者之罪並可見矣夫齊取之以魯與之也左氏曰齊人取濟西之田為立公故以賂齊也愚謂土田乃傳之於先公受封於天子非可以私相取與也况以為賂乎公羊曰外取邑不書此何以書所以賂齊也曷為賂齊為殺子赤之賂也程子曰宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非為强取故不諱不能有而失者皆諱胡氏曰魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯隣國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寧魯亂首與之㑹是利其為惡而助之也弑君簒國人道所不容而貨賂公行免於諸侯之討則臣子胥為僭竊人類滅為禽獸其禍乃自不知以義為利而以利之可以為利而為之也孟子為梁王極言利國者必至於弑奪而後饜蓋得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣秋邾子來朝正傳曰書邾子來朝則其黨惡之罪自見矣宣公簒立之罪人人得而誅之諸侯列國不能與連率方伯告於天子聲罪致討而邾乃首來朝之人心死天理滅矣故不必加貶直書之而其罪自見矣楚子鄭人侵陳遂侵宋正傳曰書楚子鄭人侵陳遂侵宋著黨楚陵弱之罪也並稱楚子鄭人者著同惡罪之甚也或謂爵楚而人鄭為貶之者非也左氏曰宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉楚子侵陳遂侵宋胡氏曰鄭伯本以宋人弑君晉不能討受賂而還以此罪晉為不足與也遂受盟於楚今乃附楚以亟病中國何義乎書侵陳遂侵宋者以見潛師掠境肆為侵暴非能聲宋罪而討之也既正此師為不義然後中國之師可舉矣晉趙盾帥師救陳正傳曰書晉趙盾帥師救陳何也穀梁曰善救陳也左氏曰晉趙盾帥師救陳宋愚謂此救陳左氏並云宋衍文也胡氏謂聖人削宋非也又曰鄭在王畿之内而附蠻夷陳先代帝王之後而見侵逼此門庭之寇利用禦之者也晉能救陳則存諸夏攘夷狄之師故特褒而書救凡書救者未有不善之也如解倒懸如拯民於塗炭之中知此義則知春秋用兵之意矣宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭正傳曰棐林鄭地趙盾之師方救陳也諸侯遂㑹之以伐鄭書之見其伐之善也所謂彼善於此者也故穀梁謂著其美也是也左氏曰㑹于棐林以伐鄭也楚蒍賈救鄭遇於北林囚晉解揚晉人乃還愚謂鄭以畿内諸侯而外附於楚與之同惡中國而夷狄者也諸侯㑹晉師伐之攘夷狄尊中國之師矣故春秋書之冬晉趙穿帥師侵崇正傳曰書晉趙穿帥師侵崇著不義之師也左氏曰晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成愚謂非有大義之舉而為是邪謀以動衆其不義甚矣胡氏曰崇在西土秦所與也晉欲求成于秦不以大義動之而伐其與國則為諼已甚比諸伐楚以救江異矣而傳謂設此謀者趙穿也意者趙穿已有逆心欲得兵權托於伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也穿之名姓自登史䇿弑君于桃園而上卿以志同受惡其端又見於此書侵以見所以求成者非其道矣晉人宋人伐鄭正傳曰書晉人宋人伐鄭著非義也左氏曰晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚愚謂觀此則晉之此舉為憤兵蓋原於侈心之萌也穀梁曰伐鄭所以救宋也愚謂所以伐鄭者以鄭以王畿諸侯而從楚是從敵以叛王也則鄭必無詞矣若夫宋以弑君之賊罪浮于鄭晉乃不之問而反與同伐人所謂助桀伐桀也我已曲矣可得為義兵乎故春秋並書之其義可見矣胡氏亦謂宋人弑君既列於㑹在春秋衰世已免諸侯之討矣論春秋王法則其罪固在法所不赦也而晉人與之合兵伐鄭是謂以燕伐燕是也然又謂書人以貶鑿矣其罪已著何假書人乎匡王六年崩二年晉靈十四年弑齊惠二年衞成二十八年蔡文五年鄭穆二十一年曹文十一年陳靈七年杞桓三十年宋文四年秦共二年楚莊七年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元正傳曰書宋鄭大棘之戰華元之獲著不義也左氏曰春鄭公子歸生受命于楚伐宋宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人愚謂宋以弑君之賊而伐鄭之附楚鄭又負從夷之罪而伐宋以獲其大夫是以罪伐罪耳何以為義舉乎若夫宋之罪唯天吏者則可以伐之所藏乎身不恕而能伐人者未之有也秦師伐晉正傳曰書秦師伐晉著報怨之師也左氏曰秦師伐晉以報崇也遂圍焦愚故曰報怨之兵也胡氏曰晉用大師於崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐世豈有欲求成於强國而侵其所與可以得成者乎穿之情見矣宣子當國筭無遺策獨懵於此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由來者漸矣愚謂胡氏論書侵書伐之别然則春秋書此為與秦乎誤矣夏晉人宋人衞人陳人侵鄭正傳曰書晉人宋人衞人陳人侵鄭著報怨之師也左氏曰夏晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚闘椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之愚謂以晉之强諸侯之衆非不足以勝鄭也而卒不能勝者蓋宋負弑君之罪晉與諸侯不能討又受賂而黨之此鄭之所以不服也胡氏謂易於訟卦之象曰君子作事謀始始而不謀將至於興師動衆有不能定者矣晉惟取賂釋宋而不討至以中國之大不能服鄭不競於楚可不慎乎春秋行事必正其本為末流之若此也其垂戒明矣秋九月乙丑晉趙盾弑其君夷臯正傳曰夷臯晉侯名書晉趙盾弑其君夷臯誅首惡也弑君者穿也而書盾弑盾上卿與聞乎弑也此與許止之事皆是書其實事蓋弑君父之罪天下大罪也若無其實春秋豈妄以意加以此罪乎蓋許止進藥於父而其臣傅之以毒君死而止奔趙盾怨君而出族子弑君而復入其與弑之迹顯然矣故皆以弑君加之誅之以為亂臣賊子之戒也左氏曰晉靈公不君厚斂以雕牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉君能有終則社稷之固也豈唯羣臣賴之猶不改宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之盾曰棄人用犬雖猛何為闘且出提彌明死之乙丑趙穿攻靈公于桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊慼其我之謂矣孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黒臀於周而立之壬申朝於武宫愚謂此非孔子之言也春秋之法臣子弑君父凡在官在宫者殺無赦觀盾不討穿之罪乃反使之逆黑臀以立之其同謀顯然矣豈越竟可免乎又觀此經則書盾弑者晉良史董狐之文而魯史因之則孟子所謂其文則史於此可見矣他皆魯史之文而傳莫見惟此傳最明因此以例其他則書人書名與否皆魯史之文而非出於聖人之手孟子之言為不我誣矣胡氏曰趙穿手弑其君董狐歸獄於盾其斷盾之獄詞曰子為正卿亡不越竟反不討賊以書弑斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰正卿當國任事之臣也國事莫酷於君見弑不於其身而誰責乎亡而越竟謂去國而不還也然後君臣之義絶反而討賊謂復讎而不釋也然後臣子之事終不然是盾偽出而實聞乎故也假令不與聞者而縱賊不討是有今將之心而意欲穿之成乎弑矣惡莫慘乎意今以此罪盾乃閑臣子之邪心而謹其漸也盾雖欲辭而不受可乎以髙貴鄉公之事觀焉抽戈者成濟唱謀者賈充而當國者司馬昭也為天吏者將原司馬昭之心而誅之乎亦將致辟成濟而足也故陳泰曰惟斬賈充可以少謝天下耳昭問其次意在濟也泰欲進此直指昭也然則趙穿弑君盾為首惡春秋之大義明矣微夫子推見至隠垂法後世亂臣賊子皆以詭計獲免而至愚無知如彼史太鄧扈樂之徒皆蒙歸獄而受戮焉君臣父子不相夷以至於禽獸也幾希故曰春秋成而亂臣賊子懼冬十月乙亥天王崩正傳曰書冬十月乙亥天王崩紀天下之大變也聞赴而書於是諸侯有奔喪之禮焉魯不見書之史冊則其不奔喪而無君之罪可見矣定王元年三年晉成公黑臀元年齊恵三年衛成二十九年蔡文六年鄭穆二十二年卒曹文十二年陳靈八年杞桓三十一年宋文五年秦共三年楚莊八年春王正月郊牛之口傷改卜牛牛死乃不郊正傳曰書春王正月郊牛之口傷改卜牛牛死乃不郊見郊之非禮也天子祀天地諸侯祀山川禮也魯以諸侯祀天地非禮也然則曷為見郊之非禮也書之使人知牛口傷改卜牛牛死乃不郊不然則郊矣因事而見其非禮也胡氏曰禮為天王服斬衰周人告喪於魯史策已書而未𦵏也祀帝於郊夫豈其時而或謂不以王事廢天事禮乎春秋以來喪紀寖廢有不奔王喪而逺適他國有不修弔禮而自相聘問固將以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見愚謂觀此則春正月為子月可見而無疑矣蓋古之郊卜牲不卜日日以冬至迎陽氣也冬至在子月此書郊在春王正月則時與月數皆改矣猶三望正傳曰書猶三望見非特郊之非禮而又三望焉甚非禮也夫柴望秩于山川望祭于四方之山川天子之禮也天子有四方之山川也魯既不郊猶行之其僭竊之罪亦已太甚矣胡氏曰三望者公羊曰祭泰山河海夫天子有天下凡宇宙之内名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅於泰山冉求不能救而夫子責之者為泰山魯侯所主也大夫何與焉季氏不得旅泰山則河海非魯之封内其不得祭亦明矣𦵏匡王正傳曰書𦵏匡王紀王室之大事也而其失禮之非自見矣禮天子七月而𦵏同軌畢至今喪始四月而𦵏史因魯使奔赴㑹𦵏而書之而非禮自見矣胡氏曰四月而𦵏王室不君其禮畧也微者往㑹魯侯不臣其情慢也或曰宣公親之者也而常事不書非矣崩𦵏始終之大變豈以是為常事而不書也楚子伐陸渾之戎正傳曰書楚子伐陸渾之戎謹蠻荆肆暴之防也左氏曰楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其奸回昏亂雖大輕也天祚明徳有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也愚謂此實傳也觀此則楚子雖以伐戎實以觀兵于周以窺王室其猾夏之勢可懼矣故春秋謹書之防微杜漸之意深矣胡氏曰夷狄相攻不志此其志何也為陸渾在王都之側戎夏雜處族類之不分也楚又至洛觀兵于周疆問鼎之大小輕重焉故特書于策以謹華夷之辨禁猾夏之階夏楚人侵鄭正傳曰書楚人侵鄭則鄭之歸正楚之犯順皆可見矣左氏曰鄭即晉故也鄭在王畿而前背華從楚今又背楚即晉歸於正也順也楚人侵之是醜正也犯順也史書於策所以深著楚之罪而與鄭之善也胡氏曰按左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往從楚非矣今晉成公初立背僭竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣秋赤狄侵齊正傳曰赤狄者狄之别種張氏謂地譜潞州春秋赤狄之地書赤狄侵齊紀霸業之不復振也春秋嚴華夷之情見矣宋師圍曹正傳曰書宋師圍曹著報復之兵也據左氏曰宋文公即位二年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋帥圍曹報武氏之亂也胡氏曰按左氏宋文公即位盡逐武穆之族二族以曹師伐宋然不書於經者二族以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚為至於宋哉不能反躬自治恃衆强以報之兵革何時而息也宋惟有不赦之罪莫之治也故書法如此愚謂據二傳所言則二族與曹不能聲討罪之義於宋徒以見逐而興師宋不能求悔罪之心於曹徒以報復而動衆其為不義之兵明矣冬十月丙戌鄭伯蘭卒正傳曰書鄭伯蘭卒紀隣國之大故也來赴故書之是故有相弔􅉠之禮義焉左氏曰冬鄭穆公卒初鄭文公有賤妾曰燕姞生穆公名之曰蘭文公報鄭子之妃曰陳媯生子華子臧子臧得罪而出誘子華而殺之南里使盗殺子臧於陳宋之間又娶於江生公子士朝於楚楚人酖之及葉而死又娶於蘇生子瑕子俞彌俞彌早卒洩駕惡瑕文公亦惡之故不立也公逐羣公子公子蘭奔晉從晉文公伐鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也今公子蘭姞甥也天或啟之必將為君其後必蕃先納之可以亢寵與孔將鉏侯宣多納之盟於大宫而立之以與晉平𦵏鄭穆公正傳曰書𦵏鄭穆公紀隣國之大事也禮諸侯五月而𦵏同盟畢至相恤之義也故春秋書之定王二年四年晉成二年齊恵四年衞成三十年蔡文七年鄭靈公夷元年弑曹文十三年陳靈九年杞桓三十二年宋文六年秦共四年卒楚莊九年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向正傳曰向莒邑也何以書明非禮也夫平也者平也成也出於人心之平也而要之平而取之城則非禮之甚矣左氏曰非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮胡氏曰心不偏黨之謂平以此心平物者物必順以此心平怨者怨必釋惟小人不能宅心之若是也雖以勢力强之而有不獲成者矣夫以齊魯大國平郯莒小邦宜其降心聽命不待文告之及也然而莒人不肯則以宣公心有所私係失平怨之本耳故書取以著其罪及所欲也平者成也取者盗也不肯者心弗允從莫能强之者也以利心圖成雖强大不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸已斯可矣秦伯稻卒正傳曰稻秦伯名書秦伯稻卒紀霸國之大故也餘義見前夏六月乙酉鄭公子歸生弑其君夷正傳曰書公子歸生弑其君夷誅弑逆之首惡也左氏曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏弑靈公書曰鄭公子歸生弑其君夷權不足也君子曰仁而不武無能達也凡弑君稱君君無道也稱臣臣之罪也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舎子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舎之皆為大夫愚謂此實傳也觀此則弑君之事謀之者宋成之者歸生也非歸生成之則謀敗矣故首惡歸乎成之者其法嚴矣程子曰有欲亂之人而無與亂者則雖有强力弗能為也今有刼人以殺人者則先治刼者而殺者次之將以垂訓於後世則先殺者而後刼者春秋書鄭公子歸生弑其君夷是也胡氏曰首謀弑逆者公子宋也懼譖而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲動其惡而不從者未有能全其身而不死也故季子然問仲由冉求其從之者歟子曰弑父與君亦不從也是以死節許二子矣歸生懼譖而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋並為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋戰獲其元帥已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聽已猶犬羊之伏於虎也何畏於人懼其見殺而從之也哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋捨公子宋而以弑君之罪歸之為後世鑒若司馬亮沈慶之等苟知此義則能討罪人不至於失身為賊所制矣赤狄侵齊正傳曰書赤狄侵齊見霸業之衰已甚也髙氏曰以齊之强而連年為狄所侵則惠公之無政可知矣秋公如齊公至自齊正傳曰書公如齊至自齊謹出告反面之義而公如齊之非自見矣如至皆書始終其非禮也胡氏曰夫以簒弑謀於齊而取國以土地賂齊而請㑹以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎愚謂此説是也然胡氏又以為危之者非也冬楚子伐鄭正傳曰書楚子伐鄭著脅人之兵也左氏曰鄭未服也杜氏曰前年楚侵鄭不獲成故曰未服據此則是興兵脅鄭所謂以力服人者也是曲在楚向使楚子移此兵仗大義以問鄭人弑君之罪則楚其為中國矣不知出此惜哉定王三年五年晉成三年齊惠五年衞成三十一年蔡文八年鄭襄公堅元年曹文十四年陳靈十年杞桓三十三年宋文七年秦桓公榮元年楚莊十年春公如齊正傳曰書公如齊著其如之非禮也語曰恭近於禮逺恥辱也公如齊之數卑屈已甚非禮矣其能免恥辱乎左氏曰公如齊髙固使齊侯止公請叔姬焉此非辱而何夏公至自齊正傳曰書公至自齊於是乎有反面之禮焉其為髙固所止之辱可以告廟乎故左氏曰書過也是已秋九月齊髙固來逆子叔姬正傳曰凡男女皆稱子子叔姬宣公之女也書髙固來逆子叔姬著昏配之非禮也而宣公逼於强而與之女可考而知矣左氏曰齊髙固來逆女自為也故書曰逆叔姬卿自逆也胡氏曰按左氏公如齊髙固使齊侯止公請叔姬焉書夏公至自齊秋齊髙固來逆子叔姬罪宣公也愚謂此説是矣然又謂其曰來者以公自為之主非敵體以為辱稱子者别於先公之女是又泥於一字之文而不知改經傳之本意矣夫謂之來則或公使大夫為之主未可知也而公自為主不明見於經傳又安能知其如此乎故宣公之罪未見其在於自為主失尊卑之禮以為辱而在於數如齊故見止於髙固以要其女為可恥也叔孫得臣卒正傳曰叔孫得臣字莊叔書叔孫得臣卒則使人考其平生而惡逆可知矣故舉其終所以見其始也又見弑逆之罪終不能討而以惡善終也胡氏曰内大夫卒無有不日者以春秋魯史也其或不日則見恩數之畧爾仲遂如齊謀弑子赤叔孫得臣與之偕行在宣公固有援立之私其恩數豈畧而不書曰是聖人削之也君臣父子妃妾適庶人道之大倫也方仲遂以殺適立庶往謀於齊而與得臣並使也若懵然不知其謀或知之而不能救則將焉用彼相矣春秋治子赤之事專在仲遂以其内交宫禁外結强隣大惡無所分也而叔孫得臣有同使於齊之罪故特不書日以貶之若曰大夫而不能為有無者不足加以恩數云爾愚謂胡氏他論皆是獨以日為恩數以不日為聖人削之貶之非也若得臣之弑逆黨惡但舉其名而天下之人能共指其惡矣惡在乎日與不日耶其或魯史氏惡而畧之歟未可知也非聖人之削之也冬齊髙固及子叔姬來正傳曰書齊髙固及子叔姬來著其並失禮也髙固不宜踰國而踰國叔姬未宜歸寜而歸寜男女不當同行而同行皆非禮也故公羊子曰其諸為其雙雙而俱至者與胡氏曰左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則髙固親來非禮也又禮女子有行逺父母者嵗一歸寜今見逆逾時未易嵗也而叔姬亟來亦非禮也故書及書來以著齊罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎惠公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲以肆矣凡婚姻常事不書而書此者則以為非常為後世戒也愚謂胡氏此義盡之矣楚人伐鄭正傳曰書楚人伐鄭譏非義討也夫楚於是三至鄭矣不聞討賊問罪之義而徒興師動衆以力服鄭耳故春秋書之止著其猾夏之罪耳左氏曰楚子伐鄭陳及楚平晉荀林父救鄭伐陳愚謂楚屢伐鄭志在於威鄭而不能問鄭弑逆之罪此晉所以救鄭而伐陳也定王四年六年晉成四年齊惠六年衞成三十二年蔡文九年鄭襄二年曹文十五年陳靈十一年杞桓三十四年宋文八年秦桓二年楚莊十一年春晉趙盾衞孫免侵陳正傳曰書晉趙盾衞孫免侵陳著不義之兵也左氏曰春晉衞侵陳陳即楚故也夫晉與衞侵陳必假其以夏從夷之名於義似矣然以左氏之言觀之乃惡陳即楚而不附已耳是不義之兵也胡氏曰愛人不親反其仁治人不治反其智晉嘗命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於已有闕盍亦自反可也不内省徳遽以兵加之則非義矣愚謂盾以弑逆首惡既書諸侯之策矣而復使將兵侵陳安能正已以正人耶則晉不足以主盟又可知也他義見前夏四月正傳曰無事亦書時月義見於前秋八月螽正傳曰書秋八月螽紀災異也程子曰螽蝗也愚謂蝗之狀類螽故曰螽胡氏曰傳謂螽為穀災虐取於民之效也先是公伐莒取向後再如齊伐萊軍旅數起賦斂既繁戾氣應之矣夫善惡之感萌於心而災祥之應見於事宣公不知舎惡遷善以補前行之愆而用兵不息災異數見年穀不豐國用空乏卒至於改助法而税民蓋自此始矣經於螽螟一物之變必書於策示後世天人感應之理不可誣當慎其所感也冬十月正傳曰無事亦書時月義見於前春秋正傳卷十九
