body:
  text: 春秋正傳卷十四明湛若水撰僖公襄王八年十有六年齊桓四十二年晉惠七年衛文十六年蔡莊二年鄭文二十九年曹共九年陳穆四年杞成十一年宋襄七年秦穆十六年楚成二十八年春王正月戊申朔隕石于宋五正傳曰隕者自上而下五者石之數左氏曰隕星也穀梁曰隕而後石也于宋四境之内曰宋書隕石于宋五紀異也在天為星在地為石事之大異者也是月六鷁退飛過宋都正傳曰鷁水鳥民所聚曰都書六鷁退飛過宋都紀異也順飛者其常退飛者其異也物之反常而異則為災此過宋者宋災也何以魯史書之有報則史書之以紀天下之異也其在天者天下之異也公羊以為王者之後記異非也退飛左氏以為風非也程子曰倒逆飛必有氣驅之也春秋所書災異皆天人響應有致之之道故石隕于宋而言隕石夷伯之廟震而言震夷伯之廟此天應之也人以淺狹之見以為無應其實皆應之然漢儒言災異皆牽合不足信儒者見此因盡廢之胡氏曰宋異書于魯史亦見當時諸侯有非所當告而告者矣何以不削乎聖人因災異以明天人感應之理而著之於經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異人事感於下則天變應於上苟知其故恐懼脩省變可消矣宋襄公以亡國之餘欲圖霸業五石隕六鷁退飛不自省其徳也後五年有盂之執又明年有泓之敗天之示人顯矣聖人所書之義明矣可不察哉三月壬申公子季友卒正傳曰季者其字友者其名魯之賢大夫也書公子季友卒紀國大夫之大故也公羊曰其稱季友何賢也季子忠賢在僖公有翼戴之勤國君於大夫有臨弔之禮有賵賻之禮故史書之聖人存之以著腹心手足之義夏四月丙申鄫季姬卒正傳曰書鄫季姬卒著親親之義也禮諸侯之女嫁為諸侯夫人者有大功之服焉故赴其卒則史書之聖人存之以致親親之義耳其書葬不書葬有諡無諡史有詳畧耳非以其賢否為親疏也何也不以義掩恩也秋七月甲子公孫兹卒正傳曰兹公孫名乃叔牙之子叔孫戴伯也書公孫兹卒紀國大夫之變也冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮正傳曰書㑹于淮紀恤小之義也鄫為淮夷所病故㑹以謀之左氏曰十二月㑹于淮謀鄫且東畧也城鄫役人病有夜登丘而呼曰齊有亂不果城而還襄王九年十有七年齊桓四十三年卒晉惠八年衛文十七年蔡莊三年鄭文三十年曹共十年陳穆五年杞成十二年宋襄八年秦穆十七年楚成二十九年春齊人徐人伐英氏正傳曰英氏小國楚之與也書齊人徐人伐英氏見桓公伯圖之不競也左氏曰春齊人為徐伐英氏以報婁林之役徐人舍楚歸華為楚所病桓為伯主宜約與國告于天王聲大義以討之則攘夷尊華之義著矣乃舍楚之大惡而伐區區之英氏所謂不能三年之喪而緦小功之察不足以語伯矣夏滅項正傳曰項小國名書夏滅項則魯僖併吞之罪見矣左氏曰師滅項淮之㑹公有諸侯之事未歸而取項齊人以為討而止公愚謂存亡繼絶大國所以字小也魯僖存鄫之謀未遂而先有滅項之惡魯於是乎不競矣秋夫人姜氏㑹齊侯于卞正傳曰下魯邑書夫人姜氏㑹齊侯于卞譏失禮也左氏曰聲姜以公故㑹齊侯于卞齊桓因魯侯滅項以為討而止公聲姜出㑹以解之雖為有故而出然禮婦人不外出外出非正也婦人無外事外事非正也魯之諸姜聲姜為賢其失禮如此况其他乎九月公至自㑹正傳曰書公至自㑹紀反面之禮也公猶有諸侯之事也而專云自㑹者始以㑹而出故不得不以㑹而至也冬十有二月乙亥齊侯小白卒正傳曰小白齊侯名桓公霸主名之亦無他義可知書齊侯小白卒紀霸主之大故也赴至則書之左氏曰齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯襄王十年十有八年宋襄九年齊孝公昭元年晉惠九年衛文十八年蔡莊四年鄭文三十一年曹共十一年陳穆六年杞成十三年秦穆十八年楚成三十年春王正月宋公曹伯衛人邾人伐齊正傳曰書宋公曹伯衛人邾人伐齊穀梁以為譏伐喪是也左氏曰宋襄公以諸侯伐齊三月齊人殺無虧愚謂無虧為易牙竪貂所為殺羣吏以立立之不正故羣國討之也討之誠是也伐喪何為焉齊之民何罪焉夏師救齊正傳曰書師救齊紀救患之義也故穀梁曰善救齊也杜氏曰傳言三月齊人殺無虧則無虧已殺矣今魯以師救之誌緩也愚謂救定其亂亦義也五月戊寅宋師及齊師戰于甗齊師敗績正傳曰書宋師及齊師戰于甗齊師敗績紀定亂擅立之師也左氏曰齊人将立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還愚謂按左傳前後則或無虧為易牙竪貂所立國人不與無虧乃將立孝公四公子爭亂殺無虧故宋人伐之討其亂而立孝公歟公羊以為與宋伐不葬穀梁以為惡宋皆非也然而伐之以定亂是也其立孝公非也程子曰曲在宋也奉少以奪長其罪大矣愚謂孝公雖桓公管仲屬之於宋為有父命然此乃管仲從君之欲亂命也狄救齊正傳曰書狄救齊何也穀梁曰善救齊也愚謂夷狄而中國則中國之聖人與人為善之心也胡氏曰伐齊之喪奉少奪長其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣凡書救者未有不善之也書狄救齊者許狄也許在狄則罪在宋矣許之曷為不稱人深著中國諸侯之罪也或曰桓公管仲嘗屬孝公於宋襄公以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公君臣乃欲以私愛亂長幼之節其可哉獨不見宣王與仲山甫争魯侯戲括之事其後如之何也春秋深罪宋公大義明矣愚謂胡氏以此許狄也而不稱人則凡稱人者未必為貶矣以此為義例豈為能充其類也乎秋八月丁亥葬齊桓公正傳曰書葬齊桓公則恤喪之為義後葬之非禮並見矣夫諸侯五月而葬禮也桓公之卒至此九月以生時不勝其嬖愛之私遺命不正遂致五公子争立而齊大亂幾不能葬僅乃葬之其失禮甚矣胡氏曰桓公九合諸侯不以兵車威令加乎四海幾於改物雖名方伯實行天子之事然而不能慎終如始付託非人柩方在殯四隣謀動其國家而莫之惜至於九月而後葬以此見功利之在人淺矣春秋明道正義不急近功不規小利於齊桓晉文之事有所貶而無過褒如此冬邢人狄人伐衛正傳曰書邢人狄人伐衛紀其伐之善也夫衛人不念桓之舊徳嘗同宋曹邾人伐之矣今邢狄伐衛所以救齊也故春秋善之左氏曰冬邢人狄人伐衛圍菟圃衛侯以國讓其父兄子弟及朝衆曰苟能治之燬請從焉衆不可而後師于訾婁狄師還穀梁曰稱人善累而後進之伐衛所以救齊也功近而徳逺矣胡氏曰衛嘗亡滅東徙渡河無所控告齊桓公攘夷狄而封之使衛國忘亡誰之賜也桓公方沒不念舊徳欲厚報之遽伐其喪亦太甚矣以直報怨聖人之公也以怨報怨天下之私也以徳報怨寛身之仁也以怨報徳刑戮之民也至是人理亡矣桓公攘荆楚安中國著一匡之烈諸侯不念其賜而於衛為尤先書狄救齊以著中國諸侯之罪再書狄人伐衛所以見救齊之善功近而徳逺矣愚謂穀梁稱人之説義見前襄王十一年十有九年宋襄十年齊孝二年晉恵十年衛文十九年蔡荘五年鄭文三十二年曹共十二年陳穆七年杞成十四年秦穆十九年楚成三十一年春王三月宋人執滕子嬰齊正傳曰嬰齊滕子名名之無他義胡氏以為名之有罪者非也他國之史之稱必書名然後天下後世知其為滕子某也獨稱滕子則孰知其為誰乎稱宋人者亦他國之史之詞耳書宋人執滕子嬰齊罪宋之擅執也諸侯有罪則方伯連帥上告於天子然後執之以歸京師問其罪焉義也今宋人無故執之是擅專矣擅專者無王輕執者無義二者皆非也胡氏曰是亦有罪焉爾夫以齊桓之盛九合諸侯不以兵車雖江黄逺國猶相繼來盟而滕介齊宋之間不與衣裳之㑹者三十有七年及宋襄繼起又不尊事大國其見執則有由矣愚謂以此執之亦不足以服之也夫犯上殃民罪之可也猶當請命于天子以示不專况以私乎今春秋之諸侯上不朝王下不保民而專事糾黨動兵戈以立威而陵下皆犯上殃民之君也則又何以獨責滕乎孟子曰惟天吏則可以伐之春秋無義戰夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾正傳曰曹南曹之南鄙書宋公曹人邾人盟于曹南紀非盟也書鄫子㑹盟于邾非後盟也春秋無善盟盟者忠信之薄也然而盟必以結忠信之事今觀曹南既盟之後未見其有忠信之事故曰非盟也若夫鄫子之㑹盟則又怠矣公羊曰言㑹盟後㑹也杜氏曰不及曹南之盟諸侯既罷鄫子乃㑹之于邾是後時也是以取罪焉己酉邾人執鄫子用之正傳曰用之者以之祭社也書邾人執鄫子用之見宋襄之暴盟也夫要盟且不可况暴盟乎鄫子非不赴盟也乃後時而至宋襄怒使邾子執而用之於社其暴虐極矣何以為伯主乎左氏曰宋公使邾文公用鄫子于次雎之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一㑹而虐二國之君又用諸淫昏之鬼將以求伯不亦難乎得死為幸穀梁曰微國之君因邾以求與之盟人因已以求與之盟已迎而執之惡之故謹而日之也用之者叩其鼻以衈社也愚謂宋邾之惡極矣不待乎曰之而後知惡之也盖史日之以别於㑹盟之日耳秋宋人圍曹正傳曰書宋人圍曹譏妄動也未有罪而伐之者無名於與盟而伐之者無義無義無名皆妄動也左氏曰討不服也子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降退脩教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動愚謂曹屡與盟則非不服矣無義無名是之謂有闕而妄動何以服人胡氏曰盟于曹南口血未乾今復圗曹愛人不親反其仁治人不治反其智襄公不能内自省徳而急於合諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒於兵敗身傷不知反求諸己欲速見小利之過也欲速則不達見小利則大事不成經書襄公不越數端而知其操心之若此者仲尼筆削推見至隠如化工賦像并其情不得遯焉非特畫筆之肖其形耳故春秋者化工也非畫筆也愚謂仲尼之作春秋如化工之妙物各付物而物之妍媸自見豈物物而雕刻之哉今之治春秋者皆物物而雕刻之之類也何足以知天地造化之心哉衛人伐邢正傳曰書衛人伐邢著搆怨之罪也夫智者為能以小事大仁者為能以大字小此侯度也王法也舍此不為互相搆怨謀動干戈擅興無王之罪均矣然伐人者為曲故春秋書之罪衛也左氏曰秋衛人伐邢以報菟圃之役於是衛大旱卜有事於山川不吉寗莊子曰昔周飢克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之興師而雨愚謂此寗荘子之妄陷其君於惡也是又以見衛君之罪其臣成之也故曰逢君之惡其罪大冬㑹陳人蔡人楚人鄭人盟于齊正傳曰齊者齊地也地以齊齊亦與㑹公㑹不言公義自見胡氏謂諱之非也既言㑹則公矣書㑹陳人蔡人楚人鄭人盟于齊著修好之盟也左氏曰陳穆公請脩好於諸侯以無忘齊桓之徳冬盟于齊脩桓公之好也愚謂此其實傳也盖與之也胡氏又以為人諸侯與其大夫諱是盟也楚之得與中國㑹盟自此始也莊公十年荆敗蔡師其後入蔡伐鄭皆以號舉夷狄之也僖公元年改而稱楚桓公世皆止稱人而不得與中國盟㑹桓公既沒中國無伯鄭首朝于楚遂為此盟故春秋沒公人陳蔡諸侯而以鄭列其下盖深罪之也又二年復盟于鹿上至㑹于盂遂執宋公以伐宋而書爵矣愚謂中國之同盟亦有口血未乾伐之滅之如宋之於曹與鄫者矣何獨以罪楚聖人與人為善不念舊惡不逆來善即時即事而是非皆其自取聖人無與焉此聖人之心也故自進于中國則中國之前日敗蔡入蔡伐鄭此一楚也今日向義而與盟㑹此一楚也及㑹于盂執宋公以伐宋此又一楚也聖人物各付物之心過化存神之妙豈保其往哉豈與其退哉至於鄭之朝楚固為自棄于中國不能無罪然亦中國伯主不能以相安故畏楚之强而朝之也原情定罪則亦有分之者矣而可以全罪之乎故春秋之於此㑹書之見聖人大公與善之心盖與之也彼善於此者也春秋無善盟彼善於此則有之矣梁亡正傳曰書梁亡交罪之也是亦秦有罪焉左氏曰初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁穀梁曰自亡也湎於酒淫於色心昏耳目塞上無正長之治大臣背叛民為冦盜梁亡自亡也如加力役焉湎不足道也梁亡鄭棄其師我無加損焉正名而已矣梁亡出惡政也鄭棄其師惡其長也胡氏曰陸淳曰秦肆其暴取人之國沒而不書其義安在曰乗人之危惡易見也滅人之國罪易知也自取亡滅者其事微矣春秋之作聖人所以明微也梁本侯國魚爛而亡何也易曰天行健君子以自强不息古者諸侯朝脩其禁令晝攷其國職夕省其典刑夜儆百工無使慆淫而後即安故克勤于邦荒度土功者禹也慄慄危懼檢身若不及者湯也自朝至于日中昃不遑暇食用咸和萬民者文王也凡有國家者土地雖廣人民雖衆兵甲雖多城郭雖固而不能自强於政治則日危月削如火消膏以至滅亡而莫覺也而况好土功輕民力湎於酒淫於色心昏而出惡政者乎其亡可立而待矣愚謂使秦於此無併吞諸侯之心有繼滅存亡之義行以大事小之仁則必濟弱而扶其傾為立明主梁為不亡矣秦乃因其昏亂而取之以滅其國罪與梁均耳春秋書梁亡則自亡者與亡之者交罪之矣襄王十二年二十年宋襄十一年齊孝三年晉惠十一年衛文二十年蔡荘六年鄭文三十三年曹共十三年陳穆八年杞成十五年秦穆二十年楚成三十二年春新作南門正傳曰書春新作南門著其作之非也孔子曰節用而愛人使民以時於春為不時於作為不節而其非自見矣左氏曰書不時也凡啓塞從時公羊曰門有古常也則不時不節之義可見矣胡氏曰言新者有故也言作者創始也其曰南門者南非一門也庫門天子臯門雉門天子應門書新作南門譏用民力於所不當為也魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書于䇿以見勞民為重事而况輕用於所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂教之意深矣夏郜子來朝正傳曰郜者杜氏以為姬姓國書郜子來朝著事大之義也五月乙巳西宫災正傳曰書西宫災紀國之變異也書之以警人君失徳之感應也公羊曰西宫何小寢也小寢則曷為謂之西宫有西宫則有東宫矣魯子曰以有西宫亦知諸侯之有三宫也西宫災何以書紀災也鄭人入滑正傳曰入者入其境也鄭人入滑著陵弱之罪也左氏曰滑人叛鄭而服於衛夏鄭公子士洩堵冦帥師入滑愚謂春秋之時王道不行而徳義泯滅人欲横流大國惟肆陵暴以為強滑微小之國介於鄭衛之間歸鄭則衛怒歸衛則鄭怒左右皆受兵也為小國者何以自存耶為大國者豈復有天理人心耶秋齊人狄人盟于邢正傳曰邢者邢地也邢亦與盟書齊人狄人盟于邢譏失盟也夫狄樂于戰門喜怒向背無常豈復可與講信脩好乎故曰譏失盟也左氏曰齊狄盟于邢為邢謀衛難也於是衛方病邢愚謂以狄而謀邢如以毒藥而攻病病去而病益加矣冬楚人伐隨正傳曰隨漢東諸國之大者姬姓書楚人伐隨罪楚之憑陵傷中國之不競也左氏曰隨以漢東諸侯叛楚冬楚鬭穀於菟帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗由己而由人乎哉詩曰豈不夙夜謂行多露愚按桓公六年楚武王侵隨鬬伯比曰漢東之國隨為大吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也由此觀之則隨率漢陽諸姬以拒楚今欲復漢東諸侯于中國而力不足以勝之故見伐也襄王十三年二十有一年宋襄十二年齊孝四年晉惠十二年衛文二十一年蔡荘七年鄭文三十四年曹共十四年陳穆九年杞成十六年秦穆二十一年楚成三十三年春狄侵衛正傳曰書狄侵衛著中國之霸業衰也桓公既沒中國無伯而宋襄不義故狄人窺間隙而肆其虐也宋人齊人楚人盟于鹿上正傳曰書盟于鹿上譏要盟也盟者聖人所不與也同心而盟猶恐寒之况要盟乎左氏曰宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國争盟禍也宋其亡乎幸而後敗愚謂楚不自來而宋求于楚是要盟也宜乎其見執也宋襄欲令諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟可謂知言矣夏大旱正傳曰周之夏即夏二三四月之間正農務憂旱之時也故穀梁曰旱時正也言大者久且逺詞書夏大旱紀災也農務之時而大旱則無年矣無年則民人飢困而盜賊將起故聖人憂之左氏曰公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗也飢而不害秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋正傳曰書㑹于盂執宋公以伐宋交譏之也夫宋公不知夷狄之楚不足以講信而要之盟為不智楚不念宋公之為㑹主而執之於㑹為不義五國之君斂手傍觀而不為之謀為不勇故曰交譏之也左氏曰諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋程子曰宋率諸侯為㑹而蠻夷執㑹主諸侯莫違故以執書之胡氏曰夫以楚之強莫能勝秦五國之衆何弱於趙然澠池之㑹藺相如一奮其氣威信列國秦雖虎狼猶不敢動况以五國之君而不能得志於荆楚乎宋以乗車之㑹往而楚伏兵車以執之則宋直楚曲其義已明雖以匹夫自反而縮猶為可恥矧南面之君也哉然春秋為賢者諱宋公見執不少隠之何也夫盟主者所以合天下之諸侯扶大義尊王室者也宋公欲繼齊桓之烈而與楚盟㑹豈扶大義尊王室之義乎冬公伐邾正傳曰書公伐邾譏不義也春秋無義戰况無名輕動乎左氏曰任宿須句顓臾風姓也實司太皡與有濟之祀以服事諸夏邾人滅須句須句子來奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皡濟而脩祀紓禍也愚謂由是觀之則為成風報滅須句之私怨耳烏得為義夫兵以奉詞伐罪為義敵加於己不得已而應之義也公之此舉無名輕動矣楚人使宜申來獻捷正傳曰軍獲曰捷獻捷獻宋捷也書楚人使宜申來獻捷著楚無道之甚也公羊曰宋公與楚子期以乗車之㑹公子目夷諫曰楚夷國也強而無義請君以兵車之㑹往宋公曰不可吾與之約以乗車之㑹自我為之自我墮之不可終以乗車之㑹往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣國子之國也吾不從子之言以至乎此公子目夷復曰君雖不言國國固臣之國也於是歸設守械而守國楚人謂宋人曰子不與我國吾將殺子君矣宋人應之曰吾賴社稷之神靈吾國已有君矣楚人知雖殺宋公猶不得宋國於是釋宋公宋公釋乎執走之衛公子目夷復曰國為君守之君曷為不入然後迎襄公歸胡氏曰諸侯從楚伐宋而魯獨不與故楚來獻捷以脅魯為魯計者拒其使而不受可也請於天王而討之可也宋公先代之後作賓王家方脩盟㑹而伏兵車執之於壇坫之上又以軍獲遺獻諸侯其横逆甚矣拒其使而不受聲其罪而致討不患無詞魯於是時曽不能申大義以攘荆楚尊中國故不曰宋捷特為魯諱之也愚謂楚本夷也穀梁前既以狄稱人為善累而後進之今公羊又以稱人為貶之二子之言相矛盾矣何取於義例乎且楚之夷何待於稱人乎言獻捷則宋捷也不言宋捷公羊以為為宋襄諱胡氏以為為僖公諱皆非也十有二月癸丑公㑹諸侯盟于薄釋宋公正傳曰諸侯即上五國與楚也書公㑹諸侯盟于薄釋宋公著魯僖非義之舉也夫見大義者不見小惠方楚以宋捷來獻是已無中國無天王無魯矣為魯僖者當上告天王下連諸侯聲大義以王命討之舍一宋以尊中國可也而乃為婦人之仁㑹諸侯以求釋于楚尚為中國有人乎左氏曰冬㑹于薄以釋之子魚曰禍猶未也未足以懲君胡氏曰盟不書所為盟于薄言釋宋公者宋方主㑹而蠻夷執而伐之以其俘獲來遺是荆舒反為吾與國逞其志將滅宋縣之矣此正霸業之衰春秋之所謹也魯既不能申大義以抑其強暴使宋公見釋出自天王與中國而顧與㰱血要言求楚子以釋之是操縱大權自蠻夷出其事已傎甚矣故書㑹書盟書釋皆不言楚子為魯諱以深貶之也穀梁謂不與楚專釋是已或以為嘉我公之救患誤矣愚謂此論是也至謂不言楚子為魯諱以深貶之非也楚不待貶魯亦豈能諱聖人之心無意必固我之私襄王十四年二十有二年宋襄十三年齊孝五年晉惠十三年衛文二十二年蔡荘八年鄭文三十五年曹共十五年陳穆十年杞成十七年秦穆二十二年楚成三十四年春公伐邾取須句正傳曰須句見前書公伐邾取須句則僖公之義與不義並見矣曷為義曰伐邾以還須句反其君而奉太皡有濟之祀得存亡繼絶之義故左氏曰伐邾取須句反其君焉禮也是已曷為不義曰春秋無義戰以其不奉天子之命而擅伐是雖義猶不義故胡氏曰不請於王命而專為母家報怨謀動干戈於邦内是已然胡氏又以為擅取人國而反其君是以亂易亂非所以為禮也與收奪者無以異矣愚謂所謂反其君反須句之君不絶其祀禮也非擅取人國也非收奪之取以為已有者也非以亂易亂也夏宋公衛侯許男滕子伐鄭正傳曰書宋公衛侯許男滕子伐鄭著非義之兵也左氏曰三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣愚謂兵以義舉非義而舉輕舉也宋公非有王命奉義之舉徒以不勝其怒鄭歸楚之私遂率諸侯之兵以伐之所以兆楚釁而致泓之敗也子魚謂禍在此盖先知之矣秋八月丁未及邾人戰于升陘正傳曰升陘魯地及者公及也言及不言公公自見矣穀梁胡氏皆以為諱公非也書及邾人戰于升陘善應敵之兵也邾人來魯地魯禦之與之戰是為應敵之兵未為不義胡氏曰邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄氷又曰敬之敬之天維顯思命不易哉先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聴八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門記稱邾婁復之以矢盖自戰于升陘始也愚謂魯雖敗績然邾兵來魯不得已而應之但是年魯先伐邾則其釁盖自魯啓之彼此得失互相半矣冬十有一月己巳朔宋公及楚人戰于泓宋師敗績正傳曰泓水名及與也胡氏以書及為深貶宋公者非也書宋公及楚人戰于泓宋師敗績著召釁玩敵之罪也夫宋不自知其徳不足以服鄭鄭歸于楚乃伐鄭以致楚兵是之謂召釁又不知好謀而成乃執不重傷不禽二毛以致敗是之謂玩敵召釁者不智玩敵者不義孟子曰夫人必自侮然後人侮之國必自伐然後人伐之此之謂也左氏曰楚人伐宋以救鄭宋公将戰大司馬固諫曰天之棄商久矣君将興之弗可赦也已弗聴冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天賛我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有于二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也愚謂此實傳也胡氏又曰泓之戰宋襄公不阨人於險不鼓不成列先儒以為至仁大義雖文王之戰不能過也而春秋不與何哉物有本末事有終始順事恕施者王政之本也襄公伐齊之喪奉少奪長使齊人有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄徳而一㑹虐二國之君罪二也曹人不服盍姑省徳無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而獨愛重傷與二毛則亦何異盜跖之以分均出後為仁義陳仲子以避兄離母居於陵為廉乎夫計末遺本飾小名防大徳者春秋之所惡也愚謂此又經外之意也襄王十五年二十有三年宋襄十四年卒齊孝六年晉惠十四年衛文二十三年蔡荘九年鄭文三十六年曹共十六年陳穆十一年杞成十八年卒秦穆二十三年楚成三十五年春齊侯伐宋圍緡正傳曰緡宋邑書齊侯伐宋圍緡著其伐之非也乗人之敗也宋王者之後一敗於楚齊有伯者之餘業輔宋以抑楚尊周攘楚之義得矣乃因宋之敗而伐之是輔桀也故春秋書以譏之左氏曰以討其不與盟于齊也愚謂齊不仗大義而恣小忿以伐宋其惡大矣胡氏曰齊伯國之餘業也宋襄公既敗於泓荆楚之勢益張矣齊侯既無尊中國攘夷狄恤災患畏簡書之意又乗其約而伐之此尤義之所不得為者也故書伐國而言圍邑以著其罪然則桓公伐鄭圍新城何以不為貶乎鄭與楚合憑陵中國桓公伐之攘夷狄也宋與楚戰兵敗身傷齊侯伐之殘與國也其事異矣美惡不嫌同詞愚謂觀此義例之説窮矣及至書同而美惡不同則云美惡不嫌同詞乃不得其説而為遁詞也夫既云美惡不嫌同詞則美惡不係於詞而係於事是取義在詞之外矣則又何取於義例拘拘於一詞之求乎夏五月庚寅宋公兹父卒正傳曰兹父宋襄公名書夏五月庚寅宋公兹父卒紀伯國之大故也左氏曰宋襄公卒傷於泓故也愚謂書之亦以見公不得其死焉乃自取也秋楚人伐陳正傳曰書楚人伐陳著蠻荆肆虐之罪也左氏曰秋楚成得臣帥師伐陳討其貳於宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾愚謂此實傳也若得臣者有王者起必服上刑不以為罪而以為功何其謬也冬十有一月杞子卒正傳曰書杞子卒紀小國之大故有赴則書之也有赴則書何以不名高氏曰史佚之是也左氏謂杞成公卒書曰子杞夷也胡氏從之非也程子曰杞二王後而伯爵疑前世黜之也中間從夷故子之後復稱伯胡氏又引杜預謂杞實稱伯而書曰子者成公始行夷禮終其身故仲尼於其卒以文貶之以為是愚謂此誤矣若杞從夷則其卒也無赴無赴則不書魯書之見其赴中國諸侯而未必從夷矣杜氏因左氏之説誤之耳且鄭伯曽朝楚矣何以不子之乎且據程子之言或伯或子或子或伯隨時而易稱史之文耳焉得謂聖人黜伯而子之又升子而伯之耶信斯言也是孔子變亂名實專擅爵賞得罪於天王矣何以為孔子襄王十六年二十有四年齊孝七年晉惠十五年卒衛文二十四年蔡荘十年鄭文三十七年曹共十七年陳穆十二年杞桓公姑容元年宋成公王臣元年秦穆二十四年楚成三十六年春王正月正傳曰義見前夏狄伐鄭正傳曰書狄伐鄭著夷狄之亂中國也見中國之亂天王亂之也左氏曰鄭之入滑也滑人聴命師還又即衛鄭公子士洩堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聴王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之太上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周徳之不類故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親䁥近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄徳崇姦禍之大者也鄭有平惠之勲又有厲宣之親棄嬖寵而用三良於諸姬為近四徳具矣耳不聴五聲之和為聾目不别五色之章為昧心不則徳義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿徳也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周徳既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聴使頽叔桃子出狄師夏狄伐鄭取櫟王徳狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啟之女徳無極婦怨無終狄必為患王又弗聴初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處于汜大叔以隗氏居于温愚謂此實傳也故曰頽桃二子亂周王亂之也許氏曰鄭執王使是無王也王啟夷狄是無中國也天下何恃不亂秋七月正傳曰無事亦書義見于前冬天王出居于鄭正傳曰書天王出居于鄭紀天下之大變也左氏曰冬王使來告難曰不穀不徳得罪於母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子蒙塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦天子無出書曰天王出居于鄭避母弟之難也天子凶服降名禮也鄭伯與孔將鉏石甲父侯宣多省視官具于汜而後聴其私政禮也胡氏曰夫鄭伯不王固有罪矣襄王不知自反念其制命之未順也忍小忿䁥懿親以扞外侮而棄徳崇姦遂出狄師是用夷制夏如木之植拔其本也不亦傎乎王者以天下為家京師為室而四方歸往猶天之無不覆也東周降于列國既不能家天下矣又毁其室而不保則是寄生之君耳貶而書出以為後戒唐資突厥之兵以伐隋而世有戎狄之禍晉藉契丹之力以取唐而卒有播遷之辱許翰以謂不講於春秋戒襄王之所以出其言信矣而中外之辨可不謹乎居者宅其所有之稱出而曰居者若曰普天之下莫非王土撥亂反正存天理之意也愚謂云出居者實出居所謂天子蒙塵乃奔難也胡氏又謂貶而書出居者宅其所有之稱云云則支離於文義而非直書見義之指矣晉侯夷吾卒正傳曰書晉侯夷吾卒紀伯國之大故也餘義見前春秋正傳卷十四
