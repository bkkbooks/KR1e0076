body:
  text: 春秋正傳卷二十九明湛若水撰昭公名稠襄公妾齊歸之子二十嵗即位在位二十五年孫于齊在外八年凡三十二年薨於乾侯景王四年元年晉平十七年齊景七年衛襄三年蔡靈二年鄭簡二十五年曹武十四年陳哀二十八年杞文九年宋平三十五年秦景三十六年楚郏敖四年卒吴夷昧三年春王正月公即位正傳曰書公即位正始也正始人君之大事也未有不正於始而能正終者也穀梁曰繼正即位正也叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢正傳曰書叔孫豹㑹諸侯之大夫于虢著非禮也左氏曰春楚公子圍聘于鄭且娶於公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館于外既聘將以衆逆子産患之使子羽辭云云請垂櫜而入許之正月乙未入逆而出遂㑹于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉况不信之尤者乎楚重得志於晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不煩國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有祸人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟愚謂此本傳也左氏謂此㑹于虢尋宋之盟也夫宋之盟楚人得志於晉今公子圍之尋盟諸侯之大夫已不信之矣是何益於盟乎且君子將事主一無二圍將逆親于鄭又假之以聘聘則又包藏禍心而使鄭疑之一行而三失焉書曰一人三失其圍之謂乎春秋因其㑹而書之而楚之衆惡具著趙武惟能獨仗忠信所謂自周有終其亦賢矣哉胡氏曰㑹于虢尋宋之盟于經何以不書在宋之盟楚人先歃若曰狎主諸侯則懼晉之先也故圍請讀舊書加于牲上而晉人許之觀其事雖若楚重得志晉少懦矣然春秋不貴修盟晉人以信為本故每書必先趙武三月取鄆正傳曰鄆莒邑書三月取鄆則魯貪暴背盟之罪自見矣左氏曰季武子伐莒取鄆莒人告於㑹楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其踁曰貨以蕃身子何愛焉叔孫曰諸侯之㑹衞社稷也我以貨免魯必受師是禍之也何衞之為人之有牆以蔽惡也牆之隙壞誰之咎也衞而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鲋也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也疆埸之邑一彼一此何常之有莒魯爭鄆為日久矣苟無大害於其社稷可無亢也去煩宥善莫不兢勸子其圖之固請諸楚楚人許之乃免叔孫程子曰乘莒之亂而取之故隠其辭胡氏曰其不伐莒取鄆者乘莒亂而取邑故不悉書為内諱也愚謂當此之時魯政在大夫故征伐自大夫出取鄆之事季武子為之也故叔孫曰雖怨季孫魯國何罪是季氏乘莒之亂而取之不足為内隠而諱之矣春秋直書取鄆則貪殘之心非其有而取之與其君之弱其臣之專皆並著矣夏秦伯之弟鍼出奔晉正傳曰鍼秦公子名即所謂后子書秦伯之弟鍼出奔晉罪不友也左氏曰秦后子有寵於桓如二君於景其母曰弗去懼選癸卯鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舎車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也后子見趙孟趙孟曰吾子其曷歸對曰鍼懼選於寡君是以在此將待嗣君公羊曰有千乘之國而不能容其母弟故君子謂之出奔也穀梁曰其弟云者親之也親而奔之惡也愚謂父之愛子兄之愛弟與子弟之所以自愛凡以禮而已矣鍼之寵愛如二君奔晉之日車猶千乘造舟于河十里終享事八往反其侈如此在父母非所以愛之宜乎其不見容於兄也及其對司馬侯叔齊曰若車能少吾何以得見夫然後能知其過也胡氏曰書此見人君寵愛其子不差以禮是禍之也叔齊曰秦公子必歸能知其過必有令圖令圖天所贊也後五年秦伯卒后子歸書曰弟者罪秦伯也夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰况兄弟乎兄弟翕而後父母順矣故不曰公子而特稱秦伯之弟云六月丁巳邾子華卒正傳曰華邾子名諡悼公書邾子華卒志與國之大故也有相恤之義故來赴則書之晉荀吳帥師敗狄于大鹵正傳曰大鹵晉地即太原也書晉荀吳帥師敗狄于大鹵善禦侮也左氏曰晉中行穆子敗無終及羣狄于太原崇卒也將戰魏舒曰彼徒我車所遇又阨以什共車必克困諸阨又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之狄人笑之未陳而薄之大敗之愚謂據此傳則狄來侵太原而晉禦之於境得禦侮之道矣或者又病其毁車崇卒以詐誘而敗之則過矣夫戰危事也國之存亡于是乎在孔子曰我戰則克非欲不克也又曰好謀而成非欲不成也縱使晉荀吳察其地理臨機制變禦之于境内而不逺追以保國家不失敵來侵已不得已而應之之義矣春秋書此葢取之也非譏之也胡氏曰按六月宣王北伐之詩其詞曰薄伐玁狁至于太原而詩人美之者謂不窮追逺討及封境而止也然則太原在禹服之内而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚步卒爭以變詐相高日趨苟簡皆此等啟之矣書敗狄譏之也秋莒去疾自齊入于莒正傳曰書莒去疾自齊入于莒則其入之善可考見矣左氏曰莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾愚謂展輿為弑君者所立則是與乎弑也又奪羣公子秩是無道之甚矣去疾在齊羣公子召之假齊之力以入而展輿出得討賊之義焉善也故程子曰去疾假齊之力以入莒討展輿之罪正也故春秋書以與之莒展輿出奔吳正傳曰展輿莒子名書莒展輿出奔吳志逸賊也展輿為弑君者所立是弑君之賊也春秋書之罪諸侯之不能討也去疾之入展輿之出春秋皆稱莒自他國之史稱之之詞耳先儒于去疾之入而稱莒則云以國氏與去疾之討有罪也於展輿之出而稱莒則云罪諸侯之與立也是自相矛盾泥詞之過矣叔弓帥師疆鄆田正傳曰書叔弓帥師疆鄆田著非義也夫諸侯土地受之天子傳之先君各有疆界魯取莒之邑而疆之春秋直書其事而非之之義自見矣左氏曰因莒亂也於是莒務婁瞀胡及公子滅明三人皆展輿黨以大厖與常儀靡莒二邑奔齊君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣公羊曰疆鄆田者何與莒為竟也與莒為竟則曷為帥師而往畏莒也愚謂魯既因莒之亂而疆之又帥師動衆以畏之觀傳證經而聖人竊取之義得矣葬邾悼公正傳曰書葬邾悼公志與國之大事也恤災㑹葬與國之義也冬十有一月己酉楚子麇卒正傳曰麇楚子名書楚子麇卒志變也而弑君之賊可得矣左氏曰楚公子圍使公子黑肱伯州犂城犨櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘於鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之遂殺其二子幕及平夏皆郟敖子右尹子千王子比出奔晉宫廐尹子晢郟敖子出奔鄭殺太宰伯州犂于郟葬王于郟謂之郟敖即麇使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長愚謂觀此楚子之卒實圍弑之也而春秋書卒者何伍舉之更詞赴者之偽詞四馳於諸侯之國諸侯之史孰從而知之故使者以偽而赴之史氏因赴而書之聖人因史之文而存之而其弑逆之實則不可掩也故曰其文則史其義則丘竊取之矣或又不得其説而曲為之詞而聖人之心愈晦矣胡氏曰按左氏楚令尹圍將聘於鄭未出竟聞王有疾而還入問王疾縊而弑之使赴於諸侯應為後之詞曰共王之子圍為長初圍之未動於惡入預夏盟緝蒲為宫設服離衞中國大夫莫不知其有無君之心矣雖以疾赴曷為承偽藏在諸侯之策乎當是時仲尼已生將志于學乃所見之世非祖之所逮聞也又曷為因之而不革乎曰此春秋之所以為春秋非聖人莫能修之者也薨則書薨卒則書卒弑則書弑葬則書葬各紀其實載於簡䇿國史掌之此史官之所同而凡為史者皆可及也或薨或不薨或卒或不卒或弑或不弑或葬或不葬筆削因革裁自聖心以達王事此仲尼之所獨而㳺夏亦不能與焉者也然則郟敖實弑而書卒何歟令尹圍弑君以立中國力所不加而莫能致討則亦已矣至大合諸侯于申與㑹者凡十有三國其臣舉六王二公之事其君用齊桓召陵之禮而宋向戌鄭子産皆諸侯之良也而皆有獻焉不亦傷乎若革其偽赴而正以弑君將恐天下後世以􅆲弑之賊非獨不必致討又可從之以主㑹盟而無惡矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰微而不能振也懼之甚者懼人欲之橫流而不能遏也是故察微顯權輕重而畧其簒弑以扶中國制人欲存天理其義微矣愚謂此皆他執於義例而此不類不得其説而為之詞者也豈有􅆲弑之罪可畧而天理反可存者耶楚公子比出奔晉正傳曰書楚公子比出奔晉則圍􅆲弑之罪益著矣景王五年二年晉平十八年齊景八年衞襄四年蔡靈三年鄭簡二十六年曹武十五年陳哀二十九年杞文十年宋平三十六年秦景三十七年楚靈王䖍元年呉夷昧四年春晉侯使韓起來聘正傳曰書晉侯使韓起來聘志邦交之禮也左氏曰春晉使韓宣子來聘且告為政而來見禮也觀書于太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦緜之卒章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公夏叔弓如晉正傳曰書叔弓如晉志邦交之禮也左氏曰叔弓聘於晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賓徹命於執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之禄也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有德夫子近德矣愚謂觀此傳則叔弓之如晉報宣子之來聘也一來一往禮無不答得邦交之正矣况又有忠信卑讓以重其國乎秋鄭殺其大夫公孫黑正傳曰書鄭殺其大夫公孫黑不待去其官而誅罪彌亂之義見矣胡氏又云稱國以殺累乎上則惑於例而贅於詞矣左氏曰秋鄭公孫黑將作亂欲去㳺氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為楮師子産曰印也若才君将任之不才將朝夕從女女罪之不恤而又何請焉不速死司冦将至七月壬寅縊尸諸周氏之衢加木焉愚謂觀其傳則經之取義著矣冬公如晉至河乃復季孫宿如晉正傳曰書公如晉至河乃復季孫宿如晉著其如之非禮也恥之也左氏曰晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉愚謂諸侯薨諸侯使士弔使大夫賻禮也少姜氏之卒魯公親往可恥也又為晉以非伉儷拒之于河又可恥也季孫宿以大夫往弔而不以士為非禮又可恥也孔子曰恭近於禮逺恥辱也魯三失禮其能免恥辱乎胡氏曰舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四隣視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悦人以自辱昭公既不能據經守正失禮而妄動又不能從權適變無故而輕復終復失國出奔客死他境葢始諸此行矣或曰禮者明微正於未動之前可也已至於河而見郤雖欲勿反將得已乎曰以周公之胄千乘之國輕身以修鄰好乃欲郤而不納夫何敢若曰敝邑褊小敬事大國惟恐獲戾聞陳無宇見執於中都謂少姜之數於守適信也用是不遑寧處跋履山川來修弔事今若不獲進見剪為仇讐他國誰敢朝夕在廷修事大之禮乎夫小國之去就從違聽大國之令也若非伉儷齊人請陳無宇之罪何以令之也苟有二命又何以為盟主如此晉人其将謝過之不暇敢不納乎昭公習儀以亟而不明乎禮其及也宜經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比之迹不待貶絶而皆見矣愚謂昭公之過不在於至河見却之時而在於輕身妄動之始夫諸侯奔喪事天子之禮也使士大夫弔賻葬恤同列之禮也奔弔之禮諸侯施之於同列且不可况其夫人乎夫人且不可而况其非伉儷乎故其失在於初矣初之既失至河見却乃為正言如胡氏之云者則亦飾辭耳矣則亦遁辭耳矣文過耳矣烏能服晉乎景王六年三年晉平十九年齊景九年衞襄五年蔡靈四年鄭簡二十七年曹武十六年陳哀三十年杞文十一年宋平三十七年秦景三十八年楚靈二年呉夷昧五年春王正月丁未滕子原卒正傳曰書滕子原卒志與國之大故也左氏曰同盟故書名愚謂亦因其以名來赴也故書之夏叔弓如滕五月葬滕成公正傳曰書夏叔弓如滕五月葬滕成公志禮也諸侯五月而葬同盟至使卿送葬禮也左氏曰五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯即惠伯之忌敬子即叔弓不入惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之秋小邾子來朝正傳曰書小邾子來朝志禮也左氏曰小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之愚謂觀此則小邾子來朝修事大之禮故曰敬也惟敬故能使大國不卑而禮之春秋書于冊與之也八月大雩正傳曰左氏曰旱也周八月即夏之六月正苗憂旱之時也故大雩然而魯之僭禮於此並見矣故書之冬大雨雹正傳曰書冬大雨雹志災異也雹非隂陽之正氣也况大雹乎北燕伯欵出奔齊正傳曰欵北燕伯名書北燕伯欵出奔齊使人求其故而自奔之罪見矣左氏曰燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也愚謂然則燕伯之奔乃自奔也去社稷而失宗祧其罪大矣胡氏曰君雖不君臣不可以不臣燕伯欲去諸大夫固不君矣而大夫相與比以殺其外嬖是威脅其主而出之也與鬻拳之以兵諫無異而獨罪燕伯何哉大夫國君之陪貳以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪貳以自危矣晉厲公殺三郤立胥童而弑於麗氏漢隠帝殺楊史立郭允明而弑於趙村衞獻公蔑冢卿而信其左右亦奔夷儀久而後復也故人主不尊陪貳而與賤臣圖柄臣者事成則失身而見殺事不成則失國而出奔此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒遠矣景王七年四年晉平二十年齊景十年衞襄六年蔡靈五年鄭簡二十八年曹武十七年陳哀三十一年杞文十二年宋平三十八年秦景三十九年楚靈三年呉夷昧六年春王正月大雨雹正傳曰春正月子月也正閉固藏冰之時而雨雹則是陽不藏而隂不固况大雹乎書春王正月大雨雹志不時也左氏曰季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賓食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之禄冰皆與焉大夫命婦喪浴用冰祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至于老疾無不受冰山人取之縣人傳之輿人納之隸人藏之夫冰以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹厲疾不降民不夭札今藏川池之冰棄而不用風不越而殺雷不𤼵而震雹之為菑誰能禦之七月之卒章藏冰之道也愚謂古者三公論道燮理隂陽則時宜冰而冰不宜雹而不雹矣胡氏曰隂陽之氣和而散則為雪霜雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之宰也不肯端言其事故暴揚於朝歸咎藏冰之失夫山谷之冰藏之也周用之也徧亦古者本末備舉燮調之一事耳謂能使四時無愆伏凄苦之變雷出不震無菑霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏冰之道合于豳風七月之詩其将能乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申正傳曰書楚子諸侯世子淮夷㑹于申志諸夏之從楚也左氏曰夏諸侯如楚魯衞曹邾不㑹曹邾辭以難公辭以時祭衞侯辭以疾鄭伯先待于申六月丙午楚子合諸侯於申椒舉言于楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此㑹也夏啟有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宫之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六君子謂合左師善守先代子産善相小國王使椒舉侍于後以規過卒事不規王問其故對曰禮吾所未見者有六焉又何以規宋太子佐後至王田於武城久而弗見椒舉請辭焉王使往曰屬有宗祧之事於武城寡君將堕幣焉敢謝後見徐子吳出也以為貳焉故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之商紂為黎之蒐東夷叛之周幽為太室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之德逺而後興程子曰晉平公不在諸侯楚於是强為霸者之事胡氏曰申之㑹楚子為主而不殊淮夷是在㑹之諸侯皆狄也其意也何楚䖍弑麇以立而求諸侯於晉晉人許之中國從之執徐子圍朱方遷賴於鄢城竟莫較畏其强盛則曰晉楚唯天所相不可與爭滅陳不能救則曰陳亡而楚有之天道也滅蔡而又不能救則曰天將棄蔡以壅楚盈而降之罰也致使窮凶極惡師潰於訾梁身竄於棘里而縊於申亥人不致討而天自討之是責命于天而以人事為無益而弗為也而可乎弑君之賊在春秋時有臣子討之則衞人殺州吁是也有四隣討之則蔡人殺陳佗是也臣子不能討之於内四隣不能討之於外有與之㑹以定其位則齊侯及魯宣公㑹于平州是也有受其賂以免於討則晉侯及諸國㑹于扈是也然至此極矣則未有不以為賊而又推為盟主相與朝事之以聽順其所為而不敢忤者也故申之㑹不殊淮夷者以在㑹諸侯皆為荆蠻之行皆王法之所當斥而不使夏為所變之意也愚謂申之㑹諸侯同淮夷以從􅆲弑之楚是甘心於夷狄之歸矣宋鄭之君皆在而子産向戌之賢必從君以往而亦甘心變於夷者豈其智之不及乎葢其明道正義之學不講於素而不勝其謀利計功之心以至於此耳惜哉楚人執徐子正傳曰書楚人執徐子著夷狄之無信義也夫徐子諸國相率從夷而夷執之乃其自取不能無罪然楚乃執之於㑹則夷狄無信義而不可親亦可見矣聖人書之所以為世戒也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳正傳曰書楚子以諸侯伐吳著以逆伐逆之罪也夫楚與諸侯伐吳為齊討慶封也慶封負弑逆之罪而奔吳封之鍾離故為齊討之討之誠是也楚圍負􅆲弑之罪諸侯不能討而乃從之以討吳吳將無詞乎是以逆伐逆也逆義之兵也其能以服人乎左氏曰秋七月楚子以諸侯伐吳宋太子鄭伯先歸宋華費遂鄭大夫從執齊慶封殺之正傳曰書執齊慶封殺之罪專殺也以逆伐逆也左氏曰使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之愚謂慶封固有罪也然惟天吏則可殺之圍負弑君之罪而殺之不以歸之司冦則是以賊殺賊也宜其慶封反唇以相稽矣公羊曰此伐吳也其言執齊慶封何為齊誅也其為齊誅奈何慶封走之吳吳封之於防然則曷為不言伐防不與諸侯專封也慶封之罪何脅齊君而亂齊國也遂滅賴正傳曰賴小國遂者繼事之詞言既伐吳又滅賴也書遂滅賴著暴虐之甚也左氏曰遂以諸侯滅賴賴子面縛銜璧肉􅃝輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴於鄢楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也愚謂楚子欲為盟主以令諸夏乃為滅賴之舉失繼滅之義矣此楚之所以為夷乎九月取鄫正傳曰鄫莒邑書取鄫志貪虐也左氏曰言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取公羊曰其言取之何滅之也滅之則其言取之何内大惡諱也愚謂言取則其惡已見矣何足以諱焉冬十有二月乙卯叔孫豹卒正傳曰書叔孫豹卒志國卿之大故也左氏曰初穆子去叔孫氏穆子避僑如之難及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬魯人召之召之謂召於齊也既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之遂使為豎有寵長使為政叔孫田於邱蕕遂遇疾焉豎牛欲亂其室而有之强與孟盟不可叔孫為孟鍾曰爾未際享大夫以落之既具使豎牛請日入弗謁出命之日及賓至聞鍾聲牛曰孟有北婦人之客怒將往牛止之賓出使拘而殺諸外牛又强與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜洩見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使寘饋于个而退牛弗進則置虚命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜洩葬叔孫豎牛賂叔仲昭子與南遺使惡杜洩於季孫而去之杜洩將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎季孫曰然使杜洩舎路不可曰夫子受命于朝而聘於王王思舊勲而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勲今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬愚謂觀此則豹之死豎牛死之也及公使葬以路其黨又欲沮之於此見豹不逆知豎牛之惡而近之是豹之自取也春秋書之亦使人迹其故而惡之以為後戒也歟景王八年五年晉平二十一年齊景十一年衞襄七年蔡靈六年鄭簡二十九年曹武十八年陳哀三十二年杞文十三年宋平三十九年秦景四十年卒楚靈四年呉夷昧七年春王正月舎中軍正傳曰初魯作三軍中軍者公室之軍也書舎中軍何罪季氏之卑公室也左氏曰卑公室也毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舎之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜洩告于殯曰子固欲毁中軍既毁之矣敢告杜洩曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之愚謂觀此則舎中軍叔孫固不欲而豎牛誣之故季孫舎中軍使以告于殯以復叔孫而杜洩明非叔孫之欲而不以告殯也然則季氏欲卑公室其惡不可逭矣胡氏曰按左氏舎中軍卑公室也初作三軍三分公室而各有其一及其舎之也四分公室季氏擇二二子各一皆盡征之而貢于公然則三軍作舎皆自三家公不與焉公室益卑而魯國之兵權悉歸于季氏矣兵權有國之司命三綱兵政之本原書其作舎而公孫于齊薨于乾侯定公無正必至之理也已則不臣三綱淪替南蒯叛陽虎專季斯囚而三桓之子孫微矣亦能免乎書曰舎中軍微辭以著其罪也楚殺其大夫屈申正傳曰書楚殺其大夫屈申罪專殺也左氏曰楚子以屈申為貳於吳乃殺之以屈生為莫敖愚謂大夫受命於天子有罪則當歸於司冦非可得而專授而專殺之楚既專命大夫以為有罪又專殺之春秋書之所以罪楚亦以警天下之諸侯也公如晉正傳曰書公如晉著非禮也諸侯朝覲㑹同自有其時非其時而行之是犯先王之禁而忘宗社之重其爲卑屈危辱甚矣宜其取譏於女叔齊乎左氏曰公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔齊於是乎知禮愚謂女叔齊信知言也然徒知舉三者之不知禮而不知公此行之非禮則亦非真知言者也夏莒牟夷以牟婁及防兹來奔正傳曰牟婁防兹皆莒地牟夷莒大夫書莒牟夷以牟婁及防兹來奔譏納叛也夫牟夷以其二邑來奔則叛君之臣必書其名氏而後其罪人乃白於天下後世三傳皆以為重地非也夫魯受叛君之賊而貪其二邑之利是教人臣以背叛且教人君以貪利也及其在晉宜其致莒人之訴㡬不免於晉侯之執也胡氏曰邾莒之大夫名姓不登於史䇿微也牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣其書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為己以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼淫人為後戒也秋七月公至自晉正傳曰書公至自晉謹人君之出入而始終乎非禮之行也左氏曰莒人愬于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公秋七月公至自晉愚謂觀此傳則知恭近於禮逺恥辱之言為不誣又知以利為利之戒為不可易也昭公如晉之行非禮之恭矣其納牟夷二邑之奔獻是為利之利矣其見愬於莒人而幾見執於晉不亦宜乎戊辰叔弓帥師敗莒師于蚡泉正傳曰蚡泉魯地書叔弓帥師敗莒師於蚡泉則非義勝之兵也左氏曰莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也愚謂兵以義為勝故書曰同力度德同德度義魯納莒之叛臣而利其二邑則其德義俱負屈矣及莒人來討將何詞以對叔弓帥師敗之蚡泉雖勝乃其幸勝耳非德義之勝也故春秋恥之秦伯卒正傳曰書秦伯卒志與國之大故也來赴故書之其不名者赴之略故史書之略耳是無闗於竊取之義焉公羊以為不名秦者夷也匿嫡之名也非矣冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳正傳曰書楚子以諸侯東夷伐吳報怨之師也以暴伐暴也吳封慶封誠負納叛之罪而楚圍弑立亦負惡逆之名非天吏何以伐之也左氏曰冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師㑹於夏汭越大夫常壽過帥師㑹楚子于瑣聞吳師出薳啟疆帥師從之遽不設備吳人敗諸鵲岸楚子以馹至于羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休殆而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣難易有備可謂吉矣城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟於羅汭沈尹赤㑹楚子次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清吳不可入楚子遂觀兵於坁箕之山是行也吳早設備楚無功而還以蹶由歸愚謂由是而觀之則楚子之伐吳志在報棘櫟麻之役耳非有聲罪致討之大義也春秋書之葢惡其摟諸侯以伐諸侯以不仁伐不仁耳其稱人稱爵亦史有詳略也豈聖人拘拘而為之哉胡氏曰越始見經而與徐皆得稱人何也吳以朱方處齊慶封而富於其舊崇惡也楚圍朱方執齊慶封殺之討罪也吳不顧義入棘櫟麻以報朱方之役狄道也楚於是以諸侯伐吳則比吳為善而師亦有名其從之者進而稱人可也或者以詞為主而謂不可云沈子徐越伐吳故特稱人誤矣以不可為文詞而進人于越一字褒貶義安在乎且吳楚徐越雖比於夷狄而劉敞以為其實不同吳太伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆為元德顯功通于周室與中國冠帶之君無以異徐始稱王楚後稱王吳越因遂稱王王非諸侯所當稱也故春秋比諸荆徐雖然猶不欲絶其類是以上不使與王國等下不使與荆徐均推之可逺引之可來此聖人慎絶人亦春秋之意也愚謂此皆觀經者之意也非作經者之意也景王九年六年晉平二十二年齊景十二年衞襄八年蔡靈七年鄭簡三十年曹武十九年陳哀三十三年杞文十四年卒宋平四十年秦哀公元年楚靈五年呉夷昧八年春王正月杞伯益姑卒正傳曰益姑杞伯名書杞伯益姑卒志與國之大故也左氏曰把文公卒弔如同盟禮也葬秦景公正傳曰書葬秦景公志與國之大事也諸侯五月而葬同盟至左氏曰大夫如秦葬景公禮也夏季孫宿如晉正傳曰書季孫宿如晉志非禮也左氏曰拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免于討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨愚謂諸侯邦交之禮聘問有時所以通睦明義也季孫宿之如晉非聘問之禮也乃為拜莒田耳夫非其有而取之非義也昭公取非其有又拜晉之惠曽是以為知禮乎葬杞文公正傳曰書葬杞文公志禮也宋華合比出奔衞正傳曰書宋華合比出奔衞使人求其故則奔之者之罪見矣左氏曰宋寺人柳有寵大子佐惡之華合比曰我殺之柳聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐華合比合比奔衞於是華亥欲代右師乃與寺人柳比從為之徴曰聞之久矣公使代之見於左師左師曰女夫也必亡女喪而宗室於人何有人亦於女何有詩曰宗子維城毋俾城壞毋獨斯畏女其畏哉愚謂觀此則華合比之奔柳之譛奔之也胡氏曰宋公寵信閽寺殺世適痤而父子之恩絶逐華合比而君臣之義睽刑人之能敗國亡家亦可畏矣猶有任趙高以亡秦信恭顯中常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍者不亦悲夫凡此類直書而義自見矣秋九月大雩正傳曰何以書大雩左氏曰旱也而魯雩之非禮見矣楚薳罷帥師伐吳正傳曰書楚薳罷帥師伐吳志憤怨之師也左氏曰徐儀楚徐大夫聘于楚楚子執之逃歸懼其叛也使薳洩楚大夫伐徐吳人救之令尹子蕩帥師伐吳師於豫章而次於乾谿呉人敗其師于房鍾獲宫廏尹棄疾鬭韋龜之父子蕩歸罪於薳洩殺之冬叔弓如楚正傳曰書叔弓如楚志非禮也左氏曰聘且弔敗也愚謂楚為夷狄不可以中國禮義相接也其伐徐伐呉皆不義之兵而致敗何足弔乎非邦交聘問之禮矣齊侯伐北燕正傳曰書齊侯伐北燕志非義也左氏曰十一月齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也晉侯許之齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也愚謂據此傳則齊侯之伐北燕無乃受賄以納簡公耳非有仗義之舉也故春秋書之以著其罪春秋正傳卷二十九
