body:
  text: 春秋正傳卷三明湛若水撰隐公桓王四年七年齊僖十五年晉哀二年曲沃武公稱元年衛宣三年蔡宣三十四年鄭莊二十八年曹桓四十一年陳桓二十九年杞武三十五年宋殤四年秦文五十年楚武二十五年春王三月叔姬歸于紀正傳曰書叔姬歸于紀賢之也叔姬者紀侯夫人伯姬之娣也程子曰待年於家今始歸娣歸不書憫其無終也愚謂後之無終非聖人對時書事之義也以其賢耳胡氏曰古者諸侯一娶九女必格之同時者所以定名分窒亂源也今叔姬待年於宗國不與嫡俱行則非禮之常所以書也眉山蘇氏以謂書叔姬賢之也叔姬不歸宗國而歸于酅以全婦道賢可知矣由是觀之則胡氏所謂不與嫡俱行者非矣夫不與嫡俱行則非一娶九女之數也必已娶而歸待年如後所謂不歸宗國而歸于酅以全婦道然後可以見其賢也榖梁又謂不言逆逆之道微無足道者妄矣既在一娶之數矣豈有再逆之理耶滕侯卒正傳曰書滕侯卒諸侯䘏與國之義有大故赴告則史書之以紀變也滕侯不名左氏以為未同盟公羊以為㣲國榖梁以為少曰世子長曰君狄道也其不正者名也之數説皆非也程子曰史闕文是也愚謂諸侯宜薨而書卒有塟而不書塟或史畧之耳或滕不以告耳胡氏曰滕侯書卒何以不塟怠於禮弱其君而不塟者滕侯宿男之𩔖是已又曰怠於禮而不往弱其君而不㑹無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其塟義自見矣愚謂胡氏以為魯史之舊聖人無加損焉此正吾今之説於孟子之文見之者如使胡氏皆持此説以觀春秋則聖人之心得矣他何獨而不然也惜夫夏城中丘正傳曰何以書夏城中丘左氏曰書不時也公羊曰中丘者何内之邑也城中丘何以書以重書也愚謂二説皆是也事孰為重愛民為重愛民孰重以時為重榖梁曰城為保民為之也民衆城小則益城益城無極凡城之志皆譏也是未知重民重時之道矣程子曰春秋凡用民必書然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民力所當用也愚謂此尤宜書以美之而或不書者史闕畧之耳不可以執一論也胡氏曰春秋凡用民必書其所興作不時害義固為非矣雖時且義亦書見勞民為重事也又曰凡書城者完舊也書築者創始也城中丘使民不以時非人君之心也得之矣齊侯使其弟年來聘正傳曰書齊侯使其弟年來聘善其不失典禮而尤重以所親也左氏曰齊侯使夷仲年來聘結艾之盟也愚謂此雖有所為而為然而聘問之禮不失矣故春秋與之其稱弟者公羊以為母弟則失之薄誠如程子之論者榖梁以為諸侯之尊不得以屬通稱弟以其接於我則失之謬程子以為或責其失兄弟之義或罪其以弟之愛而寵任之過胡氏以為不稱公子貶也稱兄弟或罪其有寵愛之私或責其薄友愛之義則皆失之鑿要之史文據實直書聖人存之與其來聘之善耳他何暇計焉此聖人之心也秋公伐邾正傳曰書公伐邾則魯擅興背盟之罪不可掩矣左氏曰秋宋及鄭平七月庚申盟于宿公伐邾為宋討也程子曰擅興甲兵為人而伐人非義之甚也胡氏曰奉詞致討曰伐按左氏公伐邾為宋討也宋人先取邾田故邾人入其郛魯與儀父則元年盟于蔑矣邾人何罪可聲特託為辭説以伐之爾而不知渝蔑之盟不待貶而自見矣冬天王使凡伯來聘正傳曰書天王使凡伯來聘著王朝之非禮也曷為非禮也程子曰周禮時聘以結諸侯之好諸侯不脩臣職而聘之非王體也愚謂朝覲廵狩之禮毎年一方諸侯來朝天子之國及四方朝遍然後天子一廵狩以歴四方之岳見四方之諸侯一來一往禮無不答乃其正也今臣職不脩先屈天王之使而聘之則非禮矣春秋所以譏之戎伐凡伯于楚丘以歸正傳曰書戎伐凡伯于楚丘以歸者何大戎之罪也凡伯天子之大夫也楚丘衛地也伐者執之也胡氏以為見其以徒衆也以歸甚之之詞也左氏曰初戎朝于周發幣于公卿凡伯弗賓冬王使凡伯來聘還戎伐之于楚丘以歸愚謂戎者衛戎如徐戎云爾榖梁謂貶衛而戎之非也以歸者程子以為非凡伯有失節之罪胡氏罪凡伯失節不能死於位則是横生議論而非聖人作經直書之義矣胡氏曰周之秩官敵國賔至闗尹以告候人為導司徒具徒司冦詰姦佃人積薪火師監燎其貴國之賔至則以班加一等益䖍至於王吏則皆官正莅事今凡伯承王命以為過賔於衛而戎得伐之以歸是蔑先王之官而無君父也故旄丘録於國風見衛不能修方伯之職也戎伐凡伯于楚丘以歸見衛不救王臣之患也為狄所滅則有由矣愚謂此則言外之意不可以此嬰聖人之心也桓王五年八年齊僖十六年普哀三年衛宣四年蔡宣三十五年卒鄭莊二十九年曹桓四十二年陳桓三十年杞武三十六年宋殤五年秦寜公元年楚武二十六年春宋公衛侯遇于垂正傳曰書垂之遇譏非禮也垂一曰大丘左氏曰齊侯將平宋衛有㑹期宋公以幣請先相見衛侯許之故遇于大丘榖梁曰不期而㑹曰遇遇者志相得也愚謂據左氏則宋衛將與齊平而先約㑹若有志相㑹矣書曰遇者若不期而遇然也遇且不可况將㑹乎而先私約㑹以植黨乎程子曰宋忌鄭之深故與鄭卒不成好與衛無諸侯相見之禮故書曰遇愚謂此外事也史因報而書之聖人因史而存之則悖禮之罪見矣三月鄭伯使宛來歸祊正傳曰書鄭伯使宛來歸祊譏擅與也左氏曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也公羊曰宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事於泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉榖梁曰名宛所以貶鄭伯惡與地也程子曰魯有朝宿之邑在王畿之内曰許鄭有朝宿之邑近於魯曰祊時王政不修天子不廵狩魯亦不朝故欲以祊易許田各取其近者故使宛來歸祊始以祊歸魯未言易也朝宿之邑先祖受之於先王豈可相易也鄭來歸而魯受之其罪均也愚謂觀諸傳則聖人書來歸祊之義可見矣庚寅我入祊正傳曰書入祊者何譏擅取也前書歸祊見鄭不宜私與而與此書入祊見魯不宜私取而取其罪均矣日者本國之史故詳之也我者謂魯也入者納其地也乃常稱之詞而公羊乃以入以日為難之説以我為非獨我之説榖梁程子乃以入為内弗受之説胡氏亦有入者不順之詞義不可而強入之説則競為穿鑿而不知其累於聖人之心矣但書庚寅我入祊則觀於傳而義自見矣何假於字字而求之夏六月己亥蔡侯考父卒正傳曰書蔡侯考父卒隣國告赴之大變也有弔賻㑹塟恤哀之義焉故書之榖梁曰諸侯曰卒正也愚謂諸侯死曰薨而書卒者魯史之詞耳聖人未常改也其日不日亦報赴有詳畧史因而書之耳辛亥宿男卒正傳曰書宿男卒恤小之義也小國來赴告則大國有恤小之義焉故書之不名者史畧之也榖梁云宿微國也未能同盟故男卒也愚謂此則鑿矣元年同盟矣以不赴以名故不書耳胡氏曰天王崩告于諸侯則不名諸侯薨以名赴而自别於大上禮也古者死而不諡不以名為諱周人以諡易名於是乎有諱禮故君薨赴於他國則曰寡君不禄敢告執事春秋之時遵用此禮凡赴者皆不以名矣經書其終雖五霸強國齊桓普文之盛莫不以名者是仲尼筆之也赴不以名而書其名者與魯通也巳通而不名者舊史失之爾未通而名者有所證矣故傳此義者記於禮篇曰諸侯不生名夫生則不名死則名之别於大上示君臣尊卑之等盖禮之中也諸侯薨赴不以名而仲尼筆之必以名書變周制矣春秋魯史聖人修之也而孟子謂之作以此𩔖也愚謂或名或不名史有詳略耳非聖人拘拘之筆信斯言也聖人一一而筆之則何為不於宿男之下而加之名乎孟子言孔子作春秋作者創物之名書以見義而未嘗加損之也故曰其文則史其義則丘竊取之矣秋七月庚午宋公齊侯衛侯盟于瓦屋正傳曰書宋齊衛盟于瓦屋紀參盟也古者天下為公㑹同之禮制於天子無上命而私盟無道之甚者也然而彼善於此則有之參盟之謂也故書而紀之盖參則近於公然而非大道之世矣况無王者之制乎日與不日史記有詳畧此據列國之報而書之聖人遂因之而不削耳榖梁以為諸侯參盟之始故謹而日之胡氏從之皆非也左氏曰齊人卒平宋衛于鄭秋㑹于温盟于瓦屋以釋東門之役禮也愚曰吁曾是以為禮乎榖梁曰誥誓不及五帝盟詛不及三王交質子不及二伯胡氏曰程氏云宋為盟主與鄭絶也大道隐而家天下然後有誥誓忠信薄而人心疑然後有詛盟盟詛繁而約劑亂然後有交質子至是傾危之俗成民不立矣又曰周官設司盟掌盟載之法凡邦國有疑則請盟於㑹同聽命於天子亦聖人待衰世之意爾徳又下衰諸侯放恣其屢盟也不待㑹同其私約也不繇天子口血未乾而渝盟者有矣其末至於交質子猶有不信者焉春秋謹三盟善胥命美蕭魚之㑹以信待人而不疑也盖有志於天下為公之世凡此𩔖亦變周制矣愚謂世𫝊周官周公之書也然周公之世王道大行天下為公有朝覲㑹同之典無盟誓之事安得有司盟盟載之法吾以是知周官非盡周公之書也八月塟蔡宣公正傳曰書塟蔡宣公赴告隣國之大事諸侯有㑹塟之禮焉故書之然而同盟之義不及時之禮具可見矣卒名而塟不名告有詳畧史因書之耳公羊以卒名而塟不名卒從正而塟從主人謬矣榖梁曰月塟故也是皆以私窺經而反亂乎經之説也曷謂不及時之禮程子曰速也諸侯五月而塟不及期簡也愚謂此觀經考傳而自不可掩矣九月辛卯公及莒人盟于浮來正傳曰上瓦屋之盟既云日以為謹始則此日何為見諸儒説春秋之謬矣浮來莒邑也邑大夫耳書公及莒人盟于浮來譏私盟也譏非禮也私盟且不可况以諸侯下盟于大夫之邑乎甚非禮矣左氏曰以成紀好也愚謂此魯實志也公榖論稱人之指鑿矣程子曰鄰國之交講信修睦可也奚用盟為公屈己與臣盟義非安也胡氏以莒小國人微者而公與之盟故特言及以譏失禮且明非大夫之罪也愚謂及之為言上及下尊及卑之詞非以是為褒貶也若然則他所稱及者又將何謂耶螟正傳曰書螟紀災也程子曰為災也民以食為命故有災必書是也冬十二月無駭卒正傳曰無駭字羽父公子展之孫也書無駭卒重國之大夫故紀其變也左氏曰羽父請諡與族公問族於衆仲衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏公羊曰此展無駭也何以不氏疾始滅也故終其身不氏無駭之名未有聞焉或曰隐不爵大夫也或説曰故貶之也皆非也程子曰未賜族書名而已是也胡氏亦曰未賜族而身為大夫則稱名無駭挾之𩔖是也愚謂雖然亦當時史之書法如此耳桓王六年九年齊僖十七年普哀四年衛宣五年蔡桓侯封人元年鄭莊三十年曹桓四十三年陳桓三十一年杞武三十七年宋殤六年秦寧二年楚武二十七年春天王使南季來聘正傳曰南氏姓也季字也天子之大夫也書天王使南季來聘則天子違禮之非諸侯不恭之罪並可見矣榖梁以為聘諸侯非正非也諸侯不職而天子聘之乃不正也程子曰周禮大行人時聘以結諸侯之好王法之行時加聘問以懐撫諸侯乃常禮也春秋之時諸侯不修臣職朝覲之禮廢絶王法所當治也不能正典刑而反聘之又不見答失道甚矣胡氏曰古者諸侯於天子比年一小聘三年一大聘五年一朝天子於諸侯不可以若是恝故亦有聘問之禮焉隐公即位九年於此而史䇿不書遣使如周則是未嘗聘也亦不書公如京師則是未嘗朝也一不朝則貶其爵再不朝則削其地如隐公貶爵削地可也刑則不舉遣使聘焉其斯以為不正乎經書公如京師者一朝于王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知矣書天王來聘者七錫命者三歸脤者一賵塟者四則問於他邦及齊普秦楚之大國又可知矣王之不王如此征伐安得不自諸侯出乎諸侯之不臣如此政事安得不自大夫出乎君臣上下之分易矣陪臣執國命夷狄制諸夏矣其原皆自天王失威福之柄也愚謂春秋之取義盖見其微矣三月癸酉大雨震電正傳曰榖梁以為震雷也電霆也書癸酉大雨震電公羊曰記異也何異爾不時也愚謂非特不時也紀之示人以畏天變也孔子迅雷風烈必變人君之於天如子之於父母父母有大怒可不起敬起孝乎後皆倣此庚辰大雨雪正傳曰書庚辰大雨雪紀異也左傳曰三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以往為霖平地尺為大雪榖梁曰志疏數也八日之間再有大變隂陽錯行故謹而日之也雨月志正也愚謂所雨雪必有日雨雪不日而何日諸儒説經之謬皆此𩔖程子曰隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其説而不達其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也胡氏曰震電者陽精之發雨雪者隂氣之凝周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷巳出電巳見則雪不當復降而大雨雪此隂氣縱也夫隂陽運動有常而無忒凡失其度人為感之也今陽失節而隂氣縱公子翬之讒兆矣鍾巫之難萌矣春秋災異必書雖不言其事應而事應具存惟明於天人相感之際響應之理則見聖人所書之意矣愚謂聖人著其理而不論其應聖人立教公溥之心也若求某事得有某事休徵應某事失有某咎徵應此漢儒泥於災祥之説㡬於誣聖經誣上天矣挾卒正傳曰書挾卒紀大夫之大故也公羊曰挾者何吾大夫之未命者也夏城郎正傳曰書夏城郎譏之之義見矣左氏曰書不時也胡氏曰城者禦暴保民之所而城有制役有時大都不過三國之一邑無百雉之城制也魯嘗城費城郈其後復墮焉則越禮而非制矣凡土功龍見而戒事火見而致用水昏正而栽日至而畢時也隱公城中丘城郎而皆以夏則妨農務而非時矣城不踰制役不違時又當分財用平板榦稱畚築程土物議逺邇略基址揣厚薄仞溝洫具餱糧度有司量功命日不愆于素然後為之可也况失其時制妄興大作無愛養斯民之意者其罪之輕重見矣秋七月正傳曰無事亦書時月史之舊例也虚以待事其後因存之也榖梁曰無事焉何以書不遺時也愚謂恐非聖人之意也冬公㑹齊侯于防正傳曰書公㑹齊侯于防譏失禮之義見矣左氏曰宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公㑹齊侯于防謀伐宋也愚謂非王制㑹同之正而私㑹以私謀皆非禮也故史書以著其罪胡氏曰周官行人曰時㑹以發四方之禁此謂非時而合諸侯以禁止天下之不義也列國胡為有此名凡書㑹皆譏也謂非王事相㑹聚爾左傳稱宋公不王鄭伯以王命討之使來告命㑹于防謀伐宋也于中丘為師期也亦謂之非王事可乎曰以王命討宋而聽征討之禁於王都雖召陵之舉不及是矣始則私相㑹為謀於防中則私相盟為師期於鄭終則乗敗人而深為利以取二邑歸諸己奉王命討不庭者果如是乎經之書㑹書伐而不異其文以此桓王七年十年齊僖十八年普哀五年衛宣六年蔡桓二年鄭莊三十一年曹桓四十四年陳桓三十二年杞武三十八年宋殤七年秦寧三年楚武二十八年春王二月公㑹齊侯鄭伯于中丘正傳曰書公㑹齊侯鄭伯于中丘則㑹之非禮自可見矣左氏曰春王正月公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期愚謂朝覲㑹同之禮有王制焉非王制而行皆非禮也况為師期而㑹乎失禮之中又失禮矣夏翬帥師㑹齊人鄭人伐宋正傳曰書翬帥師㑹齊人鄭人伐宋如四年秋書翬帥師㑹宋陳衛伐鄭之文也左氏曰夏五月羽父先㑹齊侯鄭伯伐宋則擅興積久之罪著矣翬不稱公子齊鄭稱人史之詞有詳畧耳若翬之惡而稱公子則其罪益著何必去公子而後可誅之也信斯言也則至如不盡為人之道者不名曰人可乎多見其泥也公羊未免乎鑿而程胡二子襲之盖未之思耳六月壬戌公敗宋師于菅正傳曰菅宋地也書公敗宋師于菅譏敗人以不正也胡氏曰詐戰曰敗獨書公者左氏曰六月戊申公㑹齊侯鄭伯于老桃壬戌敗宋師于菅則是㑹齊鄭也魯為主故獨稱公或曰齊鄭後期公獨敗之敗未陣也夫及其未陣而敗之是以詐也是之謂不正辛未取郜辛巳取防正傳曰書取郜取防則其擅取之罪見矣書辛未辛已則其一月再取而擅取貪取之罪已甚矣夫諸侯之土地受之天子傳之先君各有其分而擅取之可乎非其有而有之可乎抑又有甚焉左氏曰庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我愚謂若然則是因人以敗人而已獨攘其利而取之可耻之甚者也故程子曰取二邑而有之盗也胡氏亦曰諸侯分邑非其有而有之盗也是矣然胡氏又有内大惡其詞婉小惡直書之説愚謂據事直書古之良史也若董狐南史何隐之有率非聖經取義之所闗不必如是之破碎支離也秋宋人衛人入鄭正傳曰程傳鄭勞民以務外而不知守其國故二國入之愚謂書宋人衛人入鄭著擅興反覆相攻之罪也夏鄭與齊魯伐宋秋宋與衛人伐鄭干弋相尋而王法不禁觀其所書而聖人之志可見矣宋人蔡人衛人伐戴鄭伯伐取之正傳曰戴小國也上書秋宋人衛人入鄭此書宋人蔡人衛人伐戴鄭伯伐取之並著列國交攻之罪也左氏曰秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭蔡人從之伐戴八月壬戌鄭伯圍戴癸亥克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗程子曰戴鄭所與也故三國伐之鄭戴合攻盡取三國之衆其殘民也甚矣愚謂由二傳觀之則宋衛入鄭將伐鄭而又與蔡伐戴以去鄭黨與而鄭戴内外交攻以取三國之師公榖反謂鄭因三國之力以取戴非其實矣夫三國伐鄭豈有鄭反與之伐戴乎胡氏又有鄭師素能以竒勝多方誤之起乗其弊之説以歸於卞莊子之術則不可知亦非經之本指而不必問也冬十月壬午齊人鄭人入郕正傳曰郕小國也書齊人鄭人入郕則強凌弱衆暴寡之罪見矣左氏曰蔡人衛人以郕人不㑹王命冬齊人鄭人入郕討違王命也程子曰討不㑹伐宋也胡氏曰左氏傳云宋不王鄭伯以王命致討而郕人不㑹齊鄭入郕討違王命也程子謂宋本以公子馮在鄭故二國交惡春秋不見其為王討也王臣不行王師不出矯假以逞私忿耳此説據經為合愚謂左氏於其時為近必得其真或非王命而假王命以令諸侯當五霸之時多如此而榖梁又泥入之一字為内弗受胡氏亦以為討違王命則不書入矣入者不順之詞則𩔖皆穿鑿之病而不知入者兵入其境而義自見耳不以此一字繫乎經義之得失也桓王八年十有一年齊僖十九年普哀六年衛宣七年蔡桓三年鄭莊三十二年曹桓四十五年陳桓三十三年杞武三十九年宋殤八年秦寧四年楚武二十九年春滕侯薛侯來朝正傳曰滕薛二小國也書滕侯薛侯來朝則不當朝而朝當朝而不朝與旅見非禮之義並見矣左氏曰春滕侯薛侯來朝争長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯愚謂此實傳也胡氏曰邦君為兩君之好有反坫周禮行人凡諸侯之邦交殷相聘世相朝也然謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰諸侯無禮義之交惟強弱之視以胡氏之言觀之則滕薛之来朝無合於中聘世朝之制是之謂不當朝而朝程子曰諸侯雖有相朝之禮而當時諸侯於天子未嘗朝覲獨相率以朝魯得為禮乎而胡氏亦曰列國於天子述所職者盖闕如也而自相朝聘可乎凡大國来聘小國来朝一切書而不削皆所以示譏以二傳而觀之是之謂當朝而不朝胡氏又曰滕薛二君不特言者又譏旅見也非天子不旅見諸侯偃然受之而不辭亦以見隐公之志荒矣由是觀之是之謂旅見之非禮三者於聖經取義之指並見之矣不必如公羊分别来朝二字之瑣碎而榖梁槩以天子無事諸侯相朝之為正亦非矣夏公㑹鄭伯于時來正傳曰時來鄭地左氏作郲書公㑹鄭伯于時來則非禮之㑹可見矣何為非禮之㑹非㑹同之正而為私謀也左氏曰夏公㑹鄭伯于郲謀伐許也鄭伯將伐許五月甲辰授兵于大宫公孫閼與潁考叔争車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒由是觀之則其為謀可知矣秋七月壬午公及齊侯鄭伯入許正傳曰前書公㑹此書公及則隐公搆怨擅伐之罪不可掩矣左氏曰秋七月公㑹齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故従君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞於許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使餬其口於四方其况能久有許乎吾子其奉許叔以撫柔此民也吾將使𫉬也佐吾子云云由是觀之則胡氏謂書㑹則伐許者本鄭志也書及則入許者公所欲也得之矣又曰隐公即位十有一年天王遣使來聘者再而未嘗朝于京師罪一也平王崩不奔䘮㑹塟至使武氏子來求賻罪二也禮樂征伐自天子出而擅興兵甲為宋而伐邾為鄭而伐宋罪三也山川土田各有封守上受之天王下傳之先祖而取郜及防入祊易許罪四也今又入人之國而逐其君罪五也凡此五不韙者人臣之大惡而隐公兼有之然則不善之殃豈特始於惠成於桓而隐之積惡亦不可得而揜矣冬十有一月壬辰公薨正傳曰書壬辰公薨紀國君之大變也左氏曰羽父請殺桓公將以求大宰隐公曰為其少故也吾將授之矣使營莵裘吾將老焉羽父懼反譛公於桓公而請弑之公之為公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弑公于寪氏立桓公而討寪氏有死者不書葬不成䘮也愚謂左氏謂不書葬不成䘮出於大變倉卒之際理或然也公榖程胡皆以為責臣下不能討賊之罪非也隐公弑也其稱薨者國史懾於勢而為諱之聖人因而存之耳而弑君之罪自不可掩矣胡氏曰隐公見弑魯史舊文必以實書其曰公薨者仲尼親筆也古者史官以直為職而不諱國惡仲尼筆削舊史斷自聖心於魯君見弑削而不書者盖國史一官之守春秋萬世之法其用固不同矣愚謂為君諱惡者本國臣子之事耳若春秋萬世之法正宜直書以誅弑君之賊而不書者非聖人改舊史之文也乃其威懾國史而諱之聖人因之而不加而其事自不可掩罪自不可逃矣春秋正傳卷三
