body:
  text: 春秋正傳卷五明湛若水撰桓公桓王十三年五年齊僖二十四年晉小子二年衛宣十二年蔡桓八年鄭莊三十七年曹桓五十年陳桓三十八年卒杞武四十四年宋莊三年秦寧九年楚武三十四年春正月甲戌己丑陳侯鮑卒正傳曰書陳侯鮑卒紀鄰國之大變也左氏曰於是陳亂文公子他殺太子免而代之公疾病而亂作是大變也其甲戌己丑二日卒者左氏以為亂作國人分散故冉赴非也再赴必有定日矣公穀皆以為陳侯以甲戌之日出亡以己丑之日死得之蓋不知其死之日故二日卒之春秋之義信以傳信疑以傳疑或彼以疑赴魯史以疑書聖人則因之而不改於此觀之則見春秋為魯史之文非聖人之改無疑矣夏齊侯鄭伯如紀正傳曰書齊侯鄭伯如紀罪齊鄭之邪謀也惟仁者為能以大字小齊鄭大國也不能字小反合謀以圖之其擅興陵暴之罪大矣左氏曰齊侯鄭伯朝于紀欲以襲之紀人知之公羊曰外相如不書此何以書離不言㑹也愚謂不言會而言如則左氏襲紀之言信矣程子曰齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣胡氏曰如者朝詞也尊不朝乎卑大不朝乎小紀之為紀微乎微者也齊在東州尊則方伯鄭亦大國也並驅而朝紀乃懷詐諼之謀欲以襲之而不虞紀人之覺也其志􅉃矣此外相如爾何以書紀人主魯故來告其事魯史承告故備書于䇿夫子修經存而不削者以小國恃大國之安靖已而乃包藏禍心以圖之亦異於興滅國繼絶世之義矣故存而不削以著齊人滅紀之罪明紀侯去國之由劉敞意林所謂聖人誅意之效是也天王使仍叔之子來聘正傳曰書天王使仍叔之子來聘著天王之失道也天王義見前當是時諸侯不修臣職以朝天子桓又篡弒之賊而不能誅又再聘焉其君道不立甚矣左氏曰仍叔之子弱也公羊曰天子之大夫也其稱仍叔之子者公榖程胡皆以為譏父老子代譏世官恐聖人取義之意在來聘而不在乎此也稱仍叔之子者仍叔為大夫已老其子未爵而承王命故不可稱官而稱仍叔之子如今侯伯之子為勳衛以入侍從者葬陳桓公正傳曰書葬陳桓公著與國之大事也吳氏曰不書月史失之也蓋他篡立而葬之也春秋亦有無所是非而史紀之者此之類也則夫泥字字而求之者未必一一然矣城祝丘正傳曰夏書城祝丘譏不時也高氏曰祝丘齊魯兩境上邑齊將襲紀公欲助紀而畏齊故非時城此以備之秋蔡人衛人陳人從王伐鄭正傳曰書蔡人衛人陳人從王伐鄭著征伐之非也蓋天子奉行天討者於諸侯一不朝則貶其爵再不朝則削其地三不朝則六師移之天子討而不伐鄭伯一不朝即屈萬乘之尊帥諸侯之師而伐之則非征伐之正矣左氏曰王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃于王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人况敢陵天子乎苟自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右愚謂觀此則王師之失伐可見矣公羊乃以從王以為正榖梁乃以舉從之者為天王諱伐鄭程子乃以不書敗諸侯不可敵王胡氏又以王奪鄭伯政而怒其不朝以諸侯伐焉非天討也故不稱天皆泥文之過也蓋書敗不書敗稱天不稱天皆當時國史之文也夫子未嘗改之而其事自不可掩矣大雩正傳曰書大雩則其僭禮之非與不時之舉皆可見矣然而僣禮之非則失時非所問左氏曰凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書是也然而末矣公羊以為旱祭也記災也誤矣何謂僣禮之非曰雩則可大雩則不可諸侯祭山川天子祭天地是故諸侯禱雨於境內之山川亦謂之雩天子則禱雨於天則謂之大雩魯桓以諸侯而僣天子之大雩以禱雨於天而又以秋而祭失時焉故春秋書以著其非程子曰成王尊周公故賜魯重祭得郊禘大雩大雩雩于上帝用盛樂也故夫子曰魯之郊禘非禮也周公其衰矣大雩嵗之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書胡氏曰魯諸侯而郊禘大雩欲悉書於䇿則有不勝書故雩祭則因旱以書而特謂之大郊禘亦因事以書而義自見是也又曰此皆國史所不能與愚謂國史書其實聖人取其義而存之而其非自見耳螽正傳曰螽蟲灾也以旱而生書螽記灾也榖梁曰螽蟲之灾也甚則月不甚則時程子曰螽蝗也既旱又蝗饑不在書也冬州公如曹正傳曰州者張氏以為畿內之地河內州縣也都淳于縣故稱淳于公書州公如曹紀諸侯之去國也左氏曰淳于公如曹度其國危遂不復榖梁曰外相如不書此其書何也過我也愚謂非也有報故史書之程子曰州公嘗為王三公故稱公不能保其國去如曹遂不復胡氏曰外相如不書此何以書將有其末故先録其本愚謂聖人之心過化存神無意必固我之私據事而書之耳而謂將有其末先録其本恐非聖人之心也桓王十四年六年齊僖二十五年晋小子三年衛宣十三年蔡桓九年鄭莊三十八年曹桓五十一年陳厲公躍元年杞武四十五年宋莊四年秦寧十年楚武三十五年春正月實來正傳曰書實來紀失國而來寓也左氏曰自曹來朝書曰實來不復其國也胡氏曰實者州公名也春秋之法諸侯不生名失地滅同姓則名正經世之本名正而天下定矣胡氏又分别或迫乎大國之間而失國以為不幸或驕奢淫暴自底滅亡以為自取故名與不名以待寓公之差等則吾未之敢信耳孟子以諸侯失國而託于諸侯為禮禮諸侯不臣寓公未聞分别其以何而失國而名之慢之也且實之為州公名未有所考左傳公榖皆未有明言而程子所謂名之來者又謂實不稱州亡其國也胡氏遂因之愚以文勢觀之上年冬書州公如曹此六年春正月書實來則州公將奔魯而先如曹今春乃實來也何等直截明白耶豈有冬尚稱公而春即稱實冬以國稱而春即以名稱冬尚為諸侯而春即為匹夫耶若論失國則自如曹已然矣不及逾時而名稱反易以為褒貶不亦惑甚矣乎聖人之心必不如是也夏四月公會紀侯于郕正傳曰郕公左作成魯地書公會紀侯于郕著恤小之義也左氏曰會于成紀來咨謀齊難也愚謂前此齊鄭欲襲紀而弗遂齊欲滅之故來咨謀于成而公會之也秋八月壬午大閲正傳曰書秋八月壬午大閲著不時也公羊以為以罕言者非也閲者左氏曰簡車馬也愚謂周之秋八月夏之夏六月也故程子曰盛夏大閲妨民害人失政之甚胡氏曰周制大司馬中冬大閲教衆庶修戰法獨詳于三時為農隙故也書八月不時矣以鼓則王執路鼓諸侯執賁鼓以旗則王載太常諸侯載旗以殺則王下大綏諸侯下小綏其禮固亦不同也書大閲非禮矣先王寓軍政于四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田狩而閲兵車厲農失政甚矣何以保其國乎蔡人殺陳他正傳曰書蔡人殺陳他著討賊之義也他陳君也程子曰他弒太子免而竊位不能有其國故書曰陳他他天下之大惡人皆得而誅之蔡侯殺之實以私也而書蔡人同于討賊之例見討賊者衆人之公也胡氏曰他弒太子而代其位至是踰年不成之為君者以賊討也書蔡人以善蔡書陳他以善陳善蔡者以蔡人知他之為賊善陳者以陳國不以他為君知其為賊故稱人稱人討賊之詞不以為君故稱名稱名當討之賊也愚謂但直書之則其惡自不可掩不待人不人名不名也九月丁卯子同生正傳曰書子同生謹嫡嗣之義也以月日著其所生之辰也左氏曰以太子生之禮舉之接以太牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德名為義以類命為𧰼取于物為假取于父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣公曰是其生也與吾同物命之曰同程子曰書子同生聖人所以正大本而防僣亂子同者桓之嫡長子也於其始生即書之其位固己定矣嫡冡之生國之大事故書胡氏曰傳子以嫡天下之逹禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也經書子同生所以明與子之法正國家之本防後世配嫡奪正之事垂訓之義大矣此世子也其不曰世子何也天下無生而貴者誓于天子然後為世子冬紀侯來朝正傳曰書紀侯來朝著失禮也朝聘以時非時而來朝假來朝以求助皆非禮也左氏曰請王命以求成于齊公告不能程子曰紀畏齊而來朝以求助也不能上訴于天子近赴于賢侯和輯其民效死以守而欲求援于魯桓是豈為國之道哉其不能保有終至於大去其國宜也胡氏曰魯桓者弒君之賊人人之所同惡夫人得而討之也而主之以求援其能國乎桓王十五年七年齊僖二十六年晋小子四年衛宣十四年蔡桓十年鄭莊三十九年曹桓五十二年陳厲二年杞武四十六年宋莊五年秦寧十一年楚武三十六年春二月己亥焚咸丘正傳曰咸丘邾婁之邑地名焚者焦林而獵也書春二月己亥焚咸丘譏田之非禮而不以時也程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也焚咸丘如盡焚其地見其廣之甚也胡氏曰易稱王用三驅在禮天子不合圍諸侯不掩羣夫子釣而不綱弋不射宿皆愛物之意也推此心以及物至於鳥獸若草木裕無淫獵之過矣書焚咸丘所謂焚林而田也夏穀伯綏來朝鄧侯吾離來朝正傳曰書榖伯綏來朝鄧侯吾離來朝兩著朝之非禮也古者諸侯四載一朝天子之國今二國臣職不修而逺來朝于逆賊之國非但非禮而又甚焉春秋書之所以誅其惡也左氏曰榖伯鄧侯來朝名賤之非也公榖以為失地失國之君亦非也史以其國小而逺微之故名之聖人又因來朝之非禮而助惡故存史之文以惡之耳胡氏曰春秋之法諸侯不生名榖伯鄧侯何以名桓天下之大惡也執之者無禁殺之者無罪穀伯鄧侯越國踰境相繼而來朝即大惡之黨也故特貶而書名與失地滅同姓者比焉愚謂法例皆後儒觀春秋者為之非聖經之明訓也且古人尚朴多相稱名如周公之于召公者又何耶夫不名者或一時禮際之冝而史者實萬世垂訓之典安得不名其或名或不名史書之詳略聖人因之耳程子又言桓之惡逆天子纍聘諸侯相繼而朝之亂天道嵗功不成故不具秋冬而不知史法必具時以書事其有不具者史逸之耳而天道嵗功周流萬古不息不為堯存不為桀亡豈有因一人之惡而遂闕其萬古不息之天道與嵗功哉蓋後儒所謂春秋法例者惑之雖程胡大儒未免如此桓王十六年八年齊僖二十七年晋侯緡元年衛宣十五年蔡桓十一年鄭莊四十年曹桓五十三年陳厲三年杞武四十七年宋莊六年秦寧十二年楚武三十七年春正月己卯蒸正傳曰書春正月己卯蒸紀常祭也國之大事在祀故紀之公羊以為譏亟瀆非也亟可以言之於夏再蒸而不可言之此也榖梁曰蒸冬事也春興之志不時亦非也程子曰冬蒸非過也書之以見五月又蒸為非禮之甚也胡氏曰按周官大司馬蒸以仲冬今魯蒸以春正其不同何也周書用周月以紀政而其言曰夏數得天百王所同其在商周革命改正示不相沿至於敬授民時巡狩蒸享猶自夏焉然則司馬中冬教大閲獻禽以蒸享所謂自夏而魯之蒸祭在春正月見春秋用周正紀魯事也而榖梁子乃曰蒸冬事也春興之志不時也是以閉蟄而蒸為是與周制異矣春秋非以不時志也為再蒸見瀆書也愚謂春秋書春正月而程子以為冬蒸非過何也蓋周正子為嵗首為月數之始夏正寅寅為嵗首為月數之始蓋謂之正月者以為正之月也義可見矣周之春正月即夏之冬十一月也蒸以物之收藏為祠故用之于夏十一月周之正月故曰非過也由是觀之則胡氏前謂魯蒸在春正月見春秋用周正紀魯事是也則夫謂三代正朔改而月數不改為謬明矣今據此經于子月而書曰春正月則見周之時正朔改而月數亦從之而改矣孔子曰行夏之時時謂春夏秋冬四時也而欲行夏時則四時于三代必有不同者矣舜巡狩協時月正日時亦謂四時月謂晦朔日謂甲乙而欲協之正之則時與月及日必有不同者矣蓋三陽之月皆可為嵗首則皆可以為春春者蠢也生物生意蠢蠢然動也今子月生意已動子月陽生之月故為嵗首而經書之曰春胡氏至此可以悟矣終不改其舊說何歟天王使家父來聘正傳曰天王者春秋天子之通稱家氏父字天子之大夫也書天王使家父來聘譏失道也禮諸侯四年一朝天子五年一聘今聘非其時又加于弒君之人故書之程子曰桓公弒立未嘗朝覲天王不討而屢使聘之失道之甚也胡氏曰下聘弒逆之人而不加貶何也既名冡宰于前其餘無責焉乃同則書重之義以此見春秋任宰相之專而責之備也云云又云歸賵仲子會葬成風則咺書名于前而王不稱天于後來聘桓公賜桓公命則宰紏書名以正其始王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而已矣愚謂胡氏常以一字觀春秋至于義同而字之褒貶不同則不得其說又從而為之詞皆此類也蓋聘弒君之賊則凡天王使之來與受命而來者皆可責何必獨責之于相又此王何以不去其天耶如其前後不一則亦不足以示貶矣夏五月丁丑蒸正傳曰周之夏五月即夏之春三月也書夏五月丁丑蒸見非時瀆祭之失禮也公羊曰蒸者何冬蒸也春曰祠夏曰礿秋曰嘗冬曰蒸常事此何以書譏亟也亟則瀆瀆則不敬疏則怠怠則忘公羊曰何以書譏亟也榖梁曰蒸冬事也春夏興之黷祀也志不敬也程子曰正月既蒸矣而非時復蒸者必以前蒸為不備也其黷亂甚矣秋伐邾正傳曰書伐邾著桓公凌暴之罪也春秋無善戰凡非奉王命而行討者皆不義之兵也桓篡立不能修臣職而朝王反受列國之朝又肆其橫兵而伐邾以强凌弱以衆暴寡其為惡極矣故春秋書之以著其罪冬十月雨雪正傳曰雨者從天而下之稱也書冬十月雨雪史記天時之異也公羊曰何異爾不時也程子曰建酉之月未霜而雪書異也夫建酉之月夏時之八月也于夏時為中秋今魯史以周時書之曰十月則三代正朔與四時月數皆改可知矣胡氏所謂正朔改而月數不改之謬益可知矣王氏曰隂陽方中而寒氣先至此積隂侵陽之𧰼也是也祭公來遂逆王后于紀正傳曰祭公王之三公也故稱公遂者公羊以為繼事之詞也書祭公來遂逆王后于紀著逆后之非禮也左氏以為禮非也何謂非禮曰不專其為逆后也禮重大昏后者承宗廟之嗣以為萬世本先之以媒介申之以采聘所以重其事以重宗廟之嫡也祭公來謀於魯若朝會于魯然且以宗廟之重事謀於弒逆之賊乃因而往紀以逆后焉其為輕瀆甚矣程子曰祭公受命逆后因過魯遂行朝會之禮聖人深罪之故書其來使若以朝魯為主而逆后為遂也桓王十七年九年齊僖二十八年晋緡二年衛宣十六年蔡桓十二年鄭莊四十一年曹桓五十四年陳厲四年杞靖公元年宋莊七年秦出子元年楚武三十八年春紀季姜歸于京師正傳曰書春紀季姜歸于京師重王后于歸之始也左氏曰凡諸侯之女行惟王后書京師王者所居衆大之稱始稱王后而此稱紀季姜者自王朝往逆而言則謂之王后自紀國于歸而言則謂之季姜於往逆之時而稱王后所以定名分于始于于歸之際而稱季姜所以著名實于終互文見義使知所謂王后乃季姜也更無他褒貶抑揚之意後儒多以己意窺聖經而無達觀之心是以往往橫生議論如書春不書月程子則以為書王國之事不用無王之月故書時而已書季姜而不書王后則程子以為諸侯莫至是不能母天下故書紀女歸而已胡氏則以為自歸者而言則當樛屈逮下使婦嬪皆得進御于君而無嫉妬之心故從父母所子而稱季姜何其迂逺而費於詞也惟公羊言自我紀父母之于子雖王后猶曰吾季姜為近理愚謂謂之歸者自紀而言未至之詞也程子云王后之歸胡氏云既歸則是自己至京師而言所以不明也夏四月秋七月正傳曰此國史具時月以紀事之例當時必有其事今逸其傳矣然則史之闕文者尚多愚嘗謂夫子不削魯史之文于此類可考而知也冬曹伯使其世子射姑來朝正傳曰射姑曹世子名書曹伯使其世子射姑來朝著失禮也有朝王之定期有會同之定期則或諸侯有病不得己使世子往者朝桓非有會同之期不得己之事而使世子以代之既為失禮而汲汲焉以朝弒君之人是失禮之中又失禮焉故春秋書之左氏曰冬曹太子來朝賓之以上卿禮也享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也愚謂是其實事也公穀又有辨言朝字言使字之義則愈分析矣程子曰曹伯有疾不能親行故使其世子來朝春秋之時君疾而使世子出取危亂之道也胡氏曰按周官典命凡諸侯之嫡子誓于天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出會朝聘之儀矣然攝其君繼子男者謂諸侯朝于天子有時而不敢後故老疾者使世子攝己事以見天子急述職也諸侯閒於王事則相朝其禮本無時曹伯既有疾何急于朝桓而使世子攝哉大位姦之窺也危病邪之伺也世子君之二也君疾而儲副出啓窺伺之心危道也當享而射姑歎踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲已矣則方命矣曰孝子盡道以事其親者也不盡道而苟焉以從命為孝又焉得為孝故尸子曰夫巳多乎道愚謂二公前一截所論正也後一截論危道乃經外之意桓王十八年十年齊僖二十九年晋緡三年衛宣十七年蔡桓十三年鄭莊四十二年曹桓五十五年卒陳厲王年杞靖二年宋莊八年秦出子二年楚武三十九年春王正月正傳曰春者建子之月王正月見前書春王正月國史表年書事之法非别有取義自桓三年以後不稱王胡氏諸儒以為桓無王愚于前經辨之詳矣夫既三年以後見桓無王則元年二年何以有王今十年而又有王何其前後與中間之不一耶胡氏不得其說則又以為十年數之盈天道之周至是桓已見誅于天人故書王紀常理也豈通論耶又舉習于榖梁者見二年書王以為正與夷之卒見此書王以為正曹伯終生之卒而皆以為誤是徒知習榖梁者之非而不知己之附會支吾之為非也庚申曹伯終生卒正傳曰庚申即上文春王正月之庚申日也終生曹桓公名名之亦非貶也書庚申曹伯終生卒重鄰國之大變有赴則書也榖梁以為桓無王其曰王正終生之卒非也夫天道不能一日而不運天下不可一日而無王史者垂世之典非為一人而作也則不可為一人而無天不可為一人而無王也諸儒之說皆謬矣夏五月葬曹桓公正傳曰書夏五月葬曹桓公著葬之得禮也桓公春正月庚申卒至是夏五月而葬禮也禮諸侯五月而葬何以書有赴報則史書之聖人存之而竊取之義則在褒合禮也秋公會衛侯于桃丘弗遇正傳曰桃丘衛地名書公會衛侯于桃丘弗遇著失舉也夫會同自有定制定期非制非期而為會是妄舉也宜乎人之不信而不遇矣故公羊以為弗遇公不見要謂衛不要之也榖梁以為志不相得胡氏謂衛初約魯會于桃丘至是中變而從齊鄭于是乎有郎之師皆是也至于弗之一字不過猶言不耳榖梁以為內詞胡氏以為遷詞豈非穿鑿之弊耶胡氏又以為桃丘之弗遇惡衛之失信恐亦非也使衛人果來赴約此會猶為非禮耳非聖人之所取此固不足深論也冬十有二月丙午齊侯衛侯鄭伯來戰于郎正傳曰郎者魯近邑也書齊侯衛侯鄭伯來戰于郎著三國之擅興越境以伐人也左氏曰齊衛鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師于齊齊人以衛師助之故不稱侵伐先書齊衛王爵也程子曰左氏載其事曰我有辭也我則有禮彼悖道縱欲而以興戎故特曰來戰以三國為主甚其惡也胡氏曰春秋加兵于魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也兵凶器戰危事聖人之所重也誅暴禁亂敵加于己蓋有不得已而應之者矣未有悖道縱欲得已不己而先之者也魯桓弒立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼會于稷以濟其姦曽不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰於魯境尚為知類也哉此春秋之所必誅而不以聽也故以三國為主而書來戰于郎鄭人主兵而首齊猶衛州吁主兵而先宋愚謂此說是也至於公穀皆有內不言戰言戰則敗之說不言及者為內諱之說則鑿矣春秋正傳卷五
