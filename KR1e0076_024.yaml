body:
  text: 春秋正傳卷二十四明湛若水撰成公簡王六年十有一年晉厲公州蒲元年齊靈二年衛定九年蔡景十二年鄭成五年曹宣十五年陳成十九年杞桓五十七年宋共九年秦桓二十五年楚共十一年呉壽夢六年春王三月公至自晉正傳曰書公至自晉著危辱也君舉必書況成公如晉留晉者九月危且辱焉故書之左氏曰晉人以公為貳於楚故止公公請受盟而後使歸愚按孔子曰恭近於禮逺恥辱也成公於晉侯之喪不計同盟之不至而遽以奔弔恭而非禮矣宜乎其見止於晉脇其送塟又脇其受盟而後遣之歸危辱甚矣故春秋書至使人可考而知以為戒也晉侯使郤犨來聘己丑及郤犨盟正傳曰聘來莅盟也書晉侯使郤犨來聘及郤犨盟非禮也夫聘者邦交之大禮所以通誠信而睦鄰國也郤犨之來為莅盟也非聘也以莅盟而聘則誠信何在臣與君盟則禮義何在況成公以奔喪至晉止之而使送𦵏又留之九月而脇之盟及歸而莅盟之使至矣晉之無道如此無或乎諸侯之不服也已左氏又載郤犨來聘求婦於聲伯聲伯奪外妹嫁施孝叔之婦以與之若其事可信則亦可以見魯國君臣之無道宜乎其屢見窘辱於人也已夏季孫行父如晉正傳曰書季孫行父如晉志拜盟也非禮也左氏曰季文子如晉報聘且莅盟也愚謂名為報聘實拜盟耳非莅盟也魯人屈於晉亦已甚矣安能致晉之與涖盟乎夫兩下之勢相當彼此有欲盟之心曰涖盟可也晉之勢視魯之卑屈目中已無魯矣安肯復許之涖盟乎秋叔孫僑如如齊正傳曰書叔孫僑如如齊志聘禮也左氏曰秋宣伯聘于齊以修前好愚謂聘問之禮諸侯所以通誠敬而睦隣國也晉不修禮義諸侯稍畔之成公盡禮屢見窘辱乃捐歸汶陽之忿修前日之好故使僑如徃聘春秋大釋怨亦在所與也冬十月正傳曰無事亦書時月史法也簡王七年十有二年晉厲二年齊靈三年衛定十年蔡景十三年鄭成六年曹宣十六年陳成二十年杞桓五十八年宋共十年蔡桓二十六年楚共十二年呉夀夢七年春周公出奔晉正傳曰周公名楚天子之三公也何以書左氏曰王使以周公之難來告書曰周公出奔晉凡自周無出周公自出故也愚謂君臣之義無所逃於天地之間者也況王者無外將焉逃乎背君無上之罪不可逃矣胡氏曰按左氏周公楚惡恵襄之偪且與伯輿争政不勝怒而出王使劉子復之盟于鄄而入三日復出奔晉夫人主無誠慤之心而下要大臣盟是謂君不君人臣無忠信之實而上與人主盟是謂臣不臣既以要質鬼神以入矣又叛盟失信而出奔則是自絶于天也夏公㑹晉侯衛侯于瑣澤正傳曰書公㑹晉侯衛侯于瑣澤善之也左氏以為㑹于瑣澤成故也成也者平也信斯言也則三國平而諸侯睦矣怨釋而和睦以息人民春秋之所善也按左氏載宋合楚晉之盟不見於經此華夷之大閑豈聖人削之而不書乎其不足據信矣秋晉人敗狄于交剛正傳曰交剛狄地名書晉人敗狄于交剛志攘夷之兵也左氏曰狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛夫帝王之待逺人固有道矣來則驅之去則勿逐此舉也晉非先加于狄狄來侵而驅之耳猶為得御夷之道然至于其地則逺矣故春秋書之冬十月正傳曰無事亦書時月義見于前簡王八年十有三年晉厲三年齊靈四年衛定十一年蔡景十四年鄭成七年曹宣十七年卒陳成二十一年杞桓五十九年宋共十一年秦桓二十七年楚共十三年呉壽夢八年春晉侯使郤錡來乞師正傳曰書晉侯使郤錡來乞師則貪憤之非自見矣程子曰不以上命興諸侯師故書乞胡氏曰晉主夏盟行使諸侯徴㑹討貳誰敢不從以霸主之尊而書曰乞師何也列國疏封雖有大小土地甲兵受之天子不相統屬魯兵非晉所得專也今晉不以王命興諸侯之師故特書曰乞以見其卑伏屈損無自反而縮之意矣聖人作春秋無不重内而輕外至於乞師則内外同辭者盖皆有報怨復讐貪得之心是以如此若夫誅亂臣討賊子請於天王以大義驅之誰不拱手以聴命何至於乞哉噫此聖人所以垂戒後世見諸行事之深切著明者也愚謂其行人之來詞本稱乞故史書乞聖人筆之春秋盖深賤之其竊取之義見矣非仲尼特書乞也左氏曰晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為三月公如京師正傳曰書公如京師譏之也夫公如京師則朝王可知矣而不言朝王者志不在朝王也非朝覲之正也夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦正傳曰書公自京師遂㑹諸侯伐秦則尊王之義微而擅伐之罪著矣言自京師者聖人寓尊王之義也言遂㑹諸侯伐秦者見在京師可以請王命與諸侯奉討矣而遂私㑹諸侯以伐秦焉非擅伐而何以其冒擅伐之罪而知其無上之心非尊王之義矣左氏曰公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦夏四月戊午晉侯使吕相絶秦云云君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成徳是用宣之以懲不一諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聴命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大恵寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒鍼為右孟獻子曰晉帥乘和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父師遂濟涇及侯麗而還迓晉侯于新楚程子曰不書朝王因㑹伐而行也故不成其朝以伐秦為遂事明朝為重胡氏曰諸侯每嵗侵伐四出未有能備朝覲之禮者今公欲㑹伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因㑹伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也古者諸侯即位服喪畢則朝小聘大聘終則朝巡狩于方嶽則朝觀春秋所載天王遣使者屢矣十二公之述職葢闕如也獨此年書公如京師又不能成朝禮不敬莫大焉君臣人道之大倫而至於此極故仲尼甞喟然嘆曰夷狄之有君不如諸夏之亡也為此懼作春秋或抑或縱或予或奪所以明君臣之義也至矣其義得行則臣必敬於君子必敬於父天理必存人欲必消大倫必正豈曰小補之哉此以伐秦為遂事之意也曹伯盧卒于師正傳曰盧曹伯名書曹伯盧卒于師榖梁云傳曰閔之也公大夫在師曰師在㑹曰㑹愚謂榖梁稱傳曰則當時相傳别有傳而今亡矣左氏曰曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年秋七月公至自伐秦正傳曰書公至自伐秦謹君之出入也然據事而觀則見公之如京師非朝王也伐秦也可知矣冬塟曹宣公正傳曰書冬塟曹宣公志同盟之大事也諸侯有相恤之禮赴至故書之榖梁曰塟時正也左傳曰冬塟曹宣公既塟子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑簡王九年十有四年晉厲四年齊靈五年衛定十二年卒蔡景十五年鄭成八年曹成公負芻元年陳成二十二年杞桓六十年宋共十二年秦桓二十八年卒楚共十四年呉壽夢九年春王正月莒子朱卒正傳曰書莒子朱卒志與國之大故也夏衛孫林父自晉歸于衛正傳曰林父良夫之子書衛孫林父自晉歸于衛則其出其歸而其君臣之非並見矣按左氏公惡孫林父林父出奔晉但言惡不言得罪之由是私惡之使出也林父不思世卿無去國之義而遽出奔晉則臣之出與君之出之皆非矣定公不念宗卿之嗣而追復之至於畏晉而納焉林父亦無君命而倚晉之强以納歸于衛是臣之歸與君畏晉納而歸之皆非矣左氏曰衛侯如晉晉侯强見孫林父焉定公不可夏衛侯既歸晉侯使郤犨送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之愚謂觀此則其是非較然矣秋叔孫僑如如齊逆女正傳曰書叔孫僑如如齊逆女志昬禮也昬禮人道之始也左氏曰宣伯如齊逆女稱族尊君命也愚謂或疑公不親逆而使同姓之卿為非然而國君守社稷如使卿逆之至境内為舘以行親迎焉何不可之有鄭公子喜帥師伐許正傳曰書鄭公子喜帥師伐許志憤怨之兵也左氏曰八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封愚謂此則鄭之强陵許之弱一伐再伐卒入其郛其虐甚矣九月僑如以夫人婦姜氏至自齊正傳曰書僑如以夫人婦姜氏至自齊譏非正始之義也夫親迎所以正始也如卿迎之至境君親迎於境上之舘而後成其為婦為夫人可也今卿迎之至是則婦夫人成之於不親迎矣胡氏曰娶于他邦而道里或逺必親迎乎以封壤則有大小以爵次則有尊卑以道途則有逺邇或迎之於其國或迎之於境上或迎之於所舘中禮之節可也冬十月庚寅衛侯臧卒正傳曰臧衛侯名書庚寅衛侯臧卒志鄰國之大故也諸侯有相恤之禮焉具時月日者赴之詳耳左氏曰衛侯有疾使孔成子寗惠子立敬姒之子衎以為太子冬十月衛定公卒夫人姜氏既哭而息見太子之不哀也不内酌飲嘆曰是夫也將不唯衛國之敗其必始於未亡人嗚呼天禍衛國也夫吾不獲鱄衎之異母弟也使主社稷大夫聞之無不聳懼孫文子自是不敢舎其重器於衛盡寘諸戚而甚善晉大夫秦伯卒正傳曰書秦伯卒志盟主之大故也不名者赴不以名也然則史之書皆縁報赴之詳畧矣簡王十年十有五年晉厲五年齊靈六年衛獻公衎元年蔡景十六年鄭成九年曹成二年陳成二十三年杞桓六十一年宋共十三年卒秦景公元年楚共十五年呉夀夢十年春王二月塟衛定公正傳曰書塟衛定公志鄰國之大事也諸侯五月而塟同盟至有㑹塟之禮焉來赴故書之三月乙巳仲嬰齊卒正傳曰書仲嬰齊卒志國卿之大故也腹心手足其欣戚一體也公羊曰仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使于晉而未反何以後之叔仲惠伯傅子赤者也文公死子幼公子遂謂叔仲惠伯曰君㓜如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何㓜君之有公子遂知其不可與謀退而殺叔仲惠伯殺子赤而立宣公宣公死成公㓜臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎於是遣歸父之家然後哭君歸父使乎晉還自晉至檉聞君薨家遣墠帷哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也胡氏曰嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣愚謂二傳之論仲嬰齊皆誤矣夫為後與為子不同為後則繼其世緒兄弟猶可以相及為子則續其嗣昭穆不可以相紊公羊謂為人後者為之子非也而胡氏以為亂昭穆之序失父子之倫亦非也如使兄弟相繼為父子則殷之兄弟相繼四世其長兄将不稱為髙祖乎亂倫之大者也據公羊傳諸大夫稱仲遂為仲氏則見嬰齊之父襄仲賜氏世卿子孫因以為族故嬰齊書仲諸大夫稱仲氏正也故魯人以弟後兄非以弟嗣兄也觀春秋之經不與稱公孫斷可見矣癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚正傳曰書公㑹諸侯世子大夫同盟于戚善其㑹也討曹伯負芻之簒弑也程子曰十三年曹伯卒于師負芻殺太子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣愚謂㑹者㑹諸侯也㑹盟者方㑹同盟而未盟執之於㑹也執然後與諸侯盟共聲其罪也不動干戈而罪人斯得不虐其民不貪其有斯春秋善之矣晉侯執曹伯歸于京師正傳曰曹伯負芻也負芻負簒弑之罪諸侯討之而春秋猶爵而不名者可見春秋因魯史之文而非聖人増損其字以為與奪矣他倣此書晉侯執曹伯歸于京師志伯討也善其尊王之義也夫負芻初弑立諸侯請討之晉以其役之勞請俟他年則志固欲討之矣今以㑹而召之執于㑹又歸于京師殺之于天吏焉是下不虐民上能尊王得春秋之義者也左氏曰春㑹于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也凡君不道於其民諸侯討而執之則曰某人執某侯不然則否諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋胡氏曰稱侯以執伯討也何以為伯討晉合諸侯伐秦曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其太子而自立至是晉侯執之又不敢自治而歸于京師使即天刑夫是之謂伯討春秋執諸侯者衆矣未有執得其罪如此者故獨書其爵愚謂胡氏稱侯書爵惑矣然則稱曹伯亦爵也能充其類乎葢史稱曹伯故亦書晉侯執其善不待書爵而自見矣是討也諸侯皆在何以獨書晉侯葢晉侯之志也前年云請俟他年已定之矣公至自㑹正傳曰書公至自㑹志反面之禮也始終乎㑹之善也夏六月宋公固卒正傳曰固宋公名諡共公書卒志與國之大故也楚子伐鄭正傳曰書楚子伐鄭志猾夏之師也鄭葢嘗從楚矣何以謂之夏晉楚同盟而鄭已反為夏矣楚背盟而猾夏故春秋書以誅之左氏曰楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰愚謂夫義利之本也楚舎其義而惟利圖未有不反受害者也秋八月庚辰塟宋共公正傳曰書秋八月庚辰塟宋共公志與國之大事也來赴必徃塟故書之禮諸侯五月而塟同盟至況共姬之親乎宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚正傳曰書宋華元出奔晉宋華元自晉歸于宋善出入之正也書宋殺其大夫山誅背族也書魚石出奔楚著逸黨也左氏曰秋八月塟宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向􅙮為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向􅙮魚府出舎于睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今将馳矣登丘而望之則馳騁而從之則决睢澨閉門登陴矣左師二司冦二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司冦以靖國人胡氏曰宋六卿魚氏蕩氏向氏鱗氏皆桓族也華氏戴族也華元為右師魚石為左師蕩氏汰而驕共公卒已𦵏蕩澤弱公室殺公子肥華元以不賴寵而出奔以國人與晉皆許之討而後入正可知矣蘇轍謂使元懐禄顧寵重於出奔則不能討此説是也然山以負背族之罪而見殺乃其所也胡氏乃又謂山背其族故不書氏是惑於左氏之説而不知山之罪不係去其氏而後見矣冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹呉于鍾離正傳曰鍾離楚地近呉書㑹諸侯㑹呉于鍾離則華夷之勢可見矣中國弱而夷狄强也而聖人嘆世之情著矣公羊有殊㑹呉外呉之説穀梁有㑹又㑹外之之説皆非也程子曰呉益强大求㑹于諸侯諸侯之衆往而從之故書諸國往與之㑹以見夷狄盛而中國衰也時中國病楚故與呉親襄十年柤之㑹十四年向之㑹與此同愚謂此説得之矣胡氏曰殊㑹有二義㑹王世子于首止意在尊王室不敢與世子抗也㑹呉于鍾離于柤于向意在賤夷狄而罪諸侯不能與之敵也夫以太伯至徳是始有呉以族言之則周之伯父也至其後世遂以號舉者以其僣竊稱王不能居中國之爵號耳成襄之間中國無霸齊晉大國亦皆俛首東向而親吴聖人盖傷之故特殊㑹可謂深切著明矣愚謂殊㑹號舉之説義例之弊也盖呉無念爾祖太伯之至徳蔑棄禮義僣竊稱王又在荒逺不能自進於中國故畧之耳許遷于葉正傳曰葉汝州葉縣近楚書許遷于葉閔小國之失守也左氏曰許靈公畏偪于鄭請遷于楚辛丑楚公子申遷許于葉張氏曰中國盟主不能安小國而使之昵荆楚以求安春秋深以著小國之失所也李氏曰許以此年遷葉昭九年遷夷十八年遷白羽定四年遷容城皆避鄭也又二年而滅於鄭㳺速矣觀其所主而成敗見許之逃中國而主楚其亦不善擇所從哉簡王十一年十有六年晉厲六年齊靈七年衛獻二年蔡景十七年鄭成十年曺成三年陳成二十四年杞桓六十二年宋平公成元年秦景二年楚共十六年呉壽夢十一年春王正月雨木氷正傳曰書春王正月雨木氷公羊曰雨木氷者何雨而木氷也何以書記異也榖梁曰傳曰根枝折胡氏曰雨木氷者雨而木氷也何休曰木者少陽㓜君大臣之象氷者凝隂兵之類也氷脅木者君臣將執於兵之徴未㡬而有沙隨苕丘之事天人之際休咎之應焉可誣也而欲盡廢五行傳亦過矣程子曰春秋所書災異皆天人響應但人以淺狹之見以為無應其實皆應之然漢儒書灾異皆牽合不足信儒者見此因盡廢之夏四月辛未滕子卒正傳曰滕子左氏以為滕文公以世次考之孟子時滕文公為世子則左氏之説未可據信也鄭公子喜帥師侵宋正傳曰書鄭公子喜帥師侵宋著不義之兵也鄭附中國善徙義矣旋復變於楚以侵宋境豈非所謂下喬木入幽谷乎左氏曰鄭子罕伐宋宋将鉏樂懼敗諸汋陂退舍於夫渠不儆鄭人覆之敗諸汋陂獲將鉏樂懼宋恃勝也由是觀之鄭乘宋之不儆潜師掠境為盜賊之計是乆從於楚化於夷矣六月丙寅朔日有食之正傳曰書日有食之志天變也晉侯使欒黶來乞師正傳曰書晉侯使欒黶來乞師著貪勝之罪也左氏曰晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守郤犨如衛遂如齊皆乞師焉欒黶来乞師孟獻子曰有勝矣愚謂孟獻子以欒黶來乞師卑讓有禮而知晉兵之有勝則唯禮可以勝人之兵謙受益天之道也雖然晉人以兵力之不足而乞師於魯以决勝而遂其志得非貪勝乎甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績正傳曰晦者晦㝠也兵慘之象書晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績志攘夷之兵也敗績言楚子而不言師言鄭師而不言伯互文以見楚鄭之君親行師而敗績也胡氏以為不書楚師敗績以其君親集矢於目而身傷為重則誤矣左氏曰戊寅晉師起鄭人聞有晉師使告于楚姚句耳與徃楚子救鄭過申子反入見申叔時曰師其何如對曰徳刑詳義禮信戰之器也戰之所由克也今楚内棄其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紆憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰今我避楚益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三疆服矣敵楚而已唯聖人能内外無患自非聖人外寧必有内憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范匄趨進曰塞井夷竈陳於軍中而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也伯州犂以公卒告王苖賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之癸巳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝及戰射共王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命晉韓厥從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之餘從之乗而俘以下郤至曰傷國君有刑亦止石首曰衛懿公惟不去其旗是以敗於滎乃内旗於弢中楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再𤼵盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷欒鍼見子重之旌請攝飲焉公許之使行人執榼承飲造於子重曰寡君乏使使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓旦而戰見星未巳子反命軍吏察夷傷補卒乗繕甲兵展車馬鷄鳴而食惟命是聴晉人患之苖賁皇狥曰蒐乗補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有徳之謂也胡氏曰當是時兩軍相抗未有勝負之形晉之㨗也亦幸焉爾幸非持勝之道范文子所以立於軍門有聖人内外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譛而誅三郤國内大亂聖人備書以見行事之深切著明也愚謂晉之攘楚鄭是矣然帝王之兵以全取勝其禦夷狄來則驅之去則勿逐胡氏獨取范文子之謀萬全之䇿葢得之矣楚殺其大夫公子側正傳曰側子反名書楚殺其大夫側非其殺也而其覆師之罪擅殺之惡並著矣左氏曰楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒愚謂按此則側服亡師之罪矣楚子以言激側側是以死此春秋所以書殺而罪其擅專也方楚師之初出申叔以徳刑詳義禮信告諸子反䇿楚之必敗曰吾不復見子矣是敗師者子反也所以致敗者非子反也惜乎子反平時既不以六事事其君以明其政刑臨大事又醉於榖陽豎之獻飲君召之謀而不能見以致宵遁敗師而身死可鑒也己秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公正傳曰初言公㑹諸侯于沙隨又言不見公者初公約㑹及㑹而晉不見之也何以書著晉之侈心無禮也夫鄭之從楚楚之背晉與諸侯一伐之亦可以已矣連兵搆怨禍無已時非侈心乎魯侯既與約㑹而不見非無禮乎何以盟中國也左氏曰戰之日齊國佐髙無咎至于師衛侯出于衛公出于壊隤宣伯叔孫僑如通于穆姜欲去季孟而取其室將行穆姜送公而使之逐二子公以晉難告曰請反而聴命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫儆備設守而後行是以後使孟獻子守于公宫秋㑹于沙隨謀伐鄭也宣伯使告郤犨曰魯侯待于壊隤以待勝者郤犨將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公於晉侯晉侯不見公愚謂觀此則不見公者以譛也程子曰晉怒公之後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直故不足恥也胡氏曰以仁禮存心而不憂横逆之至者也沙隨之㑹魯有内難師出後期所當恤者晉人聴叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也昔曾子嘗聞大勇於夫子曰自反而縮雖千萬人吾徃矣孟子言浩然之氣至大至剛以直養而無害則塞于天地之間沙隨之不見於公何歉乎直書而不諱者示天下後世使知大勇浩然之氣所以守身應物如此其垂訓之義大矣公至自㑹正傳曰書公至自㑹謹君之出入也君出入必書禮也公㑹尹子晉侯齊國佐邾人伐鄭正傳曰尹子杜氏以為王卿士子爵書公㑹尹子晉侯齊國佐邾人伐鄭則擅興結怨之罪見矣曹伯歸自京師正傳曰書曹伯歸自京師著逸刑也曹伯負芻弑太子而自立晉帥諸侯㑹而執之歸于京師可謂討有罪矣天子不能正之以王法釋而歸之可謂無王法矣左氏曰曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出愚謂子臧嘗為臣者義則然矣晉侯不思率諸侯而執之者何心又許吾歸而君為請於王而釋之者又何心也此之謂失本心當是時人欲横流天理絶滅良心死矣榖梁曰出入不名以為不失其國非也程子曰自京師王命也胡氏曰書天王之釋有罪也善不蒙賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執寘諸刑典而使復國則無以為天下之共主矣九月晉人執季孫行父舎之于苕丘正傳曰書晉人執季孫行父舎之于苕丘善其舎也紀其舎而罪其執也左氏曰宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有二矣魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉郤犨曰苟去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而恵徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之宻邇仇讐亡而為讐治之何及郤犨曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不貳圖其身不忘其君若虚其請是棄善人也子其圖之乃許魯平赦季孫愚謂觀此𫝊則晉初聴僑如之譛葢將執行父而殺之矣及從聲伯之請而舎之于苕丘可謂能悔過以反於正也已冬十月乙亥叔孫僑如出奔齊正傳曰書叔孫僑如出奔齊志罪人之逸也髙氏曰季孫得釋將與公偕歸故僑如懼罪而出奔魯人立其弟豹以為叔孫後夫將作難以亂魯國者僑如也故書出以出之立其弟以絶之十有二月乙丑季孫行父及晉郤犨盟于扈正傳曰書季孫行父及晉郤犨盟于扈善釋怨也夫晉人執行父曲在晉也行父不以為怨而與之盟可謂善釋怨者也春秋善釋怨故書以與之公至自㑹正傳曰此云㑹者言㑹諸侯以伐鄭也書公至自㑹志反面之禮也乙酉刺公子偃正傳曰偃鉏二公子公之庶弟也書刺公子偃殺無罪也夫偃若有罪自當聲其罪與衆棄之乃刺之是為盜賊之計耳書其刺則偃無罪可聲亦可知矣胡氏曰按左氏宣伯通於穆姜欲去季孟而取其室戰于鄢陵之日公將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壊隤申宫儆備設守而後行是以後使孟獻子守於公宫宣伯使告郤犨曰魯侯待于壊隤以待勝者郤犨取貨于宣伯而訴公于晉侯晉侯不見公公㑹諸侯伐鄭將行姜又命公如初公又申守而行宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也不然歸必叛晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉郤犨曰苟去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何乃許魯平赦季孫出叔孫僑如而盟之季孫及郤犨盟于扈歸刺公子偃愚謂觀此則刺偃季孫為之也與郤犨盟而歸刺之孰謂季孫為魯之忠良乎簡王十二年十有七年晉厲七年齊靈八年衛獻三年蔡景十八年鄭成十一年曹成四年陳成二十五年杞桓六十三年宋平二年秦景三年楚共十七年呉壽夢十二年春衛北宫括帥師侵鄭正傳曰書衛侵鄭則連兵結怨之罪見矣左氏曰春王正月鄭子駟侵晉虚滑衛北宫括救晉侵鄭至于髙氏愚謂觀此則衛之侵鄭連兵結怨互相報復而不恤其民則將何所紀極乎此聖人書於春秋之深意也夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭正傳曰書公㑹諸侯伐鄭志黷武也夫鄭之從楚背中國固有罪矣鄢陵之敗鄭不悛十六年秋諸侯再㑹伐之今十七年春又㑹伐之糜爛其民而不恤可謂黷武甚矣故春秋惡之左氏曰夏五月鄭太子髠頑侯獳為質於楚楚公子成公子寅戍鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至于曲洧愚謂鄭之屢從楚諸侯屢伐之而不悛則治人不治反其智修明政刑尊上睦鄰安其人民修文徳以來之可也否則来則禦之可也不此之圖而乃㑹諸侯連兵相黨祻無窮極矣則亦何以異於楚鄭哉六月乙酉同盟于柯陵正傳曰書同盟于柯陵著同心於邪也左氏曰尋戚之盟也榖梁曰柯陵之盟謀復伐鄭也程子曰諸侯同病楚也愚謂鄭從楚以背中國滅天理無人心人人之所同惡然来則禦之去則勿逐以蠻夷治之可也而乃結黨勞衆連兵搆怨相尋無已豈非以暴易暴乎故春秋書之秋公至自㑹正傳曰書公至自㑹謹君之出入也左氏曰楚子重救鄭師于首止諸侯還愚謂孔子曰臨事而懼好謀而成當時諸侯輕出勞而無功可謂好謀而成乎齊髙無咎出奔莒正傳曰書齊髙無咎出奔莒則君臣之間奔之者與奔者之惡自見矣左氏曰齊慶克通于聲孟子與婦人蒙衣乗輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克乆不出而告夫人曰國子謫我夫人怒國子相靈公以㑹髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛齊人来召鮑國而立之初鮑國去鮑氏而来為施孝叔臣施氏卜宰匡句須吉施氏之宰有百室之邑與匡句須邑使為宰以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子鮑牽之知不如葵葵猶能衛其足言自取刖足愚謂齊靈公聽其母之邪譛而逐無咎無咎不能以道事君以孚其心至於疑間而去父母之邦則君之奔之臣之出奔皆非矣九月辛丑用郊正傳曰周之九月夏之七月也云用郊者依禮郊用正月上辛之文書九月辛丑用郊志非禮也祭惟其時不時則非禮矣公羊曰九月非所用郊也然則郊曷用郊用正月上辛榖梁曰宫室不設不可以祭衣服不備不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也胡氏曰郊之不時未有甚於此者也又曰或曰葢以人饗叩其鼻血以薦也古者六畜不相為用況敢用人乎晉侯使荀罃來乞師正傳曰書晉侯使荀罃來乞師罪貪勝也而其屈辱可見矣夫晉前以伐鄭而乞師今又以王人六諸侯伐鄭師亦衆矣而又來乞師葢其貪勝之心重而屈辱之恥輕故不憚其乞之屢耳殊不知寡能勝衆不戰而屈人者在徳而不在兵也冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭正傳曰書冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭則黷武之甚可見矣左氏曰冬諸侯伐鄭十月庚午圍鄭愚謂鄭之不服諸侯至是伐之者三四矣王人與者再矣未聞能服之者不但為諸侯羞將不為天王羞乎舜命禹征有苖不服還兵増修文徳舞干羽于兩階七旬而有苖格向使天子與諸侯息兵修文徳以來之如又不服則天子聲其罪出命使方伯連帥奉詞以徃伐之其誰不服焉十有一月公至自伐鄭正傳曰書公至自伐鄭謹君之出入也入則有反面焉左氏曰楚公子申救鄭師于汝上十一月諸侯還愚謂諸侯伐鄭而楚救之諸侯還如是者再矣公於反面之詞則將何以為詞其辱宗廟甚矣壬申公孫嬰齊卒于貍脤正傳曰書壬申公孫嬰齊卒于貍脤志大夫之大故也卒大夫禮也壬申者榖梁以為十一月無壬申乃十月也李氏曰以下文十二月丁巳朔推之則壬申為十月十五日愚謂壬申者乃嬰齊卒于貍脤之日也歸而史書之於十一月之下耳其理自明書地卒于外必有地故詳之也左氏曰初聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懐從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒愚謂左氏所載事雖不經然亦可以見死生之有定命而不足以動心也十有二月丁巳朔日有食之正傳曰書日有食之志異也邾子貜且卒正傳曰書邾子貜且卒志與國之大故也來赴故書之晉殺其大夫郤錡郤犨郤至正傳曰書晉殺其大夫郤錡郤犨郤至罪専殺也而厲公之無道並見矣左氏曰晉厲公侈多外嬖反自鄢陵盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷羊五田五亦嬖於厲公郤犨與長魚矯争田執而牿之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不偪敵多怨有庸公曰然壬午胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而偽訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位温季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲刼欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君徳乃皆歸公使胥童為卿公遊于匠麗氏欒書中行偃遂執公焉愚謂觀此則見厲公昵嬖而殺忠如以刀自戕其股肱而不恤至於斃其身其昬愚甚矣故榖梁子曰自祻於是起矣楚人滅舒庸正傳曰書楚人滅舒庸罪陵暴也左氏曰舒庸人以楚師之敗也道吳人圍巢伐駕圍虺釐遂恃呉而不設備楚公子橐師襲舒庸滅之簡王十三年十有八年晉厲八年弑齊靈九年衛獻四年蔡景十九年鄭成十二年曹成五年陳成二十六年杞桓六十四年宋平三年秦景四年楚共十八年呉夀夢十三年春王正月晉殺其大夫胥童正傳曰書晉殺其大夫胥童則可以殺而不可殺之義並見矣左氏曰閏月乙卯晦欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫由是觀之胥童道君為亂可殺也然為天吏則可以殺之今書與偃不以請于天子刑之司冦則負擅殺之罪矣故曰不可殺也庚申晉弑其君州蒲正傳曰書晉弑其君州蒲著弑逆之罪也左氏曰春王正月庚申晉欒書中行偃使程滑弑厲公𦵏之于翼東門之外以車一乗使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聴庚午盟而入館于伯子同氏辛巳朝于武宫逐不臣者七人周子有兄而無慧不能辨菽麥故不可立愚謂按左傳則弑厲公者欒書中行偃也而春秋誅之乃不以名而以國分其罪者何也榖梁謂君惡甚矣厲公盡欲去其羣大夫而用其嬖無道之甚弑之者雖書偃之為乃國人之所同志也故書晉人使人考跡而觀同欲之者晉民而為之者書偃也胡氏曰弑君天下之大事討賊天下之大刑春秋合於人心而定罪聖人順於天理而用刑固不以大霈釋當誅之賊亦不以大刑加不弑之人然趙盾以不越境而書弑許世子止以不嘗藥而書弑鄭歸生以憚老懼讒而書弑楚公子比以不能效死不立而書弑齊陳乞以廢長立幼而書弑晉欒書身為元帥親執厲公於匠麗氏使程滑弑公而以車一乗𦵏之於翼東門之外而春秋稱國以弑其君而不著欒書之名氏何哉仲尼無私與天為一奚獨於趙盾許止歸生楚比陳乞則責之甚備討之甚嚴而於欒武子闊畧如此乎學者深求其㫖知聖人之誅亂臣討賊子之大要也而後可與言春秋矣齊殺其大夫國佐正傳曰書齊殺其大夫國佐則可以殺而不可以殺之義並見矣左氏曰齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐于内宫之朝師逃於夫人之宫書曰齊殺其大夫國佐棄命専殺以榖叛故也使清人殺國勝佐子國弱勝弟來奔王湫奔萊慶封克子為大夫慶佐克子為司冦既齊侯反國弱使嗣國氏禮也愚謂據左傳則佐棄命専殺以榖叛其罪固可殺也然不以正之於王法而徒使士華免以戈殺之是自犯専殺大夫之禁矣公如晉正傳曰書公如晉志禮也而非禮見矣左氏曰朝嗣君也夫晉悼公初立逐不臣者七人舉六官之長皆民譽霸業復振故公首朝之朝嗣君似禮矣然公即位十有八年矣未嘗正行朝王之禮而乃首朝同列可得為禮乎夏楚子鄭伯伐宋宋魚石復入于彭城正傳曰書楚子鄭伯伐宋宋魚石復入于彭城志納惡之罪也左氏曰夏六月鄭伯侵宋及曹門外遂㑹楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向􅙮魚府焉以三百乗戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入宋人患之西鉏吾曰何也若楚人與吾同惡以徳於我吾固事之也不敢貳矣大國無厭鄙我猶憾不然而收吾憎使贊其政以間吾釁亦吾患也今将崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼呉晉吾庸多矣非吾憂也且事晉何為晉必恤之又左傳七月宋老佐華喜圍彭城老佐卒焉愚謂由前傳觀之則魚石以惡而復入者也楚鄭伐宋而納之是納惡矣觀西鉏吾之謀則宋固畏楚之强而許之納矣由後傳觀之則宋又有惡魚石之惡而拒之者矣夫書宋魚石復入于彭城則楚鄭納惡之罪自見矣何必執以惡曰復入之説以見其惡耶胡氏又執不曰納之一字以為不與其納皆鑿甚矣公至自晉正傳曰書公至自晉謹君之出入也晉侯使士匄來聘正傳曰書晉侯使士匄来聘志禮也左氏曰公至自晉晉范宣子來聘且拜朝也君子謂晉於是乎有禮秋杞伯來朝正傳曰書杞伯來朝志邦交之禮也左氏曰秋杞桓公來朝勞公且問晉故公以晉君語之杞伯於是驟朝于晉而請為昬八月邾子來朝正傳曰書邾子來朝志禮也左氏曰八月邾宣公來朝即位而來見也由傳觀之則邾子即位而來見得小國事大之禮故春秋書之築鹿囿正傳曰書築鹿囿著不時且病民也夫不奪民時政之大者也三時務農至冬役民正也周之八月夏之六月正農功方殷之時而築囿焉非時矣公羊曰有囿矣又為也榖梁曰山林藪澤之利所以與民共也虞之非正也由二傳觀之則匪特奪時之病民而虞民利則病民之大者也己丑公薨于路寢正傳曰書己丑公薨于路寢左氏以為言道也榖梁曰路寢正也男子不絶婦人之手以齊終也冬楚人鄭人侵宋正傳曰書楚人鄭人侵宋著附楚黨惡之罪也鄭以中國附夷而崇姦與楚侵宋則附夷猾夏之罪著矣左氏曰冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷楚師還晉侯使士魴來乞師正傳曰書晉侯使士魴來乞師志大事也戎國之大事也左氏曰晉士魴來乞師季文子問師數于臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虚朾正傳曰虚朾宋地書仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾著同心以崇華也左氏曰十二月孟獻子㑹于虚朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請于諸侯而先歸㑹𦵏愚謂觀此則見楚鄭侵宋納魚石于彭城其崇姦濟惡以强陵弱列國同心以救宋圍彭城天理之正也書曰予有臣三千惟一心言同心于徳也丁未𦵏我君成公正傳曰書丁未𦵏我君成公志國君之大事也左氏曰書順也杜氏曰薨于路寢五月而𦵏國家安靖世適承嗣故曰書順得之矣春秋正傳卷二十四
